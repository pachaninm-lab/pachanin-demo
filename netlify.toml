[build]
  command = "pnpm install --frozen-lockfile --config.node-linker=hoisted && pnpm --filter @pc/web build"
  publish = "apps/web/.next"
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF apps/web package.json pnpm-lock.yaml pnpm-workspace.yaml"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.2.1"
  NEXT_TELEMETRY_DISABLED = "1"
  PNPM_CONFIG_NODE_LINKER = "hoisted"
  NPM_FLAGS = "--config.node-linker=hoisted"

[[plugins]]
  package = "@netlify/plugin-nextjs"
