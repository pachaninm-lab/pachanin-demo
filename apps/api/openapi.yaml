                      stress: { $ref: '#/components/schemas/EconomicsScenario' }

  # ─── Incoming ЭДО Webhook (ТЗ 10.4) ────────────────────────────────────────

  /api/webhooks/edo:
    post:
      summary: Входящий webhook от ЭДО-оператора (ТЗ 10.4)
      description: |
        Принимает события от ЭДО-операторов (Диадок, Такском, СБИС).
        Аутентификация: HMAC-SHA256 подпись в заголовке X-Signature.
        Replay-protection: проверка X-Timestamp (допуск ±5 мин).
        Идемпотентность: X-Event-Id используется для дедупликации.
      tags: [Webhooks]
      parameters:
        - name: X-Signature
          in: header
          required: true
          schema: { type: string }
          description: "sha256=<hmac_hex>"
        - name: X-Timestamp
          in: header
          schema: { type: string }
          description: Unix timestamp (секунды)
        - name: X-Event-Id
          in: header
          schema: { type: string }
          description: Уникальный ID события для идемпотентности
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [eventType]
              properties:
                eventType:
                  type: string
                  enum: [document.sent, document.delivered, document.signed, document.rejected, upd.received]
                externalId: { type: string }
                dealId: { type: string }
                payload: { type: object }
      responses:
        "200":
          description: Событие принято
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string, enum: [accepted, already_processed] }
                  eventId: { type: string, nullable: true }
                  processedAt: { type: string, format: date-time }
        "401":
          description: Неверная подпись или устаревший timestamp

  /api/webhooks/fgis:
    post:
      summary: Входящий webhook от ФГИС Зерно (ТЗ 10.3)
      description: Принимает статусы партий от ФГИС. Аутентификация по HMAC-SHA256.
      tags: [Webhooks]
      parameters:
        - name: X-Signature
          in: header
          required: true
          schema: { type: string }
        - name: X-Timestamp
          in: header
          schema: { type: string }
        - name: X-Event-Id
          in: header
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                lotId: { type: string }
                status: { type: string }
                payload: { type: object }
      responses:
        "200":
          description: Webhook принят

