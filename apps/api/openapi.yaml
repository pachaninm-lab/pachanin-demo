openapi: "3.0.3"
info:
  title: GrainFlow API
  description: |
    Федеральная платформа цифровизации зерновых сделок.
    Все операции с деньгами используют копейки (integer). Никакого float для денег.
  version: "3.0.0"
  contact:
    name: GrainFlow Platform
servers:
  - url: http://localhost:4000
    description: Local development
  - url: https://api.grainflow.ru
    description: Production

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    ApiKey:
      type: apiKey
      in: header
      name: X-Api-Key

  schemas:
    Error:
      type: object
      properties:
        message: { type: string }
        statusCode: { type: integer }

    Deal:
      type: object
      properties:
        id: { type: string }
        dealNumber: { type: string }
        status: { type: string, enum: [DRAFT, PUBLISHED, NEGOTIATING, CONTRACT_PENDING, CONTRACT_SIGNED, PAYMENT_AWAITING, PAYMENT_RESERVED, LOGISTICS_ASSIGNED, IN_TRANSIT, DELIVERED, QUALITY_CHECK, QUALITY_ACCEPTED, QUALITY_DISPUTED, DOCUMENTS_PENDING, DOCUMENTS_SIGNED, SETTLEMENT_PENDING, SETTLED, CLOSED, DISPUTED, ARBITRATION, ARBITRATION_RESOLVED, CANCELLED] }
        culture: { type: string }
        region: { type: string }
        volumeTons: { type: number }
        totalRub: { type: number }
        totalKopecks: { type: integer }
        sellerOrgId: { type: string }
        buyerOrgId: { type: string }
        createdAt: { type: string, format: date-time }

    UnitEconomics:
      type: object
      properties:
        period: { type: object, properties: { from: { type: string }, to: { type: string } } }
        gmvKopecks: { type: integer }
        gmvRub: { type: integer }
        dealsCount: { type: integer }
        takeRateKopecks: { type: integer }
        commissionKopecks: { type: integer }
        contributionMarginKopecks: { type: integer }
        disputeRate: { type: number }
        successRate: { type: number }

    EconomicsScenarioYear:
      type: object
      properties:
        gmvRub: { type: integer }
        revenueRub: { type: integer }
        dealsCount: { type: integer }
        activeOrgs: { type: integer }
        conversionRate: { type: number }

    EconomicsScenario:
      type: object
      properties:
        label: { type: string }
        description: { type: string }
        assumptions: { type: object }
        year1: { $ref: '#/components/schemas/EconomicsScenarioYear' }
        year2: { $ref: '#/components/schemas/EconomicsScenarioYear' }
        year3: { $ref: '#/components/schemas/EconomicsScenarioYear' }
        unitEconomics:
          type: object
          properties:
            ltv: { type: integer }
            cac: { type: integer }
            ltvCacRatio: { type: number }
            costPerDeal: { type: integer }
            contributionMarginPct: { type: number }
        risks:
          type: array
          items: { type: string }

security:
  - BearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      tags: [System]
      responses:
        "200":
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  ts: { type: string }

  /ready:
    get:
      summary: Readiness probe
      security: []
      tags: [System]
      responses:
        "200":
          description: Service ready

  /metrics:
    get:
      summary: Prometheus metrics
      security: []
      tags: [System]
      responses:
        "200":
          description: Prometheus text format
          content:
            text/plain:
              schema: { type: string }

  /version:
    get:
      summary: Application version
      security: []
      tags: [System]
      responses:
        "200":
          description: Version info

  /api/auth/register:
    post:
      summary: Регистрация пользователя
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, role]
              properties:
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                role: { type: string }
                fullName: { type: string }
                orgId: { type: string }
      responses:
        "201":
          description: Пользователь создан
        "429":
          description: Превышен лимит попыток

  /api/auth/login:
    post:
      summary: Вход в систему
      security: []
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
                mfaCode: { type: string, description: "TOTP код (если MFA включена)" }
      responses:
        "200":
          description: Токен доступа
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token: { type: string }
                  user: { type: object }
        "429":
          description: Заблокировано после 5 неудачных попыток

  /api/mfa/setup:
    post:
      summary: Настройка TOTP MFA
      tags: [Auth, MFA]
      responses:
        "200":
          description: QR код и секрет для аутентификатора

  /api/mfa/verify:
    post:
      summary: Верификация TOTP кода
      tags: [Auth, MFA]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token: { type: string }
      responses:
        "200":
          description: MFA подтверждена

  /deals:
    get:
      summary: Список сделок
      tags: [Deals]
      responses:
        "200":
          description: Массив сделок
    post:
      summary: Создать сделку
      tags: [Deals]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                culture: { type: string }
                region: { type: string }
                volumeTons: { type: number }
                pricePerTonRub: { type: number }
                cropClass: { type: string }
      responses:
        "201":
          description: Сделка создана

  /deals/{id}/transition:
    patch:
      summary: Изменение статуса сделки
      tags: [Deals]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { type: string }
                comment: { type: string }
      responses:
        "200":
          description: Статус обновлён

  /api/analytics/unit-economics:
    get:
      summary: Unit Economics (GMV, Take Rate, Contribution Margin)
      tags: [Analytics]
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Unit economics report
          content:
            application/json:
              schema: { $ref: "#/components/schemas/UnitEconomics" }

  /api/analytics/commission-preview:
    get:
      summary: Предварительный расчёт комиссии (до подтверждения сделки)
      tags: [Analytics]
      parameters:
        - name: amount
          in: query
          required: true
          schema: { type: number }
          description: Сумма сделки в рублях
        - name: volumeTons
          in: query
          schema: { type: number }
        - name: isSubscriber
          in: query
          schema: { type: boolean }
      responses:
        "200":
          description: Разбивка комиссии
          content:
            application/json:
              schema:
                type: object
                properties:
                  dealAmountRub: { type: integer }
                  sellerCommissionKopecks: { type: integer }
                  buyerCommissionKopecks: { type: integer }
                  edoFeeKopecks: { type: integer }
                  vatOnCommissionKopecks: { type: integer }
                  sellerNetRub: { type: integer }
                  breakdown: { type: array, items: { type: object } }

  /api/analytics/price-prediction:
    get:
      summary: ML-прогноз цены на культуру
      tags: [Analytics, ML]
      parameters:
        - name: culture
          in: query
          required: true
          schema: { type: string }
        - name: region
          in: query
          required: true
          schema: { type: string }
        - name: cropClass
          in: query
          schema: { type: string }
        - name: volumeTons
          in: query
          schema: { type: number }
      responses:
        "200":
          description: Прогноз цены с доверительным интервалом

  /api/analytics/yield-forecast:
    get:
      summary: ML-прогноз урожайности
      tags: [Analytics, ML]
      parameters:
        - name: region
          in: query
          required: true
          schema: { type: string }
        - name: culture
          in: query
          required: true
          schema: { type: string }
        - name: areaSqHa
          in: query
          required: true
          schema: { type: number }
      responses:
        "200":
          description: Прогноз урожая

  /api/analytics/deal-duration-forecast:
    get:
      summary: Прогноз срока закрытия сделки
      tags: [Analytics, ML]
      parameters:
        - name: culture
          in: query
          schema: { type: string }
        - name: region
          in: query
          schema: { type: string }
        - name: volumeTons
          in: query
          schema: { type: number }
      responses:
        "200":
          description: Оценка срока и разбивка по стадиям

  /api/factoring/applications:
    post:
      summary: Подать заявку на факторинг
      tags: [Factoring]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dealId, organizationId, factorName, requestedAmountKopecks]
              properties:
                dealId: { type: string }
                organizationId: { type: string }
                factorName: { type: string }
                requestedAmountKopecks: { type: integer }
      responses:
        "201":
          description: Заявка создана с авто-скорингом

    get:
      summary: Список заявок на факторинг
      tags: [Factoring]
      responses:
        "200":
          description: Список заявок

  /api/factoring/applications/{id}:
    get:
      summary: Заявка на факторинг по ID
      tags: [Factoring]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Детали заявки

  /api/factoring/applications/{id}/activate:
    post:
      summary: Активировать факторинговую линию (перевести APPROVED → ACTIVE)
      tags: [Factoring]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Статус обновлён

  /api/factoring/applications/{id}/repay:
    post:
      summary: Отметить задолженность погашенной (ACTIVE → REPAID)
      tags: [Factoring]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Статус обновлён

  /api/factoring/credit-report/{organizationId}:
    get:
      summary: Кредитный отчёт НБКИ по организации (БКИ скоринг)
      tags: [Factoring]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Кредитный отчёт НБКИ
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizationId: { type: string }
                  inn: { type: string }
                  organizationName: { type: string }
                  creditScore: { type: integer, description: "Скоринговый балл 300–850" }
                  rating: { type: string, enum: [A+, A, B+, B, C, D, UNRATED] }
                  openLoans: { type: integer }
                  totalDebtKopecks: { type: integer }
                  overdueDebtKopecks: { type: integer }
                  maxCreditLimitKopecks: { type: integer }
                  utilizationPct: { type: number }
                  flags: { type: array, items: { type: string } }
                  bureau: { type: string }
                  checkedAt: { type: string, format: date-time }

  /api/factoring/org-block-status/{organizationId}:
    get:
      summary: Статус блокировки организации из-за просрочки факторинга
      tags: [Factoring]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: organizationId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Статус блокировки
          content:
            application/json:
              schema:
                type: object
                properties:
                  organizationId: { type: string }
                  blocked: { type: boolean, description: "true если есть просроченный факторинг — новые сделки запрещены" }

  /api/factoring/check-overdue:
    post:
      summary: Ручной запуск проверки просроченных факторинговых задолженностей (ADMIN/ACCOUNTING)
      tags: [Factoring]
      security: [{ BearerAuth: [] }]
      responses:
        "201":
          description: Результат проверки
          content:
            application/json:
              schema:
                type: object
                properties:
                  checked: { type: integer }
                  overdue: { type: integer, description: "Кол-во переведённых в OVERDUE" }
                  dueSoon: { type: integer, description: "Кол-во уведомлений due_soon отправлено" }
        "403":
          description: Только ADMIN/ACCOUNTING

  /api/exports/deals:
    get:
      summary: Экспорт сделок в CSV
      tags: [Exports]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: CSV-файл со сделками
          content:
            text/csv:
              schema: { type: string }

  /api/exports/deal-report/{dealId}:
    get:
      summary: Полный JSON-отчёт по сделке с проверкой hash-цепочки
      tags: [Exports]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: dealId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: JSON-отчёт по сделке
          content:
            application/json:
              schema:
                type: object
                properties:
                  reportId: { type: string }
                  dealId: { type: string }
                  generatedAt: { type: string, format: date-time }
                  generatedBy: { type: string }
                  format: { type: string, example: json }
                  sections:
                    type: object
                    properties:
                      summary: { type: object }
                      timeline: { type: array, items: { type: object } }
                      financials: { type: object }
                      documents: { type: array, items: { type: object } }
                      chainIntegrity:
                        type: object
                        properties:
                          valid: { type: boolean }
                          eventCount: { type: integer }

  /api/exports/evidence/{dealId}:
    get:
      summary: Пакет доказательств с hash-цепочкой для сделки
      tags: [Exports]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: dealId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Манифест и список файлов с hash-цепочкой

  /api/exports/ledger/{dealId}:
    get:
      summary: Экспорт бухгалтерской книги по сделке в CSV
      tags: [Exports]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: dealId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: CSV-файл с записями в бухкниге
          content:
            text/csv:
              schema: { type: string }

  /api/exports/outbox-status:
    get:
      summary: Статус Outbox (pending/sent/dead/failed)
      tags: [Exports]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Статистика outbox и последние 100 записей

  /api/bank/reconciliation/import:
    post:
      summary: Импорт банковской выписки MT940
      tags: [BankReconciliation]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                content: { type: string, description: "Содержимое файла MT940" }
      responses:
        "201":
          description: Импортировано и сопоставлено

  /api/bank/reconciliation/unmatched:
    get:
      summary: Несопоставленные платежи
      tags: [BankReconciliation]
      responses:
        "200":
          description: Список несопоставленных платежей

  /api/bank/reconciliation/report:
    get:
      summary: Отчёт сверки за период
      tags: [BankReconciliation]
      parameters:
        - name: from
          in: query
          schema: { type: string, format: date }
        - name: to
          in: query
          schema: { type: string, format: date }
      responses:
        "200":
          description: Сводный отчёт сверки

  /api/bank/reconciliation/match:
    post:
      summary: Ручное сопоставление платежа со сделкой
      tags: [BankReconciliation]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [paymentId, dealId]
              properties:
                paymentId: { type: string, description: "ID платежа (PAY-000001)" }
                dealId: { type: string, description: "ID сделки для сопоставления" }
      responses:
        "200":
          description: Платёж сопоставлен вручную
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  matchedDealId: { type: string }
                  matchStatus: { type: string, enum: [MATCHED, MANUAL] }
        "403":
          description: Недостаточно прав (только ADMIN/ACCOUNTING/EXECUTIVE)

  /api/integration-events:
    get:
      summary: Журнал событий интеграций (входящие/исходящие)
      tags: [IntegrationEvents]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: adapter
          in: query
          schema: { type: string }
          description: "Фильтр по адаптеру (DIADOK, FGIS_ZERNO, GPS, ...)"
        - name: direction
          in: query
          schema: { type: string, enum: [INBOUND, OUTBOUND] }
        - name: status
          in: query
          schema: { type: string, enum: [SUCCESS, ERROR, PENDING, TIMEOUT] }
        - name: dealId
          in: query
          schema: { type: string }
        - name: from
          in: query
          schema: { type: string, format: date-time }
        - name: to
          in: query
          schema: { type: string, format: date-time }
        - name: take
          in: query
          schema: { type: integer, default: 100, maximum: 500 }
      responses:
        "200":
          description: Список событий интеграций
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: string }
                        adapterName: { type: string }
                        direction: { type: string }
                        eventType: { type: string }
                        status: { type: string }
                        durationMs: { type: integer }
                        createdAt: { type: string }
                  total: { type: integer }
        "403":
          description: Доступ только для ADMIN/SUPPORT_MANAGER/COMPLIANCE_OFFICER/EXECUTIVE

  /api/integration-events/stats:
    get:
      summary: Статистика событий интеграций по адаптерам и статусам
      tags: [IntegrationEvents]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Сводная статистика
          content:
            application/json:
              schema:
                type: object
                properties:
                  total: { type: integer }
                  byAdapter: { type: object, additionalProperties: { type: integer } }
                  byStatus: { type: object, additionalProperties: { type: integer } }

  /api/integration-events/{id}:
    get:
      summary: Детали события интеграции
      tags: [IntegrationEvents]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Полная запись события интеграции с payload
        "403":
          description: Событие не найдено или нет доступа

  /api/exports/regulatory:
    post:
      summary: Регуляторный отчёт (Минсельхоз, Росстат, ФНС, Росфинмониторинг)
      tags: [Exports]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [msh, rosstat, fns, rosfinmonitoring]
                from:
                  type: string
                  format: date
                to:
                  type: string
                  format: date
      responses:
        "200":
          description: Файл отчёта (XML или CSV)
          content:
            application/xml:
              schema: { type: string }
            text/csv:
              schema: { type: string }

  /api/support/tickets:
    post:
      summary: Создать тикет поддержки
      tags: [Support]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [subject, description, category]
              properties:
                subject: { type: string }
                description: { type: string }
                category: { type: string }
                priority: { type: string, enum: [LOW, MEDIUM, HIGH, CRITICAL] }
                dealId: { type: string }
      responses:
        "201":
          description: Тикет создан

    get:
      summary: Очередь тикетов (только Support/Admin)
      tags: [Support]
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: priority
          in: query
          schema: { type: string }
        - name: assignedTo
          in: query
          schema: { type: string, description: "me | unassigned | userId" }
      responses:
        "200":
          description: Список тикетов по приоритету

  /api/support/tickets/stats:
    get:
      summary: Статистика тикетов поддержки (только Support/Admin)
      tags: [Support]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Сводная статистика по статусам и приоритетам

  /api/support/tickets/{id}:
    get:
      summary: Детали тикета
      tags: [Support]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Тикет с комментариями и историей

  /api/support/tickets/{id}/assign:
    patch:
      summary: Назначить тикет оператору
      tags: [Support]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [assigneeId]
              properties:
                assigneeId: { type: string }
      responses:
        "200":
          description: Тикет назначен

  /api/support/tickets/{id}/resolve:
    patch:
      summary: Закрыть тикет с решением
      tags: [Support]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [resolution]
              properties:
                resolution: { type: string }
      responses:
        "200":
          description: Тикет закрыт

  /api/support/tickets/{id}/escalate:
    patch:
      summary: Эскалировать тикет к Admin
      tags: [Support]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string }
      responses:
        "200":
          description: Тикет эскалирован

  /api/support/tickets/{id}/comments:
    post:
      summary: Добавить комментарий к тикету
      tags: [Support]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [text]
              properties:
                text: { type: string }
                isInternal: { type: boolean, description: "true — внутренняя заметка, не видна пользователю" }
      responses:
        "201":
          description: Комментарий добавлен

  /api/support/deals/{dealId}:
    get:
      summary: Просмотр сделки от имени пользователя (read-only, с audit-записью) — только Support
      tags: [Support]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: dealId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Данные сделки (без финансовых операций)
        "403":
          description: Только SUPPORT_MANAGER/ADMIN

  /api/support/users/{userId}/reset-password:
    post:
      summary: Сброс пароля пользователя (только Support/Admin)
      tags: [Support]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: userId
          in: path
          required: true
          schema: { type: string }
      responses:
        "201":
          description: Временный пароль сгенерирован
        "403":
          description: Только SUPPORT_MANAGER/ADMIN

  /api/reputation/orgs/{id}:
    get:
      summary: Скор надёжности контрагента
      tags: [BusinessReputation]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Скор и tier (AAA/AA/A/B/C/D/UNRATED)

  /api/partner/api-keys:
    post:
      summary: Выпустить партнёрский API-ключ
      tags: [PartnerAPI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                scopes: { type: array, items: { type: string } }
                expiresInDays: { type: integer }
      responses:
        "201":
          description: API-ключ (показывается один раз)

  /api/partner/webhooks:
    post:
      summary: Подписаться на webhook-события
      tags: [PartnerAPI]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url, events]
              properties:
                url: { type: string, format: uri }
                events: { type: array, items: { type: string } }
      responses:
        "201":
          description: Webhook создан с HMAC-секретом

  /api/saga/deals/{dealId}:
    get:
      summary: Состояние Saga-оркестратора сделки
      tags: [Saga]
      parameters:
        - name: dealId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Текущий шаг и состояние всех шагов

  /api/elevator/weighing-acts:
    post:
      summary: Создать акт взвешивания
      tags: [Elevator]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shipmentId: { type: string }
                grossTons: { type: number }
                tareTons: { type: number }
                moisturePct: { type: number }
                impurityPct: { type: number }
      responses:
        "201":
          description: Акт взвешивания с расчётом чистого веса

  /api/notifications:
    get:
      summary: Уведомления текущего пользователя
      tags: [Notifications]
      responses:
        "200":
          description: Список уведомлений

  /api/notifications/unread-count:
    get:
      summary: Количество непрочитанных уведомлений
      tags: [Notifications]
      responses:
        "200":
          description: Счётчик
          content:
            application/json:
              schema:
                type: object
                properties:
                  count: { type: integer }

  /api/auth/me/data-export:
    get:
      summary: Экспорт данных пользователя (152-ФЗ, Data Portability)
      tags: [Auth, Compliance]
      responses:
        "200":
          description: Все данные пользователя в JSON (профиль, согласие, статус)
          content:
            application/json:
              schema:
                type: object
                properties:
                  exportedAt: { type: string, format: date-time }
                  exportVersion: { type: string }
                  subject: { type: string }
                  profile: { type: object }
                  consent: { type: object }
                  accountStatus: { type: object }
        "403":
          description: Аккаунт уже анонимизирован

  /api/auth/me/anonymize:
    post:
      summary: Анонимизация аккаунта (152-ФЗ, Right to be Forgotten)
      tags: [Auth, Compliance]
      responses:
        "200":
          description: Аккаунт анонимизирован, все токены отозваны
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean }
                  anonymizedAt: { type: string, format: date-time }
        "409":
          description: Аккаунт уже анонимизирован

  /api/kyc/verify:
    post:
      summary: KYC верификация организации (ФНС + AML Росфинмониторинг)
      tags: [KYC, Compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inn]
              properties:
                inn: { type: string, description: "ИНН юридического лица (10 цифр) или ИП (12 цифр)" }
                organizationName: { type: string }
                bik: { type: string, description: "БИК банка для проверки реквизитов" }
                bankAccount: { type: string, description: "Расчётный счёт" }
      responses:
        "200":
          description: Результат KYC с разбивкой по проверкам
          content:
            application/json:
              schema:
                type: object
                properties:
                  passed: { type: boolean }
                  overallRisk: { type: string, enum: [LOW, MEDIUM, HIGH, BLOCKED] }
                  verifiedAt: { type: string, format: date-time }
                  checks:
                    type: object
                    properties:
                      innVerification: { type: object }
                      sanctionScreening: { type: object }
                      bankDetailsCheck: { type: object }

  /api/kyc/transaction/aml-check:
    post:
      summary: AML проверка транзакции (115-ФЗ, порог 600 000 ₽)
      tags: [KYC, Compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [transactionId, amountKopecks]
              properties:
                transactionId: { type: string }
                amountKopecks: { type: integer, description: "Сумма в копейках (600 000 ₽ = 60 000 000 копеек)" }
                payerInn: { type: string }
                receiverInn: { type: string }
                dealId: { type: string }
      responses:
        "200":
          description: Результат AML проверки с флагами подозрительной активности

  /api/kyc/initiate:
    post:
      summary: Инициировать KYC процесс для организации
      tags: [KYC, Compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [organizationId, inn]
              properties:
                organizationId: { type: string }
                inn: { type: string }
                notes: { type: string }
      responses:
        "201":
          description: KYC задача создана

  /api/kyc/status/{organizationId}:
    get:
      summary: Статус KYC для организации
      tags: [KYC, Compliance]
      parameters:
        - name: organizationId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Последние KYC задачи и статус

  /api/kyc/rkn-incident:
    post:
      summary: Генерация уведомления об инциденте для РКН (152-ФЗ, 72 часа)
      tags: [KYC, Compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [incidentType, description, affectedSubjectsCount, detectedAt, reporterFullName, reporterPosition]
              properties:
                incidentType: { type: string, example: "Несанкционированный доступ к ПДн" }
                description: { type: string }
                affectedSubjectsCount: { type: integer }
                detectedAt: { type: string, format: date-time }
                reporterFullName: { type: string }
                reporterPosition: { type: string }
      responses:
        "200":
          description: XML-уведомление для подачи в РКН и дедлайн уведомления
          content:
            application/json:
              schema:
                type: object
                properties:
                  xml: { type: string }
                  deadlineAt: { type: string, format: date-time }

  /api/anti-fraud/check:
    post:
      summary: Проверка сделки на мошенничество
      tags: [AntiFraud, Compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                dealId: { type: string }
                sellerOrgId: { type: string }
                buyerOrgId: { type: string }
                volumeTons: { type: number }
                totalRub: { type: number }
                pricePerTon: { type: number }
                culture: { type: string }
                actorRole: { type: string }
                previousStatus: { type: string }
                newStatus: { type: string }
      responses:
        "200":
          description: Результат антифрод проверки со скором и причинами
          content:
            application/json:
              schema:
                type: object
                properties:
                  flagged: { type: boolean }
                  score: { type: integer, description: "0-100, >= 50 = флаг" }
                  reasons: { type: array, items: { type: string } }
                  entityId: { type: string }
                  entityType: { type: string }
                  checkedAt: { type: string, format: date-time }

  /api/anti-fraud/off-platform:
    post:
      summary: Сообщить о признаке внеплатформенного расчёта
      tags: [AntiFraud, Compliance]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dealId, buyerOrgId, sellerOrgId, indicator]
              properties:
                dealId: { type: string }
                buyerOrgId: { type: string }
                sellerOrgId: { type: string }
                indicator:
                  type: string
                  enum: [external_payment_mentioned, deal_cancelled_after_delivery, reputation_drop_post_cancel, counterparty_comment_flag]
                evidence: { type: string }
      responses:
        "200":
          description: Результат проверки с записью в аудит при скоре >= 50

  # ── ДОКУМЕНТЫ: batch-sign, verify-signature, certificates ──────────────

  /api/documents/batch-sign:
    post:
      summary: Пакетное подписание УКЭП до 50 документов
      tags: [Documents, УКЭП]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documentIds]
              properties:
                documentIds:
                  type: array
                  items: { type: string }
                  maxItems: 50
                  description: Список ID документов для подписания (до 50 штук)
                certificateId:
                  type: string
                  description: ID сертификата УКЭП (если не указан — используется первый активный)
      responses:
        "200":
          description: Результаты пакетного подписания
          content:
            application/json:
              schema:
                type: object
                properties:
                  processed: { type: integer }
                  signed: { type: integer }
                  failed: { type: integer }
                  results: { type: array, items: { type: object } }

  /api/documents/{id}/verify-signature:
    post:
      summary: Верификация УКЭП документа через КриптоПро DSS
      tags: [Documents, УКЭП]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signatureBase64, certificateId]
              properties:
                signatureBase64: { type: string }
                certificateId: { type: string }
                documentHash: { type: string, description: "SHA-256 хеш документа (вычисляется автоматически, если не указан)" }
      responses:
        "200":
          description: Результат верификации подписи
          content:
            application/json:
              schema:
                type: object
                properties:
                  documentId: { type: string }
                  valid: { type: boolean }
                  signerCn: { type: string }
                  signedAt: { type: string, format: date-time }
                  algorithm: { type: string }

  /api/documents/certificates/my:
    get:
      summary: Список УКЭП сертификатов текущего пользователя
      tags: [Documents, УКЭП]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Список активных сертификатов КриптоПро DSS
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    thumbprint: { type: string }
                    subject: { type: string }
                    validFrom: { type: string, format: date-time }
                    validTo: { type: string, format: date-time }
                    status: { type: string, enum: [valid, revoked, expired] }

  /api/documents/certificates/{certId}/status:
    get:
      summary: Проверка статуса УКЭП сертификата через OCSP
      tags: [Documents, УКЭП]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: certId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Статус сертификата по OCSP
          content:
            application/json:
              schema:
                type: object
                properties:
                  certificateId: { type: string }
                  status: { type: string, enum: [valid, revoked, expired, unknown] }

  /api/documents/templates:
    get:
      summary: Список шаблонов документов
      tags: [Documents]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Доступные шаблоны документов (7 типов)
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    name: { type: string }
                    requiredVariables: { type: array, items: { type: string } }

  /api/documents/templates/{id}/generate:
    post:
      summary: Генерация документа из шаблона
      tags: [Documents]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
            enum: [CONTRACT, SPECIFICATION, ETN, ACCEPTANCE_ACT, QUALITY_CERTIFICATE, INVOICE, RECONCILIATION_ACT]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Переменные для заполнения шаблона (зависят от типа документа)
              additionalProperties:
                oneOf:
                  - { type: string }
                  - { type: number }
      responses:
        "200":
          description: Сгенерированный документ
          content:
            application/json:
              schema:
                type: object
                properties:
                  templateId: { type: string }
                  content: { type: string }
                  hash: { type: string }
                  generatedAt: { type: string, format: date-time }

  # ── МОНИТОРИНГ СЕРТИФИКАТОВ ──────────────────────────────────────────

  /api/certificates/my:
    get:
      summary: Список УКЭП сертификатов текущего пользователя (certificate-monitor)
      tags: [CertificateMonitor, УКЭП]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Список сертификатов с датами истечения и статусами
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    userId: { type: string }
                    orgId: { type: string }
                    thumbprint: { type: string }
                    subject: { type: string }
                    issuer: { type: string }
                    validFrom: { type: string, format: date-time }
                    validTo: { type: string, format: date-time }
                    status: { type: string, enum: [ACTIVE, REVOKED, EXPIRED] }
                    daysUntilExpiry: { type: integer }

  /api/certificates/org/{orgId}:
    get:
      summary: Все сертификаты организации (ADMIN, COMPLIANCE_OFFICER, EXECUTIVE)
      tags: [CertificateMonitor, УКЭП]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: orgId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Список сертификатов организации

  /api/certificates/register:
    post:
      summary: Зарегистрировать новый УКЭП сертификат
      tags: [CertificateMonitor, УКЭП]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, orgId, thumbprint, subject, issuer, validFrom, validTo]
              properties:
                userId: { type: string }
                orgId: { type: string }
                thumbprint: { type: string }
                subject: { type: string }
                issuer: { type: string }
                validFrom: { type: string, format: date-time }
                validTo: { type: string, format: date-time }
      responses:
        "201":
          description: Сертификат зарегистрирован

  /api/certificates/{id}/revoke:
    delete:
      summary: Отозвать сертификат (самостоятельно)
      tags: [CertificateMonitor, УКЭП]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Сертификат отозван

  /api/certificates/check-now:
    post:
      summary: Немедленная проверка истечения сертификатов (ADMIN)
      tags: [CertificateMonitor, УКЭП]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Результат проверки
          content:
            application/json:
              schema:
                type: object
                properties:
                  checked: { type: integer }
                  notified: { type: integer }
                  expired: { type: integer }

  # ── ФГИС ЗЕРНО (Saga Steps) ──────────────────────────────────────────

  /api/saga/deals/{dealId}/execute/fgis_register:
    post:
      summary: Выполнить шаг регистрации в ФГИС Зерно для сделки
      tags: [Saga, ФГИС]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: dealId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [culture, volumeTons, producerInn, harvestYear, region]
              properties:
                culture: { type: string, example: "wheat" }
                volumeTons: { type: number }
                producerInn: { type: string }
                harvestYear: { type: integer }
                region: { type: string }
      responses:
        "200":
          description: Результат регистрации в ФГИС Зерно
          content:
            application/json:
              schema:
                type: object
                properties:
                  dealId: { type: string }
                  fgisLotId: { type: string }
                  fgisCertificate: { type: object }
                  sagaStep: { type: string }
                  sagaStatus: { type: string }

  /api/saga/deals/{dealId}/fgis/confirm-shipment:
    post:
      summary: Подтверждение отгрузки в ФГИС Зерно
      tags: [Saga, ФГИС]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: dealId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fgisLotId, vehicleNumber, driverName]
              properties:
                fgisLotId: { type: string }
                vehicleNumber: { type: string }
                driverName: { type: string }
                shipmentDate: { type: string, format: date-time }
      responses:
        "200":
          description: Подтверждение отгрузки зафиксировано в ФГИС

  /api/saga/deals/{dealId}/fgis/confirm-acceptance:
    post:
      summary: Подтверждение приёмки в ФГИС Зерно
      tags: [Saga, ФГИС]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: dealId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fgisLotId, acceptedTons, qualityCertNumber]
              properties:
                fgisLotId: { type: string }
                acceptedTons: { type: number }
                qualityCertNumber: { type: string }
      responses:
        "200":
          description: Приёмка подтверждена в ФГИС

  /api/saga/fgis/crops:
    get:
      summary: Классификатор культур ФГИС Зерно
      tags: [Saga, ФГИС]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Список культур с кодами ФГИС
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code: { type: string }
                    name: { type: string }
                    classes: { type: array, items: { type: integer } }

  # ── ЖЕЛЕЗНОДОРОЖНАЯ ЛОГИСТИКА ────────────────────────────────────────

  /api/railway/wagons:
    get:
      summary: Список вагонов (ж/д парк)
      tags: [Railway, Logistics]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Список вагонов с типами и статусами
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id: { type: string }
                    wagonNumber: { type: string }
                    type: { type: string, enum: [HOPPER, COVERED, PLATFORM, TANK] }
                    capacityTons: { type: number }
                    status: { type: string, enum: [FREE, ASSIGNED, IN_TRANSIT, MAINTENANCE] }
                    ownerOrgId: { type: string }
    post:
      summary: Зарегистрировать вагон
      tags: [Railway, Logistics]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wagonNumber, type, capacityTons, ownerOrgId]
              properties:
                wagonNumber: { type: string }
                type: { type: string, enum: [HOPPER, COVERED, PLATFORM, TANK] }
                capacityTons: { type: number }
                ownerOrgId: { type: string }
      responses:
        "201":
          description: Вагон зарегистрирован

  /api/railway/wagons/{id}/status:
    patch:
      summary: Обновить статус вагона
      tags: [Railway, Logistics]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [FREE, ASSIGNED, IN_TRANSIT, MAINTENANCE] }
                dealId: { type: string }
                note: { type: string }
      responses:
        "200":
          description: Статус вагона обновлён

  /api/railway/gu12:
    get:
      summary: Список заявок ГУ-12 (заявки на перевозку)
      tags: [Railway, Logistics]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Список заявок ГУ-12
    post:
      summary: Создать заявку ГУ-12
      tags: [Railway, Logistics]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wagonId, dealId, loadStationCode, destStationCode, cargoCodes, volumeTons, loadDatePlan]
              properties:
                wagonId: { type: string }
                dealId: { type: string }
                loadStationCode: { type: string, description: "Код станции погрузки (6 цифр)" }
                destStationCode: { type: string, description: "Код станции назначения (6 цифр)" }
                cargoCodes:
                  type: array
                  items: { type: string }
                  description: "Коды ЕТСНГ (ГНГР) грузов"
                volumeTons: { type: number }
                loadDatePlan: { type: string, format: date-time }
      responses:
        "201":
          description: Заявка ГУ-12 создана
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  gu12Number: { type: string }
                  status: { type: string, enum: [DRAFT, SUBMITTED, APPROVED, REJECTED, EXECUTED] }

  /api/railway/gu12/{id}/submit:
    post:
      summary: Подать заявку ГУ-12 в ЭТРАН
      tags: [Railway, Logistics]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Заявка подана в ЭТРАН, ожидает подтверждения

  /api/railway/demurrage:
    post:
      summary: Рассчитать демередж (простой вагона)
      tags: [Railway, Logistics]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [wagonId, arrivalAt, departureAt]
              properties:
                wagonId: { type: string }
                dealId: { type: string }
                arrivalAt: { type: string, format: date-time }
                departureAt: { type: string, format: date-time }
      responses:
        "200":
          description: Расчёт демереджа
          content:
            application/json:
              schema:
                type: object
                properties:
                  wagonId: { type: string }
                  totalHours: { type: number }
                  freeTimeHours: { type: integer, description: "Бесплатное время (24 ч)" }
                  chargeableHours: { type: number }
                  demurrageKopecks: { type: integer, description: "Сумма в копейках" }
                  demurrageRub: { type: number }

  # ── ЭКСПОРТНАЯ ТОРГОВЛЯ (Incoterms, мультивалюта, таможня, РСХН) ────

  /api/export-trade/incoterms:
    get:
      summary: Список условий Incoterms 2020 (11 терминов)
      tags: [ExportTrade]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: 11 терминов Incoterms 2020 с описаниями перехода рисков
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    code: { type: string, enum: [EXW, FCA, CPT, CIP, DAP, DPU, DDP, FAS, FOB, CFR, CIF] }
                    name: { type: string }
                    riskTransferPoint: { type: string }
                    sellerPays: { type: array, items: { type: string } }
                    buyerPays: { type: array, items: { type: string } }

  /api/export-trade/incoterms/calculate:
    post:
      summary: Расчёт цены по Incoterms
      tags: [ExportTrade]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [priceRub, incoterms, currency]
              properties:
                priceRub: { type: number }
                incoterms: { type: string, enum: [EXW, FCA, CPT, CIP, DAP, DPU, DDP, FAS, FOB, CFR, CIF] }
                currency: { type: string, enum: [RUB, USD, EUR, CNY] }
                distanceKm: { type: number }
                volumeTons: { type: number }
                includeInsurancePct: { type: number }
      responses:
        "200":
          description: Расчёт цены с фрахтом и страхованием
          content:
            application/json:
              schema:
                type: object
                properties:
                  basePriceRub: { type: number }
                  freightRub: { type: number }
                  insuranceRub: { type: number }
                  totalRub: { type: number }
                  totalInCurrency: { type: number }
                  currency: { type: string }
                  exchangeRate: { type: number }

  /api/export-trade/exchange-rates:
    get:
      summary: Курсы валют (ЦБ РФ)
      tags: [ExportTrade]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Курсы USD, EUR, CNY к рублю
          content:
            application/json:
              schema:
                type: object
                properties:
                  rates: { type: object, additionalProperties: { type: number } }
                  source: { type: string }
                  updatedAt: { type: string, format: date-time }

  /api/export-trade/convert:
    post:
      summary: Конвертация суммы из рублей в выбранную валюту
      tags: [ExportTrade]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amountRub, toCurrency]
              properties:
                amountRub: { type: number }
                toCurrency: { type: string, enum: [RUB, USD, EUR, CNY] }
      responses:
        "200":
          description: Конвертированная сумма

  /api/export-trade/customs/{dtNumber}:
    get:
      summary: Статус таможенной декларации (ФТС)
      tags: [ExportTrade, Customs]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: dtNumber
          required: true
          schema: { type: string, description: "Номер ДТ (10203040/200626/1234567)" }
      responses:
        "200":
          description: Статус и этапы таможенного оформления

  /api/export-trade/customs/submit:
    post:
      summary: Подать таможенную декларацию (ФТС)
      tags: [ExportTrade, Customs]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [goodsDescription, tnvedCode, totalValueRub]
              properties:
                goodsDescription: { type: string }
                tnvedCode: { type: string, description: "Код ТН ВЭД" }
                totalValueRub: { type: number }
      responses:
        "201":
          description: Декларация подана
          content:
            application/json:
              schema:
                type: object
                properties:
                  declarationId: { type: string }
                  dtNumber: { type: string }
                  status: { type: string }
                  submittedAt: { type: string, format: date-time }

  /api/export-trade/phyto/apply:
    post:
      summary: Заявка на фитосанитарный сертификат (Россельхознадзор)
      tags: [ExportTrade, Phyto]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [culture, volumeTons, producerInn, destinationCountry]
              properties:
                culture: { type: string }
                volumeTons: { type: number }
                producerInn: { type: string }
                destinationCountry: { type: string, description: "ISO 3166-1 alpha-2" }
      responses:
        "201":
          description: Заявка подана в Россельхознадзор
          content:
            application/json:
              schema:
                type: object
                properties:
                  applicationId: { type: string }
                  certId: { type: string }
                  status: { type: string }

  /api/export-trade/phyto/{certId}:
    get:
      summary: Статус фитосанитарного сертификата
      tags: [ExportTrade, Phyto]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: certId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Статус и данные фитосанитарного сертификата

  /api/export-trade/phyto:
    get:
      summary: Список фитосанитарных сертификатов по ИНН производителя
      tags: [ExportTrade, Phyto]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: query
          name: producerInn
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Список сертификатов

  /api/export-trade/sanctions/{country}:
    get:
      summary: Проверка страны на санкционные ограничения
      tags: [ExportTrade, Compliance]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: country
          required: true
          schema: { type: string, description: "ISO 3166-1 alpha-2 код страны" }
      responses:
        "200":
          description: Результат проверки санкций
          content:
            application/json:
              schema:
                type: object
                properties:
                  country: { type: string }
                  sanctioned: { type: boolean }
                  lists: { type: array, items: { type: string } }
                  allowedWithPermit: { type: boolean }

  # ── MarineTraffic (суда) ──────────────────────────────────────────

  /api/export-trade/vessels:
    get:
      summary: Поиск судов по названию / MMSI / типу (MarineTraffic)
      tags: [ExportTrade]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: q
          in: query
          schema: { type: string }
        - name: type
          in: query
          schema: { type: string, enum: [BULK_CARRIER, CONTAINER, GENERAL_CARGO, TANKER] }
      responses:
        "200":
          description: Список судов с позицией и статусом

  /api/export-trade/vessels/{mmsi}:
    get:
      summary: Позиция судна по MMSI (MarineTraffic)
      tags: [ExportTrade]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: mmsi
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Текущая позиция и скорость судна

  /api/export-trade/vessels/{mmsi}/route:
    get:
      summary: Маршрут судна — откуда/куда, дистанция, ETA (MarineTraffic)
      tags: [ExportTrade]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: mmsi
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Маршрут с историей заходов в порты

  /api/export-trade/vessels/{mmsi}/port-calls:
    get:
      summary: История заходов в порты для судна (MarineTraffic)
      tags: [ExportTrade]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: mmsi
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Список заходов в порты

  # ── СМЭВ — ФНС ЕГРЮЛ, верификация ИНН ───────────────────────────

  /api/kyc/egrul/{inn}:
    get:
      summary: Выписка из ЕГРЮЛ через СМЭВ по ИНН
      tags: [KYC, SMEV]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: inn
          required: true
          schema: { type: string, description: "ИНН юридического лица (10 цифр) или ИП (12 цифр)" }
      responses:
        "200":
          description: Данные из ЕГРЮЛ
          content:
            application/json:
              schema:
                type: object
                properties:
                  inn: { type: string }
                  ogrn: { type: string }
                  kpp: { type: string }
                  fullName: { type: string }
                  shortName: { type: string }
                  status: { type: string, enum: [ACTIVE, LIQUIDATED, REORGANIZING] }
                  registrationDate: { type: string }
                  address: { type: string }
                  okved: { type: string }
                  okvedDescription: { type: string }

  /api/kyc/verify-inn:
    post:
      summary: Верификация ИНН через СМЭВ (ФНС)
      tags: [KYC, SMEV]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [inn]
              properties:
                inn: { type: string }
                ogrn: { type: string }
      responses:
        "200":
          description: Результат верификации ИНН
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  inn: { type: string }
                  status: { type: string }

  # ── ГИС ЭПД (Минтранс) — ЭТН ─────────────────────────────────────

  /api/logistics/etn:
    post:
      summary: Создать электронную транспортную накладную (ЭТН) в ГИС ЭПД
      tags: [Logistics, GIS-EPD]
      security: [{ BearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [dealId, shipper, consignee, carrier, vehicleNumber, driverName, driverLicenseNumber, loadingAddress, unloadingAddress, cargoDescription, weightTons, loadingDate, deliveryDatePlan]
              properties:
                dealId: { type: string }
                shipper:
                  type: object
                  properties:
                    name: { type: string }
                    inn: { type: string }
                    address: { type: string }
                consignee:
                  type: object
                  properties:
                    name: { type: string }
                    inn: { type: string }
                    address: { type: string }
                carrier:
                  type: object
                  properties:
                    name: { type: string }
                    inn: { type: string }
                vehicleNumber: { type: string }
                driverName: { type: string }
                driverLicenseNumber: { type: string }
                loadingAddress: { type: string }
                unloadingAddress: { type: string }
                cargoDescription: { type: string }
                weightTons: { type: number }
                volumeM3: { type: number }
                loadingDate: { type: string, format: date-time }
                deliveryDatePlan: { type: string, format: date-time }
      responses:
        "201":
          description: ЭТН создана в ГИС ЭПД
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: string }
                  etnNumber: { type: string }
                  status: { type: string, enum: [DRAFT, SIGNED, SENT, RECEIVED, COMPLETED, REJECTED] }
                  dealId: { type: string }
                  createdAt: { type: string, format: date-time }

  /api/logistics/etn/deal/{dealId}:
    get:
      summary: Список ЭТН по сделке
      tags: [Logistics, GIS-EPD]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: dealId
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Список ЭТН для сделки

  /api/logistics/etn/{id}:
    get:
      summary: Статус конкретной ЭТН
      tags: [Logistics, GIS-EPD]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Детали и статус ЭТН

  /api/logistics/etn/{id}/sign:
    post:
      summary: Подписание ЭТН стороной (SHIPPER / CARRIER / CONSIGNEE)
      tags: [Logistics, GIS-EPD, УКЭП]
      security: [{ BearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [signerRole]
              properties:
                signerRole:
                  type: string
                  enum: [SHIPPER, CARRIER, CONSIGNEE]
                certificateId: { type: string }
      responses:
        "200":
          description: ЭТН подписана, статус обновлён

  # ── ВЕБХУКИ (Partner API) ───────────────────────────────────────────

  /api/partner/webhooks/{id}/test:
    post:
      summary: Тестовая отправка webhook-события (HMAC-SHA256 подписанное)
      tags: [PartnerAPI]
      security: [{ BearerAuth: [] }, { ApiKey: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                eventType: { type: string, example: "deal.status_changed" }
                testData: { type: object }
      responses:
        "200":
          description: Результат тестовой доставки webhook
          content:
            application/json:
              schema:
                type: object
                properties:
                  subscriptionId: { type: string }
                  url: { type: string }
                  delivered: { type: boolean }
                  httpStatus: { type: integer }
                  durationMs: { type: integer }
                  signedWith: { type: string, description: "HMAC-SHA256" }


  # ── Admin Ops ─────────────────────────────────────────────────────────

  /admin/readiness-passport:
    get:
      summary: Readiness Passport — что live, sandbox, planned (ТЗ 17.1)
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Паспорт готовности платформы
          content:
            application/json:
              schema:
                type: object
                properties:
                  generatedAt: { type: string, format: date-time }
                  version: { type: string }
                  environment: { type: string }
                  components:
                    type: object
                    properties:
                      live: { type: array, items: { type: object } }
                      sandbox: { type: array, items: { type: object } }
                      planned: { type: array, items: { type: object } }

  /admin/simulate-deal:
    post:
      summary: E2E Deal Simulation — 21-шаговый цикл в mock-режиме (ТЗ 6.4)
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      responses:
        "201":
          description: Результат симуляции с детализацией каждого шага
          content:
            application/json:
              schema:
                type: object
                properties:
                  simulationId: { type: string }
                  completedAt: { type: string, format: date-time }
                  totalSteps: { type: integer, example: 21 }
                  passed: { type: integer, example: 21 }
                  steps:
                    type: array
                    items:
                      type: object
                      properties:
                        step: { type: integer }
                        name: { type: string }
                        status: { type: string, enum: [ok, skip, fail] }
                        detail: { type: string }
                  summary: { type: string }

  /admin/system:
    get:
      summary: Системный статус (uptime, memory, version)
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Статус системы

  /admin/users:
    get:
      summary: Список всех пользователей (только ADMIN)
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Список пользователей

  /admin/outbox:
    get:
      summary: Список Outbox записей (DEAD/FAILED для ручного вмешательства)
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Outbox записи

  /admin/health:
    get:
      summary: Агрегированный health всех адаптеров (ADMIN)
      tags: [Admin]
      security: [{ BearerAuth: [] }]
      responses:
        "200":
          description: Health всех интеграционных адаптеров

  # ── COMPLIANCE COCKPIT (ТЗ 5.3 / 11.2) ──────────────────────────────────

  /api/compliance/kyc-queue:
    get:
      summary: Очередь KYC/AML проверок (только COMPLIANCE_OFFICER/ADMIN)
      tags: [Compliance]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [PENDING, IN_REVIEW, APPROVED, REJECTED] }
        - name: assignedTo
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Список организаций в очереди KYC

  /api/compliance/kyc-queue/{id}/assign:
    patch:
      summary: Назначить заявку KYC офицеру
      tags: [Compliance]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                assigneeId: { type: string }
      responses:
        "200":
          description: Назначено

  /api/compliance/kyc-queue/{id}/resolve:
    patch:
      summary: Одобрить или отклонить KYC
      tags: [Compliance]
      security: [{ BearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
