version: "1.0"
linter: jetbrains/qodana-js:2025.3
profile:
  name: qodana.recommended
include:
  - name: CheckDependencyLicenses
exclude:
  - name: All
    paths:
      - apps/landing
      - node_modules
      - .next
      - dist
      - coverage
      - playwright-report
      - test-results
failureConditions:
  severityThresholds:
    any: 999999
