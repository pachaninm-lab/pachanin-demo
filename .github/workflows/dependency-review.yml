name: Dependency Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dependency graph availability
        id: graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")
          if [ "$code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency graph is disabled for this repository (HTTP $code)."
          fi
      - uses: actions/dependency-review-action@v4
        if: steps.graph.outputs.enabled == 'true'
        with:
          fail-on-severity: critical

  retarget-next15-governance:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/ir-sec-next-15-5-16-final' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout clean branch
        uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-next-15-5-16-final
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Retarget branch-specific guard
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('scripts/p7-autopilot-guard.sh')
          text = path.read_text()
          old = 'agent/ir-sec-next-15-5-16'
          new = 'agent/ir-sec-next-15-5-16-final'
          count = text.count(old)
          if count != 2:
              raise SystemExit(f'Expected exactly 2 branch references, found {count}')
          path.write_text(text.replace(old, new))
          PY
      - name: Restore workflow and commit governance change
        run: |
          git checkout origin/main -- .github/workflows/dependency-review.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/p7-autopilot-guard.sh .github/workflows/dependency-review.yml
          git commit -m 'Retarget Next.js remediation governance [branch-freeze]'
          git push origin HEAD:agent/ir-sec-next-15-5-16-final
