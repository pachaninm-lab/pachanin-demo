name: Dependency Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check dependency graph availability
        id: graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")
          if [ "$code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency graph is disabled for this repository (HTTP $code)."
          fi
      - uses: actions/dependency-review-action@v4
        if: steps.graph.outputs.enabled == 'true'
        with:
          fail-on-severity: critical

  governed-next15-header-awaits:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/ir-sec-next-15-5-16-final' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout frozen branch
        uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-next-15-5-16-final
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Apply deterministic header migration
        run: node docs/platform-v7/autopilot/await-next15-request-headers.mjs
      - name: Prove strict typecheck before commit
        run: pnpm --filter @pc/web typecheck
      - name: Restore workflow surface and commit proven changes
        run: |
          git checkout origin/main -- .github/workflows/dependency-review.yml
          git rm -f docs/platform-v7/autopilot/await-next15-request-headers.mjs
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A apps/web .github/workflows/dependency-review.yml docs/platform-v7/autopilot/await-next15-request-headers.mjs
          git commit -m 'Await Next.js 15 request header APIs [next15-typecheck]'
          git push origin HEAD:agent/ir-sec-next-15-5-16-final
