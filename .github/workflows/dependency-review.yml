name: Dependency Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The review API only works when the dependency graph is enabled in
      # repository settings. Probe first so a disabled graph surfaces as a
      # visible warning instead of a permanently red required-looking check.
      - name: Check dependency graph availability
        id: graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")
          if [ "$code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency graph is disabled for this repository (HTTP $code). Enable it in Settings → Advanced Security to activate dependency review."
          fi

      - uses: actions/dependency-review-action@v4
        if: steps.graph.outputs.enabled == 'true'
        with:
          fail-on-severity: critical

  governed-lockfile-artifact:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/ir-sec-transitive-runtime-remediation'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup pinned pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Generate deterministic lockfile
        run: pnpm install --lockfile-only

      - name: Upload exact-head generated lockfile
        uses: actions/upload-artifact@v4
        with:
          name: governed-lockfile-${{ github.event.pull_request.head.sha }}
          path: pnpm-lock.yaml
          if-no-files-found: error
          retention-days: 7

      - name: Verify vulnerable resolutions are absent
        run: |
          pnpm install --frozen-lockfile
          node - <<'NODE'
          const fs = require('fs');
          const lock = fs.readFileSync('pnpm-lock.yaml', 'utf8');
          const forbidden = ['multer@2.0.2', 'lodash@4.17.21', 'ws@8.18.3'];
          const present = forbidden.filter((token) => lock.includes(token));
          if (present.length) {
            console.error(`Vulnerable resolutions remain in lockfile: ${present.join(', ')}`);
            process.exit(1);
          }
          console.log('Known vulnerable transitive resolutions are absent.');
          NODE
