name: Dependency Review

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - 'apps/tai/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/dependency-review.yml'
      - '.github/workflows/tai-release-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The review API only works when the dependency graph is enabled in
      # repository settings. Probe first so a disabled graph surfaces as a
      # visible warning instead of a permanently red required-looking check.
      - name: Check dependency graph availability
        id: graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")
          if [ "$code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency graph is disabled for this repository (HTTP $code). Enable it in Settings → Advanced Security to activate dependency review."
          fi

      - uses: actions/dependency-review-action@v4
        if: steps.graph.outputs.enabled == 'true'
        with:
          fail-on-severity: critical

  exact-main-dependency-audit:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Audit frozen pnpm dependency graph
        shell: bash
        run: |
          set -euo pipefail
          corepack enable
          pnpm install --frozen-lockfile
          set +e
          pnpm audit --prod --audit-level critical --json > pnpm-audit.json
          status=$?
          set -e
          cat pnpm-audit.json
          exit "$status"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml

      - name: Materialize and audit TAI runtime dependencies
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = Path('apps/tai/pyproject.toml')
          data = tomllib.loads(pyproject.read_text())
          dependencies = data.get('project', {}).get('dependencies', [])
          if not isinstance(dependencies, list) or not dependencies:
              raise SystemExit('TAI runtime dependency inventory is empty or invalid')
          if not all(isinstance(item, str) and item.strip() for item in dependencies):
              raise SystemExit('TAI runtime dependency inventory contains invalid entries')
          Path('tai-runtime-requirements.txt').write_text(
              '\n'.join(sorted(dependencies)) + '\n'
          )
          PY
          python -m pip install --upgrade pip
          python -m pip install 'pip-audit>=2.9,<3'
          set +e
          pip-audit \
            --requirement tai-runtime-requirements.txt \
            --format json \
            --output python-audit.json
          status=$?
          set -e
          cat python-audit.json
          exit "$status"

      - name: Upload exact-main dependency evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-${{ github.sha }}
          path: |
            pnpm-audit.json
            python-audit.json
            tai-runtime-requirements.txt
          if-no-files-found: error
          retention-days: 90
