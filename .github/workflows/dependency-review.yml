name: Dependency Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check dependency graph availability
        id: graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")
          if [ "$code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency graph is disabled for this repository (HTTP $code)."
          fi

      - uses: actions/dependency-review-action@v4
        if: steps.graph.outputs.enabled == 'true'
        with:
          fail-on-severity: critical

  governed-next15-staff-routes:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/ir-sec-next-15-5-16' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout governed branch
        uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-next-15-5-16
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Repair async route context contracts
        run: |
          python <<'PY'
          from pathlib import Path

          replacements = {
            Path('apps/web/app/api/staff/[...path]/route.ts'): [
              (
                "async function proxy(request: NextRequest, context: { params: { path?: string[] } }) {\n  const method = request.method.toUpperCase();\n  const path = normalizePath(context.params.path || []);",
                "async function proxy(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  const method = request.method.toUpperCase();\n  const { path: pathSegments = [] } = await context.params;\n  const path = normalizePath(pathSegments);",
              ),
              (
                "export function GET(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  return proxy(request, /* @next-codemod-error 'context' is passed as an argument. Any asynchronous properties of 'props' must be awaited when accessed. */\n  context);\n}\n\nexport function POST(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  return proxy(request, /* @next-codemod-error 'context' is passed as an argument. Any asynchronous properties of 'props' must be awaited when accessed. */\n  context);\n}",
                "export function GET(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  return proxy(request, context);\n}\n\nexport function POST(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  return proxy(request, context);\n}",
              ),
            ],
            Path('apps/web/app/staff/[...path]/route.ts'): [
              (
                "async function handle(request: NextRequest, context: { params: { path?: string[] } }) {\n  if (!enabled()) return json({ code: 'NOT_FOUND' }, 404);\n  const claims = await ownerClaims(request);\n  if (!claims) return json({ code: 'OWNER_ACCESS_REQUIRED' }, 403);\n\n  const path = normalizedPath(context.params.path);",
                "async function handle(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  if (!enabled()) return json({ code: 'NOT_FOUND' }, 404);\n  const claims = await ownerClaims(request);\n  if (!claims) return json({ code: 'OWNER_ACCESS_REQUIRED' }, 403);\n\n  const { path: pathSegments } = await context.params;\n  const path = normalizedPath(pathSegments);",
              ),
              (
                "export function GET(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  return handle(request, /* @next-codemod-error 'context' is passed as an argument. Any asynchronous properties of 'props' must be awaited when accessed. */\n  context);\n}\n\nexport function POST(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  return handle(request, /* @next-codemod-error 'context' is passed as an argument. Any asynchronous properties of 'props' must be awaited when accessed. */\n  context);\n}",
                "export function GET(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  return handle(request, context);\n}\n\nexport function POST(request: NextRequest, context: { params: Promise<{ path?: string[] }> }) {\n  return handle(request, context);\n}",
              ),
            ],
          }

          for path, changes in replacements.items():
            source = path.read_text()
            for before, after in changes:
              if before not in source:
                raise SystemExit(f'Expected migration block missing in {path}')
              source = source.replace(before, after, 1)
            if '@next-codemod' in source or 'UnsafeUnwrapped' in source:
              raise SystemExit(f'Unresolved codemod marker remains in {path}')
            path.write_text(source)
          PY

      - name: Restore trusted workflow and commit repair
        run: |
          git checkout origin/main -- .github/workflows/dependency-review.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/app/api/staff/'[...path]'/route.ts apps/web/app/staff/'[...path]'/route.ts .github/workflows/dependency-review.yml
          git commit -m 'Await Next.js 15 staff route parameters [next15-repair]'
          git push origin HEAD:agent/ir-sec-next-15-5-16
