name: Dependency Review

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The review API only works when the dependency graph is enabled in
      # repository settings. Probe first so a disabled graph surfaces as a
      # visible warning instead of a permanently red required-looking check.
      - name: Check dependency graph availability
        id: graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/dependency-graph/sbom")
          if [ "$code" = "200" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Dependency graph is disabled for this repository (HTTP $code). Enable it in Settings → Advanced Security to activate dependency review."
          fi

      - uses: actions/dependency-review-action@v4
        if: steps.graph.outputs.enabled == 'true'
        with:
          fail-on-severity: critical

  governed-next15-finalize:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/ir-sec-next-15-5-16'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Normalize Next.js 15 async contracts
        run: node docs/platform-v7/autopilot/finalize-next15-async-contracts.mjs

      - name: Commit normalized sources
        run: |
          if git diff --quiet; then
            echo "No source changes required."
            exit 0
          fi
          git config user.name "platform-v7-autopilot"
          git config user.email "platform-v7-autopilot@users.noreply.github.com"
          git add apps/web
          git commit -m "Finalize Next.js 15 async request contracts"
          git push origin HEAD:${{ github.head_ref }}
