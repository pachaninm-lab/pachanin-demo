name: public entry production smoke bf32ecc

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

env:
  PRODUCTION_BASE_URL: https://xn----8sbjf4befbjgs9b.xn--p1ai
  EXPECTED_PRODUCTION_COMMIT: bf32eccb27a1119e07000ada30cc471d343bbe46
  EXPECTED_DEPLOY_ID: 6a51a3af86bae5000855ba47

jobs:
  browser-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        project:
          - chromium-desktop-1440
          - chromium-mobile-390
          - webkit-iphone-13
    env:
      PROJECT_FILTER: ${{ matrix.project }}
      ARTIFACT_DIR: ../../artifacts/public-entry-production-${{ matrix.project }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install project browser
        working-directory: apps/web
        shell: bash
        run: |
          set -euo pipefail
          if [ "$PROJECT_FILTER" = 'webkit-iphone-13' ]; then
            pnpm exec playwright install --with-deps webkit
          else
            pnpm exec playwright install --with-deps chromium
          fi
      - name: Run isolated RU EN ZH browser matrix
        working-directory: apps/web
        run: node scripts/public-entry-production-project-smoke-bf32ecc.mjs
      - name: Upload browser evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-production-${{ matrix.project }}
          path: artifacts/public-entry-production-${{ matrix.project }}
          if-no-files-found: error
          retention-days: 30

  critical-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ARTIFACT_DIR: ../../artifacts/public-entry-production-critical-paths-bf32ecc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium and WebKit
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run locale cycles and fail-closed login
        working-directory: apps/web
        run: node scripts/public-entry-production-critical-paths-bf32ecc.mjs
      - name: Upload critical-path evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-production-critical-paths-bf32ecc
          path: artifacts/public-entry-production-critical-paths-bf32ecc
          if-no-files-found: error
          retention-days: 30

  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ARTIFACT_DIR: ../../artifacts/public-entry-production-lighthouse-bf32ecc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Prove production routes are serving
        shell: bash
        run: |
          set -euo pipefail
          for route in /platform-v7 /platform-v7/login /platform-v7/forgot-password; do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' --max-time 20 "$PRODUCTION_BASE_URL$route?lang=ru")
            test "$status" = '200'
          done
      - name: Run mobile Lighthouse production gates
        working-directory: apps/web
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$ARTIFACT_DIR"
          export CHROME_PATH="$(node -e "const { chromium } = require('@playwright/test'); process.stdout.write(chromium.executablePath())")"
          for page in landing login recovery; do
            case "$page" in
              landing) route='/platform-v7?lang=ru' ;;
              login) route='/platform-v7/login?lang=ru' ;;
              recovery) route='/platform-v7/forgot-password?lang=ru' ;;
            esac
            npx --yes lighthouse@12.6.1 "$PRODUCTION_BASE_URL$route" \
              --quiet \
              --chrome-flags="--headless --no-sandbox --disable-gpu" \
              --only-categories=performance,accessibility,best-practices,seo \
              --form-factor=mobile \
              --screenEmulation.mobile=true \
              --throttling-method=simulate \
              --output=json \
              --output-path="$ARTIFACT_DIR/lighthouse-$page.json"
          done
          node scripts/public-entry-production-lighthouse-assert-bf32ecc.mjs
      - name: Upload Lighthouse evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-production-lighthouse-bf32ecc
          path: artifacts/public-entry-production-lighthouse-bf32ecc
          if-no-files-found: error
          retention-days: 30
