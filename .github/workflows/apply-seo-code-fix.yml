name: Apply SEO code repair

on:
  pull_request:
    paths:
      - '.github/workflows/apply-seo-code-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/seo-exact-main-2659'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply only non-workflow SEO changes
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path
          import textwrap

          payload = Path('.github/workflows/apply-seo-authority-fix.yml').read_text()
          script = payload.split("python <<'PY'\n", 1)[1].split("\n          PY", 1)[0]
          script = textwrap.dedent(script)
          script = script.replace(
              "\n              const response = withRoleHeaders(req, resolvedRole, privateModeEnabled && protectedPath, isEntry && !privateModeEnabled);",
              "\n    const response = withRoleHeaders(req, resolvedRole, privateModeEnabled && protectedPath, isEntry && !privateModeEnabled);",
          )
          script = script.replace(
              "\n              const indexable = !privateModeEnabled && PLATFORM_V7_INDEXABLE_EXACT.has(p);",
              "\n    const indexable = !privateModeEnabled && PLATFORM_V7_INDEXABLE_EXACT.has(p);",
          )
          script = script.replace(
              "\n              const response = withRoleHeaders(req, resolvedRole, privateModeEnabled && protectedPath, indexable);",
              "\n    const response = withRoleHeaders(req, resolvedRole, privateModeEnabled && protectedPath, indexable);",
          )
          exec(compile(script, '<seo-authority-patch>', 'exec'))
          PY

          # Workflow files are updated separately through the GitHub connector.
          git restore --source=HEAD -- .github/workflows

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web netlify.toml
          if git diff --cached --quiet; then
            echo 'No non-workflow SEO changes remain.'
            exit 0
          fi
          git commit -m 'fix(seo): align canonical indexing authority'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
