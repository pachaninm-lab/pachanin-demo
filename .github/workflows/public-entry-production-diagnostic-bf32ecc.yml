name: public entry production diagnostic bf32ecc

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  recovery-zh-diagnostic:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PRODUCTION_BASE_URL: https://xn----8sbjf4befbjgs9b.xn--p1ai
      ARTIFACT_DIR: ../../artifacts/public-entry-production-diagnostic-bf32ecc
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Diagnose production recovery ZH
        working-directory: apps/web
        run: node scripts/public-entry-production-diagnostic-bf32ecc.mjs
      - name: Upload diagnostic
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-production-diagnostic-bf32ecc
          path: artifacts/public-entry-production-diagnostic-bf32ecc
          if-no-files-found: error
          retention-days: 7
