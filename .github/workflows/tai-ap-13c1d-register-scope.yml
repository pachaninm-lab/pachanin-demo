name: TAI AP-13C.1d Register Scope

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

jobs:
  register:
    if: >-
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.head.ref == 'agent/tai-ap-13c1d-quality-scoring-authority'
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-quality-scoring-authority
          fetch-depth: 1
          persist-credentials: true

      - name: Register exact concurrent scope
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const statePath = 'docs/platform-v7/autopilot/autopilot-state.json';
          const scopePath = 'apps/tai/governance/scopes/ap-13c1d-quality-scoring-2993.json';
          const state = JSON.parse(fs.readFileSync(statePath, 'utf8'));
          const scope = JSON.parse(fs.readFileSync(scopePath, 'utf8'));
          if (scope.branch !== 'agent/tai-ap-13c1d-quality-scoring-authority') {
            throw new Error('scope branch mismatch');
          }
          state.approvedConcurrentScopes ??= {};
          state.approvedConcurrentScopes[scope.branch] = scope.allowed_paths;
          fs.writeFileSync(statePath, `${JSON.stringify(state)}\n`, 'utf8');
          NODE
          git rm .github/workflows/tai-ap-13c1d-register-scope.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json apps/tai/governance/scopes/ap-13c1d-quality-scoring-2993.json
          git commit -m 'governance(tai): register AP-13C.1d concurrent scope'
          git push origin HEAD:agent/tai-ap-13c1d-quality-scoring-authority
