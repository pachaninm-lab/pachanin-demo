name: Temporary IR-10.2 migration rename

on:
  push:
    branches:
      - agent/ir-10-2-logistics-postgresql-authority

permissions:
  contents: write

jobs:
  rename:
    if: ${{ !contains(github.event.head_commit.message, '[ir10-migrations-renamed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-2-logistics-postgresql-authority
          fetch-depth: 0
      - name: Move migrations after Documents authority
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git mv \
            apps/api/prisma/migrations/20260713050000_logistics_postgresql_authority \
            apps/api/prisma/migrations/20260713100000_logistics_postgresql_authority
          git mv \
            apps/api/prisma/migrations/20260713051000_logistics_postgresql_authority_command_binding \
            apps/api/prisma/migrations/20260713101000_logistics_postgresql_authority_command_binding
          rm -f .github/workflows/tmp-rename-ir10-2-migrations.yml
          git add -A
          git commit -m "fix(logistics): order migrations after Documents authority [ir10-migrations-renamed]"
          git push origin HEAD:agent/ir-10-2-logistics-postgresql-authority
