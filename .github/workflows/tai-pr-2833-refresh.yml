name: TAI PR 2833 Refresh

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-pr-2833-refresh.yml

permissions:
  actions: read
  contents: write

concurrency:
  group: tai-pr-2833-refresh
  cancel-in-progress: false

jobs:
  refresh:
    if: >-
      github.event.pull_request.number == 2833 &&
      github.event.pull_request.head.ref == 'agent/tai-ap-13b2b-controlled-build-workflow'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      AP13B2A_EXACT_MAIN: 3bf85bbf510c6c95601c80dd08e95a55d4bbea23
      EXACT_PR_HEAD: ${{ github.event.pull_request.head.sha }}
      EXPECTED_AUTHORITY_SHA256: 3064250e63baed7bdcfd20851e1d3ea2c86fc33f087b69a2a4fcff18c384374b
      EXPECTED_LLAMA_COMMIT: aedb2a5e9ca3d4064148bbb919e0ddc0c1b70ab3
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_PR_HEAD }}
          fetch-depth: 0

      - name: Enforce exact branch head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXACT_PR_HEAD"
          test "$GITHUB_HEAD_REF" = "agent/tai-ap-13b2b-controlled-build-workflow"

      - name: Verify AP-13B.2a exact-main release attestation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ap13b2a-exact-main
          run_id=''
          for attempt in $(seq 1 90); do
            gh api \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${AP13B2A_EXACT_MAIN}&per_page=100" \
              > /tmp/ap13b2a-exact-main/runs.json
            set +e
            run_id="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          exact = os.environ['AP13B2A_EXACT_MAIN']
          runs = json.loads(Path('/tmp/ap13b2a-exact-main/runs.json').read_text()).get('workflow_runs', [])
          matching = [
              run for run in runs
              if run.get('name') == 'TAI Release Acceptance' and run.get('head_sha') == exact
          ]
          if not matching:
              raise SystemExit(3)
          run = max(matching, key=lambda item: (item.get('run_number', 0), item.get('id', 0)))
          if run.get('status') != 'completed':
              raise SystemExit(3)
          if run.get('conclusion') != 'success':
              print(json.dumps(run, sort_keys=True))
              raise SystemExit(2)
          print(run['id'])
          PY
            )"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              break
            fi
            if [ "$status" -eq 2 ]; then
              echo 'AP-13B.2a exact-main release acceptance failed.' >&2
              exit 1
            fi
            if [ "$attempt" -eq 90 ]; then
              echo 'AP-13B.2a exact-main release acceptance did not complete.' >&2
              exit 1
            fi
            sleep 20
          done
          test -n "$run_id"
          printf '%s\n' "$run_id" > /tmp/ap13b2a-exact-main/release-run-id.txt
          gh run download "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name "tai-release-attestation-${AP13B2A_EXACT_MAIN}" \
            --dir /tmp/ap13b2a-exact-main/evidence
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/ap13b2a-exact-main/evidence')
          attestation = json.loads((root / 'tai-release-attestation.json').read_text())
          if attestation.get('exact_main_sha') != os.environ['AP13B2A_EXACT_MAIN']:
              raise SystemExit('exact-main attestation SHA mismatch')
          if attestation.get('accepted') is not True:
              raise SystemExit('exact-main attestation is not accepted')
          if attestation.get('production_operational_status') != 'NOT_ATTESTED':
              raise SystemExit('operational maturity boundary was changed')
          workflow_evidence = json.loads((root / 'workflow-evidence.json').read_text())
          if not workflow_evidence:
              raise SystemExit('exact-main workflow evidence is empty')
          if any(item.get('exact_head_sha') != os.environ['AP13B2A_EXACT_MAIN'] for item in workflow_evidence):
              raise SystemExit('workflow evidence contains a different SHA')
          if any(item.get('conclusion') != 'success' for item in workflow_evidence):
              raise SystemExit('workflow evidence contains a non-success conclusion')
          PY

      - name: Merge current main into AP-13B.2b
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$AP13B2A_EXACT_MAIN" refs/remotes/origin/main
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git merge --no-ff refs/remotes/origin/main \
            -m 'Merge main after AP-13B.2a acceptance'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml

      - name: Verify merged controlled-build contract
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e 'apps/tai[dev]'
          PYTHONPATH=apps/tai python - <<'PY'
          import os
          from pathlib import Path
          from tai.llama_toolchain import load_llama_toolchain_authority

          authority = load_llama_toolchain_authority(
              Path('apps/tai/model-artifacts/llama-cpp-toolchain-authority.v1.json')
          )
          if authority.authority_sha256 != os.environ['EXPECTED_AUTHORITY_SHA256']:
              raise SystemExit('authority digest mismatch')
          if authority.commit != os.environ['EXPECTED_LLAMA_COMMIT']:
              raise SystemExit('llama.cpp commit mismatch')
          PY
          ruff check apps/tai/tests/test_llama_toolchain_build_workflow.py
          mypy --strict apps/tai/tests/test_llama_toolchain_build_workflow.py
          pytest -q apps/tai/tests/test_llama_toolchain_build_workflow.py

      - name: Finalize one clean merge commit
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/tai-pr-2833-refresh.yml
          git add .github/workflows/tai-pr-2833-refresh.yml
          git diff --cached --check
          git commit --amend --no-edit
          test "$(git show -s --format=%P HEAD | wc -w)" -eq 2
          git push origin HEAD:agent/tai-ap-13b2b-controlled-build-workflow

      - uses: actions/upload-artifact@v4
        with:
          name: tai-ap13b2a-exact-main-evidence-${{ env.AP13B2A_EXACT_MAIN }}
          path: /tmp/ap13b2a-exact-main
          if-no-files-found: error
          retention-days: 7
