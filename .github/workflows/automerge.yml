name: Repo automations

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, opened, reopened]

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.state == 'open' &&
      !(contains(github.event.pull_request.labels.*.name, 'platform-v7') &&
        contains(github.event.pull_request.labels.*.name, 'agent-generated'))
    steps:
      - uses: actions/checkout@v4
      - uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: automerge
          UPDATE_LABELS: automerge
          MERGE_REMOVE_LABELS: automerge

# Production is deployed by the Netlify Git integration on push to main
# (see netlify.toml). No CI-driven deploy job is required here.
