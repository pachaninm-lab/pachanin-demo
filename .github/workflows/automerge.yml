name: Repo automations

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, opened, reopened]
  push:
    branches:
      - main

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.state == 'open' &&
      !(contains(github.event.pull_request.labels.*.name, 'platform-v7') &&
        contains(github.event.pull_request.labels.*.name, 'agent-generated'))
    steps:
      - uses: actions/checkout@v4
      - uses: pascalgn/automerge-action@v0.16.4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MERGE_METHOD: squash
          MERGE_LABELS: automerge
          UPDATE_LABELS: automerge
          MERGE_REMOVE_LABELS: automerge

  deploy-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # Production deploys are also driven by the Vercel Git integration.
      # This CLI path is the secondary channel: when VERCEL_TOKEN is missing
      # or revoked, surface a warning and skip instead of failing every push.
      - name: Check Vercel token
        id: vercel_token
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN secret is missing. CLI deploy skipped; production is covered by the Vercel Git integration. Add the secret in Settings → Secrets to re-enable CLI deploys."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/user")
          if [ "$code" = "200" ]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN is invalid (HTTP $code). CLI deploy skipped; production is covered by the Vercel Git integration. Rotate the token in Settings → Secrets to re-enable CLI deploys."
          fi

      - name: Checkout
        if: steps.vercel_token.outputs.valid == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.vercel_token.outputs.valid == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        if: steps.vercel_token.outputs.valid == 'true'
        run: npm install --global vercel@latest

      - name: Pull production settings
        if: steps.vercel_token.outputs.valid == 'true'
        env:
          VERCEL_ORG_ID: team_z7meLkDGNXDTyAt8lH0XWGgk
          VERCEL_PROJECT_ID: prj_B6IuQnfGGqWejQYgcJypeAzDhM9k
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production bundle
        if: steps.vercel_token.outputs.valid == 'true'
        env:
          VERCEL_ORG_ID: team_z7meLkDGNXDTyAt8lH0XWGgk
          VERCEL_PROJECT_ID: prj_B6IuQnfGGqWejQYgcJypeAzDhM9k
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        if: steps.vercel_token.outputs.valid == 'true'
        env:
          VERCEL_ORG_ID: team_z7meLkDGNXDTyAt8lH0XWGgk
          VERCEL_PROJECT_ID: prj_B6IuQnfGGqWejQYgcJypeAzDhM9k
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  deploy-api-production:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      # Same secondary-channel policy as deploy-production above.
      - name: Check Vercel token
        id: vercel_token
        shell: bash
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN secret is missing. CLI deploy skipped; production is covered by the Vercel Git integration. Add the secret in Settings → Secrets to re-enable CLI deploys."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            "https://api.vercel.com/v2/user")
          if [ "$code" = "200" ]; then
            echo "valid=true" >> "$GITHUB_OUTPUT"
          else
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN is invalid (HTTP $code). CLI deploy skipped; production is covered by the Vercel Git integration. Rotate the token in Settings → Secrets to re-enable CLI deploys."
          fi

      - name: Checkout
        if: steps.vercel_token.outputs.valid == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.vercel_token.outputs.valid == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Vercel CLI
        if: steps.vercel_token.outputs.valid == 'true'
        run: npm install --global vercel@latest

      - name: Pull production settings
        if: steps.vercel_token.outputs.valid == 'true'
        env:
          VERCEL_ORG_ID: team_z7meLkDGNXDTyAt8lH0XWGgk
          VERCEL_PROJECT_ID: prj_F8IOEInvI4N3Bu700Lvsleojl1CJ
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build production bundle
        if: steps.vercel_token.outputs.valid == 'true'
        env:
          VERCEL_ORG_ID: team_z7meLkDGNXDTyAt8lH0XWGgk
          VERCEL_PROJECT_ID: prj_F8IOEInvI4N3Bu700Lvsleojl1CJ
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to production
        if: steps.vercel_token.outputs.valid == 'true'
        env:
          VERCEL_ORG_ID: team_z7meLkDGNXDTyAt8lH0XWGgk
          VERCEL_PROJECT_ID: prj_F8IOEInvI4N3Bu700Lvsleojl1CJ
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
