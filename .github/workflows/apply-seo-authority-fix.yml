name: Apply canonical SEO authority repair

on:
  pull_request:
    paths:
      - '.github/workflows/apply-seo-authority-fix.yml'

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.ref == 'fix/seo-exact-main-2659'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply SEO source-of-truth repair
        run: |
          python <<'PY'
          from pathlib import Path

          middleware = Path('apps/web/middleware.ts')
          source = middleware.read_text()
          source = source.replace(
              "import { readVerifiedCabinetRole, readVerifiedCabinetSessionRole } from '@/lib/platform-v7/verified-session';\n",
              "import { readVerifiedCabinetRole, readVerifiedCabinetSessionRole } from '@/lib/platform-v7/verified-session';\nimport { PLATFORM_V7_PUBLIC_SEO_PATHS } from '@/lib/platform-v7/public-seo-routes';\n",
          )
          old_public = """const PLATFORM_V7_PUBLIC_EXACT = new Set([
            '/platform-v7',
            '/platform-v7/open',
            '/platform-v7/login',
            '/platform-v7/register',
            '/platform-v7/help',
            '/platform-v7/pricing',
            '/platform-v7/roadmap',
            '/platform-v7/demo',
            '/platform-v7/contact',
            '/platform-v7/request',
          ]);"""
          new_public = """const PLATFORM_V7_INDEXABLE_EXACT = new Set(PLATFORM_V7_PUBLIC_SEO_PATHS);

          const PLATFORM_V7_PUBLIC_EXACT = new Set([
            ...PLATFORM_V7_PUBLIC_SEO_PATHS,
            '/platform-v7/open',
            '/platform-v7/login',
            '/platform-v7/register',
            '/platform-v7/help',
            '/platform-v7/pricing',
            '/platform-v7/roadmap',
          ]);"""
          if old_public not in source:
              raise SystemExit('middleware public route block not found')
          source = source.replace(old_public, new_public)
          old_response = """    const isEntry = p === '/platform-v7';
              const response = withRoleHeaders(req, resolvedRole, privateModeEnabled && protectedPath, isEntry && !privateModeEnabled);"""
          new_response = """    const isEntry = p === '/platform-v7';
              const indexable = !privateModeEnabled && PLATFORM_V7_INDEXABLE_EXACT.has(p);
              const response = withRoleHeaders(req, resolvedRole, privateModeEnabled && protectedPath, indexable);"""
          if old_response not in source:
              raise SystemExit('middleware indexability block not found')
          source = source.replace(old_response, new_response)
          middleware.write_text(source)

          Path('apps/web/app/robots.ts').write_text(r'''import type { MetadataRoute } from 'next';
          import {
            PLATFORM_V7_PRIVATE_ROBOTS_PREFIXES,
            PLATFORM_V7_PUBLIC_SEO_PATHS,
          } from '@/lib/platform-v7/public-seo-routes';

          const siteUrl = 'https://xn----8sbjf4befbjgs9b.xn--p1ai';

          export default function robots(): MetadataRoute.Robots {
            return {
              rules: [
                {
                  userAgent: '*',
                  allow: [
                    '/',
                    ...PLATFORM_V7_PUBLIC_SEO_PATHS,
                    '/robots.txt',
                    '/sitemap.xml',
                    '/indexnow.txt',
                  ],
                  disallow: [
                    '/api/',
                    '/admin/',
                    '/cabinet/',
                    ...PLATFORM_V7_PRIVATE_ROBOTS_PREFIXES,
                  ],
                },
              ],
              sitemap: `${siteUrl}/sitemap.xml`,
            };
          }
          '''.replace('          ', ''))

          Path('apps/web/app/sitemap.ts').write_text(r'''import type { MetadataRoute } from 'next';
          import { PLATFORM_V7_PUBLIC_SEO_ROUTES } from '@/lib/platform-v7/public-seo-routes';

          const BASE_URL = process.env.NEXT_PUBLIC_SITE_URL ?? 'https://xn----8sbjf4befbjgs9b.xn--p1ai';

          export default function sitemap(): MetadataRoute.Sitemap {
            const now = new Date();

            return PLATFORM_V7_PUBLIC_SEO_ROUTES.map((route) => ({
              url: `${BASE_URL}${route.path}`,
              lastModified: now,
              changeFrequency: route.changeFrequency,
              priority: route.priority,
            }));
          }
          '''.replace('          ', ''))

          Path('apps/web/app/platform-v7/role-preview/seo-health/route.ts').write_text(r'''import { NextResponse } from 'next/server';
          import {
            PLATFORM_V7_PRIVATE_ROBOTS_PREFIXES,
            PLATFORM_V7_PUBLIC_SEO_PATHS,
          } from '@/lib/platform-v7/public-seo-routes';

          export const dynamic = 'force-dynamic';
          export const revalidate = 0;

          const BUILD_COMMIT_SHA = process.env.NEXT_PUBLIC_BUILD_COMMIT_REF?.trim() || 'unknown';

          export function GET() {
            return NextResponse.json(
              {
                schemaVersion: 2,
                ok: true,
                marker: 'seo-live-smoke-v2',
                commitSha: BUILD_COMMIT_SHA,
                purpose: 'Verify that production serves the exact main commit and the canonical public/private SEO authority.',
                expected: {
                  publicIndexableHeader: 'x-robots-tag contains index and follow without noindex',
                  privateCabinetHeader: 'x-robots-tag contains noindex and nofollow',
                },
                publicIndexable: PLATFORM_V7_PUBLIC_SEO_PATHS,
                privateNoindex: PLATFORM_V7_PRIVATE_ROBOTS_PREFIXES,
                generatedAt: new Date().toISOString(),
              },
              {
                headers: {
                  'cache-control': 'no-store, max-age=0',
                },
              },
            );
          }
          '''.replace('          ', ''))

          Path('netlify.toml').write_text(r'''[build]
            command = "pnpm install --frozen-lockfile --config.node-linker=hoisted && NEXT_PUBLIC_BUILD_COMMIT_REF=${COMMIT_REF:-unknown} pnpm --filter @pc/web build"
            publish = "apps/web/.next"
            ignore = "bash scripts/netlify-ignore.sh"

          [build.environment]
            NODE_VERSION = "22"
            PNPM_VERSION = "10.2.1"
            NEXT_TELEMETRY_DISABLED = "1"
            PNPM_CONFIG_NODE_LINKER = "hoisted"
            NPM_FLAGS = "--config.node-linker=hoisted"

          [[plugins]]
            package = "@netlify/plugin-nextjs"
          '''.replace('          ', ''))

          Path('.github/workflows/seo-live-smoke.yml').write_text(r'''name: SEO Live Smoke

          on:
            push:
              branches:
                - main
              paths:
                - 'apps/web/**'
                - 'netlify.toml'
                - '.github/workflows/seo-live-smoke.yml'
            workflow_dispatch:

          permissions:
            contents: read

          concurrency:
            group: seo-live-smoke-${{ github.ref }}
            cancel-in-progress: true

          jobs:
            live-smoke:
              name: Verify exact production SEO authority
              runs-on: ubuntu-latest
              timeout-minutes: 20
              env:
                SITE: https://xn----8sbjf4befbjgs9b.xn--p1ai
                EVIDENCE_DIR: artifacts/seo-live-smoke
              steps:
                - name: Wait for exact production deploy and verify SEO authority
                  shell: bash
                  run: |
                    set -Eeuo pipefail
                    mkdir -p "$EVIDENCE_DIR"
                    EXPECTED_SHA="$GITHUB_SHA"
                    HEALTH="$SITE/platform-v7/role-preview/seo-health"
                    PUBLIC_PATHS=(
                      '/platform-v7'
                      '/platform-v7/secure-grain-deal'
                      '/platform-v7/fgis-zerno'
                    )
                    PRIVATE_PATHS=(
                      '/platform-v7/buyer'
                      '/platform-v7/bank'
                    )
                    observed_sha=''

                    write_evidence() {
                      local result="$1"
                      local pass="$2"
                      local failure_reason="$3"
                      jq -n \
                        --arg repository "$GITHUB_REPOSITORY" \
                        --arg commitSha "$EXPECTED_SHA" \
                        --arg observedCommitSha "$observed_sha" \
                        --arg site "$SITE" \
                        --arg result "$result" \
                        --arg failureReason "$failure_reason" \
                        --argjson pass "$pass" \
                        --argjson publicPaths "$(printf '%s\n' "${PUBLIC_PATHS[@]}" | jq -R . | jq -s .)" \
                        --argjson privatePaths "$(printf '%s\n' "${PRIVATE_PATHS[@]}" | jq -R . | jq -s .)" \
                        '{schemaVersion:1, repository:$repository, commitSha:$commitSha, observedCommitSha:$observedCommitSha, site:$site, result:$result, pass:$pass, failureReason:($failureReason | select(length > 0) // null), publicPaths:$publicPaths, privatePaths:$privatePaths}' \
                        > "$EVIDENCE_DIR/seo-live-smoke-evidence.json"
                    }

                    trap 'status=$?; if [ "$status" -ne 0 ]; then write_evidence FAIL false "SEO live smoke failed at shell line $LINENO"; fi' EXIT
                    write_evidence IN_PROGRESS false ''

                    echo "Waiting for exact deploy $EXPECTED_SHA at $HEALTH"
                    for attempt in {1..20}; do
                      health_json="$(curl --fail --silent --show-error --location --retry 3 --retry-all-errors "$HEALTH" || true)"
                      observed_sha="$(jq -r '.commitSha // empty' <<<"$health_json" 2>/dev/null || true)"
                      if [ "$observed_sha" = "$EXPECTED_SHA" ]; then
                        echo "Exact deploy found on attempt $attempt"
                        break
                      fi
                      if [ "$attempt" = '20' ]; then
                        echo "Exact deploy not observed. expected=$EXPECTED_SHA observed=${observed_sha:-missing}"
                        exit 1
                      fi
                      sleep 45
                    done

                    for route in "${PUBLIC_PATHS[@]}"; do
                      url="$SITE$route"
                      echo "Checking public indexable header: $url"
                      headers="$(curl --fail --silent --show-error --head --location --retry 3 --retry-all-errors "$url" | tr -d '\r')"
                      robots_header="$(awk -F': *' 'tolower($1)=="x-robots-tag" {print tolower($2)}' <<<"$headers")"
                      echo "x-robots-tag: $robots_header"
                      [[ "$robots_header" == *index* ]]
                      [[ "$robots_header" == *follow* ]]
                      [[ "$robots_header" != *noindex* ]]
                    done

                    for route in "${PRIVATE_PATHS[@]}"; do
                      url="$SITE$route"
                      echo "Checking private noindex header: $url"
                      headers="$(curl --fail --silent --show-error --head --location --retry 3 --retry-all-errors "$url" | tr -d '\r')"
                      robots_header="$(awk -F': *' 'tolower($1)=="x-robots-tag" {print tolower($2)}' <<<"$headers")"
                      echo "x-robots-tag: $robots_header"
                      [[ "$robots_header" == *noindex* ]]
                      [[ "$robots_header" == *nofollow* ]]
                    done

                    sitemap="$(curl --fail --silent --show-error --location --retry 3 --retry-all-errors "$SITE/sitemap.xml")"
                    robots="$(curl --fail --silent --show-error --location --retry 3 --retry-all-errors "$SITE/robots.txt")"
                    for route in "${PUBLIC_PATHS[@]}"; do
                      grep -Fq "$route" <<<"$sitemap"
                      grep -Fq "$route" <<<"$robots"
                    done
                    for route in "${PRIVATE_PATHS[@]}"; do
                      if grep -Fq "$route" <<<"$sitemap"; then
                        echo "Protected route leaked into sitemap: $route"
                        exit 1
                      fi
                      grep -Fq "$route" <<<"$robots"
                    done

                    write_evidence PASS true ''

                - name: Upload exact SEO live evidence
                  if: always()
                  uses: actions/upload-artifact@v4
                  with:
                    name: seo-live-smoke-evidence
                    path: artifacts/seo-live-smoke
                    if-no-files-found: error
                    retention-days: 30
          '''.replace('          ', ''))

          Path('apps/web/tests/unit/platformV7SeoAuthority.test.ts').write_text(r'''import fs from 'node:fs';
          import path from 'node:path';
          import { describe, expect, it } from 'vitest';
          import {
            PLATFORM_V7_PRIVATE_ROBOTS_PREFIXES,
            PLATFORM_V7_PUBLIC_SEO_PATHS,
            PLATFORM_V7_PUBLIC_SEO_ROUTES,
          } from '../../lib/platform-v7/public-seo-routes';

          const read = (relativePath: string) => fs.readFileSync(path.join(process.cwd(), relativePath), 'utf8');

          describe('platform-v7 canonical SEO authority', () => {
            it('keeps the required public pages indexable and protected workspaces excluded', () => {
              expect(PLATFORM_V7_PUBLIC_SEO_PATHS).toContain('/platform-v7');
              expect(PLATFORM_V7_PUBLIC_SEO_PATHS).toContain('/platform-v7/secure-grain-deal');
              expect(PLATFORM_V7_PUBLIC_SEO_PATHS).toContain('/platform-v7/fgis-zerno');
              expect(new Set(PLATFORM_V7_PUBLIC_SEO_PATHS).size).toBe(PLATFORM_V7_PUBLIC_SEO_PATHS.length);

              for (const privatePrefix of PLATFORM_V7_PRIVATE_ROBOTS_PREFIXES) {
                expect(PLATFORM_V7_PUBLIC_SEO_PATHS.some((route) => route === privatePrefix || route.startsWith(`${privatePrefix}/`))).toBe(false);
              }
            });

            it('uses the same authority in middleware, robots, sitemap and live health', () => {
              for (const file of [
                'apps/web/middleware.ts',
                'apps/web/app/robots.ts',
                'apps/web/app/sitemap.ts',
                'apps/web/app/platform-v7/role-preview/seo-health/route.ts',
              ]) {
                expect(read(file), `${file} must import canonical SEO authority`).toContain('public-seo-routes');
              }

              const middleware = read('apps/web/middleware.ts');
              expect(middleware).toContain('PLATFORM_V7_INDEXABLE_EXACT.has(p)');
              expect(middleware).toContain('!privateModeEnabled');
            });

            it('publishes only public SEO routes in sitemap and verifies the exact deployed commit', () => {
              const sitemap = read('apps/web/app/sitemap.ts');
              expect(sitemap).toContain('PLATFORM_V7_PUBLIC_SEO_ROUTES.map');
              expect(sitemap).not.toContain('KNOWN_DEAL_IDS');
              expect(sitemap).not.toContain('KNOWN_LOT_IDS');
              expect(sitemap).not.toContain('KNOWN_INNS');

              for (const route of PLATFORM_V7_PUBLIC_SEO_ROUTES) {
                expect(route.path.startsWith('/platform-v7')).toBe(true);
                expect(route.priority).toBeGreaterThan(0);
                expect(route.priority).toBeLessThanOrEqual(1);
              }

              const health = read('apps/web/app/platform-v7/role-preview/seo-health/route.ts');
              const workflow = read('.github/workflows/seo-live-smoke.yml');
              const netlify = read('netlify.toml');
              expect(health).toContain('NEXT_PUBLIC_BUILD_COMMIT_REF');
              expect(workflow).toContain('EXPECTED_SHA="$GITHUB_SHA"');
              expect(workflow).toContain('observed_sha');
              expect(netlify).toContain('NEXT_PUBLIC_BUILD_COMMIT_REF=${COMMIT_REF:-unknown}');
            });
          });
          '''.replace('          ', ''))
          PY

          rm -f .github/workflows/authorize-seo-exact-main-fix.yml
          rm -f .github/workflows/apply-seo-authority-fix.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(seo): align exact deploy and canonical indexing authority'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
