name: TAI Git OID Targeted Format

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tai-git-oid-targeted-format.yml'

permissions:
  contents: write

jobs:
  format:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Normalize only Git OID contract files
        shell: bash
        run: |
          set -euo pipefail
          cd apps/tai
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          files=(
            tai/evaluation.py
            tai/git_oid.py
            tai/operations.py
            tai/release_acceptance.py
            tests/test_git_oid_contract.py
          )
          ruff check "${files[@]}" --fix
          ruff format "${files[@]}"
          cd ../..
          rm .github/workflows/tai-git-oid-targeted-format.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'style(tai): normalize Git OID contract files'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
