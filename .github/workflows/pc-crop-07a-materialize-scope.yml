name: PC-CROP-07A materialize scope authority

on:
  push:
    branches:
      - agent/pc-crop-07a-scope-authority

permissions:
  contents: write

concurrency:
  group: pc-crop-07a-scope-authority-materialize
  cancel-in-progress: false

jobs:
  materialize:
    name: Materialize state-only authority
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add exact approved concurrent scope
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const statePath = 'docs/platform-v7/autopilot/autopilot-state.json';
          const branch = 'agent/pc-crop-07a-integration-inbox';
          const allowedPaths = [
            '.github/workflows/pc-crop-07a.yml',
            'apps/api/prisma/schema.prisma',
            'apps/api/prisma/migrations/20260722*_regulatory_integration_inbox/**',
            'apps/api/src/modules/regulatory-integration/**',
            'apps/api/src/modules/integration-events/integration-events.module.ts',
            'apps/api/test/industrial/regulatory-integration-inbox.e2e-spec.ts',
            'infra/sql/postgresql-regulatory-integration-inbox-policies.sql',
            'scripts/verify-pc-crop-07a.mjs',
            'docs/platform-v7/autopilot/scopes/pc-crop-07a.json',
            'scripts/p7-autopilot-guard.sh'
          ];
          const raw = fs.readFileSync(statePath, 'utf8');
          const state = JSON.parse(raw);
          if (!state.approvedConcurrentScopes || typeof state.approvedConcurrentScopes !== 'object' || Array.isArray(state.approvedConcurrentScopes)) {
            throw new Error('approvedConcurrentScopes is missing or invalid');
          }
          const existing = state.approvedConcurrentScopes[branch];
          if (existing !== undefined) {
            if (JSON.stringify(existing) !== JSON.stringify(allowedPaths)) {
              throw new Error(`Conflicting existing authority for ${branch}`);
            }
            process.exit(0);
          }
          state.approvedConcurrentScopes[branch] = allowedPaths;
          fs.writeFileSync(statePath, JSON.stringify(state));
          NODE

      - name: Verify exact state mutation
        shell: bash
        run: |
          set -euo pipefail
          node -e "const s=require('./docs/platform-v7/autopilot/autopilot-state.json'); const p=s.approvedConcurrentScopes['agent/pc-crop-07a-integration-inbox']; const e=['.github/workflows/pc-crop-07a.yml','apps/api/prisma/schema.prisma','apps/api/prisma/migrations/20260722*_regulatory_integration_inbox/**','apps/api/src/modules/regulatory-integration/**','apps/api/src/modules/integration-events/integration-events.module.ts','apps/api/test/industrial/regulatory-integration-inbox.e2e-spec.ts','infra/sql/postgresql-regulatory-integration-inbox-policies.sql','scripts/verify-pc-crop-07a.mjs','docs/platform-v7/autopilot/scopes/pc-crop-07a.json','scripts/p7-autopilot-guard.sh']; if(JSON.stringify(p)!==JSON.stringify(e)) process.exit(1)"
          changed="$(git diff --name-only)"
          test -z "$changed" || test "$changed" = "docs/platform-v7/autopilot/autopilot-state.json"

      - name: Publish state-only mutation
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- docs/platform-v7/autopilot/autopilot-state.json; then
            echo 'Authority already materialized; no commit required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'PC-CROP-07A: authorize integration inbox implementation scope'
          git push origin HEAD:agent/pc-crop-07a-scope-authority
