name: Exact Main 0a45 Evidence Audit

on:
  pull_request:
    paths:
      - '.github/workflows/exact-main-0a45-evidence-audit.yml'
      - 'scripts/audit-exact-main-0a45.mjs'
      - 'scripts/audit-exact-main-preflight.mjs'
  workflow_dispatch:

permissions:
  actions: write
  contents: write
  statuses: write

concurrency:
  group: exact-main-0a45-evidence-audit-2659
  cancel-in-progress: true

env:
  TARGET_SHA: 0a45a565f134921cd8bbe3361863e62660b128df
  TARGET_BRANCH: main
  AUDIT_DIR: artifacts/exact-main-0a45-audit
  AUDIT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    name: Verify exact-main Actions · SEO · K8s · immutable evidence
    runs-on: ubuntu-latest
    timeout-minutes: 85
    steps:
      - name: Checkout audit verifier
        uses: actions/checkout@v4
        with:
          ref: ${{ env.AUDIT_HEAD }}
          fetch-depth: 0

      - name: Run actions/setup-node@v4
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Capture early GraphQL preflight
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/audit-exact-main-preflight.mjs

      - name: Publish preflight through Git transport
        shell: bash
        run: |
          set -euo pipefail
          test -f "$AUDIT_DIR/preflight.json"
          short_head="${AUDIT_HEAD:0:12}"
          result_branch="evidence/exact-main-0a45-${short_head}"
          publish_dir="audit-results/exact-main-0a45"
          rm -rf "$publish_dir"
          mkdir -p "$publish_dir"
          cp "$AUDIT_DIR/preflight.json" "$publish_dir/"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -C "$result_branch"
          git add "$publish_dir/preflight.json"
          git commit -m "evidence: exact-main 0a45 preflight ${AUDIT_HEAD}"
          git push --force origin "HEAD:refs/heads/$result_branch"

      - name: Audit exact-main authority
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/audit-exact-main-0a45.mjs

      - name: Upload exact-main audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-main-evidence-audit-0a45a565f134921cd8bbe3361863e62660b128df
          path: ${{ env.AUDIT_DIR }}
          if-no-files-found: error
          retention-days: 90

      - name: Publish machine-readable audit status
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        shell: bash
        run: |
          set -euo pipefail
          state=failure
          description="Exact-main evidence audit failed"
          if test -f "$AUDIT_DIR/exact-main-0a45-audit.json" && \
             node -e 'const r=require("./artifacts/exact-main-0a45-audit.json"); process.exit(r.pass===true&&r.verdict==="PASS"?0:1)'; then
            state=success
            description="Exact-main K8s, immutable and live SEO evidence PASS"
          fi
          payload="$(node -e 'console.log(JSON.stringify({state:process.argv[1],context:"audit/exact-main-0a45",description:process.argv[2],target_url:process.argv[3]}))' "$state" "$description" "$RUN_URL")"
          curl --fail-with-body --retry 8 --retry-all-errors --retry-delay 3 \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/statuses/$AUDIT_HEAD" \
            -d "$payload"

      - name: Publish final evidence to dedicated Git branch
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          test -f "$AUDIT_DIR/exact-main-0a45-audit.json"
          short_head="${AUDIT_HEAD:0:12}"
          result_branch="evidence/exact-main-0a45-${short_head}"
          publish_dir="audit-results/exact-main-0a45"
          mkdir -p "$publish_dir"
          cp "$AUDIT_DIR/exact-main-0a45-audit.json" "$publish_dir/"
          cp "$AUDIT_DIR/verdict.txt" "$publish_dir/"
          cp "$AUDIT_DIR/preflight.json" "$publish_dir/"
          rm -rf "$publish_dir/evidence"
          if test -d "$AUDIT_DIR/evidence"; then
            cp -R "$AUDIT_DIR/evidence" "$publish_dir/evidence"
          fi
          git switch -C "$result_branch"
          git add "$publish_dir"
          git commit -m "evidence: exact-main 0a45 audit ${AUDIT_HEAD}"
          git push --force origin "HEAD:refs/heads/$result_branch"

      - name: Enforce exact-main audit verdict
        if: always()
        run: |
          test -f "$AUDIT_DIR/exact-main-0a45-audit.json"
          node -e 'const r=require("./artifacts/exact-main-0a45-audit.json"); if(r.pass!==true||r.verdict!=="PASS") { console.error(JSON.stringify(r.errors,null,2)); process.exit(1); }'
