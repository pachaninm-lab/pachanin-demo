name: Exact Main 880a Evidence Audit

on:
  pull_request:
    paths:
      - '.github/workflows/exact-main-0a45-evidence-audit.yml'
      - 'scripts/audit-exact-main-452d.mjs'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: exact-main-880a-evidence-audit-2659
  cancel-in-progress: true

env:
  TARGET_SHA: 880afa13c2d806f23f2df4c72f9125ce3e000b4d
  TARGET_BRANCH: main
  AUDIT_DIR: artifacts/exact-main-880a-audit
  AUDIT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    name: Verify exact-main live · security · K8s · immutable evidence
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout audit verifier
        uses: actions/checkout@v4
        with:
          ref: ${{ env.AUDIT_HEAD }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Materialize fail-fast exact-main verifier
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/audit-exact-main-452d.mjs /tmp/audit-exact-main-880a.mjs
          sed -i \
            -e 's#/.well-known/pc-deploy.json#/manifest-pc-deploy.json#g' \
            -e 's#/transparent-price-indexnow.txt#/manifest-indexnow-transparent-price-indexnow.txt#g' \
            /tmp/audit-exact-main-880a.mjs
          python - <<'PY'
          from pathlib import Path

          target = Path('/tmp/audit-exact-main-880a.mjs')
          text = target.read_text()

          old_group = '''function resolveWorkflowGroup(rollup, workflowName, config) {
            const matching = rollup.checkRuns.filter((run) => run.workflowRun.workflowName === workflowName);
            const runIds = [...new Set(matching.map((run) => run.workflowRun.databaseId))]
              .sort((left, right) => Number(right) - Number(left));
            for (const runId of runIds) {
              const jobs = config.jobs.map((jobName) => matching.find((run) => run.workflowRun.databaseId === runId && run.name === jobName) || null);
              if (jobs.every(Boolean)) return { runId, jobs };
            }
            return null;
          }
          '''

          new_group = '''function latestByAttemptAndId(runs) {
            return [...runs].sort((left, right) =>
              Number(right.workflowRun.runAttempt || 0) - Number(left.workflowRun.runAttempt || 0)
              || Number(right.databaseId || 0) - Number(left.databaseId || 0)
            )[0] || null;
          }

          function resolveWorkflowGroup(rollup, workflowName, config) {
            const matching = rollup.checkRuns.filter((run) => run.workflowRun.workflowName === workflowName);
            const runIds = [...new Set(matching.map((run) => run.workflowRun.databaseId))]
              .sort((left, right) => Number(right) - Number(left));
            for (const runId of runIds) {
              const jobs = config.jobs.map((jobName) => latestByAttemptAndId(
                matching.filter((run) => run.workflowRun.databaseId === runId && run.name === jobName),
              ));
              if (
                jobs.every(Boolean)
                && jobs.every((job) => job.status === 'completed' && job.conclusion === 'success')
              ) return { runId, jobs };
            }
            return null;
          }

          function effectiveLatestCheckRuns(rollup) {
            const effective = [];
            const requiredWorkflowNames = new Set(Object.keys(required));
            for (const [workflowName, config] of Object.entries(required)) {
              const accepted = resolveWorkflowGroup(rollup, workflowName, config);
              if (accepted) effective.push(...accepted.jobs);
            }
            const latestRunByWorkflow = new Map();
            for (const run of rollup.checkRuns) {
              const workflowKey = run.workflowRun.workflowName || run.workflowRun.workflowFile || `workflow-${run.workflowRun.databaseId}`;
              if (requiredWorkflowNames.has(workflowKey)) continue;
              const runId = Number(run.workflowRun.databaseId || 0);
              const current = latestRunByWorkflow.get(workflowKey);
              if (!current || runId > current.runId) latestRunByWorkflow.set(workflowKey, { runId, runs: [run] });
              else if (runId === current.runId) current.runs.push(run);
            }
            for (const { runs } of latestRunByWorkflow.values()) {
              for (const jobName of new Set(runs.map((run) => run.name))) {
                const latest = latestByAttemptAndId(runs.filter((run) => run.name === jobName));
                if (latest) effective.push(latest);
              }
            }
            return effective.sort((left, right) =>
              String(left.workflowRun.workflowName || '').localeCompare(String(right.workflowRun.workflowName || ''))
              || String(left.name || '').localeCompare(String(right.name || ''))
            );
          }
          '''

          old_wait = '''async function waitForStableExactMainRollup() {
            const deadline = Date.now() + 100 * 60 * 1000;
            let stableSnapshot = null;
            while (Date.now() < deadline) {
              const currentMain = await resolveMainSha();
              if (currentMain !== targetSha) throw new Error(`main moved during audit: expected ${targetSha}, actual ${currentMain}`);
              const rollup = await exactMainRollup();
              const groups = Object.fromEntries(Object.entries(required).map(([name, config]) => [name, resolveWorkflowGroup(rollup, name, config)]));
              const requiredReady = Object.values(groups).every((group) => group?.jobs.every((job) => job.status === 'completed'));
              const active = rollup.checkRuns.filter((run) => run.status !== 'completed');
              console.log(JSON.stringify({
                observedAt: new Date().toISOString(),
                rollupState: rollup.rollupState,
                active: active.map((run) => `${run.workflowRun.workflowName}/${run.name}:${run.status}`),
                required: Object.fromEntries(Object.entries(groups).map(([name, group]) => [name, group ? Object.fromEntries(group.jobs.map((job) => [job.name, `${job.status}/${job.conclusion}`])) : 'missing'])),
              }));
              if (requiredReady && active.length === 0) {
                const snapshot = rollup.checkRuns.map((run) => `${run.databaseId}:${run.status}:${run.conclusion}`).sort().join('|');
                if (stableSnapshot === snapshot) return rollup;
                stableSnapshot = snapshot;
                await sleep(30_000);
              } else {
                stableSnapshot = null;
                await sleep(20_000);
              }
            }
            throw new Error('Timed out waiting for stable exact-main GitHub Actions rollup.');
          }
          '''

          new_wait = '''async function waitForStableExactMainRollup() {
            const currentMain = await resolveMainSha();
            if (currentMain !== targetSha) throw new Error(`main moved during audit: expected ${targetSha}, actual ${currentMain}`);
            const rollup = await exactMainRollup();
            const groups = Object.fromEntries(Object.entries(required).map(([name, config]) => [name, resolveWorkflowGroup(rollup, name, config)]));
            const missing = Object.entries(groups).filter(([, group]) => !group).map(([name]) => name);
            if (missing.length > 0) throw new Error(`Accepted exact-main workflow groups missing: ${missing.join(', ')}`);
            const effective = effectiveLatestCheckRuns(rollup);
            const active = effective.filter((run) => run.status !== 'completed');
            if (active.length > 0) {
              throw new Error(`Effective exact-main checks still active: ${active.map((run) => `${run.workflowRun.workflowName}/${run.name}:${run.status}`).join(', ')}`);
            }
            console.log(JSON.stringify({
              observedAt: new Date().toISOString(),
              rollupState: rollup.rollupState,
              effectiveCount: effective.length,
              required: Object.fromEntries(Object.entries(groups).map(([name, group]) => [name, { runId: group.runId, jobs: Object.fromEntries(group.jobs.map((job) => [job.name, `${job.status}/${job.conclusion}`])) }])),
            }, null, 2));
            return rollup;
          }
          '''

          replacements = [
            (old_group, new_group),
            (old_wait, new_wait),
            ('report.exactMainChecks.effectiveCheckRuns = rollup.checkRuns;', 'const effectiveCheckRuns = effectiveLatestCheckRuns(rollup);\n  report.exactMainChecks.effectiveCheckRuns = effectiveCheckRuns;'),
            ("assert(rollup.checkRuns.length > 0, 'No exact-main GitHub Actions check runs found');\n  for (const checkRun of rollup.checkRuns) {", "assert(effectiveCheckRuns.length > 0, 'No effective exact-main GitHub Actions check runs found');\n  for (const checkRun of effectiveCheckRuns) {"),
            ('for (let attempt = 1; attempt <= 60; attempt += 1) {', 'for (let attempt = 1; attempt <= 3; attempt += 1) {'),
            ('if (attempt < 60) await sleep(20_000);', 'if (attempt < 3) await sleep(5_000);')
          ]

          for old, new in replacements:
            if old not in text:
              raise SystemExit(f'audit patch anchor missing: {old[:120]!r}')
            text = text.replace(old, new, 1)

          target.write_text(text)
          PY

      - name: Audit exact-main authority
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node /tmp/audit-exact-main-880a.mjs

      - name: Upload exact-main audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-main-evidence-audit-880afa13c2d806f23f2df4c72f9125ce3e000b4d
          path: ${{ env.AUDIT_DIR }}
          if-no-files-found: error
          retention-days: 90

      - name: Enforce exact-main audit verdict
        if: always()
        run: |
          test -f "$AUDIT_DIR/exact-main-452d-audit.json"
          node -e 'const r=require("./artifacts/exact-main-880a-audit/exact-main-452d-audit.json"); if(r.pass!==true||r.verdict!=="PASS") { console.error(JSON.stringify(r.errors,null,2)); process.exit(1); }'
