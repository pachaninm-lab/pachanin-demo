name: Exact Main 0a45 Evidence Audit

on:
  pull_request:
    paths:
      - '.github/workflows/exact-main-0a45-evidence-audit.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: exact-main-0a45-evidence-audit-2659
  cancel-in-progress: true

env:
  TARGET_SHA: 0a45a565f134921cd8bbe3361863e62660b128df
  TARGET_BRANCH: main
  AUDIT_DIR: artifacts/exact-main-0a45-audit

jobs:
  audit:
    name: Verify exact-main Actions · SEO · K8s · immutable evidence
    runs-on: ubuntu-latest
    timeout-minutes: 85
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Audit exact-main authority with bounded API retries
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const crypto = require('node:crypto');
          const { execFileSync } = require('node:child_process');

          const repository = process.env.GITHUB_REPOSITORY;
          const targetSha = process.env.TARGET_SHA;
          const targetBranch = process.env.TARGET_BRANCH;
          const auditDir = process.env.AUDIT_DIR;
          const token = process.env.GITHUB_TOKEN;
          const apiBase = `https://api.github.com/repos/${repository}`;
          const errors = [];
          const apiRetries = [];
          const allowed = new Set(['success', 'skipped', 'neutral']);
          const required = {
            'SEO Live Smoke': ['Verify production SEO headers'],
            'Production-like Kubernetes Acceptance': [
              'Multi-node kind · immutable rollout · rollback',
              'Production-like Kubernetes Gate · blocking',
            ],
            'Immutable Release Authority Acceptance': [
              'Build once · manifest · migration gate · rollback contract',
              'Migration image · blocking HIGH/CRITICAL scan',
              'Immutable Release Authority Gate · all blocking checks',
            ],
          };
          const requiredArtifacts = {
            'Production-like Kubernetes Acceptance': [`production-like-kubernetes-${targetSha}`],
            'Immutable Release Authority Acceptance': [
              `immutable-release-build-${targetSha}`,
              `immutable-release-migration-security-${targetSha}`,
            ],
          };

          fs.rmSync(auditDir, { recursive: true, force: true });
          for (const dir of ['api', 'downloads', 'evidence']) fs.mkdirSync(path.join(auditDir, dir), { recursive: true });

          const report = {
            schemaVersion: 2,
            repository,
            target: { branch: targetBranch, commitSha: targetSha },
            auditedAt: new Date().toISOString(),
            auditExecution: {
              event: process.env.GITHUB_EVENT_NAME,
              runId: process.env.GITHUB_RUN_ID,
              runAttempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1),
              workflowSha: process.env.GITHUB_SHA,
            },
            mainRef: null,
            exactMainRuns: [],
            requiredWorkflows: {},
            liveSeo: null,
            apiRetries,
            errors,
            maturityBoundary: {
              productionOperationallyAccepted: 'NO_GO',
              acceptedSlice: 'exact-main disposable Kubernetes, immutable release and live SEO evidence only',
              notProven: [
                'provider-level PostgreSQL HA/PITR',
                'target production load and capacity',
                'permanent-environment operations',
                'external penetration test',
                'live provider integrations',
                'operational soak',
                'deep outbox runtime scenarios tracked by #2649',
              ],
            },
            pass: false,
            verdict: 'FAIL',
          };

          const sleep = (ms) => new Promise((resolve) => setTimeout(resolve, ms));
          const fail = (message) => { errors.push(message); console.error(`AUDIT_ERROR: ${message}`); };
          const check = (condition, message) => { if (!condition) fail(message); };
          const sha256 = (file) => `sha256:${crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex')}`;
          const validSha = (value) => typeof value === 'string' && /^sha256:[0-9a-f]{64}$/.test(value);

          async function request(urlOrPath, options = {}) {
            const url = urlOrPath.startsWith('http') ? urlOrPath : `https://api.github.com${urlOrPath}`;
            let lastError;
            for (let attempt = 1; attempt <= 8; attempt += 1) {
              try {
                const response = await fetch(url, {
                  method: options.method || 'GET',
                  redirect: 'follow',
                  headers: {
                    Accept: 'application/vnd.github+json',
                    Authorization: `Bearer ${token}`,
                    'Content-Type': 'application/json',
                    'X-GitHub-Api-Version': '2022-11-28',
                    'User-Agent': 'pachanin-demo-exact-main-audit-retry',
                  },
                  body: options.body ? JSON.stringify(options.body) : undefined,
                });
                if (response.ok) {
                  if (options.binary) return Buffer.from(await response.arrayBuffer());
                  if (response.status === 204) return null;
                  return response.json();
                }
                const body = await response.text();
                lastError = new Error(`GitHub API ${response.status} for ${url}: ${body.slice(0, 1200)}`);
                if (!(response.status === 429 || response.status >= 500) || attempt === 8) throw lastError;
                const retryAfterMs = Number(response.headers.get('retry-after') || 0) * 1000;
                const delayMs = Math.max(retryAfterMs, Math.min(60_000, 2000 * 2 ** (attempt - 1)));
                apiRetries.push({ url, attempt, status: response.status, delayMs });
                console.warn(`Transient GitHub API ${response.status}; retrying in ${delayMs}ms`);
                await sleep(delayMs);
              } catch (error) {
                lastError = error;
                const retryable = /fetch failed|ECONNRESET|ETIMEDOUT|GitHub API (429|5\d\d)/i.test(String(error));
                if (!retryable || attempt === 8) throw error;
                const delayMs = Math.min(60_000, 2000 * 2 ** (attempt - 1));
                apiRetries.push({ url, attempt, error: String(error), delayMs });
                await sleep(delayMs);
              }
            }
            throw lastError;
          }

          async function paginate(urlPath, key) {
            const values = [];
            for (let page = 1; page <= 20; page += 1) {
              const joiner = urlPath.includes('?') ? '&' : '?';
              const payload = await request(`${urlPath}${joiner}per_page=100&page=${page}`);
              const pageValues = payload[key] || [];
              values.push(...pageValues);
              if (pageValues.length < 100) break;
            }
            return values;
          }

          const latest = (runs, name) => runs.filter((run) => run.name === name)
            .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0] || null;

          async function exactMainRuns() {
            const runs = await paginate(`${apiBase}/actions/runs?head_sha=${targetSha}`, 'workflow_runs');
            return runs.filter((run) => run.head_sha === targetSha && run.head_branch === targetBranch && ['push', 'workflow_dispatch'].includes(run.event));
          }

          async function waitForStableRuns() {
            const deadline = Date.now() + 70 * 60 * 1000;
            let stable = null;
            while (Date.now() < deadline) {
              const ref = await request(`${apiBase}/git/ref/heads/${targetBranch}`);
              if (ref.object?.sha !== targetSha) throw new Error(`main moved: expected ${targetSha}, actual ${ref.object?.sha}`);
              const runs = await exactMainRuns();
              const requiredRuns = Object.keys(required).map((name) => latest(runs, name));
              const active = runs.filter((run) => run.status !== 'completed');
              console.log(JSON.stringify({
                observedAt: new Date().toISOString(),
                active: active.map((run) => `${run.name}#${run.run_number}:${run.status}`),
                required: Object.fromEntries(Object.keys(required).map((name, index) => [name, requiredRuns[index] ? `${requiredRuns[index].status}/${requiredRuns[index].conclusion}` : 'missing'])),
              }));
              if (requiredRuns.every((run) => run?.status === 'completed') && active.length === 0) {
                const snapshot = runs.map((run) => `${run.id}:${run.status}:${run.conclusion}`).sort().join('|');
                if (stable === snapshot) return runs;
                stable = snapshot;
                await sleep(30_000);
              } else {
                stable = null;
                await sleep(20_000);
              }
            }
            throw new Error('Timed out waiting for stable exact-main Actions');
          }

          function walk(root) {
            if (!fs.existsSync(root)) return [];
            return fs.readdirSync(root, { withFileTypes: true }).flatMap((entry) => {
              const full = path.join(root, entry.name);
              return entry.isDirectory() ? walk(full) : [full];
            });
          }

          function uniqueFile(root, basename) {
            const matches = walk(root).filter((file) => path.basename(file) === basename);
            check(matches.length === 1, `${basename} expected once; found ${matches.length}`);
            return matches[0] || null;
          }

          async function downloadArtifact(artifact) {
            const safe = artifact.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const zipFile = path.join(auditDir, 'downloads', `${safe}.zip`);
            const extractDir = path.join(auditDir, 'downloads', safe);
            fs.writeFileSync(zipFile, await request(`${apiBase}/actions/artifacts/${artifact.id}/zip`, { binary: true }));
            const calculatedDigest = sha256(zipFile);
            check(validSha(artifact.digest), `Artifact digest invalid: ${artifact.name}`);
            check(artifact.digest === calculatedDigest, `Artifact digest mismatch: ${artifact.name}`);
            fs.mkdirSync(extractDir, { recursive: true });
            execFileSync('unzip', ['-q', zipFile, '-d', extractDir]);
            return { extractDir, calculatedDigest };
          }

          function readJson(file, label) {
            try { return JSON.parse(fs.readFileSync(file, 'utf8')); }
            catch (error) { fail(`${label} invalid JSON: ${error.message}`); return null; }
          }

          function verifyKubernetes(root) {
            const file = uniqueFile(root, 'production-like-kubernetes-evidence.json');
            const evidence = file && readJson(file, 'Kubernetes evidence');
            if (!evidence) return null;
            check(evidence.repository === repository, 'Kubernetes repository mismatch');
            check(evidence.commitSha === targetSha && evidence.branch === targetBranch, 'Kubernetes exact-main mismatch');
            check(evidence.pass === true && evidence.result === 'PASS', 'Kubernetes evidence not PASS');
            check(evidence.release?.sourceCommit === targetSha, 'Kubernetes release sourceCommit mismatch');
            check(Array.isArray(evidence.violatedThresholds) && evidence.violatedThresholds.length === 0, 'Kubernetes thresholds violated');
            check(evidence.actualMeasurements?.mutablePlatformImageReferences === 0, 'Mutable Kubernetes image reference found');
            check(evidence.actualMeasurements?.rollbackDigestMismatches === 0, 'Rollback digest mismatch found');
            check(evidence.assertions?.immutablePlatformImages === true, 'Immutable image assertion missing');
            check(evidence.assertions?.rollingUpdateDigestSetApplied === true, 'Rollout assertion missing');
            check(evidence.assertions?.sameSchemaRollbackDigestSetRestored === true, 'Rollback assertion missing');
            const references = [...(evidence.logs || []), ...(evidence.artifacts || [])];
            check(references.length > 0, 'Kubernetes retained evidence is empty');
            for (const reference of references) check(fs.existsSync(path.join(root, path.posix.normalize(reference))), `Kubernetes retained reference missing: ${reference}`);
            fs.copyFileSync(file, path.join(auditDir, 'evidence', path.basename(file)));
            return { evidenceSha256: sha256(file), retainedReferenceCount: references.length };
          }

          function verifyImmutable(root) {
            const file = uniqueFile(root, 'immutable-release-evidence.json');
            const evidence = file && readJson(file, 'Immutable release evidence');
            if (!evidence) return null;
            check(evidence.repository === repository && evidence.commitSha === targetSha, 'Immutable exact-main mismatch');
            check(evidence.pass === true, 'Immutable release evidence not PASS');
            check(validSha(evidence.manifestId) && validSha(evidence.rollbackId), 'Immutable manifest/rollback ID invalid');
            for (const component of ['api', 'web', 'outboxWorker', 'migration']) {
              check(validSha(evidence.imageDigests?.[component]), `Immutable digest invalid: ${component}`);
              check(validSha(evidence.imageConfigIds?.[component]), `Immutable config ID invalid: ${component}`);
            }
            fs.copyFileSync(file, path.join(auditDir, 'evidence', path.basename(file)));
            return { evidenceSha256: sha256(file) };
          }

          function verifyMigration(root) {
            const file = uniqueFile(root, 'trivy-migration-container-evaluation.json');
            const evidence = file && readJson(file, 'Migration security evidence');
            if (!evidence) return null;
            check(evidence.repository === repository && evidence.commitSha === targetSha, 'Migration security exact-main mismatch');
            check(evidence.passed === true && evidence.scannerResult === 'success', 'Migration security not PASS');
            check(evidence.summary?.highOrCritical === 0 && evidence.summary?.blocked === 0, 'Migration security blocked findings exist');
            fs.copyFileSync(file, path.join(auditDir, 'evidence', path.basename(file)));
            return { evidenceSha256: sha256(file) };
          }

          async function verifyWorkflow(name, runs) {
            const run = latest(runs, name);
            check(Boolean(run), `Required workflow missing: ${name}`);
            if (!run) return;
            check(run.status === 'completed' && run.conclusion === 'success', `Required workflow failed: ${name}`);
            const jobs = await paginate(`${apiBase}/actions/runs/${run.id}/jobs?filter=latest`, 'jobs');
            for (const jobName of required[name]) {
              const job = jobs.find((candidate) => candidate.name === jobName);
              check(Boolean(job), `Required job missing: ${name} / ${jobName}`);
              if (job) check(job.conclusion === 'success', `Required job failed: ${name} / ${jobName}`);
            }
            const artifacts = await paginate(`${apiBase}/actions/runs/${run.id}/artifacts`, 'artifacts');
            const entry = { run: { id: run.id, event: run.event, conclusion: run.conclusion, headSha: run.head_sha }, jobs: jobs.map(({ id, name, status, conclusion }) => ({ id, name, status, conclusion })), artifacts: [], evidence: {} };
            report.requiredWorkflows[name] = entry;
            for (const artifactName of requiredArtifacts[name] || []) {
              const matches = artifacts.filter((artifact) => artifact.name === artifactName);
              check(matches.length === 1, `Artifact ${artifactName} expected once; found ${matches.length}`);
              if (matches.length !== 1) continue;
              const artifact = matches[0];
              check(artifact.expired === false, `Artifact expired: ${artifactName}`);
              check(artifact.workflow_run?.head_sha === targetSha, `Artifact SHA mismatch: ${artifactName}`);
              const { extractDir, calculatedDigest } = await downloadArtifact(artifact);
              entry.artifacts.push({ id: artifact.id, name: artifact.name, digest: artifact.digest, calculatedDigest, sizeInBytes: artifact.size_in_bytes });
              if (artifactName.startsWith('production-like-kubernetes-')) entry.evidence.kubernetes = verifyKubernetes(extractDir);
              if (artifactName.startsWith('immutable-release-build-')) entry.evidence.immutable = verifyImmutable(extractDir);
              if (artifactName.startsWith('immutable-release-migration-security-')) entry.evidence.migrationSecurity = verifyMigration(extractDir);
            }
          }

          async function verifyLiveSeo() {
            const site = 'https://xn----8sbjf4befbjgs9b.xn--p1ai';
            const publicPaths = ['/platform-v7', '/platform-v7/secure-grain-deal', '/platform-v7/fgis-zerno', '/platform-v7/deal-flow'];
            const privatePaths = ['/platform-v7/buyer', '/platform-v7/bank', '/platform-v7/deals/DL-9102/clean'];
            const live = { checkedAt: new Date().toISOString(), public: [], private: [], sitemap: {}, robots: {} };
            for (const pathname of publicPaths) {
              const response = await fetch(`${site}${pathname}`, { method: 'HEAD', redirect: 'manual' });
              const robots = response.headers.get('x-robots-tag') || '';
              live.public.push({ pathname, status: response.status, xRobotsTag: robots });
              check(response.status >= 200 && response.status < 400, `Public route failed: ${pathname} status=${response.status}`);
              check(robots.toLowerCase().includes('index, follow'), `Public route not indexable: ${pathname} ${robots}`);
            }
            for (const pathname of privatePaths) {
              const response = await fetch(`${site}${pathname}`, { method: 'HEAD', redirect: 'manual' });
              const robots = response.headers.get('x-robots-tag') || '';
              live.private.push({ pathname, status: response.status, xRobotsTag: robots });
              check(response.status >= 200 && response.status < 400, `Private route failed: ${pathname} status=${response.status}`);
              check(robots.toLowerCase().includes('noindex, nofollow'), `Private route not noindex: ${pathname} ${robots}`);
            }
            const sitemapResponse = await fetch(`${site}/sitemap.xml`);
            const sitemap = await sitemapResponse.text();
            live.sitemap = { status: sitemapResponse.status, sha256: `sha256:${crypto.createHash('sha256').update(sitemap).digest('hex')}` };
            check(sitemapResponse.ok, `sitemap.xml failed: ${sitemapResponse.status}`);
            for (const value of ['/platform-v7/secure-grain-deal', '/platform-v7/fgis-zerno', '/platform-v7/deal-flow']) check(sitemap.includes(value), `sitemap missing ${value}`);
            for (const value of ['/platform-v7/buyer', '/platform-v7/bank', '/platform-v7/deals/', '/platform-v7/lots/', '/platform-v7/counterparty/', '/platform-v7/demo']) check(!sitemap.includes(value), `sitemap exposes ${value}`);
            const robotsResponse = await fetch(`${site}/robots.txt`);
            const robotsText = await robotsResponse.text();
            live.robots = { status: robotsResponse.status, sha256: `sha256:${crypto.createHash('sha256').update(robotsText).digest('hex')}` };
            check(robotsResponse.ok, `robots.txt failed: ${robotsResponse.status}`);
            check(robotsText.includes('/platform-v7/secure-grain-deal'), 'robots missing secure-grain-deal');
            check(robotsText.includes('/platform-v7/buyer'), 'robots missing buyer disallow');
            fs.writeFileSync(path.join(auditDir, 'evidence', 'live-sitemap.xml'), sitemap);
            fs.writeFileSync(path.join(auditDir, 'evidence', 'live-robots.txt'), robotsText);
            report.liveSeo = live;
          }

          (async () => {
            try {
              const ref = await request(`${apiBase}/git/ref/heads/${targetBranch}`);
              report.mainRef = { ref: ref.ref, sha: ref.object?.sha || null };
              check(ref.object?.sha === targetSha, `main mismatch: expected ${targetSha}, actual ${ref.object?.sha}`);
              const runs = await waitForStableRuns();
              report.exactMainRuns = runs.map(({ id, name, event, status, conclusion, head_sha, head_branch }) => ({ id, name, event, status, conclusion, headSha: head_sha, headBranch: head_branch }));
              fs.writeFileSync(path.join(auditDir, 'api', 'exact-main-runs.json'), `${JSON.stringify({ workflow_runs: runs }, null, 2)}\n`);
              check(runs.length > 0, 'No exact-main Actions runs found');
              for (const run of runs) {
                check(run.status === 'completed', `Exact-main run incomplete: ${run.name}`);
                check(allowed.has(run.conclusion), `Exact-main run non-passing: ${run.name} (${run.conclusion})`);
              }
              for (const name of Object.keys(required)) await verifyWorkflow(name, runs);
              await verifyLiveSeo();
              check(Boolean(report.requiredWorkflows['Production-like Kubernetes Acceptance']?.evidence?.kubernetes), 'Validated Kubernetes evidence missing');
              check(Boolean(report.requiredWorkflows['Immutable Release Authority Acceptance']?.evidence?.immutable), 'Validated immutable evidence missing');
              check(Boolean(report.requiredWorkflows['Immutable Release Authority Acceptance']?.evidence?.migrationSecurity), 'Validated migration security evidence missing');
            } catch (error) {
              fail(`Audit execution failed: ${error.stack || error.message}`);
            }
            report.pass = errors.length === 0;
            report.verdict = report.pass ? 'PASS' : 'FAIL';
            report.auditedAt = new Date().toISOString();
            fs.writeFileSync(path.join(auditDir, 'exact-main-0a45-audit.json'), `${JSON.stringify(report, null, 2)}\n`);
            fs.writeFileSync(path.join(auditDir, 'verdict.txt'), `${report.verdict}\n`);
            console.log(JSON.stringify({ verdict: report.verdict, errors, apiRetries, liveSeo: report.liveSeo }, null, 2));
          })();
          NODE

      - name: Upload exact-main audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-main-evidence-audit-0a45a565f134921cd8bbe3361863e62660b128df
          path: ${{ env.AUDIT_DIR }}
          if-no-files-found: error
          retention-days: 90

      - name: Enforce exact-main audit verdict
        if: always()
        run: |
          test -f "$AUDIT_DIR/exact-main-0a45-audit.json"
          node -e 'const r=require("./artifacts/exact-main-0a45-audit.json"); if(r.pass!==true||r.verdict!=="PASS") { console.error(JSON.stringify(r.errors,null,2)); process.exit(1); }'
