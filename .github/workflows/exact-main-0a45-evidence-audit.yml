name: Exact Main 452d Evidence Audit

on:
  pull_request:
    paths:
      - '.github/workflows/exact-main-0a45-evidence-audit.yml'
      - 'scripts/audit-exact-main-452d.mjs'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: exact-main-452d-evidence-audit-2659
  cancel-in-progress: true

env:
  TARGET_SHA: 452da9fdeca729d91a2bef9b9b2b4891bd515c73
  TARGET_BRANCH: main
  AUDIT_DIR: artifacts/exact-main-452d-audit
  AUDIT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  audit:
    if: github.actor != 'github-actions[bot]'
    name: Verify exact-main live · security · K8s · immutable evidence
    runs-on: ubuntu-latest
    timeout-minutes: 110
    steps:
      - name: Checkout audit verifier
        uses: actions/checkout@v4
        with:
          ref: ${{ env.AUDIT_HEAD }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Audit exact-main authority
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/audit-exact-main-452d.mjs

      - name: Upload exact-main audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-main-evidence-audit-452da9fdeca729d91a2bef9b9b2b4891bd515c73
          path: ${{ env.AUDIT_DIR }}
          if-no-files-found: error
          retention-days: 90

      - name: Enforce exact-main audit verdict
        if: always()
        run: |
          test -f "$AUDIT_DIR/exact-main-452d-audit.json"
          node -e 'const r=require("./artifacts/exact-main-452d-audit.json"); if(r.pass!==true||r.verdict!=="PASS") { console.error(JSON.stringify(r.errors,null,2)); process.exit(1); }'
