name: platform-v7 agent runner

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      command:
        description: 'Agent command. Use: run-current'
        required: true
        default: 'run-current'
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: platform-v7-agent-runner-${{ github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  run-agent:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issues' && github.event.label.name == 'agent:run') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/agent run current'))
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Mark start
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
        run: |
          set -euo pipefail
          if [ -n "${ISSUE_NUMBER:-}" ] && command -v gh >/dev/null 2>&1; then
            gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body "Agent runner started: event=${{ github.event_name }}, run=${{ github.run_id }}. Work remains PR-only." || true
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate current task
        run: node scripts/p7-autopilot-dispatcher.mjs

      - name: Run agent
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          ISSUE_NUMBER: ${{ github.event.issue.number || '' }}
        run: |
          set +e
          bash scripts/p7-agent-runner.sh 2>&1 | tee /tmp/p7-agent-runner.log
          status=${PIPESTATUS[0]}

          tail -n 80 /tmp/p7-agent-runner.log > /tmp/p7-agent-runner-tail.txt

          if [ "$status" -eq 3 ]; then
            echo "P7_AGENT_NOOP=true" >> "$GITHUB_ENV"
            echo "P7_AGENT_NOOP_REASON=agent produced no repository changes" >> "$GITHUB_ENV"
            status=0
          fi

          {
            echo "## runner output tail"
            echo "- exit code: $status"
            echo '```text'
            cat /tmp/p7-agent-runner-tail.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$status" -ne 0 ]; then
            if [ -n "${ISSUE_NUMBER:-}" ] && command -v gh >/dev/null 2>&1; then
              {
                echo "Agent runner failed: run=${{ github.run_id }}, exit=$status. Tail:"
                echo '```text'
                tail -n 40 /tmp/p7-agent-runner-tail.txt
                echo '```'
              } > /tmp/p7-agent-runner-comment.md
              gh issue comment "$ISSUE_NUMBER" --repo "$REPO" --body-file /tmp/p7-agent-runner-comment.md || true
            fi
            exit "$status"
          fi

      - name: Runner summary
        if: always()
        shell: bash
        run: |
          echo "## runner result" >> "$GITHUB_STEP_SUMMARY"
          echo "- job status: ${{ job.status }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- generated branch env: ${P7_AGENT_BRANCH:-not-set}" >> "$GITHUB_STEP_SUMMARY"
          echo "- noop: ${P7_AGENT_NOOP:-false}" >> "$GITHUB_STEP_SUMMARY"
          echo "- noop reason: ${P7_AGENT_NOOP_REASON:-not-set}" >> "$GITHUB_STEP_SUMMARY"

      - name: Create pull request
        if: success() && env.P7_AGENT_NOOP != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if [ -z "${P7_AGENT_BRANCH:-}" ]; then
            echo "P7_AGENT_BRANCH is not set."
            exit 1
          fi

          if [ -z "${P7_AGENT_PR_TITLE:-}" ]; then
            echo "P7_AGENT_PR_TITLE is not set."
            exit 1
          fi

          changed_files=$(git status --porcelain)
          printf '%s\n' "$changed_files"
          if [ -z "$changed_files" ]; then
            echo "No repository changes to commit."
            exit 1
          fi

          git add -A
          git commit -m "feat(platform-v7): apply current autopilot step"
          git push --set-upstream origin "$P7_AGENT_BRANCH"

          existing_pr=$(gh pr list --repo "$REPO" --head "$P7_AGENT_BRANCH" --json number --jq '.[0].number // ""')
          if [ -n "$existing_pr" ]; then
            echo "PR already exists: #$existing_pr"
            exit 0
          fi

          {
            echo "Automated platform-v7 current-step run."
            echo
            echo "Scope is controlled by source-of-truth files and guard scripts."
            echo "Work remains PR-only and keeps controlled-pilot / pre-integration maturity language."
          } > /tmp/p7-agent-pr-body.md

          gh pr create \
            --repo "$REPO" \
            --title "$P7_AGENT_PR_TITLE" \
            --body-file /tmp/p7-agent-pr-body.md \
            --head "$P7_AGENT_BRANCH" \
            --base main \
            --label platform-v7 \
            --label agent-generated \
            --label needs-review
