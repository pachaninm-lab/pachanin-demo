name: TAI AP-13B.3e Refresh Index Diagnostic

on:
  push:
    branches:
      - agent/tai-ap-13b3e-immutable-storage-contract
    paths:
      - .github/workflows/tai-ap13b3e-refresh-index-diagnostic.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13b3e-immutable-storage-contract
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Execute correction and preserve bounded failure evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/tai-ap13b3e-refresh-index-test.yml')
          lines = source.read_text(encoding='utf-8').splitlines()
          start = lines.index('        run: |')
          script: list[str] = []
          for line in lines[start + 1:]:
              if line.startswith('          '):
                  script.append(line[10:])
              elif not line.strip():
                  script.append('')
              else:
                  break
          rendered = '\n'.join(script) + '\n'
          rendered = rendered.replace(
              'rm .github/workflows/tai-ap13b3e-refresh-index-test.yml',
              'rm .github/workflows/tai-ap13b3e-refresh-index-test.yml\n'
              'rm -f .github/workflows/tai-ap13b3e-refresh-index-diagnostic.yml\n'
              'rm -f tai-ap13b3e-refresh-index-failure.txt',
              1,
          )
          rendered = rendered.replace(
              '.github/workflows/tai-ap13b3e-refresh-index-test.yml',
              '.github/workflows/tai-ap13b3e-refresh-index-test.yml '
              '.github/workflows/tai-ap13b3e-refresh-index-diagnostic.yml '
              'tai-ap13b3e-refresh-index-failure.txt',
              1,
          )
          Path('/tmp/tai-ap13b3e-refresh-index.sh').write_text(
              rendered, encoding='utf-8'
          )
          PY

          set +e
          bash /tmp/tai-ap13b3e-refresh-index.sh > /tmp/refresh.log 2>&1
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi
          git reset --hard HEAD
          {
            printf 'exit_code=%s\n' "$status"
            printf '%s\n' '--- bounded tail ---'
            tail -n 260 /tmp/refresh.log
          } > tai-ap13b3e-refresh-index-failure.txt
          rm .github/workflows/tai-ap13b3e-refresh-index-diagnostic.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tai-ap13b3e-refresh-index-failure.txt .github/workflows/tai-ap13b3e-refresh-index-diagnostic.yml
          git commit -m 'chore(tai): preserve payload-index correction failure'
          git push origin HEAD:agent/tai-ap-13b3e-immutable-storage-contract
          exit "$status"
