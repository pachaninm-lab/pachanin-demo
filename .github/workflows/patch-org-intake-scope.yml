name: Patch organization intake scope binding

on:
  push:
    branches:
      - agent/platform-v7-organization-intake-v1
    paths:
      - '.github/workflows/patch-org-intake-scope.yml'

permissions:
  contents: write

concurrency:
  group: patch-org-intake-scope-binding
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-v7-organization-intake-v1
          fetch-depth: 0

      - name: Register exact branch scope manifest
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/p7-autopilot-guard.sh')
          text = path.read_text()
          needle = "  'agent/platform-v7-strategic-rebuild-v3': 'docs/platform-v7/autopilot/scopes/platform-v7-strategic-rebuild-v3.json',\n"
          insertion = needle + "  'agent/platform-v7-organization-intake-v1': 'docs/platform-v7/autopilot/scopes/platform-v7-organization-intake-v1.json',\n"
          if "'agent/platform-v7-organization-intake-v1':" not in text:
              if needle not in text:
                  raise SystemExit('canonical manifest registry anchor not found')
              text = text.replace(needle, insertion, 1)
              path.write_text(text)
          PY
          bash -n scripts/p7-autopilot-guard.sh
          node -e "const s=require('./docs/platform-v7/autopilot/scopes/platform-v7-organization-intake-v1.json'); if(s.branch!=='agent/platform-v7-organization-intake-v1'||s.status!=='active'||!Array.isArray(s.allowedPaths)||!s.allowedPaths.length) process.exit(1)"

      - name: Commit exact scope binding
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- scripts/p7-autopilot-guard.sh; then
            echo 'Scope binding already present.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/p7-autopilot-guard.sh
          git commit -m 'ci(scope): bind organization intake manifest'
          git push origin HEAD:agent/platform-v7-organization-intake-v1
