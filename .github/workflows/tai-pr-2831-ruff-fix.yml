name: TAI PR 2831 Ruff Fix

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/tai-pr-2831-ruff-fix.yml
      - apps/tai/tai/llama_toolchain_collect.py
      - apps/tai/tai/llama_toolchain_contract.py
      - apps/tai/tai/llama_toolchain_verify.py
      - apps/tai/tests/test_ap13b2a_scope.py
      - apps/tai/tests/test_llama_toolchain_contracts.py

permissions:
  contents: read

concurrency:
  group: tai-pr-2831-ruff-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  format-artifact:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml
      - name: Install TAI development dependencies
        working-directory: apps/tai
        run: python -m pip install -e '.[dev]'
      - name: Apply deterministic Ruff fixes
        working-directory: apps/tai
        run: |
          ruff format \
            tai/llama_toolchain_collect.py \
            tai/llama_toolchain_contract.py \
            tai/llama_toolchain_verify.py \
            tests/test_ap13b2a_scope.py \
            tests/test_llama_toolchain_contracts.py
          ruff check \
            tai/llama_toolchain_collect.py \
            tai/llama_toolchain_contract.py \
            tai/llama_toolchain_verify.py \
            tests/test_ap13b2a_scope.py \
            tests/test_llama_toolchain_contracts.py \
            --fix
          ruff format \
            tai/llama_toolchain_collect.py \
            tai/llama_toolchain_contract.py \
            tai/llama_toolchain_verify.py \
            tests/test_ap13b2a_scope.py \
            tests/test_llama_toolchain_contracts.py
          ruff check \
            tai/llama_toolchain_collect.py \
            tai/llama_toolchain_contract.py \
            tai/llama_toolchain_verify.py \
            tests/test_ap13b2a_scope.py \
            tests/test_llama_toolchain_contracts.py
      - name: Stage formatted files
        run: |
          mkdir -p /tmp/tai-pr-2831/apps/tai/tai
          mkdir -p /tmp/tai-pr-2831/apps/tai/tests
          cp apps/tai/tai/llama_toolchain_collect.py /tmp/tai-pr-2831/apps/tai/tai/
          cp apps/tai/tai/llama_toolchain_contract.py /tmp/tai-pr-2831/apps/tai/tai/
          cp apps/tai/tai/llama_toolchain_verify.py /tmp/tai-pr-2831/apps/tai/tai/
          cp apps/tai/tests/test_ap13b2a_scope.py /tmp/tai-pr-2831/apps/tai/tests/
          cp apps/tai/tests/test_llama_toolchain_contracts.py /tmp/tai-pr-2831/apps/tai/tests/
          git diff --check
      - uses: actions/upload-artifact@v4
        with:
          name: tai-pr-2831-ruff-fixed-${{ github.event.pull_request.head.sha }}
          path: /tmp/tai-pr-2831
          if-no-files-found: error
          retention-days: 1
