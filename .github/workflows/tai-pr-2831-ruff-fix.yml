name: TAI PR 2831 Ruff Fix

on:
  push:
    branches:
      - agent/tai-ap-13b2a-llama-toolchain-authority
    paths:
      - .github/workflows/tai-pr-2831-ruff-fix.yml

permissions:
  contents: write

concurrency:
  group: tai-pr-2831-ruff-fix
  cancel-in-progress: false

jobs:
  format:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13b2a-llama-toolchain-authority
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml
      - name: Install TAI development dependencies
        working-directory: apps/tai
        run: python -m pip install -e '.[dev]'
      - name: Apply deterministic Ruff fixes
        working-directory: apps/tai
        run: |
          ruff check \
            tai/llama_toolchain_collect.py \
            tai/llama_toolchain_contract.py \
            tai/llama_toolchain_verify.py \
            tests/test_ap13b2a_scope.py \
            tests/test_llama_toolchain_contracts.py \
            --fix
          ruff format \
            tai/llama_toolchain_collect.py \
            tai/llama_toolchain_contract.py \
            tai/llama_toolchain_verify.py \
            tests/test_ap13b2a_scope.py \
            tests/test_llama_toolchain_contracts.py
          ruff check \
            tai/llama_toolchain_collect.py \
            tai/llama_toolchain_contract.py \
            tai/llama_toolchain_verify.py \
            tests/test_ap13b2a_scope.py \
            tests/test_llama_toolchain_contracts.py
      - name: Commit formatting-only correction
        run: |
          if git diff --quiet; then
            echo 'No formatting changes required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            apps/tai/tai/llama_toolchain_collect.py \
            apps/tai/tai/llama_toolchain_contract.py \
            apps/tai/tai/llama_toolchain_verify.py \
            apps/tai/tests/test_ap13b2a_scope.py \
            apps/tai/tests/test_llama_toolchain_contracts.py
          git commit -m 'fix(tai): satisfy exact-head Ruff gate'
          git push origin HEAD:agent/tai-ap-13b2a-llama-toolchain-authority
