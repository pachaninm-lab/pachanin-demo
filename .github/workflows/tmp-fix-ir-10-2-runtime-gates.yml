name: Temporary IR-10.2 runtime gate repair

on:
  push:
    branches:
      - agent/ir-10-2-logistics-postgresql-authority

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[ir-10-2-runtime-gates-fixed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-2-logistics-postgresql-authority
          fetch-depth: 0
      - name: Repair exact PostgreSQL authority gates
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          service = Path('apps/api/src/modules/deals/deal-command.service.ts')
          source = service.read_text()
          old = "invalid('carrierOrgId', 'Активный нормализованный допуск логистики для сделки не найден.');"
          new = "invalid('driverUserId', 'Активный нормализованный допуск логистики для сделки не найден.');"
          if source.count(old) != 1:
              raise SystemExit('expected normalized-admission error mapping was not found exactly once')
          service.write_text(source.replace(old, new, 1))

          script = Path('scripts/platform-v7-one-deal-e2e.sh')
          source = script.read_text()

          overlay_anchor = '''echo "[one-deal] applying PostgreSQL document-authority RLS overlay"
          psql "$ADMIN_URL" -X --set ON_ERROR_STOP=1 --file infra/sql/postgresql-document-authority-policies.sql

          echo "[one-deal] creating restricted deal-execution principal"'''
          overlay_replacement = '''echo "[one-deal] applying PostgreSQL document-authority RLS overlay"
          psql "$ADMIN_URL" -X --set ON_ERROR_STOP=1 --file infra/sql/postgresql-document-authority-policies.sql

          echo "[one-deal] applying PostgreSQL logistics-authority RLS overlay"
          psql "$ADMIN_URL" -X --set ON_ERROR_STOP=1 --file infra/sql/postgresql-logistics-authority-policies.sql

          echo "[one-deal] creating restricted deal-execution principal"'''
          if source.count(overlay_anchor) != 1:
              raise SystemExit('one-deal overlay anchor not found exactly once')
          source = source.replace(overlay_anchor, overlay_replacement, 1)

          usage_old = 'GRANT USAGE ON SCHEMA public, security TO one_deal_app;'
          usage_new = 'GRANT USAGE ON SCHEMA public, security, logistics TO one_deal_app;'
          if source.count(usage_old) != 1:
              raise SystemExit('one-deal schema grant anchor not found exactly once')
          source = source.replace(usage_old, usage_new, 1)

          table_anchor = 'GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA security TO one_deal_app;'
          table_replacement = '''GRANT SELECT, INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA security TO one_deal_app;
          GRANT SELECT ON ALL TABLES IN SCHEMA logistics TO one_deal_app;
          REVOKE INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA logistics FROM one_deal_app;'''
          if source.count(table_anchor) != 1:
              raise SystemExit('one-deal table grant anchor not found exactly once')
          source = source.replace(table_anchor, table_replacement, 1)

          default_anchor = 'ALTER DEFAULT PRIVILEGES IN SCHEMA security GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO one_deal_app;'
          default_replacement = '''ALTER DEFAULT PRIVILEGES IN SCHEMA security GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO one_deal_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA logistics GRANT SELECT ON TABLES TO one_deal_app;'''
          if source.count(default_anchor) != 1:
              raise SystemExit('one-deal default privilege anchor not found exactly once')
          source = source.replace(default_anchor, default_replacement, 1)

          script.write_text(source)
          PY
          rm -f .github/workflows/tmp-fix-ir-10-2-runtime-gates.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(logistics): enforce normalized authority in CI [ir-10-2-runtime-gates-fixed]"
          git push origin HEAD:agent/ir-10-2-logistics-postgresql-authority
