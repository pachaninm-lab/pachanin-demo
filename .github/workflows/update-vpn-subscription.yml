name: Update VPN Subscription

on:
  schedule:
    - cron: '0 */2 * * *'   # каждые 2 часа (совпадает с циклом проверки igareck)
  workflow_dispatch:          # можно запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/xray-endpoint-happ-36Qc0

      - name: Fetch and rebuild subscription
        run: |
          set -euo pipefail

          # Источники с Reality + Hysteria2 + TUIC для домашнего интернета России
          VLESS_RUS_URL="https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt"
          NIKITA_URL="https://raw.githubusercontent.com/nikita29a/FreeProxyList/refs/heads/main/mirror/1.txt"
          BYPASS_URL="https://raw.githubusercontent.com/whoahaow/rjsxrd/refs/heads/main/githubmirror/bypass/bypass-all.txt"
          HYSTERIA_URL="https://raw.githubusercontent.com/Surfboardv2ray/TGParse/main/python/hysteria2"

          TMP=$(mktemp)

          # VLESS Reality протестированные из России на домашнем интернете
          curl -fsSL --max-time 30 "$VLESS_RUS_URL" 2>/dev/null \
            | grep -v '^#' | grep -v '^$' \
            | head -40 > "$TMP" || echo "WARN: failed $VLESS_RUS_URL" >&2

          # Reality + Hysteria2 + TUIC от nikita29a
          curl -fsSL --max-time 30 "$NIKITA_URL" 2>/dev/null \
            | grep -v '^#' | grep -v '^$' \
            | head -30 >> "$TMP" || echo "WARN: failed $NIKITA_URL" >&2

          # bypass-all (Reality + обходы)
          curl -fsSL --max-time 30 "$BYPASS_URL" 2>/dev/null \
            | grep -v '^#' | grep -v '^$' \
            | grep -E '^(vless|trojan|tuic|hysteria2?)://' \
            | head -20 >> "$TMP" || echo "WARN: failed $BYPASS_URL" >&2

          # Hysteria2 — UDP, хорошо работает на домашнем интернете
          curl -fsSL --max-time 30 "$HYSTERIA_URL" 2>/dev/null \
            | grep -v '^#' | grep -v '^$' \
            | head -15 >> "$TMP" || echo "WARN: failed $HYSTERIA_URL" >&2

          # Резервный сервер — ВСЕГДА ПЕРВЫЙ, никогда не удалять
          {
            echo "vless://9f3cbdb8-4a9d-5811-1d8e-58603f42cfd6@pachanin-demo.pachaninm-lab.deno.net:443?encryption=none&security=tls&sni=pachanin-demo.pachaninm-lab.deno.net&type=ws&host=pachanin-demo.pachaninm-lab.deno.net&path=%2F&fp=chrome&alpn=http%2F1.1#MY-VPN-FOREVER"
            cat "$TMP"
          } > vpn/subscription.txt

          COUNT=$(wc -l < vpn/subscription.txt)
          echo "Configs written: $COUNT"

          if [ "$COUNT" -lt 5 ]; then
            echo "Too few configs ($COUNT), keeping existing file"
            git checkout -- vpn/subscription.txt
          fi

          rm -f "$TMP"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vpn/subscription.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update VPN subscription $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin claude/xray-endpoint-happ-36Qc0
          fi
