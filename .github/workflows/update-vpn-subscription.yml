name: Update VPN Subscription

on:
  schedule:
    - cron: '0 */2 * * *'   # каждые 2 часа (совпадает с циклом проверки igareck)
  workflow_dispatch:          # можно запустить вручную

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/xray-endpoint-happ-36Qc0

      - name: Fetch and filter working configs for Russia
        run: |
          set -euo pipefail

          # Источники, проверяются из России каждые 2 часа автоматически
          SOURCES=(
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_VLESS_RUS.txt"
            "https://raw.githubusercontent.com/igareck/vpn-configs-for-russia/main/BLACK_SS+All_RUS.txt"
          )

          TMP=$(mktemp)

          for URL in "${SOURCES[@]}"; do
            curl -fsSL --max-time 30 "$URL" 2>/dev/null >> "$TMP" || echo "WARN: failed $URL" >&2
          done

          # 1. Netherlands VMess (mirra.now/Vercel CDN) — подтверждённо работают в РФ, всегда первые
          MIRRA_VMESS=(
            "vmess:"
            "vmess:"
            "vmess:"
          )
          printf '%s\n' "${MIRRA_VMESS[@]}" > vpn/subscription.txt

          # 2. Fastly CDN-fronтинг (VLESS/xhttp) — Россия не может блокировать Fastly глобально
          grep -E '^vless://.*fastly\.net' "$TMP" \
            | grep -v 'Telegram=' \
            | sort -u \
            | head -15 \
            >> vpn/subscription.txt || true

          # 3. Trojan WebSocket+TLS — тестируются из России каждые 2 часа
          grep -E '^trojan://.*type=ws' "$TMP" \
            | grep 'security=tls' \
            | grep -v 'Telegram=' \
            | sort -u \
            | head -8 \
            >> vpn/subscription.txt || true

          # 4. VMess WebSocket+TLS через CDN (не Cloudflare)
          grep -E '^vmess://' "$TMP" | sort -u | head -5 >> vpn/subscription.txt || true

          COUNT=$(wc -l < vpn/subscription.txt)
          echo "Configs written: $COUNT"

          if [ "$COUNT" -lt 5 ]; then
            echo "Too few configs ($COUNT), keeping existing file"
            git checkout -- vpn/subscription.txt
          fi

          rm -f "$TMP"

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vpn/subscription.txt
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "Auto-update VPN subscription $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push origin claude/xray-endpoint-happ-36Qc0
          fi
