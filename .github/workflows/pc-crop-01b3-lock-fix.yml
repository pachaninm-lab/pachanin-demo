name: PC-CROP-01B.3 one-shot advisory lock fix

on:
  push:
    branches: [agent/pc-crop-01b3-atomic-command-authority]
    paths: ['.github/workflows/pc-crop-01b3-lock-fix.yml']

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pc-crop-01b3-atomic-command-authority
          fetch-depth: 0
      - name: Patch Prisma-compatible advisory lock result and retire workflow
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('apps/api/src/modules/commodity-profiles/postgresql-commodity-profile-transaction.port.ts')
          text = path.read_text()
          old = '''SELECT pg_advisory_xact_lock(hashtextextended(${command.profileId}, 0))'''
          new = '''SELECT pg_advisory_xact_lock(hashtextextended(${command.profileId}, 0)) IS NULL AS "locked"'''
          if text.count(old) != 1:
              raise SystemExit(f'expected exactly one advisory lock expression, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          Path('.github/workflows/pc-crop-01b3-lock-fix.yml').unlink()
          PY
          git config user.name 'pc-crop-governed-bot'
          git config user.email 'pc-crop-governed-bot@users.noreply.github.com'
          git add apps/api/src/modules/commodity-profiles/postgresql-commodity-profile-transaction.port.ts .github/workflows/pc-crop-01b3-lock-fix.yml
          git commit -m 'PC-CROP-01B.3: return Prisma-compatible advisory lock evidence'
          git push origin HEAD:agent/pc-crop-01b3-atomic-command-authority
