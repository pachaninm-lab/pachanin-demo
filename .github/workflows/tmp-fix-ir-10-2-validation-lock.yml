name: Temporary IR-10.2 admission validation lock repair

on:
  push:
    branches:
      - agent/ir-10-2-logistics-postgresql-authority

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[ir-10-2-validation-lock-fixed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-2-logistics-postgresql-authority
          fetch-depth: 0
      - name: Remove application-side admission write lock
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/api/src/modules/deals/deal-command.service.ts')
          source = path.read_text()
          old = '''AND (admission.valid_until IS NULL OR admission.valid_until > now())
          FOR UPDATE
          LIMIT 1'''
          new = '''AND (admission.valid_until IS NULL OR admission.valid_until > now())
          LIMIT 1'''
          if source.count(old) != 1:
              raise SystemExit('normalized-admission FOR UPDATE anchor not found exactly once')
          path.write_text(source.replace(old, new, 1))
          PY
          rm -f .github/workflows/tmp-fix-ir-10-2-validation-lock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(logistics): keep admission validation read-only [ir-10-2-validation-lock-fixed]"
          git push origin HEAD:agent/ir-10-2-logistics-postgresql-authority
