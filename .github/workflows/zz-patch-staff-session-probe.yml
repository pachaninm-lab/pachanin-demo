name: patch staff session probe

on:
  push:
    branches:
      - ops/staff-control-center-evidence

permissions:
  contents: write

jobs:
  patch-ui:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/staff-control-center
          fetch-depth: 0
      - name: Replace expected unauthorized probe with a normalized session-state check
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          client = Path('apps/web/components/platform-v7/staff/StaffControlCenterClient.tsx')
          source = client.read_text()
          old = """    const probe = await requestJson<Organization[]>('control', 'organizations');
              if (probe.ok) {
                setOrganizations(Array.isArray(probe.data) ? probe.data : []);
                setPhase('ready');
              } else {
                setPhase('setup');
              }
          """
          new = """    const probe = await requestJson<{ active?: boolean; organizations?: Organization[] }>('control', 'session-state');
              if (probe.ok && probe.data?.active) {
                setOrganizations(Array.isArray(probe.data.organizations) ? probe.data.organizations : []);
                setPhase('ready');
              } else {
                setPhase('setup');
              }
          """
          if old not in source:
              raise SystemExit('Expected loadAssignments probe block was not found')
          client.write_text(source.replace(old, new, 1))

          test = Path('apps/web/tests/unit/platformV7StaffAccessControlPlane.test.ts')
          test_source = test.read_text()
          anchor = "expect(proxy).toContain(\"redirect: 'manual'\");"
          replacement = anchor + "\n    expect(proxy).toContain(\"path === 'session-state'\");\n    expect(client).toContain(\"'control', 'session-state'\");"
          if anchor not in test_source:
              raise SystemExit('Expected unit-test anchor was not found')
          test.write_text(test_source.replace(anchor, replacement, 1))
          PY
      - name: Commit UI fix
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'No change required'
            exit 0
          fi
          git config user.name 'platform-v7-ops'
          git config user.email 'platform-v7-ops@users.noreply.github.com'
          git add apps/web/components/platform-v7/staff/StaffControlCenterClient.tsx apps/web/tests/unit/platformV7StaffAccessControlPlane.test.ts
          git commit -m 'Use a normalized staff control-session probe'
          git push origin HEAD:ui/staff-control-center
