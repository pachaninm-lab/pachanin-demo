name: Diagnose live AI route resolution d6fe86

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/diagnose-ai-live-route-d6fe.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Probe public routes without mutating production
        shell: bash
        run: |
          set -euo pipefail
          base='https://xn----8sbjf4befbjgs9b.xn--p1ai'
          for route in \
            '/platform-v7/ai-in-action?lang=ru' \
            '/platform-v7/demo/ai?lang=ru' \
            '/platform-v7?lang=ru'
          do
            key="$(printf '%s' "$route" | tr '/?=&' '_____')"
            headers="/tmp/${key}.headers"
            body="/tmp/${key}.html"
            echo "===== ROUTE $route ====="
            curl -sS -L --compressed --max-time 40 \
              -H 'Accept-Language: ru-RU,ru;q=0.9' \
              -D "$headers" \
              -o "$body" \
              -w 'HTTP=%{http_code}\nEFFECTIVE_URL=%{url_effective}\nREDIRECTS=%{num_redirects}\nREMOTE_IP=%{remote_ip}\n' \
              "${base}${route}&probe=$(date +%s%N)"
            echo '-- headers --'
            grep -iE '^(HTTP/|location:|server:|x-pc-pathname:|x-nextjs-|cache-control:|content-type:)' "$headers" || true
            echo '-- identity --'
            printf 'BYTES='; wc -c < "$body"
            printf 'SHA256='; sha256sum "$body" | awk '{print $1}'
            printf 'TITLE='; grep -o '<title>[^<]*' "$body" | head -1 || true
            for marker in \
              'interactive-animated-ai-explainer' \
              'platform-v7-ai-in-action-authority' \
              'От события сделки — к понятному действию' \
              'Как платформа контролирует исполнение зерновой сделки' \
              'Оплата зависит от подтверждённых событий' \
              '/platform-v7/ai-in-action' \
              '/platform-v7/demo/ai'
            do
              if grep -Fq "$marker" "$body"; then
                echo "MARKER=yes :: $marker"
              else
                echo "MARKER=no  :: $marker"
              fi
            done
            echo
          done

      - name: Render canonical route in a mobile Chromium viewport
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ai-live-render
          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          if [[ -z "$browser" ]]; then
            echo 'Chromium executable is unavailable.' >&2
            exit 1
          fi
          "$browser" --version
          url="https://xn----8sbjf4befbjgs9b.xn--p1ai/platform-v7/ai-in-action?lang=ru&browser_probe=$(date +%s%N)"
          "$browser" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --hide-scrollbars \
            --window-size=390,844 \
            --virtual-time-budget=12000 \
            --dump-dom \
            "$url" > /tmp/ai-live-render/rendered.html
          "$browser" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --hide-scrollbars \
            --window-size=390,844 \
            --virtual-time-budget=12000 \
            --screenshot=/tmp/ai-live-render/ai-in-action-mobile.png \
            "$url"

          python3 - <<'PY'
          from html.parser import HTMLParser
          from pathlib import Path

          html = Path('/tmp/ai-live-render/rendered.html').read_text(encoding='utf-8')

          class Extractor(HTMLParser):
              def __init__(self):
                  super().__init__()
                  self.stack = []
                  self.title = []
                  self.headings = []
                  self.current_heading = None

              def handle_starttag(self, tag, attrs):
                  self.stack.append(tag)
                  if tag in {'h1', 'h2', 'h3'}:
                      self.current_heading = [tag, []]

              def handle_endtag(self, tag):
                  if self.current_heading and tag == self.current_heading[0]:
                      text = ' '.join(''.join(self.current_heading[1]).split())
                      if text:
                          self.headings.append((tag, text))
                      self.current_heading = None
                  if self.stack:
                      self.stack.pop()

              def handle_data(self, data):
                  if self.stack and self.stack[-1] == 'title':
                      self.title.append(data)
                  if self.current_heading:
                      self.current_heading[1].append(data)

          parser = Extractor()
          parser.feed(html)
          print('BROWSER_TITLE=' + ' '.join(''.join(parser.title).split()))
          for tag, text in parser.headings[:20]:
              print(f'BROWSER_{tag.upper()}={text}')

          markers = [
              'interactive-animated-ai-explainer',
              'platform-v7-ai-in-action-authority',
              'От события сделки',
              'Собирает разрешённый контекст',
              'Контур анализа',
              'Как платформа контролирует исполнение зерновой сделки',
              'Оплата зависит от подтверждённых событий',
          ]
          for marker in markers:
              print(f'BROWSER_MARKER={"yes" if marker in html else "no"} :: {marker}')
          PY

          file /tmp/ai-live-render/ai-in-action-mobile.png
          sha256sum /tmp/ai-live-render/ai-in-action-mobile.png

      - name: Upload mobile live-render evidence
        uses: actions/upload-artifact@v4
        with:
          name: ai-in-action-mobile-live-render
          path: /tmp/ai-live-render
          if-no-files-found: error
          retention-days: 7
