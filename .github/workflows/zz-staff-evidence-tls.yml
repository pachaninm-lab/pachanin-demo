name: harden staff evidence transport

on:
  push:
    branches:
      - ops/staff-control-center-evidence

permissions:
  contents: write

jobs:
  patch-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops/staff-control-center-evidence
          fetch-depth: 0
      - name: Enable ephemeral TLS for the mock API
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          server = Path('apps/web/scripts/staff-control-center-mock-server.mjs')
          text = server.read_text()
          text = text.replace("import http from 'node:http';", "import http from 'node:http';\nimport https from 'node:https';\nimport fs from 'node:fs';")
          text = text.replace("const server = http.createServer(async (request, response) => {", "const handler = async (request, response) => {")
          text = text.replace("});\n\nserver.listen(port, '127.0.0.1', () => {", "};\n\nconst tlsKey = process.env.STAFF_MOCK_TLS_KEY;\nconst tlsCert = process.env.STAFF_MOCK_TLS_CERT;\nconst server = tlsKey && tlsCert\n  ? https.createServer({ key: fs.readFileSync(tlsKey), cert: fs.readFileSync(tlsCert) }, handler)\n  : http.createServer(handler);\n\nserver.listen(port, '127.0.0.1', () => {")
          if 'https.createServer' not in text:
              raise SystemExit('TLS server patch failed')
          server.write_text(text)

          workflow = Path('.github/workflows/staff-control-center-evidence.yml')
          source = workflow.read_text()
          source = source.replace('API_URL: http://127.0.0.1:4010', 'API_URL: https://127.0.0.1:4010')
          source = source.replace("cd apps/web\n          node scripts/staff-control-center-mock-server.mjs", "cd apps/web\n          openssl req -x509 -newkey rsa:2048 -sha256 -nodes -days 1 -subj '/CN=127.0.0.1' -addext 'subjectAltName=IP:127.0.0.1' -keyout /tmp/staff-mock.key -out /tmp/staff-mock.crt >/dev/null 2>&1\n          export STAFF_MOCK_TLS_KEY=/tmp/staff-mock.key\n          export STAFF_MOCK_TLS_CERT=/tmp/staff-mock.crt\n          export NODE_TLS_REJECT_UNAUTHORIZED=0\n          node scripts/staff-control-center-mock-server.mjs")
          source = source.replace("NODE_ENV=development pnpm start", "NODE_TLS_REJECT_UNAUTHORIZED=0 NODE_ENV=production pnpm start")
          source = source.replace("curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:4010/staff/assignments/me", "curl -k --silent --output /dev/null --write-out '%{http_code}' https://127.0.0.1:4010/staff/assignments/me")
          workflow.write_text(source)
          PY
          git rm .github/workflows/zz-staff-evidence-tls.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/scripts/staff-control-center-mock-server.mjs .github/workflows/staff-control-center-evidence.yml
          git add -u
          git commit -m 'Use ephemeral TLS in staff evidence environment'
          git push origin HEAD:ops/staff-control-center-evidence
