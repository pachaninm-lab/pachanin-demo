name: PC-CROP-01B.3 one-shot exact-main sync

on:
  push:
    branches: [agent/pc-crop-01b3-atomic-command-authority]
    paths: ['.github/workflows/pc-crop-01b3-sync-main.yml']

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pc-crop-01b3-atomic-command-authority
          fetch-depth: 0
      - name: Merge current main and retire one-shot workflow
        run: |
          set -euo pipefail
          git config user.name 'pc-crop-governed-bot'
          git config user.email 'pc-crop-governed-bot@users.noreply.github.com'
          git fetch --no-tags origin main
          git merge --no-edit origin/main
          git rm .github/workflows/pc-crop-01b3-sync-main.yml
          git commit -m 'chore: retire one-shot PC-CROP-01B.3 main sync'
          git push origin HEAD:agent/pc-crop-01b3-atomic-command-authority
