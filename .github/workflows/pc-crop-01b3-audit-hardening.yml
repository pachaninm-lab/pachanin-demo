name: PC-CROP-01B.3 one-shot exact audit timestamp hardening

on:
  push:
    branches: [agent/pc-crop-01b3-atomic-command-authority]
    paths: ['.github/workflows/pc-crop-01b3-audit-hardening.yml']

permissions:
  contents: write
  issues: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pc-crop-01b3-atomic-command-authority
          fetch-depth: 0

      - name: Bind audit after-state to PostgreSQL returned timestamp
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          port = Path('apps/api/src/modules/commodity-profiles/postgresql-commodity-profile-transaction.port.ts')
          text = port.read_text()

          old = 'const aggregateVersion = await this.bumpProfileVersion('
          if text.count(old) != 2:
              raise SystemExit(f'aggregate declaration count={text.count(old)}')
          text = text.replace(old, 'const aggregateState = await this.bumpProfileVersion(')

          old = '      aggregateVersion,\n'
          if text.count(old) != 2:
              raise SystemExit(f'aggregate receipt argument count={text.count(old)}')
          text = text.replace(old, '      aggregateState.version,\n')

          old = '      { ...profile, version: aggregateVersion, updatedAt: committedAt },\n'
          new = '''      {
        ...profile,
        version: aggregateState.version,
        updatedAt: aggregateState.updatedAt,
      },
'''
          if text.count(old) != 1:
              raise SystemExit(f'regular after-state count={text.count(old)}')
          text = text.replace(old, new)

          old = '      this.state({ ...profile, version: aggregateVersion }, version),\n'
          new = '''      this.state({
        ...profile,
        version: aggregateState.version,
        updatedAt: aggregateState.updatedAt,
      }, version),
'''
          if text.count(old) != 1:
              raise SystemExit(f'draft after-state count={text.count(old)}')
          text = text.replace(old, new)

          changes = [
              (
                  '  ): Promise<bigint> {\n    const expected = BigInt(expectedVersion);\n    const rows = await tx.$queryRaw<Array<{ version: bigint }>>(Prisma.sql`',
                  '  ): Promise<{ version: bigint; updatedAt: Date }> {\n    const expected = BigInt(expectedVersion);\n    const rows = await tx.$queryRaw<Array<{ version: bigint; updatedAt: Date }>>(Prisma.sql`',
              ),
              ('      RETURNING "version"\n', '      RETURNING "version", "updatedAt"\n'),
              ('    return rows[0]!.version;\n', '    return rows[0]!;\n'),
          ]
          for before, after in changes:
              if text.count(before) != 1:
                  raise SystemExit(f'expected one occurrence of {before!r}, found {text.count(before)}')
              text = text.replace(before, after)
          port.write_text(text)

          spec = Path('apps/api/src/modules/commodity-profiles/postgresql-commodity-profile-transaction.port.spec.ts')
          spec_text = spec.read_text()
          before = '    [{ version: 8n }],\n'
          after = '    [{ version: 8n, updatedAt: now }],\n'
          if spec_text.count(before) != 1:
              raise SystemExit(f'aggregate fixture count={spec_text.count(before)}')
          spec.write_text(spec_text.replace(before, after))
          PY

      - name: Commit governed patch and retire workflow
        run: |
          set -euo pipefail
          git config user.name 'pc-crop-governed-bot'
          git config user.email 'pc-crop-governed-bot@users.noreply.github.com'
          git rm .github/workflows/pc-crop-01b3-audit-hardening.yml
          git add apps/api/src/modules/commodity-profiles/postgresql-commodity-profile-transaction.port.ts apps/api/src/modules/commodity-profiles/postgresql-commodity-profile-transaction.port.spec.ts
          git commit -m 'PC-CROP-01B.3: bind audit state to PostgreSQL timestamp'
          git push origin HEAD:agent/pc-crop-01b3-atomic-command-authority

      - name: Report failure to governing issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment 2911 --repo pachaninm-lab/pachanin-demo --body "PC-CROP-01B.3 audit timestamp hardening failed on source head ${{ github.sha }}. Inspect the push-triggered workflow before acceptance."
