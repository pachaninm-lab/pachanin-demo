name: remove standing staff authority

on:
  push:
    branches:
      - security/staff-access-control-plane-foundation

permissions:
  contents: write

jobs:
  patch-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/staff-access-control-plane-foundation
          fetch-depth: 0
      - name: Restrict unguarded endpoints to actor-owned records
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          service_path = Path('apps/api/src/modules/staff-access/staff-access.service.ts')
          text = service_path.read_text()
          old = """  async listRequests(user: RequestUser) {
    const roles = await this.requireAssignments(user);
    const canReadAll = roles.some(({ role }) => REQUEST_REVIEW_ROLES.has(role));
    return this.repository.listAccessRequests(this.repository.prisma, user.id, canReadAll);
  }
"""
          new = """  async listRequests(user: RequestUser) {
    await this.requireAssignments(user);
    return this.repository.listAccessRequests(this.repository.prisma, user.id, false);
  }

  async listReviewRequests(user: RequestUser) {
    await this.requirePermission(user, StaffPermission.STAFF_REQUEST_APPROVE);
    return this.repository.listAccessRequests(this.repository.prisma, user.id, true);
  }
"""
          if old not in text:
              raise SystemExit('listRequests anchor not found')
          text = text.replace(old, new)

          start = text.index('  async endSession(\n')
          end = text.index('  async activateBreakGlass(\n', start)
          replacement = """  async endSession(
    user: RequestUser,
    sessionId: string,
    reason = 'STAFF_ENDED',
    correlationId: string = randomUUID(),
  ) {
    const roles = await this.requireAssignments(user);
    const own = await this.repository.listActiveSessions(this.repository.prisma, user.id);
    const target = own.find((session) => session.id === sessionId);
    if (!target || !isStaffRole(target.staff_role)) throw new NotFoundException('Active staff session not found');
    const ended = await this.repository.endAccessSession(this.repository.prisma, sessionId, user.id, reason);
    if (!ended) throw new ConflictException('Staff session is no longer active');
    await this.repository.transaction((tx) => this.audit(tx, {
      actor: user,
      staffRole: roles[0].role,
      accessSessionId: sessionId,
      grantId: target.grant_id,
      action: 'staff.session.end',
      outcome: 'SUCCESS',
      reason,
      ticketId: target.ticket_id,
      correlationId,
    }));
    return { success: true, sessionId };
  }

  async revokeSession(
    user: RequestUser,
    sessionId: string,
    reason = 'STAFF_REVOKED',
    correlationId: string = randomUUID(),
  ) {
    const staffRole = await this.requirePermission(user, StaffPermission.STAFF_SESSION_REVOKE);
    const active = await this.repository.listActiveSessions(this.repository.prisma);
    const target = active.find((session) => session.id === sessionId);
    if (!target || !isStaffRole(target.staff_role)) throw new NotFoundException('Active staff session not found');
    const ended = await this.repository.endAccessSession(
      this.repository.prisma,
      sessionId,
      target.actor_user_id,
      reason,
    );
    if (!ended) throw new ConflictException('Staff session is no longer active');
    await this.repository.transaction((tx) => this.audit(tx, {
      actor: user,
      staffRole,
      accessSessionId: sessionId,
      grantId: target.grant_id,
      action: 'staff.session.revoke',
      outcome: 'SUCCESS',
      reason,
      ticketId: target.ticket_id,
      correlationId,
      metadata: { targetActorUserId: target.actor_user_id },
    }));
    return { success: true, sessionId };
  }

  async listActiveSessions(user: RequestUser) {
    await this.requireAssignments(user);
    return this.repository.listActiveSessions(this.repository.prisma, user.id);
  }

  async listAllActiveSessions(user: RequestUser) {
    await this.requirePermission(user, StaffPermission.STAFF_SESSION_READ);
    return this.repository.listActiveSessions(this.repository.prisma);
  }

"""
          text = text[:start] + replacement + text[end:]
          service_path.write_text(text)

          controller_path = Path('apps/api/src/modules/staff-access/staff-access.controller.ts')
          controller = controller_path.read_text()
          request_anchor = """  @Post('access/requests')
  requestAccess(
"""
          request_insert = """  @Get('access/requests/review')
  @UseGuards(StaffAccessGuard)
  @StaffPermissions(StaffPermission.STAFF_REQUEST_APPROVE)
  @StaffAccessModes(...CONTROL_MODES)
  reviewRequests(@Req() request: StaffRequest) {
    return this.access.listReviewRequests(request.user);
  }

  @Post('access/requests')
  requestAccess(
"""
          if request_anchor not in controller:
              raise SystemExit('request controller anchor not found')
          controller = controller.replace(request_anchor, request_insert, 1)

          session_anchor = """  @Post('access/sessions/:id/end')
  endSession(
"""
          session_insert = """  @Get('access/sessions/review')
  @UseGuards(StaffAccessGuard)
  @StaffPermissions(StaffPermission.STAFF_SESSION_READ)
  @StaffAccessModes(...CONTROL_MODES)
  reviewSessions(@Req() request: StaffRequest) {
    return this.access.listAllActiveSessions(request.user);
  }

  @Post('access/sessions/:id/revoke')
  @UseGuards(StaffAccessGuard)
  @StaffPermissions(StaffPermission.STAFF_SESSION_REVOKE)
  @StaffAccessModes(...CONTROL_MODES)
  revokeSession(
    @Req() request: StaffRequest,
    @Param('id') id: string,
    @Body() body: EndStaffSessionDto,
    @Headers('x-correlation-id') correlationId?: string,
  ) {
    return this.access.revokeSession(request.user, id, body.reason, correlationId);
  }

  @Post('access/sessions/:id/end')
  endSession(
"""
          if session_anchor not in controller:
              raise SystemExit('session controller anchor not found')
          controller = controller.replace(session_anchor, session_insert, 1)
          controller_path.write_text(controller)
          PY
          git rm .github/workflows/zz-staff-standing-authority.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/modules/staff-access/staff-access.service.ts apps/api/src/modules/staff-access/staff-access.controller.ts
          git add -u
          git commit -m 'Require active sessions for global staff review and revocation'
          git push origin HEAD:security/staff-access-control-plane-foundation
