name: apply evidence case isolation

on:
  pull_request:
    branches:
      - fix/public-auth-server-authority

permissions:
  contents: write

jobs:
  patch-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops/public-entry-preview-smoke-2323
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Isolate every browser case in a fresh page
        run: |
          python - <<'PY'
          from pathlib import Path
          file = Path('apps/web/scripts/public-entry-preview-smoke-2323.mjs')
          text = file.read_text()
          old = """for (const matrixCase of matrix) {
            const browser = await matrixCase.engine.launch({ headless: true });
            const context = await browser.newContext(matrixCase.context);
            const page = await context.newPage();
            try {
              for (const locale of Object.keys(locales)) {
                for (const routeCase of routes) {
                  report.cases.push(await runCase(page, matrixCase, routeCase, locale));
                  await persist();
                }
              }
              if (matrixCase.name === 'chromium-desktop-1440') {
                report.languageControl = await verifyLanguageControl(page);
                for (const locale of Object.keys(locales)) report.mockedMfa.push(await verifyMockedMfaFlow(page, locale));
                await persist();
              }
            } finally {
              await context.close();
              await browser.close();
            }
          }
          """
          new = """for (const matrixCase of matrix) {
            const browser = await matrixCase.engine.launch({ headless: true });
            const context = await browser.newContext(matrixCase.context);
            try {
              for (const locale of Object.keys(locales)) {
                for (const routeCase of routes) {
                  const page = await context.newPage();
                  try {
                    report.cases.push(await runCase(page, matrixCase, routeCase, locale));
                    await persist();
                  } finally {
                    await page.close();
                  }
                }
              }
              if (matrixCase.name === 'chromium-desktop-1440') {
                const languagePage = await context.newPage();
                try {
                  report.languageControl = await verifyLanguageControl(languagePage);
                } finally {
                  await languagePage.close();
                }
                for (const locale of Object.keys(locales)) {
                  const mfaPage = await context.newPage();
                  try {
                    report.mockedMfa.push(await verifyMockedMfaFlow(mfaPage, locale));
                  } finally {
                    await mfaPage.close();
                  }
                }
                await persist();
              }
            } finally {
              await context.close();
              await browser.close();
            }
          }
          """
          if old in text:
              file.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit('Expected browser loop was not found')
          PY
      - name: Commit when changed
        run: |
          if git diff --quiet; then
            echo 'Evidence cases are already isolated.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web/scripts/public-entry-preview-smoke-2323.mjs
          git commit -m 'test(ops): isolate browser cases by page'
          git push origin HEAD:ops/public-entry-preview-smoke-2323
