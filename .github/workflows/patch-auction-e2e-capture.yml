name: Patch auction E2E diagnostic capture

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-auction-e2e-capture.yml'

permissions:
  contents: write

jobs:
  patch-and-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Patch target branch
        run: |
          git fetch origin agent/ir-auction-atomic-execution-final
          git checkout agent/ir-auction-atomic-execution-final
          python <<'PY'
          from pathlib import Path
          path = Path('.github/workflows/auction-atomic-acceptance.yml')
          source = path.read_text()
          old = '''            --outputFile="../../$AUCTION_DIR/auction-jest.json" \\
            | tee "$AUCTION_DIR/auction-jest.log"'''
          new = '''            --outputFile="$GITHUB_WORKSPACE/$AUCTION_DIR/auction-jest.json" \\
            2>&1 | tee "$GITHUB_WORKSPACE/$AUCTION_DIR/auction-jest.log"'''
          if old not in source:
              raise SystemExit('auction E2E capture fragment not found')
          path.write_text(source.replace(old, new, 1))
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/workflows/auction-atomic-acceptance.yml
          git commit -m 'Capture full auction E2E diagnostics'
          git push origin HEAD:agent/ir-auction-atomic-execution-final
      - name: Remove workflow from main
        run: |
          git checkout main
          git pull --ff-only origin main
          git rm .github/workflows/patch-auction-e2e-capture.yml
          git commit -m 'Remove auction E2E capture patch workflow'
          git push origin HEAD:main
# trigger after workflow registration
