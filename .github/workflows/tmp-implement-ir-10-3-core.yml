name: Temporary IR-10.3 core implementation

on:
  push:
    branches:
      - agent/ir-10-3-labs-postgresql-authority-v2

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[ir-10-3-core-applied]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-3-labs-postgresql-authority-v2
          fetch-depth: 0
      - name: Install PostgreSQL-authoritative Labs core
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          root = Path('.')

          def write(path: str, content: str) -> None:
              target = root / path
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_text(content)

          write('apps/api/src/modules/labs/lab.repository.ts', r'''import type { RequestUser } from '../../common/types/request-user';

export const LAB_REPOSITORY = 'LAB_REPOSITORY';

export type LabCommand = Readonly<{
  commandId: string;
  idempotencyKey: string;
  expectedVersion: string;
  correlationId?: string;
}>;

export type CreateSampleCommand = LabCommand & Readonly<{
  dealId: string;
  shipmentId?: string;
  note?: string;
}>;

export type CollectSampleCommand = LabCommand & Readonly<{
  occurredAt: string;
  evidenceRef: string;
}>;

export type RecordLabTestCommand = LabCommand & Readonly<{
  metric: string;
  value: number;
  unit?: string;
  note?: string;
  methodId: string;
  equipmentId: string;
}>;

export type FinalizeSampleCommand = LabCommand & Readonly<{
  protocolBasisId: string;
  finalizedAt: string;
}>;

export type LabSampleRecord = Readonly<{
  id: string;
  dealId: string;
  shipmentId: string | null;
  acceptanceId: string | null;
  status: string;
  culture: string | null;
  protocol: string | null;
  gost: string | null;
  labId: string | null;
  labName: string | null;
  collectedAt: Date | null;
  finalizedAt: Date | null;
  certificateDocId: string | null;
  version: string;
  createdAt: Date;
}>;

export type LabTestRecord = Readonly<{
  id: string;
  sampleId: string;
  parameter: string;
  value: number;
  unit: string | null;
  normMin: number | null;
  normMax: number | null;
  passed: boolean;
  gradeDelta: number | null;
  recordedAt: Date;
}>;

export type CustodyEventRecord = Readonly<{
  id: string;
  sampleId: string;
  eventType: string;
  fromOrgId: string | null;
  toOrgId: string | null;
  actorUserId: string;
  evidenceFileId: string;
  occurredAt: Date;
  commandId: string;
}>;

export type LabWorkspace = Readonly<{
  sample: LabSampleRecord;
  tests: LabTestRecord[];
  custody: CustodyEventRecord[];
}>;

export type LabMutationResult = Readonly<{
  sample: LabSampleRecord;
  auditId: string;
  outboxId: string;
  duplicate: boolean;
  test?: LabTestRecord;
}>;

export interface LabRepository {
  list(user: RequestUser): Promise<LabSampleRecord[]>;
  getById(id: string, user: RequestUser): Promise<LabSampleRecord>;
  workspace(id: string, user: RequestUser): Promise<LabWorkspace>;
  create(command: CreateSampleCommand, user: RequestUser): Promise<LabMutationResult>;
  collect(id: string, command: CollectSampleCommand, user: RequestUser): Promise<LabMutationResult>;
  recordTest(id: string, command: RecordLabTestCommand, user: RequestUser): Promise<LabMutationResult>;
  finalize(id: string, command: FinalizeSampleCommand, user: RequestUser): Promise<LabMutationResult>;
}
''')

