name: Temporary IR-10.2 PR finalizer

on:
  pull_request:
    types: [synchronize]

permissions:
  contents: write

concurrency:
  group: tmp-ir10-pr-finalizer
  cancel-in-progress: true

jobs:
  patch:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.head.ref == 'agent/ir-10-2-logistics-postgresql-authority' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-2-logistics-postgresql-authority
          fetch-depth: 0
      - name: Execute embedded finalizer
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          source = Path('.github/workflows/tmp-ir-10-2-authority-finalize.yml').read_text().splitlines()
          start = next(i for i, line in enumerate(source) if "python3 - <<'PY'" in line) + 1
          end = next(i for i in range(start, len(source)) if source[i].strip() == 'PY')
          body = '\n'.join(line[10:] if line.startswith('          ') else line for line in source[start:end]) + '\n'
          Path('/tmp/ir10-finalize.py').write_text(body)
          PY
          python3 /tmp/ir10-finalize.py
          rm -f .github/workflows/tmp-ir-10-2-authority-finalize.yml
          rm -f .github/workflows/tmp-ir10-pr-kick.yml
      - name: Commit exact correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(logistics): finalize canonical PostgreSQL authority [ir10-authority-finalized]'
          git push origin HEAD:agent/ir-10-2-logistics-postgresql-authority
