name: Compact exact-main Actions repair scope

on:
  pull_request:
    paths:
      - '.github/workflows/compact-exact-main-actions-scope.yml'

permissions:
  contents: write

jobs:
  compact:
    if: github.event.pull_request.head.ref == 'fix/exact-main-actions-2659'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Restore canonical compact JSON
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const file = 'docs/platform-v7/autopilot/autopilot-state.json';
          const state = JSON.parse(fs.readFileSync(file, 'utf8'));
          fs.writeFileSync(file, `${JSON.stringify(state)}\n`);
          NODE

          if git diff --quiet -- docs/platform-v7/autopilot/autopilot-state.json; then
            echo 'State file is already compact.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'chore(autopilot): preserve compact state format'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
