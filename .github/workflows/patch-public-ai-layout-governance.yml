name: Patch public AI layout governance scope

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/patch-public-ai-layout-governance.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout pull request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Bind the fix branch to an exact source-controlled scope
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          old_scope_path = Path('docs/platform-v7/autopilot/scopes/feat-assistant-universal-understanding.json')
          old_scope = json.loads(old_scope_path.read_text(encoding='utf-8'))
          old_scope['allowedPaths'] = [
              item for item in old_scope['allowedPaths']
              if item != 'apps/web/app/platform-v7/layout.tsx'
          ]
          old_scope_path.write_text(json.dumps(old_scope, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          new_scope_path = Path('docs/platform-v7/autopilot/scopes/fix-public-ai-layout-authority.json')
          new_scope = {
              'branch': 'fix/public-ai-layout-authority',
              'status': 'active',
              'purpose': 'Restore the canonical public AI-in-action route through the platform-v7 layout authority, link the homepage directly to it, and prevent a client-side notFound after hydration.',
              'approvedBy': 'independent-authority-pr',
              'allowedPaths': [
                  'apps/web/app/platform-v7/layout.tsx',
                  'apps/web/app/platform-v7/page.tsx',
                  'apps/web/tests/unit/platformV7PublicAiRouteAuthority.test.ts',
                  'docs/platform-v7/autopilot/scopes/fix-public-ai-layout-authority.json',
                  'scripts/p7-autopilot-guard.sh',
              ],
              'forbiddenCapabilities': [
                  'autonomous consequential commands',
                  'cross-role or cross-tenant access',
                  'external model calls from the public demonstration',
                  'production infrastructure mutation',
                  'claims that public mode accesses account or real-deal data',
              ],
          }
          new_scope_path.write_text(json.dumps(new_scope, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')

          guard_path = Path('scripts/p7-autopilot-guard.sh')
          guard = guard_path.read_text(encoding='utf-8')
          anchor = "  'feat/assistant-universal-understanding': 'docs/platform-v7/autopilot/scopes/feat-assistant-universal-understanding.json',\n"
          addition = "  'fix/public-ai-layout-authority': 'docs/platform-v7/autopilot/scopes/fix-public-ai-layout-authority.json',\n"
          if addition not in guard:
              if anchor not in guard:
                  raise SystemExit('source-controlled scope map anchor is missing')
              guard = guard.replace(anchor, anchor + addition, 1)
              guard_path.write_text(guard, encoding='utf-8')
          PY

          git diff --check
          node -e "JSON.parse(require('fs').readFileSync('docs/platform-v7/autopilot/scopes/fix-public-ai-layout-authority.json','utf8'))"
          grep -F "'fix/public-ai-layout-authority': 'docs/platform-v7/autopilot/scopes/fix-public-ai-layout-authority.json'" scripts/p7-autopilot-guard.sh

      - name: Commit exact governance binding
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            docs/platform-v7/autopilot/scopes/feat-assistant-universal-understanding.json \
            docs/platform-v7/autopilot/scopes/fix-public-ai-layout-authority.json \
            scripts/p7-autopilot-guard.sh
          git commit -m 'Bind public AI layout fix to exact governance scope'
          git push origin "HEAD:${{ github.event.pull_request.head.ref }}"
