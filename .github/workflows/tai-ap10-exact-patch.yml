name: TAI AP-10 exact reviewed patch

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap10-exact-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-10-operational-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply marker-based reviewed authority changes
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          operations = Path("apps/tai/tai/operations.py")
          text = operations.read_text()
          start_marker = "@dataclass(frozen=True, slots=True)\nclass SLOAssessment:"
          end_marker = "\ndef assess_slo(\n"
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          assessment_block = '''@dataclass(frozen=True, slots=True)
          class SLOAssessment:
              slo_id: str
              indicator: OperationalIndicator
              exact_head_sha: str
              status: SLOAssessmentStatus
              value: float | None
              target: float
              sample_count: int
              reason: str | None
              observation_id: str | None
              assessed_at: datetime
              assessment_sha256: str
          
              def __post_init__(self) -> None:
                  _portable(self.slo_id, "slo_id")
                  _digest(self.exact_head_sha, "exact_head_sha")
                  if self.value is not None:
                      _finite(self.value, "assessment value")
                  _finite(self.target, "assessment target")
                  if self.sample_count < 0:
                      raise ValueError("assessment sample_count must not be negative")
                  if self.reason is not None and not self.reason.strip():
                      raise ValueError("assessment reason must be null or non-blank")
                  if self.observation_id is not None:
                      _portable(self.observation_id, "observation_id")
                  _aware(self.assessed_at, "assessed_at")
                  _digest(self.assessment_sha256, "assessment_sha256")
                  expected = slo_assessment_sha256(
                      slo_id=self.slo_id,
                      indicator=self.indicator,
                      exact_head_sha=self.exact_head_sha,
                      status=self.status,
                      value=self.value,
                      target=self.target,
                      sample_count=self.sample_count,
                      reason=self.reason,
                      observation_id=self.observation_id,
                      assessed_at=self.assessed_at,
                  )
                  if self.assessment_sha256 != expected:
                      raise ValueError("SLO assessment digest does not match assessment fields")
          
          
          def slo_assessment_sha256(
              *,
              slo_id: str,
              indicator: OperationalIndicator,
              exact_head_sha: str,
              status: SLOAssessmentStatus,
              value: float | None,
              target: float,
              sample_count: int,
              reason: str | None,
              observation_id: str | None,
              assessed_at: datetime,
          ) -> str:
              return _sha256_json(
                  {
                      "assessed_at": assessed_at.isoformat(),
                      "exact_head_sha": exact_head_sha,
                      "indicator": indicator.value,
                      "observation_id": observation_id,
                      "reason": reason,
                      "sample_count": sample_count,
                      "slo_id": slo_id,
                      "status": status.value,
                      "target": target,
                      "value": value,
                  }
              )
          
          '''
          text = text[:start] + assessment_block + text[end + 1:]

          assess_start = text.index("def assess_slo(\n")
          payload_start = text.index("    payload = {\n", assess_start)
          threshold_marker = "\n\ndef _threshold_status("
          payload_end = text.index(threshold_marker, payload_start)
          replacement = '''    assessment_sha256 = slo_assessment_sha256(
              slo_id=definition.slo_id,
              indicator=definition.indicator,
              exact_head_sha=exact_head_sha,
              status=status,
              value=value,
              target=definition.target,
              sample_count=sample_count,
              reason=reason,
              observation_id=observation_id,
              assessed_at=assessed_at,
          )
              return SLOAssessment(
                  slo_id=definition.slo_id,
                  indicator=definition.indicator,
                  exact_head_sha=exact_head_sha,
                  status=status,
                  value=value,
                  target=definition.target,
                  sample_count=sample_count,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=assessed_at,
                  assessment_sha256=assessment_sha256,
              )
          '''
          text = text[:payload_start] + replacement + text[payload_end:]

          readiness_marker = "        status_counts = {\n"
          count = text.count(readiness_marker)
          if count != 1:
              raise SystemExit(f"status-count marker mismatch: {count}")
          text = text.replace(
              readiness_marker,
              '''        for item in assessments_by_indicator.values():
                  if item.exact_head_sha != exact_head_sha:
                      reasons.append("SLO_EXACT_HEAD_MISMATCH")
                  if item.assessed_at > decided_at:
                      reasons.append("SLO_ASSESSMENT_FROM_FUTURE")
              status_counts = {
          ''',
              1,
          )
          text = text.replace(
              "    assert previous is not None\n    assert status is not None\n",
              '    if previous is None or status is None:\n'
              '        raise RuntimeError("incident replay produced incomplete state")\n',
              1,
          )
          operations.write_text(text)

          test_operations = Path("apps/tai/tests/test_operations.py")
          text = test_operations.read_text()
          if "    slo_assessment_sha256,\n" not in text:
              text = text.replace(
                  "    replay_incident,\n",
                  "    replay_incident,\n    slo_assessment_sha256,\n",
                  1,
              )
          helper_start = text.index("def _assessment(\n")
          helper_end = text.index("\ndef _evidence(\n", helper_start)
          helper = '''def _assessment(
              indicator: OperationalIndicator,
              status: SLOAssessmentStatus = SLOAssessmentStatus.PASS,
          ) -> SLOAssessment:
              slo_id = f"tai.{indicator.value.casefold()}"
              value = 1.0 if status is not SLOAssessmentStatus.UNKNOWN else None
              reason = None if status is not SLOAssessmentStatus.UNKNOWN else "MISSING_OBSERVATION"
              observation_id = (
                  f"obs.{indicator.value.casefold()}"
                  if status is not SLOAssessmentStatus.UNKNOWN
                  else None
              )
              digest = slo_assessment_sha256(
                  slo_id=slo_id,
                  indicator=indicator,
                  exact_head_sha=HEAD,
                  status=status,
                  value=value,
                  target=1.0,
                  sample_count=1000,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=NOW,
              )
              return SLOAssessment(
                  slo_id=slo_id,
                  indicator=indicator,
                  exact_head_sha=HEAD,
                  status=status,
                  value=value,
                  target=1.0,
                  sample_count=1000,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=NOW,
                  assessment_sha256=digest,
              )
          
          '''
          text = text[:helper_start] + helper + text[helper_end + 1:]
          text = text.replace(
              '        artifact_sha256=(kind.value.casefold()[0] * 64),\n',
              '        artifact_sha256="c" * 64,\n',
              1,
          )
          test_operations.write_text(text)

          replace_once(
              "apps/tai/tai/migrations/0010_operational_authority.sql",
              "    value DOUBLE PRECISION NOT NULL CHECK (isfinite(value)),\n",
              "    value DOUBLE PRECISION NOT NULL CHECK (\n"
              "        value NOT IN (\n"
              "            'NaN'::DOUBLE PRECISION,\n"
              "            'Infinity'::DOUBLE PRECISION,\n"
              "            '-Infinity'::DOUBLE PRECISION\n"
              "        )\n"
              "    ),\n",
          )
          PY
          python -m pip install 'ruff>=0.11,<1'
          ruff format \
            apps/tai/tai/operations.py \
            apps/tai/tai/postgres_operations.py \
            apps/tai/tests/test_operations.py \
            apps/tai/tests/test_postgres_operations.py
          rm .github/workflows/tai-ap10-exact-patch.yml
      - name: Commit exact patch and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-10: bind SLO assessments to exact head and fix static contracts'
          git push origin HEAD:tai/ap-10-operational-authority
