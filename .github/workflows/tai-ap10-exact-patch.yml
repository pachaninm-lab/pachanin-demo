name: TAI AP-10 exact reviewed patch

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap10-exact-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-10-operational-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Bind SLO assessment domain to exact head
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tai/operations.py')
          text = path.read_text()
          start_marker = '@dataclass(frozen=True, slots=True)\nclass SLOAssessment:'
          end_marker = '\ndef assess_slo(\n'
          start = text.index(start_marker)
          end = text.index(end_marker, start)
          block = '''@dataclass(frozen=True, slots=True)
          class SLOAssessment:
              slo_id: str
              indicator: OperationalIndicator
              exact_head_sha: str
              status: SLOAssessmentStatus
              value: float | None
              target: float
              sample_count: int
              reason: str | None
              observation_id: str | None
              assessed_at: datetime
              assessment_sha256: str
          
              def __post_init__(self) -> None:
                  _portable(self.slo_id, "slo_id")
                  _digest(self.exact_head_sha, "exact_head_sha")
                  if self.value is not None:
                      _finite(self.value, "assessment value")
                  _finite(self.target, "assessment target")
                  if self.sample_count < 0:
                      raise ValueError("assessment sample_count must not be negative")
                  if self.reason is not None and not self.reason.strip():
                      raise ValueError("assessment reason must be null or non-blank")
                  if self.observation_id is not None:
                      _portable(self.observation_id, "observation_id")
                  _aware(self.assessed_at, "assessed_at")
                  _digest(self.assessment_sha256, "assessment_sha256")
                  expected = slo_assessment_sha256(
                      slo_id=self.slo_id,
                      indicator=self.indicator,
                      exact_head_sha=self.exact_head_sha,
                      status=self.status,
                      value=self.value,
                      target=self.target,
                      sample_count=self.sample_count,
                      reason=self.reason,
                      observation_id=self.observation_id,
                      assessed_at=self.assessed_at,
                  )
                  if self.assessment_sha256 != expected:
                      raise ValueError("SLO assessment digest does not match assessment fields")
          
          
          def slo_assessment_sha256(
              *,
              slo_id: str,
              indicator: OperationalIndicator,
              exact_head_sha: str,
              status: SLOAssessmentStatus,
              value: float | None,
              target: float,
              sample_count: int,
              reason: str | None,
              observation_id: str | None,
              assessed_at: datetime,
          ) -> str:
              return _sha256_json(
                  {
                      "assessed_at": assessed_at.isoformat(),
                      "exact_head_sha": exact_head_sha,
                      "indicator": indicator.value,
                      "observation_id": observation_id,
                      "reason": reason,
                      "sample_count": sample_count,
                      "slo_id": slo_id,
                      "status": status.value,
                      "target": target,
                      "value": value,
                  }
              )
          
          '''
          path.write_text(text[:start] + block + text[end + 1:])
          PY

      - name: Bind SLO assessment calculation and readiness checks
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tai/operations.py')
          text = path.read_text()
          assess_start = text.index('def assess_slo(\n')
          payload_start = text.index('    payload = {\n', assess_start)
          payload_end = text.index('\n\ndef _threshold_status(', payload_start)
          replacement = '''    assessment_sha256 = slo_assessment_sha256(
              slo_id=definition.slo_id,
              indicator=definition.indicator,
              exact_head_sha=exact_head_sha,
              status=status,
              value=value,
              target=definition.target,
              sample_count=sample_count,
              reason=reason,
              observation_id=observation_id,
              assessed_at=assessed_at,
          )
              return SLOAssessment(
                  slo_id=definition.slo_id,
                  indicator=definition.indicator,
                  exact_head_sha=exact_head_sha,
                  status=status,
                  value=value,
                  target=definition.target,
                  sample_count=sample_count,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=assessed_at,
                  assessment_sha256=assessment_sha256,
              )
          '''
          text = text[:payload_start] + replacement + text[payload_end:]
          marker = '        status_counts = {\n'
          if text.count(marker) != 1:
              raise SystemExit(f'status_counts marker count={text.count(marker)}')
          text = text.replace(
              marker,
              '''        for item in assessments_by_indicator.values():
                  if item.exact_head_sha != exact_head_sha:
                      reasons.append("SLO_EXACT_HEAD_MISMATCH")
                  if item.assessed_at > decided_at:
                      reasons.append("SLO_ASSESSMENT_FROM_FUTURE")
              status_counts = {
          ''',
              1,
          )
          assert_block = '    assert previous is not None\n    assert status is not None\n'
          if text.count(assert_block) != 1:
              raise SystemExit(f'assert block count={text.count(assert_block)}')
          text = text.replace(
              assert_block,
              '    if previous is None or status is None:\n'
              '        raise RuntimeError("incident replay produced incomplete state")\n',
              1,
          )
          path.write_text(text)
          PY

      - name: Update AP-10 domain tests for exact-head assessment digests
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tests/test_operations.py')
          text = path.read_text()
          if '    slo_assessment_sha256,\n' not in text:
              marker = '    replay_incident,\n'
              if text.count(marker) != 1:
                  raise SystemExit(f'import marker count={text.count(marker)}')
              text = text.replace(marker, marker + '    slo_assessment_sha256,\n', 1)
          start = text.index('def _assessment(\n')
          end = text.index('\ndef _evidence(\n', start)
          helper = '''def _assessment(
              indicator: OperationalIndicator,
              status: SLOAssessmentStatus = SLOAssessmentStatus.PASS,
          ) -> SLOAssessment:
              slo_id = f"tai.{indicator.value.casefold()}"
              value = 1.0 if status is not SLOAssessmentStatus.UNKNOWN else None
              reason = None if status is not SLOAssessmentStatus.UNKNOWN else "MISSING_OBSERVATION"
              observation_id = (
                  f"obs.{indicator.value.casefold()}"
                  if status is not SLOAssessmentStatus.UNKNOWN
                  else None
              )
              digest = slo_assessment_sha256(
                  slo_id=slo_id,
                  indicator=indicator,
                  exact_head_sha=HEAD,
                  status=status,
                  value=value,
                  target=1.0,
                  sample_count=1000,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=NOW,
              )
              return SLOAssessment(
                  slo_id=slo_id,
                  indicator=indicator,
                  exact_head_sha=HEAD,
                  status=status,
                  value=value,
                  target=1.0,
                  sample_count=1000,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=NOW,
                  assessment_sha256=digest,
              )
          
          '''
          text = text[:start] + helper + text[end + 1:]
          old = '        artifact_sha256=(kind.value.casefold()[0] * 64),\n'
          if text.count(old) != 1:
              raise SystemExit(f'artifact digest marker count={text.count(old)}')
          text = text.replace(old, '        artifact_sha256="c" * 64,\n', 1)
          path.write_text(text)
          PY

      - name: Correct PostgreSQL finite-value constraint
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tai/migrations/0010_operational_authority.sql')
          text = path.read_text()
          old = '    value DOUBLE PRECISION NOT NULL CHECK (isfinite(value)),\n'
          new = '''    value DOUBLE PRECISION NOT NULL CHECK (
              value NOT IN (
                  'NaN'::DOUBLE PRECISION,
                  'Infinity'::DOUBLE PRECISION,
                  '-Infinity'::DOUBLE PRECISION
              )
          ),
          '''
          if text.count(old) != 1:
              raise SystemExit(f'finite constraint marker count={text.count(old)}')
          path.write_text(text.replace(old, new, 1))
          PY

      - name: Format only AP-10 Python files
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install 'ruff>=0.11,<1'
          ruff format \
            apps/tai/tai/operations.py \
            apps/tai/tai/postgres_operations.py \
            apps/tai/tests/test_operations.py \
            apps/tai/tests/test_postgres_operations.py

      - name: Commit exact changes and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/tai-ap10-exact-patch.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-10: bind SLO assessments to exact head and fix static contracts'
          git push origin HEAD:tai/ap-10-operational-authority
