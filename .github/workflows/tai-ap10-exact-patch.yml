name: TAI AP-10 exact reviewed patch

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap10-exact-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-10-operational-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact reviewed operational hardening
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one match, found {count}: {old[:80]!r}")
              file.write_text(text.replace(old, new, 1))

          operations = Path("apps/tai/tai/operations.py")
          text = operations.read_text()
          start = text.index("@dataclass(frozen=True, slots=True)\nclass SLOAssessment:")
          end = text.index("\ndef assess_slo(\n", start)
          assessment_block = '''@dataclass(frozen=True, slots=True)
          class SLOAssessment:
              slo_id: str
              indicator: OperationalIndicator
              exact_head_sha: str
              status: SLOAssessmentStatus
              value: float | None
              target: float
              sample_count: int
              reason: str | None
              observation_id: str | None
              assessed_at: datetime
              assessment_sha256: str
          
              def __post_init__(self) -> None:
                  _portable(self.slo_id, "slo_id")
                  _digest(self.exact_head_sha, "exact_head_sha")
                  if self.value is not None:
                      _finite(self.value, "assessment value")
                  _finite(self.target, "assessment target")
                  if self.sample_count < 0:
                      raise ValueError("assessment sample_count must not be negative")
                  if self.reason is not None and not self.reason.strip():
                      raise ValueError("assessment reason must be null or non-blank")
                  if self.observation_id is not None:
                      _portable(self.observation_id, "observation_id")
                  _aware(self.assessed_at, "assessed_at")
                  _digest(self.assessment_sha256, "assessment_sha256")
                  expected = slo_assessment_sha256(
                      slo_id=self.slo_id,
                      indicator=self.indicator,
                      exact_head_sha=self.exact_head_sha,
                      status=self.status,
                      value=self.value,
                      target=self.target,
                      sample_count=self.sample_count,
                      reason=self.reason,
                      observation_id=self.observation_id,
                      assessed_at=self.assessed_at,
                  )
                  if self.assessment_sha256 != expected:
                      raise ValueError("SLO assessment digest does not match assessment fields")
          
          
          def slo_assessment_sha256(
              *,
              slo_id: str,
              indicator: OperationalIndicator,
              exact_head_sha: str,
              status: SLOAssessmentStatus,
              value: float | None,
              target: float,
              sample_count: int,
              reason: str | None,
              observation_id: str | None,
              assessed_at: datetime,
          ) -> str:
              return _sha256_json(
                  {
                      "assessed_at": assessed_at.isoformat(),
                      "exact_head_sha": exact_head_sha,
                      "indicator": indicator.value,
                      "observation_id": observation_id,
                      "reason": reason,
                      "sample_count": sample_count,
                      "slo_id": slo_id,
                      "status": status.value,
                      "target": target,
                      "value": value,
                  }
              )
          
          '''
          text = text[:start] + assessment_block + text[end + 1:]
          operations.write_text(text)

          replace_once(
              str(operations),
              '''    payload = {
                  "assessed_at": assessed_at.isoformat(),
                  "indicator": definition.indicator.value,
                  "observation_id": observation_id,
                  "reason": reason,
                  "sample_count": sample_count,
                  "slo_id": definition.slo_id,
                  "status": status.value,
                  "target": definition.target,
                  "value": value,
              }
              return SLOAssessment(
                  slo_id=definition.slo_id,
                  indicator=definition.indicator,
                  status=status,
                  value=value,
                  target=definition.target,
                  sample_count=sample_count,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=assessed_at,
                  assessment_sha256=_sha256_json(payload),
              )
          ''',
              '''    assessment_sha256 = slo_assessment_sha256(
                  slo_id=definition.slo_id,
                  indicator=definition.indicator,
                  exact_head_sha=exact_head_sha,
                  status=status,
                  value=value,
                  target=definition.target,
                  sample_count=sample_count,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=assessed_at,
              )
              return SLOAssessment(
                  slo_id=definition.slo_id,
                  indicator=definition.indicator,
                  exact_head_sha=exact_head_sha,
                  status=status,
                  value=value,
                  target=definition.target,
                  sample_count=sample_count,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=assessed_at,
                  assessment_sha256=assessment_sha256,
              )
          ''',
          )
          replace_once(
              str(operations),
              '''        status_counts = {
          ''',
              '''        for item in assessments_by_indicator.values():
                  if item.exact_head_sha != exact_head_sha:
                      reasons.append("SLO_EXACT_HEAD_MISMATCH")
                  if item.assessed_at > decided_at:
                      reasons.append("SLO_ASSESSMENT_FROM_FUTURE")
              status_counts = {
          ''',
          )
          replace_once(
              str(operations),
              '''    assert previous is not None
              assert status is not None
          ''',
              '''    if previous is None or status is None:
                  raise RuntimeError("incident replay produced incomplete state")
          ''',
          )

          test_operations = Path("apps/tai/tests/test_operations.py")
          text = test_operations.read_text()
          text = text.replace(
              "    replay_incident,\n",
              "    replay_incident,\n    slo_assessment_sha256,\n",
              1,
          )
          start = text.index("def _assessment(\n")
          end = text.index("\ndef _evidence(\n", start)
          helper = '''def _assessment(
              indicator: OperationalIndicator,
              status: SLOAssessmentStatus = SLOAssessmentStatus.PASS,
          ) -> SLOAssessment:
              slo_id = f"tai.{indicator.value.casefold()}"
              value = 1.0 if status is not SLOAssessmentStatus.UNKNOWN else None
              reason = None if status is not SLOAssessmentStatus.UNKNOWN else "MISSING_OBSERVATION"
              observation_id = (
                  f"obs.{indicator.value.casefold()}"
                  if status is not SLOAssessmentStatus.UNKNOWN
                  else None
              )
              digest = slo_assessment_sha256(
                  slo_id=slo_id,
                  indicator=indicator,
                  exact_head_sha=HEAD,
                  status=status,
                  value=value,
                  target=1.0,
                  sample_count=1000,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=NOW,
              )
              return SLOAssessment(
                  slo_id=slo_id,
                  indicator=indicator,
                  exact_head_sha=HEAD,
                  status=status,
                  value=value,
                  target=1.0,
                  sample_count=1000,
                  reason=reason,
                  observation_id=observation_id,
                  assessed_at=NOW,
                  assessment_sha256=digest,
              )
          
          '''
          text = text[:start] + helper + text[end + 1:]
          test_operations.write_text(text)

          replace_once(
              str(test_operations),
              '        artifact_sha256=(kind.value.casefold()[0] * 64),\n',
              '        artifact_sha256="c" * 64,\n',
          )
          replace_once(
              str(test_operations),
              '    passed = assess_slo(definition, _observation(definition, value=99.99), exact_head_sha=HEAD, assessed_at=NOW)\n',
              '    passed = assess_slo(\n'
              '        definition,\n'
              '        _observation(definition, value=99.99),\n'
              '        exact_head_sha=HEAD,\n'
              '        assessed_at=NOW,\n'
              '    )\n',
          )
          replace_once(
              str(test_operations),
              '    at_risk = assess_slo(definition, _observation(definition, value=99.92), exact_head_sha=HEAD, assessed_at=NOW)\n',
              '    at_risk = assess_slo(\n'
              '        definition,\n'
              '        _observation(definition, value=99.92),\n'
              '        exact_head_sha=HEAD,\n'
              '        assessed_at=NOW,\n'
              '    )\n',
          )
          replace_once(
              str(test_operations),
              '    breached = assess_slo(definition, _observation(definition, value=99.8), exact_head_sha=HEAD, assessed_at=NOW)\n',
              '    breached = assess_slo(\n'
              '        definition,\n'
              '        _observation(definition, value=99.8),\n'
              '        exact_head_sha=HEAD,\n'
              '        assessed_at=NOW,\n'
              '    )\n',
          )
          for old, expected in (
              ('    assert assess_slo(definition, _observation(definition, value=0.1), exact_head_sha=HEAD, assessed_at=NOW).status is SLOAssessmentStatus.PASS\n', 'PASS'),
              ('    assert assess_slo(definition, _observation(definition, value=0.45), exact_head_sha=HEAD, assessed_at=NOW).status is SLOAssessmentStatus.AT_RISK\n', 'AT_RISK'),
              ('    assert assess_slo(definition, _observation(definition, value=0.6), exact_head_sha=HEAD, assessed_at=NOW).status is SLOAssessmentStatus.BREACHED\n', 'BREACHED'),
          ):
              value = old.split("value=")[1].split(")")[0]
              new = (
                  '    result = assess_slo(\n'
                  '        definition,\n'
                  f'        _observation(definition, value={value}),\n'
                  '        exact_head_sha=HEAD,\n'
                  '        assessed_at=NOW,\n'
                  '    )\n'
                  f'    assert result.status is SLOAssessmentStatus.{expected}\n'
              )
              replace_once(str(test_operations), old, new)

          postgres_tests = "apps/tai/tests/test_postgres_operations.py"
          replace_once(
              postgres_tests,
              '    assert "INSERT INTO tai_retention_holds" in create_factory.connection.cursor_instance.executions[0][0]\n',
              '    create_query = create_factory.connection.cursor_instance.executions[0][0]\n'
              '    assert "INSERT INTO tai_retention_holds" in create_query\n',
          )
          replace_once(
              postgres_tests,
              '    assert "version = version + 1" in update_factory.connection.cursor_instance.executions[0][0]\n',
              '    update_query = update_factory.connection.cursor_instance.executions[0][0]\n'
              '    assert "version = version + 1" in update_query\n',
          )

          replace_once(
              "apps/tai/tai/migrations/0010_operational_authority.sql",
              "    value DOUBLE PRECISION NOT NULL CHECK (isfinite(value)),\n",
              "    value DOUBLE PRECISION NOT NULL CHECK (\n"
              "        value NOT IN ('NaN'::DOUBLE PRECISION, 'Infinity'::DOUBLE PRECISION, '-Infinity'::DOUBLE PRECISION)\n"
              "    ),\n",
          )
          Path('.github/workflows/tai-ap10-exact-patch.yml').unlink()
          PY
      - name: Commit exact patch and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-10: bind SLO assessments to exact head and fix static contracts'
          git push origin HEAD:tai/ap-10-operational-authority
