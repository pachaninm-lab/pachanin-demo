name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/platform-v7-one-deal-*'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/platform-v7-one-deal-*'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Platform-v7 unit checks
        run: |
          set -o pipefail
          pnpm --filter @pc/web exec vitest run tests/unit/shellRolePolicy.test.ts tests/unit/platformV7DriverRoleShellGuard.test.ts tests/unit/platformV7BankPaymentBasisRoutesManifest.test.ts tests/unit/platformV7RootWorkEntry.test.ts tests/unit/roleContinuityPanel.test.tsx 2>&1 | tee /tmp/ci-web-unit.log

      - name: Upload web unit log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-web-unit-log
          path: /tmp/ci-web-unit.log

  one-deal-e2e:
    name: "12 roles · 19 commands · PostgreSQL RLS"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: one_deal_admin
          POSTGRES_PASSWORD: ephemeral_one_deal_admin_only
          POSTGRES_DB: one_deal_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U one_deal_admin -d one_deal_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      ONE_DEAL_ADMIN_URL: postgresql://one_deal_admin:ephemeral_one_deal_admin_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_APP_URL: postgresql://one_deal_app:ephemeral_one_deal_app_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_EVIDENCE_LOG: /tmp/platform-v7-one-deal-e2e.log
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ephemeral signing secrets
        shell: bash
        run: |
          echo "JWT_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "BANK_HMAC_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"

      - name: Run industrial one-deal exploitation gate
        shell: bash
        run: bash scripts/platform-v7-one-deal-e2e.sh

      - name: Upload one-deal evidence log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-one-deal-e2e-evidence
          path: /tmp/platform-v7-one-deal-e2e.log
          if-no-files-found: error
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: web-unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: |
          set -o pipefail
          pnpm --filter @pc/web build 2>&1 | tee /tmp/pnpm-build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-web-log
          path: /tmp/pnpm-build.log
