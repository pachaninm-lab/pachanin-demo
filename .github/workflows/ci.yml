name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/platform-v7-*'
      - 'docs/platform-v7/production-database-deployment-runbook.md'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  web-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Platform-v7 unit checks
        run: |
          set -o pipefail
          pnpm --filter @pc/web exec vitest run tests/unit/shellRolePolicy.test.ts tests/unit/platformV7DriverRoleShellGuard.test.ts tests/unit/platformV7BankPaymentBasisRoutesManifest.test.ts tests/unit/platformV7RootWorkEntry.test.ts tests/unit/roleContinuityPanel.test.tsx 2>&1 | tee /tmp/ci-web-unit.log

      - name: Upload web unit log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-web-unit-log
          path: /tmp/ci-web-unit.log

  industrial-core-e2e:
    name: "Industrial core · races · outbox · reconciliation · load proof"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: industrial_admin
          POSTGRES_PASSWORD: ephemeral_industrial_admin_only
          POSTGRES_DB: industrial_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U industrial_admin -d industrial_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://industrial_admin:ephemeral_industrial_admin_only@127.0.0.1:5432/industrial_e2e
      TEST_ADMIN_DATABASE_URL: postgresql://industrial_admin:ephemeral_industrial_admin_only@127.0.0.1:5432/industrial_e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pc/api exec prisma generate --schema prisma/schema.prisma

      - name: Apply forward-only migrations
        run: pnpm --filter @pc/api exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Run industrial transaction-core gate
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec jest --runInBand --config test/industrial/jest.config.json 2>&1 | tee /tmp/industrial-core-e2e.log

      - name: Upload industrial core evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-industrial-core-evidence
          path: /tmp/industrial-core-e2e.log
          if-no-files-found: error
          retention-days: 14

  one-deal-e2e:
    name: "12 roles · 19 commands · PostgreSQL RLS · DR restore"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: one_deal_admin
          POSTGRES_PASSWORD: ephemeral_one_deal_admin_only
          POSTGRES_DB: one_deal_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U one_deal_admin -d one_deal_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      ONE_DEAL_ADMIN_URL: postgresql://one_deal_admin:ephemeral_one_deal_admin_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_AUTH_URL: postgresql://one_deal_auth:ephemeral_one_deal_auth_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_APP_URL: postgresql://one_deal_app:ephemeral_one_deal_app_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_STORAGE_URL: postgresql://one_deal_storage:ephemeral_one_deal_storage_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_EVIDENCE_LOG: /tmp/platform-v7-one-deal-e2e.log
      DR_SOURCE_ADMIN_URL: postgresql://one_deal_admin:ephemeral_one_deal_admin_only@127.0.0.1:5432/one_deal_e2e
      DR_RESTORE_ADMIN_URL: postgresql://one_deal_admin:ephemeral_one_deal_admin_only@127.0.0.1:5432/one_deal_restore
      DR_RESTORE_AUTH_URL: postgresql://one_deal_auth:ephemeral_one_deal_auth_only@127.0.0.1:5432/one_deal_restore
      DR_RESTORE_APP_URL: postgresql://one_deal_app:ephemeral_one_deal_app_only@127.0.0.1:5432/one_deal_restore
      DR_RESTORE_STORAGE_URL: postgresql://one_deal_storage:ephemeral_one_deal_storage_only@127.0.0.1:5432/one_deal_restore
      DR_BACKUP_PATH: /tmp/platform-v7-predeploy.backup
      DR_MANIFEST_PATH: /tmp/platform-v7-dr-manifest.json
      DR_EVIDENCE_LOG: /tmp/platform-v7-dr-rehearsal.log
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ephemeral signing secrets
        shell: bash
        run: |
          echo "JWT_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "AUTH_TOKEN_PEPPER=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "MFA_ENCRYPTION_KEY=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "BANK_HMAC_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"

      - name: Enforce forward-only database changes
        run: node scripts/platform-v7-forward-only-migration-check.mjs

      - name: Run industrial one-deal exploitation gate
        shell: bash
        run: bash scripts/platform-v7-one-deal-e2e.sh

      - name: Run backup and restore DR rehearsal
        shell: bash
        run: bash scripts/platform-v7-database-dr-rehearsal.sh

      - name: Upload one-deal and DR evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-one-deal-dr-evidence
          path: |
            /tmp/platform-v7-one-deal-e2e.log
            /tmp/platform-v7-dr-rehearsal.log
            /tmp/platform-v7-dr-manifest.json
            /tmp/platform-v7-predeploy.backup.sha256
          if-no-files-found: error
          retention-days: 14

  persistent-auth-e2e:
    name: "Persistent sessions · rotation · MFA · revoke"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth_admin
          POSTGRES_PASSWORD: ephemeral_auth_admin_only
          POSTGRES_DB: auth_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth_admin -d auth_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://auth_admin:ephemeral_auth_admin_only@127.0.0.1:5432/auth_e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pc/api exec prisma generate --schema prisma/schema.prisma

      - name: Generate ephemeral auth secrets
        shell: bash
        run: |
          echo "JWT_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "AUTH_TOKEN_PEPPER=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "MFA_ENCRYPTION_KEY=$(openssl rand -hex 48)" >> "$GITHUB_ENV"

      - name: Apply forward-only migrations
        run: pnpm --filter @pc/api exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Prove public Prisma schema remains drift-free
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --script \
            --exit-code 2>&1 | tee /tmp/persistent-auth-drift.log

      - name: Run persistent auth exploitation gate
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec jest --runInBand --config test/auth/jest.config.json 2>&1 | tee /tmp/persistent-auth-e2e.log

      - name: Upload persistent auth evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-persistent-auth-evidence
          path: |
            /tmp/persistent-auth-drift.log
            /tmp/persistent-auth-e2e.log
          if-no-files-found: error
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: web-unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: |
          set -o pipefail
          pnpm --filter @pc/web build 2>&1 | tee /tmp/pnpm-build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-web-log
          path: /tmp/pnpm-build.log
