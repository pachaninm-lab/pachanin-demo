name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/platform-v7-*'
      - 'docs/platform-v7/production-database-deployment-runbook.md'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'scripts/platform-v7-*'
      - 'docs/platform-v7/production-database-deployment-runbook.md'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canonical-logistics-patch:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/ir-10-2-logistics-postgresql-authority' && !contains(github.event.pull_request.head.sha, 'disabled')
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact head branch
        uses: actions/checkout@v4
        with:
          ref: agent/ir-10-2-logistics-postgresql-authority
          fetch-depth: 0
      - name: Patch canonical Deal logistics path and remove temporary workflow changes
        shell: bash
        run: |
          set -euo pipefail
          if git log -1 --pretty=%B | grep -q '\[canonical-logistics-fixed\]'; then
            exit 0
          fi
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('apps/api/src/modules/deals/deal-command.service.ts')
          source = path.read_text()

          source = source.replace('  parseLogisticsBasis,\n', '')
          source = source.replace(
              "return !['DELIVERED', 'CANCELLED', 'CLOSED', 'FAILED'].includes(status);",
              "return !['DELIVERED', 'COMPLETED', 'CANCELLED', 'CLOSED', 'FAILED'].includes(status);",
          )

          old_call = """        const payload = await this.validatePayload(tx, actionId, deal, dto.payload ?? {}, user);
          await this.applySideEffects(tx, definition, deal, payload, user);"""
          new_call = """        await tx.$queryRaw(Prisma.sql`
          SELECT set_config('app.current_command_id', ${dto.commandId}, true)
        `);
        const payload = await this.validatePayload(tx, actionId, deal, dto.payload ?? {}, user);
        await this.applySideEffects(tx, definition, deal, payload, user, {
          commandId: dto.commandId,
          idempotencyKey: dto.idempotencyKey,
          correlationId: dto.commandId,
        });"""
          if old_call not in source:
              raise SystemExit('execute/applySideEffects anchor not found')
          source = source.replace(old_call, new_call, 1)

          validation_pattern = re.compile(
              r"    if \(actionId === 'assign_logistics'\) \{.*?\n    \}\n\n    if \(actionId === 'confirm_loading'\) \{",
              re.S,
          )
          validation_replacement = """    if (actionId === 'assign_logistics') {
      const carrierOrgId = requiredString(payload, 'carrierOrgId');
      const driverUserId = requiredString(payload, 'driverUserId');
      const vehicleId = requiredString(payload, 'vehicleId');
      const routeFromFacilityId = requiredString(payload, 'routeFromFacilityId');
      const routeToFacilityId = requiredString(payload, 'routeToFacilityId');

      const admissions = await tx.$queryRaw<Array<{ id: string }>>(Prisma.sql`
        SELECT admission.id
        FROM logistics.deal_admissions admission
        WHERE admission.tenant_id = ${deal.tenantId}
          AND admission.deal_id = ${deal.id}
          AND admission.carrier_org_id = ${carrierOrgId}
          AND admission.driver_user_id = ${driverUserId}
          AND admission.vehicle_id = ${vehicleId}
          AND admission.route_from_facility_id = ${routeFromFacilityId}
          AND admission.route_to_facility_id = ${routeToFacilityId}
          AND admission.status = 'ACTIVE'
          AND admission.valid_from <= now()
          AND (admission.valid_until IS NULL OR admission.valid_until > now())
        FOR UPDATE
        LIMIT 1
      `);
      const admissionId = admissions[0]?.id;
      if (!admissionId) {
        invalid('carrierOrgId', 'Активный нормализованный допуск логистики для сделки не найден.');
      }

      const conflicts = await tx.shipment.findMany({
        where: {
          dealId: { not: deal.id },
          OR: [{ driverUserId }, { vehicleNumber: vehicleId }],
        },
        select: { id: true, status: true },
        take: 20,
      });
      if (conflicts.some((item) => activeShipmentStatus(item.status))) {
        invalid('driverUserId', 'У водителя или машины уже есть конфликтующее активное назначение.');
      }
      return {
        admissionId,
        carrierOrgId,
        driverUserId,
        vehicleId,
        routeFromFacilityId,
        routeToFacilityId,
      };
    }

    if (actionId === 'confirm_loading') {"""
          source, count = validation_pattern.subn(validation_replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'assign_logistics validation replacement count={count}')

          old_signature = """    payload: JsonRecord,
    user: RequestUser,
  ): Promise<void> {"""
          new_signature = """    payload: JsonRecord,
    user: RequestUser,
    command: { commandId: string; idempotencyKey: string; correlationId: string },
  ): Promise<void> {"""
          if old_signature not in source:
              raise SystemExit('applySideEffects signature anchor not found')
          source = source.replace(old_signature, new_signature, 1)

          side_effect_pattern = re.compile(
              r"      case 'assign_logistics': \{.*?\n        break;\n      \}\n\n      case 'confirm_loading': \{",
              re.S,
          )
          side_effect_replacement = """      case 'assign_logistics': {
        const driver = await tx.user.findUniqueOrThrow({ where: { id: String(payload.driverUserId) } });
        const carrier = await tx.organization.findUniqueOrThrow({ where: { id: String(payload.carrierOrgId) } });
        await tx.shipment.create({
          data: {
            id: `shipment:${deal.id}`,
            dealId: deal.id,
            status: 'DRIVER_ASSIGNED',
            carrierOrgId: carrier.id,
            carrierName: carrier.name,
            driverUserId: driver.id,
            driverName: driver.fullName,
            vehicleNumber: String(payload.vehicleId),
            routeFrom: String(payload.routeFromFacilityId),
            routeTo: String(payload.routeToFacilityId),
            nextAction: 'Подтвердить погрузку',
          },
        });
        break;
      }

      case 'confirm_loading': {"""
          source, count = side_effect_pattern.subn(side_effect_replacement, source, count=1)
          if count != 1:
              raise SystemExit(f'assign_logistics side-effect replacement count={count}')

          source = source.replace(
              "await tx.shipment.update({ where: { id: shipmentId }, data: { status: 'LOADED', nextAction: 'Начать рейс' } });",
              "await tx.shipment.update({ where: { id: shipmentId }, data: { status: 'LOADED', nextAction: 'Начать рейс', version: { increment: 1 } } });",
          )
          source = source.replace(
              "await tx.shipment.update({ where: { id: shipmentId }, data: { status: 'IN_TRANSIT', nextAction: 'Подтвердить прибытие' } });",
              "await tx.shipment.update({ where: { id: shipmentId }, data: { status: 'IN_TRANSIT', nextAction: 'Подтвердить прибытие', version: { increment: 1 } } });",
          )
          source = source.replace(
              "await tx.shipment.update({ where: { id: shipmentId }, data: { status: 'ARRIVED', nextAction: 'Зафиксировать вес' } });",
              "await tx.shipment.update({\n          where: { id: shipmentId },\n          data: {\n            status: 'ARRIVED',\n            nextAction: 'Зафиксировать вес',\n            version: { increment: 1 },\n            ...(typeof payload.lat === 'number'\n              ? { geoLat: payload.lat, geoLng: payload.lng as number, lastGeoAt: new Date(String(payload.occurredAt)) }\n              : {}),\n          },\n        });",
          )

          checkpoint_anchor = """            photoUrl: evidence.s3Key,
            note: canonicalJson(payload),"""
          checkpoint_replacement = """            photoUrl: evidence.s3Key,
            note: canonicalJson(payload),
            commandId: command.commandId,
            idempotencyKey: `deal-command:${deal.id}:${definition.id}:${command.idempotencyKey}`,
            correlationId: command.correlationId,"""
          if source.count(checkpoint_anchor) < 2:
              raise SystemExit('checkpoint metadata anchors not found')
          source = source.replace(checkpoint_anchor, checkpoint_replacement)

          compact_anchor = """data: { shipmentId, type: 'DEPARTURE', completedAt: new Date(String(payload.occurredAt)), actorId: user.id, photoUrl: evidence.s3Key, note: canonicalJson(payload) },"""
          compact_replacement = """data: {
            shipmentId,
            type: 'DEPARTURE',
            completedAt: new Date(String(payload.occurredAt)),
            actorId: user.id,
            photoUrl: evidence.s3Key,
            note: canonicalJson(payload),
            commandId: command.commandId,
            idempotencyKey: `deal-command:${deal.id}:${definition.id}:${command.idempotencyKey}`,
            correlationId: command.correlationId,
          },"""
          if compact_anchor not in source:
              raise SystemExit('departure checkpoint anchor not found')
          source = source.replace(compact_anchor, compact_replacement, 1)

          path.write_text(source)
          PY
          git fetch origin main
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/tmp-ir-10-2-canonical-command-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(logistics): bind canonical command to normalized admission [canonical-logistics-fixed]'
          git push origin HEAD:agent/ir-10-2-logistics-postgresql-authority

  web-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Platform-v7 unit checks
        run: |
          set -o pipefail
          pnpm --filter @pc/web exec vitest run tests/unit/shellRolePolicy.test.ts tests/unit/platformV7DriverRoleShellGuard.test.ts tests/unit/platformV7BankPaymentBasisRoutesManifest.test.ts tests/unit/platformV7RootWorkEntry.test.ts tests/unit/roleContinuityPanel.test.tsx 2>&1 | tee /tmp/ci-web-unit.log

      - name: Upload web unit log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-web-unit-log
          path: /tmp/ci-web-unit.log

  industrial-core-e2e:
    name: "Industrial core · races · outbox · reconciliation · load proof"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: industrial_admin
          POSTGRES_PASSWORD: ephemeral_industrial_admin_only
          POSTGRES_DB: industrial_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U industrial_admin -d industrial_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://industrial_admin:ephemeral_industrial_admin_only@127.0.0.1:5432/industrial_e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pc/api exec prisma generate --schema prisma/schema.prisma

      - name: Apply forward-only migrations
        run: pnpm --filter @pc/api exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Run industrial transaction-core gate
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec jest --runInBand --config test/industrial/jest.config.json 2>&1 | tee /tmp/industrial-core-e2e.log

      - name: Upload industrial core evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-industrial-core-evidence
          path: /tmp/industrial-core-e2e.log
          if-no-files-found: error
          retention-days: 14

  one-deal-e2e:
    name: "12 roles · 19 commands · PostgreSQL RLS · DR restore"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: one_deal_admin
          POSTGRES_PASSWORD: ephemeral_one_deal_admin_only
          POSTGRES_DB: one_deal_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U one_deal_admin -d one_deal_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      ONE_DEAL_ADMIN_URL: postgresql://one_deal_admin:ephemeral_one_deal_admin_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_AUTH_URL: postgresql://one_deal_auth:ephemeral_one_deal_auth_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_APP_URL: postgresql://one_deal_app:ephemeral_one_deal_app_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_STORAGE_URL: postgresql://one_deal_storage:ephemeral_one_deal_storage_only@127.0.0.1:5432/one_deal_e2e
      ONE_DEAL_EVIDENCE_LOG: /tmp/platform-v7-one-deal-e2e.log
      DR_SOURCE_ADMIN_URL: postgresql://one_deal_admin:ephemeral_one_deal_admin_only@127.0.0.1:5432/one_deal_e2e
      DR_RESTORE_ADMIN_URL: postgresql://one_deal_admin:ephemeral_one_deal_admin_only@127.0.0.1:5432/one_deal_restore
      DR_RESTORE_AUTH_URL: postgresql://one_deal_auth:ephemeral_one_deal_auth_only@127.0.0.1:5432/one_deal_restore
      DR_RESTORE_APP_URL: postgresql://one_deal_app:ephemeral_one_deal_app_only@127.0.0.1:5432/one_deal_restore
      DR_RESTORE_STORAGE_URL: postgresql://one_deal_storage:ephemeral_one_deal_storage_only@127.0.0.1:5432/one_deal_restore
      DR_BACKUP_PATH: /tmp/platform-v7-predeploy.backup
      DR_MANIFEST_PATH: /tmp/platform-v7-dr-manifest.json
      DR_EVIDENCE_LOG: /tmp/platform-v7-dr-rehearsal.log
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate ephemeral signing secrets
        shell: bash
        run: |
          echo "JWT_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "AUTH_TOKEN_PEPPER=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "MFA_ENCRYPTION_KEY=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "BANK_HMAC_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"

      - name: Enforce forward-only database changes
        run: node scripts/platform-v7-forward-only-migration-check.mjs

      - name: Run industrial one-deal exploitation gate
        shell: bash
        run: bash scripts/platform-v7-one-deal-e2e.sh

      - name: Run backup and restore DR rehearsal
        shell: bash
        run: bash scripts/platform-v7-database-dr-rehearsal.sh

      - name: Upload one-deal and DR evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-one-deal-dr-evidence
          path: |
            /tmp/platform-v7-one-deal-e2e.log
            /tmp/platform-v7-dr-rehearsal.log
            /tmp/platform-v7-dr-manifest.json
            /tmp/platform-v7-predeploy.backup.sha256
          if-no-files-found: error
          retention-days: 14

  persistent-auth-e2e:
    name: "Persistent sessions · rotation · MFA · revoke"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: auth_admin
          POSTGRES_PASSWORD: ephemeral_auth_admin_only
          POSTGRES_DB: auth_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U auth_admin -d auth_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://auth_admin:ephemeral_auth_admin_only@127.0.0.1:5432/auth_e2e
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @pc/api exec prisma generate --schema prisma/schema.prisma

      - name: Generate ephemeral auth secrets
        shell: bash
        run: |
          echo "JWT_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "AUTH_TOKEN_PEPPER=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "MFA_ENCRYPTION_KEY=$(openssl rand -hex 48)" >> "$GITHUB_ENV"

      - name: Apply forward-only migrations
        run: pnpm --filter @pc/api exec prisma migrate deploy --schema prisma/schema.prisma

      - name: Prove public Prisma schema remains drift-free
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec prisma migrate diff \
            --from-url "$DATABASE_URL" \
            --to-schema-datamodel prisma/schema.prisma \
            --script \
            --exit-code 2>&1 | tee /tmp/persistent-auth-drift.log

      - name: Run persistent auth exploitation gate
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec jest --runInBand --config test/auth/jest.config.json 2>&1 | tee /tmp/persistent-auth-e2e.log

      - name: Upload persistent auth evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-persistent-auth-evidence
          path: |
            /tmp/persistent-auth-drift.log
            /tmp/persistent-auth-e2e.log
          if-no-files-found: error
          retention-days: 14

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: web-unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: |
          set -o pipefail
          pnpm --filter @pc/web build 2>&1 | tee /tmp/pnpm-build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-web-log
          path: /tmp/pnpm-build.log
