name: CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'infra/sql/production-rls-policies.sql'
      - 'scripts/platform-v7-rls-*'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
  push:
    branches:
      - main
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'infra/sql/production-rls-policies.sql'
      - 'scripts/platform-v7-rls-*'
      - '.github/workflows/ci.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Platform-v7 unit checks
        run: |
          set -o pipefail
          pnpm --filter @pc/web exec vitest run tests/unit/shellRolePolicy.test.ts tests/unit/platformV7DriverRoleShellGuard.test.ts tests/unit/platformV7BankPaymentBasisRoutesManifest.test.ts tests/unit/platformV7RootWorkEntry.test.ts tests/unit/roleContinuityPanel.test.tsx 2>&1 | tee /tmp/ci-web-unit.log

      - name: Upload web unit log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-web-unit-log
          path: /tmp/ci-web-unit.log

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: web-unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: |
          set -o pipefail
          pnpm --filter @pc/web build 2>&1 | tee /tmp/pnpm-build.log

      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-web-log
          path: /tmp/pnpm-build.log

  rls-integration:
    name: PostgreSQL 16 RLS tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rls_admin
          POSTGRES_PASSWORD: ephemeral_rls_admin_only
          POSTGRES_DB: rls_integration
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U rls_admin -d rls_integration"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      RLS_INTEGRATION_ADMIN_URL: postgresql://rls_admin:ephemeral_rls_admin_only@127.0.0.1:${{ job.services.postgres.ports[5432] }}/rls_integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client

      - name: Run isolated RLS integration assertions
        shell: bash
        run: |
          set -o pipefail
          bash scripts/platform-v7-rls-integration.sh 2>&1 | tee /tmp/platform-v7-rls-integration.log

      - name: Upload RLS integration log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-rls-integration-log
          path: /tmp/platform-v7-rls-integration.log
          if-no-files-found: error
          retention-days: 7
