name: TAI AP-13C.1d Coverage Edge Fix

on:
  push:
    branches:
      - agent/tai-ap-13c1d-quality-scoring-authority
    paths:
      - '.github/workflows/tai-ap13c1d-coverage-edge-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-quality-scoring-authority
          fetch-depth: 0
      - name: Add bounded edge coverage and self-delete
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin agent/tai-ap-13c1d-quality-scoring-authority
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tests/test_quality_scoring_cli.py')
          text = path.read_text(encoding='utf-8')

          marker = '''        (
              lambda manifest, payload: (
                  manifest["entries"][0].__setitem__("status", "ERROR"),
                  payload["entries"][0].__setitem__("status", "ERROR"),
              ),
              "not scoreable",
          ),
          '''
          additions = '''        (
              lambda manifest, payload: manifest["entries"][0].__setitem__(
                  "profile_id", "unknown-profile"
              ),
              "Cartesian identity mismatch",
          ),
          (
              lambda manifest, payload: payload["entries"][0].__setitem__(
                  "response", {"invalid": True}
              ),
              "payload.response must be a string",
          ),
          (
              lambda manifest, payload: (
                  payload["entries"][0].__setitem__(
                      "prompt", "alternate governed prompt"
                  ),
                  manifest["entries"][0].__setitem__(
                      "prompt_sha256",
                      hashlib.sha256(b"alternate governed prompt").hexdigest(),
                  ),
              ),
              "not bound to case authority",
          ),
          '''
          if '"unknown-profile"' not in text:
              if text.count(marker) != 1:
                  raise SystemExit('expected scoreability mutation marker exactly once')
              text = text.replace(marker, additions + marker)

          edge_tests = '''

          def test_runtime_file_record_rejects_duplicate_declaration(
              tmp_path: Path,
          ) -> None:
              fixture = _fixture(tmp_path)
              manifest = json.loads(
                  fixture["runtime_manifest_path"].read_text(encoding="utf-8")
              )
              relative = manifest["raw_observations"]["manifest_path"]
              record = next(
                  row for row in manifest["evidence_files"] if row["path"] == relative
              )
              manifest["evidence_files"].append(copy.deepcopy(record))
              with pytest.raises(QualityScoringError, match="declaration is not unique"):
                  inputs._runtime_file_record(manifest, relative)


          def test_verified_runtime_source_rejects_file_digest_drift(
              tmp_path: Path,
          ) -> None:
              fixture = _fixture(tmp_path)
              manifest = json.loads(
                  fixture["runtime_manifest_path"].read_text(encoding="utf-8")
              )
              relative = manifest["raw_observations"]["payload_path"]
              record = next(
                  row for row in manifest["evidence_files"] if row["path"] == relative
              )
              record["sha256"] = "f" * 64
              path = tmp_path / "runtime-digest-drift.json"
              write_json(path, manifest)
              runtime = {
                  **fixture["runtime"],
                  "manifest_sha256": canonical_sha256(manifest),
              }
              with pytest.raises(
                  QualityScoringError,
                  match="raw payload no longer matches verified runtime evidence",
              ):
                  inputs._verified_runtime_source(
                      path,
                      fixture["original_root"],
                      runtime,
                      fixture["assessment"],
                  )


          def test_safe_external_file_rejects_resolved_escape(
              monkeypatch, tmp_path: Path
          ) -> None:
              root = tmp_path / "root"
              root.mkdir()
              candidate = root / "safe.json"
              candidate.write_text("{}\\n", encoding="utf-8")
              outside = tmp_path / "outside.json"
              outside.write_text("{}\\n", encoding="utf-8")
              original_resolve = Path.resolve

              def resolve(path: Path, strict: bool = False) -> Path:
                  if path == candidate:
                      return original_resolve(outside, strict=strict)
                  return original_resolve(path, strict=strict)

              monkeypatch.setattr(Path, "resolve", resolve)
              with pytest.raises(QualityScoringError, match="escapes its root"):
                  inputs._safe_external_file(root, "safe.json")
          '''
          if 'test_runtime_file_record_rejects_duplicate_declaration' not in text:
              text = text.rstrip() + edge_tests + '\n'

          path.write_text(text, encoding='utf-8')
          PY
          rm .github/workflows/tai-ap13c1d-coverage-edge-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/tai/tests/test_quality_scoring_cli.py \
            .github/workflows/tai-ap13c1d-coverage-edge-fix.yml
          git commit -m 'test(tai): cover quality provenance edge rejections'
          git push origin HEAD:agent/tai-ap-13c1d-quality-scoring-authority
