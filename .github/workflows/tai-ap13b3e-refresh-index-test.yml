name: TAI AP-13B.3e Payload Index Test Correction

on:
  push:
    branches:
      - agent/tai-ap-13b3e-immutable-storage-contract
    paths:
      - .github/workflows/tai-ap13b3e-refresh-index-test.yml

permissions:
  contents: write

jobs:
  patch:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13b3e-immutable-storage-contract
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Keep valid signed-review fixture aligned with canonical payload index
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          test_path = Path('apps/tai/tests/test_model_bundle_v2_adversarial.py')
          text = test_path.read_text(encoding='utf-8')
          old = '''    review["sha256"] = _sha256(record_content)\n    review["size_bytes"] = len(record_content)\n    shutil.copy2(record_path, restored / cast(str, review["path"]))\n    _write_json(manifest, payload)\n'''
          new = '''    review["sha256"] = _sha256(record_content)\n    review["size_bytes"] = len(record_content)\n    shutil.copy2(record_path, restored / cast(str, review["path"]))\n\n    storage = cast(dict[str, Any], payload["storage"])\n    payload_index = cast(dict[str, Any], storage["payload_index"])\n    payload_index_path = root / cast(str, payload_index["path"])\n    payload_index_payload = json.loads(\n        payload_index_path.read_text(encoding="utf-8")\n    )\n    indexed_files = cast(list[dict[str, Any]], payload_index_payload["files"])\n    indexed_review = next(\n        item for item in indexed_files if item["path"] == review["path"]\n    )\n    indexed_review["sha256"] = review["sha256"]\n    indexed_review["size_bytes"] = review["size_bytes"]\n    payload_index_content = json.dumps(\n        payload_index_payload, sort_keys=True\n    ).encode()\n    payload_index_path.write_bytes(payload_index_content)\n    (restored / cast(str, payload_index["path"])).write_bytes(\n        payload_index_content\n    )\n    payload_index["sha256"] = _sha256(payload_index_content)\n    payload_index["size_bytes"] = len(payload_index_content)\n    _write_json(manifest, payload)\n'''
          if text.count(old) != 1:
              raise SystemExit('SIGNED_REVIEW_FIXTURE_INSERTION_POINT_INVALID')
          test_path.write_text(text.replace(old, new, 1), encoding='utf-8')

          scope_path = Path(
              'apps/tai/governance/scopes/ap-13b3e-immutable-storage-2945.json'
          )
          scope = json.loads(scope_path.read_text(encoding='utf-8'))
          added = 'apps/tai/tests/test_model_bundle_v2_adversarial.py'
          if added not in scope['allowed_paths']:
              scope['allowed_paths'].append(added)
              scope['allowed_paths'].sort()
          scope_path.write_text(
              json.dumps(scope, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

          rm .github/workflows/tai-ap13b3e-refresh-index-test.yml
          python -m pip install -e 'apps/tai[dev]'
          python -m pytest \
            apps/tai/tests/test_model_bundle_v2_contract.py \
            apps/tai/tests/test_model_bundle_v2_adversarial.py -q
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add \
            apps/tai/governance/scopes/ap-13b3e-immutable-storage-2945.json \
            apps/tai/tests/test_model_bundle_v2_adversarial.py \
            .github/workflows/tai-ap13b3e-refresh-index-test.yml
          git commit -m 'test(tai): refresh payload index after valid review update'
          git push origin HEAD:agent/tai-ap-13b3e-immutable-storage-contract
