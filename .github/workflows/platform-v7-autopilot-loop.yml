name: platform-v7 autopilot loop

on:
  workflow_dispatch:
    inputs:
      command:
        description: 'Loop command. Use: run-loop'
        required: true
        default: 'run-loop'
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: platform-v7-autopilot-loop
  cancel-in-progress: false

jobs:
  loop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Inspect autopilot state
        id: state
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          current=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('docs/platform-v7/autopilot/autopilot-state.json','utf8')); console.log(s.current || '')")
          current_status=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('docs/platform-v7/autopilot/autopilot-state.json','utf8')); console.log(s.currentStatus || '')")

          # Count only open agent PRs matching the current slice; stale slices are excluded.
          gh pr list --repo "$REPO" --state open --label platform-v7 --label agent-generated \
            --json number,title > /tmp/p7-loop-open-prs.json
          open_prs=$(CURRENT_STEP="$current" node -e "
            const fs=require('fs');
            const prs=JSON.parse(fs.readFileSync('/tmp/p7-loop-open-prs.json','utf8'));
            const m=String(process.env.CURRENT_STEP||'').match(/\d+$/);
            const slice=m?Number(m[0]):0;
            if(!slice){process.stdout.write(String(prs.length));process.exit(0);}
            const re=new RegExp('slice\\s+'+slice+'\\b','i');
            process.stdout.write(String(prs.filter(p=>re.test(p.title||'')).length));
          ")

          echo "current=$current" >> "$GITHUB_OUTPUT"
          echo "current_status=$current_status" >> "$GITHUB_OUTPUT"
          echo "open_agent_prs=$open_prs" >> "$GITHUB_OUTPUT"
          echo "current step: $current"
          echo "current status: $current_status"
          echo "open agent PRs (current slice): $open_prs"

      - name: Trigger current step when idle
        if: steps.state.outputs.open_agent_prs == '0' && steps.state.outputs.current_status == 'ready'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_STEP: ${{ steps.state.outputs.current }}
        run: |
          set -euo pipefail
          echo "No open agent PR. Triggering platform-v7 agent runner for: $CURRENT_STEP"
          if gh workflow run platform-v7-agent-runner.yml --repo "$REPO" -f command=run-current; then
            echo "platform-v7 agent runner dispatched"
            exit 0
          fi

          echo "workflow dispatch failed; falling back to issue trigger"
          title="platform-v7 autopilot: $CURRENT_STEP"
          existing=$(gh issue list --repo "$REPO" --state open --label agent:run --search "$title" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            echo "Existing trigger issue: #$existing"
            gh issue comment "$existing" --repo "$REPO" --body "/agent run current"
          else
            printf -v body '%s\n' \
              '## Command' \
              '' \
              '```text' \
              '/agent run current' \
              '```' \
              '' \
              '## Current step' \
              '' \
              '```text' \
              "$CURRENT_STEP" \
              '```' \
              '' \
              '## Source of truth' \
              '' \
              '- docs/platform-v7/autopilot/autopilot-state.json' \
              '- docs/platform-v7/execution-queue.md' \
              '- docs/platform-v7/autopilot/progress.json' \
              '- docs/platform-v7/autopilot/prompts/current-codex-task.md' \
              '- docs/platform-v7/autopilot/prompts/current-review-task.md' \
              '' \
              'Merge remains guarded by CI and scope checks.'
            gh issue create --repo "$REPO" --title "$title" --label platform-v7 --label agent:run --body "$body"
          fi

      - name: Skip when agent PR exists
        if: steps.state.outputs.open_agent_prs != '0'
        run: echo "Open agent-generated PR for current slice exists. Loop will not start another implementation PR."

      - name: Skip when current step not ready
        if: steps.state.outputs.current_status != 'ready'
        run: echo "Autopilot current step is not ready. Loop will not trigger implementation."
