name: Exact Main Post-Merge Evidence Audit

on:
  pull_request:
    paths:
      - '.github/workflows/exact-main-post-merge-audit.yml'
  workflow_dispatch:

permissions:
  actions: write
  checks: read
  contents: read
  statuses: read

concurrency:
  group: exact-main-post-merge-audit-0951-2659
  cancel-in-progress: true

env:
  TARGET_SHA: 0951cec83c3cdb94c3d2215ecbc773763ad3ed27
  TARGET_BRANCH: main
  AUDIT_DIR: artifacts/exact-main-audit

jobs:
  exact-main-audit:
    name: Verify exact-main runs · jobs · artifacts · evidence
    runs-on: ubuntu-latest
    timeout-minutes: 80
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Dispatch missing exact-main authority workflows and verify evidence
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const crypto = require('node:crypto');
          const { execFileSync } = require('node:child_process');

          const repository = process.env.GITHUB_REPOSITORY;
          const targetSha = process.env.TARGET_SHA;
          const targetBranch = process.env.TARGET_BRANCH;
          const auditDir = process.env.AUDIT_DIR;
          const token = process.env.GITHUB_TOKEN;
          const apiBase = `https://api.github.com/repos/${repository}`;
          const allowedConclusions = new Set(['success', 'skipped', 'neutral']);
          const required = {
            'Production-like Kubernetes Acceptance': {
              workflowFile: 'production-like-kubernetes-acceptance.yml',
              artifactNames: [`production-like-kubernetes-${targetSha}`],
              jobs: [
                'Multi-node kind · immutable rollout · rollback',
                'Production-like Kubernetes Gate · blocking',
              ],
            },
            'Immutable Release Authority Acceptance': {
              workflowFile: 'immutable-release-authority-acceptance.yml',
              artifactNames: [
                `immutable-release-build-${targetSha}`,
                `immutable-release-migration-security-${targetSha}`,
              ],
              jobs: [
                'Build once · manifest · migration gate · rollback contract',
                'Migration image · blocking HIGH/CRITICAL scan',
                'Immutable Release Authority Gate · all blocking checks',
              ],
            },
          };
          const errors = [];
          const warnings = [];

          fs.rmSync(auditDir, { recursive: true, force: true });
          for (const dir of ['api', 'downloads', 'evidence']) {
            fs.mkdirSync(path.join(auditDir, dir), { recursive: true });
          }

          const report = {
            schemaVersion: 2,
            repository,
            target: { branch: targetBranch, commitSha: targetSha },
            auditedAt: new Date().toISOString(),
            auditExecution: {
              event: process.env.GITHUB_EVENT_NAME,
              runId: process.env.GITHUB_RUN_ID,
              runAttempt: Number(process.env.GITHUB_RUN_ATTEMPT || 1),
              workflowSha: process.env.GITHUB_SHA,
            },
            dispatches: [],
            mainRef: null,
            exactMainRuns: [],
            requiredWorkflows: {},
            externalStatuses: [],
            errors,
            warnings,
            maturityBoundary: {
              productionOperationallyAccepted: 'NO_GO',
              acceptedSlice: 'exact-main disposable multi-node Kubernetes acceptance and immutable release authority evidence only',
              notProven: [
                'provider-level PostgreSQL HA/PITR',
                'target production load and capacity',
                'permanent-environment operations',
                'external penetration test',
                'live provider integrations',
                'DNS/TLS production operation',
                '72-hour, 14-day and 30-day operational soak',
                'deep outbox runtime scenarios tracked by #2649',
              ],
            },
            pass: false,
            verdict: 'FAIL',
          };

          function addError(message) {
            errors.push(message);
            console.error(`AUDIT_ERROR: ${message}`);
          }

          function assert(condition, message) {
            if (!condition) addError(message);
          }

          function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
          }

          function validDigest(value) {
            return typeof value === 'string' && /^sha256:[0-9a-f]{64}$/.test(value);
          }

          function sha256File(file) {
            return `sha256:${crypto.createHash('sha256').update(fs.readFileSync(file)).digest('hex')}`;
          }

          function writeJson(name, value) {
            fs.writeFileSync(path.join(auditDir, 'api', name), `${JSON.stringify(value, null, 2)}\n`);
          }

          async function request(urlOrPath, options = {}) {
            const url = urlOrPath.startsWith('http') ? urlOrPath : `https://api.github.com${urlOrPath}`;
            const response = await fetch(url, {
              redirect: options.redirect || 'follow',
              method: options.method || 'GET',
              headers: {
                Accept: 'application/vnd.github+json',
                Authorization: `Bearer ${token}`,
                'Content-Type': 'application/json',
                'X-GitHub-Api-Version': '2022-11-28',
                'User-Agent': 'pachanin-demo-exact-main-audit',
                ...(options.headers || {}),
              },
              body: options.body ? JSON.stringify(options.body) : undefined,
            });
            if (!response.ok) {
              throw new Error(`GitHub API ${response.status} for ${url}: ${await response.text()}`);
            }
            if (options.binary) return Buffer.from(await response.arrayBuffer());
            if (response.status === 204) return null;
            return response.json();
          }

          async function paginate(urlPath, key) {
            const values = [];
            for (let page = 1; page <= 20; page += 1) {
              const joiner = urlPath.includes('?') ? '&' : '?';
              const payload = await request(`${urlPath}${joiner}per_page=100&page=${page}`);
              const pageValues = payload[key] || [];
              values.push(...pageValues);
              if (pageValues.length < 100) break;
            }
            return values;
          }

          async function exactRuns() {
            const runs = await paginate(`${apiBase}/actions/runs?head_sha=${targetSha}`, 'workflow_runs');
            return runs.filter((run) =>
              run.head_sha === targetSha &&
              run.head_branch === targetBranch &&
              ['push', 'workflow_dispatch'].includes(run.event),
            );
          }

          function latestByName(runs, name) {
            return runs
              .filter((run) => run.name === name)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0] || null;
          }

          async function dispatchIfMissing(workflowName, config, runs) {
            const matching = runs.filter((run) => run.name === workflowName);
            if (matching.length > 0) return;
            await request(`${apiBase}/actions/workflows/${config.workflowFile}/dispatches`, {
              method: 'POST',
              body: { ref: targetBranch },
            });
            report.dispatches.push({ workflowName, workflowFile: config.workflowFile, ref: targetBranch, dispatchedAt: new Date().toISOString() });
            console.log(`Dispatched ${workflowName} for ${targetBranch}@${targetSha}`);
          }

          async function waitForStableRuns() {
            const deadline = Date.now() + 65 * 60 * 1000;
            let stableSnapshot = null;
            while (Date.now() < deadline) {
              const runs = await exactRuns();
              const active = runs.filter((run) => run.status !== 'completed');
              const requiredRuns = Object.keys(required).map((name) => latestByName(runs, name));
              const requiredPresent = requiredRuns.every(Boolean);
              const requiredTerminal = requiredRuns.every((run) => run && run.status === 'completed');
              console.log(JSON.stringify({
                observedAt: new Date().toISOString(),
                totalExactMainRuns: runs.length,
                active: active.map((run) => `${run.name}#${run.run_number}:${run.status}`),
                required: Object.fromEntries(Object.keys(required).map((name, index) => [name, requiredRuns[index] ? `${requiredRuns[index].status}/${requiredRuns[index].conclusion}` : 'missing'])),
              }));

              if (requiredPresent && requiredTerminal && active.length === 0) {
                const snapshot = runs.map((run) => `${run.id}:${run.status}:${run.conclusion}`).sort().join('|');
                if (stableSnapshot === snapshot) return runs;
                stableSnapshot = snapshot;
                await sleep(60_000);
                continue;
              }
              stableSnapshot = null;
              await sleep(30_000);
            }
            throw new Error('Timed out waiting for stable exact-main GitHub Actions runs');
          }

          async function downloadAndExtract(artifact) {
            const safe = artifact.name.replace(/[^a-zA-Z0-9._-]/g, '_');
            const zipFile = path.join(auditDir, 'downloads', `${safe}.zip`);
            const extractDir = path.join(auditDir, 'downloads', safe);
            const bytes = await request(`${apiBase}/actions/artifacts/${artifact.id}/zip`, { binary: true });
            fs.writeFileSync(zipFile, bytes);
            const calculatedDigest = sha256File(zipFile);
            assert(!artifact.digest || artifact.digest === calculatedDigest, `Artifact digest mismatch for ${artifact.name}: API=${artifact.digest}, calculated=${calculatedDigest}`);
            fs.mkdirSync(extractDir, { recursive: true });
            execFileSync('unzip', ['-q', zipFile, '-d', extractDir]);
            return { zipFile, extractDir, calculatedDigest };
          }

          function walk(root) {
            if (!fs.existsSync(root)) return [];
            return fs.readdirSync(root, { withFileTypes: true }).flatMap((entry) => {
              const full = path.join(root, entry.name);
              return entry.isDirectory() ? walk(full) : [full];
            });
          }

          function findUnique(root, basename) {
            const matches = walk(root).filter((file) => path.basename(file) === basename);
            assert(matches.length === 1, `${basename} expected exactly once in ${root}; found ${matches.length}`);
            return matches[0] || null;
          }

          function readJson(file, label) {
            try {
              return JSON.parse(fs.readFileSync(file, 'utf8'));
            } catch (error) {
              addError(`${label} is not valid JSON: ${error.message}`);
              return null;
            }
          }

          function verifyReferencedFiles(extractedRoot, evidence) {
            const references = [...(evidence.logs || []), ...(evidence.artifacts || [])];
            assert(new Set(references).size === references.length, 'Kubernetes evidence contains duplicate retained file references');
            for (const reference of references) {
              assert(typeof reference === 'string' && reference.length > 0, 'Kubernetes evidence contains an empty retained file reference');
              if (typeof reference !== 'string') continue;
              const normalized = path.posix.normalize(reference);
              assert(!path.isAbsolute(reference), `Kubernetes evidence reference is absolute: ${reference}`);
              assert(!normalized.startsWith('../') && normalized !== '..', `Kubernetes evidence reference escapes artifact: ${reference}`);
              assert(fs.existsSync(path.join(extractedRoot, normalized)), `Kubernetes evidence reference is missing: ${reference}`);
            }
          }

          function verifyKubernetes(extractedRoot, artifact, calculatedDigest) {
            const file = findUnique(extractedRoot, 'production-like-kubernetes-evidence.json');
            if (!file) return null;
            const evidence = readJson(file, 'production-like Kubernetes evidence');
            if (!evidence) return null;
            assert(evidence.schemaVersion === 1, 'Kubernetes evidence schemaVersion must be 1');
            assert(evidence.repository === repository, 'Kubernetes evidence repository mismatch');
            assert(evidence.commitSha === targetSha, `Kubernetes evidence commit mismatch: ${evidence.commitSha}`);
            assert(evidence.branch === targetBranch, `Kubernetes evidence branch mismatch: ${evidence.branch}`);
            assert(evidence.pass === true && evidence.result === 'PASS', 'Kubernetes evidence did not pass');
            assert(evidence.failureReason === null, 'Kubernetes evidence contains a failure reason');
            assert(Array.isArray(evidence.violatedThresholds) && evidence.violatedThresholds.length === 0, 'Kubernetes evidence has violated thresholds');
            assert(evidence.release?.sourceCommit === targetSha, 'Kubernetes release sourceCommit mismatch');
            const actual = evidence.actualMeasurements || {};
            const thresholds = evidence.thresholds || {};
            for (const key of ['apiReplicas', 'webReplicas', 'outboxWorkerReplicas', 'pgbouncerReplicas', 'pgbouncerRoutedPrincipals', 'minimumReadyWorkersDuringPeerDeletion']) {
              assert(Number(actual[key]) >= Number(thresholds[key]), `Kubernetes measurement ${key} is below threshold`);
            }
            assert(actual.migrationExecutions === 1, 'Kubernetes migration execution count must be exactly one');
            for (const key of ['apiAvailabilityProbeFailures', 'webAvailabilityProbeFailures', 'pgbouncerAvailabilityProbeFailures', 'outboxWorkerRuntimeErrors', 'mutablePlatformImageReferences', 'workloadServiceAccountTokens', 'applicationDdlPrivileges', 'canonicalRlsAuthorityViolations', 'networkPolicyUnauthorizedConnections', 'directDatabaseBypassConnections', 'rollbackDigestMismatches']) {
              assert(actual[key] === 0, `Kubernetes measurement ${key} must be zero; actual=${actual[key]}`);
            }
            const assertions = evidence.assertions || {};
            for (const key of ['exactHeadCheckout', 'buildOnceDeployMany', 'dedicatedMigrationJob', 'canonicalRlsAuthorityApplied', 'outboxWorkerRuntimeClean', 'runtimeDatabaseAccessThroughPgBouncer', 'directRuntimeDatabaseBypassBlocked', 'pgbouncerPeerDeletionAvailability', 'immutablePlatformImages', 'initialDigestSetApplied', 'rollingUpdateDigestSetApplied', 'sameSchemaRollbackDigestSetRestored', 'unauthorizedNetworkConnectionBlocked', 'secretSafeEvidenceCollection']) {
              assert(assertions[key] === true, `Kubernetes assertion ${key} must be true`);
            }
            assert(assertions.applicationMigrations === false, 'Application workloads must not own migrations');
            assert(assertions.defaultHelmExecutableWorkloads === 0, 'Default Helm render must contain zero executable workloads');
            verifyReferencedFiles(extractedRoot, evidence);
            fs.copyFileSync(file, path.join(auditDir, 'evidence', 'production-like-kubernetes-evidence.json'));
            return { artifactId: artifact.id, artifactName: artifact.name, artifactDigest: artifact.digest || null, calculatedArtifactDigest: calculatedDigest, evidenceSha256: sha256File(file), evidence };
          }

          function verifyImmutableBuild(extractedRoot, artifact, calculatedDigest) {
            const file = findUnique(extractedRoot, 'immutable-release-evidence.json');
            if (!file) return null;
            const evidence = readJson(file, 'immutable release evidence');
            if (!evidence) return null;
            assert(evidence.schemaVersion === 1, 'Immutable release evidence schemaVersion must be 1');
            assert(evidence.repository === repository, 'Immutable release evidence repository mismatch');
            assert(evidence.commitSha === targetSha, `Immutable release evidence commit mismatch: ${evidence.commitSha}`);
            assert(evidence.pass === true, 'Immutable release evidence did not pass');
            assert(Array.isArray(evidence.violatedThresholds) && evidence.violatedThresholds.length === 0, 'Immutable release evidence has violated thresholds');
            assert(validDigest(evidence.manifestId), 'Immutable release manifestId invalid');
            assert(validDigest(evidence.rollbackId), 'Immutable release rollbackId invalid');
            for (const component of ['api', 'web', 'outboxWorker', 'migration']) {
              assert(validDigest(evidence.imageDigests?.[component]), `Immutable release image digest invalid: ${component}`);
              assert(validDigest(evidence.imageConfigIds?.[component]), `Immutable release image config ID invalid: ${component}`);
            }
            fs.copyFileSync(file, path.join(auditDir, 'evidence', 'immutable-release-evidence.json'));
            return { artifactId: artifact.id, artifactName: artifact.name, artifactDigest: artifact.digest || null, calculatedArtifactDigest: calculatedDigest, evidenceSha256: sha256File(file), evidence };
          }

          function verifyMigrationSecurity(extractedRoot, artifact, calculatedDigest) {
            const file = findUnique(extractedRoot, 'trivy-migration-container-evaluation.json');
            if (!file) return null;
            const evidence = readJson(file, 'migration image security evidence');
            if (!evidence) return null;
            assert(evidence.schemaVersion === 1, 'Migration security evidence schemaVersion must be 1');
            assert(evidence.repository === repository, 'Migration security evidence repository mismatch');
            assert(evidence.commitSha === targetSha, `Migration security evidence commit mismatch: ${evidence.commitSha}`);
            assert(evidence.passed === true && evidence.scannerResult === 'success', 'Migration security evidence did not pass');
            assert(evidence.recognizedReportShape === true, 'Migration security report shape was not recognized');
            assert(evidence.summary?.highOrCritical === 0, 'Migration image has HIGH/CRITICAL findings');
            assert(evidence.summary?.blocked === 0, 'Migration image security evidence has blocked findings');
            fs.copyFileSync(file, path.join(auditDir, 'evidence', 'trivy-migration-container-evaluation.json'));
            return { artifactId: artifact.id, artifactName: artifact.name, artifactDigest: artifact.digest || null, calculatedArtifactDigest: calculatedDigest, evidenceSha256: sha256File(file), evidence };
          }

          async function verifyWorkflow(workflowName, config, runs) {
            const run = latestByName(runs, workflowName);
            assert(Boolean(run), `Required exact-main workflow missing: ${workflowName}`);
            if (!run) return;
            assert(run.status === 'completed' && run.conclusion === 'success', `Required workflow did not succeed: ${workflowName} (${run.status}/${run.conclusion})`);
            const jobs = await paginate(`${apiBase}/actions/runs/${run.id}/jobs?filter=latest`, 'jobs');
            writeJson(`run-${run.id}-jobs.json`, { jobs });
            for (const expectedJob of config.jobs) {
              const job = jobs.find((candidate) => candidate.name === expectedJob);
              assert(Boolean(job), `Required job missing: ${workflowName} / ${expectedJob}`);
              if (job) assert(job.status === 'completed' && job.conclusion === 'success', `Required job did not succeed: ${workflowName} / ${expectedJob} (${job.status}/${job.conclusion})`);
            }
            for (const job of jobs) {
              assert(job.status === 'completed', `Job not completed: ${workflowName} / ${job.name}`);
              assert(allowedConclusions.has(job.conclusion), `Job non-passing: ${workflowName} / ${job.name} (${job.conclusion})`);
            }
            const artifacts = await paginate(`${apiBase}/actions/runs/${run.id}/artifacts`, 'artifacts');
            writeJson(`run-${run.id}-artifacts.json`, { artifacts });
            const workflowReport = {
              run: { id: run.id, event: run.event, runNumber: run.run_number, runAttempt: run.run_attempt, status: run.status, conclusion: run.conclusion, headSha: run.head_sha, headBranch: run.head_branch, htmlUrl: run.html_url },
              jobs: jobs.map((job) => ({ id: job.id, name: job.name, status: job.status, conclusion: job.conclusion })),
              artifacts: [],
              evidence: {},
            };
            report.requiredWorkflows[workflowName] = workflowReport;
            for (const artifactName of config.artifactNames) {
              const matches = artifacts.filter((artifact) => artifact.name === artifactName);
              assert(matches.length === 1, `Expected artifact ${artifactName} exactly once; found ${matches.length}`);
              if (matches.length !== 1) continue;
              const artifact = matches[0];
              assert(artifact.expired === false, `Artifact expired: ${artifactName}`);
              assert(artifact.workflow_run?.head_sha === targetSha, `Artifact head SHA mismatch: ${artifactName}`);
              const { extractDir, calculatedDigest } = await downloadAndExtract(artifact);
              workflowReport.artifacts.push({ id: artifact.id, name: artifact.name, sizeInBytes: artifact.size_in_bytes, digest: artifact.digest || null, calculatedDigest, expired: artifact.expired, createdAt: artifact.created_at, expiresAt: artifact.expires_at });
              if (artifactName.startsWith('production-like-kubernetes-')) {
                workflowReport.evidence.productionLikeKubernetes = verifyKubernetes(extractDir, artifact, calculatedDigest);
              } else if (artifactName.startsWith('immutable-release-build-')) {
                workflowReport.evidence.immutableRelease = verifyImmutableBuild(extractDir, artifact, calculatedDigest);
              } else if (artifactName.startsWith('immutable-release-migration-security-')) {
                workflowReport.evidence.migrationSecurity = verifyMigrationSecurity(extractDir, artifact, calculatedDigest);
              }
            }
          }

          (async () => {
            try {
              const ref = await request(`${apiBase}/git/ref/heads/${targetBranch}`);
              report.mainRef = { ref: ref.ref, sha: ref.object?.sha || null };
              writeJson('main-ref.json', ref);
              assert(ref.object?.sha === targetSha, `main moved: expected ${targetSha}, actual ${ref.object?.sha}`);

              const commit = await request(`${apiBase}/commits/${targetSha}`);
              writeJson('commit.json', commit);
              assert(commit.sha === targetSha, 'Target commit could not be resolved exactly');

              let runs = await exactRuns();
              for (const [workflowName, config] of Object.entries(required)) {
                await dispatchIfMissing(workflowName, config, runs);
              }

              runs = await waitForStableRuns();
              writeJson('exact-main-runs.json', { workflow_runs: runs });
              report.exactMainRuns = runs.map((run) => ({ id: run.id, workflowId: run.workflow_id, name: run.name, event: run.event, status: run.status, conclusion: run.conclusion, runNumber: run.run_number, runAttempt: run.run_attempt, headBranch: run.head_branch, headSha: run.head_sha, createdAt: run.created_at, updatedAt: run.updated_at, htmlUrl: run.html_url })).sort((a, b) => a.name.localeCompare(b.name));
              assert(runs.length > 0, 'No exact-main GitHub Actions runs found');
              for (const run of runs) {
                assert(run.status === 'completed', `Exact-main run not completed: ${run.name}#${run.run_number} (${run.status})`);
                assert(allowedConclusions.has(run.conclusion), `Exact-main run non-passing: ${run.name}#${run.run_number} (${run.conclusion})`);
              }

              for (const [workflowName, config] of Object.entries(required)) {
                await verifyWorkflow(workflowName, config, runs);
              }

              const combinedStatus = await request(`${apiBase}/commits/${targetSha}/status`);
              writeJson('combined-status.json', combinedStatus);
              report.externalStatuses = (combinedStatus.statuses || []).map((status) => ({ context: status.context, state: status.state, targetUrl: status.target_url, description: status.description, createdAt: status.created_at, updatedAt: status.updated_at }));
              if (report.externalStatuses.some((status) => status.state !== 'success')) {
                warnings.push('Non-success legacy/external statuses are recorded separately and are not treated as GitHub Actions acceptance evidence; obsolete publishers remain tracked by #2600.');
              }

              assert(Boolean(report.requiredWorkflows['Production-like Kubernetes Acceptance']?.evidence?.productionLikeKubernetes), 'Validated Kubernetes evidence missing');
              assert(Boolean(report.requiredWorkflows['Immutable Release Authority Acceptance']?.evidence?.immutableRelease), 'Validated immutable release evidence missing');
              assert(Boolean(report.requiredWorkflows['Immutable Release Authority Acceptance']?.evidence?.migrationSecurity), 'Validated migration security evidence missing');
            } catch (error) {
              addError(`Audit execution failed: ${error.stack || error.message}`);
            }

            report.pass = errors.length === 0;
            report.verdict = report.pass ? 'PASS' : 'FAIL';
            report.auditedAt = new Date().toISOString();
            fs.writeFileSync(path.join(auditDir, 'exact-main-post-merge-audit.json'), `${JSON.stringify(report, null, 2)}\n`);
            fs.writeFileSync(path.join(auditDir, 'verdict.txt'), `${report.verdict}\n`);
            console.log(JSON.stringify({ verdict: report.verdict, errors, warnings, dispatches: report.dispatches, requiredWorkflows: Object.fromEntries(Object.entries(report.requiredWorkflows).map(([name, value]) => [name, value.run])) }, null, 2));
          })();
          NODE

      - name: Upload exact-main audit evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-main-post-merge-audit-0951cec83c3cdb94c3d2215ecbc773763ad3ed27
          path: ${{ env.AUDIT_DIR }}
          if-no-files-found: error
          retention-days: 90

      - name: Enforce exact-main audit verdict
        if: always()
        run: |
          test -f "$AUDIT_DIR/exact-main-post-merge-audit.json"
          node -e 'const r=require("./artifacts/exact-main-audit/exact-main-post-merge-audit.json"); if(r.pass!==true||r.verdict!=="PASS") { console.error(JSON.stringify(r.errors,null,2)); process.exit(1); }'
