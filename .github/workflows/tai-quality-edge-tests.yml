name: TAI quality scoring signed-fixture correction

on:
  push:
    branches:
      - agent/tai-ap-13c1d-remediation-2997
    paths:
      - .github/workflows/tai-quality-edge-tests.yml

permissions:
  contents: write

concurrency:
  group: tai-quality-signed-fixture-correction
  cancel-in-progress: false

jobs:
  correct:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-remediation-2997
          fetch-depth: 0

      - name: Re-sign intentional annotation mutations
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path("apps/tai/tests/test_quality_scoring_authority.py")
          text = path.read_text(encoding="utf-8")

          def replace_once(old: str, new: str) -> None:
              global text
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"replacement anchor count={count}: {old[:80]!r}")
              text = text.replace(old, new)

          replace_once(
              "from pathlib import Path\n",
              "from pathlib import Path\nfrom typing import Any\n",
          )
          replace_once(
              "    NOW,\n    _authority,\n",
              "    NOW,\n    _annotation_signature,\n    _authority,\n",
          )
          replace_once(
              "\n\ndef test_complete_human_quality_scoring_passes(tmp_path: Path) -> None:\n",
              '''\n\ndef _resign_annotation(\n    fixture: dict[str, Any], annotation: dict[str, Any]\n) -> None:\n    annotation.pop("annotation_sha256", None)\n    annotation.pop("annotation_signature", None)\n    secret_path = fixture["identity_secret_path"]\n    assert isinstance(secret_path, Path)\n    annotation["annotation_signature"] = _annotation_signature(\n        secret_path.read_bytes(), annotation\n    )\n    annotation.update(_signed(annotation, "annotation_sha256"))\n\n\ndef test_complete_human_quality_scoring_passes(tmp_path: Path) -> None:\n''',
          )
          replace_once(
              '''        annotation["response_sha256"] = "f" * 64\n        annotation.pop("annotation_sha256")\n        fixture["manifest"]["annotations"][0] = _signed(annotation, "annotation_sha256")\n        _rewrite_manifest(fixture)\n''',
              '''        annotation["response_sha256"] = "f" * 64\n        _resign_annotation(fixture, annotation)\n        _rewrite_manifest(fixture)\n''',
          )
          replace_once(
              '''        critical_group[1]["scorer_id"] = critical_group[0]["scorer_id"]\n        critical_group[1].pop("annotation_sha256")\n        critical_group[1].update(_signed(critical_group[1], "annotation_sha256"))\n        _rewrite_manifest(fixture)\n''',
              '''        critical_group[1]["scorer_id"] = critical_group[0]["scorer_id"]\n        critical_group[1]["identity_assertion_id"] = critical_group[0][\n            "identity_assertion_id"\n        ]\n        _resign_annotation(fixture, critical_group[1])\n        _rewrite_manifest(fixture)\n''',
          )
          replace_once(
              '''        annotation["disagreement_with_annotation_id"] = "ann.other"\n        annotation.pop("annotation_sha256")\n        fixture["manifest"]["annotations"][0] = _signed(annotation, "annotation_sha256")\n        _rewrite_manifest(fixture)\n''',
              '''        annotation["disagreement_with_annotation_id"] = "ann.other"\n        _resign_annotation(fixture, annotation)\n        _rewrite_manifest(fixture)\n''',
          )
          replace_once(
              '''            annotation.pop("annotation_sha256")\n            annotation.update(_signed(annotation, "annotation_sha256"))\n''',
              '''            _resign_annotation(fixture, annotation)\n''',
          )
          path.write_text(text, encoding="utf-8")
          PY

      - name: Remove temporary workflow
        run: git rm .github/workflows/tai-quality-edge-tests.yml

      - name: Validate quality slice
        shell: bash
        run: |
          set -euo pipefail
          cd apps/tai
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          python -m ruff check tai tests
          python -m mypy --strict tai
          python -m pytest \
            tests/test_quality_scoring_authority.py \
            tests/test_quality_scoring_remediation.py \
            tests/test_quality_scoring_cli.py -q
          python -m pytest --cov=tai --cov-report=term --cov-fail-under=90 -q

      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            apps/tai/tests/test_quality_scoring_authority.py \
            .github/workflows/tai-quality-edge-tests.yml
          git diff --cached --check
          git commit -m "test(tai): re-sign intentional quality mutations"
          git push origin HEAD:agent/tai-ap-13c1d-remediation-2997
