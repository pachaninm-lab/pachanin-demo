name: Apply Staff Control Center P1 fixes

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/staff-p1-security-fix.yml
      - .github/scripts/apply-staff-p1-fixes.py
      - .github/workflows/ci.yml
  push:
    branches:
      - feat/platform-v7-staff-control-center
    paths:
      - .github/workflows/staff-p1-security-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.event_name == 'pull_request' && github.head_ref == 'feat/platform-v7-staff-control-center'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/platform-v7-staff-control-center
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Correct one-shot patch script
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/apply-staff-p1-fixes.py')
          text = path.read_text(encoding='utf-8')
          text = text.replace("replace(test, 'await service.operationsQueue(actor);', 'await service.operationsQueue(actor, globalAccess);')\n", '')
          path.write_text(text, encoding='utf-8')
          PY
      - name: Apply exact reviewed patches
        run: python .github/scripts/apply-staff-p1-fixes.py
      - name: Restore standard CI and commit security fixes
        run: |
          set -euo pipefail
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/staff-p1-security-fix.yml .github/scripts/apply-staff-p1-fixes.py
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Scope staff workspaces and preserve audit integrity"
          git push origin HEAD:feat/platform-v7-staff-control-center
