name: Field roles v8 copy

on:
  push:
    branches:
      - codex/design-system-v8-field-roles-only
    paths:
      - .github/workflows/field-roles-v8-copy.yml

permissions:
  contents: write

jobs:
  copy-field-role-slice:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/design-system-v8-field-roles-only
          fetch-depth: 0
      - name: Fetch verified field-role source
        run: git fetch origin codex/design-system-v8-shell-field-roles
      - name: Copy non-overlapping field-role files
        shell: bash
        run: |
          set -euo pipefail
          source_ref=origin/codex/design-system-v8-shell-field-roles
          files=(
            apps/web/app/platform-v7/driver/field/page.tsx
            apps/web/app/platform-v7/elevator/page.tsx
            apps/web/app/platform-v7/lab/page.tsx
            apps/web/app/platform-v7/surveyor/page.tsx
            apps/web/components/transaction-ux/FieldTaskTemplate.tsx
            apps/web/components/transaction-ux/FieldTaskTemplate.module.css
            apps/web/components/transaction-ux/FieldRoleWorkspace.module.css
          )
          for file in "${files[@]}"; do
            mkdir -p "$(dirname "$file")"
            git show "$source_ref:$file" > "$file"
          done
      - name: Commit field-role slice
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/app/platform-v7/driver/field/page.tsx apps/web/app/platform-v7/elevator/page.tsx apps/web/app/platform-v7/lab/page.tsx apps/web/app/platform-v7/surveyor/page.tsx apps/web/components/transaction-ux/FieldTaskTemplate.tsx apps/web/components/transaction-ux/FieldTaskTemplate.module.css apps/web/components/transaction-ux/FieldRoleWorkspace.module.css
          git diff --cached --quiet && exit 0
          git commit -m "Migrate four field roles to Design System v8"
          git push origin HEAD:codex/design-system-v8-field-roles-only
