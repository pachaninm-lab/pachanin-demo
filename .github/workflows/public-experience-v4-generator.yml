              "  const [guideMode, setGuideMode] = useState<GuideMode>('idle');\n  const [stagesExpanded, setStagesExpanded] = useState(false);",
          )
          replace(
              "  const stage = copy.explorer.stages[state.stage];",
              "  const ui = getPublicProductExperienceV4Copy(locale);\n  const stage = copy.explorer.stages[state.stage];",
          )
          replace(
              "              {copy.explorer.scenarios[key].label}",
              "              {ui.explorer.scenarios[key]}",
          )
          replace(
              "              <span>{copy.explorer.controls.startGuide}</span>",
              "              <span>{ui.explorer.startGuide}</span>",
          )
          replace(
              "          <span className='pc-ppe-control-label'>{copy.explorer.controls.lens}</span>",
              "          <span className='pc-ppe-control-label'>{ui.explorer.lensLabel}</span>",
          )
          replace(
