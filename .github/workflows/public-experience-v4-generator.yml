                        setLens(key);
                        emit('lens_selected', { locale, lens: key, source: 'home_preview' });
                      }}
                    >
                      <PublicExperienceIcon name={key} size={18} />
                      <span>{preview.lenses[key].label}</span>
                    </button>
                  ))}
