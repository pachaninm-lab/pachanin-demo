              "        <button\n          type='button'\n          className='pc-ppe-stage-mobile-summary'\n          aria-expanded={stagesExpanded}\n          aria-controls='pc-ppe-stage-track'\n          onClick={() => setStagesExpanded((expanded) => !expanded)}\n        >\n          <span>{ui.explorer.stagePrefix} {currentStageIndex + 1} {ui.explorer.stageDivider} {TOUR_STAGES.length}</span>\n          <strong>{stage.label}</strong>\n          <small>{stage.action}</small>\n          <PublicExperienceIcon name='arrow' size={20} />\n          <span className='sr-only'>{stagesExpanded ? ui.explorer.hideStages : ui.explorer.showStages}</span>\n        </button>\n\n        <div id='pc-ppe-stage-track' className='pc-ppe-stage-track' data-expanded={stagesExpanded ? 'true' : 'false'} role='group' aria-label={copy.explorer.controls.stage}>",
          )
