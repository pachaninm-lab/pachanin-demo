name: Generate Public Product Experience V4

on:
  push:
    branches:
      - agent/public-product-experience-v4-world-class
    paths:
      - .github/workflows/public-experience-v4-generator.yml

permissions:
  contents: write

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-product-experience-v4-world-class
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Generate refined public product experience
        shell: bash
        run: |
          cat > apps/web/i18n/public-product-experience-v4.ts <<'EOF'
          import { isAppLocale, type AppLocale } from '@/i18n/locale';

          const copy = {
            ru: {
              home: {
                hero: {
                  kicker: 'Исполнение внебиржевой зерновой сделки',
                  title: 'Сделка под контролем — от условий до расчёта',
                  lead: 'Участники, перевозка, приёмка, качество, документы, деньги и спор связаны одной проверяемой историей исполнения.',
                  primary: 'Посмотреть сделку',
                  secondary: 'Подключить организацию',
                  progressAria: 'Текущий путь сделки',
                  stageCounter: 'Этап 6 из 10',
                  currentStage: 'Приёмка',
                  nextStage: 'Далее: проверка качества',
                  showAllStages: 'Показать все этапы',
                },
                preview: {
                  open: 'Показать весь путь сделки',
                  stageCounter: 'Этап 6 из 10',
                  nextPrefix: 'Далее',
                },
                perspectives: {
                  title: 'Как сделку видит каждый участник',
                  lead: 'Выберите роль — изменятся действия, документы, ответственность и денежный контекст.',
                  more: 'Показать остальные роли',
                },
                final: {
                  title: 'Проверьте полный путь сделки',
                  primary: 'Показать весь путь сделки',
                  secondary: 'Подключить организацию',
                  signInPrefix: 'Уже подключены?',
                  signIn: 'Войти',
                },
              },
              explorer: {
                kicker: 'Пример исполнения зерновой сделки',
                title: 'Как исполняется сделка',
                lead: 'Выберите роль и сценарий. Затем пройдите этапы, документы, деньги и риски на одном учебном примере.',
                backHome: 'На главную',
                connect: 'Подключить организацию',
                lensLabel: 'Что посмотреть',
                startGuide: 'Показать всю сделку',
                stagePrefix: 'Этап',
                stageDivider: 'из',
                showStages: 'Показать все этапы',
                hideStages: 'Скрыть этапы',
                scenarios: {
                  standard: 'Без отклонений',
                  partial: 'Частичная приёмка',
                  dispute: 'Спор по качеству',
                },
              },
            },
            en: {
              home: {
                hero: {
                  kicker: 'Execution of an OTC grain transaction',
                  title: 'A controlled deal — from terms to settlement',
                  lead: 'Participants, transport, acceptance, quality, documents, money and disputes remain connected in one verifiable execution history.',
                  primary: 'View the deal',
                  secondary: 'Connect an organisation',
                  progressAria: 'Current deal path',
                  stageCounter: 'Stage 6 of 10',
                  currentStage: 'Acceptance',
                  nextStage: 'Next: quality inspection',
                  showAllStages: 'Show all stages',
                },
                preview: {
                  open: 'Show the complete deal path',
                  stageCounter: 'Stage 6 of 10',
                  nextPrefix: 'Next',
                },
                perspectives: {
                  title: 'How each participant sees the deal',
                  lead: 'Choose a role to change actions, documents, responsibility and money context.',
                  more: 'Show the remaining roles',
                },
                final: {
                  title: 'Review the complete deal path',
                  primary: 'Show the complete deal path',
                  secondary: 'Connect an organisation',
                  signInPrefix: 'Already connected?',
                  signIn: 'Sign in',
                },
              },
              explorer: {
                kicker: 'Illustrative grain deal execution',
                title: 'How the deal is executed',
                lead: 'Choose a role and scenario, then review stages, documents, money and risks in one illustrative deal.',
                backHome: 'Back to home',
                connect: 'Connect an organisation',
                lensLabel: 'What to review',
                startGuide: 'Play the complete deal',
                stagePrefix: 'Stage',
                stageDivider: 'of',
                showStages: 'Show all stages',
                hideStages: 'Hide stages',
                scenarios: {
                  standard: 'No deviations',
                  partial: 'Partial acceptance',
                  dispute: 'Quality dispute',
                },
              },
            },
            zh: {
              home: {
                hero: {
                  kicker: '场外粮食交易履约',
                  title: '从交易条件到结算，全程受控',
                  lead: '参与方、运输、收货、质量、文件、资金与争议统一在一条可核验的履约记录中。',
                  primary: '查看交易',
                  secondary: '接入组织',
                  progressAria: '当前交易路径',
                  stageCounter: '第 6 阶段，共 10 阶段',
                  currentStage: '收货',
                  nextStage: '下一步：质量检验',
                  showAllStages: '查看全部阶段',
                },
                preview: {
                  open: '查看完整交易路径',
                  stageCounter: '第 6 阶段，共 10 阶段',
                  nextPrefix: '下一步',
                },
                perspectives: {
                  title: '各参与方如何查看交易',
                  lead: '选择角色后，操作、文件、责任和资金上下文会随之变化。',
                  more: '查看其他角色',
                },
                final: {
                  title: '核对完整交易路径',
                  primary: '查看完整交易路径',
                  secondary: '接入组织',
                  signInPrefix: '已接入？',
                  signIn: '登录',
                },
              },
              explorer: {
                kicker: '粮食交易履约示例',
                title: '交易如何执行',
                lead: '选择角色和场景，然后在同一示例中查看阶段、文件、资金和风险。',
                backHome: '返回首页',
                connect: '接入组织',
                lensLabel: '查看内容',
                startGuide: '播放完整交易',
                stagePrefix: '第',
                stageDivider: '阶段，共',
                showStages: '查看全部阶段',
                hideStages: '收起阶段',
                scenarios: {
                  standard: '无偏差',
                  partial: '部分收货',
                  dispute: '质量争议',
                },
              },
            },
          } as const;

          export type PublicProductExperienceV4Copy = (typeof copy)[AppLocale];

          export function getPublicProductExperienceV4Copy(locale: string): PublicProductExperienceV4Copy {
            const resolved: AppLocale = isAppLocale(locale) ? locale : 'ru';
            return copy[resolved];
          }
          EOF

          cat > apps/web/styles/platform-v7-public-product-experience-v4.css <<'EOF'
          :root {
            --pc-ppe-v4-header: 56px;
            --pc-ppe-v4-section: clamp(56px, 7vw, 84px);
            --pc-ppe-v4-card-radius: 20px;
          }

          .pc-ppe-page {
            scroll-padding-top: calc(var(--pc-ppe-v4-header) + 18px);
            scroll-padding-bottom: 104px;
          }

          .pc-ppe-page > .pc-ppe-shell {
            padding-top: var(--pc-ppe-v4-header);
          }

          .pc-ppe-page section[id],
          .pc-ppe-page h1[id],
          .pc-ppe-page h2[id],
          .pc-ppe-page [data-scroll-target] {
            scroll-margin-top: calc(var(--pc-ppe-v4-header) + 18px);
          }

          .pc-ppe-page .pc-site-header {
            height: var(--pc-ppe-v4-header);
            min-height: var(--pc-ppe-v4-header);
            padding-inline: clamp(12px, 3vw, 32px);
          }

          .pc-ppe-page .pc-site-brand {
            gap: 9px;
          }

          .pc-ppe-page .pc-site-brand-mark {
            position: relative;
            width: 36px;
            height: 36px;
            flex-basis: 36px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 10px;
            background: linear-gradient(145deg, #0d4b2e, #082f20);
            box-shadow: 0 6px 16px rgba(8, 47, 32, 0.18);
          }

          .pc-ppe-page .pc-site-brand-mark img {
            display: none !important;
          }

          .pc-ppe-page .pc-site-brand-mark::before,
          .pc-ppe-page .pc-site-brand-mark::after {
            content: '';
            position: absolute;
            inset: 9px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
          }

          .pc-ppe-page .pc-site-brand-mark::after {
            inset: 10px 8px 8px 10px;
            border: 0;
            background:
              linear-gradient(135deg, transparent 44%, #8fe0ad 45% 54%, transparent 55%) 0 0 / 100% 100% no-repeat,
              radial-gradient(circle at 22% 72%, #fff 0 2px, transparent 2.5px),
              radial-gradient(circle at 55% 48%, #fff 0 2px, transparent 2.5px),
              radial-gradient(circle at 82% 20%, #fff 0 2px, transparent 2.5px);
          }

          .pc-ppe-page .pc-site-brand-text strong {
            font-size: 17px;
            letter-spacing: -0.025em;
          }

          .pc-ppe-page .pc-site-locale-switch,
          .pc-ppe-page .pc-site-actions > a {
            min-height: 44px;
          }

          .pc-ppe-shell {
            width: min(1180px, calc(100% - 32px));
          }

          .pc-ppe-hero {
            min-height: auto;
            padding: clamp(44px, 6vw, 72px) 0 42px;
            gap: clamp(28px, 5vw, 64px);
          }

          .pc-ppe-hero h1,
          .pc-ppe-explorer-intro h1 {
            margin: 16px 0 14px;
            font-size: clamp(42px, 4.8vw, 66px);
            line-height: 1.02;
            letter-spacing: -0.04em;
          }

          .pc-ppe-hero-copy > p,
          .pc-ppe-explorer-intro p {
            max-width: 690px;
            font-size: clamp(17px, 1.45vw, 20px);
            line-height: 1.55;
          }

          .pc-ppe-hero-actions,
          .pc-ppe-final-actions,
          .pc-ppe-explorer-intro-actions {
            margin-top: 24px;
          }

          .pc-ppe-primary-button,
          .pc-ppe-secondary-button {
            min-height: 50px;
            border-radius: 14px;
          }

          .pc-ppe-hero-contour {
            display: block;
            min-height: 300px;
            padding: 34px 24px;
            overflow: hidden;
            border-radius: 24px;
          }

          .pc-ppe-hero-contour::before {
            display: none;
          }

          .pc-ppe-hero-contour-desktop {
            position: relative;
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            align-items: center;
            min-height: 230px;
          }

          .pc-ppe-hero-contour-desktop::before {
            content: '';
            position: absolute;
            left: 7%;
            right: 7%;
            top: 50%;
            height: 2px;
            background: linear-gradient(90deg, #8cb79b 0 67%, #cbd8d0 67% 100%);
          }

          .pc-ppe-hero-contour-desktop > span {
            position: relative;
            z-index: 1;
            display: grid;
            justify-items: center;
            gap: 10px;
            min-width: 0;
            color: #52635b;
            text-align: center;
            font-size: 12px;
          }

          .pc-ppe-hero-contour-desktop > span > i {
            display: grid;
            place-items: center;
            width: 38px;
            height: 38px;
            border: 2px solid #a7bdb1;
            border-radius: 50%;
            background: #fff;
            color: #496056;
            font-style: normal;
            font-weight: 800;
          }

          .pc-ppe-hero-contour-desktop > span > b {
            max-width: 84px;
            line-height: 1.3;
          }

          .pc-ppe-hero-contour-desktop > span[data-active='true'] {
            color: var(--pc-ppe-green-dark);
          }

          .pc-ppe-hero-contour-desktop > span[data-active='true'] > i {
            width: 46px;
            height: 46px;
            border-color: var(--pc-ppe-green);
            background: var(--pc-ppe-green);
            color: #fff;
          }

          .pc-ppe-hero-progress-mobile {
            display: none;
          }

          .pc-ppe-section {
            padding: var(--pc-ppe-v4-section) 0;
          }

          .pc-ppe-section-header {
            margin-bottom: 24px;
          }

          .pc-ppe-preview-card,
          .pc-ppe-deal-card,
          .pc-ppe-lens-panel,
          .pc-ppe-context-panel,
          .pc-ppe-timeline,
          .pc-ppe-entry-gate {
            border-radius: var(--pc-ppe-v4-card-radius);
            box-shadow: 0 12px 32px rgba(19, 49, 34, 0.07);
          }

          .pc-ppe-preview-card {
            padding: clamp(20px, 3vw, 30px);
          }

          .pc-ppe-preview-progress {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            align-items: center;
            gap: 3px 14px;
            margin: 18px 0 4px;
            padding: 14px 16px;
            border: 1px solid #d3e0d8;
            border-radius: 16px;
            background: #f7faf8;
          }

          .pc-ppe-preview-progress > span {
            grid-row: 1 / span 2;
            align-self: stretch;
            display: grid;
            place-items: center;
            min-width: 92px;
            padding: 8px 10px;
            border-radius: 12px;
            background: var(--pc-ppe-green-soft);
            color: var(--pc-ppe-green-dark);
            font-size: 12px;
            font-weight: 800;
          }

          .pc-ppe-preview-progress strong {
            font-size: 18px;
          }

          .pc-ppe-preview-progress small {
            color: var(--pc-ppe-muted);
            font-size: 14px;
          }

          .pc-ppe-preview-status {
            margin-top: 18px;
          }

          .pc-ppe-perspective-grid {
            gap: 12px;
          }

          .pc-ppe-perspective-card {
            min-height: 92px;
            padding: 16px 18px;
            border-radius: 18px;
            box-shadow: none;
          }

          .pc-ppe-all-participants {
            margin-top: 14px;
          }

          .pc-ppe-all-participants > summary {
            min-height: 50px;
          }

          .pc-ppe-proof-panel {
            border-radius: 24px;
          }

          .pc-ppe-final-cta {
            padding: var(--pc-ppe-v4-section) 0 calc(var(--pc-ppe-v4-section) + 12px);
          }

          .pc-ppe-final-signin a {
            text-decoration-thickness: 1px;
            text-underline-offset: 4px;
          }

          .pc-ppe-explorer-intro {
            align-items: start;
            gap: 22px;
            padding: 42px 0 28px;
          }

          .pc-ppe-explorer-intro-actions {
            margin-top: 4px;
          }

          .pc-ppe-back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            min-height: 44px;
            padding: 8px 4px;
            color: var(--pc-ppe-green-dark);
            font-weight: 750;
            text-decoration: none;
          }

          .pc-ppe-explorer-toolbar {
            position: relative;
            z-index: 1;
          }

          .pc-ppe-stage-mobile-summary {
            display: none;
          }

          .pc-ppe-deal-facts {
            gap: 0;
            overflow: hidden;
            border: 1px solid var(--pc-ppe-line);
            border-radius: 16px;
            background: #fff;
          }

          .pc-ppe-deal-facts > div {
            border-bottom: 1px solid var(--pc-ppe-line);
            background: transparent !important;
          }

          .pc-ppe-deal-state {
            gap: 10px;
          }

          .pc-ppe-deal-state > div {
            border-radius: 14px;
            box-shadow: none;
          }

          .pc-ppe-page .p7-support-chat-button {
            right: -4px !important;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 18px) !important;
            width: 46px !important;
            height: 48px !important;
            border-radius: 18px 0 0 18px !important;
            opacity: 0.94;
            box-shadow: 0 12px 28px rgba(0, 122, 47, 0.2);
          }

          .pc-ppe-page .p7-support-chat-panel {
            bottom: calc(env(safe-area-inset-bottom, 0px) + 76px) !important;
          }

          @media (max-width: 820px) {
            .pc-ppe-shell {
              width: min(100% - 24px, 720px);
            }

            .pc-ppe-hero {
              grid-template-columns: minmax(0, 1fr);
              padding-top: 36px;
            }

            .pc-ppe-hero-contour {
              min-height: 0;
              padding: 18px;
            }

            .pc-ppe-hero-contour-desktop {
              display: none;
            }

            .pc-ppe-hero-progress-mobile {
              display: grid;
              grid-template-columns: minmax(0, 1fr) auto;
              gap: 5px 14px;
              align-items: center;
            }

            .pc-ppe-hero-progress-mobile > span {
              color: var(--pc-ppe-muted);
              font-size: 12px;
              font-weight: 800;
              text-transform: uppercase;
            }

            .pc-ppe-hero-progress-mobile > strong {
              grid-column: 1;
              font-size: 24px;
            }

            .pc-ppe-hero-progress-mobile > small {
              grid-column: 1;
              color: var(--pc-ppe-muted);
              font-size: 14px;
            }

            .pc-ppe-hero-progress-mobile > a {
              grid-column: 2;
              grid-row: 1 / span 3;
              display: inline-flex;
              align-items: center;
              justify-content: center;
              min-width: 48px;
              min-height: 48px;
              border-radius: 14px;
              background: var(--pc-ppe-green);
              color: #fff;
              text-decoration: none;
            }

            .pc-ppe-explorer-intro {
              display: grid;
              padding-top: 32px;
            }

            .pc-ppe-explorer-intro-actions {
              order: -1;
            }
          }

          @media (max-width: 720px) {
            .pc-ppe-page {
              --pc-ppe-v4-header: 54px;
              scroll-padding-bottom: 88px;
            }

            .pc-ppe-page .pc-site-header {
              gap: 8px;
              padding-inline: 12px;
            }

            .pc-ppe-page .pc-site-brand-mark {
              width: 34px;
              height: 34px;
              flex-basis: 34px;
            }

            .pc-ppe-page .pc-site-brand-text strong {
              max-width: 190px;
              overflow: hidden;
              font-size: 16px;
              text-overflow: ellipsis;
            }

            .pc-ppe-page .pc-site-locale-switch {
              min-width: 48px;
              height: 42px;
            }

            .pc-ppe-hero {
              padding: 30px 0 28px;
              gap: 24px;
            }

            .pc-ppe-hero h1,
            .pc-ppe-explorer-intro h1 {
              max-width: 100%;
              margin: 14px 0 12px;
              font-size: clamp(38px, 10.8vw, 44px);
              line-height: 1.04;
              letter-spacing: -0.035em;
              text-wrap: pretty;
            }

            .pc-ppe-hero-copy > p,
            .pc-ppe-explorer-intro p {
              font-size: 17px;
              line-height: 1.5;
            }

            .pc-ppe-kicker {
              max-width: 100%;
              white-space: normal;
            }

            .pc-ppe-hero-actions,
            .pc-ppe-final-actions {
              display: grid;
              grid-template-columns: minmax(0, 1fr);
            }

            .pc-ppe-primary-button,
            .pc-ppe-secondary-button {
              width: 100%;
              min-height: 52px;
              padding-inline: 16px;
            }

            .pc-ppe-section {
              padding: 56px 0;
            }

            .pc-ppe-section-header h2,
            .pc-ppe-final-cta h2 {
              font-size: 34px;
              line-height: 1.08;
            }

            .pc-ppe-preview-heading {
              display: grid;
              align-items: start;
              gap: 12px;
            }

            .pc-ppe-route {
              justify-self: start;
            }

            .pc-ppe-preview-progress {
              grid-template-columns: minmax(0, 1fr);
            }

            .pc-ppe-preview-progress > span {
              grid-row: auto;
              justify-self: start;
              min-width: 0;
            }

            .pc-ppe-preview-status {
              grid-template-columns: minmax(0, 1fr);
            }

            .pc-ppe-preview-status div {
              padding: 14px;
            }

            .pc-ppe-perspective-grid {
              grid-template-columns: minmax(0, 1fr) !important;
            }

            .pc-ppe-perspective-card {
              min-height: 86px;
              padding: 14px 16px;
            }

            .pc-ppe-proof-panel {
              padding: 26px 22px;
            }

            .pc-ppe-proof-panel h2 {
              font-size: 32px;
              line-height: 1.08;
            }

            .pc-ppe-proof-list li {
              gap: 12px;
            }

            .pc-ppe-final-cta {
              padding-top: 56px;
              padding-bottom: 88px;
            }

            .pc-ppe-explorer-toolbar {
              gap: 14px;
            }

            .pc-ppe-segmented {
              display: grid;
              grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .pc-ppe-segmented button {
              min-width: 0;
              padding-inline: 8px;
              font-size: 13px;
              white-space: normal;
            }

            .pc-ppe-stage-mobile-summary {
              display: grid;
              grid-template-columns: minmax(0, 1fr) auto;
              align-items: center;
              gap: 4px 12px;
              width: 100%;
              min-height: 76px;
              margin: 18px 0 0;
              padding: 14px 16px;
              border: 1px solid #bfd2c6;
              border-radius: 16px;
              background: #f7faf8;
              color: var(--pc-ppe-ink);
              text-align: left;
              cursor: pointer;
            }

            .pc-ppe-stage-mobile-summary > span {
              color: var(--pc-ppe-muted);
              font-size: 12px;
              font-weight: 800;
              text-transform: uppercase;
            }

            .pc-ppe-stage-mobile-summary > strong,
            .pc-ppe-stage-mobile-summary > small {
              grid-column: 1;
            }

            .pc-ppe-stage-mobile-summary > strong {
              font-size: 19px;
            }

            .pc-ppe-stage-mobile-summary > small {
              color: var(--pc-ppe-muted);
              font-size: 14px;
              line-height: 1.35;
            }

            .pc-ppe-stage-mobile-summary > svg {
              grid-column: 2;
              grid-row: 1 / span 3;
              transition: transform 160ms ease;
            }

            .pc-ppe-stage-mobile-summary[aria-expanded='true'] > svg {
              transform: rotate(90deg);
            }

            .pc-ppe-stage-track {
