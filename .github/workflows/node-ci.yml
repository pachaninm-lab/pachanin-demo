name: Node CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/node-ci.yml'
  workflow_dispatch:

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: |
          set -o pipefail
          pnpm run typecheck 2>&1 | tee /tmp/node-ci-typecheck.log
      - name: Upload typecheck log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-ci-typecheck-log
          path: /tmp/node-ci-typecheck.log
      - name: Test
        run: |
          set -o pipefail
          pnpm run test 2>&1 | tee /tmp/node-ci-test.log
      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-ci-test-log
          path: /tmp/node-ci-test.log
      - name: Build
        run: |
          set -o pipefail
          pnpm run build 2>&1 | tee /tmp/node-ci-build.log
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-ci-build-log
          path: /tmp/node-ci-build.log
