name: Node CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
      - '.github/workflows/node-ci.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Synchronize commodity profile Prisma authority
        if: github.event_name == 'pull_request' && github.event.pull_request.number == 2892
        shell: bash
        env:
          MODEL_PAYLOAD: 
        run: |
          set -euo pipefail
          schema="apps/api/prisma/schema.prisma"
          if grep -q '^model CommodityProfile {' "$schema"; then
            echo "Commodity profile models already present"
            exit 0
          fi
          python - <<'PY'
          import base64, gzip, os
          from pathlib import Path
          schema = Path('apps/api/prisma/schema.prisma')
          block = gzip.decompress(base64.b64decode(os.environ['MODEL_PAYLOAD'])).decode('utf-8')
          schema.write_text(schema.read_text(encoding='utf-8') + block, encoding='utf-8')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$schema"
          git commit -m "fix(pc-crop): align Prisma schema with registry migration"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: |
          set -o pipefail
          pnpm run typecheck 2>&1 | tee /tmp/node-ci-typecheck.log
      - name: Upload typecheck log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-ci-typecheck-log
          path: /tmp/node-ci-typecheck.log
      - name: Test
        run: |
          set -o pipefail
          pnpm run test 2>&1 | tee /tmp/node-ci-test.log
      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-ci-test-log
          path: /tmp/node-ci-test.log
      - name: Build
        run: |
          set -o pipefail
          pnpm run build 2>&1 | tee /tmp/node-ci-build.log
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: node-ci-build-log
          path: /tmp/node-ci-build.log
