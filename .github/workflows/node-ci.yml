name: Node CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
  pull_request:
    branches: [main]
    paths:
      - 'apps/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck
      - run: pnpm run test
      - run: pnpm run build
