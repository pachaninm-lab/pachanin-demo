name: Node CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: node-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Run typecheck with diagnostic log
        run: |
          set +e
          pnpm run typecheck > typecheck.log 2>&1
          status=$?
          tail -n 200 typecheck.log
          exit $status
      - name: Upload typecheck diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-ci-typecheck-log
          path: typecheck.log
      - run: pnpm run test
      - run: pnpm run build
