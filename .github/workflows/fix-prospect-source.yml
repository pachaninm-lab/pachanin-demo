name: one-shot prospect source fix
on:
  push:
    branches: [feat/assistant-universal-understanding]
permissions:
  contents: write
jobs:
  fix:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/assistant-universal-understanding
      - name: Fix source alias and remove workflow
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/lib/platform-v7/prospect-assistant-knowledge.ts')
          text = path.read_text()
          if 'S.security' not in text:
              raise SystemExit('expected S.security marker not found')
          path.write_text(text.replace('S.security', 'S.secure'))
          PY
          rm .github/workflows/fix-prospect-source.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web/lib/platform-v7/prospect-assistant-knowledge.ts .github/workflows/fix-prospect-source.yml
          git commit -m "Fix prospect knowledge source alias"
          git push origin HEAD:feat/assistant-universal-understanding
