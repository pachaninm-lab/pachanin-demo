name: TAI PR 2839 Merge AP-13B.2b

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-pr-2839-merge-ap13b2b.yml

permissions:
  actions: read
  contents: write

concurrency:
  group: tai-pr-2839-merge-ap13b2b
  cancel-in-progress: false

jobs:
  merge-main:
    if: >-
      github.event.pull_request.number == 2839 &&
      github.event.pull_request.head.ref == 'agent/tai-ap-13b3a-model-bundle-authority'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      AP13B2B_EXACT_MAIN: 84c3bd7d1ac5ef7717932993654cb4b162bdf825
      EXACT_PR_HEAD: ${{ github.event.pull_request.head.sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_PR_HEAD }}
          fetch-depth: 0

      - name: Enforce exact branch head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXACT_PR_HEAD"
          test "$GITHUB_HEAD_REF" = 'agent/tai-ap-13b3a-model-bundle-authority'

      - name: Verify AP-13B.2b exact-main release attestation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ap13b2b-exact-main
          run_id=''
          for attempt in $(seq 1 90); do
            gh api \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${AP13B2B_EXACT_MAIN}&per_page=100" \
              > /tmp/ap13b2b-exact-main/runs.json
            set +e
            run_id="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          exact = os.environ['AP13B2B_EXACT_MAIN']
          runs = json.loads(
              Path('/tmp/ap13b2b-exact-main/runs.json').read_text()
          ).get('workflow_runs', [])
          matching = [
              run
              for run in runs
              if run.get('name') == 'TAI Release Acceptance'
              and run.get('head_sha') == exact
          ]
          if not matching:
              raise SystemExit(3)
          run = max(
              matching,
              key=lambda item: (item.get('run_number', 0), item.get('id', 0)),
          )
          if run.get('status') != 'completed':
              raise SystemExit(3)
          if run.get('conclusion') != 'success':
              print(json.dumps(run, sort_keys=True))
              raise SystemExit(2)
          print(run['id'])
          PY
            )"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              break
            fi
            if [ "$status" -eq 2 ]; then
              echo 'AP-13B.2b exact-main release acceptance failed.' >&2
              exit 1
            fi
            if [ "$attempt" -eq 90 ]; then
              echo 'AP-13B.2b exact-main release acceptance did not complete.' >&2
              exit 1
            fi
            sleep 20
          done
          test -n "$run_id"
          gh run download "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name "tai-release-attestation-${AP13B2B_EXACT_MAIN}" \
            --dir /tmp/ap13b2b-exact-main/evidence
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/ap13b2b-exact-main/evidence')
          attestation = json.loads(
              (root / 'tai-release-attestation.json').read_text()
          )
          exact = os.environ['AP13B2B_EXACT_MAIN']
          if attestation.get('exact_main_sha') != exact:
              raise SystemExit('exact-main attestation SHA mismatch')
          if attestation.get('accepted') is not True:
              raise SystemExit('exact-main attestation is not accepted')
          if attestation.get('production_operational_status') != 'NOT_ATTESTED':
              raise SystemExit('operational maturity boundary was changed')
          workflow_evidence = json.loads(
              (root / 'workflow-evidence.json').read_text()
          )
          if not workflow_evidence:
              raise SystemExit('exact-main workflow evidence is empty')
          if any(item.get('exact_head_sha') != exact for item in workflow_evidence):
              raise SystemExit('workflow evidence contains a different SHA')
          if any(item.get('conclusion') != 'success' for item in workflow_evidence):
              raise SystemExit('workflow evidence contains a non-success conclusion')
          PY

      - name: Merge accepted main into AP-13B.3a
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          test "$(git rev-parse refs/remotes/origin/main)" = "$AP13B2B_EXACT_MAIN"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git merge --no-ff refs/remotes/origin/main \
            -m 'Merge main after AP-13B.2b acceptance'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml

      - name: Verify merged AP-13B.3a authority
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e 'apps/tai[dev]'
          ruff check \
            apps/tai/tai/model_bundle_v2.py \
            apps/tai/tai/model_bundle_v2_common.py \
            apps/tai/tai/model_bundle_v2_parse.py \
            apps/tai/tai/model_bundle_v2_serialize.py \
            apps/tai/tai/model_bundle_v2_types.py \
            apps/tai/tai/model_bundle_v2_verify.py \
            apps/tai/tests/model_bundle_v2_support.py \
            apps/tai/tests/test_ap13b3a_scope.py \
            apps/tai/tests/test_model_bundle_v2_adversarial.py \
            apps/tai/tests/test_model_bundle_v2_contract.py
          mypy --strict \
            apps/tai/tai/model_bundle_v2.py \
            apps/tai/tai/model_bundle_v2_common.py \
            apps/tai/tai/model_bundle_v2_parse.py \
            apps/tai/tai/model_bundle_v2_serialize.py \
            apps/tai/tai/model_bundle_v2_types.py \
            apps/tai/tai/model_bundle_v2_verify.py
          pytest -q \
            apps/tai/tests/test_ap13b3a_scope.py \
            apps/tai/tests/test_model_bundle_v2_adversarial.py \
            apps/tai/tests/test_model_bundle_v2_contract.py \
            --cov=tai.model_bundle_v2 \
            --cov=tai.model_bundle_v2_common \
            --cov=tai.model_bundle_v2_parse \
            --cov=tai.model_bundle_v2_serialize \
            --cov=tai.model_bundle_v2_types \
            --cov=tai.model_bundle_v2_verify \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Finalize clean merge commit
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/tai-pr-2839-merge-ap13b2b.yml \
            .coverage .coverage.*
          rm -rf .mypy_cache .pytest_cache .ruff_cache \
            apps/tai/transparent_agro_intelligence.egg-info
          find apps/tai -type d -name __pycache__ -prune -exec rm -rf {} +
          git add -A
          git diff --cached --check
          git commit --amend --no-edit
          test "$(git show -s --format=%P HEAD | wc -w)" -eq 2
          git push origin HEAD:agent/tai-ap-13b3a-model-bundle-authority
