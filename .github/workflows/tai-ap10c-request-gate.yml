name: TAI AP-10C Request Gate Bootstrap
on:
  push:
    branches: [tai/ap10c-production-composition]
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tai/ap10c-production-composition
      - shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/tai/tai/main.py')
          text = path.read_text()
          block = '''        if runtime is None or identity_authority is None:\n            return _error(\n                request_id=payload.request_id,\n                code="RUNTIME_NOT_CONFIGURED",\n                message="TAI orchestration runtime is not configured",\n                retryable=True,\n                status_code=503,\n            )\n'''
          gate = '''        state = readiness_state()\n        if not state.ready:\n            return _error(\n                request_id=payload.request_id,\n                code="RUNTIME_NOT_READY",\n                message="TAI runtime dependencies are not ready",\n                retryable=True,\n                status_code=503,\n            )\n'''
          if text.count(block) != 2:
              raise SystemExit('expected two runtime configuration guards')
          path.write_text(text.replace(block, block + gate))

          tests = Path('apps/tai/tests/test_main_readiness.py')
          existing = tests.read_text()
          existing += '''\n\ndef test_requests_fail_closed_when_live_dependencies_are_not_ready() -> None:\n    client = _client(\n        _Probe(\n            ReadinessStatus(\n                False,\n                {"postgresql": "unavailable"},\n                ("POSTGRESQL_UNAVAILABLE",),\n            )\n        )\n    )\n    response = client.post(\n        "/v1/platform/answer",\n        json={\n            "request_id": "request-not-ready",\n            "question": "Что со сделкой?",\n            "locale": "ru",\n            "deadline_ms": 60_000,\n        },\n        headers={"Idempotency-Key": "idempotency-not-ready"},\n    )\n    assert response.status_code == 503\n    assert response.json()["code"] == "RUNTIME_NOT_READY"\n'''
          tests.write_text(existing)
          Path('.github/workflows/tai-ap10c-request-gate.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix(tai): gate requests on live production readiness"
          git push origin HEAD:tai/ap10c-production-composition
