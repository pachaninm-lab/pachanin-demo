name: Temporary IR-10.2 typecheck repair

on:
  push:
    branches:
      - agent/ir-10-2-logistics-postgresql-authority

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[ir-10-2-typecheck-fixed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-2-logistics-postgresql-authority
          fetch-depth: 0
      - name: Repair exact TypeScript failures
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          repo = Path('apps/api/src/modules/logistics/prisma-shipment.repository.ts')
          source = repo.read_text()
          old = 'tx.$queryRaw<ShipmentRecord[]>(Prisma.sql`'
          count = source.count(old)
          if count != 3:
              raise SystemExit(f'expected 3 ShipmentRecord raw-update generics, found {count}')
          source = source.replace(old, 'tx.$queryRaw<ShipmentAuthorityRecord[]>(Prisma.sql`')
          repo.write_text(source)

          test = Path('apps/api/test/one-deal/industrial-one-deal.e2e-spec.ts')
          source = test.read_text()
          old_import = "import { ConflictException, ForbiddenException, UnauthorizedException } from '@nestjs/common';"
          new_import = "import { ConflictException, ForbiddenException, NotFoundException, UnauthorizedException } from '@nestjs/common';"
          if source.count(old_import) != 1:
              raise SystemExit('expected Nest exception import was not found exactly once')
          test.write_text(source.replace(old_import, new_import, 1))
          PY
          rm -f .github/workflows/tmp-fix-ir-10-2-typecheck.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(logistics): restore authority row typing [ir-10-2-typecheck-fixed]"
          git push origin HEAD:agent/ir-10-2-logistics-postgresql-authority
