name: TAI AP-10 fix incident tamper test

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap10-fix-incident-test.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-10-operational-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Assert incident tamper rejection at construction
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tests/test_operations.py')
          text = path.read_text()
          old = '''    broken_hash = replace(acknowledged, previous_event_sha256="f" * 64)
              with pytest.raises(ValueError, match="digest does not match"):
                  replace(broken_hash, event_sha256=acknowledged.event_sha256)
          '''
          new = '''    with pytest.raises(ValueError, match="digest does not match"):
                  replace(acknowledged, previous_event_sha256="f" * 64)
          '''
          count = text.count(old)
          if count != 1:
              raise SystemExit(f'expected one incident tamper block, found {count}')
          path.write_text(text.replace(old, new, 1))
          Path('.github/workflows/tai-ap10-fix-incident-test.yml').unlink()
          PY
      - name: Commit corrected expectation and cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-10: assert incident digest tampering fails at construction'
          git push origin HEAD:tai/ap-10-operational-authority
