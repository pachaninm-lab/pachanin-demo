name: Cleanup merged optional runtime scope

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/cleanup-ir-optional-runtime-scope.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Remove merged branch authority
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/platform-v7/autopilot/autopilot-state.json';
          const state = JSON.parse(fs.readFileSync(path, 'utf8'));
          if (state.approvedConcurrentScopes) {
            delete state.approvedConcurrentScopes['agent/ir-sec-retire-ml-airflow'];
          }
          fs.writeFileSync(path, `${JSON.stringify(state)}\n`);
          NODE
          git rm .github/workflows/cleanup-ir-optional-runtime-scope.yml
      - name: Commit cleanup
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'Clean merged optional runtime branch scope'
          git push origin HEAD:main
