name: TAI AP-13B.3e Retry Runner

on:
  push:
    branches:
      - agent/tai-ap-13b3e-immutable-storage-contract
    paths:
      - .github/workflows/tai-ap13b3e-retry-runner.yml

permissions:
  contents: write

jobs:
  retry:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13b3e-immutable-storage-contract
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Execute corrected patch runner
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/tai-ap13b3e-contract-patch.yml')
          lines = source.read_text(encoding='utf-8').splitlines()
          start = lines.index('        run: |')
          script: list[str] = []
          for line in lines[start + 1:]:
              if line.startswith('          '):
                  script.append(line[10:])
              elif not line.strip():
                  script.append('')
              else:
                  break
          rendered = '\n'.join(script) + '\n'
          rendered = rendered.replace(
              'python -m pip install -e apps/tai',
              "python -m pip install -e 'apps/tai[dev]'",
              1,
          )
          rendered = rendered.replace(
              'rm .github/workflows/tai-ap13b3e-contract-patch.yml',
              'rm .github/workflows/tai-ap13b3e-contract-patch.yml\n'
              'rm -f .github/workflows/tai-ap13b3e-retry-runner.yml\n'
              'rm -f tai-ap13b3e-patch-failure.txt',
              1,
          )
          rendered = rendered.replace(
              'git add apps/tai .github/workflows/tai-ap13b3e-contract-patch.yml',
              'git add apps/tai .github/workflows/tai-ap13b3e-contract-patch.yml '
              '.github/workflows/tai-ap13b3e-retry-runner.yml '
              'tai-ap13b3e-patch-failure.txt',
              1,
          )
          Path('/tmp/tai-ap13b3e-patch.sh').write_text(rendered, encoding='utf-8')
          PY

          set +e
          bash /tmp/tai-ap13b3e-patch.sh > /tmp/tai-ap13b3e-patch.log 2>&1
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi

          git reset --hard HEAD
          {
            printf 'exit_code=%s\n' "$status"
            printf '%s\n' '--- bounded tail ---'
            tail -n 260 /tmp/tai-ap13b3e-patch.log
          } > tai-ap13b3e-patch-failure.txt
          rm .github/workflows/tai-ap13b3e-retry-runner.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tai-ap13b3e-patch-failure.txt .github/workflows/tai-ap13b3e-retry-runner.yml
          git commit -m 'chore(tai): update bounded AP-13B.3e patch failure'
          git push origin HEAD:agent/tai-ap-13b3e-immutable-storage-contract
          exit "$status"
