name: TAI AP-13C/AP-13D Sync Main

on:
  push:
    branches:
      - agent/tai-ap-13cd-benchmark-admission-v2
    paths:
      - .github/workflows/tai-ap-13cd-sync-main.yml

permissions:
  contents: write

jobs:
  sync:
    if: github.actor == 'pachaninm-lab'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13cd-benchmark-admission-v2
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge current main and remove temporary workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git merge --no-edit origin/main
          git rm .github/workflows/tai-ap-13cd-sync-main.yml
          git commit -m 'chore(tai): synchronize AP-13C/AP-13D with current main'
          git push origin HEAD:agent/tai-ap-13cd-benchmark-admission-v2
