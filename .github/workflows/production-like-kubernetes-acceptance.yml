name: Production-like Kubernetes Acceptance

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'infra/docker/**'
      - 'infra/helm/grainflow/**'
      - 'infra/kind/production-like/**'
      - 'infra/release/**'
      - 'scripts/release/**'
      - '.github/workflows/production-like-kubernetes-acceptance.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'infra/docker/**'
      - 'infra/helm/grainflow/**'
      - 'infra/kind/production-like/**'
      - 'infra/release/**'
      - 'scripts/release/**'
      - '.github/workflows/production-like-kubernetes-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: production-like-kubernetes-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  EXACT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
  EVIDENCE_DIR: artifacts/industrial-readiness

jobs:
  production-like-kubernetes:
    name: Multi-node kind · immutable rollout · deep outbox runtime
    runs-on: ubuntu-latest
    timeout-minutes: 210
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_HEAD }}
          fetch-depth: 0

      - name: Reclaim runner disk
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL || true
          docker system prune --all --force || true
          df -h

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Install pinned kind and kubectl
        run: |
          set -euo pipefail
          KIND_VERSION=v0.23.0
          curl --fail --location --retry 5 \
            "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64" \
            -o /tmp/kind-linux-amd64
          curl --fail --location --retry 5 \
            "https://github.com/kubernetes-sigs/kind/releases/download/${KIND_VERSION}/kind-linux-amd64.sha256sum" \
            -o /tmp/kind-linux-amd64.sha256sum
          (cd /tmp && sha256sum --check kind-linux-amd64.sha256sum)
          sudo install -m 0755 /tmp/kind-linux-amd64 /usr/local/bin/kind

          KUBECTL_VERSION=v1.30.4
          curl --fail --location --retry 5 \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl" \
            -o /tmp/kubectl
          curl --fail --location --retry 5 \
            "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl.sha256" \
            -o /tmp/kubectl.sha256
          echo "$(cat /tmp/kubectl.sha256)  /tmp/kubectl" | sha256sum --check
          sudo install -m 0755 /tmp/kubectl /usr/local/bin/kubectl

          kind version
          kubectl version --client
          helm version
          docker version
          docker buildx version

      - name: Execute production-like Kubernetes acceptance
        run: bash scripts/release/production-like-kubernetes-acceptance.sh

      - name: Execute deep outbox worker runtime acceptance
        run: |
          set -euo pipefail
          # Isolate the synthetic stale-token CAS row from live worker claims. The
          # restricted app_outbox principal performs both controlled claims, then
          # the accepted two-replica topology is restored before runtime scenarios.
          kubectl scale deployment grainflow-outbox-worker -n grainflow-acceptance --replicas=0
          kubectl wait --for=delete pod -n grainflow-acceptance \
            -l app.kubernetes.io/name=grainflow-outbox-worker --timeout=180s
          bash scripts/release/production-like-kubernetes-outbox-stale-token.sh
          kubectl scale deployment grainflow-outbox-worker -n grainflow-acceptance --replicas=2
          kubectl rollout status deployment/grainflow-outbox-worker \
            -n grainflow-acceptance --timeout=360s
          bash scripts/release/production-like-kubernetes-outbox-runtime.sh

      - name: Enforce machine-readable Kubernetes evidence
        if: always()
        run: |
          node scripts/release/production-like-kubernetes-fallback-evidence.mjs
          node scripts/release/production-like-kubernetes-enforce-evidence.mjs

      - name: Build canonical outbox runtime evidence
        if: always()
        run: node scripts/release/build-production-like-outbox-runtime-evidence.mjs

      - name: Enforce exact-head outbox runtime evidence
        if: always()
        run: node scripts/release/enforce-production-like-outbox-runtime-evidence.mjs

      - name: Upload production-like Kubernetes evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-like-kubernetes-${{ env.EXACT_HEAD }}
          path: |
            ${{ env.EVIDENCE_DIR }}
            artifacts/worker-topology
          if-no-files-found: error
          retention-days: 90

      - name: Cleanup disposable acceptance environment
        if: always()
        run: |
          kind delete cluster --name grainflow-acceptance || true
          docker rm -f kind-registry || true
          docker system df || true

  production-like-kubernetes-gate:
    name: Production-like Kubernetes Gate · blocking
    if: always()
    runs-on: ubuntu-latest
    needs: [production-like-kubernetes]
    steps:
      - name: Enforce acceptance job
        run: test "${{ needs.production-like-kubernetes.result }}" = success
