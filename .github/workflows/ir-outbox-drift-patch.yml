name: IR Outbox Drift Patch

on:
  push:
    branches:
      - agent/ir-outbox-postgresql-authority-v2

permissions:
  contents: write

jobs:
  patch-drift:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-outbox-postgresql-authority-v2
          fetch-depth: 0
      - name: Reconcile Prisma-representable indexes
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          schema = Path('apps/api/prisma/schema.prisma')
          text = schema.read_text()
          old = '  @@index([status, nextRetryAt, createdAt, id], map: "outbox_entries_claim_idx")\n'
          new = (
              '  @@index([status, nextRetryAt])\n'
              '  @@index([status, nextRetryAt, createdAt, id], map: "outbox_entries_claim_idx")\n'
          )
          if text.count(old) != 1:
              raise SystemExit(f'expected one claim index line, found {text.count(old)}')
          schema.write_text(text.replace(old, new))

          migration = Path('apps/api/prisma/migrations/20260715123000_ir_outbox_postgresql_authority/migration.sql')
          text = migration.read_text()
          old = '''CREATE UNIQUE INDEX IF NOT EXISTS "outbox_entries_active_lease_token_key"
            ON "outbox_entries" ("leaseToken")
            WHERE "leaseToken" IS NOT NULL;
          '''
          new = '''CREATE UNIQUE INDEX IF NOT EXISTS "outbox_entries_active_lease_token_key"
            ON "outbox_entries" ("leaseToken");
          '''
          if text.count(old) != 1:
              raise SystemExit(f'expected one partial lease index, found {text.count(old)}')
          migration.write_text(text.replace(old, new))
          PY
          git rm .github/workflows/ir-outbox-drift-patch.yml apps/api/.ir-outbox-drift-trigger
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/prisma/schema.prisma apps/api/prisma/migrations/20260715123000_ir_outbox_postgresql_authority/migration.sql
          git commit -m "IR-OUTBOX: reconcile migration and Prisma index authority"
          git push origin HEAD:agent/ir-outbox-postgresql-authority-v2
