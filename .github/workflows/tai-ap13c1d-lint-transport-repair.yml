name: TAI AP-13C.1d lint transport repair

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: tai-ap13c1d-lint-transport-repair
  cancel-in-progress: false

jobs:
  repair:
    if: github.event.pull_request.head.ref == 'agent/tai-ap-13c1d-quality-scoring'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-quality-scoring
          fetch-depth: 0
      - name: Repair exact transported test lines
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tests/test_quality_scoring_negative_matrix.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              '(lambda rows: rows[0].__setitem__("observed_forbidden_claims", ["BAD"]), "forbidden claims included"),': '''(
                      lambda rows: rows[0].__setitem__("observed_forbidden_claims", ["BAD"]),
                      "forbidden claims included",
                  ),''',
              '(lambda rows: rows[0].__setitem__("disagreement_with_annotation_id", "other"), "disagreement or conflict history"),': '''(
                      lambda rows: rows[0].__setitem__(
                          "disagreement_with_annotation_id", "other"
                      ),
                      "disagreement or conflict history",
                  ),''',
              '{key: value for key, value in cases["cases"][0].items() if key != "case_sha256"]': '{key: value for key, value in cases["cases"][0].items() if key != "case_sha256"}',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'expected one occurrence, got {count}: {old}')
              text = text.replace(old, new)
          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/tai-ap13c1d-lint-transport-repair.yml
      - name: Commit bounded repair
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'pachaninm-lab'
          git config user.email 'pachaninm-lab@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'test(tai): repair AP-13C.1d transported fixture'
          git push origin HEAD:agent/tai-ap-13c1d-quality-scoring
