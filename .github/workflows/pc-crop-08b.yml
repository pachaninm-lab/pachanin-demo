name: PC-CROP-08B Typed FGIS Grain Contract Catalog Acceptance

on:
  pull_request:
    paths:
      - '.github/workflows/pc-crop-08b.yml'
      - 'apps/api/src/modules/regulatory-integration/fgis-grain/**'
      - 'apps/api/src/modules/regulatory-integration/regulatory-integration.module.ts'
      - 'docs/platform-v7/autopilot/scopes/pc-crop-08b-fgis-contract-catalog.json'
      - 'docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.operation-catalog.json'
      - 'docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.operation-catalog.lock.json'
      - 'scripts/pc-crop-08b/**'
      - 'scripts/p7-autopilot-guard.sh'
  push:
    branches: [main]
    paths:
      - '.github/workflows/pc-crop-08b.yml'
      - 'apps/api/src/modules/regulatory-integration/fgis-grain/**'
      - 'apps/api/src/modules/regulatory-integration/regulatory-integration.module.ts'
      - 'docs/platform-v7/autopilot/scopes/pc-crop-08b-fgis-contract-catalog.json'
      - 'docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.operation-catalog.json'
      - 'docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.operation-catalog.lock.json'
      - 'scripts/pc-crop-08b/**'
      - 'scripts/p7-autopilot-guard.sh'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pc-crop-08b-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  EXACT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
  EVIDENCE_DIR: artifacts/pc-crop-08b

jobs:
  typed-contract-catalog:
    name: Pinned ZIP · differential catalog · TypeScript authority
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_HEAD }}
          fetch-depth: 0

      - name: Enforce exact PC-CROP-08B scope
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          printf '%s\n' "$EXACT_HEAD" > "$EVIDENCE_DIR/exact-head.txt"
          if [[ "${{ github.event_name }}" == 'pull_request' ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            base_ref="origin/${{ github.base_ref }}"
          else
            base_ref='HEAD^'
          fi
          git diff --name-only "$base_ref...$EXACT_HEAD" | sort > "$EVIDENCE_DIR/changed-files.txt"
          if grep -Ev '^(\.github/workflows/pc-crop-08b\.yml|apps/api/src/modules/regulatory-integration/fgis-grain/.*|apps/api/src/modules/regulatory-integration/regulatory-integration\.module\.ts|docs/platform-v7/autopilot/scopes/pc-crop-08b-fgis-contract-catalog\.json|docs/platform-v7/crop-platform/fgis-grain-api-1\.0\.23\.operation-catalog(\.lock)?\.json|scripts/pc-crop-08b/.*|scripts/p7-autopilot-guard\.sh)$' "$EVIDENCE_DIR/changed-files.txt" > "$EVIDENCE_DIR/out-of-scope.txt"; then
            echo 'PC-CROP-08B contains out-of-scope files:' >&2
            cat "$EVIDENCE_DIR/out-of-scope.txt" >&2
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Compile deterministic generators
        run: python -m py_compile scripts/pc-crop-08a/artifact_intake.py scripts/pc-crop-08b/*.py

      - name: Run generator and parser abuse tests
        run: PYTHONPATH=scripts/pc-crop-08b python -m unittest -v scripts/pc-crop-08b/test_generate_contract_catalog.py 2>&1 | tee "$EVIDENCE_DIR/generator-tests.log"

      - name: Re-fetch the accepted PC-CROP-08A package
        run: |
          python scripts/pc-crop-08a/artifact_intake.py \
            --lock-file docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.source-lock.json \
            --output-dir "$EVIDENCE_DIR/source" \
            --exact-head "$EXACT_HEAD" \
            2>&1 | tee "$EVIDENCE_DIR/source-intake.log"

      - name: Regenerate raw contract authority
        run: |
          python scripts/pc-crop-08b/generate_contract_catalog.py \
            --archive "$EVIDENCE_DIR/source/fgis-zerno-api-1.0.23.zip" \
            --source-lock docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.source-lock.json \
            --catalog-output "$EVIDENCE_DIR/raw-operation-catalog.json" \
            --lock-output "$EVIDENCE_DIR/raw-operation-catalog.lock.json" \
            --typescript-output "$EVIDENCE_DIR/raw-fgis-grain-1.0.23.generated.ts" \
            2>&1 | tee "$EVIDENCE_DIR/primary-generation.log"

      - name: Normalize and hash committed authority
        run: |
          python scripts/pc-crop-08b/finalize_contract_catalog.py \
            --raw-catalog "$EVIDENCE_DIR/raw-operation-catalog.json" \
            --raw-lock "$EVIDENCE_DIR/raw-operation-catalog.lock.json" \
            --raw-typescript "$EVIDENCE_DIR/raw-fgis-grain-1.0.23.generated.ts" \
            --catalog-output "$EVIDENCE_DIR/operation-catalog.json" \
            --lock-output "$EVIDENCE_DIR/operation-catalog.lock.json" \
            --typescript-output "$EVIDENCE_DIR/fgis-grain-1.0.23.generated.ts" \
            2>&1 | tee "$EVIDENCE_DIR/finalization.log"
          python scripts/pc-crop-08b/generate_runtime_operations.py \
            --catalog "$EVIDENCE_DIR/operation-catalog.json" \
            --output "$EVIDENCE_DIR/fgis-grain-1.0.23.operations.generated.ts"

      - name: Differential verification with independent parser
        run: |
          PYTHONPATH=scripts/pc-crop-08b python scripts/pc-crop-08b/verify_independent_catalog.py \
            --archive "$EVIDENCE_DIR/source/fgis-zerno-api-1.0.23.zip" \
            --source-lock docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.source-lock.json \
            --primary-catalog "$EVIDENCE_DIR/operation-catalog.json" \
            --output "$EVIDENCE_DIR/differential-verification.json" \
            2>&1 | tee "$EVIDENCE_DIR/differential-verification.log"

      - name: Require byte-identical generated files
        shell: bash
        run: |
          set -euo pipefail
          cmp "$EVIDENCE_DIR/operation-catalog.json" docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.operation-catalog.json
          cmp "$EVIDENCE_DIR/operation-catalog.lock.json" docs/platform-v7/crop-platform/fgis-grain-api-1.0.23.operation-catalog.lock.json
          cmp "$EVIDENCE_DIR/fgis-grain-1.0.23.generated.ts" apps/api/src/modules/regulatory-integration/fgis-grain/fgis-grain-1.0.23.generated.ts
          cmp "$EVIDENCE_DIR/fgis-grain-1.0.23.operations.generated.ts" apps/api/src/modules/regulatory-integration/fgis-grain/fgis-grain-1.0.23.operations.generated.ts

      - uses: pnpm/action-setup@v4
        with:
          version: '10.2.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck API authority
        run: pnpm --filter @pc/api typecheck 2>&1 | tee "$EVIDENCE_DIR/api-typecheck.log"

      - name: Run TypeScript contract and module tests
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec jest --runInBand --runTestsByPath \
            src/modules/regulatory-integration/fgis-grain/fgis-grain-1.0.23.contract.spec.ts \
            2>&1 | tee "$EVIDENCE_DIR/api-contract-tests.log"

      - name: Build exact-head machine-readable acceptance
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          root = Path(os.environ['EVIDENCE_DIR'])
          source = json.loads((root / 'source/pc-crop-08a-acceptance.json').read_text('utf-8'))
          lock = json.loads((root / 'operation-catalog.lock.json').read_text('utf-8'))
          catalog = json.loads((root / 'operation-catalog.json').read_text('utf-8'))
          differential = json.loads((root / 'differential-verification.json').read_text('utf-8'))
          module = Path('apps/api/src/modules/regulatory-integration/regulatory-integration.module.ts').read_text('utf-8')
          contract = Path('apps/api/src/modules/regulatory-integration/fgis-grain/fgis-grain-1.0.23.contract.ts').read_text('utf-8')
          if source.get('status') != 'PASS' or source.get('invariants', {}).get('packagePinVerified') is not True: raise SystemExit(1)
          if lock != {
            'schemaVersion':'pc-crop.fgis-grain-operation-catalog-lock.v1',
            'apiVersion':'1.0.23',
            'packageSha256':'085e22c50b6564219585c96e814b0793d906f4c5e401cbb7446a949c26f0bcd7',
            'catalogSha256':'4fc7cc075b956f0adca26331a99627d07cde77d63ec2fc017d0cbbc5f701c87a',
            'operationCount':57,
            'transportOperationCount':3,
            'operationalStatus':'NOT_ATTESTED',
            'productionHosting':'REG_RU_VPS_ONLY',
          }: raise SystemExit(1)
          if differential.get('status') != 'PASS' or differential.get('businessOperationCount') != 57 or differential.get('transportOperationCount') != 3: raise SystemExit(1)
          transport = catalog.get('transport') or {}
          if transport.get('documentationEndpoint', {}).get('runtimeAllowed') is not False: raise SystemExit(1)
          if transport.get('documentationEndpoint', {}).get('url') != 'http://localhost/api/ws/1.0.23': raise SystemExit(1)
          if catalog.get('business', {}).get('operationCount') != 57: raise SystemExit(1)
          if 'FgisGrainContractCatalogService' not in module: raise SystemExit(1)
          for forbidden in ('fetch(', 'axios', 'HttpService', 'createSign(', 'privateKey', 'CONFIRMED_LIVE'):
            if forbidden in contract: raise SystemExit(1)
          report = {
            'schemaVersion':'pc-crop.fgis-grain-contract-catalog-acceptance.v1',
            'slice':'PC-CROP-08B','issue':3158,'exactHead':os.environ['EXACT_HEAD'],'status':'PASS',
            'operationalStatus':'NOT_ATTESTED','packageSha256':lock['packageSha256'],'catalogSha256':lock['catalogSha256'],
            'independentCatalogSha256':differential['independentCatalogSha256'],'transportOperationCount':3,
            'businessOperationCount':57,'familyCount':8,'unresolvedQNameCount':0,
            'invariants':{
              'acceptedPackagePin':True,'primaryGenerator':True,'independentDifferentialParser':True,
              'byteIdenticalRegeneration':True,'typedRuntimeAuthority':True,'unknownContractFailsClosed':True,
              'placeholderEndpointForbidden':True,'readOnlyGatewayBinding':True,
            },
            'boundaries':{
              'xmlSerializationOrParsing':False,'soapHttpClient':False,'signatureGenerationOrVerification':False,
              'credentialsOrCertificateBytes':False,'externalProviderCall':False,'directDomainMutation':False,
              'secondInboxOutboxOrRelay':False,'confirmedLiveClaim':False,'productionDeployment':False,
              'productionHosting':'REG_RU_VPS_ONLY',
            },
          }
          (root / 'pc-crop-08b-acceptance.json').write_text(json.dumps(report,sort_keys=True,indent=2)+'\n','utf-8')
          PY

      - name: Enforce final acceptance evidence
        shell: bash
        run: |
          python - <<'PY'
          import json, os
          from pathlib import Path
          report=json.loads((Path(os.environ['EVIDENCE_DIR'])/'pc-crop-08b-acceptance.json').read_text('utf-8'))
          if report.get('status')!='PASS' or report.get('exactHead')!=os.environ['EXACT_HEAD']: raise SystemExit(1)
          if any(value is not True for value in (report.get('invariants') or {}).values()): raise SystemExit(1)
          boundaries=report.get('boundaries') or {}
          for key,value in boundaries.items():
              if key=='productionHosting':
                  if value!='REG_RU_VPS_ONLY': raise SystemExit(1)
              elif value is not False: raise SystemExit(1)
          PY

      - name: Upload exact-head PC-CROP-08B evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pc-crop-08b-${{ env.EXACT_HEAD }}
          path: artifacts/pc-crop-08b
          if-no-files-found: error
          retention-days: 90
