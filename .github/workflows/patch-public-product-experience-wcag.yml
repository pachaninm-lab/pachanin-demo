name: Patch Public Product Experience WCAG Structure

on:
  push:
    branches:
      - agent/public-product-experience-v3
    paths:
      - '.github/workflows/patch-public-product-experience-wcag.yml'

permissions:
  contents: write

jobs:
  patch-wcag-structure:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-product-experience-v3
          fetch-depth: 0
      - name: Replace invalid definition-list child with a valid hidden term
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/web/components/platform-v7/PublicDealExplorer.tsx')
          text = path.read_text(encoding='utf-8')
          old = "          <span className='pc-ppe-causal-index'>{index + 1}</span>"
          new = "          <dt className='pc-ppe-causal-index' aria-hidden='true'>{index + 1}</dt>"
          if text.count(old) != 1:
              raise SystemExit(f'expected one causal-index span, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
      - name: Remove one-time workflow and commit patch
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/patch-public-product-experience-wcag.yml
          git add apps/web/components/platform-v7/PublicDealExplorer.tsx
          git commit -m 'Fix causal definition-list semantics'
          git push origin HEAD:agent/public-product-experience-v3
