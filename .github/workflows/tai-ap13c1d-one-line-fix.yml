name: TAI AP-13C.1d One-Line Fix

on:
  push:
    branches:
      - agent/tai-ap-13c1d-quality-scoring-authority
    paths:
      - '.github/workflows/tai-ap13c1d-one-line-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-quality-scoring-authority
          fetch-depth: 0
      - name: Remove unused import and self-delete
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          path = Path('apps/tai/tests/test_quality_scoring_cli.py')
          text = path.read_text(encoding='utf-8')
          old = 'from quality_scoring_fixtures import NOW, _fixture, _signed'
          new = 'from quality_scoring_fixtures import _fixture, _signed'
          if text.count(old) != 1:
              raise SystemExit('expected import not found exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY
          rm .github/workflows/tai-ap13c1d-one-line-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/tai/tests/test_quality_scoring_cli.py .github/workflows/tai-ap13c1d-one-line-fix.yml
          git commit -m 'test(tai): remove unused provenance fixture import'
          git push origin HEAD:agent/tai-ap-13c1d-quality-scoring-authority
