name: Temporary main IR-10.3 schema fix runner

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[ir-10-3-schema-fix-complete]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-3-labs-authority-v3
          fetch-depth: 0
      - name: Patch target branch
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import re

          service_path = Path('apps/api/src/modules/deals/deal-command.service.ts')
          service = service_path.read_text()
          switch_start = service.index('    switch (definition.id) {')
          stale_start = service.index("      case 'buyer_confirm_terms':", switch_start)
          reserve_start = service.index("      case 'request_reserve':", stale_start)
          bank_operation_start = service.index('        await tx.bankOperation.upsert({', reserve_start)
          payment_upsert = """      case 'request_reserve':
                await tx.payment.upsert({
                  where: { id: `payment:${deal.id}` },
                  update: {
                    status: 'RESERVE_REQUESTED',
                    amountKopecks,
                    amountRub: Number(amountKopecks) / 100,
                    callbackState: 'PENDING',
                  },
                  create: {
                    id: `payment:${deal.id}`,
                    dealId: deal.id,
                    status: 'RESERVE_REQUESTED',
                    amountKopecks,
                    amountRub: Number(amountKopecks) / 100,
                    callbackState: 'PENDING',
                  },
                });
          """
          service = service[:stale_start] + payment_upsert + service[bank_operation_start:]
          service_path.write_text(service)

          schema_path = Path('apps/api/prisma/schema.prisma')
          schema = schema_path.read_text()

          def replace_once(text, old, new, label):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label} anchor count={count}')
              return text.replace(old, new, 1)

          schema = replace_once(
              schema,
              """  users            UserOrg[]
            dealParticipants DealParticipant[]
          """,
              """  users                         UserOrg[]
            dealParticipants              DealParticipant[]
            labAssignments                 LabAssignment[]    @relation(\"LabAssignmentOrganization\")
            labAccreditations              LabAccreditation[] @relation(\"LabAccreditationOrganization\")
            labMethods                     LabMethod[]        @relation(\"LabMethodOrganization\")
            labEquipment                   LabEquipment[]     @relation(\"LabEquipmentOrganization\")
            labSamplesAsLab                LabSample[]        @relation(\"LabSampleLabOrganization\")
            labSamplesAsCurrentCustodian   LabSample[]        @relation(\"LabSampleCustodianOrganization\")
            labCustodyEventsFrom           LabCustodyEvent[]  @relation(\"LabCustodyFromOrganization\")
            labCustodyEventsTo             LabCustodyEvent[]  @relation(\"LabCustodyToOrganization\")
          """,
              'organization relations',
          )
          schema = replace_once(
              schema,
              """  orgs             UserOrg[]
            ukepCerts        UkepCertificate[]
            dealParticipants DealParticipant[]
          """,
              """  orgs                       UserOrg[]
            ukepCerts                  UkepCertificate[]
            dealParticipants           DealParticipant[]
            labAssignments             LabAssignment[]   @relation(\"LabAssignmentUser\")
            labSamplesAssigned         LabSample[]       @relation(\"LabSampleAssignedUser\")
            labSamplesSampled          LabSample[]       @relation(\"LabSampleSamplerUser\")
            labSamplesAsCustodian      LabSample[]       @relation(\"LabSampleCustodianUser\")
            labSamplesFinalized        LabSample[]       @relation(\"LabSampleFinalizedUser\")
            labTestsRecorded           LabTest[]         @relation(\"LabTestActorUser\")
            labCustodyEventsFrom       LabCustodyEvent[] @relation(\"LabCustodyFromUser\")
            labCustodyEventsTo         LabCustodyEvent[] @relation(\"LabCustodyToUser\")
          """,
              'user relations',
          )
          schema = replace_once(
              schema,
              """  runtimeSnapshots  DealWorkspaceRuntimeSnapshot[] @relation(\"RuntimeSnapshotDeal\")
          """,
              """  runtimeSnapshots  DealWorkspaceRuntimeSnapshot[] @relation(\"RuntimeSnapshotDeal\")
            labAssignments   LabAssignment[]
          """,
              'deal relations',
          )
          schema = replace_once(
              schema,
              """  metadata    Json?

            @@index([dealId])
          """,
              """  metadata                    Json?

            labAssignments              LabAssignment[]    @relation(\"LabAssignmentEvidence\")
            labAccreditations           LabAccreditation[] @relation(\"LabAccreditationEvidence\")
            labMethods                  LabMethod[]        @relation(\"LabMethodEvidence\")
            labEquipmentCalibrations    LabEquipment[]     @relation(\"LabEquipmentCalibrationEvidence\")
            labCustodyEvents            LabCustodyEvent[]  @relation(\"LabCustodyEvidence\")

            @@index([dealId])
          """,
              'evidence relations',
          )

          labs_models = r'''model LabSample {
            id                       String   @id
            dealId                   String
            shipmentId               String?
            acceptanceId             String?
            tenantId                 String   @default(dbgenerated("current_setting('app.current_tenant_id'::text, true)"))
            labId                    String   @default(dbgenerated("current_setting('app.current_org_id'::text, true)"))
            assignedLabUserId        String   @default(dbgenerated("current_setting('app.current_user_id'::text, true)"))
            samplerUserId            String?
            currentCustodianOrgId    String   @default(dbgenerated("current_setting('app.current_org_id'::text, true)"))
            currentCustodianUserId   String   @default(dbgenerated("current_setting('app.current_user_id'::text, true)"))
            status                   String   @default("PENDING")
            culture                  String?
            protocol                 String?
            gost                     String?
            labName                  String?
            accreditationId          String?
            collectedAt              DateTime?
            finalizedAt              DateTime?
            finalizedByUserId        String?
            protocolHash             String?
            moneyDeltaRub            Float?
            moneyDeltaKopecks        BigInt?
            certificateDocId         String?
            version                  BigInt   @default(0)
            createdAt                DateTime @default(now())
            updatedAt                DateTime @default(now()) @updatedAt

            tests                    LabTest[]
            custodyEvents            LabCustodyEvent[]
            deal                     Deal              @relation(fields: [dealId], references: [id], onDelete: Restrict)
            lab                      Organization      @relation("LabSampleLabOrganization", fields: [labId], references: [id], onDelete: Restrict)
            assignedLabUser          User              @relation("LabSampleAssignedUser", fields: [assignedLabUserId], references: [id], onDelete: Restrict)
            samplerUser              User?             @relation("LabSampleSamplerUser", fields: [samplerUserId], references: [id], onDelete: Restrict)
            currentCustodianOrg      Organization      @relation("LabSampleCustodianOrganization", fields: [currentCustodianOrgId], references: [id], onDelete: Restrict)
            currentCustodianUser     User              @relation("LabSampleCustodianUser", fields: [currentCustodianUserId], references: [id], onDelete: Restrict)
            accreditation            LabAccreditation? @relation("LabSampleAccreditation", fields: [accreditationId], references: [id], onDelete: Restrict)
            finalizedByUser          User?             @relation("LabSampleFinalizedUser", fields: [finalizedByUserId], references: [id], onDelete: Restrict)

            @@index([dealId])
            @@index([tenantId])
            @@index([labId, status])
            @@index([assignedLabUserId, status])
            @@index([shipmentId])
            @@map("lab_samples")
          }

          model LabTest {
            id                 String   @id @default(cuid())
            sampleId           String
            tenantId           String   @default(dbgenerated("current_setting('app.current_tenant_id'::text, true)"))
            parameter          String
            value              Decimal  @db.Decimal(20, 6)
            unit               String?
            normMin            Decimal? @db.Decimal(20, 6)
            normMax            Decimal? @db.Decimal(20, 6)
            passed             Boolean  @default(true)
            gradeDelta         Float?
            methodId           String
            equipmentId        String
            actorUserId        String
            correctionOfTestId String?
            commandId          String
            idempotencyKey     String   @unique
            correlationId      String?
            note               String?
            recordedAt         DateTime @default(now())
            createdAt          DateTime @default(now())

            sample             LabSample    @relation(fields: [sampleId], references: [id], onDelete: Restrict)
            method             LabMethod    @relation(fields: [methodId], references: [id], onDelete: Restrict)
            equipment          LabEquipment @relation(fields: [equipmentId], references: [id], onDelete: Restrict)
            actorUser          User         @relation("LabTestActorUser", fields: [actorUserId], references: [id], onDelete: Restrict)
            correctionOf       LabTest?     @relation("LabTestCorrection", fields: [correctionOfTestId], references: [id], onDelete: Restrict)
            corrections        LabTest[]    @relation("LabTestCorrection")

            @@index([sampleId, recordedAt])
            @@index([tenantId])
            @@index([methodId])
            @@index([equipmentId])
            @@index([correctionOfTestId])
            @@map("lab_tests")
          }

          model LabCustodyEvent {
            id             String   @id
            sampleId       String
            tenantId       String   @default(dbgenerated("current_setting('app.current_tenant_id'::text, true)"))
            eventType      String
            fromOrgId      String?
            fromUserId     String?
            toOrgId        String
            toUserId       String
            evidenceRef    String
            occurredAt     DateTime
            commandId      String
            idempotencyKey String   @unique
            correlationId  String?
            createdAt      DateTime @default(now())

            sample         LabSample     @relation(fields: [sampleId], references: [id], onDelete: Restrict)
            fromOrg        Organization? @relation("LabCustodyFromOrganization", fields: [fromOrgId], references: [id], onDelete: Restrict)
            fromUser       User?         @relation("LabCustodyFromUser", fields: [fromUserId], references: [id], onDelete: Restrict)
            toOrg          Organization  @relation("LabCustodyToOrganization", fields: [toOrgId], references: [id], onDelete: Restrict)
            toUser         User          @relation("LabCustodyToUser", fields: [toUserId], references: [id], onDelete: Restrict)
            evidence       EvidenceFile  @relation("LabCustodyEvidence", fields: [evidenceRef], references: [id], onDelete: Restrict)

            @@index([sampleId, occurredAt])
            @@index([tenantId])
            @@index([toOrgId, toUserId])
            @@index([correlationId])
            @@map("lab_custody_events")
          }

          model LabAssignment {
            id          String   @id
            tenantId    String
            dealId      String
            labOrgId    String
            labUserId   String
            status      String   @default("ACTIVE")
            validFrom   DateTime @default(now())
            validUntil  DateTime?
            evidenceRef String
            createdAt   DateTime @default(now())
            updatedAt   DateTime @default(now()) @updatedAt

            deal        Deal         @relation(fields: [dealId], references: [id], onDelete: Restrict)
            labOrg      Organization @relation("LabAssignmentOrganization", fields: [labOrgId], references: [id], onDelete: Restrict)
            labUser     User         @relation("LabAssignmentUser", fields: [labUserId], references: [id], onDelete: Restrict)
            evidence    EvidenceFile @relation("LabAssignmentEvidence", fields: [evidenceRef], references: [id], onDelete: Restrict)

            @@unique([dealId, labUserId], map: "lab_assignments_deal_user_key")
            @@index([tenantId, labOrgId, status], map: "lab_assignments_tenant_lab_status_idx")
            @@index([labUserId, status], map: "lab_assignments_user_status_idx")
            @@map("lab_assignments")
          }

          model LabAccreditation {
            id          String   @id
            tenantId    String
            labOrgId    String
            reference   String
            status      String   @default("ACTIVE")
            scope       Json?
            validFrom   DateTime
            validUntil  DateTime?
            verifiedAt  DateTime?
            evidenceRef String
            createdAt   DateTime @default(now())
            updatedAt   DateTime @default(now()) @updatedAt

            labOrg      Organization @relation("LabAccreditationOrganization", fields: [labOrgId], references: [id], onDelete: Restrict)
            evidence    EvidenceFile @relation("LabAccreditationEvidence", fields: [evidenceRef], references: [id], onDelete: Restrict)
            samples     LabSample[]  @relation("LabSampleAccreditation")

            @@unique([tenantId, labOrgId, reference], map: "lab_accreditations_tenant_org_reference_key")
            @@index([labOrgId, status], map: "lab_accreditations_org_status_idx")
            @@map("lab_accreditations")
          }

          model LabMethod {
            id                 String   @id
            tenantId           String
            labOrgId           String
            code               String
            name               String
            applicableStandard String
            status             String   @default("ACTIVE")
            validFrom          DateTime @default(now())
            validUntil         DateTime?
            evidenceRef        String
            createdAt          DateTime @default(now())
            updatedAt          DateTime @default(now()) @updatedAt

            labOrg             Organization @relation("LabMethodOrganization", fields: [labOrgId], references: [id], onDelete: Restrict)
            evidence           EvidenceFile @relation("LabMethodEvidence", fields: [evidenceRef], references: [id], onDelete: Restrict)
            tests              LabTest[]

            @@unique([tenantId, labOrgId, code], map: "lab_methods_tenant_org_code_key")
            @@index([labOrgId, status], map: "lab_methods_org_status_idx")
            @@map("lab_methods")
          }

          model LabEquipment {
            id                     String   @id
            tenantId               String
            labOrgId               String
            name                   String
            serialNumber           String
            status                 String   @default("ACTIVE")
            calibratedAt           DateTime?
            calibrationValidUntil  DateTime?
            calibrationEvidenceRef String?
            createdAt              DateTime @default(now())
            updatedAt              DateTime @default(now()) @updatedAt

            labOrg                 Organization  @relation("LabEquipmentOrganization", fields: [labOrgId], references: [id], onDelete: Restrict)
            calibrationEvidence    EvidenceFile? @relation("LabEquipmentCalibrationEvidence", fields: [calibrationEvidenceRef], references: [id], onDelete: Restrict)
            tests                  LabTest[]

            @@unique([tenantId, labOrgId, serialNumber], map: "lab_equipment_tenant_org_serial_key")
            @@index([labOrgId, status], map: "lab_equipment_org_status_idx")
            @@map("lab_equipment")
          }'''

          schema, count = re.subn(
              r'model LabSample \{.*?\n\}\n\n// ── Outbox',
              labs_models + '\n\n// ── Outbox',
              schema,
              count=1,
              flags=re.S,
          )
          if count != 1:
              raise SystemExit(f'labs model block replacement count={count}')
          schema_path.write_text(schema)

          migration_path = Path('apps/api/prisma/migrations/20260713110000_labs_postgresql_authority/migration.sql')
          migration = migration_path.read_text()
          anchor = 'CREATE INDEX IF NOT EXISTS "lab_tests_sampleId_recordedAt_idx" ON public."lab_tests" ("sampleId", "recordedAt");'
          if anchor not in migration:
              raise SystemExit('lab test index anchor not found')
          if 'DROP INDEX IF EXISTS public."lab_tests_sampleId_idx";' not in migration:
              migration = migration.replace(anchor, 'DROP INDEX IF EXISTS public."lab_tests_sampleId_idx";\n' + anchor, 1)
          migration_path.write_text(migration)

          Path('.github/workflows/tmp-ir-10-3-fix.yml').unlink(missing_ok=True)
          Path('.tmp-ir-10-3-fix-trigger').unlink(missing_ok=True)
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix(api): reconcile authoritative laboratory schema [ir-10-3-schema-fixed]"
          git push origin HEAD:agent/ir-10-3-labs-authority-v3

          git fetch origin main
          git switch -C main origin/main
          rm -f .github/workflows/tmp-main-ir-10-3-schema-fix.yml .tmp-main-ir-10-3-schema-fix-trigger
          git add -A
          git commit -m "chore: remove IR-10.3 schema fix runner [ir-10-3-schema-fix-complete]"
          git push origin HEAD:main
