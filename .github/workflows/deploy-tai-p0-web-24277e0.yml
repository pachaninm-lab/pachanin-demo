name: Deploy TAI P0 web 24277e0 to canonical VPS

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/release-triggers/tai-p0-web-24277e0.md'

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-tai-p0-web-24277e0
  cancel-in-progress: false

env:
  TARGET_SHA: 24277e008d25f66f52b56284ff83ca3eead39fb2
  TARGET_SHORT: 24277e0
  EXACT_IMAGE: ghcr.io/pachaninm-lab/grainflow-web:sha-24277e0
  LIVE_BASE: https://xn----8sbjf4befbjgs9b.xn--p1ai
  LIVE_DOMAIN: xn----8sbjf4befbjgs9b.xn--p1ai
  DEFAULT_HOST: 195.19.12.120
  EVIDENCE_DIR: artifacts/vps-release-24277e0
  SSH_HOST_SECRET: ${{ secrets.PC_PROD_HOST }}
  SSH_USER_SECRET: ${{ secrets.PC_PROD_SSH_USER }}
  SSH_PORT_SECRET: ${{ secrets.PC_PROD_SSH_PORT }}
  SSH_KEY_PRIMARY: ${{ secrets.PC_PROD_SSH_KEY }}
  SSH_KEY_SECONDARY: ${{ secrets.PC_PROD_SSH_PRIVATE_KEY }}
  SSH_KEY_FALLBACK: ${{ secrets.VPS_SSH_KEY }}
  SSH_PASSWORD_PRIMARY: ${{ secrets.PC_PROD_SSH_PASSWORD }}
  SSH_PASSWORD_FALLBACK: ${{ secrets.VPS_SSH_PASSWORD }}

jobs:
  deploy-web:
    name: Exact web image · targeted VPS update · live browser evidence
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.event.pull_request.user.login == github.repository_owner &&
      github.actor == github.repository_owner &&
      github.head_ref == 'fix/public-ai-layout-authority'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout exact accepted main revision
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Initialize exact release evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          test "$(git rev-parse HEAD)" = "$TARGET_SHA"
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$TARGET_SHA" origin/main
          printf '%s\n' "$TARGET_SHA" > "$EVIDENCE_DIR/target-sha.txt"
          printf '%s\n' "$EXACT_IMAGE" > "$EVIDENCE_DIR/exact-image.txt"
          printf '%s\n' "${{ github.run_id }}" > "$EVIDENCE_DIR/workflow-run-id.txt"

      - name: Wait for exact canonical GHCR web image
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin >/dev/null
          for attempt in $(seq 1 120); do
            if docker pull "$EXACT_IMAGE" >/dev/null 2>&1; then
              actual="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$EXACT_IMAGE" 2>/dev/null || true)"
              echo "Registry attempt $attempt/120: expected=$TARGET_SHA actual=${actual:-missing}"
              if [[ "$actual" == "$TARGET_SHA" ]]; then
                docker image inspect "$EXACT_IMAGE" > "$EVIDENCE_DIR/registry-image-inspect.json"
                docker image inspect --format '{{json .RepoDigests}}' "$EXACT_IMAGE" > "$EVIDENCE_DIR/registry-repo-digests.json"
                exit 0
              fi
            else
              echo "Registry attempt $attempt/120: exact tag not available"
            fi
            sleep 10
          done
          echo 'Exact canonical web image was not available in GHCR.' >&2
          exit 1

      - name: Resolve protected SSH transport and authoritative DNS
        id: ssh
        shell: bash
        run: |
          set -euo pipefail
          host="${SSH_HOST_SECRET:-$DEFAULT_HOST}"
          user="${SSH_USER_SECRET:-root}"
          port="${SSH_PORT_SECRET:-22}"
          key="${SSH_KEY_PRIMARY:-${SSH_KEY_SECONDARY:-${SSH_KEY_FALLBACK:-}}}"
          password="${SSH_PASSWORD_PRIMARY:-${SSH_PASSWORD_FALLBACK:-}}"

          [[ "$port" =~ ^[0-9]{1,5}$ ]]
          [[ "$host" =~ ^[A-Za-z0-9._:-]+$ ]]
          [[ -n "$user" ]]
          if [[ -z "$key" && -z "$password" ]]; then
            echo 'No protected SSH credential is configured; production was not changed.' >&2
            exit 2
          fi

          domain_ips="$(getent ahostsv4 "$LIVE_DOMAIN" | awk '{print $1}' | sort -u || true)"
          host_ips="$(getent ahostsv4 "$host" | awk '{print $1}' | sort -u || true)"
          if [[ -z "$host_ips" && "$host" =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            host_ips="$host"
          fi
          printf 'domain=%s\n%s\n\nhost=%s\n%s\n' "$LIVE_DOMAIN" "$domain_ips" "$host" "$host_ips" \
            > "$EVIDENCE_DIR/dns-authority.txt"
          [[ -n "$domain_ips" && -n "$host_ips" ]]
          if ! comm -12 <(printf '%s\n' "$domain_ips" | sort -u) <(printf '%s\n' "$host_ips" | sort -u) | grep -q .; then
            echo 'Production domain and protected SSH host do not resolve to a common IPv4 address.' >&2
            exit 3
          fi

          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan -p "$port" -H "$host" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

          if [[ -n "$key" ]]; then
            printf '%s\n' "$key" > "$HOME/.ssh/id_pc_prod"
            chmod 600 "$HOME/.ssh/id_pc_prod"
            echo 'mode=key' >> "$GITHUB_OUTPUT"
          else
            sudo apt-get update -qq
            sudo apt-get install -y -qq sshpass
            echo 'mode=password' >> "$GITHUB_OUTPUT"
          fi
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "user=$user" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Deploy only the production web service
        id: deploy
        shell: bash
        env:
          SSH_MODE: ${{ steps.ssh.outputs.mode }}
          SSH_HOST: ${{ steps.ssh.outputs.host }}
          SSH_USER: ${{ steps.ssh.outputs.user }}
          SSH_PORT: ${{ steps.ssh.outputs.port }}
        run: |
          set -euo pipefail
          remote_script="$(cat <<'REMOTE'
          set -Eeuo pipefail
          TARGET_SHA='24277e008d25f66f52b56284ff83ca3eead39fb2'
          EXACT_IMAGE='ghcr.io/pachaninm-lab/grainflow-web:sha-24277e0'
          DEPLOY_STARTED=0

          mapfile -t WEB_IDS < <(docker ps -q --filter 'label=com.docker.compose.service=web')
          if (( ${#WEB_IDS[@]} != 1 )); then
            echo "Expected exactly one running Compose web container; found ${#WEB_IDS[@]}." >&2
            exit 10
          fi

          WEB_ID="${WEB_IDS[0]}"
          PROJECT="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.project" }}' "$WEB_ID")"
          WORKDIR="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' "$WEB_ID")"
          CONFIG_FILES="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.project.config_files" }}' "$WEB_ID")"
          IMAGE_REF="$(docker inspect --format '{{ .Config.Image }}' "$WEB_ID")"
          OLD_REV="$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$WEB_ID" 2>/dev/null || true)"
          OLD_IMAGE_ID="$(docker inspect --format '{{ .Image }}' "$WEB_ID")"
          OLD_DIGEST="$(docker image inspect --format '{{if .RepoDigests}}{{index .RepoDigests 0}}{{end}}' "$OLD_IMAGE_ID" 2>/dev/null || true)"

          for value in PROJECT WORKDIR CONFIG_FILES IMAGE_REF OLD_IMAGE_ID; do
            if [[ -z "${!value}" || "${!value}" == '<no value>' ]]; then
              echo "Missing production Compose metadata: $value" >&2
              exit 11
            fi
          done
          if [[ "$IMAGE_REF" == *@* ]]; then
            echo "Digest-only Compose image reference cannot be retagged safely: $IMAGE_REF" >&2
            exit 12
          fi

          IFS=',' read -r -a RAW_CONFIGS <<< "$CONFIG_FILES"
          DC=(docker compose --project-name "$PROJECT")
          for cfg in "${RAW_CONFIGS[@]}"; do
            cfg="${cfg#"${cfg%%[![:space:]]*}"}"
            cfg="${cfg%"${cfg##*[![:space:]]}"}"
            [[ "$cfg" = /* ]] || cfg="$WORKDIR/$cfg"
            [[ -f "$cfg" ]] || { echo "Compose file not found: $cfg" >&2; exit 13; }
            DC+=(-f "$cfg")
          done
          cd "$WORKDIR"
          "${DC[@]}" config --services | grep -qx web

          mapfile -t BEFORE_OTHER_IDS < <(
            docker ps -q --filter "label=com.docker.compose.project=$PROJECT" | grep -vx "$WEB_ID" | sort
          )

          rollback() {
            rc=$?
            trap - ERR
            if (( DEPLOY_STARTED == 1 )); then
              echo "Deployment failed with rc=$rc; restoring previous web image." >&2
              docker tag "$OLD_IMAGE_ID" "$IMAGE_REF"
              "${DC[@]}" up -d --no-deps web || true
            fi
            exit "$rc"
          }
          trap rollback ERR

          docker pull "$EXACT_IMAGE"
          PULLED_REV="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$EXACT_IMAGE" 2>/dev/null || true)"
          [[ "$PULLED_REV" == "$TARGET_SHA" ]] || {
            echo "Pulled revision mismatch: expected=$TARGET_SHA actual=${PULLED_REV:-missing}" >&2
            exit 14
          }

          docker tag "$EXACT_IMAGE" "$IMAGE_REF"
          DEPLOY_STARTED=1
          "${DC[@]}" up -d --no-deps web

          NEW_ID=''
          STATE='missing'
          for attempt in $(seq 1 60); do
            NEW_ID="$("${DC[@]}" ps -q web)"
            if [[ -n "$NEW_ID" ]]; then
              STATE="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' "$NEW_ID")"
              echo "Health attempt $attempt/60: $STATE"
              if [[ "$STATE" == healthy || "$STATE" == running ]]; then
                break
              fi
            fi
            sleep 2
          done
          [[ -n "$NEW_ID" ]] || { echo 'New web container not found.' >&2; exit 15; }
          [[ "$STATE" == healthy || "$STATE" == running ]] || { "${DC[@]}" logs --tail=200 web; exit 16; }

          NEW_REV="$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$NEW_ID" 2>/dev/null || true)"
          [[ "$NEW_REV" == "$TARGET_SHA" ]] || {
            echo "Running revision mismatch: expected=$TARGET_SHA actual=${NEW_REV:-missing}" >&2
            exit 17
          }

          mapfile -t AFTER_OTHER_IDS < <(
            docker ps -q --filter "label=com.docker.compose.project=$PROJECT" | grep -vx "$NEW_ID" | sort
          )
          [[ "${BEFORE_OTHER_IDS[*]}" == "${AFTER_OTHER_IDS[*]}" ]] || {
            echo 'A non-web Compose container changed during a web-only release.' >&2
            exit 18
          }

          trap - ERR
          DEPLOY_STARTED=0
          echo "ROLLBACK_IMAGE_ID=$OLD_IMAGE_ID"
          echo "ROLLBACK_REVISION=${OLD_REV:-unknown}"
          echo "ROLLBACK_REFERENCE=${OLD_DIGEST:-$OLD_IMAGE_ID}"
          echo "DEPLOYED_REVISION=$NEW_REV"
          echo "COMPOSE_PROJECT=$PROJECT"
          echo "WEB_STATE=$STATE"
          REMOTE
          )"

          if [[ "$SSH_MODE" == key ]]; then
            ssh -i "$HOME/.ssh/id_pc_prod" -p "$SSH_PORT" \
              -o BatchMode=yes -o StrictHostKeyChecking=yes \
              "$SSH_USER@$SSH_HOST" 'bash -s' <<< "$remote_script" \
              > "$EVIDENCE_DIR/deploy-remote.log" 2>&1
          else
            password="${SSH_PASSWORD_PRIMARY:-${SSH_PASSWORD_FALLBACK:-}}"
            SSHPASS="$password" sshpass -e ssh -p "$SSH_PORT" \
              -o StrictHostKeyChecking=yes \
              "$SSH_USER@$SSH_HOST" 'bash -s' <<< "$remote_script" \
              > "$EVIDENCE_DIR/deploy-remote.log" 2>&1
          fi
          cat "$EVIDENCE_DIR/deploy-remote.log"

          rollback_image_id="$(sed -n 's/^ROLLBACK_IMAGE_ID=//p' "$EVIDENCE_DIR/deploy-remote.log" | tail -1)"
          rollback_revision="$(sed -n 's/^ROLLBACK_REVISION=//p' "$EVIDENCE_DIR/deploy-remote.log" | tail -1)"
          deployed_revision="$(sed -n 's/^DEPLOYED_REVISION=//p' "$EVIDENCE_DIR/deploy-remote.log" | tail -1)"
          [[ -n "$rollback_image_id" && "$deployed_revision" == "$TARGET_SHA" ]]
          echo "rollback_image_id=$rollback_image_id" >> "$GITHUB_OUTPUT"
          echo "rollback_revision=$rollback_revision" >> "$GITHUB_OUTPUT"
          echo "deployed_revision=$deployed_revision" >> "$GITHUB_OUTPUT"

      - name: Verify exact live manifest and server-rendered P0 markers
        shell: bash
        run: |
          set -euo pipefail
          passed=0
          for attempt in $(seq 1 45); do
            cache_bust="${TARGET_SHORT}-${attempt}-$(date +%s)"
            manifest="$(curl -fsSL --compressed --max-time 30 "$LIVE_BASE/manifest-pc-deploy.json?release=$cache_bust" || true)"
            home="$(curl -fsSL --compressed --max-time 30 -H 'Accept-Language: ru-RU,ru;q=0.9' "$LIVE_BASE/platform-v7?lang=ru&release=$cache_bust" || true)"
            passport="$(curl -fsSL --compressed --max-time 30 -H 'Accept-Language: ru-RU,ru;q=0.9' "$LIVE_BASE/platform-v7/ai-in-action?lang=ru&release=$cache_bust" || true)"
            live_sha="$(jq -r '.commitSha // empty' <<< "$manifest" 2>/dev/null || true)"

            if [[ "$live_sha" == "$TARGET_SHA" ]] \
              && grep -Fq 'TAI · интеллектуальный контроль' <<< "$home" \
              && grep -Fq 'Государственный контур данных' <<< "$home" \
              && grep -Fq 'TAI · Сводка для покупателя' <<< "$home" \
              && grep -Fq 'TAI — доказательный уровень исполнения сделки' <<< "$passport" \
              && grep -Fq 'NOT_ATTESTED' <<< "$passport" \
              && grep -Fq 'TAI готовит — человек подтверждает — адаптер исполняет' <<< "$passport"; then
              printf '%s\n' "$manifest" > "$EVIDENCE_DIR/live-manifest.json"
              printf '%s\n' "$home" > "$EVIDENCE_DIR/live-home.html"
              printf '%s\n' "$passport" > "$EVIDENCE_DIR/live-ai-passport.html"
              curl -fsSIL "$LIVE_BASE/platform-v7?release=$cache_bust" > "$EVIDENCE_DIR/live-home-headers.txt"
              curl -fsSIL "$LIVE_BASE/platform-v7/ai-in-action?release=$cache_bust" > "$EVIDENCE_DIR/live-ai-passport-headers.txt"
              passed=1
              break
            fi
            echo "Live attempt $attempt/45: expected=$TARGET_SHA actual=${live_sha:-missing}"
            sleep 5
          done
          [[ "$passed" == 1 ]] || { echo 'Exact live manifest or P0 markers did not pass.' >&2; exit 20; }

      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install locked browser acceptance dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium for live VPS acceptance
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run live Chromium mobile, interaction and WCAG acceptance
        working-directory: apps/web
        shell: bash
        run: |
          set -euo pipefail
          export RELEASE_EVIDENCE_DIR="$GITHUB_WORKSPACE/$EVIDENCE_DIR"
          pnpm exec node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const { chromium } = require('@playwright/test');
          const AxeBuilder = require('@axe-core/playwright').default;

          const base = process.env.LIVE_BASE;
          const target = process.env.TARGET_SHA;
          const evidenceDir = process.env.RELEASE_EVIDENCE_DIR;
          const widths = [320, 375, 390, 430, 768, 1024, 1440];
          const routes = [
            {
              name: 'home',
              path: '/platform-v7?lang=ru',
              markers: ['TAI · интеллектуальный контроль', 'Государственный контур данных', 'TAI · Сводка для покупателя'],
            },
            {
              name: 'ai-passport',
              path: '/platform-v7/ai-in-action?lang=ru',
              markers: ['TAI — доказательный уровень исполнения сделки', 'NOT_ATTESTED', 'TAI готовит — человек подтверждает — адаптер исполняет'],
            },
          ];

          (async () => {
            const browser = await chromium.launch();
            const results = [];
            const forbiddenRequests = [];
            try {
              for (const width of widths) {
                for (const route of routes) {
                  const page = await browser.newPage({ viewport: { width, height: 1000 }, locale: 'ru-RU' });
                  const runtimeErrors = [];
                  page.on('pageerror', (error) => runtimeErrors.push(error.message));
                  page.on('request', (request) => {
                    const url = request.url();
                    if (/fgis|esia|gosuslugi|bank-callback|\/api\/proxy\/ai-assistant/i.test(url)) forbiddenRequests.push(url);
                  });
                  const separator = route.path.includes('?') ? '&' : '?';
                  const url = `${base}${route.path}${separator}release=${target.slice(0, 12)}-${width}-${Date.now()}`;
                  const response = await page.goto(url, { waitUntil: 'domcontentloaded', timeout: 60_000 });
                  if (!response || !response.ok()) throw new Error(`${route.name} ${width}px returned ${response?.status()}`);
                  await page.locator('.pc-public-contact-dock-action').first().waitFor({ state: 'visible', timeout: 30_000 });
                  const dockCount = await page.locator('.pc-public-contact-dock-action').count();
                  if (dockCount !== 3) throw new Error(`${route.name} ${width}px dock count=${dockCount}`);
                  const bodyText = await page.locator('body').innerText();
                  for (const marker of route.markers) {
                    if (!bodyText.includes(marker)) throw new Error(`${route.name} ${width}px missing marker: ${marker}`);
                  }
                  const overflow = await page.evaluate(() => Math.max(
                    document.documentElement.scrollWidth - document.documentElement.clientWidth,
                    document.body.scrollWidth - document.body.clientWidth,
                  ));
                  if (overflow > 1) throw new Error(`${route.name} ${width}px horizontal overflow=${overflow}`);
                  if (runtimeErrors.length) throw new Error(`${route.name} ${width}px runtime errors: ${runtimeErrors.join(' | ')}`);

                  let blockingAxe = [];
                  if (width === 320 || width === 1440) {
                    const axe = await new AxeBuilder({ page })
                      .withTags(['wcag2a', 'wcag2aa', 'wcag21aa', 'wcag22aa'])
                      .analyze();
                    blockingAxe = axe.violations.filter((item) => item.impact === 'serious' || item.impact === 'critical');
                    if (blockingAxe.length) throw new Error(`${route.name} ${width}px blocking axe violations: ${JSON.stringify(blockingAxe)}`);
                    await page.screenshot({ path: path.join(evidenceDir, `${route.name}-${width}.png`), fullPage: true });
                  }

                  if (width === 1440 && route.name === 'home') {
                    const lenses = page.locator('.pc-ppe-preview-lenses');
                    await lenses.getByRole('tab', { name: 'Документы' }).click();
                    await page.locator('.pc-public-deal-intelligence[data-lens="documents"]').waitFor({ state: 'visible' });
                    const government = page.locator('#government-data');
                    await government.getByRole('tab', { name: /Аргус-Фито/ }).click();
                    const governmentText = await government.locator('.pc-public-government-result').innerText();
                    if (!governmentText.includes('Доступна публичная проверка')) throw new Error('Argus-Fito public status did not update');
                  }
                  if (width === 1440 && route.name === 'ai-passport') {
                    const role = page.locator('#role-analysis');
                    await role.getByRole('tab', { name: 'Продавец' }).click();
                    const panelText = await role.locator('[role="tabpanel"]').innerText();
                    if (!panelText.includes('Версия протокола не связана')) throw new Error('Seller role analysis did not update');
                  }

                  results.push({ route: route.name, width, dockCount, overflow, blockingAxe: blockingAxe.length, status: 'PASS' });
                  await page.close();
                }
              }
              if (forbiddenRequests.length) throw new Error(`Forbidden external requests: ${JSON.stringify(forbiddenRequests)}`);
              fs.writeFileSync(
                path.join(evidenceDir, 'live-browser-acceptance.json'),
                JSON.stringify({ schemaVersion: 'pc.vps-tai-p0-live-acceptance.v1', targetSha: target, status: 'PASS', results }, null, 2) + '\n',
              );
            } finally {
              await browser.close();
            }
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Roll back web image if post-deploy acceptance failed
        if: failure() && steps.deploy.outputs.rollback_image_id != ''
        shell: bash
        env:
          SSH_MODE: ${{ steps.ssh.outputs.mode }}
          SSH_HOST: ${{ steps.ssh.outputs.host }}
          SSH_USER: ${{ steps.ssh.outputs.user }}
          SSH_PORT: ${{ steps.ssh.outputs.port }}
          ROLLBACK_IMAGE_ID: ${{ steps.deploy.outputs.rollback_image_id }}
          ROLLBACK_REVISION: ${{ steps.deploy.outputs.rollback_revision }}
        run: |
          set -euo pipefail
          remote_script="$(cat <<'REMOTE'
          set -Eeuo pipefail
          ROLLBACK_IMAGE_ID="$1"
          ROLLBACK_REVISION="$2"
          mapfile -t WEB_IDS < <(docker ps -q --filter 'label=com.docker.compose.service=web')
          (( ${#WEB_IDS[@]} == 1 ))
          WEB_ID="${WEB_IDS[0]}"
          PROJECT="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.project" }}' "$WEB_ID")"
          WORKDIR="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.project.working_dir" }}' "$WEB_ID")"
          CONFIG_FILES="$(docker inspect --format '{{ index .Config.Labels "com.docker.compose.project.config_files" }}' "$WEB_ID")"
          IMAGE_REF="$(docker inspect --format '{{ .Config.Image }}' "$WEB_ID")"
          docker image inspect "$ROLLBACK_IMAGE_ID" >/dev/null
          IFS=',' read -r -a RAW_CONFIGS <<< "$CONFIG_FILES"
          DC=(docker compose --project-name "$PROJECT")
          for cfg in "${RAW_CONFIGS[@]}"; do
            cfg="${cfg#"${cfg%%[![:space:]]*}"}"
            cfg="${cfg%"${cfg##*[![:space:]]}"}"
            [[ "$cfg" = /* ]] || cfg="$WORKDIR/$cfg"
            DC+=(-f "$cfg")
          done
          cd "$WORKDIR"
          docker tag "$ROLLBACK_IMAGE_ID" "$IMAGE_REF"
          "${DC[@]}" up -d --no-deps web
          NEW_ID="$("${DC[@]}" ps -q web)"
          [[ -n "$NEW_ID" ]]
          if [[ -n "$ROLLBACK_REVISION" && "$ROLLBACK_REVISION" != unknown ]]; then
            ACTUAL="$(docker inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$NEW_ID" 2>/dev/null || true)"
            [[ "$ACTUAL" == "$ROLLBACK_REVISION" ]]
          fi
          echo "ROLLBACK_COMPLETED=$ROLLBACK_REVISION"
          REMOTE
          )"
          if [[ "$SSH_MODE" == key ]]; then
            ssh -i "$HOME/.ssh/id_pc_prod" -p "$SSH_PORT" -o BatchMode=yes -o StrictHostKeyChecking=yes \
              "$SSH_USER@$SSH_HOST" "bash -s -- '$ROLLBACK_IMAGE_ID' '$ROLLBACK_REVISION'" <<< "$remote_script" \
              | tee "$EVIDENCE_DIR/rollback.log"
          else
            password="${SSH_PASSWORD_PRIMARY:-${SSH_PASSWORD_FALLBACK:-}}"
            SSHPASS="$password" sshpass -e ssh -p "$SSH_PORT" -o StrictHostKeyChecking=yes \
              "$SSH_USER@$SSH_HOST" "bash -s -- '$ROLLBACK_IMAGE_ID' '$ROLLBACK_REVISION'" <<< "$remote_script" \
              | tee "$EVIDENCE_DIR/rollback.log"
          fi

      - name: Build exact release evidence inventory
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          find "$EVIDENCE_DIR" -type f ! -name exact-evidence-sha256.txt -print0 \
            | sort -z \
            | xargs -0 -r sha256sum \
            > "$EVIDENCE_DIR/exact-evidence-sha256.txt"
          {
            echo '## Canonical VPS TAI P0 web release'
            echo
            echo "- target main: \`$TARGET_SHA\`"
            echo "- exact image: \`$EXACT_IMAGE\`"
            echo "- deployed revision: \`${{ steps.deploy.outputs.deployed_revision || 'NOT_DEPLOYED' }}\`"
            echo "- operational status: \`NOT_ATTESTED\`"
            if [[ -f "$EVIDENCE_DIR/live-browser-acceptance.json" ]]; then
              echo '- live browser acceptance: `PASS`'
            else
              echo '- live browser acceptance: `NOT_PASS`'
            fi
            if [[ -f "$EVIDENCE_DIR/rollback.log" ]]; then
              echo '- rollback: `EXECUTED`'
            else
              echo '- rollback: `NOT_REQUIRED`'
            fi
          } > "$EVIDENCE_DIR/summary.md"
          cat "$EVIDENCE_DIR/summary.md" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload immutable VPS release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vps-tai-p0-web-24277e0-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: false
