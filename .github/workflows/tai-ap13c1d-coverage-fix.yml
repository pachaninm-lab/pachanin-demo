name: TAI AP-13C.1d Coverage Fix

on:
  push:
    branches:
      - agent/tai-ap-13c1d-quality-scoring-authority
    paths:
      - '.github/workflows/tai-ap13c1d-coverage-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-quality-scoring-authority
          fetch-depth: 0
      - name: Add exact manifest boundary coverage and self-delete
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin agent/tai-ap-13c1d-quality-scoring-authority
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tests/test_quality_scoring_authority.py')
          text = path.read_text(encoding='utf-8')
          marker = 'def test_complete_manifest_bindings_fail_closed('
          if marker in text:
              raise SystemExit('coverage test already exists')
          addition = '''

@pytest.mark.parametrize(
    ("field", "value", "match"),
    [
        ("exact_main", "b" * 40, "exact-main mismatch"),
        ("authority_sha256", "f" * 64, "authority digest mismatch"),
        ("runtime_report_sha256", "f" * 64, "runtime digest mismatch"),
        ("observation_index_sha256", "f" * 64, "observation index mismatch"),
        (
            "scored_at",
            (NOW + timedelta(minutes=10)).isoformat(),
            "from the future",
        ),
        (
            "quality_scoring_status",
            "PENDING_QUALITY_SCORING",
            "status mismatch",
        ),
    ],
)
def test_complete_manifest_bindings_fail_closed(
    tmp_path: Path, field: str, value: object, match: str
) -> None:
    fixture = _fixture(tmp_path)
    fixture["manifest"][field] = value
    _rewrite_manifest(fixture)
    with pytest.raises(QualityScoringError, match=match):
        _verify(
            fixture,
            evaluated_at=(NOW + timedelta(minutes=5)).isoformat(),
        )
'''
          path.write_text(text.rstrip() + addition + '\n', encoding='utf-8')
          PY
          rm .github/workflows/tai-ap13c1d-coverage-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/tai/tests/test_quality_scoring_authority.py \
            .github/workflows/tai-ap13c1d-coverage-fix.yml
          git commit -m 'test(tai): cover complete manifest fail-closed bindings'
          git push origin HEAD:agent/tai-ap-13c1d-quality-scoring-authority
