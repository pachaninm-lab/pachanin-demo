name: apply public style hydration fix

on:
  push:
    branches:
      - fix/public-auth-server-authority
    paths:
      - .github/workflows/apply-public-style-hydration-fix.yml

permissions:
  contents: write

# One-shot branch repair. This workflow deletes itself from the implementation branch after verification.
jobs:
  patch:
    if: github.event.head_commit.message != 'fix(web): make public inline styles hydration-stable'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/public-auth-server-authority
          fetch-depth: 0
      - name: Replace text style children with deterministic HTML
        run: |
          python - <<'PY'
          from pathlib import Path
          files = [
              Path('apps/web/app/platform-v7/page.tsx'),
              Path('apps/web/components/platform-v7/PublicSiteHeader.tsx'),
              Path('apps/web/components/v7r/PlatformV7IntelligenceStrip.tsx'),
          ]
          old = '<style>{css}</style>'
          new = '<style dangerouslySetInnerHTML={{ __html: css }} />'
          for file in files:
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{file}: expected one style occurrence, found {count}')
              file.write_text(text.replace(old, new))
          PY
      - name: Commit deterministic style fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web/app/platform-v7/page.tsx apps/web/components/platform-v7/PublicSiteHeader.tsx apps/web/components/v7r/PlatformV7IntelligenceStrip.tsx
          git commit -m 'fix(web): make public inline styles hydration-stable'
          git push origin HEAD:fix/public-auth-server-authority
