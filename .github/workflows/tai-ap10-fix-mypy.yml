name: TAI AP-10 fix strict mypy typing

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap10-fix-mypy.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-10-operational-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Rename typed loop variables by line boundaries
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tai/operations.py')
          lines = path.read_text().splitlines()

          evidence_start = lines.index('        for item in evidence_by_kind.values():')
          assessment_start = lines.index('        for item in assessments_by_indicator.values():')
          status_start = lines.index('        status_counts = {')

          lines[evidence_start] = '        for evidence_item in evidence_by_kind.values():'
          for index in range(evidence_start + 1, assessment_start):
              lines[index] = lines[index].replace('item.', 'evidence_item.')

          lines[assessment_start] = '        for assessment in assessments_by_indicator.values():'
          for index in range(assessment_start + 1, status_start):
              lines[index] = lines[index].replace('item.', 'assessment.')

          path.write_text('\n'.join(lines) + '\n')
          Path('.github/workflows/tai-ap10-fix-mypy.yml').unlink()
          PY
      - name: Commit typing fix and cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-10: separate evidence and assessment loop types'
          git push origin HEAD:tai/ap-10-operational-authority
