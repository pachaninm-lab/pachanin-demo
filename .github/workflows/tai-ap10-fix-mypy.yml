name: TAI AP-10 fix strict mypy typing

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap10-fix-mypy.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-10-operational-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Rename typed loop variables exactly
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tai/operations.py')
          text = path.read_text()
          old_evidence = '''        for item in evidence_by_kind.values():
              if item.exact_head_sha != exact_head_sha:
                  reasons.append("EVIDENCE_EXACT_HEAD_MISMATCH")
              if item.observed_at > decided_at:
                  reasons.append("EVIDENCE_FROM_FUTURE")
              if item.valid_until <= decided_at:
                  reasons.append("EVIDENCE_EXPIRED")
              if not item.accepted:
                  reasons.append("EVIDENCE_REJECTED")
          '''
          new_evidence = '''        for evidence_item in evidence_by_kind.values():
              if evidence_item.exact_head_sha != exact_head_sha:
                  reasons.append("EVIDENCE_EXACT_HEAD_MISMATCH")
              if evidence_item.observed_at > decided_at:
                  reasons.append("EVIDENCE_FROM_FUTURE")
              if evidence_item.valid_until <= decided_at:
                  reasons.append("EVIDENCE_EXPIRED")
              if not evidence_item.accepted:
                  reasons.append("EVIDENCE_REJECTED")
          '''
          old_assessment = '''        for item in assessments_by_indicator.values():
              if item.exact_head_sha != exact_head_sha:
                  reasons.append("SLO_EXACT_HEAD_MISMATCH")
              if item.assessed_at > decided_at:
                  reasons.append("SLO_ASSESSMENT_FROM_FUTURE")
          '''
          new_assessment = '''        for assessment in assessments_by_indicator.values():
              if assessment.exact_head_sha != exact_head_sha:
                  reasons.append("SLO_EXACT_HEAD_MISMATCH")
              if assessment.assessed_at > decided_at:
                  reasons.append("SLO_ASSESSMENT_FROM_FUTURE")
          '''
          for old, new, name in (
              (old_evidence, new_evidence, 'evidence loop'),
              (old_assessment, new_assessment, 'assessment loop'),
          ):
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{name}: expected one exact match, found {count}')
              text = text.replace(old, new, 1)
          path.write_text(text)
          Path('.github/workflows/tai-ap10-fix-mypy.yml').unlink()
          PY
      - name: Commit typing fix and cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-10: separate evidence and assessment loop types'
          git push origin HEAD:tai/ap-10-operational-authority
