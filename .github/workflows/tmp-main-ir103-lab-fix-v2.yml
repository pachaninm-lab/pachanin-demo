name: Temporary IR-10.3 laboratory fix runner v2

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: tmp-ir103-lab-fix-v2
  cancel-in-progress: false

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-3-labs-authority-v3
          fetch-depth: 0
      - name: Apply patch from main
        shell: bash
        run: |
          set -euo pipefail
          git fetch origin main
          git show origin/main:scripts/tmp-ir103-lab-e2e-fix.py > /tmp/ir103-fix.py
          set +e
          python3 /tmp/ir103-fix.py 2>&1 | tee /tmp/ir103-fix.log
          status=${PIPESTATUS[0]}
          set -e
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if [ "$status" -ne 0 ]; then
            cp /tmp/ir103-fix.log .tmp-ir103-patch-error.txt
            git add .tmp-ir103-patch-error.txt
            git commit -m 'chore: record IR-10.3 patch failure'
            git push origin HEAD:agent/ir-10-3-labs-authority-v3
            exit "$status"
          fi
          git add -A
          git commit -m 'test(labs): prove authoritative laboratory handoff [ir-10-3-lab-e2e-fixed]'
          git push origin HEAD:agent/ir-10-3-labs-authority-v3

          git switch -C main origin/main
          rm -f .github/workflows/tmp-main-ir103-lab-fix-v2.yml scripts/tmp-ir103-lab-e2e-fix.py .tmp-main-ir103-lab-fix-v2-trigger
          git add -A
          git commit -m 'chore: remove IR-10.3 laboratory fix runner v2'
          git push origin HEAD:main
