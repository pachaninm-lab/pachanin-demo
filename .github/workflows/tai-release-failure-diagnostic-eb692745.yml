name: TAI Release Failure Diagnostic eb692745

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-release-failure-diagnostic-eb692745.yml

permissions:
  actions: read
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      FAILED_JOB_ID: '88135810934'
    steps:
      - name: Download failed exact-main job log
        shell: bash
        run: |
          set -euo pipefail
          curl --fail --location --silent --show-error \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/${REPOSITORY}/actions/jobs/${FAILED_JOB_ID}/logs" \
            --output failed-job.log
          tail -n 260 failed-job.log > failed-job-tail.log
          grep -nE 'Traceback|Error|Exception|SystemExit|ValueError|RuntimeError|failed|FAIL|No such file|not found|invalid|mismatch' failed-job.log \
            > failed-job-errors.log || true
          cat failed-job-errors.log
          tail -n 120 failed-job-tail.log
      - name: Upload diagnostic logs
        uses: actions/upload-artifact@v4
        with:
          name: tai-release-failure-diagnostic-eb692745
          path: |
            failed-job-errors.log
            failed-job-tail.log
          if-no-files-found: error
          retention-days: 7
