name: TAI PR 2839 Refresh Snapshot

on:
  push:
    branches:
      - agent/tai-ap-13b3a-model-bundle-authority
    paths:
      - .github/workflows/tai-pr-2839-refresh-snapshot.yml

permissions:
  contents: write

concurrency:
  group: tai-pr-2839-refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13b3a-model-bundle-authority
          fetch-depth: 0

      - name: Enforce exact branch head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$GITHUB_REF" = "refs/heads/agent/tai-ap-13b3a-model-bundle-authority"

      - name: Merge accepted main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git merge-base --is-ancestor 3bf85bbf510c6c95601c80dd08e95a55d4bbea23 refs/remotes/origin/main
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git merge --no-ff refs/remotes/origin/main -m 'Merge main after AP-13B.2a acceptance'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml

      - name: Validate refreshed v2 authority
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e 'apps/tai[dev]'
          ruff check \
            apps/tai/tai/model_bundle_v2.py \
            apps/tai/tai/model_bundle_v2_common.py \
            apps/tai/tai/model_bundle_v2_parse.py \
            apps/tai/tai/model_bundle_v2_serialize.py \
            apps/tai/tai/model_bundle_v2_types.py \
            apps/tai/tai/model_bundle_v2_verify.py \
            apps/tai/tests/model_bundle_v2_support.py \
            apps/tai/tests/test_ap13b3a_scope.py \
            apps/tai/tests/test_model_bundle_v2_adversarial.py \
            apps/tai/tests/test_model_bundle_v2_contract.py
          mypy --strict \
            apps/tai/tai/model_bundle_v2.py \
            apps/tai/tai/model_bundle_v2_common.py \
            apps/tai/tai/model_bundle_v2_parse.py \
            apps/tai/tai/model_bundle_v2_serialize.py \
            apps/tai/tai/model_bundle_v2_types.py \
            apps/tai/tai/model_bundle_v2_verify.py
          pytest -q \
            apps/tai/tests/test_ap13b3a_scope.py \
            apps/tai/tests/test_model_bundle_v2_adversarial.py \
            apps/tai/tests/test_model_bundle_v2_contract.py

      - name: Finalize clean merge commit
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/tai-pr-2839-refresh-snapshot.yml
          git add .github/workflows/tai-pr-2839-refresh-snapshot.yml
          git diff --cached --check
          git commit --amend --no-edit
          test "$(git rev-list --count HEAD^@)" -eq 2
          git push origin HEAD:agent/tai-ap-13b3a-model-bundle-authority

      - name: Stage exact clean snapshot
        shell: bash
        run: |
          set -euo pipefail
          root=/tmp/tai-pr-2839-snapshot
          mkdir -p "$root/repository"
          paths=(
            apps/tai/governance/scopes/ap-13b3a-2836.json
            apps/tai/model-artifacts/README.md
            apps/tai/model-artifacts/local-model-artifact-bundle.schema.v2.json
            apps/tai/model-artifacts/mistral-7b-instruct-v0.3.bundle.v2.pending.json
            apps/tai/model-artifacts/model-bundle-acquisition-runbook.v2.md
            apps/tai/model-artifacts/model-bundle-authority.v2.json
            apps/tai/model-artifacts/qwen3-8b.bundle.v2.pending.json
            apps/tai/tai/model_artifact_registry_cli.py
            apps/tai/tai/model_bundle_v2.py
            apps/tai/tai/model_bundle_v2_common.py
            apps/tai/tai/model_bundle_v2_parse.py
            apps/tai/tai/model_bundle_v2_serialize.py
            apps/tai/tai/model_bundle_v2_types.py
            apps/tai/tai/model_bundle_v2_verify.py
            apps/tai/tests/model_bundle_v2_support.py
            apps/tai/tests/test_ap13b3a_scope.py
            apps/tai/tests/test_model_bundle_v2_adversarial.py
            apps/tai/tests/test_model_bundle_v2_contract.py
          )
          for path in "${paths[@]}"; do
            mkdir -p "$root/repository/$(dirname "$path")"
            cp "$path" "$root/repository/$path"
          done
          git rev-parse HEAD > "$root/head-sha.txt"
          git rev-parse 'HEAD^{tree}' > "$root/head-tree.txt"
          git diff --name-status refs/remotes/origin/main...HEAD > "$root/name-status.txt"
          git status --porcelain=v1 > "$root/status.txt"
          test ! -s "$root/status.txt"
          sha256sum "${paths[@]}" > "$root/files.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: tai-pr-2839-clean-snapshot-${{ github.run_id }}
          path: /tmp/tai-pr-2839-snapshot
          if-no-files-found: error
          retention-days: 1
