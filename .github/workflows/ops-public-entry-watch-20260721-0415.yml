name: ops public entry watch summary 20260721 0415

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Publish compact watch summary
        uses: actions/github-script@v7
        with:
          script: |
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const source = comments.find((comment) => comment.body?.includes('<!-- public-entry-watch-result -->'));
            let summary = { error: 'watch result comment not found' };
            if (source) {
              const match = source.body.match(/```json\n([\s\S]*?)\n```/);
              if (match) {
                const payload = JSON.parse(match[1]);
                const issues = Array.isArray(payload.issues) ? payload.issues : [];
                summary = {
                  generatedAt: payload.generatedAt,
                  http: payload.http,
                  browserCases: payload.browserCases,
                  languageCycleCases: Array.isArray(payload.languageCycle?.cases) ? payload.languageCycle.cases.length : 0,
                  languageCycleFailures: Array.isArray(payload.languageCycle?.failures) ? payload.languageCycle.failures.length : null,
                  loginFailClosed: payload.loginFailClosed,
                  issueCount: issues.length,
                  issueCodes: [...new Set(issues.map((item) => item.code))],
                  issues: issues.slice(0, 20).map((item) => ({
                    code: item.code,
                    project: item.project,
                    route: item.route,
                    locale: item.locale,
                    finalUrl: item.finalUrl,
                    status: item.status,
                    error: item.error,
                  })),
                };
              }
            }
            const marker = '<!-- public-entry-watch-summary -->';
            const body = `Одноразовая автоматизированная проверка production-домена. Не предназначена для merge.\n\n${marker}\n\`\`\`json\n${JSON.stringify(summary, null, 2)}\n\`\`\``;
            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              body,
            });
