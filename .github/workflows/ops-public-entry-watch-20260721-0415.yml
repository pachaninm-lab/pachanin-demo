name: ops public entry watch 20260721 0415

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  production-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install Chromium and WebKit
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Check production public entry
        continue-on-error: true
        working-directory: apps/web
        run: node scripts/public-entry-watch-automation.mjs
      - name: Validate cyclic RU EN ZH control
        if: always()
        working-directory: apps/web
        run: node scripts/public-entry-watch-language-cycle.mjs
      - name: Upload watch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-watch-20260721-0415
          path: artifacts/public-entry-watch
          if-no-files-found: warn
          retention-days: 3
      - name: Publish watch result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const file = 'artifacts/public-entry-watch/report.json';
            let payload = { issues: [{ code: 'REPORT_MISSING' }] };
            if (fs.existsSync(file)) payload = JSON.parse(fs.readFileSync(file, 'utf8'));
            const compact = {
              generatedAt: payload.generatedAt,
              http: payload.http,
              browserCases: Array.isArray(payload.browser) ? payload.browser.length : 0,
              languageCycle: payload.languageCycle,
              loginFailClosed: payload.loginFailClosed,
              issues: payload.issues,
            };
            const body = `<!-- public-entry-watch-result -->\n\`\`\`json\n${JSON.stringify(compact, null, 2).slice(0, 60000)}\n\`\`\``;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const existing = comments.find((comment) => comment.body?.includes('<!-- public-entry-watch-result -->'));
            if (existing) {
              await github.rest.issues.updateComment({ owner: context.repo.owner, repo: context.repo.repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body });
            }
      - name: Enforce watch result
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const file = 'artifacts/public-entry-watch/report.json';
          if (!fs.existsSync(file)) process.exit(1);
          const report = JSON.parse(fs.readFileSync(file, 'utf8'));
          if (!Array.isArray(report.issues) || report.issues.length > 0) process.exit(1);
          NODE
