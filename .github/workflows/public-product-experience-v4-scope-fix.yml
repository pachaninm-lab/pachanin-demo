name: Register Public Product Experience V4 scope

on:
  push:
    branches:
      - agent/public-product-experience-v4-final-2
    paths:
      - .github/workflows/public-product-experience-v4-scope-fix.yml

permissions:
  contents: write

jobs:
  register:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-product-experience-v4-final-2
          fetch-depth: 0
      - name: Register exact browser acceptance path
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/platform-v7/autopilot/autopilot-state.json';
          const state = JSON.parse(fs.readFileSync(path, 'utf8'));
          const branch = 'agent/public-product-experience-v4-final-2';
          const required = 'apps/web/tests/e2e/platform-v7-public-product-experience-v3.spec.ts';
          const scope = state.approvedConcurrentScopes?.[branch];
          if (!Array.isArray(scope)) throw new Error(`Missing approved scope for ${branch}`);
          if (!scope.includes(required)) scope.push(required);
          scope.sort();
          fs.writeFileSync(path, `${JSON.stringify(state)}\n`);
          NODE
      - name: Remove one-shot workflow
        run: rm .github/workflows/public-product-experience-v4-scope-fix.yml
      - name: Commit exact scope
        shell: bash
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/platform-v7/autopilot/autopilot-state.json .github/workflows/public-product-experience-v4-scope-fix.yml
          git commit -m 'Register V4 browser acceptance in exact branch scope'
          git push origin HEAD:agent/public-product-experience-v4-final-2
