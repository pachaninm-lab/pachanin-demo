name: Next.js 15.5.21 Security Remediation Controller

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: next-security-remediation-3043
  cancel-in-progress: false

jobs:
  remediate:
    if: >-
      github.event.issue.pull_request != null &&
      github.event.issue.number == 3075 &&
      github.event.comment.author_association == 'OWNER' &&
      github.event.comment.body == '/security patch-next 3043 15.5.21-v9'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout dedicated security branch
        uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-next-15-5-16-final
          fetch-depth: 0

      - name: Patch, verify and publish exact dependency remediation
        env:
          GH_TOKEN: ${{ github.token }}
          SECURITY_BRANCH: agent/ir-sec-next-15-5-16-final
          RELEASE_PR: '3075'
          TRACKING_ISSUE: '3043'
        shell: bash
        run: |
          set -euo pipefail
          phase='initialization'
          canonical_title='Add REG.RU full-stack exact-SHA release authority'

          on_failure() {
            rc=$?
            trap - ERR
            failed_line="$1"
            safe_phase="$(printf '%s' "$phase" | tr -cd 'A-Za-z0-9._:-' | cut -c1-80)"
            set +e
            gh pr edit "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" \
              --title "$canonical_title [NEXT FAIL: ${safe_phase}:${rc}]"
            gh pr comment "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" \
              --body "Next.js 15.5.21 controller failed. Phase: \`${safe_phase}\`; workflow line: \`${failed_line}\`; exit: \`${rc}\`; run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID. No protected value is included."
            gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" \
              --body "Next.js 15.5.21 controller failed in phase \`${safe_phase}\`, exit \`${rc}\`. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID."
            set -e
            exit "$rc"
          }
          trap 'on_failure "$LINENO"' ERR

          gh pr edit "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" \
            --title "$canonical_title [NEXT RUNNING]"

          phase='git-sync'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch --no-tags origin main "$SECURITY_BRANCH"
          remote_security_head="$(git rev-parse "origin/$SECURITY_BRANCH")"
          [[ "$remote_security_head" =~ ^[0-9a-f]{40}$ ]]
          git reset --hard origin/main

          phase='patch-package-and-version-contract'
          node - <<'NODE'
          const fs = require('node:fs');
          const packagePath = 'apps/web/package.json';
          const testPath = 'apps/web/tests/unit/next15RuntimeContracts.test.ts';
          const manifest = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          if (manifest.dependencies?.next !== '15.5.18') {
            throw new Error(`Expected exact next 15.5.18, received ${manifest.dependencies?.next ?? '<missing>'}`);
          }
          manifest.dependencies.next = '15.5.21';
          fs.writeFileSync(packagePath, `${JSON.stringify(manifest, null, 2)}\n`);

          let test = fs.readFileSync(testPath, 'utf8');
          const oldAssertion = "expect(webPackage.dependencies?.next).toBe('15.5.18');";
          const newAssertion = "expect(webPackage.dependencies?.next).toBe('15.5.21');";
          const oldImport = "import { describe, expect, it } from 'vitest';";
          const newImport = "import { fileURLToPath } from 'node:url';\nimport { describe, expect, it } from 'vitest';";
          const oldRoot = 'const ROOT = process.cwd();';
          const newRoot = "const ROOT = path.resolve(path.dirname(fileURLToPath(import.meta.url)), '../../../..');";
          if (
            !test.includes(oldAssertion) || test.includes(newAssertion)
            || !test.includes(oldImport) || test.includes("from 'node:url'")
            || !test.includes(oldRoot) || test.includes(newRoot)
          ) {
            throw new Error('Next.js runtime contract patch anchor mismatch');
          }
          test = test
            .replace(oldImport, newImport)
            .replace(oldRoot, newRoot)
            .replace(oldAssertion, newAssertion);
          fs.writeFileSync(testPath, test);
          NODE

          phase='install-pnpm'
          npm install --global pnpm@10.2.1
          pnpm --version | grep -Fxq '10.2.1'

          phase='regenerate-lockfile'
          pnpm --filter @pc/web update next@15.5.21 --lockfile-only

          phase='validate-lockfile-and-contract'
          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('apps/web/package.json', 'utf8'));
          const test = fs.readFileSync('apps/web/tests/unit/next15RuntimeContracts.test.ts', 'utf8');
          if (manifest.dependencies?.next !== '15.5.21') throw new Error('Next.js exact pin failed');
          if (!test.includes("expect(webPackage.dependencies?.next).toBe('15.5.21');")) {
            throw new Error('Runtime version contract was not updated');
          }
          if (!test.includes("fileURLToPath(import.meta.url)")) {
            throw new Error('Runtime version contract remains cwd-dependent');
          }
          const lock = fs.readFileSync('pnpm-lock.yaml', 'utf8');
          if (!lock.includes('next@15.5.21')) throw new Error('Patched Next.js package missing from lockfile');
          NODE

          phase='validate-three-file-scope'
          expected="$({ printf '%s\n' \
            'apps/web/package.json' \
            'apps/web/tests/unit/next15RuntimeContracts.test.ts' \
            'pnpm-lock.yaml'; } | sort)"
          actual="$(git diff --name-only | sort)"
          [[ "$actual" == "$expected" ]] || {
            echo 'Unexpected dependency remediation paths:' >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 20
          }
          git diff --check

          phase='frozen-install'
          pnpm install --frozen-lockfile

          phase='web-typecheck'
          pnpm --filter @pc/web typecheck

          phase='focused-version-contract-test'
          pnpm --filter @pc/web exec vitest run \
            tests/unit/next15RuntimeContracts.test.ts \
            -t 'pins the patched Next.js line without coupling the change to React 19'

          phase='web-production-build'
          NEXT_TELEMETRY_DISABLED=1 pnpm --filter @pc/web build

          phase='production-dependency-audit'
          pnpm audit --prod --audit-level high

          phase='commit-and-scope-guard'
          git add \
            apps/web/package.json \
            apps/web/tests/unit/next15RuntimeContracts.test.ts \
            pnpm-lock.yaml
          git commit -m 'fix(security): patch Next.js to 15.5.21'
          GITHUB_HEAD_REF="$SECURITY_BRANCH" BASE_REF=origin/main HEAD_REF=HEAD \
            bash scripts/p7-autopilot-guard.sh

          phase='publish-security-branch'
          git push \
            --force-with-lease="refs/heads/${SECURITY_BRANCH}:${remote_security_head}" \
            origin "HEAD:refs/heads/${SECURITY_BRANCH}"
          head_sha="$(git rev-parse HEAD)"

          gh pr edit "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" --title "$canonical_title"
          gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" \
            --body "Next.js security remediation branch rebuilt from exact current main and published. Head: \`${head_sha}\`; replaced remote head: \`${remote_security_head}\`; exact diff: package, lockfile and cwd-independent version-contract test; target: \`next@15.5.21\`; exact version assertion, frozen install, typecheck, production build and HIGH audit passed. Full web and repository suites remain mandatory on the security PR; no exception or allowlist."
          gh pr comment "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" \
            --body "Next.js 15.5.21 clean security branch published at \`${head_sha}\`. The isolated three-file security PR remains subject to the standard CI matrix."

          {
            echo '## Next.js 15.5.21 remediation branch'
            echo
            echo "- previous remote head: \`$remote_security_head\`"
            echo "- clean head: \`$head_sha\`"
            echo '- changed paths: package, lockfile, cwd-independent version-contract test'
            echo '- exact version contract/typecheck/build/audit: PASS'
            echo '- full suite authority: security PR checks'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record terminal controller result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
        shell: bash
        run: |
          gh issue comment 3043 --repo "$GITHUB_REPOSITORY" \
            --body "Standalone Next.js 15.5.21 controller v9 run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — result: \`${RESULT}\`."
