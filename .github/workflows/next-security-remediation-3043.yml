name: Next.js 15.5.21 Security Remediation Controller

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: next-security-remediation-3043
  cancel-in-progress: false

jobs:
  remediate:
    if: >-
      github.event.issue.pull_request != null &&
      github.event.issue.number == 3075 &&
      github.event.comment.author_association == 'OWNER' &&
      github.event.comment.body == '/security patch-next 3043 15.5.21-v4'
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - name: Checkout dedicated security branch
        uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-next-15-5-16-final
          fetch-depth: 0

      - name: Patch, verify and publish exact dependency remediation
        env:
          GH_TOKEN: ${{ github.token }}
          SECURITY_BRANCH: agent/ir-sec-next-15-5-16-final
          RELEASE_PR: '3075'
          TRACKING_ISSUE: '3043'
        shell: bash
        run: |
          set -euo pipefail
          phase='initialization'
          canonical_title='Add REG.RU full-stack exact-SHA release authority'

          on_failure() {
            rc=$?
            trap - ERR
            failed_line="$1"
            safe_phase="$(printf '%s' "$phase" | tr -cd 'A-Za-z0-9._:-' | cut -c1-80)"
            set +e
            gh pr edit "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" \
              --title "$canonical_title [NEXT FAIL: ${safe_phase}:${rc}]"
            gh pr comment "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" \
              --body "Next.js 15.5.21 controller failed. Phase: \`${safe_phase}\`; workflow line: \`${failed_line}\`; exit: \`${rc}\`; run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID. No protected value is included."
            gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" \
              --body "Next.js 15.5.21 controller failed in phase \`${safe_phase}\`, exit \`${rc}\`. Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID."
            set -e
            exit "$rc"
          }
          trap 'on_failure "$LINENO"' ERR

          write_test_diagnostic() {
            local source_log="$1"
            local current_body="$RUNNER_TEMP/release-pr-current.md"
            local next_body="$RUNNER_TEMP/release-pr-next.md"
            local summary="$RUNNER_TEMP/web-test-failure-summary.txt"

            sed -E $'s/\x1B\[[0-9;]*[mK]//g' "$source_log" \
              | grep -E 'FAIL|AssertionError|Error:|expected|received|Test Files|Tests|❯|×' \
              | tail -n 120 \
              | head -c 6000 > "$summary" || true
            [[ -s "$summary" ]] || tail -n 80 "$source_log" | head -c 6000 > "$summary"
            gh pr view "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" --json body --jq .body > "$current_body"

            python3 - "$current_body" "$summary" "$next_body" <<'PY'
          import sys
          from pathlib import Path

          current_path, summary_path, output_path = map(Path, sys.argv[1:])
          body = current_path.read_text()
          summary = summary_path.read_text(errors='replace').replace('```', "'''").strip()
          start = '<!-- NEXT_WEB_TEST_DIAGNOSTIC_START -->'
          end = '<!-- NEXT_WEB_TEST_DIAGNOSTIC_END -->'
          if start in body and end in body:
              prefix, remainder = body.split(start, 1)
              _, suffix = remainder.split(end, 1)
              body = f'{prefix.rstrip()}\n{suffix.lstrip()}'
          block = f'''{start}
          ## Next.js security web-test diagnostic

          ```text
          {summary}
          ```

          {end}'''
          output_path.write_text(f'{body.rstrip()}\n\n{block}\n')
          PY
            gh pr edit "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" --body-file "$next_body"
          }

          gh pr edit "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" \
            --title "$canonical_title [NEXT RUNNING]"

          phase='git-sync'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch --no-tags origin main
          git reset --hard origin/main

          phase='patch-package-and-version-contract'
          node - <<'NODE'
          const fs = require('node:fs');
          const packagePath = 'apps/web/package.json';
          const testPath = 'apps/web/tests/unit/next15RuntimeContracts.test.ts';
          const manifest = JSON.parse(fs.readFileSync(packagePath, 'utf8'));
          if (manifest.dependencies?.next !== '15.5.18') {
            throw new Error(`Expected exact next 15.5.18, received ${manifest.dependencies?.next ?? '<missing>'}`);
          }
          manifest.dependencies.next = '15.5.21';
          fs.writeFileSync(packagePath, `${JSON.stringify(manifest, null, 2)}\n`);

          const test = fs.readFileSync(testPath, 'utf8');
          const oldAssertion = "expect(webPackage.dependencies?.next).toBe('15.5.18');";
          const newAssertion = "expect(webPackage.dependencies?.next).toBe('15.5.21');";
          if (!test.includes(oldAssertion) || test.includes(newAssertion)) {
            throw new Error('Next.js runtime contract assertion anchor mismatch');
          }
          fs.writeFileSync(testPath, test.replace(oldAssertion, newAssertion));
          NODE

          phase='install-pnpm'
          npm install --global pnpm@10.2.1
          pnpm --version | grep -Fxq '10.2.1'

          phase='regenerate-lockfile'
          pnpm --filter @pc/web update next@15.5.21 --lockfile-only

          phase='validate-lockfile-and-contract'
          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('apps/web/package.json', 'utf8'));
          const test = fs.readFileSync('apps/web/tests/unit/next15RuntimeContracts.test.ts', 'utf8');
          if (manifest.dependencies?.next !== '15.5.21') throw new Error('Next.js exact pin failed');
          if (!test.includes("expect(webPackage.dependencies?.next).toBe('15.5.21');")) {
            throw new Error('Runtime version contract was not updated');
          }
          const lock = fs.readFileSync('pnpm-lock.yaml', 'utf8');
          if (!lock.includes('next@15.5.21')) throw new Error('Patched Next.js package missing from lockfile');
          NODE

          phase='validate-three-file-scope'
          expected="$({ printf '%s\n' \
            'apps/web/package.json' \
            'apps/web/tests/unit/next15RuntimeContracts.test.ts' \
            'pnpm-lock.yaml'; } | sort)"
          actual="$(git diff --name-only | sort)"
          [[ "$actual" == "$expected" ]] || {
            echo 'Unexpected dependency remediation paths:' >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 20
          }
          git diff --check

          phase='frozen-install'
          pnpm install --frozen-lockfile

          phase='web-typecheck'
          pnpm --filter @pc/web typecheck

          phase='web-tests'
          test_log="$RUNNER_TEMP/web-tests.log"
          set +e
          pnpm --filter @pc/web test 2>&1 | tee "$test_log"
          test_rc=${PIPESTATUS[0]}
          set -e
          if (( test_rc != 0 )); then
            write_test_diagnostic "$test_log"
            exit "$test_rc"
          fi

          phase='web-production-build'
          NEXT_TELEMETRY_DISABLED=1 pnpm --filter @pc/web build

          phase='production-dependency-audit'
          pnpm audit --prod --audit-level high

          phase='commit-and-scope-guard'
          git add \
            apps/web/package.json \
            apps/web/tests/unit/next15RuntimeContracts.test.ts \
            pnpm-lock.yaml
          git commit -m 'fix(security): patch Next.js to 15.5.21'
          GITHUB_HEAD_REF="$SECURITY_BRANCH" BASE_REF=origin/main HEAD_REF=HEAD \
            bash scripts/p7-autopilot-guard.sh

          phase='publish-security-branch'
          git push origin "HEAD:$SECURITY_BRANCH"
          head_sha="$(git rev-parse HEAD)"

          gh pr edit "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" --title "$canonical_title"
          gh issue comment "$TRACKING_ISSUE" --repo "$GITHUB_REPOSITORY" \
            --body "Next.js security remediation published. Head: \`${head_sha}\`; exact diff: package, lockfile and the version-contract unit test; target: \`next@15.5.21\`; frozen install, web typecheck/tests/build and production HIGH audit passed; no exception or allowlist."
          gh pr comment "$RELEASE_PR" --repo "$GITHUB_REPOSITORY" \
            --body "Next.js 15.5.21 security branch published at \`${head_sha}\`. Opening the isolated three-file security PR next."

          {
            echo '## Next.js 15.5.21 remediation'
            echo
            echo "- head: \`$head_sha\`"
            echo '- changed paths: package, lockfile, version-contract test'
            echo '- frozen install: PASS'
            echo '- web typecheck/tests/build: PASS'
            echo '- production high/critical audit: PASS'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Record terminal controller result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
        shell: bash
        run: |
          gh issue comment 3043 --repo "$GITHUB_REPOSITORY" \
            --body "Standalone Next.js 15.5.21 controller v4 run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID — result: \`${RESULT}\`."
