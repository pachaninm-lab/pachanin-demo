name: archive-quality-gates

on:
  workflow_dispatch:
  push:
    branches: [ main, hardening, integration, pilot ]
  pull_request:
    branches: [ main ]

jobs:
  archive-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run archive local gates
        run: node ./scripts/run-archive-local-gates.mjs
      - name: Upload archive gate report
        uses: actions/upload-artifact@v4
        with:
          name: archive-local-gates
          path: |
            var/archive-local-gates-report.json
            var/preintegration-green-report.json
            var/canonical-bridge-audit.json
            var/weak-connectivity-audit.json
