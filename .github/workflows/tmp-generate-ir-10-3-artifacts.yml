name: one-shot IR-10.3 artifact generation

on:
  push:
    branches:
      - agent/ir-10-3-labs-authority-v3

permissions:
  contents: write

jobs:
  generate:
    if: ${{ !contains(github.event.head_commit.message, '[labs-artifacts-generated]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-3-labs-authority-v3
          fetch-depth: 0
      - name: Generate schema, migration, policies and isolated seed basis
        env:
          LAB_SCHEMA_GZ_B64: 
          LAB_MIGRATION_GZ_B64: 
          LAB_POLICIES_GZ_B64: 
          LAB_SEED_GZ_B64: 
        run: |
          python - <<'PY'
          import base64, gzip, os
          from pathlib import Path

          def unpack(name: str) -> str:
              return gzip.decompress(base64.b64decode(os.environ[name])).decode('utf-8')

          schema_path = Path('apps/api/prisma/schema.prisma')
          schema = schema_path.read_text()
          start = schema.index('// ── Lab Samples')
          end = schema.index('// ── Outbox', start)
          schema_path.write_text(schema[:start] + unpack('LAB_SCHEMA_GZ_B64') + schema[end:])

          migration = Path('apps/api/prisma/migrations/20260713110000_labs_postgresql_authority/migration.sql')
          migration.parent.mkdir(parents=True, exist_ok=True)
          migration.write_text(unpack('LAB_MIGRATION_GZ_B64'))
          Path('infra/sql/postgresql-labs-authority-policies.sql').write_text(unpack('LAB_POLICIES_GZ_B64'))

          script_path = Path('scripts/platform-v7-one-deal-e2e.sh')
          script = script_path.read_text()
          logistics_overlay = '''echo "[one-deal] applying PostgreSQL logistics-authority RLS overlay"
          psql "$ADMIN_URL" -X --set ON_ERROR_STOP=1 --file infra/sql/postgresql-logistics-authority-policies.sql
          '''
          labs_overlay = logistics_overlay + '''
          echo "[one-deal] applying PostgreSQL labs-authority RLS overlay"
          psql "$ADMIN_URL" -X --set ON_ERROR_STOP=1 --file infra/sql/postgresql-labs-authority-policies.sql
          '''
          if 'postgresql-labs-authority-policies.sql' not in script:
              script = script.replace(logistics_overlay, labs_overlay)
          script = script.replace(
              'GRANT USAGE ON SCHEMA public, security, logistics TO one_deal_app;',
              'GRANT USAGE ON SCHEMA public, security, logistics, labs TO one_deal_app;',
          )
          script_path.write_text(script)

          seed_path = Path('apps/api/test/one-deal/seed.ts')
          seed = seed_path.read_text()
          if 'seedNormalizedLabAuthority' not in seed:
              seed = seed.replace('async function main(): Promise<void> {', unpack('LAB_SEED_GZ_B64') + '\nasync function main(): Promise<void> {')
              seed = seed.replace(
                  '    await seedNormalizedLogisticsAdmission(prisma);',
                  '    await seedNormalizedLogisticsAdmission(prisma);\n    await seedNormalizedLabAuthority(prisma);',
              )
          seed_path.write_text(seed)

          Path('.github/workflows/tmp-generate-ir-10-3-artifacts.yml').unlink()
          PY
      - name: Commit generated artifacts to feature branch
        run: |
          git config user.name "platform-v7-industrial-bot"
          git config user.email "platform-v7-industrial-bot@users.noreply.github.com"
          git add apps/api/prisma/schema.prisma \
                  apps/api/prisma/migrations/20260713110000_labs_postgresql_authority/migration.sql \
                  infra/sql/postgresql-labs-authority-policies.sql \
                  scripts/platform-v7-one-deal-e2e.sh \
                  apps/api/test/one-deal/seed.ts \
                  .github/workflows/tmp-generate-ir-10-3-artifacts.yml
          git commit -m "feat(labs): generate PostgreSQL authority artifacts [labs-artifacts-generated]"
          git push origin HEAD:agent/ir-10-3-labs-authority-v3
