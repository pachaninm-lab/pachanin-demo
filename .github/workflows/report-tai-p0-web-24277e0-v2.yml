name: Report TAI P0 web 24277e0 v2 rollout result

on:
  workflow_run:
    workflows:
      - Deploy TAI P0 web 24277e0 v2 to canonical VPS
    types:
      - completed

permissions:
  actions: read
  issues: write

jobs:
  report:
    name: Publish auditable VPS rollout result
    if: >-
      github.event.workflow_run.event != 'pull_request' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Publish result to PR 2960
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          RUN_CONCLUSION: ${{ github.event.workflow_run.conclusion }}
          RUN_HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail
          body="## VPS deployment v2 result

- workflow run: ${RUN_URL};
- workflow run id: \`${RUN_ID}\`;
- release authority head: \`${RUN_HEAD_SHA}\`;
- exact target: \`24277e008d25f66f52b56284ff83ca3eead39fb2\`;
- exact image: \`ghcr.io/pachaninm-lab/grainflow-web:sha-24277e0\`;
- result: \`${RUN_CONCLUSION}\`;
- TAI operational status: \`NOT_ATTESTED\`."
          gh api --method POST "repos/$REPOSITORY/issues/2960/comments" -f body="$body"
