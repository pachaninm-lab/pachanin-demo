name: API Tests

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'apps/api/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: api-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: API unit tests + TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: API typecheck
        run: pnpm --filter @pc/api typecheck
      - name: API unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api test 2>&1 | tee /tmp/api-unit-test.log
      - name: Upload API unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-unit-test-log
          path: /tmp/api-unit-test.log
          if-no-files-found: ignore
