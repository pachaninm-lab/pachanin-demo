name: API Tests

on:
  push:
    branches: [main, 'claude/**', 'industrial-one-deal-*']
    paths:
      - 'apps/api/**'
      - 'shared/**'
      - 'infra/sql/production-rls-policies.sql'
      - 'scripts/platform-v7-rls-*'
      - 'scripts/platform-v7-one-deal-*'
      - '.github/workflows/api-test.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    paths:
      - 'apps/api/**'
      - 'shared/**'
      - 'infra/sql/production-rls-policies.sql'
      - 'scripts/platform-v7-rls-*'
      - 'scripts/platform-v7-one-deal-*'
      - '.github/workflows/api-test.yml'
      - 'package.json'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: api-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    name: API unit tests + TypeScript check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: API typecheck
        run: pnpm --filter @pc/api typecheck
      - name: API unit tests
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/api test 2>&1 | tee /tmp/api-unit-test.log
      - name: Upload API unit test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-unit-test-log
          path: /tmp/api-unit-test.log
          if-no-files-found: ignore

  rls-integration:
    name: PostgreSQL 16 RLS tenant isolation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rls_admin
          POSTGRES_PASSWORD: ephemeral_rls_admin_only
          POSTGRES_DB: rls_integration
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U rls_admin -d rls_integration"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      RLS_INTEGRATION_ADMIN_URL: postgresql://rls_admin:ephemeral_rls_admin_only@127.0.0.1:${{ job.services.postgres.ports[5432] }}/rls_integration
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Run RLS gate
        shell: bash
        run: |
          set -o pipefail
          if [[ -f scripts/platform-v7-rls-integration.sh ]]; then
            bash scripts/platform-v7-rls-integration.sh 2>&1 | tee /tmp/platform-v7-rls-integration.log
          else
            node scripts/platform-v7-rls-validate.mjs 2>&1 | tee /tmp/platform-v7-rls-integration.log
          fi
      - name: Upload RLS gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-rls-integration-log
          path: /tmp/platform-v7-rls-integration.log
          if-no-files-found: error
          retention-days: 7

  one-deal-e2e:
    name: 12 roles · 19 commands · PostgreSQL RLS
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: one_deal_admin
          POSTGRES_PASSWORD: ephemeral_one_deal_admin_only
          POSTGRES_DB: one_deal_e2e
        ports:
          - 5432/tcp
        options: >-
          --health-cmd "pg_isready -U one_deal_admin -d one_deal_e2e"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      NODE_ENV: test
      ONE_DEAL_ADMIN_URL: postgresql://one_deal_admin:ephemeral_one_deal_admin_only@127.0.0.1:${{ job.services.postgres.ports[5432] }}/one_deal_e2e
      ONE_DEAL_APP_URL: postgresql://one_deal_app:ephemeral_one_deal_app_only@127.0.0.1:${{ job.services.postgres.ports[5432] }}/one_deal_e2e
      ONE_DEAL_EVIDENCE_LOG: /tmp/platform-v7-one-deal-e2e.log
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends postgresql-client
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Generate ephemeral signing secrets
        shell: bash
        run: |
          echo "JWT_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
          echo "BANK_HMAC_SECRET=$(openssl rand -hex 48)" >> "$GITHUB_ENV"
      - name: Run industrial one-deal exploitation gate
        shell: bash
        run: bash scripts/platform-v7-one-deal-e2e.sh
      - name: Upload one-deal evidence log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-one-deal-e2e-evidence
          path: /tmp/platform-v7-one-deal-e2e.log
          if-no-files-found: error
          retention-days: 14
