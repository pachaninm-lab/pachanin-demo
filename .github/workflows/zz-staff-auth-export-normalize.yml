name: normalize staff auth provider export

on:
  push:
    branches:
      - security/staff-access-control-plane-foundation

permissions:
  contents: write

jobs:
  normalize-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/staff-access-control-plane-foundation
          fetch-depth: 0
      - name: Normalize exports and self-remove
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import re
          from pathlib import Path
          path = Path('apps/api/src/modules/auth/auth.module.ts')
          text = path.read_text()
          match = re.search(r'exports\s*:\s*\[([^\]]*)\]', text, re.S)
          if not match:
              raise SystemExit('AuthModule exports array not found')
          names = []
          for token in match.group(1).replace('\n', ' ').split(','):
              name = token.strip()
              if name and name not in names:
                  names.append(name)
          if 'AuthPrismaService' not in names:
              names.append('AuthPrismaService')
          replacement = 'exports: [' + ', '.join(names) + ']'
          text = text[:match.start()] + replacement + text[match.end():]
          path.write_text(text)
          PY
          git rm .github/workflows/zz-staff-auth-export-normalize.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/modules/auth/auth.module.ts
          git add -u
          git commit -m 'Normalize AuthModule staff provider export'
          git push origin HEAD:security/staff-access-control-plane-foundation
