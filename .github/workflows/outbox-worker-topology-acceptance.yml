name: Outbox Worker Topology Acceptance

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'infra/docker/Dockerfile.outbox-worker'
      - 'infra/docker/runtime-inventory.json'
      - 'infra/helm/grainflow/**'
      - 'scripts/security/validate-runtime-contexts.mjs'
      - '.github/workflows/outbox-worker-topology-acceptance.yml'
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'infra/docker/Dockerfile.outbox-worker'
      - 'infra/docker/runtime-inventory.json'
      - 'infra/helm/grainflow/**'
      - 'scripts/security/validate-runtime-contexts.mjs'
      - '.github/workflows/outbox-worker-topology-acceptance.yml'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: outbox-worker-topology-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  EXACT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
  EVIDENCE_DIR: artifacts/worker-topology
  PSQL_ADMIN_URL: postgresql://postgres@localhost:5432/grainflow
  TEST_ADMIN_DATABASE_URL: postgresql://postgres@localhost:5432/grainflow?schema=public
  OUTBOX_DATABASE_URL: postgresql://app_outbox@localhost:5432/grainflow?schema=public
  KAFKA_BROKERS: localhost:9092

jobs:
  process-lifecycle:
    name: Two worker processes · PostgreSQL 16 · Kafka · recovery
    runs-on: ubuntu-latest
    timeout-minutes: 45
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: grainflow
          POSTGRES_USER: postgres
          POSTGRES_HOST_AUTH_METHOD: trust
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d grainflow"
          --health-interval 5s --health-timeout 5s --health-retries 20
      kafka:
        image: confluentinc/cp-kafka:7.6.0
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
          KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'false'
          CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
        ports: ['9092:9092']
        options: >-
          --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"
          --health-interval 10s --health-timeout 5s --health-retries 20 --health-start-period 30s

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_HEAD }}
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: '10.2.1'
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Initialize exact-head evidence
        run: |
          mkdir -p "$EVIDENCE_DIR"
          test "$(git rev-parse HEAD)" = "$EXACT_HEAD"
          git rev-parse HEAD > "$EVIDENCE_DIR/checked-out-head.txt"

      - name: Install and provision least-privilege principal
        run: |
          pnpm install --frozen-lockfile
          psql "$PSQL_ADMIN_URL" -v ON_ERROR_STOP=1 <<'SQL'
          DO $role$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'app_outbox') THEN
              CREATE ROLE app_outbox LOGIN NOINHERIT NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE NOREPLICATION;
            END IF;
          END
          $role$;
          GRANT CONNECT ON DATABASE grainflow TO app_outbox;
          GRANT USAGE ON SCHEMA public TO app_outbox;
          SQL

      - name: Migrate, typecheck and build worker
        env:
          DATABASE_URL: ${{ env.TEST_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec prisma generate
          pnpm --filter @pc/api exec prisma migrate deploy 2>&1 | tee "$EVIDENCE_DIR/migrate-deploy.log"
          pnpm --filter @pc/api exec prisma migrate status 2>&1 | tee "$EVIDENCE_DIR/migrate-status.log"
          pnpm --filter @pc/api typecheck 2>&1 | tee "$EVIDENCE_DIR/typecheck.log"
          pnpm --filter @pc/api build:outbox-worker 2>&1 | tee "$EVIDENCE_DIR/build.log"
          test -s apps/api/dist-outbox-worker/outbox-worker.js

      - name: Run worker unit contracts
        id: unit-contracts
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec jest \
            src/common/kafka/kafka-producer.service.spec.ts \
            src/modules/integration-events/durable-outbox.runner.spec.ts \
            --runInBand --json \
            --outputFile="$GITHUB_WORKSPACE/$EVIDENCE_DIR/unit-jest.json" \
            2>&1 | tee "$EVIDENCE_DIR/unit-jest.log"

      - name: Run PostgreSQL lease and two-process Kafka acceptance
        id: lifecycle
        if: always()
        continue-on-error: true
        run: |
          set -o pipefail
          DATABASE_URL="$TEST_ADMIN_DATABASE_URL" \
            pnpm --filter @pc/api exec jest --config test/industrial/jest.config.json \
              test/industrial/durable-outbox.e2e-spec.ts --runInBand --json \
              --outputFile="$GITHUB_WORKSPACE/$EVIDENCE_DIR/lease-jest.json" \
              2>&1 | tee "$EVIDENCE_DIR/lease-jest.log"
          OUTBOX_DATABASE_URL="$OUTBOX_DATABASE_URL" \
          TEST_ADMIN_DATABASE_URL="$TEST_ADMIN_DATABASE_URL" \
          KAFKA_BROKERS="$KAFKA_BROKERS" \
            pnpm --filter @pc/api exec jest --config test/industrial/jest.config.json \
              test/industrial/outbox-worker-process.e2e-spec.ts --runInBand --json \
              --outputFile="$GITHUB_WORKSPACE/$EVIDENCE_DIR/process-jest.json" \
              2>&1 | tee "$EVIDENCE_DIR/process-jest.log"

      - name: Write lifecycle evidence
        if: always()
        env:
          UNIT_OUTCOME: ${{ steps.unit-contracts.outcome }}
          LIFECYCLE_OUTCOME: ${{ steps.lifecycle.outcome }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const dir = process.env.EVIDENCE_DIR;
          const readJson = (name) => {
            const file = path.join(dir, name);
            return fs.existsSync(file) ? JSON.parse(fs.readFileSync(file, 'utf8')) : null;
          };
          const unit = readJson('unit-jest.json');
          const lease = readJson('lease-jest.json');
          const processResult = readJson('process-jest.json');
          const pass = process.env.UNIT_OUTCOME === 'success'
            && process.env.LIFECYCLE_OUTCOME === 'success'
            && unit?.success === true
            && lease?.success === true
            && processResult?.success === true;
          const report = {
            schemaVersion: 1,
            repository: process.env.GITHUB_REPOSITORY,
            commitSha: process.env.EXACT_HEAD,
            environment: 'github-actions-postgresql16-single-kafka-process-topology',
            timestamp: new Date().toISOString(),
            pass,
            outcomes: {
              unit: process.env.UNIT_OUTCOME,
              lifecycle: process.env.LIFECYCLE_OUTCOME,
              unitJest: unit?.success ?? null,
              leaseJest: lease?.success ?? null,
              processJest: processResult?.success ?? null,
            },
            thresholds: { replicaCount: 2, deliveredEntries: 40, duplicateBusinessEffects: 0, lostEvents: 0, workerDealPrivileges: 0 },
            maturityBoundary: 'Two local worker OS processes with app_outbox, PostgreSQL 16 and single-node Kafka; not Kubernetes HA, database HA or operational soak.'
          };
          fs.writeFileSync(`${dir}/outbox-worker-acceptance.json`, `${JSON.stringify(report, null, 2)}\n`);
          NODE

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outbox-worker-process-${{ env.EXACT_HEAD }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 90

      - name: Enforce lifecycle acceptance
        if: always()
        run: |
          test "${{ steps.unit-contracts.outcome }}" = success
          test "${{ steps.lifecycle.outcome }}" = success

  image-and-iac:
    name: Worker image · immutable Helm · container and IaC security
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_HEAD }}
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Validate runtime and build worker image
        run: |
          mkdir -p "$EVIDENCE_DIR/iac-scope"
          test "$(git rev-parse HEAD)" = "$EXACT_HEAD"
          RUNTIME_CONTEXT_EXACT_HEAD="$EXACT_HEAD" RUNTIME_CONTEXT_REPORT="$EVIDENCE_DIR/runtime-context-validation.json" \
            node scripts/security/validate-runtime-contexts.mjs
          docker build \
            --build-arg GIT_COMMIT="$EXACT_HEAD" \
            --build-arg BUILD_DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -f infra/docker/Dockerfile.outbox-worker \
            -t prozrachnaya-cena-outbox-worker:runtime-${EXACT_HEAD} . \
            2>&1 | tee "$EVIDENCE_DIR/docker-build.log"
          docker image inspect --format='{{.Id}}' prozrachnaya-cena-outbox-worker:runtime-${EXACT_HEAD} > "$EVIDENCE_DIR/worker-image-digest.txt"
          docker image inspect --format='{{.Config.User}}' prozrachnaya-cena-outbox-worker:runtime-${EXACT_HEAD} > "$EVIDENCE_DIR/worker-image-user.txt"
          docker image inspect --format='{{index .Config.Labels "org.opencontainers.image.revision"}}' prozrachnaya-cena-outbox-worker:runtime-${EXACT_HEAD} > "$EVIDENCE_DIR/worker-image-revision.txt"
          test "$(cat "$EVIDENCE_DIR/worker-image-user.txt")" = nonroot
          test "$(cat "$EVIDENCE_DIR/worker-image-revision.txt")" = "$EXACT_HEAD"

      - name: Render standalone worker acceptance
        run: |
          set -euo pipefail
          helm lint infra/helm/grainflow | tee "$EVIDENCE_DIR/helm-lint.txt"
          digest="$(cat "$EVIDENCE_DIR/worker-image-digest.txt")"
          manifest_id="sha256:$(printf 'worker-topology:%s' "$EXACT_HEAD" | sha256sum | cut -d' ' -f1)"
          migration_set="sha256:$(find apps/api/prisma -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1)"
          helm template grainflow infra/helm/grainflow \
            --set outboxWorker.enabled=true \
            --set-string outboxWorker.image.digest="$digest" \
            --set-string release.sourceCommit="$EXACT_HEAD" \
            --set-string release.manifestId="$manifest_id" \
            --set-string release.migrationSetDigest="$migration_set" \
            > "$EVIDENCE_DIR/worker-rendered.yaml"
          grep -F "cr.yandex/grainflow/outbox-worker@$digest" "$EVIDENCE_DIR/worker-rendered.yaml"
          grep -F 'replicas: 2' "$EVIDENCE_DIR/worker-rendered.yaml"
          grep -F 'maxUnavailable: 0' "$EVIDENCE_DIR/worker-rendered.yaml"
          grep -F 'requiredDuringSchedulingIgnoredDuringExecution:' "$EVIDENCE_DIR/worker-rendered.yaml"

      - name: Scan worker image
        id: worker-trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: prozrachnaya-cena-outbox-worker:runtime-${{ env.EXACT_HEAD }}
          format: json
          output: artifacts/worker-topology/trivy-worker-container.json
          severity: CRITICAL,HIGH
          ignore-unfixed: false
          exit-code: '0'

      - name: Enforce worker image findings
        env:
          SECURITY_EXACT_HEAD: ${{ env.EXACT_HEAD }}
          TRIVY_SCANNER: trivy-outbox-worker-container
          TRIVY_SCAN_RESULT: ${{ steps.worker-trivy.outcome }}
          TRIVY_REPORT_JSON: ${{ env.EVIDENCE_DIR }}/trivy-worker-container.json
          TRIVY_EVALUATION_REPORT: ${{ env.EVIDENCE_DIR }}/trivy-worker-container-evaluation.json
        run: node docs/platform-v7/autopilot/evaluate-trivy-report.mjs

      - name: Scan worker IaC
        run: |
          cp infra/docker/Dockerfile.outbox-worker "$EVIDENCE_DIR/iac-scope/Dockerfile.outbox-worker"
          cp "$EVIDENCE_DIR/worker-rendered.yaml" "$EVIDENCE_DIR/iac-scope/worker-rendered.yaml"

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: artifacts/worker-topology/iac-scope
          format: sarif
          output: artifacts/worker-topology/trivy-worker-iac.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'
          limit-severities-for-sarif: true

      - name: Upload worker IaC SARIF
        if: always() && hashFiles('artifacts/worker-topology/trivy-worker-iac.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ env.EVIDENCE_DIR }}/trivy-worker-iac.sarif
          category: outbox-worker-iac-blocking

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: outbox-worker-image-${{ env.EXACT_HEAD }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 90

  topology-gate:
    name: Outbox Worker Topology Gate · all blocking checks
    if: always()
    runs-on: ubuntu-latest
    needs: [process-lifecycle, image-and-iac]
    steps:
      - run: |
          test "${{ needs.process-lifecycle.result }}" = success
          test "${{ needs.image-and-iac.result }}" = success
