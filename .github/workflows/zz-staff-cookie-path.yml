name: correct staff session cookie path

on:
  push:
    branches:
      - ui/staff-control-center

permissions:
  contents: write

jobs:
  patch-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/staff-control-center
          fetch-depth: 0
      - name: Scope HttpOnly sessions to BFF routes and self-remove
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/lib/server/staff/staff-api-channel-proxy.ts')
          text = path.read_text()
          text = text.replace("path: '/platform-v7/staff'", "path: '/api/staff'")
          if "path: '/platform-v7/staff'" in text:
              raise SystemExit('old cookie path remains')
          if text.count("path: '/api/staff'") < 2:
              raise SystemExit('expected both set and clear cookie paths')
          path.write_text(text)
          PY
          git rm .github/workflows/zz-staff-cookie-path.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/lib/server/staff/staff-api-channel-proxy.ts
          git add -u
          git commit -m 'Scope staff session cookies to BFF routes'
          git push origin HEAD:ui/staff-control-center
