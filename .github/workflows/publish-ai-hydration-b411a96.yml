name: Publish AI hydration fix b411a96

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/publish-ai-hydration-b411a96.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  TARGET_SHA: b411a960cc259919e701704bfa652bd06d33c7d8
  IMAGE: ghcr.io/pachaninm-lab/grainflow-web:sha-b411a96

jobs:
  publish-and-browser-verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - name: Checkout exact accepted main source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_SHA }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish exact linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE }}
          build-args: |
            BUILD_DATE=${{ github.event.pull_request.updated_at || github.event.repository.updated_at }}
            GIT_COMMIT=${{ env.TARGET_SHA }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Verify immutable image metadata
        shell: bash
        run: |
          set -euo pipefail
          docker pull --platform linux/amd64 "$IMAGE"
          revision="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$IMAGE")"
          architecture="$(docker image inspect --format '{{ .Architecture }}' "$IMAGE")"
          echo "revision=$revision"
          echo "architecture=$architecture"
          test "$revision" = "$TARGET_SHA"
          test "$architecture" = amd64

      - name: Start the exact image locally
        shell: bash
        run: |
          set -euo pipefail
          docker run -d --name ai-hydration-verification \
            -p 3000:3000 \
            -e NODE_ENV=production \
            -e PORT=3000 \
            "$IMAGE"

          for attempt in $(seq 1 60); do
            if curl -fsS --max-time 5 'http://127.0.0.1:3000/platform-v7/ai-in-action?lang=ru' >/tmp/ai-route-ssr.html; then
              echo "Next.js ready on attempt $attempt."
              exit 0
            fi
            state="$(docker inspect --format '{{.State.Status}}' ai-hydration-verification 2>/dev/null || true)"
            echo "attempt=$attempt state=${state:-missing}"
            sleep 2
          done
          docker logs --tail=200 ai-hydration-verification || true
          exit 1

      - name: Verify SSR and hydrated mobile Chromium DOM
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ai-hydration-evidence
          cp /tmp/ai-route-ssr.html /tmp/ai-hydration-evidence/ssr.html

          grep -Fq 'interactive-animated-ai-explainer' /tmp/ai-route-ssr.html
          grep -Fq 'platform-v7-ai-in-action-authority' /tmp/ai-route-ssr.html

          browser="$(command -v google-chrome || command -v chromium || command -v chromium-browser || true)"
          test -n "$browser"
          "$browser" --version

          url='http://127.0.0.1:3000/platform-v7/ai-in-action?lang=ru&exact=b411a96'
          "$browser" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --hide-scrollbars \
            --window-size=390,844 \
            --virtual-time-budget=12000 \
            --dump-dom \
            "$url" > /tmp/ai-hydration-evidence/hydrated.html

          "$browser" \
            --headless=new \
            --no-sandbox \
            --disable-gpu \
            --disable-dev-shm-usage \
            --hide-scrollbars \
            --window-size=390,844 \
            --virtual-time-budget=12000 \
            --screenshot=/tmp/ai-hydration-evidence/mobile.png \
            "$url"

          hydrated=/tmp/ai-hydration-evidence/hydrated.html
          grep -Fq 'interactive-animated-ai-explainer' "$hydrated"
          grep -Fq 'От события сделки' "$hydrated"
          grep -Fq 'Собирает разрешённый контекст' "$hydrated"
          grep -Fq 'Контур анализа' "$hydrated"
          if grep -Fq 'This page could not be found' "$hydrated"; then
            echo 'Client-side Next.js 404 detected after hydration.' >&2
            exit 20
          fi
          if grep -Fq '<title>404:' "$hydrated"; then
            echo 'Hydrated document title became 404.' >&2
            exit 21
          fi

          echo 'Exact image passed SSR and hydrated mobile Chromium verification.'
          sha256sum /tmp/ai-hydration-evidence/mobile.png

      - name: Upload browser evidence
        uses: actions/upload-artifact@v4
        with:
          name: ai-hydration-b411a96
          path: /tmp/ai-hydration-evidence
          if-no-files-found: error
          retention-days: 14

      - name: Print container logs
        if: always()
        shell: bash
        run: docker logs --tail=200 ai-hydration-verification || true

      - name: Stop verification container
        if: always()
        shell: bash
        run: docker rm -f ai-hydration-verification || true
