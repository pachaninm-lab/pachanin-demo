name: Bootstrap Next 15.5.21 security scope

on:
  push:
    branches: [main]
    paths: [.github/workflows/bootstrap-next-15-5-21-security-scope.yml]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: bootstrap-next-15-5-21-security-scope
  cancel-in-progress: false

jobs:
  create-prerequisite:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Materialize clean governance prerequisite branch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          branch='governance/next-15-5-21-security-hotfix-applied'
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git checkout -b "$branch"
          python3 - <<'PY'
          import json
          from pathlib import Path

          branch = 'security/next-15-5-21-hotfix'
          allowed = [
            '.github/workflows/apply-next-15-5-21-hotfix.yml',
            'apps/web/package.json',
            'docs/security/next-15-5-21-security-hotfix.md',
            'pnpm-lock.yaml'
          ]
          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(state_path.read_text())
          scopes = state.setdefault('approvedConcurrentScopes', {})
          existing = scopes.get(branch)
          if existing not in (None, allowed):
            raise SystemExit('conflicting Next security hotfix scope registration')
          scopes[branch] = allowed
          state_path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n')

          manifest = {
            'schemaVersion': 1,
            'scopeId': 'next-15-5-21-security-hotfix-v1',
            'branch': branch,
            'governanceBase': '0b1ef8d7e30a55e7ffbb00ff2daed175e3b2298d',
            'advisories': [
              'GHSA-89xv-2m56-2m9x',
              'GHSA-m99w-x7hq-7vfj',
              'GHSA-p9j2-gv94-2wf4'
            ],
            'target': {'package': 'next', 'from': '15.5.18', 'to': '15.5.21'},
            'allowedPaths': allowed,
            'acceptance': [
              'pnpm frozen-lockfile install passes',
              'production dependency audit has no unexcepted HIGH or CRITICAL finding for next',
              'web typecheck and production build pass',
              'security quality and runtime context gates pass'
            ],
            'forbidden': [
              'formal exception for the three Next.js HIGH advisories',
              'React major upgrade',
              'application feature or routing changes',
              'production deployment changes',
              'lockfile changes unrelated to the exact Next.js patch update'
            ]
          }
          manifest_path = Path('docs/platform-v7/autopilot/scopes/next-15-5-21-security-hotfix-v1.json')
          manifest_path.parent.mkdir(parents=True, exist_ok=True)
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + '\n')
          PY
          git rm .github/workflows/bootstrap-next-15-5-21-security-scope.yml
          git add -A
          git commit -m 'governance: authorize Next 15.5.21 security hotfix scope'
          git push origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title 'Authorize Next 15.5.21 security hotfix scope' \
            --body 'Governance prerequisite only. Authorizes an exact patch update from Next.js 15.5.18 to 15.5.21 for three unexcepted HIGH advisories. No implementation, product, production or broader dependency changes.'
