name: platform-v7 autopilot watchdog

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: platform-v7-autopilot-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check activity
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "## platform-v7 watchdog" >> "$GITHUB_STEP_SUMMARY"
          open_prs=$(gh pr list --repo "$REPO" --state open --label platform-v7 --label agent-generated --json number,title,updatedAt --jq 'length')
          echo "- open generated PRs: $open_prs" >> "$GITHUB_STEP_SUMMARY"
          if [ "$open_prs" = "0" ]; then
            echo "- status: no generated PR is currently open" >> "$GITHUB_STEP_SUMMARY"
          else
            gh pr list --repo "$REPO" --state open --label platform-v7 --label agent-generated --json number,title,updatedAt --jq '.[] | "- #\(.number) \(.title) updated \(.updatedAt)"' >> "$GITHUB_STEP_SUMMARY"
          fi
