name: platform-v7 autopilot watchdog

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'docs/platform-v7/autopilot/industrial-readiness-inventory.json'
      - 'docs/platform-v7/autopilot/industrial-readiness-inventory.schema.json'
      - 'docs/platform-v7/autopilot/check-industrial-readiness-inventory.mjs'
      - '.github/workflows/platform-v7-autopilot-watchdog.yml'

permissions:
  contents: read
  pull-requests: write
  issues: write
  actions: write

concurrency:
  group: platform-v7-autopilot-watchdog-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  readiness-inventory:
    name: Validate industrial readiness inventory
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate inventory and evidence paths
        env:
          INDUSTRIAL_READINESS_REPORT: artifacts/industrial-readiness/inventory-validation.json
          INDUSTRIAL_READINESS_COMMIT: ${{ github.event.pull_request.head.sha }}
        run: node docs/platform-v7/autopilot/check-industrial-readiness-inventory.mjs

      - name: Publish readiness summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'artifacts/industrial-readiness/inventory-validation.json';
          if (!fs.existsSync(path)) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Industrial readiness inventory\n\nValidation report was not produced.\n');
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          const summary = report.summary || {};
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, [
            '## Industrial readiness inventory',
            '',
            `- Valid: ${report.valid ? 'yes' : 'no'}`,
            `- Overall status: ${report.overallStatus || 'UNKNOWN'}`,
            `- Implementation verified: ${summary.IMPLEMENTED_AND_VERIFIED ?? 0}/${summary.total ?? 0}`,
            `- Implementation verified percent: ${summary.implementationVerifiedPercent ?? 0}%`,
            `- Operationally proven: ${summary.operationallyProven ?? 0}/${summary.total ?? 0}`,
            `- Unresolved P0: ${(summary.unresolvedP0 || []).length}`,
            `- Inventory baseline: ${report.inventoryBaselineCommit}`,
            `- Validated commit: ${report.validatedCommit}`,
            ''
          ].join('\n'));
          NODE

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: industrial-readiness-inventory-${{ github.event.pull_request.head.sha }}
          path: artifacts/industrial-readiness/inventory-validation.json
          if-no-files-found: error
          retention-days: 30

  watchdog:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Close stale generated PRs and report activity
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          current=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('docs/platform-v7/autopilot/autopilot-state.json','utf8')); console.log(s.current || '')")
          current_status=$(node -e "const fs=require('fs'); const s=JSON.parse(fs.readFileSync('docs/platform-v7/autopilot/autopilot-state.json','utf8')); console.log(s.currentStatus || '')")

          {
            echo "## platform-v7 watchdog"
            echo "- current step: $current"
            echo "- current status: $current_status"
          } >> "$GITHUB_STEP_SUMMARY"

          gh pr list --repo "$REPO" --state open --label platform-v7 --label agent-generated \
            --json number,title,updatedAt > /tmp/p7-watchdog-open.json

          current_slice=$(CURRENT_STEP="$current" node -e "const m=String(process.env.CURRENT_STEP||'').match(/\d+$/); process.stdout.write(m?m[0]:'')")

          open_current=$(CURRENT_SLICE="$current_slice" node -e "
            const fs=require('fs');
            const prs=JSON.parse(fs.readFileSync('/tmp/p7-watchdog-open.json','utf8'));
            const slice=Number(process.env.CURRENT_SLICE)||0;
            if(!slice){process.stdout.write(String(prs.length));process.exit(0);}
            const re=new RegExp('slice\\s+'+slice+'\\b','i');
            process.stdout.write(String(prs.filter(p=>re.test(p.title||'')).length));
          ")

          echo "- open generated PRs (current slice ${current_slice:-?}): $open_current" >> "$GITHUB_STEP_SUMMARY"

          closed_stale=0
          if [ -n "$current_slice" ]; then
            stale_numbers=$(CURRENT_SLICE="$current_slice" node -e "
              const fs=require('fs');
              const prs=JSON.parse(fs.readFileSync('/tmp/p7-watchdog-open.json','utf8'));
              const cur=Number(process.env.CURRENT_SLICE)||0;
              prs.forEach(p=>{
                const m=String(p.title||'').match(/slice\\s+(\\d+)/i);
                if(m && Number(m[1])<cur) process.stdout.write(p.number+'\\n');
              });
            " || true)
            while IFS= read -r pr_num; do
              [ -n "$pr_num" ] || continue
              echo "Closing stale generated PR #$pr_num (behind current Slice $current_slice)"
              gh pr close "$pr_num" --repo "$REPO" \
                --comment "watchdog: closing stale generated PR — current automation is at Slice $current_slice." || true
              closed_stale=$((closed_stale + 1))
            done <<< "$stale_numbers"
          fi
          echo "- stale generated PRs closed: $closed_stale" >> "$GITHUB_STEP_SUMMARY"

          if [ "$current_status" = "ready" ] && [ "$open_current" = "0" ]; then
            echo "Watchdog: SOT ready but no open generated PR for current slice. Dispatching recovery."
            gh workflow run platform-v7-agent-runner.yml --repo "$REPO" -f command=run-current || true
            echo "- recovery: agent runner dispatched" >> "$GITHUB_STEP_SUMMARY"
          fi

          if [ "$open_current" != "0" ]; then
            node -e "
              const fs=require('fs');
              const prs=JSON.parse(fs.readFileSync('/tmp/p7-watchdog-open.json','utf8'));
              const slice=Number('${current_slice:-0}')||0;
              const re=slice?new RegExp('slice\\s+'+slice+'\\b','i'):null;
              prs.filter(p=>!re||re.test(p.title||'')).forEach(p=>{
                process.stdout.write('- #'+p.number+' '+p.title+' updated '+p.updatedAt+'\\n');
              });
            " >> "$GITHUB_STEP_SUMMARY" || true
          fi
