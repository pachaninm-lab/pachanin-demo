name: Publish mobile AI polish release 8dea01e

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/release-triggers/mobile-ai-polish-8dea01e.md'

permissions:
  contents: read
  packages: write

env:
  TARGET_SHA: 8dea01e04574517d02654c2b9fb51e0e79c7c879
  IMAGE: ghcr.io/pachaninm-lab/grainflow-web
  IMMUTABLE_TAG: sha-8dea01e0457

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 50
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 8dea01e04574517d02654c2b9fb51e0e79c7c879
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: pachaninm-lab
          password: ${{ github.token }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/pachaninm-lab/grainflow-web:latest
            ghcr.io/pachaninm-lab/grainflow-web:sha-8dea01e0457
          build-args: |
            GIT_COMMIT=8dea01e04574517d02654c2b9fb51e0e79c7c879
      - name: Verify immutable registry image
        run: |
          docker pull "${IMAGE}:${IMMUTABLE_TAG}"
          ACTUAL_SHA="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "${IMAGE}:${IMMUTABLE_TAG}")"
          printf 'expected=%s\nactual=%s\n' "${TARGET_SHA}" "${ACTUAL_SHA}"
          test "${ACTUAL_SHA}" = "${TARGET_SHA}"
