name: platform-v7 autopilot guard

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/web/app/platform-v7/**'
      - 'apps/web/components/platform-v7/**'
      - 'apps/web/components/transaction-ux/**'
      - 'apps/web/components/v7r/**'
      - 'apps/web/lib/platform-v7/**'
      - 'apps/web/tests/**'
      - 'packages/design-system-v8/**'
      - 'packages/design-tokens/**'
      - 'packages/domain-core/src/execution-simulation/**'
      - 'docs/platform-v7/**'
      - 'design-governance-v8.json'
      - 'scripts/check-design-system-v8*.mjs'
      - 'scripts/p7-autopilot-guard.sh'
      - '.github/workflows/platform-v7-autopilot-guard.yml'

concurrency:
  group: platform-v7-autopilot-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Validate Design System v8 concurrent scope
        if: github.event_name == 'pull_request' && (github.head_ref == 'agent/design-system-v8-foundation' || github.head_ref == 'agent/transaction-shell-deal-workspace-v8' || github.head_ref == 'codex/design-system-v8-field-roles-only' || github.head_ref == 'agent/transaction-role-cockpits-v8' || github.head_ref == 'agent/money-roles-v8-rebased' || github.head_ref == 'agent/operational-oversight-roles-v8' || github.head_ref == 'agent/secondary-critical-routes-v8-final' || github.head_ref == 'agent/documents-readiness-v8' || github.head_ref == 'agent/transaction-critical-routes-v8' || github.head_ref == 'agent/money-settlement-views-v8-rebased' || github.head_ref == 'codex/design-system-v8-dispute-fallback-hardening' || github.head_ref == 'codex/design-system-v8-auction-execution-current-main')
        run: |
          node scripts/check-design-system-v8-pr-scope.mjs
          node scripts/check-design-system-v8.mjs
      - name: Validate active platform-v7 autopilot scope
        if: github.event_name != 'pull_request' || (github.head_ref != 'agent/design-system-v8-foundation' && github.head_ref != 'agent/transaction-shell-deal-workspace-v8' && github.head_ref != 'codex/design-system-v8-field-roles-only' && github.head_ref != 'agent/transaction-role-cockpits-v8' && github.head_ref != 'agent/money-roles-v8-rebased' && github.head_ref != 'agent/operational-oversight-roles-v8' && github.head_ref != 'agent/secondary-critical-routes-v8-final' && github.head_ref != 'agent/documents-readiness-v8' && github.head_ref != 'agent/transaction-critical-routes-v8' && github.head_ref != 'agent/money-settlement-views-v8-rebased' && github.head_ref != 'codex/design-system-v8-dispute-fallback-hardening' && github.head_ref != 'codex/design-system-v8-auction-execution-current-main')
        run: bash scripts/p7-autopilot-guard.sh
