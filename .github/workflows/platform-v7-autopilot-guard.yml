name: platform-v7 autopilot guard

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/src/modules/auth/**'
      - 'apps/web/app/platform-v7/**'
      - 'apps/web/components/platform-v7/**'
      - 'apps/web/components/transaction-ux/**'
      - 'apps/web/components/v7r/**'
      - 'apps/web/public/platform-v7/**'
      - 'apps/web/lib/auction-server.ts'
      - 'apps/web/lib/logistics-server.ts'
      - 'apps/web/lib/deal-execution-server.ts'
      - 'apps/web/lib/bank-release-server.ts'
      - 'apps/web/lib/platform-v7/**'
      - 'apps/web/lib/organization-team-server.ts'
      - 'apps/web/styles/**'
      - 'apps/web/tests/**'
      - 'packages/design-system-v8/**'
      - 'packages/design-tokens/**'
      - 'packages/domain-core/src/execution-simulation/**'
      - 'docs/api/**'
      - 'docs/platform-v7/**'
      - 'design-governance-v8.json'
      - 'scripts/check-design-system-v8*.mjs'
      - 'scripts/platform-v7-route-inventory.mjs'
      - 'scripts/p7-autopilot-guard.sh'
      - '.github/workflows/platform-v7-autopilot-guard.yml'

concurrency:
  group: platform-v7-autopilot-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Platform V7 route inventory
        run: node scripts/platform-v7-route-inventory.mjs --output=platform-v7-route-inventory.json
      - name: Upload Platform V7 route inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-route-inventory-${{ github.sha }}
          path: platform-v7-route-inventory.json
          if-no-files-found: error
          retention-days: 14
      - name: Validate role grain alias migration scope
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/role-grain-alias-canonicalization'
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/web/app/platform-v7/arbitrator/grain/page.tsx',
            'apps/web/app/platform-v7/bank/grain/page.tsx',
            'apps/web/app/platform-v7/compliance/grain/page.tsx',
            'apps/web/app/platform-v7/driver/grain/page.tsx',
            'apps/web/app/platform-v7/elevator/grain/page.tsx',
            'apps/web/app/platform-v7/executive/grain/page.tsx',
            'apps/web/app/platform-v7/lab/grain/page.tsx',
            'apps/web/app/platform-v7/operator/grain/page.tsx',
            'apps/web/app/platform-v7/surveyor/grain/page.tsx',
            'apps/web/tests/unit/platformV7RoleGrainAliases.test.ts',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved role grain alias scope.`);
          NODE
      - name: Validate domain grain alias migration scope
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/domain-grain-alias-canonicalization-v2'
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/web/app/platform-v7/control-tower/grain/page.tsx',
            'apps/web/app/platform-v7/documents/grain/page.tsx',
            'apps/web/app/platform-v7/integrations/grain/page.tsx',
            'apps/web/app/platform-v7/logistics/grain/page.tsx',
            'apps/web/app/platform-v7/readiness/grain/page.tsx',
            'apps/web/app/platform-v7/reports/grain/page.tsx',
            'apps/web/app/platform-v7/settlement/grain/page.tsx',
            'apps/web/tests/unit/platformV7DomainGrainAliases.test.ts',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved domain grain alias scope.`);
          NODE
      - name: Validate compatibility alias migration scope
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/legacy-compatibility-aliases-v1'
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/web/app/platform-v7/auth/page.tsx',
            'apps/web/app/platform-v7/deploy-check/page.tsx',
            'apps/web/app/platform-v7/fgis-to-lot/page.tsx',
            'apps/web/app/platform-v7/market-rfq/page.tsx',
            'apps/web/app/platform-v7/runtime-status/page.tsx',
            'apps/web/app/platform-v7/trading/page.tsx',
            'apps/web/tests/unit/platformV7CompatibilityAliases.test.ts',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved compatibility alias scope.`);
          NODE
      - name: Validate buyer financing authority scope
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/design-system-v8-buyer-financing-authority-v7'
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/web/app/platform-v7/buyer/financing/page.tsx',
            'apps/web/lib/platform-v7/design-system-v8-route-policy.ts',
            'apps/web/tests/unit/platformV7BuyerFinancingAuthority.test.ts',
            'design-governance-v8.json',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved buyer financing authority scope.`);
          NODE
      - name: Validate buyer canonical alias scope
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/buyer-secondary-canonical-aliases-v1'
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/web/app/platform-v7/buyer-lot/page.tsx',
            'apps/web/app/platform-v7/buyer/deals/page.tsx',
            'apps/web/app/platform-v7/buyer/lots/page.tsx',
            'apps/web/app/platform-v7/buyer/offers/page.tsx',
            'apps/web/tests/unit/platformV7BuyerCanonicalAliases.test.ts',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved buyer canonical alias scope.`);
          NODE
      - name: Validate Design System v8 concurrent scope
        if: github.event_name == 'pull_request' && contains(fromJSON('["agent/design-system-v8-foundation","agent/transaction-shell-deal-workspace-v8","codex/design-system-v8-field-roles-only","agent/transaction-role-cockpits-v8","agent/money-roles-v8-rebased","agent/operational-oversight-roles-v8","agent/secondary-critical-routes-v8-final","agent/documents-readiness-v8","agent/transaction-critical-routes-v8","agent/money-settlement-views-v8-rebased","codex/design-system-v8-dispute-fallback-hardening","codex/design-system-v8-auction-execution-current-main","codex/design-system-v8-physical-execution-chain","codex/auction-postgresql-read-authority-current-main","agent/physical-execution-server-authority-v8","agent/acceptance-server-authority-v8","agent/acceptance-server-authority-v8-v2","agent/documents-basis-server-authority-v8","agent/physical-execution-legacy-isolation-v8","agent/bank-release-canonical-deal-authority-v8","agent/auction-legacy-isolation-v8-v2","agent/server-verified-shell-role-v8","agent/shell-server-notifications-v8","agent/fgis-access-postgresql-authority-v8-v4","agent/design-system-v8-runtime-isolation","agent/design-system-v8-operator-root","agent/design-system-v8-operator-authority","agent/design-system-v8-status-authority","agent/design-system-v8-connectors-authority","agent/design-system-v8-profile-authority","agent/design-system-v8-reports-authority","agent/design-system-v8-api-docs-authority","agent/design-system-v8-onboarding-authority","agent/design-system-v8-api-contracts-authority","agent/design-system-v8-profile-team-authority","agent/design-system-v8-operator-queues-canonical","agent/profile-team-postgresql-authority-v8-final","agent/design-system-v8-api-contract-hardening-v4","agent/bank-payment-basis-canonical-route-v2","agent/design-system-v8-stale-regressions-v2","agent/bank-escrow-canonical-route-v2","agent/design-system-v8-buyer-rfq-authority-v2","agent/design-system-v8-route-inventory","agent/design-system-v8-bank-secondary-authority"]'), github.head_ref)
        run: |
          node scripts/check-design-system-v8-pr-scope.mjs
          node scripts/check-design-system-v8.mjs
      - name: Validate role-scoped AI assistant scope
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/role-scoped-ai-assistant'
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.env.example',
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/api/src/modules/ai-insights/ai-assistant.controller.ts',
            'apps/api/src/modules/ai-insights/ai-assistant.service.spec.ts',
            'apps/api/src/modules/ai-insights/ai-assistant.service.ts',
            'apps/api/src/modules/ai-insights/ai-insights.module.ts',
            'apps/api/src/modules/ai-insights/ai-insights.service.ts',
            'apps/web/app/api/proxy/[...path]/route.ts',
            'apps/web/app/platform-v7/ai/page.tsx',
            'apps/web/app/platform-v7/assistant/page.tsx',
            'apps/web/components/platform-v7/AiAssistantPanel.tsx',
            'apps/web/components/platform-v7/ContextualSupportOrAssistant.tsx',
            'apps/web/components/platform-v7/HydrationSafeChatSupport.tsx',
            'apps/web/lib/platform-v7/routes.ts',
            'apps/web/tests/unit/platformV7RoleScopedAiAssistant.test.ts',
            'docs/platform-v7/ai/role-scoped-assistant.md',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          const service = fs.readFileSync('apps/api/src/modules/ai-insights/ai-assistant.service.ts', 'utf8');
          const panel = fs.readFileSync('apps/web/components/platform-v7/AiAssistantPanel.tsx', 'utf8');
          const proxy = fs.readFileSync('apps/web/app/api/proxy/[...path]/route.ts', 'utf8');
          const requiredContracts = [
            [service, "responseContract: 'assistant_decision_v2'"],
            [service, 'actionAllowed: false'],
            [panel, 'data-ai-data-mode={dataMode}'],
            [panel, 'function DecisionCard'],
            [proxy, "dataMode: 'synthetic_demo'"],
            [proxy, 'decision: demoDecision(selected, deals, role, locale, generatedAt)'],
          ];
          const absent = requiredContracts.filter(([text, needle]) => !text.includes(needle)).map(([, needle]) => needle);
          if (absent.length) {
            console.error({ missingAssistantContracts: absent });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved role-scoped AI assistant scope and v2 contracts.`);
          NODE
      - name: Validate industrial assistant shortcuts scope
        if: github.event_name == 'pull_request' && github.head_ref == 'feat/industrial-assistant-shortcuts'
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/web/app/api/public-platform-assistant/route.ts',
            'apps/web/components/platform-v7/ContextualSupportOrAssistant.tsx',
            'apps/web/components/platform-v7/PrivateAssistantShortcutLabel.module.css',
            'apps/web/components/platform-v7/PrivateAssistantShortcutLabel.tsx',
            'apps/web/components/platform-v7/PublicPlatformAssistant.tsx',
            'apps/web/lib/platform-v7/public-assistant-knowledge.ts',
            'apps/web/styles/platform-v7-public-assistant.css',
            'apps/web/tests/unit/platformV7IndustrialAssistantShortcuts.test.ts',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          const route = fs.readFileSync('apps/web/app/api/public-platform-assistant/route.ts', 'utf8');
          const contextual = fs.readFileSync('apps/web/components/platform-v7/ContextualSupportOrAssistant.tsx', 'utf8');
          const publicAssistant = fs.readFileSync('apps/web/components/platform-v7/PublicPlatformAssistant.tsx', 'utf8');
          const privateShortcut = fs.readFileSync('apps/web/components/platform-v7/PrivateAssistantShortcutLabel.tsx', 'utf8');
          const knowledge = fs.readFileSync('apps/web/lib/platform-v7/public-assistant-knowledge.ts', 'utf8');
          const requiredContracts = [
            [route, "dataMode: 'public_knowledge'"],
            [route, "mode: 'read_only'"],
            [route, 'MAX_MESSAGE_LENGTH = 1_200'],
            [contextual, '<PublicPlatformAssistant />'],
            [contextual, '<PrivateAssistantShortcutLabel />'],
            [publicAssistant, "fetch('/api/public-platform-assistant'"],
            [privateShortcut, "href='/platform-v7/assistant'"],
            [knowledge, "PUBLIC_ASSISTANT_KNOWLEDGE_VERSION = 'public-platform-knowledge-2026-07-17.v1'"],
            [knowledge, 'actionAllowed: false'],
            [knowledge, 'NOT_CONNECTED'],
          ];
          const absent = requiredContracts.filter(([text, needle]) => !text.includes(needle)).map(([, needle]) => needle);
          const forbiddenContracts = [
            [route, 'openai'],
            [route, 'gigachat'],
            [route, 'fetch('],
            [publicAssistant, '/api/proxy/ai-assistant'],
            [publicAssistant, 'localStorage'],
            [publicAssistant, 'sessionStorage'],
            [privateShortcut, '?deal='],
          ];
          const presentForbidden = forbiddenContracts.filter(([text, needle]) => text.includes(needle)).map(([, needle]) => needle);
          if (absent.length || presentForbidden.length) {
            console.error({ missingIndustrialAssistantContracts: absent, forbiddenIndustrialAssistantContracts: presentForbidden });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved industrial assistant shortcut scope and boundaries.`);
          NODE
      - name: Validate TAI dependency remediation governance closeout
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/tai-security-audit-remediation-3006'
        run: node docs/platform-v7/autopilot/verify-tai-security-audit-remediation-3006.mjs
      - name: Validate active platform-v7 autopilot scope
        if: github.event_name != 'pull_request' || !contains(fromJSON('["agent/role-scoped-ai-assistant","feat/industrial-assistant-shortcuts","agent/buyer-secondary-canonical-aliases-v1","agent/design-system-v8-buyer-financing-authority-v7","agent/legacy-compatibility-aliases-v1","agent/domain-grain-alias-canonicalization-v2","agent/role-grain-alias-canonicalization","agent/design-system-v8-foundation","agent/transaction-shell-deal-workspace-v8","codex/design-system-v8-field-roles-only","agent/transaction-role-cockpits-v8","agent/money-roles-v8-rebased","agent/operational-oversight-roles-v8","agent/secondary-critical-routes-v8-final","agent/documents-readiness-v8","agent/transaction-critical-routes-v8","agent/money-settlement-views-v8-rebased","codex/design-system-v8-dispute-fallback-hardening","codex/design-system-v8-auction-execution-current-main","codex/design-system-v8-physical-execution-chain","codex/auction-postgresql-read-authority-current-main","agent/physical-execution-server-authority-v8","agent/acceptance-server-authority-v8","agent/acceptance-server-authority-v8-v2","agent/documents-basis-server-authority-v8","agent/physical-execution-legacy-isolation-v8","agent/bank-release-canonical-deal-authority-v8","agent/auction-legacy-isolation-v8-v2","agent/server-verified-shell-role-v8","agent/shell-server-notifications-v8","agent/fgis-access-postgresql-authority-v8-v4","agent/design-system-v8-runtime-isolation","agent/design-system-v8-operator-root","agent/design-system-v8-operator-authority","agent/design-system-v8-status-authority","agent/design-system-v8-connectors-authority","agent/design-system-v8-profile-authority","agent/design-system-v8-reports-authority","agent/design-system-v8-api-docs-authority","agent/design-system-v8-onboarding-authority","agent/design-system-v8-api-contracts-authority","agent/design-system-v8-profile-team-authority","agent/design-system-v8-operator-queues-canonical","agent/profile-team-postgresql-authority-v8-final","agent/design-system-v8-api-contract-hardening-v4","agent/bank-payment-basis-canonical-route-v2","agent/design-system-v8-stale-regressions-v2","agent/bank-escrow-canonical-route-v2","agent/design-system-v8-buyer-rfq-authority-v2","agent/design-system-v8-route-inventory","agent/design-system-v8-bank-secondary-authority"]'), github.head_ref)
        run: bash scripts/p7-autopilot-guard.sh
