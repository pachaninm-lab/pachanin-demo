name: platform-v7 autopilot guard

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'apps/api/src/modules/auth/**'
      - 'apps/web/app/platform-v7/**'
      - 'apps/web/components/platform-v7/**'
      - 'apps/web/components/transaction-ux/**'
      - 'apps/web/components/v7r/**'
      - 'apps/web/public/platform-v7/**'
      - 'apps/web/lib/auction-server.ts'
      - 'apps/web/lib/logistics-server.ts'
      - 'apps/web/lib/deal-execution-server.ts'
      - 'apps/web/lib/bank-release-server.ts'
      - 'apps/web/lib/platform-v7/**'
      - 'apps/web/lib/organization-team-server.ts'
      - 'apps/web/tests/**'
      - 'packages/design-system-v8/**'
      - 'packages/design-tokens/**'
      - 'packages/domain-core/src/execution-simulation/**'
      - 'docs/api/**'
      - 'docs/platform-v7/**'
      - 'design-governance-v8.json'
      - 'scripts/check-design-system-v8*.mjs'
      - 'scripts/platform-v7-route-inventory.mjs'
      - 'scripts/p7-autopilot-guard.sh'
      - '.github/workflows/platform-v7-autopilot-guard.yml'

concurrency:
  group: platform-v7-autopilot-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate Platform V7 route inventory
        run: node scripts/platform-v7-route-inventory.mjs --output=platform-v7-route-inventory.json
      - name: Upload Platform V7 route inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-v7-route-inventory-${{ github.sha }}
          path: platform-v7-route-inventory.json
          if-no-files-found: error
          retention-days: 14
      - name: Validate role grain alias migration scope
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/role-grain-alias-canonicalization'
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/web/app/platform-v7/arbitrator/grain/page.tsx',
            'apps/web/app/platform-v7/bank/grain/page.tsx',
            'apps/web/app/platform-v7/compliance/grain/page.tsx',
            'apps/web/app/platform-v7/driver/grain/page.tsx',
            'apps/web/app/platform-v7/elevator/grain/page.tsx',
            'apps/web/app/platform-v7/executive/grain/page.tsx',
            'apps/web/app/platform-v7/lab/grain/page.tsx',
            'apps/web/app/platform-v7/operator/grain/page.tsx',
            'apps/web/app/platform-v7/surveyor/grain/page.tsx',
            'apps/web/tests/unit/platformV7RoleGrainAliases.test.ts',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved role grain alias scope.`);
          NODE
      - name: Validate domain grain alias migration scope
        if: github.event_name == 'pull_request' && github.head_ref == 'agent/domain-grain-alias-canonicalization'
        run: |
          node <<'NODE'
          const { execFileSync } = require('node:child_process');
          const expected = new Set([
            '.github/workflows/platform-v7-autopilot-guard.yml',
            'apps/web/app/platform-v7/control-tower/grain/page.tsx',
            'apps/web/app/platform-v7/documents/grain/page.tsx',
            'apps/web/app/platform-v7/integrations/grain/page.tsx',
            'apps/web/app/platform-v7/logistics/grain/page.tsx',
            'apps/web/app/platform-v7/readiness/grain/page.tsx',
            'apps/web/app/platform-v7/reports/grain/page.tsx',
            'apps/web/app/platform-v7/settlement/grain/page.tsx',
            'apps/web/tests/unit/platformV7DomainGrainAliases.test.ts',
          ]);
          const changed = execFileSync('git', ['diff', '--name-only', 'origin/main...HEAD'], { encoding: 'utf8' })
            .trim().split(/\r?\n/).filter(Boolean);
          const unexpected = changed.filter((file) => !expected.has(file));
          const missing = [...expected].filter((file) => !changed.includes(file));
          if (unexpected.length || missing.length) {
            console.error({ unexpected, missing });
            process.exit(1);
          }
          console.log(`PASS: ${changed.length} files match the approved domain grain alias scope.`);
          NODE
      - name: Validate Design System v8 concurrent scope
        if: github.event_name == 'pull_request' && (github.head_ref == 'agent/design-system-v8-foundation' || github.head_ref == 'agent/transaction-shell-deal-workspace-v8' || github.head_ref == 'codex/design-system-v8-field-roles-only' || github.head_ref == 'agent/transaction-role-cockpits-v8' || github.head_ref == 'agent/money-roles-v8-rebased' || github.head_ref == 'agent/operational-oversight-roles-v8' || github.head_ref == 'agent/secondary-critical-routes-v8-final' || github.head_ref == 'agent/documents-readiness-v8' || github.head_ref == 'agent/transaction-critical-routes-v8' || github.head_ref == 'agent/money-settlement-views-v8-rebased' || github.head_ref == 'codex/design-system-v8-dispute-fallback-hardening' || github.head_ref == 'codex/design-system-v8-auction-execution-current-main' || github.head_ref == 'codex/design-system-v8-physical-execution-chain' || github.head_ref == 'codex/auction-postgresql-read-authority-current-main' || github.head_ref == 'agent/physical-execution-server-authority-v8' || github.head_ref == 'agent/acceptance-server-authority-v8' || github.head_ref == 'agent/acceptance-server-authority-v8-v2' || github.head_ref == 'agent/documents-basis-server-authority-v8' || github.head_ref == 'agent/physical-execution-legacy-isolation-v8' || github.head_ref == 'agent/bank-release-canonical-deal-authority-v8' || github.head_ref == 'agent/auction-legacy-isolation-v8-v2' || github.head_ref == 'agent/server-verified-shell-role-v8' || github.head_ref == 'agent/shell-server-notifications-v8' || github.head_ref == 'agent/fgis-access-postgresql-authority-v8-v4' || github.head_ref == 'agent/design-system-v8-runtime-isolation' || github.head_ref == 'agent/design-system-v8-operator-root' || github.head_ref == 'agent/design-system-v8-operator-authority' || github.head_ref == 'agent/design-system-v8-status-authority' || github.head_ref == 'agent/design-system-v8-connectors-authority' || github.head_ref == 'agent/design-system-v8-profile-authority' || github.head_ref == 'agent/design-system-v8-reports-authority' || github.head_ref == 'agent/design-system-v8-api-docs-authority' || github.head_ref == 'agent/design-system-v8-onboarding-authority' || github.head_ref == 'agent/design-system-v8-api-contracts-authority' || github.head_ref == 'agent/design-system-v8-profile-team-authority' || github.head_ref == 'agent/design-system-v8-operator-queues-canonical' || github.head_ref == 'agent/profile-team-postgresql-authority-v8-final' || github.head_ref == 'agent/design-system-v8-api-contract-hardening-v4' || github.head_ref == 'agent/bank-payment-basis-canonical-route-v2' || github.head_ref == 'agent/design-system-v8-stale-regressions-v2' || github.head_ref == 'agent/bank-escrow-canonical-route-v2' || github.head_ref == 'agent/design-system-v8-buyer-rfq-authority-v2' || github.head_ref == 'agent/design-system-v8-route-inventory')
        run: |
          node scripts/check-design-system-v8-pr-scope.mjs
          node scripts/check-design-system-v8.mjs
      - name: Validate active platform-v7 autopilot scope
        if: github.event_name != 'pull_request' || (github.head_ref != 'agent/domain-grain-alias-canonicalization' && github.head_ref != 'agent/role-grain-alias-canonicalization' && github.head_ref != 'agent/design-system-v8-foundation' && github.head_ref != 'agent/transaction-shell-deal-workspace-v8' && github.head_ref != 'codex/design-system-v8-field-roles-only' && github.head_ref != 'agent/transaction-role-cockpits-v8' && github.head_ref != 'agent/money-roles-v8-rebased' && github.head_ref != 'agent/operational-oversight-roles-v8' && github.head_ref != 'agent/secondary-critical-routes-v8-final' && github.head_ref != 'agent/documents-readiness-v8' && github.head_ref != 'agent/transaction-critical-routes-v8' && github.head_ref != 'agent/money-settlement-views-v8-rebased' && github.head_ref != 'codex/design-system-v8-dispute-fallback-hardening' && github.head_ref != 'codex/design-system-v8-auction-execution-current-main' && github.head_ref != 'codex/design-system-v8-physical-execution-chain' && github.head_ref != 'codex/auction-postgresql-read-authority-current-main' && github.head_ref != 'agent/physical-execution-server-authority-v8' && github.head_ref != 'agent/acceptance-server-authority-v8' && github.head_ref != 'agent/acceptance-server-authority-v8-v2' && github.head_ref != 'agent/documents-basis-server-authority-v8' && github.head_ref != 'agent/physical-execution-legacy-isolation-v8' && github.head_ref != 'agent/bank-release-canonical-deal-authority-v8' && github.head_ref != 'agent/auction-legacy-isolation-v8-v2' && github.head_ref != 'agent/server-verified-shell-role-v8' && github.head_ref != 'agent/shell-server-notifications-v8' && github.head_ref != 'agent/fgis-access-postgresql-authority-v8-v4' && github.head_ref != 'agent/design-system-v8-runtime-isolation' && github.head_ref != 'agent/design-system-v8-operator-root' && github.head_ref != 'agent/design-system-v8-operator-authority' && github.head_ref != 'agent/design-system-v8-status-authority' && github.head_ref != 'agent/design-system-v8-connectors-authority' && github.head_ref != 'agent/design-system-v8-profile-authority' && github.head_ref != 'agent/design-system-v8-reports-authority' && github.head_ref != 'agent/design-system-v8-api-docs-authority' && github.head_ref != 'agent/design-system-v8-onboarding-authority' && github.head_ref != 'agent/design-system-v8-api-contracts-authority' && github.head_ref != 'agent/design-system-v8-profile-team-authority' && github.head_ref != 'agent/design-system-v8-operator-queues-canonical' && github.head_ref != 'agent/profile-team-postgresql-authority-v8-final' && github.head_ref != 'agent/design-system-v8-api-contract-hardening-v4' && github.head_ref != 'agent/bank-payment-basis-canonical-route-v2' && github.head_ref != 'agent/design-system-v8-stale-regressions-v2' && github.head_ref != 'agent/bank-escrow-canonical-route-v2' && github.head_ref != 'agent/design-system-v8-buyer-rfq-authority-v2' && github.head_ref != 'agent/design-system-v8-route-inventory')
        run: bash scripts/p7-autopilot-guard.sh
