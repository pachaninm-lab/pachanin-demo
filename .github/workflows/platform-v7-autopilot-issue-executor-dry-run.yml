name: platform-v7 autopilot issue executor dry-run

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'docs/platform-v7/autopilot/**'
      - 'docs/platform-v7/execution-queue.md'
      - 'scripts/p7-autopilot-*.mjs'
      - '.github/workflows/platform-v7-autopilot-*.yml'

concurrency:
  group: platform-v7-autopilot-issue-executor-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run issue executor dry-run
        run: |
          node scripts/p7-autopilot-issue-executor-dry-run.mjs \
            --output docs/platform-v7/autopilot/issue-executor-dry-run-result.json

      - name: Show dry-run result
        run: cat docs/platform-v7/autopilot/issue-executor-dry-run-result.json
