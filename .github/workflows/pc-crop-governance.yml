name: PC-CROP Governance

on:
  pull_request:
    paths:
      - 'docs/platform-v7/crop-platform/**'
      - 'scripts/verify-pc-crop-governance.mjs'
      - '.github/workflows/pc-crop-governance.yml'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'docs/platform-v7/crop-platform/**'
      - 'scripts/verify-pc-crop-governance.mjs'
      - '.github/workflows/pc-crop-governance.yml'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: pc-crop-governance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  governance-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Verify PC-CROP governance contract
        run: node scripts/verify-pc-crop-governance.mjs
