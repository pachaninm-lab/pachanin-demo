name: public entry LCP evidence 2337

on:
  pull_request:
    branches:
      - fix/public-entry-lcp-css-boundary

permissions:
  contents: read

jobs:
  browser-lighthouse-and-hosting:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      LOCAL_BASE_URL: http://127.0.0.1:3000
      NETLIFY_PREVIEW_URL: https://6a51848339282400088c5b5b--vermillion-kitsune-0e7b97.netlify.app
      ARTIFACT_DIR: ../../artifacts/public-entry-lcp-evidence-2337/local-production
      NETLIFY_ARTIFACT_DIR: ../../artifacts/public-entry-lcp-evidence-2337/netlify
    steps:
      - name: Checkout exact evidence head
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium and WebKit
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit

      - name: Build production web bundle
        working-directory: apps/web
        run: pnpm build

      - name: Run full local production browser, hydration and Lighthouse gates
        working-directory: apps/web
        shell: bash
        run: |
          set -uo pipefail
          OUT='../../artifacts/public-entry-lcp-evidence-2337/local-production'
          mkdir -p "$OUT/lighthouse" "$OUT/html"
          find .next/static/css -type f -printf '%f %s\n' | sort -k2 -n > "$OUT/css-assets.txt"
          pnpm exec playwright --version > "$OUT/playwright-version.txt" 2>&1 || true
          node -e "const {chromium,webkit}=require('@playwright/test'); console.log(JSON.stringify({chromium:chromium.executablePath(),webkit:webkit.executablePath()},null,2))" > "$OUT/browser-paths.json" 2>&1 || true

          pnpm start > /tmp/platform-v7-lcp-production.log 2>&1 &
          APP_PID=$!
          cleanup() {
            cp /tmp/platform-v7-lcp-production.log "$OUT/production-server.log" 2>/dev/null || true
            kill "$APP_PID" 2>/dev/null || true
          }
          trap cleanup EXIT

          ready=0
          for attempt in $(seq 1 90); do
            if curl --silent --show-error --fail --max-time 5 "$LOCAL_BASE_URL/platform-v7?lang=ru" >/dev/null; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            cat /tmp/platform-v7-lcp-production.log | tee "$OUT/readiness-failure.log"
            exit 1
          fi

          for route in platform-v7 platform-v7/login platform-v7/forgot-password; do
            safe_name="${route//\//-}"
            curl --silent --show-error --dump-header "$OUT/html/${safe_name}.headers" --output "$OUT/html/${safe_name}.html" "$LOCAL_BASE_URL/${route}?lang=ru" || true
            grep -oE '/_next/static/css/[^"? ]+' "$OUT/html/${safe_name}.html" | sort -u > "$OUT/html/${safe_name}.css-links.txt" || true
          done

          set +e
          PLAYWRIGHT_BASE_URL="$LOCAL_BASE_URL" node --trace-uncaught scripts/public-entry-lcp-evidence-2337.mjs 2>&1 | tee "$OUT/browser-script.log"
          BROWSER_STATUS=${PIPESTATUS[0]}
          set -e

          CHROME_BIN="$(command -v google-chrome || command -v chromium || command -v chromium-browser || node -e "console.log(require('@playwright/test').chromium.executablePath())")"
          test -n "$CHROME_BIN" || { echo 'Chrome executable not found' | tee -a "$OUT/lighthouse-run.log"; CHROME_BIN=''; }
          export CHROME_PATH="$CHROME_BIN"

          LIGHTHOUSE_STATUS=0
          if [ -n "$CHROME_BIN" ]; then
            for route in platform-v7 platform-v7/login platform-v7/forgot-password; do
              safe_name="${route//\//-}"
              set +e
              npx -y lighthouse@12.8.2 "$LOCAL_BASE_URL/${route}?lang=ru" \
                --quiet \
                --chrome-flags="--headless --no-sandbox --disable-dev-shm-usage" \
                --only-categories=performance,accessibility,best-practices,seo \
                --output=json \
                --output-path="$OUT/lighthouse/${safe_name}.json" 2>&1 | tee -a "$OUT/lighthouse-run.log"
              STATUS=${PIPESTATUS[0]}
              set -e
              if [ "$STATUS" -ne 0 ]; then LIGHTHOUSE_STATUS=1; fi
            done
          else
            LIGHTHOUSE_STATUS=1
          fi

          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const dir = '../../artifacts/public-entry-lcp-evidence-2337/local-production/lighthouse';
          const reports = fs.existsSync(dir) ? fs.readdirSync(dir)
            .filter((name) => name.endsWith('.json') && name !== 'summary.json')
            .map((name) => {
              const report = JSON.parse(fs.readFileSync(path.join(dir, name), 'utf8'));
              return {
                file: name,
                finalUrl: report.finalUrl,
                scores: Object.fromEntries(Object.entries(report.categories).map(([key, value]) => [key, Math.round((value.score || 0) * 100)])),
                metrics: {
                  firstContentfulPaintMs: report.audits['first-contentful-paint']?.numericValue,
                  largestContentfulPaintMs: report.audits['largest-contentful-paint']?.numericValue,
                  totalBlockingTimeMs: report.audits['total-blocking-time']?.numericValue,
                  cumulativeLayoutShift: report.audits['cumulative-layout-shift']?.numericValue,
                  speedIndexMs: report.audits['speed-index']?.numericValue,
                },
                renderBlocking: report.audits['render-blocking-resources']?.details?.items?.map((item) => ({ url: item.url, totalBytes: item.totalBytes, wastedMs: item.wastedMs })) ?? [],
              };
            }) : [];
          const failures = [];
          if (reports.length !== 3) failures.push(`expected 3 Lighthouse reports, got ${reports.length}`);
          for (const report of reports) {
            const landing = report.file === 'platform-v7.json';
            if ((report.scores.performance || 0) < 80) failures.push(`${report.file}: performance ${report.scores.performance}`);
            if ((report.scores.accessibility || 0) < 95) failures.push(`${report.file}: accessibility ${report.scores.accessibility}`);
            if ((report.scores['best-practices'] || 0) < 90) failures.push(`${report.file}: best-practices ${report.scores['best-practices']}`);
            if (landing && (report.scores.seo || 0) < 90) failures.push(`${report.file}: SEO ${report.scores.seo}`);
            if (!(report.metrics.largestContentfulPaintMs <= 2500)) failures.push(`${report.file}: LCP ${report.metrics.largestContentfulPaintMs}`);
            if (!(report.metrics.totalBlockingTimeMs <= 200)) failures.push(`${report.file}: TBT ${report.metrics.totalBlockingTimeMs}`);
            if (!(report.metrics.cumulativeLayoutShift <= 0.1)) failures.push(`${report.file}: CLS ${report.metrics.cumulativeLayoutShift}`);
          }
          const summary = { status: failures.length ? 'failed' : 'passed', source: 'local-next-production', reports, failures };
          fs.writeFileSync(path.join(dir, 'summary.json'), JSON.stringify(summary, null, 2));
          console.log(JSON.stringify(summary, null, 2));
          if (failures.length) process.exitCode = 1;
          NODE
          SUMMARY_STATUS=$?

          printf '{"browserStatus":%s,"lighthouseCommandStatus":%s,"lighthouseSummaryStatus":%s}\n' "$BROWSER_STATUS" "$LIGHTHOUSE_STATUS" "$SUMMARY_STATUS" > "$OUT/gate-status.json"
          if [ "$BROWSER_STATUS" -ne 0 ] || [ "$LIGHTHOUSE_STATUS" -ne 0 ] || [ "$SUMMARY_STATUS" -ne 0 ]; then
            exit 1
          fi

      - name: Wait for immutable Netlify deploy
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p artifacts/public-entry-lcp-evidence-2337/netlify
          for attempt in $(seq 1 60); do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' --max-time 12 "$NETLIFY_PREVIEW_URL/platform-v7?lang=ru" || true)
            if [ "$status" = '200' ] || [ "$status" = '401' ] || [ "$status" = '403' ] || [ "$status" = '429' ]; then
              printf '{"httpStatus":%s,"attempt":%s}\n' "$status" "$attempt" > artifacts/public-entry-lcp-evidence-2337/netlify/readiness.json
              exit 0
            fi
            sleep 2
          done
          printf '{"httpStatus":null,"status":"not-ready"}\n' > artifacts/public-entry-lcp-evidence-2337/netlify/readiness.json
          exit 1

      - name: Run limited immutable Netlify hosting smoke
        if: always()
        working-directory: apps/web
        env:
          NETLIFY_PREVIEW_URL: ${{ env.NETLIFY_PREVIEW_URL }}
        run: node scripts/public-entry-netlify-evidence-2337.mjs

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-lcp-evidence-2337
          path: artifacts/public-entry-lcp-evidence-2337
          if-no-files-found: error
          retention-days: 14
