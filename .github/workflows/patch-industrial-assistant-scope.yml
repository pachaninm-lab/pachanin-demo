name: Patch industrial assistant scope registration

on:
  push:
    branches:
      - feat/industrial-assistant-shortcuts
    paths:
      - .github/workflows/patch-industrial-assistant-scope.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/industrial-assistant-shortcuts
          fetch-depth: 0
      - name: Register source-controlled scope and remove patch workflow
        shell: bash
        run: |
          set -euo pipefail
          python <<'PY'
          from pathlib import Path

          path = Path('scripts/p7-autopilot-guard.sh')
          text = path.read_text(encoding='utf-8')
          existing = "  'ir/k8s-production-like-2659': 'docs/platform-v7/autopilot/scopes/ir-k8s-production-like-2659.json',\n"
          addition = "  'feat/industrial-assistant-shortcuts': 'docs/platform-v7/autopilot/scopes/feat-industrial-assistant-shortcuts.json',\n"
          if addition not in text:
              if existing not in text:
                  raise SystemExit('canonical scope manifest registry anchor not found')
              text = text.replace(existing, existing + addition, 1)
              path.write_text(text, encoding='utf-8')
          PY
          git rm .github/workflows/patch-industrial-assistant-scope.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/p7-autopilot-guard.sh docs/platform-v7/autopilot/scopes/feat-industrial-assistant-shortcuts.json
          git commit -m "chore: register assistant shortcut scope"
          git push origin HEAD:feat/industrial-assistant-shortcuts
