name: Mobile Smoke

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: 'Web base URL to check'
        required: true
        default: 'https://pachanin-web.vercel.app'
  schedule:
    - cron: '45 6,10,14,18 * * *'

jobs:
  mobile-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      WEB_URL: ${{ inputs.web_url || 'https://pachanin-web.vercel.app' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Run mobile smoke
        working-directory: apps/web
        env:
          PLAYWRIGHT_BASE_URL: ${{ env.WEB_URL }}
        run: pnpm exec playwright test --config=playwright.production.config.ts
