name: Patch Public Product WCAG

on:
  push:
    branches:
      - agent/public-product-experience-v3
    paths:
      - '.github/workflows/patch-public-product-wcag.yml'

permissions:
  contents: write

jobs:
  patch-wcag:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-product-experience-v3
          fetch-depth: 0
      - name: Correct definition-list semantics and tinted-surface contrast
        run: |
          python3 - <<'PY'
          from pathlib import Path

          component_path = Path('apps/web/components/platform-v7/PublicDealExplorer.tsx')
          component = component_path.read_text(encoding='utf-8')
          old_component = """      {items.map(([label, value], index) => (\n        <div key={label}>\n          <span className='pc-ppe-causal-index'>{index + 1}</span>\n          <dt>{label}</dt>\n          <dd>{value}</dd>\n        </div>\n      ))}"""
          new_component = """      {items.map(([label, value], index) => (\n        <div key={label}>\n          <dt>\n            <span className='pc-ppe-causal-index' aria-hidden='true'>{index + 1}</span>\n            <span>{label}</span>\n          </dt>\n          <dd>{value}</dd>\n        </div>\n      ))}"""
          if old_component not in component:
              raise SystemExit('Expected causal-list component block not found')
          component_path.write_text(component.replace(old_component, new_component, 1), encoding='utf-8')

          css_path = Path('apps/web/styles/platform-v7-public-product-experience-v3.css')
          css = css_path.read_text(encoding='utf-8')

          old_color = """.pc-ppe-scenario-card dt {\n  margin: 0 0 5px;\n  color: #65756d;"""
          new_color = """.pc-ppe-scenario-card dt {\n  margin: 0 0 5px;\n  color: var(--pc-ppe-muted);"""
          if old_color not in css:
              raise SystemExit('Expected shared definition-term color block not found')
          css = css.replace(old_color, new_color, 1)

          old_layout = """.pc-ppe-causal-list > div {\n  display: grid;\n  grid-template-columns: 36px minmax(150px, 0.35fr) minmax(0, 1fr);\n  gap: 14px;\n  align-items: center;\n  min-height: 68px;\n  padding: 12px 14px;\n  border: 1px solid var(--pc-ppe-line);\n  border-radius: 15px;\n}"""
          new_layout = """.pc-ppe-causal-list > div {\n  display: grid;\n  grid-template-columns: minmax(186px, 0.4fr) minmax(0, 1fr);\n  gap: 14px;\n  align-items: center;\n  min-height: 68px;\n  padding: 12px 14px;\n  border: 1px solid var(--pc-ppe-line);\n  border-radius: 15px;\n}"""
          if old_layout not in css:
              raise SystemExit('Expected causal-list desktop layout not found')
          css = css.replace(old_layout, new_layout, 1)

          old_dt = """.pc-ppe-causal-list dt {\n  font-weight: 750;\n}"""
          new_dt = """.pc-ppe-causal-list dt {\n  display: grid;\n  grid-template-columns: 36px minmax(0, 1fr);\n  gap: 14px;\n  align-items: center;\n  margin: 0;\n  font-weight: 750;\n}"""
          if old_dt not in css:
              raise SystemExit('Expected causal-list dt rule not found')
          css = css.replace(old_dt, new_dt, 1)

          old_mobile = """  .pc-ppe-causal-list > div {\n    grid-template-columns: 36px minmax(0, 1fr);\n  }\n\n  .pc-ppe-causal-list dd {\n    grid-column: 2;\n  }"""
          new_mobile = """  .pc-ppe-causal-list > div {\n    grid-template-columns: minmax(0, 1fr);\n  }\n\n  .pc-ppe-causal-list dd {\n    padding-left: 50px;\n  }"""
          if old_mobile not in css:
              raise SystemExit('Expected causal-list mobile layout not found')
          css_path.write_text(css.replace(old_mobile, new_mobile, 1), encoding='utf-8')
          PY
      - name: Remove one-time workflow and commit WCAG correction
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/patch-public-product-wcag.yml
          git add apps/web/components/platform-v7/PublicDealExplorer.tsx apps/web/styles/platform-v7-public-product-experience-v3.css
          git commit -m 'Fix Public Product Experience WCAG semantics and contrast'
          git push origin HEAD:agent/public-product-experience-v3
