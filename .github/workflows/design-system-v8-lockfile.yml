name: Design System v8 lockfile sync

on:
  push:
    branches:
      - codex/design-system-v8-industrial
    paths:
      - packages/design-system-v8/package.json
      - packages/design-tokens/package.json
      - apps/web/package.json
      - .github/workflows/design-system-v8-lockfile.yml

permissions:
  contents: write

concurrency:
  group: design-system-v8-lockfile
  cancel-in-progress: false

jobs:
  sync-lockfile:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: codex/design-system-v8-industrial
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Regenerate workspace lockfile
        run: pnpm install --lockfile-only --no-frozen-lockfile

      - name: Commit lockfile when changed
        shell: bash
        run: |
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml is already synchronized"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "Sync Design System v8 workspace lockfile [skip ci]"
          git push origin HEAD:codex/design-system-v8-industrial
