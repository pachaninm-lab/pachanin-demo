name: TAI Legal Intake Exact Main Observer

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-legal-main-observer.yml

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    steps:
      - name: Observe exact-main release and legal records
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          EXPECTED_MAIN: a4866853248de9dd8a52913b2a608d730ae2e696
        run: |
          set -euo pipefail
          actual_main="$(gh api "/repos/$REPOSITORY/commits/main" --jq '.sha')"
          printf 'EXPECTED_MAIN=%s\nACTUAL_MAIN=%s\n' "$EXPECTED_MAIN" "$actual_main"
          test "$actual_main" = "$EXPECTED_MAIN"

          gh api "/repos/$REPOSITORY/actions/workflows/tai-release-acceptance.yml/runs?event=push&per_page=100" > release-runs.json
          run_id="$(jq -r --arg sha "$EXPECTED_MAIN" '[.workflow_runs[] | select(.head_sha == $sha)] | sort_by(.created_at) | reverse | .[0].id // empty' release-runs.json)"
          test -n "$run_id"
          jq -r --arg sha "$EXPECTED_MAIN" '.workflow_runs[] | select(.head_sha == $sha) | ["RELEASE",.id,.status,.conclusion,.run_number,.run_attempt,.created_at,.updated_at] | @tsv' release-runs.json
          gh api "/repos/$REPOSITORY/actions/runs/$run_id/jobs?per_page=100" > release-jobs.json
          jq -r '.jobs[] | ["JOB",.id,.name,.status,.conclusion,.started_at,.completed_at] | @tsv' release-jobs.json
          jq -r '.jobs[] | .name as $job | .steps[]? | ["STEP",$job,.number,.name,.status,.conclusion] | @tsv' release-jobs.json
          gh api "/repos/$REPOSITORY/actions/runs/$run_id/artifacts?per_page=100" > release-artifacts.json
          jq -r '.artifacts[] | ["ARTIFACT",.id,.name,.size_in_bytes,.expired,.digest,.created_at,.expires_at] | @tsv' release-artifacts.json

          for path in \
            apps/tai/model-artifacts/legal-reviews/qwen3-8b.review-record.v1.json \
            apps/tai/model-artifacts/legal-reviews/qwen3-8b.review-attestation.v1.json \
            apps/tai/model-artifacts/legal-reviews/mistral-7b-instruct-v0.3.review-record.v1.json \
            apps/tai/model-artifacts/legal-reviews/mistral-7b-instruct-v0.3.review-attestation.v1.json; do
            if gh api "/repos/$REPOSITORY/contents/$path?ref=$EXPECTED_MAIN" >/dev/null 2>&1; then
              printf 'LEGAL_RECORD\tPRESENT\t%s\n' "$path"
            else
              printf 'LEGAL_RECORD\tABSENT\t%s\n' "$path"
            fi
          done
