name: TAI AP-13C.1d v2 Materialize

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  contents: write

concurrency:
  group: tai-ap13c1d-v2-materialize
  cancel-in-progress: false

jobs:
  materialize:
    if: github.event.pull_request.head.ref == 'agent/tai-ap-13c1d-quality-scoring'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout quality scoring branch
        uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-quality-scoring
          fetch-depth: 0

      - name: Materialize bounded AP-13C.1d files and authoritative scope
        shell: bash
        run: |
          set -euo pipefail
          cat .github/tai-ap13c1d-v2.part-* | base64 --decode > /tmp/tai-ap13c1d-v2.tar.gz
          tar -xzf /tmp/tai-ap13c1d-v2.tar.gz -C .
          python3 - <<'PY'
          import json
          from pathlib import Path

          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          scope_path = Path('apps/tai/governance/scopes/ap-13c1d-quality-scoring-2993.json')
          state = json.loads(state_path.read_text(encoding='utf-8'))
          scope = json.loads(scope_path.read_text(encoding='utf-8'))
          branch = scope['branch']
          allowed = scope['allowed_paths']
          approved = state.setdefault('approvedConcurrentScopes', {})
          approved[branch] = allowed
          state_path.write_text(
              json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n',
              encoding='utf-8',
          )
          PY
          rm -f /tmp/tai-ap13c1d-v2.tar.gz
          rm -f .github/tai-ap13c1d-v2.part-*
          rm -f .github/workflows/tai-ap13c1d-v2-materialize.yml

      - name: Commit exact bounded replacement
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'pachaninm-lab'
          git config user.email 'pachaninm-lab@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'fix(tai): harden AP-13C.1d trust authorities'
          git push origin HEAD:agent/tai-ap-13c1d-quality-scoring
