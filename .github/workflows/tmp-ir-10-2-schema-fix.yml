name: Temporary IR-10.2 schema correction

on:
  push:
    branches:
      - agent/ir-10-2-logistics-postgresql-authority

permissions:
  contents: write

concurrency:
  group: tmp-ir-10-2-schema-fix
  cancel-in-progress: true

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-2-logistics-postgresql-authority
          fetch-depth: 0
      - name: Correct Prisma schema without touching logistics scope
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          p = Path('apps/api/prisma/schema.prisma')
          s = p.read_text()
          replacements = {
              'map: "dw_runtime_snapshots_outbox_entry_id_key"': 'map: "dw_runtime_snapshots_outbox_fkey"',
              'map: "dw_runtime_snapshots_audit_event_id_key"': 'map: "dw_runtime_snapshots_audit_fkey"',
              '  accessLevel      String   @default("WORK")\n  status           String   @default("ACTIVE")': '  accessLevel      String   @default("WORK") // READ | WORK | APPROVE\n  status           String   @default("ACTIVE") // ACTIVE | SUSPENDED | REVOKED',
              '  correlationId   String?\n  createdByOrgId': '  correlationId    String?\n  createdByOrgId',
          }
          for old, new in replacements.items():
              if old in s:
                  s = s.replace(old, new)
          p.write_text(s)
          PY
          pnpm --filter @pc/api exec prisma validate --schema prisma/schema.prisma
      - name: Commit correction
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- apps/api/prisma/schema.prisma; then
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/prisma/schema.prisma
          git commit -m 'fix(logistics): restore unique Prisma FK map names'
          git push origin HEAD:agent/ir-10-2-logistics-postgresql-authority
