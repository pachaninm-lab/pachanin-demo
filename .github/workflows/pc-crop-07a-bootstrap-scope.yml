name: PC-CROP-07A bootstrap scope authority

on:
  push:
    branches:
      - agent/pc-crop-07a-scope-authority

permissions:
  contents: write

concurrency:
  group: pc-crop-07a-scope-authority-bootstrap
  cancel-in-progress: false

jobs:
  bootstrap:
    name: Materialize one-file governance authority
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add exact approved concurrent scope
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const statePath = 'docs/platform-v7/autopilot/autopilot-state.json';
          const workflowPath = '.github/workflows/pc-crop-07a-bootstrap-scope.yml';
          const branch = 'agent/pc-crop-07a-integration-inbox';
          const allowedPaths = [
            '.github/workflows/pc-crop-07a.yml',
            'apps/api/prisma/schema.prisma',
            'apps/api/prisma/migrations/20260722*_regulatory_integration_inbox/**',
            'apps/api/src/modules/regulatory-integration/**',
            'apps/api/src/modules/integration-events/integration-events.module.ts',
            'apps/api/test/industrial/regulatory-integration-inbox.e2e-spec.ts',
            'infra/sql/postgresql-regulatory-integration-inbox-policies.sql',
            'scripts/verify-pc-crop-07a.mjs',
            'docs/platform-v7/autopilot/scopes/pc-crop-07a.json',
            'scripts/p7-autopilot-guard.sh'
          ];
          const state = JSON.parse(fs.readFileSync(statePath, 'utf8'));
          if (!state.approvedConcurrentScopes || typeof state.approvedConcurrentScopes !== 'object' || Array.isArray(state.approvedConcurrentScopes)) {
            throw new Error('approvedConcurrentScopes is missing or invalid');
          }
          const existing = state.approvedConcurrentScopes[branch];
          if (existing !== undefined && JSON.stringify(existing) !== JSON.stringify(allowedPaths)) {
            throw new Error(`Conflicting existing authority for ${branch}`);
          }
          state.approvedConcurrentScopes[branch] = allowedPaths;
          fs.writeFileSync(statePath, JSON.stringify(state));
          fs.unlinkSync(workflowPath);
          NODE

      - name: Verify exact mutation boundary
        shell: bash
        run: |
          set -euo pipefail
          test "$(git diff --name-only | sort)" = "docs/platform-v7/autopilot/autopilot-state.json"
          node -e "const s=require('./docs/platform-v7/autopilot/autopilot-state.json'); const p=s.approvedConcurrentScopes['agent/pc-crop-07a-integration-inbox']; if(!Array.isArray(p)||p.length!==10) process.exit(1)"

      - name: Publish materialized authority
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json .github/workflows/pc-crop-07a-bootstrap-scope.yml
          git commit -m 'PC-CROP-07A: authorize integration inbox implementation scope'
          git push origin HEAD:agent/pc-crop-07a-scope-authority
