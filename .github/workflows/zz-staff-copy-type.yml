name: normalize staff copy typing

on:
  push:
    branches:
      - ui/staff-control-center

permissions:
  contents: write

jobs:
  patch-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/staff-control-center
          fetch-depth: 0
      - name: Normalize localized copy contract and self-remove
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/i18n/staff-messages.ts')
          text = path.read_text()
          text = text.replace("export type StaffCopy = typeof STAFF_MESSAGES.ru;\n\n", '')
          marker = "} as const satisfies Record<AppLocale, Record<string, string>>;\n\n"
          replacement = marker + "export type StaffCopy = { [K in keyof (typeof STAFF_MESSAGES)['ru']]: string };\n\n"
          if marker not in text:
              raise SystemExit('staff messages marker not found')
          text = text.replace(marker, replacement, 1)
          text = text.replace("return STAFF_MESSAGES[(locale in STAFF_MESSAGES ? locale : 'ru') as AppLocale];", "return STAFF_MESSAGES[(locale in STAFF_MESSAGES ? locale : 'ru') as AppLocale] as StaffCopy;")
          path.write_text(text)
          PY
          git rm .github/workflows/zz-staff-copy-type.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/i18n/staff-messages.ts
          git add -u
          git commit -m 'Normalize RU EN ZH staff copy contract'
          git push origin HEAD:ui/staff-control-center
