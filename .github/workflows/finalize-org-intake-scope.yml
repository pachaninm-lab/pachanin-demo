name: Finalize clean organization intake scope

on:
  push:
    branches:
      - agent/platform-v7-organization-intake-v1
    paths:
      - '.github/workflows/finalize-org-intake-scope.yml'

permissions:
  contents: write

concurrency:
  group: finalize-org-intake-scope
  cancel-in-progress: false

jobs:
  finalize:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/platform-v7-organization-intake-v1
          fetch-depth: 0

      - name: Restore shared authorities and register concurrent scope
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          git show origin/main:apps/api/src/app.module.ts > apps/api/src/app.module.ts
          git show origin/main:scripts/p7-autopilot-guard.sh > scripts/p7-autopilot-guard.sh
          git show origin/main:.github/workflows/pc-crop-01b3.yml > .github/workflows/pc-crop-01b3.yml

          cat > apps/api/src/modules/organizations/organizations.module.ts <<'TS'
          import { Module } from '@nestjs/common';
          import { OrganizationIntakeModule } from '../organization-intake/organization-intake.module';
          import { OrganizationsService } from './organizations.service';
          import { OrganizationsController } from './organizations.controller';

          @Module({
            imports: [OrganizationIntakeModule],
            providers: [OrganizationsService],
            controllers: [OrganizationsController],
            exports: [OrganizationsService],
          })
          export class OrganizationsModule {}
          TS
          sed -i 's/^          //' apps/api/src/modules/organizations/organizations.module.ts

          python3 - <<'PY'
          import json
          from pathlib import Path

          branch = 'agent/platform-v7-organization-intake-v1'
          allowed = [
              'apps/api/prisma/schema.prisma',
              'apps/api/prisma/migrations/20260723113000_public_organization_connection_intake/**',
              'apps/api/src/modules/organization-intake/**',
              'apps/api/src/modules/organizations/organizations.module.ts',
              'apps/api/test/industrial/organization-intake-postgresql.e2e-spec.ts',
              'apps/web/app/api/platform-v7/organization-connect/route.ts',
              'apps/web/components/platform-v7/OrganizationConnectForm.tsx',
              'apps/web/components/platform-v7/OrganizationConnectForm.module.css',
              'apps/web/i18n/platform-v7-organization-connect.ts',
              'apps/web/tests/unit/platformV7OrganizationConnectIntake.test.ts',
              'docs/platform-v7/autopilot/autopilot-state.json',
              'docs/platform-v7/autopilot/scopes/platform-v7-organization-intake-v1.json',
          ]

          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(state_path.read_text())
          state.setdefault('approvedConcurrentScopes', {})[branch] = allowed
          state_path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n')

          scope_path = Path('docs/platform-v7/autopilot/scopes/platform-v7-organization-intake-v1.json')
          scope = json.loads(scope_path.read_text())
          scope['allowedPaths'] = allowed
          scope_path.write_text(json.dumps(scope, ensure_ascii=False, indent=2) + '\n')
          PY

          git rm .github/workflows/finalize-org-intake-scope.yml
          bash -n scripts/p7-autopilot-guard.sh
          GITHUB_HEAD_REF=agent/platform-v7-organization-intake-v1 \
            BASE_REF=origin/main \
            HEAD_REF=HEAD \
            bash scripts/p7-autopilot-guard.sh

      - name: Commit final clean scope
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'refactor(intake): isolate module and use concurrent scope registry'
          git push origin HEAD:agent/platform-v7-organization-intake-v1
