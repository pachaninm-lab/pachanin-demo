name: platform-v7 hosting smoke

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Primary host (Netlify · vermillion-kitsune) — required route QA
        run: |
          set -e
          # Netlify is the sole production host. Hard gate: main must serve the
          # key product-entry and cockpit routes.
          base="https://vermillion-kitsune-0e7b97.netlify.app"
          for route in \
            /platform-v7/ \
            /platform-v7/control-tower \
            /platform-v7/buyer \
            /platform-v7/bank \
            /platform-v7/driver/field \
            /platform-v7/register \
            /platform-v7/login; do
            echo "checking ${base}${route}"
            curl -L --fail --retry 10 --retry-delay 15 "${base}${route}" -o /dev/null
          done

      - name: Secondary host (Netlify · gleaming-mandazi) — non-fatal
        run: |
          if curl -L --fail --retry 3 --retry-delay 10 https://gleaming-mandazi-bb9856.netlify.app/platform-v7/ -o /dev/null; then
            echo "Secondary Netlify: OK"
          else
            echo "::warning::Secondary Netlify (gleaming-mandazi) is not serving."
          fi
