name: Bootstrap production full-stack scope mapping

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - '.github/workflows/bootstrap-production-full-stack-scope.yml'

permissions:
  contents: write

concurrency:
  group: bootstrap-production-full-stack-scope
  cancel-in-progress: false

jobs:
  bootstrap:
    if: github.head_ref == 'governance/production-full-stack-release-v1'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/production-full-stack-release-v1
          fetch-depth: 0

      - name: Register source-controlled scope manifests
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('scripts/p7-autopilot-guard.sh')
          text = path.read_text()
          anchor = "  'agent/platform-v7-strategic-rebuild-v3': 'docs/platform-v7/autopilot/scopes/platform-v7-strategic-rebuild-v3.json',\n"
          entries = (
            "  'governance/production-full-stack-release-v1': 'docs/platform-v7/autopilot/scopes/governance-production-full-stack-release-v1.json',\n"
            "  'ops/production-full-stack-release-v1': 'docs/platform-v7/autopilot/scopes/production-full-stack-release-v1.json',\n"
          )
          if "'ops/production-full-stack-release-v1':" not in text:
            if anchor not in text:
              raise SystemExit('canonical source-controlled scope anchor not found')
            text = text.replace(anchor, anchor + entries, 1)
            path.write_text(text)
          PY
          grep -Fq "'governance/production-full-stack-release-v1':" scripts/p7-autopilot-guard.sh
          grep -Fq "'ops/production-full-stack-release-v1':" scripts/p7-autopilot-guard.sh
          git rm .github/workflows/bootstrap-production-full-stack-scope.yml

      - name: Commit scope mapping
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'governance(release): register full-stack exact-SHA scope'
          GITHUB_HEAD_REF=governance/production-full-stack-release-v1 \
            BASE_REF=origin/main \
            HEAD_REF=HEAD \
            bash scripts/p7-autopilot-guard.sh
          git push origin HEAD:governance/production-full-stack-release-v1
