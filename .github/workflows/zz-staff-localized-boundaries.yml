name: localize staff route boundaries

on:
  push:
    branches:
      - ui/staff-control-center

permissions:
  contents: write

jobs:
  patch-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/staff-control-center
          fetch-depth: 0
      - name: Write localized loading and error boundaries
        shell: bash
        run: |
          set -euo pipefail
          cat > apps/web/app/platform-v7/staff/loading.tsx <<'EOF'
          'use client';

          import { useLocale } from 'next-intl';
          import { getStaffCopy } from '@/i18n/staff-messages';

          export default function StaffLoading() {
            const copy = getStaffCopy(useLocale());
            return (
              <section className='pc-staff-state' aria-live='polite' aria-busy='true'>
                <span aria-hidden='true'>◆</span>
                <h1>{copy.product}</h1>
                <p>{copy.loading}</p>
              </section>
            );
          }
          EOF
          sed -i 's/^          //' apps/web/app/platform-v7/staff/loading.tsx

          cat > apps/web/app/platform-v7/staff/error.tsx <<'EOF'
          'use client';

          import { useLocale } from 'next-intl';
          import { getStaffCopy } from '@/i18n/staff-messages';

          export default function StaffError({ reset }: { error: Error & { digest?: string }; reset: () => void }) {
            const copy = getStaffCopy(useLocale());
            return (
              <section className='pc-staff-state' role='alert'>
                <span aria-hidden='true'>!</span>
                <h1>{copy.unavailableTitle}</h1>
                <p>{copy.unavailableText}</p>
                <button type='button' onClick={reset}>{copy.retry}</button>
              </section>
            );
          }
          EOF
          sed -i 's/^          //' apps/web/app/platform-v7/staff/error.tsx
          git rm .github/workflows/zz-staff-localized-boundaries.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/web/app/platform-v7/staff/loading.tsx apps/web/app/platform-v7/staff/error.tsx
          git add -u
          git commit -m 'Localize staff route loading and error states'
          git push origin HEAD:ui/staff-control-center
