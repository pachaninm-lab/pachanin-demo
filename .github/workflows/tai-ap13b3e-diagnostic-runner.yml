name: TAI AP-13B.3e Diagnostic Runner

on:
  push:
    branches:
      - agent/tai-ap-13b3e-immutable-storage-contract
    paths:
      - .github/workflows/tai-ap13b3e-diagnostic-runner.yml

permissions:
  contents: write

jobs:
  diagnose:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13b3e-immutable-storage-contract
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Execute patch and preserve bounded failure evidence
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          source = Path('.github/workflows/tai-ap13b3e-contract-patch.yml')
          lines = source.read_text(encoding='utf-8').splitlines()
          marker = '        run: |'
          start = lines.index(marker)
          script: list[str] = []
          for line in lines[start + 1:]:
              if line.startswith('          '):
                  script.append(line[10:])
              elif not line.strip():
                  script.append('')
              else:
                  break
          if not script or not any('Correct non-self-referential' in line for line in lines):
              raise SystemExit('PATCH_SCRIPT_EXTRACTION_FAILED')
          Path('/tmp/tai-ap13b3e-patch.sh').write_text('\n'.join(script) + '\n', encoding='utf-8')
          PY

          set +e
          bash /tmp/tai-ap13b3e-patch.sh > /tmp/tai-ap13b3e-patch.log 2>&1
          status=$?
          set -e
          if [[ "$status" -eq 0 ]]; then
            exit 0
          fi

          git reset --hard HEAD
          {
            printf 'exit_code=%s\n' "$status"
            printf '%s\n' '--- bounded tail ---'
            tail -n 240 /tmp/tai-ap13b3e-patch.log
          } > tai-ap13b3e-patch-failure.txt
          rm .github/workflows/tai-ap13b3e-diagnostic-runner.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add tai-ap13b3e-patch-failure.txt .github/workflows/tai-ap13b3e-diagnostic-runner.yml
          git commit -m 'chore(tai): preserve bounded AP-13B.3e patch failure'
          git push origin HEAD:agent/tai-ap-13b3e-immutable-storage-contract
          exit "$status"
