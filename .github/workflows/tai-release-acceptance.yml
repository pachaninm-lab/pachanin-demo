name: TAI Release Acceptance

on:
  push:
    branches: [main]
    paths:
      - 'apps/tai/**'
      - '.github/workflows/tai-foundation.yml'
      - '.github/workflows/tai-release-acceptance.yml'
  workflow_dispatch:

permissions:
  actions: read
  contents: read

concurrency:
  group: tai-release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  exact-main-attestation:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GH_TOKEN: ${{ github.token }}
      EXACT_HEAD: ${{ github.sha }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout exact main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Wait for required exact-main workflows
        shell: bash
        run: |
          set -euo pipefail
          required_json='[
            "Auction Atomic Execution Acceptance",
            "CI",
            "Dependency Review",
            "Disputes PostgreSQL Authority Acceptance",
            "Node CI",
            "Optional Runtime Retirement Gate",
            "Outbox PostgreSQL Authority Acceptance",
            "Runtime Context Security Gate",
            "Security Abuse and Evidence Acceptance",
            "Security Quality Gate",
            "Security Scan",
            "TAI Foundation"
          ]'
          printf '%s\n' "$required_json" > required-workflows.json

          for attempt in $(seq 1 90); do
            gh api \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${REPOSITORY}/actions/runs?head_sha=${EXACT_HEAD}&per_page=100" \
              > workflow-runs-raw.json

            set +e
            python - <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          required = set(json.loads(Path("required-workflows.json").read_text()))
          raw = json.loads(Path("workflow-runs-raw.json").read_text())
          exact_head = os.environ["EXACT_HEAD"]
          runs = raw.get("workflow_runs", [])
          latest = {}
          for run in runs:
              name = run.get("name")
              if name not in required or run.get("head_sha") != exact_head:
                  continue
              current = latest.get(name)
              key = (run.get("run_number", 0), run.get("id", 0))
              if current is None or key > current[0]:
                  latest[name] = (key, run)

          missing = sorted(required - set(latest))
          pending = sorted(
              name
              for name, (_, run) in latest.items()
              if run.get("status") != "completed"
          )
          failed = sorted(
              name
              for name, (_, run) in latest.items()
              if run.get("status") == "completed" and run.get("conclusion") != "success"
          )
          state = {"failed": failed, "missing": missing, "pending": pending}
          Path("workflow-wait-state.json").write_text(
              json.dumps(state, indent=2, sort_keys=True) + "\n"
          )
          if failed:
              print(json.dumps(state, sort_keys=True))
              raise SystemExit(2)
          if missing or pending:
              print(json.dumps(state, sort_keys=True))
              raise SystemExit(3)

          evidence = []
          for name in sorted(required):
              run = latest[name][1]
              completed_at = run.get("updated_at")
              if not isinstance(completed_at, str):
                  raise SystemExit(f"workflow {name} has no completion timestamp")
              evidence.append(
                  {
                      "completed_at": completed_at,
                      "conclusion": run["conclusion"],
                      "exact_head_sha": exact_head,
                      "run_id": run["id"],
                      "run_url": run["html_url"],
                      "workflow_name": name,
                  }
              )
          Path("workflow-evidence.json").write_text(
              json.dumps(evidence, indent=2, sort_keys=True) + "\n"
          )
          PY
            status=$?
            set -e

            if [ "$status" -eq 0 ]; then
              echo "All required exact-main workflows are successful."
              break
            fi
            if [ "$status" -eq 2 ]; then
              echo "At least one required workflow failed." >&2
              cat workflow-wait-state.json >&2
              exit 1
            fi
            if [ "$attempt" -eq 90 ]; then
              echo "Timed out waiting for required exact-main workflows." >&2
              cat workflow-wait-state.json >&2
              exit 1
            fi
            sleep 20
          done

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml

      - name: Install TAI release authority
        working-directory: apps/tai
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Build exact-main application release attestation
        shell: bash
        run: |
          set -euo pipefail
          created_at="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          python -m tai.release_acceptance_cli \
            --repository "$REPOSITORY" \
            --exact-head "$EXACT_HEAD" \
            --repository-root "$GITHUB_WORKSPACE" \
            --workflow-evidence "$GITHUB_WORKSPACE/workflow-evidence.json" \
            --created-at "$created_at" \
            --output "$GITHUB_WORKSPACE/tai-release-attestation.json" \
            | tee tai-release-attestation.compact.json

      - name: Verify attestation is bound to workflow SHA
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          attestation = json.loads(Path("tai-release-attestation.json").read_text())
          if attestation.get("exact_main_sha") != os.environ["EXACT_HEAD"]:
              raise SystemExit("attestation exact_main_sha mismatch")
          if attestation.get("accepted") is not True:
              raise SystemExit("application release attestation is not accepted")
          if attestation.get("production_operational_status") != "NOT_ATTESTED":
              raise SystemExit("CI must not fabricate production operational acceptance")
          PY

      - name: Upload exact-main release evidence
        uses: actions/upload-artifact@v4
        with:
          name: tai-release-attestation-${{ github.sha }}
          path: |
            tai-release-attestation.json
            workflow-evidence.json
            workflow-wait-state.json
          if-no-files-found: error
          retention-days: 90
