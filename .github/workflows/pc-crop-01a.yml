name: PC-CROP-01A Commodity Foundation

on:
  pull_request:
    branches: [main]
    paths:
      - 'packages/domain-core/package.json'
      - 'packages/domain-core/src/index.ts'
      - 'packages/domain-core/src/commodity-profile.ts'
      - 'packages/domain-core/src/commodity-profile.test.ts'
      - 'apps/web/components/crop-platform/**'
      - 'docs/crop-platform/**'
      - 'scripts/verify-pc-crop-01a.mjs'
      - '.github/workflows/pc-crop-01a.yml'
  push:
    branches: [main]
    paths:
      - 'packages/domain-core/package.json'
      - 'packages/domain-core/src/index.ts'
      - 'packages/domain-core/src/commodity-profile.ts'
      - 'packages/domain-core/src/commodity-profile.test.ts'
      - 'apps/web/components/crop-platform/**'
      - 'docs/crop-platform/**'
      - 'scripts/verify-pc-crop-01a.mjs'
      - '.github/workflows/pc-crop-01a.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pc-crop-01a-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  exact-foundation:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout exact revision
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install exact dependency graph
        run: pnpm install --frozen-lockfile

      - name: Verify bounded source and interface authority
        run: node scripts/verify-pc-crop-01a.mjs --output pc-crop-01a-acceptance.json

      - name: Run commodity profile domain tests
        run: pnpm exec vitest run packages/domain-core/src/commodity-profile.test.ts

      - name: Typecheck domain authority
        run: pnpm typecheck:domain

      - name: Typecheck industrial interface contract
        run: pnpm --filter @pc/web typecheck

      - name: Upload exact-head acceptance
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pc-crop-01a-acceptance-${{ github.sha }}
          path: pc-crop-01a-acceptance.json
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
          overwrite: false
