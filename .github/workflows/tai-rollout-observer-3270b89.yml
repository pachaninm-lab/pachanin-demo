name: TAI Rollout Observer 3270b89

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tai-rollout-observer-3270b89.yml'

permissions:
  actions: read
  contents: read

jobs:
  observe:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      FAILED_JOB_ID: '88791582410'
    steps:
      - name: Print exact sanitized SSH preflight failure
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$REPOSITORY/actions/jobs/$FAILED_JOB_ID/logs" \
            -o job.log
          sed -E \
            -e 's/\x1B\[[0-9;]*[A-Za-z]//g' \
            -e '/BEGIN OPENSSH PRIVATE KEY/,/END OPENSSH PRIVATE KEY/c\[REDACTED_PRIVATE_KEY]' \
            -e 's/[A-Za-z0-9._-]+@[A-Za-z0-9._:-]+/[REDACTED_SSH_IDENTITY]/g' \
            job.log > sanitized.log
          echo '=== SSH PREFLIGHT DIAGNOSTICS ==='
          grep -nEi -C 4 \
            'resolve and prove|ssh|dns|private key|key-only|fingerprint|known_hosts|permission|invalid|error|failed|mismatch|timeout|not configured|exit code' \
            sanitized.log | tail -220
