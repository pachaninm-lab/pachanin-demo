name: TAI Rollout Observer 3270b89

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tai-rollout-observer-3270b89.yml'

permissions:
  actions: read
  contents: read

jobs:
  observe:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      ARTIFACT_ID: '8513580647'
    steps:
      - name: Print exact sanitized rollout evidence
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p evidence
          curl -fsSL \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "https://api.github.com/repos/$REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" \
            -o evidence.zip
          unzip -q evidence.zip -d evidence
          echo '=== EVIDENCE FILES ==='
          find evidence -type f -printf '%P\n' | sort
          echo '=== SANITIZED TEXT EVIDENCE ==='
          while IFS= read -r file; do
            case "$file" in
              *.txt|*.md|*.log|*.json)
                echo "--- ${file#evidence/} ---"
                sed -E \
                  -e '/BEGIN OPENSSH PRIVATE KEY/,/END OPENSSH PRIVATE KEY/c\[REDACTED_PRIVATE_KEY]' \
                  -e 's/[A-Za-z0-9._-]+@[A-Za-z0-9._:-]+/[REDACTED_SSH_IDENTITY]/g' \
                  "$file" | head -200
                ;;
            esac
          done < <(find evidence -type f | sort)
