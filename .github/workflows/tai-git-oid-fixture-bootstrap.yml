name: TAI Git OID Fixture Bootstrap

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tai-git-oid-fixture-bootstrap.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update migration fixtures to 0012
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          release = Path('apps/tai/tests/test_release_acceptance.py')
          text = release.read_text(encoding='utf-8')
          old = 'def _migration_inventory(last: int = 11) -> MigrationInventory:'
          new = 'def _migration_inventory(last: int = 12) -> MigrationInventory:'
          if text.count(old) != 1:
              raise SystemExit('release fixture anchor missing or duplicated')
          release.write_text(text.replace(old, new, 1), encoding='utf-8')

          cli = Path('apps/tai/tests/test_release_acceptance_cli.py')
          text = cli.read_text(encoding='utf-8')
          replacements = {
              'for version in range(1, 12):': 'for version in range(1, 13):',
              'assert len(attestation["migration_inventory"]) == 11': 'assert len(attestation["migration_inventory"]) == 12',
          }
          for old, new in replacements.items():
              if text.count(old) != 1:
                  raise SystemExit(f'CLI fixture anchor missing or duplicated: {old}')
              text = text.replace(old, new, 1)
          cli.write_text(text, encoding='utf-8')

          Path('.github/workflows/tai-git-oid-fixture-bootstrap.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'test(tai): advance release fixtures through migration 0012'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
