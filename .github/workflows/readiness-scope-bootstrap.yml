name: Readiness resilience scope bootstrap

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/readiness-scope-bootstrap.yml

permissions:
  contents: write

concurrency:
  group: readiness-scope-bootstrap
  cancel-in-progress: true

jobs:
  publish-governance-state:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact governance branch
        uses: actions/checkout@v4
        with:
          ref: governance/authorize-pgbouncer-readiness-resilience
          fetch-depth: 0
          persist-credentials: true

      - name: Enforce bootstrap-only input
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_HEAD_REF}" = "governance/authorize-pgbouncer-readiness-resilience"
          git fetch --no-tags origin main
          test "$(git diff --name-only origin/main...HEAD)" = ".github/workflows/readiness-scope-bootstrap.yml"

      - name: Add exact governed runtime paths
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/platform-v7/autopilot/autopilot-state.json';
          const state = JSON.parse(fs.readFileSync(path, 'utf8'));
          state.approvedConcurrentScopes ??= {};
          const branch = 'agent/ir-sec-transitive-runtime-remediation';
          const exact = [
            'apps/api/src/health.controller.ts',
            'apps/api/src/health.controller.spec.ts',
          ];
          const current = Array.isArray(state.approvedConcurrentScopes[branch])
            ? state.approvedConcurrentScopes[branch]
            : [];
          state.approvedConcurrentScopes[branch] = [...new Set([...current, ...exact])];
          fs.writeFileSync(path, `${JSON.stringify(state)}\n`);
          NODE
          node <<'NODE'
          const fs = require('node:fs');
          const state = JSON.parse(fs.readFileSync('docs/platform-v7/autopilot/autopilot-state.json', 'utf8'));
          const scope = state.approvedConcurrentScopes?.['agent/ir-sec-transitive-runtime-remediation'];
          const expected = [
            'apps/api/src/health.controller.ts',
            'apps/api/src/health.controller.spec.ts',
          ];
          if (!Array.isArray(scope)) throw new Error('governed branch scope missing');
          for (const path of expected) if (!scope.includes(path)) throw new Error(`missing exact path: ${path}`);
          NODE

      - name: Publish final one-file governance change
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/readiness-scope-bootstrap.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/platform-v7/autopilot/autopilot-state.json .github/workflows/readiness-scope-bootstrap.yml
          git commit -m "governance: authorize readiness resilience paths"
          changed="$(git diff --name-only origin/main...HEAD)"
          test "$changed" = "docs/platform-v7/autopilot/autopilot-state.json"
          git push origin HEAD:governance/authorize-pgbouncer-readiness-resilience
