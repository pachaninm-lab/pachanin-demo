name: TAI Migration Manifest Bootstrap

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tai-migration-manifest-bootstrap.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Add immutable migration manifest authority
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from __future__ import annotations

          import json
          from pathlib import Path

          root = Path('.')
          migration_root = root / 'apps/tai/tai/migrations'
          migration_names = [
              '0001_loader_state.sql',
              '0002_materialization_claims.sql',
              '0003_loader_recovery.sql',
              '0004_loader_checkpoints.sql',
              '0005_retrieval_index.sql',
              '0006_rag_trace.sql',
              '0007_local_model_runtime.sql',
              '0008_agent_tool_runtime.sql',
              '0009_evaluation_authority.sql',
              '0010_operational_authority.sql',
              '0010_orchestration_runtime.sql',
              '0011_release_attestation.sql',
              '0012_git_object_id_contract.sql',
          ]
          actual = sorted(path.name for path in migration_root.glob('*.sql'))
          if sorted(migration_names) != actual:
              raise SystemExit(f'unexpected migration inventory: {actual}')
          manifest = {
              'schema_version': 'tai.migration.manifest.v1',
              'migrations': [
                  {'path': name, 'version': version}
                  for version, name in enumerate(migration_names, start=1)
              ],
          }
          (migration_root / 'manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )

          release = root / 'apps/tai/tai/release_acceptance.py'
          text = release.read_text(encoding='utf-8')
          old = 'minimum_migration_version: int = 12'
          new = 'minimum_migration_version: int = 13'
          if text.count(old) != 1:
              raise SystemExit('release migration policy anchor missing or duplicated')
          release.write_text(text.replace(old, new, 1), encoding='utf-8')

          cli = root / 'apps/tai/tai/release_acceptance_cli.py'
          text = cli.read_text(encoding='utf-8')
          start = text.index('def _migration_inventory(repository_root: Path) -> MigrationInventory:\n')
          end = text.index('\n\ndef _source_digest(repository_root: Path) -> str:\n', start)
          replacement = '''def _migration_inventory(repository_root: Path) -> MigrationInventory:\n    root = repository_root / "apps/tai/tai/migrations"\n    manifest_path = root / "manifest.json"\n    if not manifest_path.is_file():\n        raise ValueError("migration manifest is required")\n    raw = json.loads(manifest_path.read_text(encoding="utf-8"))\n    if not isinstance(raw, dict):\n        raise ValueError("migration manifest must be a JSON object")\n    if raw.get("schema_version") != "tai.migration.manifest.v1":\n        raise ValueError("migration manifest schema version is unsupported")\n    items = raw.get("migrations")\n    if not isinstance(items, list) or not items:\n        raise ValueError("migration manifest must contain a non-empty migrations array")\n\n    declared_paths: list[str] = []\n    migrations: list[MigrationArtifact] = []\n    for item in items:\n        if not isinstance(item, dict):\n            raise ValueError("migration manifest entries must be objects")\n        version = item.get("version")\n        name = item.get("path")\n        if not isinstance(version, int) or isinstance(version, bool) or version < 1:\n            raise ValueError("migration manifest version must be a positive integer")\n        if (\n            not isinstance(name, str)\n            or Path(name).name != name\n            or _MIGRATION.fullmatch(name) is None\n        ):\n            raise ValueError("migration manifest path must be a bounded governed SQL filename")\n        declared_paths.append(name)\n        path = root / name\n        migrations.append(\n            MigrationArtifact(\n                version=version,\n                path=path.relative_to(repository_root).as_posix(),\n                sha256=_file_sha256(path) if path.is_file() else "0" * 64,\n            )\n        )\n\n    if len(declared_paths) != len(set(declared_paths)):\n        raise ValueError("migration manifest paths must be unique")\n    available = {path.name for path in root.glob("*.sql")}\n    declared = set(declared_paths)\n    if declared != available:\n        missing_from_manifest = sorted(available - declared)\n        missing_on_disk = sorted(declared - available)\n        raise ValueError(\n            "migration manifest coverage mismatch: "\n            f"missing_from_manifest={missing_from_manifest}, missing_on_disk={missing_on_disk}"\n        )\n    return MigrationInventory(tuple(migrations))\n'''
          cli.write_text(text[:start] + replacement + text[end:], encoding='utf-8')

          release_tests = root / 'apps/tai/tests/test_release_acceptance.py'
          text = release_tests.read_text(encoding='utf-8')
          old = 'def _migration_inventory(last: int = 12) -> MigrationInventory:'
          new = 'def _migration_inventory(last: int = 13) -> MigrationInventory:'
          if text.count(old) != 1:
              raise SystemExit('release test migration fixture anchor missing or duplicated')
          release_tests.write_text(text.replace(old, new, 1), encoding='utf-8')

          cli_tests = root / 'apps/tai/tests/test_release_acceptance_cli.py'
          text = cli_tests.read_text(encoding='utf-8')
          old_block = '''    migration_root = root / "apps/tai/tai/migrations"\n    migration_root.mkdir(parents=True)\n    for version in range(1, 13):\n        (migration_root / f"{version:04d}_migration.sql").write_text(\n            f"-- migration {version}\\nSELECT {version};\\n"\n        )\n'''
          new_block = '''    migration_root = root / "apps/tai/tai/migrations"\n    migration_root.mkdir(parents=True)\n    migration_names = [\n        *(f"{version:04d}_migration.sql" for version in range(1, 10)),\n        "0010_operational_authority.sql",\n        "0010_orchestration_runtime.sql",\n        "0011_release_attestation.sql",\n        "0012_git_object_id_contract.sql",\n    ]\n    for version, name in enumerate(migration_names, start=1):\n        (migration_root / name).write_text(f"-- migration {version}\\nSELECT {version};\\n")\n    (migration_root / "manifest.json").write_text(\n        json.dumps(\n            {\n                "schema_version": "tai.migration.manifest.v1",\n                "migrations": [\n                    {"path": name, "version": version}\n                    for version, name in enumerate(migration_names, start=1)\n                ],\n            }\n        )\n    )\n'''
          if text.count(old_block) != 1:
              raise SystemExit('CLI repository fixture block missing or duplicated')
          text = text.replace(old_block, new_block, 1)
          text = text.replace(
              'assert len(attestation["migration_inventory"]) == 12',
              'assert len(attestation["migration_inventory"]) == 13',
              1,
          )
          text = text.replace(
              'with pytest.raises(ValueError, match="not governed"):',
              'with pytest.raises(ValueError, match="manifest coverage mismatch"):',
              1,
          )
          cli_tests.write_text(text, encoding='utf-8')

          manifest_tests = root / 'apps/tai/tests/test_migration_manifest.py'
          manifest_tests.write_text(
              '''from __future__ import annotations\n\nimport json\nfrom pathlib import Path\n\nimport pytest\n\nfrom tai.release_acceptance_cli import _migration_inventory\n\n\ndef _repo_root() -> Path:\n    return Path(__file__).resolve().parents[3]\n\n\ndef test_repository_manifest_preserves_historical_paths_with_unique_authority_order() -> None:\n    inventory = _migration_inventory(_repo_root())\n    assert [item.version for item in inventory.migrations] == list(range(1, 14))\n    paths = [item.path for item in inventory.migrations]\n    assert paths[9].endswith("0010_operational_authority.sql")\n    assert paths[10].endswith("0010_orchestration_runtime.sql")\n    assert paths[-1].endswith("0012_git_object_id_contract.sql")\n\n\ndef _fixture(root: Path) -> Path:\n    migration_root = root / "apps/tai/tai/migrations"\n    migration_root.mkdir(parents=True)\n    names = ["0010_first.sql", "0010_second.sql"]\n    for name in names:\n        (migration_root / name).write_text("SELECT 1;\\n", encoding="utf-8")\n    manifest_path = migration_root / "manifest.json"\n    manifest_path.write_text(\n        json.dumps(\n            {\n                "schema_version": "tai.migration.manifest.v1",\n                "migrations": [\n                    {"path": name, "version": version}\n                    for version, name in enumerate(names, start=1)\n                ],\n            }\n        ),\n        encoding="utf-8",\n    )\n    return manifest_path\n\n\ndef test_manifest_allows_duplicate_filename_prefixes_but_not_duplicate_versions(\n    tmp_path: Path,\n) -> None:\n    manifest_path = _fixture(tmp_path)\n    inventory = _migration_inventory(tmp_path)\n    assert [item.version for item in inventory.migrations] == [1, 2]\n\n    raw = json.loads(manifest_path.read_text(encoding="utf-8"))\n    raw["migrations"][1]["version"] = 1\n    manifest_path.write_text(json.dumps(raw), encoding="utf-8")\n    with pytest.raises(ValueError, match="migration versions must be unique"):\n        _migration_inventory(tmp_path)\n\n\ndef test_manifest_rejects_unlisted_missing_duplicate_and_traversal_paths(\n    tmp_path: Path,\n) -> None:\n    manifest_path = _fixture(tmp_path)\n    migration_root = manifest_path.parent\n\n    (migration_root / "0011_unlisted.sql").write_text("SELECT 1;\\n", encoding="utf-8")\n    with pytest.raises(ValueError, match="manifest coverage mismatch"):\n        _migration_inventory(tmp_path)\n    (migration_root / "0011_unlisted.sql").unlink()\n\n    raw = json.loads(manifest_path.read_text(encoding="utf-8"))\n    raw["migrations"][1]["path"] = raw["migrations"][0]["path"]\n    manifest_path.write_text(json.dumps(raw), encoding="utf-8")\n    with pytest.raises(ValueError, match="paths must be unique"):\n        _migration_inventory(tmp_path)\n\n    manifest_path = _fixture(tmp_path)\n    raw = json.loads(manifest_path.read_text(encoding="utf-8"))\n    raw["migrations"][0]["path"] = "../escape.sql"\n    manifest_path.write_text(json.dumps(raw), encoding="utf-8")\n    with pytest.raises(ValueError, match="bounded governed SQL filename"):\n        _migration_inventory(tmp_path)\n\n    manifest_path = _fixture(tmp_path)\n    (migration_root / "0010_second.sql").unlink()\n    with pytest.raises(ValueError, match="manifest coverage mismatch"):\n        _migration_inventory(tmp_path)\n''',
              encoding='utf-8',
          )

          Path('.github/workflows/tai-migration-manifest-bootstrap.yml').unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m 'fix(tai): govern immutable migration order with manifest'
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
