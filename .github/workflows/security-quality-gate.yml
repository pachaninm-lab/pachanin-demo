name: Security Quality Gate (ТЗ 13.1)

on:
  push:
    branches: [main, 'claude/**']
  pull_request:
  schedule:
    - cron: '0 2 * * *'

concurrency:
  group: security-gate-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.2.1'

jobs:
  semgrep-sast:
    name: SAST · Semgrep
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4

      - name: Semgrep scan (TypeScript / Node.js security rules)
        run: |
          semgrep \
            --config p/typescript \
            --config p/nodejs \
            --config p/owasp-top-ten \
            --config p/injection \
            --config p/secrets \
            --sarif --output semgrep.sarif \
            --error \
            --exclude node_modules \
            --exclude dist \
            --exclude .pnpm \
            apps/api/src || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep-sast
        continue-on-error: true

      - name: Semgrep summary
        run: |
          if [ -f semgrep.sarif ]; then
            FINDINGS=$(python3 -c "import json,sys; d=json.load(open('semgrep.sarif')); print(sum(len(r.get('results',[])) for r in d.get('runs',[])))" 2>/dev/null || echo "?")
            echo "### Semgrep SAST: $FINDINGS finding(s)" >> $GITHUB_STEP_SUMMARY
          fi

  trivy-container:
    name: Trivy · Container image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Build API image (for scanning)
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t grainflow-api:scan-${{ github.sha }} \
            apps/api/ \
          || echo "Dockerfile not found, skipping image build"
        continue-on-error: true

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: grainflow-api:scan-${{ github.sha }}
          format: sarif
          output: trivy-container.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
        continue-on-error: true

      - name: Trivy filesystem scan (always runs)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'

      - name: Upload Trivy SARIF (container)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-container.sarif
          category: trivy-container
        continue-on-error: true

      - name: Upload Trivy SARIF (filesystem)
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem
        continue-on-error: true

  gitleaks:
    name: Secrets · Gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependencies · npm audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Audit (CRITICAL only — blocking)
        run: pnpm audit --audit-level=critical

      - name: Audit (HIGH — informational)
        run: pnpm audit --audit-level=high || true

  typescript-check:
    name: TypeScript · strict
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: tsc --noEmit (API)
        run: |
          cd apps/api
          npx tsc --project tsconfig.json --noEmit 2>&1 | grep -v "TS5101\|TS5107\|aka.ms" | tee /tmp/tsc-output.txt
          if grep -q "error TS" /tmp/tsc-output.txt; then
            echo "TypeScript errors found!" && exit 1
          fi
          echo "TypeScript: OK" >> $GITHUB_STEP_SUMMARY

  k6-smoke:
    name: Performance · k6 smoke gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [typescript-check]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: API compiled build diagnostic
        continue-on-error: true
        run: |
          set -o pipefail
          pnpm --filter @pc/api build 2>&1 | tee /tmp/api-k6-build.log

      - name: Upload API build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-k6-build-log
          path: /tmp/api-k6-build.log

      - name: Start API server (background)
        run: |
          cd apps/api
          NODE_ENV=test PORT=3000 \
            JWT_SECRET=test-secret-32chars-minimum-length \
            MFA_BYPASS=true \
            pnpm exec ts-node --transpile-only src/main.ts > /tmp/api-k6-smoke.log 2>&1 &
          echo "API_PID=$!" >> $GITHUB_ENV

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "API is healthy after ${i}s"
              exit 0
            fi
            sleep 2
          done

          echo "API failed to start"
          echo "----- API smoke log -----"
          cat /tmp/api-k6-smoke.log || true
          exit 1

      - name: Install k6
        run: |
          curl -fsSL https://github.com/grafana/k6/releases/download/v0.53.0/k6-v0.53.0-linux-amd64.tar.gz \
            | tar -xz --strip-components=1
          sudo mv k6 /usr/local/bin/k6

      - name: Run k6 smoke test (5 VUs × 30s)
        run: |
          k6 run \
            --vus 5 \
            --duration 30s \
            --env BASE_URL=http://localhost:3000 \
            --env AUTH_TOKEN=test-jwt-token \
            --summary-export /tmp/k6-summary.json \
            apps/api/tests/load/k6-load-test.js \
          || true

      - name: Evaluate k6 results
        run: |
          if [ -f /tmp/k6-summary.json ]; then
            P95=$(python3 -c "
          import json
          d = json.load(open('/tmp/k6-summary.json'))
          v = d.get('metrics', {}).get('http_req_duration', {}).get('values', {})
          print(v.get('p(95)', 9999))
          " 2>/dev/null || echo "9999")
            ERRORS=$(python3 -c "
          import json
          d = json.load(open('/tmp/k6-summary.json'))
          v = d.get('metrics', {}).get('http_req_failed', {}).get('values', {})
          print(v.get('rate', 1.0))
          " 2>/dev/null || echo "1.0")
            echo "### k6 Smoke Results" >> $GITHUB_STEP_SUMMARY
            echo "- p95 latency: ${P95}ms (threshold: 500ms)" >> $GITHUB_STEP_SUMMARY
            echo "- Error rate: ${ERRORS} (threshold: 0.01)" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload API smoke log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: api-k6-smoke-log
          path: /tmp/api-k6-smoke.log

      - name: Kill API server
        if: always()
        run: kill $API_PID 2>/dev/null || true

  security-gate:
    name: Security Gate · all checks
    runs-on: ubuntu-latest
    needs:
      - semgrep-sast
      - trivy-container
      - gitleaks
      - dependency-audit
      - typescript-check
    if: always()
    steps:
      - name: Check all required jobs
        run: |
          FAILED=""
          # TypeScript and gitleaks are blocking; others are informational
          if [ "${{ needs.typescript-check.result }}" != "success" ]; then
            FAILED="$FAILED typescript-check"
          fi
          if [ "${{ needs.gitleaks.result }}" == "failure" ]; then
            FAILED="$FAILED gitleaks"
          fi
          if [ "${{ needs.dependency-audit.result }}" == "failure" ]; then
            FAILED="$FAILED dependency-audit"
          fi

          if [ -n "$FAILED" ]; then
            echo "## Security Gate: FAILED ❌" >> $GITHUB_STEP_SUMMARY
            echo "Blocking checks failed:$FAILED" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "## Security Gate: PASSED ✅" >> $GITHUB_STEP_SUMMARY
          echo "All security checks passed." >> $GITHUB_STEP_SUMMARY
