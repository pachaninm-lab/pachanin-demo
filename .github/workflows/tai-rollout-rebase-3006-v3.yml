name: TAI Rollout Rebase 3006 v3

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tai-rollout-rebase-3006-v3.yml'
  push:
    branches:
      - fix/public-ai-layout-authority
    paths:
      - '.github/workflows/tai-rollout-rebase-3006-v3.yml'

permissions:
  contents: write
  issues: write

concurrency:
  group: tai-rollout-rebase-3006-v3
  cancel-in-progress: false

jobs:
  rebase-rollout:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/fix/public-ai-layout-authority') ||
      (github.event_name == 'pull_request' && github.event.pull_request.number == 3006 && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      EXPECTED_MAIN: 'fcc61811e8c8ce2f9496c0c3d0bab894168b7615'
      OLD_TARGET: '24277e008d25f66f52b56284ff83ca3eead39fb2'
      NEW_TARGET: 'fcc61811e8c8ce2f9496c0c3d0bab894168b7615'
      OLD_SHORT: '24277e0'
      NEW_SHORT: 'fcc6181'
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout rollout branch
        uses: actions/checkout@v4
        with:
          ref: fix/public-ai-layout-authority
          fetch-depth: 0
          persist-credentials: true

      - name: Merge and retarget
        id: apply
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'pachaninm-lab'
          git config user.email '263435807+pachaninm-lab@users.noreply.github.com'
          git fetch --no-tags origin main
          actual_main="$(git rev-parse origin/main)"
          printf 'expected-main=%s\nactual-main=%s\n' "$EXPECTED_MAIN" "$actual_main"
          test "$actual_main" = "$EXPECTED_MAIN"
          git merge --no-edit -X ours origin/main

          workflow='.github/workflows/deploy-ai-web-vps-c21eec0.yml'
          trigger='.github/release-triggers/tai-p0-web-24277e0.md'
          scope='docs/platform-v7/autopilot/scopes/fix-public-ai-layout-authority.json'

          sed -i "s/$OLD_TARGET/$NEW_TARGET/g" "$workflow" "$trigger" "$scope"
          sed -i \
            -e "s/Deploy TAI P0 web $OLD_SHORT/Deploy TAI P0 web $NEW_SHORT/g" \
            -e "s/DEPLOY-$OLD_SHORT/DEPLOY-$NEW_SHORT/g" \
            -e "s/sha-$OLD_SHORT/sha-$NEW_SHORT/g" \
            -e "s/deploy-tai-p0-web-$OLD_SHORT/deploy-tai-p0-web-$NEW_SHORT/g" \
            -e "s/vps-release-$OLD_SHORT/vps-release-$NEW_SHORT/g" \
            -e "s/cache_bust=\"$OLD_SHORT-/cache_bust=\"$NEW_SHORT-/g" \
            -e "s/vps-tai-p0-web-$OLD_SHORT/vps-tai-p0-web-$NEW_SHORT/g" \
            "$workflow"
          sed -i \
            -e "s/sha-$OLD_SHORT/sha-$NEW_SHORT/g" \
            -e 's/Release attempt: `4`/Release attempt: `5`/' \
            "$trigger"

          grep -Fq "$NEW_TARGET" "$workflow"
          grep -Fq "ghcr.io/pachaninm-lab/grainflow-web:sha-$NEW_SHORT" "$workflow"
          grep -Fq "DEPLOY-$NEW_SHORT" "$workflow"
          grep -Fq "$NEW_TARGET" "$trigger"
          grep -Fq "sha-$NEW_SHORT" "$trigger"
          grep -Fq "$NEW_TARGET" "$scope"
          ! grep -Fq "$OLD_TARGET" "$workflow"
          ! grep -Fq "sha-$OLD_SHORT" "$workflow"
          ! grep -Fq "DEPLOY-$OLD_SHORT" "$workflow"
          ! grep -Fq "$OLD_TARGET" "$trigger"
          ! grep -Fq "$OLD_TARGET" "$scope"

          rm -f \
            .github/workflows/tai-rollout-rebase-3006.yml \
            .github/workflows/tai-rollout-rebase-3006-v2.yml \
            .github/workflows/tai-rollout-rebase-3006-v3.yml
          git add -A
          git diff --cached --check
          git status --short
          git commit -m 'chore(release): retarget hardened rollout to patched exact-main'
          git push origin HEAD:fix/public-ai-layout-authority

      - name: Publish failure diagnostics
        if: failure()
        shell: bash
        run: |
          set +e
          body="## Rollout retarget helper failed\n\n- run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID};\n- expected main: \`${EXPECTED_MAIN}\`;\n- branch head: \`$(git rev-parse HEAD 2>/dev/null || echo unavailable)\`;\n- status:\n\n\`\`\`text\n$(git status --short 2>&1 | head -100)\n\`\`\`"
          gh api --method POST "repos/$REPOSITORY/issues/3006/comments" -f body="$body" || true
