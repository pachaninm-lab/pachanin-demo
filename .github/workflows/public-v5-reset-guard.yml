name: reset public V5 guard file

on:
  push:
    branches:
      - agent/public-home-v5-institutional-10of10
    paths:
      - '.github/workflows/public-v5-reset-guard.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-home-v5-institutional-10of10
          fetch-depth: 0
      - name: Restore main guard and remove bootstrap workflow
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch origin main
          git checkout origin/main -- scripts/p7-autopilot-guard.sh
          rm .github/workflows/public-v5-reset-guard.yml
          git add scripts/p7-autopilot-guard.sh .github/workflows/public-v5-reset-guard.yml
          git commit -m 'chore(public): restore canonical autopilot guard'
          git push origin HEAD:agent/public-home-v5-institutional-10of10
