name: production public entry watch 20260720

on:
  push:
    branches:
      - ops/public-entry-watch-20260720-2215
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  public-entry-watch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Prepare preinstalled Chrome runner
        shell: bash
        run: |
          set -euo pipefail
          CHROME_PATH="$(command -v google-chrome || command -v google-chrome-stable || command -v chromium || command -v chromium-browser)"
          test -x "$CHROME_PATH"
          echo "CHROME_PATH=$CHROME_PATH" >> "$GITHUB_ENV"
          python - <<'PY'
          from pathlib import Path
          path = Path('.github/scripts/public-entry-watch-20260720.mjs')
          source = path.read_text()
          source = source.replace("import { chromium, webkit } from '@playwright/test';", "import { chromium } from '@playwright/test';")
          source = '\n'.join(line for line in source.splitlines() if "name: 'webkit-iphone'" not in line) + '\n'
          source = source.replace("project.engine.launch({ headless: true })", "project.engine.launch({ headless: true, executablePath: process.env.CHROME_PATH })")
          source = source.replace("chromium.launch({ headless: true })", "chromium.launch({ headless: true, executablePath: process.env.CHROME_PATH })")
          path.write_text(source)
          PY
      - name: Run exact production watch
        shell: bash
        run: |
          set -o pipefail
          mkdir -p artifacts/public-entry-watch-20260720
          node .github/scripts/public-entry-watch-20260720.mjs 2>&1 | tee artifacts/public-entry-watch-20260720/run.log
      - name: Upload production watch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-watch-20260720
          path: artifacts/public-entry-watch-20260720
          if-no-files-found: error
          retention-days: 7
