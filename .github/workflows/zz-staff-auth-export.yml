name: staff auth principal export finalizer

on:
  push:
    branches:
      - security/staff-access-control-plane-foundation

permissions:
  contents: write

jobs:
  export-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/staff-access-control-plane-foundation
          fetch-depth: 0
      - name: Export the isolated auth database provider
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import re
          from pathlib import Path

          module_path = Path('apps/api/src/modules/auth/auth.module.ts')
          text = module_path.read_text()
          match = re.search(r'exports\s*:\s*\[([^\]]*)\]', text, re.S)
          if not match:
              raise SystemExit('AuthModule exports array not found')
          exports = match.group(1)
          if 'AuthPrismaService' not in exports:
              replacement = exports.rstrip()
              if replacement.strip():
                  replacement = replacement.rstrip() + ', AuthPrismaService'
              else:
                  replacement = 'AuthPrismaService'
              text = text[:match.start(1)] + replacement + text[match.end(1):]
              module_path.write_text(text)

          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(state_path.read_text())
          scope = state.setdefault('approvedConcurrentScopes', {}).setdefault(
              'security/staff-access-control-plane-foundation', []
          )
          for item in [
              'apps/api/src/modules/auth/auth.module.ts',
              'apps/api/prisma/migrations/20260711103000_staff_audit_chain_enforcement/**',
              'docs/platform-v7/security/staff-access-production-runbook.md',
          ]:
              if item not in scope:
                  scope.append(item)
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n')
          PY
          git rm .github/workflows/zz-staff-auth-export.yml
      - name: Commit and remove the temporary finalizer
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/modules/auth/auth.module.ts docs/platform-v7/autopilot/autopilot-state.json
          git add -u
          git commit -m 'Export isolated auth database provider for staff access'
          git push origin HEAD:security/staff-access-control-plane-foundation
