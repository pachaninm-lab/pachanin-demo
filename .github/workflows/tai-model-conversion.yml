name: TAI Governed Model Conversion

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

jobs:
  convert:
    if: >-
      github.ref == 'refs/heads/main' &&
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner &&
      github.event.action == 'created' &&
      github.event.issue.pull_request == null &&
      github.event.issue.number == 2835 &&
      github.event.comment.body == '/tai convert model-bundles exact-main' &&
      github.event.comment.author_association == 'OWNER' &&
      github.event.comment.user.login == github.repository_owner
    concurrency:
      group: tai-governed-model-conversion
      cancel-in-progress: false
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    env:
      GH_TOKEN: ${{ github.token }}
      MODEL_HOST: ${{ secrets.TAI_MODEL_HOST }}
      MODEL_SSH_USER: ${{ secrets.TAI_MODEL_SSH_USER }}
      MODEL_SSH_PORT: ${{ secrets.TAI_MODEL_SSH_PORT }}
      MODEL_SSH_KEY: ${{ secrets.TAI_MODEL_SSH_KEY }}

    steps:
      - name: Checkout exact main authority
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact checked-out main revision
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = 'refs/heads/main'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch --no-tags --depth=1 origin main
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install exact TAI authority package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e apps/tai

      - name: Execute governed dedicated-host conversion
        shell: bash
        run: bash apps/tai/model-artifacts/model-conversion-orchestrator-master.v1.sh

      - name: Upload bounded conversion evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tai-model-conversion-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            prerequisite-evidence
            control-package/model-conversion-authority.v1.json
            control-package/control-manifest.sha256
            remote-evidence
          if-no-files-found: warn
          retention-days: 90
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Publish bounded conversion summary
        if: always()
        shell: bash
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [[ ! -s conversion-summary.md ]]; then
            printf '%s\n' \
              '## TAI governed model conversion' \
              '' \
              "- exact-main: \`$GITHUB_SHA\`;" \
              "- workflow run: \`$GITHUB_RUN_ID\` / attempt \`$GITHUB_RUN_ATTEMPT\`;" \
              '- remote state: `FAILED_CLOSED`;' \
              '- benchmark: `NOT_RUN`;' \
              '- model admission: `NOT_DONE`;' \
              '- production operational status: `NOT_ATTESTED`.' \
              > conversion-summary.md
          fi
          jq -n --rawfile body conversion-summary.md '{body: $body}' \
            | gh api --method POST "repos/$REPOSITORY/issues/2835/comments" --input -

  status:
    if: >-
      github.ref == 'refs/heads/main' &&
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner &&
      github.event.action == 'created' &&
      github.event.issue.pull_request == null &&
      github.event.issue.number == 2932 &&
      github.event.comment.body == '/tai conversion status exact-main' &&
      github.event.comment.author_association == 'OWNER' &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      EXACT_MAIN: ${{ github.sha }}
      CURRENT_RUN_ID: ${{ github.run_id }}

    steps:
      - name: Inspect active conversion and relay bounded status
        shell: bash
        run: |
          set -euo pipefail
          gh api -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$REPOSITORY/actions/workflows/tai-model-conversion.yml/runs?event=issue_comment&per_page=20" \
            > workflow-runs.json
          mapfile -t candidate_runs < <(
            jq -r --arg current "$CURRENT_RUN_ID" \
              '.workflow_runs[] | select((.id | tostring) != $current) | .id' \
              workflow-runs.json
          )
          selected_run=''
          for run_id in "${candidate_runs[@]}"; do
            gh api -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "repos/$REPOSITORY/actions/runs/$run_id/jobs?per_page=100" \
              > "jobs-$run_id.json"
            if jq -e '.jobs[] | select(.name == "convert" and .conclusion != "skipped")' \
              "jobs-$run_id.json" >/dev/null; then
              selected_run="$run_id"
              jq --argjson id "$run_id" \
                '.workflow_runs[] | select(.id == $id)' workflow-runs.json \
                > selected-run.json
              jq '[.jobs[] | select(.name == "convert")] | first' \
                "jobs-$run_id.json" > selected-job.json
              break
            fi
          done
          test -n "$selected_run"
          test "$(jq -r '.id // empty' selected-run.json)" != ""
          test "$(jq -r '.name // empty' selected-job.json)" = "convert"

          gh api -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$REPOSITORY/issues/2835/comments?per_page=100" \
            > comments.json
          jq '[.[] | select(.user.login == "github-actions[bot]" and (.body | startswith("## TAI governed model conversion")))] | last' \
            comments.json > latest.json
          test "$(jq -r '.id // empty' latest.json)" != ""

          jq -n \
            --arg exact_main "$EXACT_MAIN" \
            --slurpfile run selected-run.json \
            --slurpfile job selected-job.json \
            --slurpfile latest latest.json \
            '{body: ("## Live governed conversion status\n\n" +
              "- status request exact-main: `" + $exact_main + "`;\n" +
              "- conversion run: `" + ($run[0].id | tostring) + "` / attempt `" + ($run[0].run_attempt | tostring) + "`;\n" +
              "- conversion exact-main: `" + $run[0].head_sha + "`;\n" +
              "- workflow state: `" + $run[0].status + "` / `" + ($run[0].conclusion // "PENDING") + "`;\n" +
              "- convert job: `" + $job[0].status + "` / `" + ($job[0].conclusion // "PENDING") + "`;\n" +
              "- latest terminal summary comment: `" + ($latest[0].id | tostring) + "` at `" + $latest[0].created_at + "`.\n\n" +
              $latest[0].body)}' \
            | gh api --method POST "repos/$REPOSITORY/issues/2932/comments" --input -
