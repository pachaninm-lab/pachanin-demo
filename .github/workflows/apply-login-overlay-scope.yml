name: apply login overlay scope

on:
  push:
    branches:
      - agent/remove-login-legacy-overlay

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/remove-login-legacy-overlay
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply deterministic scope patch
        run: python scripts/apply-login-overlay-scope.py

      - name: Remove one-shot patch machinery
        run: git rm scripts/apply-login-overlay-scope.py .github/workflows/apply-login-overlay-scope.yml

      - name: Validate and publish patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Approve exact canonical login repair scope'
          git push origin HEAD:agent/remove-login-legacy-overlay
