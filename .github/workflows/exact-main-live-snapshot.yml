name: Exact Main Live Snapshot

on:
  pull_request:
    paths:
      - '.github/workflows/exact-main-live-snapshot.yml'

permissions:
  actions: read
  contents: read

jobs:
  snapshot:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TARGET_SHA: 0951cec83c3cdb94c3d2215ecbc773763ad3ed27
      TARGET_BRANCH: main
      OUT_DIR: artifacts/exact-main-live-snapshot
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Collect exact-main runs, jobs and artifacts
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$OUT_DIR"
          node <<'NODE'
          const fs = require('node:fs');
          const repository = process.env.GITHUB_REPOSITORY;
          const targetSha = process.env.TARGET_SHA;
          const targetBranch = process.env.TARGET_BRANCH;
          const outDir = process.env.OUT_DIR;
          const token = process.env.GITHUB_TOKEN;
          const apiBase = `https://api.github.com/repos/${repository}`;
          const headers = {
            Accept: 'application/vnd.github+json',
            Authorization: `Bearer ${token}`,
            'X-GitHub-Api-Version': '2022-11-28',
            'User-Agent': 'pachanin-demo-exact-main-snapshot',
          };

          async function request(url) {
            const response = await fetch(url, { headers });
            if (!response.ok) throw new Error(`${response.status} ${url}: ${await response.text()}`);
            return response.json();
          }

          async function paginate(url, key) {
            const values = [];
            for (let page = 1; page <= 20; page += 1) {
              const joiner = url.includes('?') ? '&' : '?';
              const payload = await request(`${url}${joiner}per_page=100&page=${page}`);
              const pageValues = payload[key] || [];
              values.push(...pageValues);
              if (pageValues.length < 100) break;
            }
            return values;
          }

          (async () => {
            const ref = await request(`${apiBase}/git/ref/heads/${targetBranch}`);
            const allRuns = await paginate(`${apiBase}/actions/runs?head_sha=${targetSha}`, 'workflow_runs');
            const runs = allRuns.filter((run) => run.head_sha === targetSha && run.head_branch === targetBranch && ['push', 'workflow_dispatch'].includes(run.event));
            const snapshot = {
              schemaVersion: 1,
              repository,
              collectedAt: new Date().toISOString(),
              target: { branch: targetBranch, sha: targetSha },
              mainRefSha: ref.object?.sha || null,
              runs: [],
            };
            for (const run of runs) {
              const jobs = await paginate(`${apiBase}/actions/runs/${run.id}/jobs?filter=latest`, 'jobs');
              const artifacts = await paginate(`${apiBase}/actions/runs/${run.id}/artifacts`, 'artifacts');
              snapshot.runs.push({
                id: run.id,
                name: run.name,
                event: run.event,
                status: run.status,
                conclusion: run.conclusion,
                runNumber: run.run_number,
                runAttempt: run.run_attempt,
                createdAt: run.created_at,
                updatedAt: run.updated_at,
                jobs: jobs.map((job) => ({ id: job.id, name: job.name, status: job.status, conclusion: job.conclusion, steps: (job.steps || []).map((step) => ({ name: step.name, status: step.status, conclusion: step.conclusion })) })),
                artifacts: artifacts.map((artifact) => ({ id: artifact.id, name: artifact.name, digest: artifact.digest || null, expired: artifact.expired, sizeInBytes: artifact.size_in_bytes })),
              });
            }
            snapshot.runs.sort((a, b) => a.name.localeCompare(b.name));
            fs.writeFileSync(`${outDir}/snapshot.json`, `${JSON.stringify(snapshot, null, 2)}\n`);
            console.log(JSON.stringify(snapshot, null, 2));
          })().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload live snapshot
        uses: actions/upload-artifact@v4
        with:
          name: exact-main-live-snapshot-0951cec83c3cdb94c3d2215ecbc773763ad3ed27
          path: ${{ env.OUT_DIR }}
          if-no-files-found: error
          retention-days: 7
