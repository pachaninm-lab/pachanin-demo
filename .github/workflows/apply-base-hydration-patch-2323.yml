name: apply base hydration patch 2323

on:
  pull_request:
    branches:
      - fix/public-auth-server-authority

permissions:
  contents: write

jobs:
  patch-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: fix/public-auth-server-authority
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Apply deterministic public style patch
        run: |
          python - <<'PY'
          from pathlib import Path
          files = [
              Path('apps/web/app/platform-v7/page.tsx'),
              Path('apps/web/components/platform-v7/PublicSiteHeader.tsx'),
              Path('apps/web/components/v7r/PlatformV7IntelligenceStrip.tsx'),
          ]
          old = '<style>{css}</style>'
          new = '<style dangerouslySetInnerHTML={{ __html: css }} />'
          changed = False
          for file in files:
              text = file.read_text()
              if old in text:
                  if text.count(old) != 1:
                      raise SystemExit(f'{file}: unexpected style occurrence count')
                  file.write_text(text.replace(old, new))
                  changed = True
              elif new not in text:
                  raise SystemExit(f'{file}: neither legacy nor deterministic style form found')
          print('changed=' + str(changed).lower())
          PY
      - name: Commit to implementation branch when needed
        run: |
          if git diff --quiet; then
            echo 'Implementation branch is already patched.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web/app/platform-v7/page.tsx apps/web/components/platform-v7/PublicSiteHeader.tsx apps/web/components/v7r/PlatformV7IntelligenceStrip.tsx
          git commit -m 'fix(web): make public inline styles hydration-stable'
          git push origin HEAD:fix/public-auth-server-authority
