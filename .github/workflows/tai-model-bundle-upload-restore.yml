name: TAI Immutable Model Bundle Upload and Clean Restore

on:
  issue_comment:
    types: [created]

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: tai-model-bundle-upload-restore
  cancel-in-progress: false

jobs:
  finalize:
    if: >-
      github.ref == 'refs/heads/main' &&
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner &&
      github.event.action == 'created' &&
      github.event.issue.pull_request == null &&
      github.event.issue.number == 2961 &&
      github.event.comment.body == '/tai finalize model-bundles exact-main' &&
      github.event.comment.author_association == 'OWNER' &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 720
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      REPORT_ROOT: bundle-finalization
      AUTHORITY: apps/tai/model-artifacts/model-bundle-upload-restore-authority.v1.json
      BUNDLE_AUTHORITY: apps/tai/model-artifacts/model-bundle-authority.v2.json
      CONVERSION_AUTHORITY: apps/tai/model-artifacts/model-conversion-authority.v1.json
      MODEL_HOST: ${{ secrets.TAI_MODEL_HOST }}
      MODEL_SSH_USER: ${{ secrets.TAI_MODEL_SSH_USER }}
      MODEL_SSH_PORT: ${{ secrets.TAI_MODEL_SSH_PORT }}
      MODEL_SSH_KEY: ${{ secrets.TAI_MODEL_SSH_KEY }}
      S3_ENDPOINT: ${{ secrets.TAI_BUNDLE_S3_ENDPOINT }}
      S3_REGION: ${{ secrets.TAI_BUNDLE_S3_REGION }}
      S3_BUCKET: ${{ secrets.TAI_BUNDLE_S3_BUCKET }}
      S3_ACCESS_KEY_ID: ${{ secrets.TAI_BUNDLE_S3_ACCESS_KEY_ID }}
      S3_SECRET_ACCESS_KEY: ${{ secrets.TAI_BUNDLE_S3_SECRET_ACCESS_KEY }}
      S3_PREFIX: ${{ secrets.TAI_BUNDLE_S3_PREFIX }}
      S3_CAPACITY_BYTES: ${{ secrets.TAI_BUNDLE_S3_CAPACITY_BYTES }}
      S3_PRINCIPAL_ID: ${{ secrets.TAI_BUNDLE_S3_PRINCIPAL_ID }}

    steps:
      - name: Checkout exact main authority
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact-main owner trigger
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = 'refs/heads/main'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch --no-tags --depth=1 origin main
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install exact TAI authority package
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e apps/tai

      - name: Execute governed finalization orchestrator
        id: orchestrator
        continue-on-error: true
        shell: bash
        run: bash apps/tai/scripts/model-bundle-upload-restore-orchestrator.v1.sh

      - name: Remove local protected transport material
        if: always()
        shell: bash
        run: |
          set +e
          rm -f "$REPORT_ROOT/remote/s3-secrets.env"
          rm -f "$HOME/.ssh/id_tai_model"

      - name: Upload bounded finalization evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tai-model-bundle-finalization-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: |
            bundle-finalization/authority-validation.json
            bundle-finalization/release/selected-run.json
            bundle-finalization/preflight/observed.json
            bundle-finalization/preflight/report.json
            bundle-finalization/orchestrator-status.json
            bundle-finalization/remote/status.json
            bundle-finalization/remote/evidence
          if-no-files-found: warn
          retention-days: 90
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Publish bounded finalization summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          report="$REPORT_ROOT/remote/evidence/finalization-report.json"
          if [[ -s "$report" ]]; then
            REPORT="$report" python - <<'PY' > "$REPORT_ROOT/summary.md"
          import json
          import os
          from pathlib import Path
          report = json.loads(Path(os.environ['REPORT']).read_text())
          lines = [
              '## TAI immutable model-bundle finalization',
              '',
              f"- exact-main: `{report['exact_main_sha']}`;",
              f"- status: `{report['status']}`;",
              f"- models: `{len(report['models'])}`;",
          ]
          for item in report['models']:
              lines.extend([
                  f"- {item['model_id']}: archive `{item['archive_sha256']}` / `{item['archive_size_bytes']}` bytes;",
                  f"  VersionId: `{item['version_id']}`; restore: `{item['storage_verification_status']}`;",
              ])
          lines.extend([
              '- accepted S3 object deletion: `false`;',
              '- benchmark: `NOT_RUN`;',
              '- model admission: `NOT_DONE`;',
              '- production operational status: `NOT_ATTESTED`.',
          ])
          print('\n'.join(lines))
          PY
          else
            reasons='FINALIZATION_EVIDENCE_ABSENT'
            if [[ -s "$REPORT_ROOT/preflight/report.json" ]]; then
              reasons="$(jq -c '.reasons // []' "$REPORT_ROOT/preflight/report.json")"
            fi
            printf '%s\n' \
              '## TAI immutable model-bundle finalization' \
              '' \
              "- exact-main: \`$GITHUB_SHA\`;" \
              '- status: `FAILED_CLOSED`;' \
              "- reasons: \`$reasons\`;" \
              '- accepted S3 object deletion: `false`;' \
              '- benchmark: `NOT_RUN`;' \
              '- model admission: `NOT_DONE`;' \
              '- production operational status: `NOT_ATTESTED`.' \
              > "$REPORT_ROOT/summary.md"
          fi
          jq -n --rawfile body "$REPORT_ROOT/summary.md" '{body: $body}' \
            | gh api --method POST "repos/$REPOSITORY/issues/2961/comments" --input -

      - name: Enforce final verified status
        shell: bash
        run: |
          set -euo pipefail
          report="$REPORT_ROOT/remote/evidence/finalization-report.json"
          test -s "$report"
          test "$(jq -r '.status' "$report")" = 'VERIFIED_BUNDLES_RESTORED'
          test "$(jq -r '.models | length' "$report")" = '2'
          test "$(jq -r '[.models[].storage_verification_status] | all(. == "VERIFIED")' "$report")" = 'true'
          test "$(jq -r '.reasons | length' "$report")" = '0'
          test "$(jq -r '.accepted_s3_object_deletion' "$report")" = 'false'
          test "$(jq -r '.production_operational_status' "$report")" = 'NOT_ATTESTED'
