name: patch staff UI scope

on:
  push:
    branches:
      - ops/staff-control-center-evidence

permissions:
  contents: write

jobs:
  patch-ui-scope:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/staff-control-center
          fetch-depth: 0
      - name: Add exact layout path to approved concurrent scope
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(path.read_text())
          branch = 'ui/staff-control-center'
          scopes = state.setdefault('approvedConcurrentScopes', {}).setdefault(branch, [])
          target = 'apps/web/app/platform-v7/layout.tsx'
          if target not in scopes:
              scopes.insert(0, target)
          path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n')
          PY
      - name: Commit scope authorization
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet; then
            echo 'Scope already authorized'
            exit 0
          fi
          git config user.name 'platform-v7-ops'
          git config user.email 'platform-v7-ops@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'Authorize Staff Control Center layout isolation scope'
          git push origin HEAD:ui/staff-control-center
