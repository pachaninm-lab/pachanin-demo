name: Build & Publish Docker Images

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/ml/**"
      - "infra/docker/Dockerfile.*"
  workflow_dispatch:
    inputs:
      services:
        description: "Services to build (comma-separated: api,web,ml or all)"
        default: "all"
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/grainflow

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.services, 'api') ||
      github.event.inputs.services == 'all' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (api)
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push API
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ github.ref_name }}

  build-web:
    name: Build Web image
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.services, 'web') ||
      github.event.inputs.services == 'all' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (web)
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push Web
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

  build-ml:
    name: Build ML image
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.services, 'ml') ||
      github.event.inputs.services == 'all' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (ml)
        id: meta-ml
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-ml
          tags: |
            type=sha,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push ML
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.ml
          push: true
          tags: ${{ steps.meta-ml.outputs.tags }}
          labels: ${{ steps.meta-ml.outputs.labels }}
          cache-from: type=gha,scope=ml
          cache-to: type=gha,mode=max,scope=ml

  helm-validate:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: "3.14.0"

      - name: Lint Helm chart
        run: helm lint infra/helm/grainflow --values infra/helm/grainflow/values.yaml

      - name: Template Helm chart (production)
        run: |
          helm template grainflow infra/helm/grainflow \
            --values infra/helm/grainflow/values.yaml \
            --values infra/helm/grainflow/values-production.yaml \
            > /dev/null
          echo "Helm template: OK"
