name: Build & Publish Canonical Docker Images

on:
  push:
    branches: [main]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "infra/docker/Dockerfile.api"
      - "infra/docker/Dockerfile.web"
      - "infra/docker/Dockerfile.migrations"
      - ".github/workflows/docker-publish.yml"
      - ".github/workflows/production-full-stack-exact-sha.yml"
      - "scripts/production-full-stack-exact-sha.sh"
      - "scripts/production-full-stack-live-acceptance.sh"
      - "scripts/check-production-full-stack-release.mjs"
  workflow_dispatch:
    inputs:
      services:
        description: "Canonical services to build: api, web or all; migration is also supported"
        default: "all"
        required: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/grainflow

jobs:
  build-api:
    name: Build API image
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.services, 'api') ||
      github.event.inputs.services == 'all' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=sha,format=short

      - name: Build and push API authority
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

  build-web:
    name: Build web image
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.services, 'web') ||
      github.event.inputs.services == 'all' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=sha,format=short

      - name: Build and push web authority
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}

  build-migration:
    name: Build migration image
    runs-on: ubuntu-latest
    if: >
      contains(github.event.inputs.services, 'migration') ||
      github.event.inputs.services == 'all' ||
      github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta-migration
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}-migration
          tags: |
            type=sha,format=short

      - name: Build and push migration authority
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.migrations
          push: true
          tags: ${{ steps.meta-migration.outputs.tags }}
          labels: ${{ steps.meta-migration.outputs.labels }}
          cache-from: type=gha,scope=migration
          cache-to: type=gha,mode=max,scope=migration
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            GIT_COMMIT=${{ github.sha }}
            APP_VERSION=${{ github.ref_name }}

  helm-validate:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.18.4

      - name: Lint Helm chart
        run: helm lint infra/helm/grainflow

      - name: Render Helm chart
        run: helm template grainflow infra/helm/grainflow --namespace grainflow-prod > /tmp/grainflow-rendered.yaml

# Operational no-op: force canonical API/web/migration image publication for the current main SHA.
