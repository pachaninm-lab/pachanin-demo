name: IR Outbox Schema Patch

on:
  push:
    branches:
      - agent/ir-outbox-postgresql-authority-v2

permissions:
  contents: write

jobs:
  patch-schema:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-outbox-postgresql-authority-v2
          fetch-depth: 0
      - name: Patch exact Outbox Prisma block
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/api/prisma/schema.prisma')
          text = path.read_text()
          old = '''model OutboxEntry {
            id                    String   @id @default(cuid())
            type                  String
            dealId                String?
            payload               Json
            status                String   @default("PENDING")
            idempotencyKey        String?  @unique
            maxRetries            Int      @default(5)
            retryCount            Int      @default(0)
            nextRetryAt           DateTime @default(now())
            lastError             String?
            correlationId         String?
            auditId               String?
            runtimeSnapshotId     String?
            runtimeIdempotencyKey String?
            leaseOwner            String?
            leaseExpiresAt        DateTime?
            deadLetterAt          DateTime?
            createdAt             DateTime @default(now())
            sentAt                DateTime?
            confirmedAt           DateTime?
            failedAt              DateTime?

            runtimeSnapshot       DealWorkspaceRuntimeSnapshot? @relation("RuntimeSnapshotOutbox")

            @@index([status, nextRetryAt])
            @@index([status, leaseExpiresAt], map: "outbox_entries_lease_idx")
            @@index([dealId])
            @@index([runtimeSnapshotId], map: "outbox_entries_runtime_snapshot_idx")
            @@index([correlationId], map: "outbox_entries_runtime_correlation_idx")
            @@index([createdAt], map: "outbox_entries_created_idx")
            @@map("outbox_entries")
          }
          '''
          new = '''model OutboxEntry {
            id                    String   @id @default(cuid())
            type                  String
            dealId                String?
            payload               Json
            status                String   @default("PENDING")
            triggeredByUserId     String?
            idempotencyKey        String?  @unique
            maxRetries            Int      @default(5)
            retryCount            Int      @default(0)
            nextRetryAt           DateTime @default(now())
            lastError             String?
            correlationId         String?
            auditId               String?
            runtimeSnapshotId     String?
            runtimeIdempotencyKey String?
            leaseOwner            String?
            leaseToken            String?  @unique(map: "outbox_entries_active_lease_token_key")
            leaseExpiresAt        DateTime?
            heartbeatAt           DateTime?
            deadLetterAt          DateTime?
            createdAt             DateTime @default(now())
            sentAt                DateTime?
            confirmedAt           DateTime?
            failedAt              DateTime?

            runtimeSnapshot       DealWorkspaceRuntimeSnapshot? @relation("RuntimeSnapshotOutbox")
            redriveEvents         OutboxRedriveEvent[]

            @@index([status, nextRetryAt, createdAt, id], map: "outbox_entries_claim_idx")
            @@index([status, leaseExpiresAt], map: "outbox_entries_lease_idx")
            @@index([dealId])
            @@index([runtimeSnapshotId], map: "outbox_entries_runtime_snapshot_idx")
            @@index([correlationId], map: "outbox_entries_runtime_correlation_idx")
            @@index([createdAt], map: "outbox_entries_created_idx")
            @@map("outbox_entries")
          }

          model OutboxRedriveEvent {
            id                 String   @id @default(cuid())
            outboxEntryId      String
            idempotencyKey     String   @unique
            actorUserId        String
            reason             String
            previousStatus     String
            previousRetryCount Int
            prevHash           String?
            hash               String
            createdAt          DateTime @default(now())

            outboxEntry        OutboxEntry @relation(fields: [outboxEntryId], references: [id], onDelete: Restrict, onUpdate: Cascade)

            @@index([outboxEntryId, createdAt], map: "outbox_redrive_events_entry_created_idx")
            @@index([createdAt], map: "outbox_redrive_events_created_idx")
            @@map("outbox_redrive_events")
          }
          '''
          if text.count(old) != 1:
              raise SystemExit(f'expected one exact OutboxEntry block, found {text.count(old)}')
          path.write_text(text.replace(old, new))
          PY
          git rm .github/workflows/ir-outbox-schema-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/prisma/schema.prisma
          git commit -m "IR-OUTBOX: sync Prisma queue and redrive models"
          git push origin HEAD:agent/ir-outbox-postgresql-authority-v2
