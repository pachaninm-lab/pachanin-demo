name: TAI Source Acquisition Observer

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-source-acquisition-observer.yml

permissions:
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact main workflow
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Validate acquisition workflow with pinned actionlint
        shell: bash
        run: |
          set -euo pipefail
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 \
            -format '{{json .}}' \
            .github/workflows/tai-model-source-acquisition.yml \
            | tee actionlint.jsonl
          test ! -s actionlint.jsonl
