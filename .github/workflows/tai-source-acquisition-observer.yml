name: TAI Source Acquisition Observer

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-source-acquisition-observer.yml

permissions:
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Validate exact-main acquisition workflow with pinned actionlint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -uo pipefail
          gh api "/repos/$REPOSITORY/contents/.github/workflows/tai-model-source-acquisition.yml?ref=main" \
            --jq '.content' \
            | tr -d '\n' \
            | base64 -d \
            > acquisition.yml
          set +e
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 \
            -format '{{json .}}' \
            acquisition.yml \
            > actionlint.jsonl 2>&1
          status=$?
          set -e
          printf 'ACTIONLINT_EXIT=%s\n' "$status"
          cat actionlint.jsonl
          exit "$status"
