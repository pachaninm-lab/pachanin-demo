name: TAI Source Acquisition Fix Validator

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-source-acquisition-observer.yml

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      TARGET_BRANCH: agent/tai-ap-13b3-source-acquisition-trigger-fix
      SOURCE_PATH: .github/workflows/tai-model-source-acquisition.yml
    steps:
      - name: Validate exact fix branch workflow with pinned actionlint
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          gh api "/repos/$REPOSITORY/contents/$SOURCE_PATH?ref=$TARGET_BRANCH" \
            --jq '.content' \
            | tr -d '\n' \
            | base64 -d \
            > acquisition.yml
          go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 \
            acquisition.yml
          grep -Fq 'Bind ephemeral acquisition roots' acquisition.yml
          ! grep -Fq '${{ runner.temp }}' acquisition.yml
