name: staff foundation finalizer

on:
  push:
    branches:
      - security/staff-access-control-plane-foundation

permissions:
  contents: write

jobs:
  finalize-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/staff-access-control-plane-foundation
          fetch-depth: 0
      - name: Canonicalize owner bootstrap and exact test grants
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/bootstrap-platform-owner-auth.mjs scripts/bootstrap-platform-owner.mjs
          rm scripts/bootstrap-platform-owner-auth.mjs
          python - <<'PY'
          from pathlib import Path
          script = Path('scripts/platform-v7-one-deal-e2e.sh')
          text = script.read_text()
          needle = "GRANT EXECUTE ON FUNCTION auth.staff_cabinet_deals(TEXT, TEXT, TEXT, TEXT) TO one_deal_auth;"
          addition = needle + "\nGRANT EXECUTE ON FUNCTION auth.staff_resolve_deal_scope(TEXT, TEXT) TO one_deal_auth;"
          if 'auth.staff_resolve_deal_scope(TEXT, TEXT) TO one_deal_auth' not in text:
              if needle not in text:
                  raise SystemExit('expected staff projection grant anchor not found')
              text = text.replace(needle, addition)
          script.write_text(text)

          import json
          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(state_path.read_text())
          state.setdefault('approvedConcurrentScopes', {})['security/staff-access-control-plane-foundation'] = [
            'apps/api/prisma/migrations/20260711100000_staff_access_control_plane/**',
            'apps/api/prisma/migrations/20260711101000_staff_assignment_mfa_enforcement/**',
            'apps/api/prisma/migrations/20260711102000_staff_deal_scope_resolution/**',
            'apps/api/prisma/migrations/20260711103000_staff_audit_chain_enforcement/**',
            'apps/api/src/app.module.ts',
            'apps/api/src/common/guards/auth.guard.ts',
            'apps/api/src/common/guards/roles.guard.ts',
            'apps/api/src/common/security/policy-engine.service.ts',
            'apps/api/src/common/types/request-user.ts',
            'apps/api/src/modules/security/security-e2e.spec.ts',
            'apps/api/src/modules/staff-access/**',
            'apps/api/test/staff-access/**',
            'docs/platform-v7/security/staff-access-control-plane.md',
            'docs/platform-v7/security/staff-access-production-runbook.md',
            'scripts/bootstrap-platform-owner.mjs',
            'scripts/platform-v7-one-deal-e2e.sh',
            'docs/platform-v7/autopilot/autopilot-state.json',
          ]
          state_path.write_text(json.dumps(state, ensure_ascii=False, indent=2) + '\n')
          PY
          git rm .github/workflows/zz-staff-finalize-files.yml
      - name: Commit finalized source-controlled foundation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/bootstrap-platform-owner.mjs scripts/platform-v7-one-deal-e2e.sh docs/platform-v7/autopilot/autopilot-state.json
          git rm --cached --ignore-unmatch scripts/bootstrap-platform-owner-auth.mjs >/dev/null 2>&1 || true
          git add -u
          git commit -m 'Finalize staff access foundation artifacts'
          git push origin HEAD:security/staff-access-control-plane-foundation
