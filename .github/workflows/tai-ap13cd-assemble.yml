name: TAI AP-13C-D One-Time Source Assembler

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-ap13cd-assemble.yml
      - .tai-assembly/**

permissions:
  contents: write

jobs:
  assemble:
    if: >-
      github.actor == github.repository_owner &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/tai-ap-13cd-benchmark-admission-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout writable pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Assemble, verify and publish governed files
        shell: bash
        run: |
          set -euo pipefail

          module_path='apps/tai/tai/model_benchmark_admission_v2.py'
          test_path='apps/tai/tests/test_model_benchmark_admission_v2.py'
          expected_module_bytes='77720'
          expected_test_bytes='49538'
          expected_module_sha='7d12d8d2466b9489444bef0d3e22f4f70d7a4a54f32c8d6ff1c4faccc8dedd99'
          expected_test_sha='ae541bc8cbd73232419c3eebc9e02f62b4c59aa8f6f8d251c57d9c78e98a4eda'

          mkdir -p "$(dirname "$module_path")" "$(dirname "$test_path")"
          cat .tai-assembly/module/part-* > "$module_path"
          cat .tai-assembly/tests/part-* > "$test_path"

          module_bytes="$(wc -c < "$module_path" | tr -d ' ')"
          test_bytes="$(wc -c < "$test_path" | tr -d ' ')"
          module_sha="$(sha256sum "$module_path" | awk '{print $1}')"
          test_sha="$(sha256sum "$test_path" | awk '{print $1}')"

          test "$module_bytes" = "$expected_module_bytes"
          test "$test_bytes" = "$expected_test_bytes"
          test "$module_sha" = "$expected_module_sha"
          test "$test_sha" = "$expected_test_sha"

          python -m py_compile \
            "$module_path" \
            apps/tai/tai/model_benchmark_admission_v2_cli.py \
            "$test_path"

          rm -rf .tai-assembly
          rm -f .github/workflows/tai-ap13cd-assembly-observer.yml
          rm -f .github/workflows/tai-ap13cd-assemble.yml

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A

          if git diff --cached --quiet; then
            echo 'No assembly changes to commit.'
            exit 0
          fi

          git commit -m 'TAI AP-13C-D: publish governed benchmark authority sources'
          git push origin "HEAD:${{ github.head_ref }}"
