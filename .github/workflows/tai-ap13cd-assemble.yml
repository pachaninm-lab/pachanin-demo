name: TAI AP-13C-D One-Time Source Assembler

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-ap13cd-assemble.yml
      - .tai-assembly/**

permissions:
  contents: write

jobs:
  assemble:
    if: >-
      github.actor == github.repository_owner &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/tai-ap-13cd-benchmark-admission-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact pull-request head
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1

      - name: Assemble bounded diagnostic files
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p assembly-diagnostic
          cat .tai-assembly/module/part-* > assembly-diagnostic/model_benchmark_admission_v2.py
          cat .tai-assembly/tests/part-* > assembly-diagnostic/test_model_benchmark_admission_v2.py

          module_bytes="$(wc -c < assembly-diagnostic/model_benchmark_admission_v2.py)"
          test_bytes="$(wc -c < assembly-diagnostic/test_model_benchmark_admission_v2.py)"
          module_sha="$(sha256sum assembly-diagnostic/model_benchmark_admission_v2.py | awk '{print $1}')"
          test_sha="$(sha256sum assembly-diagnostic/test_model_benchmark_admission_v2.py | awk '{print $1}')"
          {
            printf 'ASSEMBLED_MODULE_BYTES=%s\n' "$module_bytes"
            printf 'ASSEMBLED_TEST_BYTES=%s\n' "$test_bytes"
            printf 'ASSEMBLED_MODULE_SHA256=%s\n' "$module_sha"
            printf 'ASSEMBLED_TEST_SHA256=%s\n' "$test_sha"
            printf 'EXPECTED_MODULE_BYTES=77721\n'
            printf 'EXPECTED_TEST_BYTES=49541\n'
            printf 'EXPECTED_MODULE_SHA256=874e1507530259b036cf6c81770393a6dd22ab5dbf41467ae73837b6f5d227ec\n'
            printf 'EXPECTED_TEST_SHA256=a1744bfe5f96cb4cb6c802dcf2701e7283b9a850717ea935c351061e20646b98\n'
          } | tee assembly-diagnostic/diagnosis.env

          set +e
          python -m py_compile \
            assembly-diagnostic/model_benchmark_admission_v2.py \
            apps/tai/tai/model_benchmark_admission_v2_cli.py \
            assembly-diagnostic/test_model_benchmark_admission_v2.py \
            > assembly-diagnostic/py-compile.log 2>&1
          compile_status=$?
          set -e
          printf 'PY_COMPILE_EXIT=%s\n' "$compile_status" | tee -a assembly-diagnostic/diagnosis.env
          cat assembly-diagnostic/py-compile.log

      - name: Upload bounded assembly diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: tai-ap13cd-assembly-diagnostic-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}
          path: assembly-diagnostic
          if-no-files-found: error
          retention-days: 3
          compression-level: 0
          overwrite: false

      - name: Stop before repository write
        shell: bash
        run: |
          echo 'Diagnostic artifact uploaded; repository write intentionally blocked.' >&2
          exit 1
