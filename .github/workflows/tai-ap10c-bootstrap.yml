name: TAI AP-10C Bootstrap

on:
  push:
    branches: [tai/ap10c-production-composition]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: tai/ap10c-production-composition
      - name: Apply production composition contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          production = Path('apps/tai/tai/production_runtime.py')
          text = production.read_text()
          text = text.replace(
              '    PostgreSQLModelRuntimeRepository as _MissingImportGuard,\n',
              '',
          )
          production.write_text(text)

          main = Path('apps/tai/tai/main.py')
          text = main.read_text()
          text = text.replace(
              'from collections.abc import Callable\n',
              'from collections.abc import Callable, Mapping\nfrom dataclasses import dataclass\n',
          )
          text = text.replace(
              'from typing import Annotated\n',
              'from typing import Annotated, Protocol\n',
          )
          marker = '_NowProvider = Callable[[], datetime]\n\n\n'
          addition = '''_NowProvider = Callable[[], datetime]\n\n\n@dataclass(frozen=True, slots=True)\nclass ReadinessStatus:\n    ready: bool\n    components: Mapping[str, str]\n    reasons: tuple[str, ...] = ()\n\n\nclass ReadinessProbe(Protocol):\n    def check(self) -> ReadinessStatus: ...\n\n\n'''
          if marker not in text:
              raise SystemExit('main readiness marker missing')
          text = text.replace(marker, addition, 1)
          old_signature = '''    identity_authority: HMACPlatformIdentityAuthority | None = None,\n    now_provider: _NowProvider | None = None,\n) -> FastAPI:\n'''
          new_signature = '''    identity_authority: HMACPlatformIdentityAuthority | None = None,\n    now_provider: _NowProvider | None = None,\n    readiness_probe: ReadinessProbe | None = None,\n    configuration_error: str | None = None,\n) -> FastAPI:\n'''
          if old_signature not in text:
              raise SystemExit('main signature marker missing')
          text = text.replace(old_signature, new_signature, 1)
          old_now = '    now = now_provider or (lambda: datetime.now(UTC))\n\n'
          new_now = '''    now = now_provider or (lambda: datetime.now(UTC))\n\n    def readiness_state() -> ReadinessStatus:\n        if configuration_error is not None:\n            return ReadinessStatus(\n                False,\n                {\n                    "billing": "disabled-by-architecture",\n                    "orchestration": "unconfigured",\n                },\n                (configuration_error,),\n            )\n        configured = runtime is not None and identity_authority is not None\n        if not configured:\n            return ReadinessStatus(\n                False,\n                {\n                    "billing": "disabled-by-architecture",\n                    "orchestration": "unconfigured",\n                },\n                ("RUNTIME_NOT_CONFIGURED",),\n            )\n        if readiness_probe is None:\n            return ReadinessStatus(\n                True,\n                {\n                    "billing": "disabled-by-architecture",\n                    "orchestration": "configured",\n                },\n            )\n        try:\n            probed = readiness_probe.check()\n        except Exception:\n            return ReadinessStatus(\n                False,\n                {\n                    "billing": "disabled-by-architecture",\n                    "orchestration": "configured",\n                    "dependencies": "probe_failed",\n                },\n                ("READINESS_PROBE_FAILED",),\n            )\n        components = dict(probed.components)\n        components.setdefault("billing", "disabled-by-architecture")\n        components.setdefault("orchestration", "configured")\n        return ReadinessStatus(probed.ready, components, probed.reasons)\n\n'''
          if old_now not in text:
              raise SystemExit('main now marker missing')
          text = text.replace(old_now, new_now, 1)
          old_readiness = '''    @app.get("/health/ready")\n    def readiness() -> JSONResponse:\n        configured = runtime is not None and identity_authority is not None\n        return JSONResponse(\n            status_code=200 if configured else 503,\n            content={\n                "status": "ready" if configured else "not_ready",\n                "policy": "deny-by-default",\n                "billing": "disabled-by-architecture",\n                "orchestration": "configured" if configured else "unconfigured",\n            },\n        )\n'''
          new_readiness = '''    @app.get("/health/ready")\n    def readiness() -> JSONResponse:\n        state = readiness_state()\n        components = dict(state.components)\n        return JSONResponse(\n            status_code=200 if state.ready else 503,\n            content={\n                "status": "ready" if state.ready else "not_ready",\n                "policy": "deny-by-default",\n                "billing": components.pop(\n                    "billing",\n                    "disabled-by-architecture",\n                ),\n                "orchestration": components.pop(\n                    "orchestration",\n                    "configured" if runtime is not None else "unconfigured",\n                ),\n                "components": components,\n                "reasons": list(state.reasons),\n            },\n        )\n'''
          if old_readiness not in text:
              raise SystemExit('main readiness body marker missing')
          text = text.replace(old_readiness, new_readiness, 1)
          main.write_text(text)

          release = Path('apps/tai/tai/release_acceptance.py')
          text = release.read_text()
          if 'minimum_migration_version: int = 13' not in text:
              raise SystemExit('release migration version marker missing')
          release.write_text(text.replace('minimum_migration_version: int = 13', 'minimum_migration_version: int = 14', 1))

          migration_test = Path('apps/tai/tests/test_migration_manifest.py')
          text = migration_test.read_text()
          text = text.replace(
              'assert [item.version for item in inventory.migrations] == list(range(1, 14))',
              'assert [item.version for item in inventory.migrations] == list(range(1, 15))',
          )
          text = text.replace(
              'assert paths[-1].endswith("0012_git_object_id_contract.sql")',
              'assert paths[-1].endswith("0013_production_composition.sql")',
          )
          migration_test.write_text(text)

          release_test = Path('apps/tai/tests/test_release_acceptance.py')
          text = release_test.read_text().replace(
              'def _migration_inventory(last: int = 13)',
              'def _migration_inventory(last: int = 14)',
          )
          release_test.write_text(text)

          cli_test = Path('apps/tai/tests/test_release_acceptance_cli.py')
          text = cli_test.read_text()
          text = text.replace(
              '        "0012_git_object_id_contract.sql",\n',
              '        "0012_git_object_id_contract.sql",\n        "0013_production_composition.sql",\n',
          )
          text = text.replace(
              'assert len(attestation["migration_inventory"]) == 13',
              'assert len(attestation["migration_inventory"]) == 14',
          )
          cli_test.write_text(text)

          Path('apps/tai/tests/test_main_readiness.py').write_text('''from __future__ import annotations\n\nfrom typing import cast\n\nfrom fastapi.testclient import TestClient\n\nfrom tai.identity_assertion import HMACPlatformIdentityAuthority\nfrom tai.main import ReadinessStatus, create_app\nfrom tai.orchestration import TAIOrchestrationRuntime\n\n\nclass _Probe:\n    def __init__(self, status: ReadinessStatus | Exception) -> None:\n        self.status = status\n        self.calls = 0\n\n    def check(self) -> ReadinessStatus:\n        self.calls += 1\n        if isinstance(self.status, Exception):\n            raise self.status\n        return self.status\n\n\ndef _client(probe: _Probe) -> TestClient:\n    return TestClient(\n        create_app(\n            runtime=cast(TAIOrchestrationRuntime, object()),\n            identity_authority=HMACPlatformIdentityAuthority(b"i" * 32),\n            readiness_probe=probe,\n        )\n    )\n\ndef test_readiness_uses_live_dependency_probe() -> None:\n    probe = _Probe(\n        ReadinessStatus(\n            True,\n            {"postgresql": "ready", "local_model": "ready"},\n        )\n    )\n    response = _client(probe).get("/health/ready")\n    assert response.status_code == 200\n    assert response.json()["components"] == {\n        "local_model": "ready",\n        "postgresql": "ready",\n    }\n    assert response.json()["reasons"] == []\n    assert probe.calls == 1\n\ndef test_readiness_fails_closed_for_dependency_or_probe_failure() -> None:\n    dependency = _client(\n        _Probe(\n            ReadinessStatus(\n                False,\n                {"postgresql": "unavailable"},\n                ("POSTGRESQL_UNAVAILABLE",),\n            )\n        )\n    ).get("/health/ready")\n    assert dependency.status_code == 503\n    assert dependency.json()["reasons"] == ["POSTGRESQL_UNAVAILABLE"]\n\n    failure = _client(_Probe(RuntimeError("secret detail"))).get("/health/ready")\n    assert failure.status_code == 503\n    assert failure.json()["reasons"] == ["READINESS_PROBE_FAILED"]\n    assert "secret detail" not in failure.text\n\ndef test_configuration_error_is_sanitized_and_not_ready() -> None:\n    response = TestClient(\n        create_app(configuration_error="TAI_PRODUCTION_CONFIGURATION_INVALID")\n    ).get("/health/ready")\n    assert response.status_code == 503\n    assert response.json()["reasons"] == ["TAI_PRODUCTION_CONFIGURATION_INVALID"]\n''')

          Path('apps/tai/tests/test_production_runtime.py').write_text('''from __future__ import annotations\n\nimport base64\nfrom collections.abc import Mapping, Sequence\nfrom contextlib import AbstractContextManager\nfrom datetime import UTC, datetime\nfrom typing import Any\n\nimport pytest\n\nfrom tai.local_model_invoker import LocalEndpointPolicy, StaticModelEndpointResolver\nfrom tai.main import ReadinessStatus\nfrom tai.model_runtime import (\n    DeterministicModelRouter,\n    LocalModelProfile,\n    ModelCapability,\n    ModelProfileStatus,\n    ModelRuntimeClass,\n    ModelRuntimeHealth,\n    ModelRuntimeStatus,\n)\nfrom tai.production_runtime import (\n    ModelEndpointBinding,\n    ProductionConfigurationError,\n    ProductionReadinessProbe,\n    ProductionRuntimeConfig,\n    build_production_runtime,\n)\n\nNOW = datetime(2026, 7, 19, 1, 0, tzinfo=UTC)\n\n\ndef _environment() -> dict[str, str]:\n    return {\n        "TAI_DATABASE_URL": "postgresql://tai:secret@postgres.internal:5432/tai",\n        "TAI_IDENTITY_HMAC_SECRET_B64": base64.b64encode(b"i" * 32).decode(),\n        "TAI_CONFIRMATION_HMAC_SECRET_B64": base64.b64encode(b"c" * 32).decode(),\n        "TAI_MODEL_ENDPOINTS_JSON": '{"agro@r1":"http://model.svc/v1/chat/completions"}',\n    }\n\n\ndef test_production_config_is_strict_and_local_only() -> None:\n    config = ProductionRuntimeConfig.from_environment(_environment())\n    assert config.model_endpoints == (\n        ModelEndpointBinding("agro", "r1", "http://model.svc/v1/chat/completions"),\n    )\n    assert config.identity_secret != config.confirmation_secret\n\n    missing = _environment()\n    del missing["TAI_DATABASE_URL"]\n    with pytest.raises(ProductionConfigurationError, match="TAI_DATABASE_URL"):\n        ProductionRuntimeConfig.from_environment(missing)\n\n    public = _environment()\n    public["TAI_MODEL_ENDPOINTS_JSON"] = '{"agro@r1":"https://api.example.com/v1"}'\n    with pytest.raises(ValueError, match="not local"):\n        ProductionRuntimeConfig.from_environment(public)\n\n    reused = _environment()\n    reused["TAI_CONFIRMATION_HMAC_SECRET_B64"] = reused[\n        "TAI_IDENTITY_HMAC_SECRET_B64"\n    ]\n    with pytest.raises(ProductionConfigurationError, match="must differ"):\n        ProductionRuntimeConfig.from_environment(reused)\n\n\nclass _Cursor(AbstractContextManager["_Cursor"]):\n    def __init__(self, rows: list[Mapping[str, Any] | None]) -> None:\n        self.rows = rows\n        self.query = ""\n\n    def __enter__(self) -> _Cursor:\n        return self\n\n    def __exit__(self, *args: object) -> None:\n        return None\n\n    def execute(self, query: str, parameters: Sequence[Any] = ()) -> None:\n        del parameters\n        self.query = query\n\n    def fetchone(self) -> Mapping[str, Any] | None:\n        return self.rows.pop(0) if self.rows else None\n\n\nclass _Connection(AbstractContextManager["_Connection"]):\n    def __init__(self, rows: list[Mapping[str, Any] | None]) -> None:\n        self.rows = rows\n        self.committed = False\n        self.rolled_back = False\n\n    def __enter__(self) -> _Connection:\n        return self\n\n    def __exit__(self, *args: object) -> None:\n        return None\n\n    def cursor(self) -> _Cursor:\n        return _Cursor(self.rows)\n\n    def commit(self) -> None:\n        self.committed = True\n\n    def rollback(self) -> None:\n        self.rolled_back = True\n\n\nclass _Factory:\n    def __init__(self, rows: list[Mapping[str, Any] | None]) -> None:\n        self.rows = rows\n\n    def __call__(self) -> _Connection:\n        return _Connection(self.rows)\n\n\nclass _Models:\n    def __init__(self, ready: bool = True) -> None:\n        self.profile = LocalModelProfile(\n            model_id="agro",\n            revision="r1",\n            artifact_locator="file:///models/agro.gguf",\n            artifact_sha256="a" * 64,\n            license_ref="Apache-2.0",\n            capabilities=frozenset(\n                {ModelCapability.TEXT_GENERATION, ModelCapability.RUSSIAN}\n            ),\n            maximum_context_tokens=4096,\n            maximum_output_tokens=512,\n            runtime_class=ModelRuntimeClass.CPU,\n            quantization="Q4_K_M",\n            status=ModelProfileStatus.ACTIVE,\n        )\n        self.health = ModelRuntimeHealth(\n            model_id="agro",\n            revision="r1",\n            status=ModelRuntimeStatus.READY if ready else ModelRuntimeStatus.UNAVAILABLE,\n            available_slots=1 if ready else 0,\n            queue_depth=0,\n            p95_latency_ms=100,\n            observed_at=NOW,\n        )\n\n    def list_profiles(self) -> tuple[LocalModelProfile, ...]:\n        return (self.profile,)\n\n    def list_health(self) -> tuple[ModelRuntimeHealth, ...]:\n        return (self.health,)\n\n\ndef _relations() -> dict[str, str]:\n    return {\n        name: name\n        for name in (\n            "tai_retrieval_generations",\n            "tai_retrieval_chunks",\n            "tai_rag_traces",\n            "tai_local_model_profiles",\n            "tai_local_model_health",\n            "tai_agent_tool_events",\n            "tai_tool_confirmation_uses",\n            "tai_orchestration_idempotency",\n            "tai_prepared_actions",\n            "tai_orchestration_traces",\n            "tai_runtime_evaluation_observations",\n        )\n    }\n\n\ndef _probe(*, ready_model: bool = True) -> ProductionReadinessProbe:\n    models = _Models(ready=ready_model)\n    resolver = StaticModelEndpointResolver(\n        {("agro", "r1"): "http://model.svc/v1/chat/completions"}\n    )\n    return ProductionReadinessProbe(\n        connection_factory=_Factory([_relations(), {"active_generation": True}]),\n        model_repository=models,  # type: ignore[arg-type]\n        router=DeterministicModelRouter(models, models),\n        endpoint_resolver=resolver,\n        endpoint_policy=LocalEndpointPolicy(),\n        tools_enabled=False,\n        cache_ttl=__import__("datetime").timedelta(seconds=5),\n        clock=lambda: NOW,\n    )\n\n\ndef test_production_readiness_requires_schema_knowledge_and_local_model() -> None:\n    ready = _probe().check()\n    assert ready == ReadinessStatus(\n        True,\n        {\n            "billing": "disabled-by-architecture",\n            "knowledge": "ready",\n            "local_model": "ready",\n            "postgresql": "ready",\n            "tools": "disabled-safe",\n        },\n        (),\n    )\n\n    unavailable = _probe(ready_model=False).check()\n    assert unavailable.ready is False\n    assert "LOCAL_MODEL_UNAVAILABLE" in unavailable.reasons\n\n\ndef test_production_builder_uses_durable_repositories_without_connecting_eagerly() -> None:\n    config = ProductionRuntimeConfig.from_environment(_environment())\n    bundle = build_production_runtime(\n        config,\n        connection_factory=_Factory([]),\n        clock=lambda: NOW,\n    )\n    assert bundle.runtime is not None\n    assert bundle.identity_authority is not None\n    assert bundle.readiness_probe is not None\n''')

          Path('apps/tai/tests/test_postgres_orchestration_observability.py').write_text('''from __future__ import annotations\n\nfrom collections.abc import Mapping, Sequence\nfrom contextlib import AbstractContextManager\nfrom datetime import UTC, datetime\nfrom typing import Any\nfrom uuid import UUID\n\nimport pytest\n\nfrom tai.agent_runtime import AgentExecutionStatus\nfrom tai.contracts import ToolMode\nfrom tai.orchestration import (\n    OrchestrationStatus,\n    OrchestrationTrace,\n    RuntimeEvaluationObservation,\n)\nfrom tai.postgres_orchestration_observability import (\n    PostgreSQLOrchestrationAuditSink,\n    PostgreSQLRuntimeEvaluationSink,\n    runtime_observation_sha256,\n)\nfrom tai.rag_pipeline import GroundedAnswerStatus\n\nNOW = datetime(2026, 7, 19, tzinfo=UTC)\nTRACE_ID = UUID("10000000-0000-4000-8000-000000000001")\n\n\nclass _Cursor(AbstractContextManager["_Cursor"]):\n    def __init__(self, row: Mapping[str, Any] | None) -> None:\n        self.row = row\n        self.query = ""\n        self.parameters: tuple[Any, ...] = ()\n\n    def __enter__(self) -> _Cursor:\n        return self\n\n    def __exit__(self, *args: object) -> None:\n        return None\n\n    def execute(self, query: str, parameters: Sequence[Any] = ()) -> None:\n        self.query = query\n        self.parameters = tuple(parameters)\n\n    def fetchone(self) -> Mapping[str, Any] | None:\n        return self.row\n\n\nclass _Connection(AbstractContextManager["_Connection"]):\n    def __init__(self, row: Mapping[str, Any] | None) -> None:\n        self.cursor_instance = _Cursor(row)\n        self.committed = False\n        self.rolled_back = False\n\n    def __enter__(self) -> _Connection:\n        return self\n\n    def __exit__(self, *args: object) -> None:\n        return None\n\n    def cursor(self) -> _Cursor:\n        return self.cursor_instance\n\n    def commit(self) -> None:\n        self.committed = True\n\n    def rollback(self) -> None:\n        self.rolled_back = True\n\n\nclass _Factory:\n    def __init__(self, row: Mapping[str, Any] | None) -> None:\n        self.connection = _Connection(row)\n\n    def __call__(self) -> _Connection:\n        return self.connection\n\n\ndef _trace() -> OrchestrationTrace:\n    return OrchestrationTrace(\n        request_id="request-1",\n        trace_id=TRACE_ID,\n        tenant_id=None,\n        user_id=UUID("20000000-0000-4000-8000-000000000002"),\n        session_id=UUID("30000000-0000-4000-8000-000000000003"),\n        request_sha256="a" * 64,\n        status=OrchestrationStatus.ANSWERED,\n        rag_status=GroundedAnswerStatus.ANSWERED,\n        model_id="agro",\n        model_revision="r1",\n        model_route_id="b" * 64,\n        generation=1,\n        source_ids=("source-1",),\n        citations=("S1",),\n        tool_plan_sha256=None,\n        tool_status=None,\n        prepared_action_count=0,\n        reason=None,\n        completed_at=NOW,\n        trace_sha256="c" * 64,\n    )\n\n\ndef _observation() -> RuntimeEvaluationObservation:\n    return RuntimeEvaluationObservation(\n        request_id="request-1",\n        trace_id=TRACE_ID,\n        status=OrchestrationStatus.ANSWERED,\n        tenant_id=None,\n        source_ids=("source-1",),\n        citations=("S1",),\n        model_invoked=True,\n        tool_modes=(ToolMode.READ_ONLY,),\n        tool_status=AgentExecutionStatus.COMPLETED,\n        reason=None,\n        trace_sha256="c" * 64,\n        observed_at=NOW,\n    )\n\n\ndef test_orchestration_trace_is_persisted_idempotently() -> None:\n    trace = _trace()\n    factory = _Factory({"trace_id": TRACE_ID, "trace_sha256": trace.trace_sha256})\n    PostgreSQLOrchestrationAuditSink(factory).record(trace)\n    assert "ON CONFLICT (trace_id)" in factory.connection.cursor_instance.query\n    assert factory.connection.committed is True\n\n\ndef test_orchestration_trace_conflict_fails_closed() -> None:\n    with pytest.raises(RuntimeError, match="different orchestration evidence"):\n        PostgreSQLOrchestrationAuditSink(_Factory(None)).record(_trace())\n\n\ndef test_runtime_observation_digest_and_persistence_are_deterministic() -> None:\n    observation = _observation()\n    digest = runtime_observation_sha256(observation)\n    assert digest == runtime_observation_sha256(observation)\n    factory = _Factory({"trace_id": TRACE_ID, "observation_sha256": digest})\n    PostgreSQLRuntimeEvaluationSink(factory).observe(observation)\n    assert "tai_runtime_evaluation_observations" in factory.connection.cursor_instance.query\n    assert factory.connection.committed is True\n''')

          workflow = Path('.github/workflows/tai-ap10c-bootstrap.yml')
          workflow.unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat(tai): complete production composition root"
          git push origin HEAD:tai/ap10c-production-composition
