name: TAI Model Conversion Progress

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  issues: write

concurrency:
  group: tai-model-conversion-progress
  cancel-in-progress: false

jobs:
  progress:
    if: >-
      github.ref == 'refs/heads/main' &&
      github.actor == github.repository_owner &&
      github.triggering_actor == github.repository_owner &&
      github.event.action == 'created' &&
      github.event.issue.pull_request == null &&
      github.event.issue.number == 2932 &&
      github.event.comment.body == '/tai diagnose model-progress exact-main' &&
      github.event.comment.author_association == 'OWNER' &&
      github.event.comment.user.login == github.repository_owner
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      REPORT_ROOT: model-conversion-progress
      MODEL_HOST: ${{ secrets.TAI_MODEL_HOST }}
      MODEL_SSH_USER: ${{ secrets.TAI_MODEL_SSH_USER }}
      MODEL_SSH_PORT: ${{ secrets.TAI_MODEL_SSH_PORT }}
      MODEL_SSH_KEY: ${{ secrets.TAI_MODEL_SSH_KEY }}

    steps:
      - name: Checkout exact main
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1
          persist-credentials: false

      - name: Verify exact-main trigger
        shell: bash
        run: |
          set -euo pipefail
          test "$GITHUB_REF" = 'refs/heads/main'
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch --no-tags --depth=1 origin main
          test "$(git rev-parse refs/remotes/origin/main)" = "$GITHUB_SHA"
          mkdir -p "$REPORT_ROOT"
          chmod 700 "$REPORT_ROOT"

      - name: Resolve key-only model-host transport
        id: ssh
        shell: bash
        run: |
          set -euo pipefail
          host="$MODEL_HOST"
          user="${MODEL_SSH_USER:-tai-model}"
          port="${MODEL_SSH_PORT:-22}"
          key="$MODEL_SSH_KEY"
          if [[ -z "$host" || -z "$key" ]]; then
            echo 'available=false' >> "$GITHUB_OUTPUT"
            exit 0
          fi
          test "$user" = 'tai-model'
          [[ "$port" =~ ^[0-9]{1,5}$ ]]
          [[ "$host" =~ ^[A-Za-z0-9._:-]+$ ]]
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          ssh-keyscan -p "$port" -H "$host" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"
          printf '%s\n' "$key" > "$HOME/.ssh/id_tai_model_progress"
          chmod 600 "$HOME/.ssh/id_tai_model_progress"
          echo 'available=true' >> "$GITHUB_OUTPUT"
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "user=$user" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Inspect latest conversion progress without mutation
        if: steps.ssh.outputs.available == 'true'
        shell: bash
        env:
          SSH_HOST: ${{ steps.ssh.outputs.host }}
          SSH_USER: ${{ steps.ssh.outputs.user }}
          SSH_PORT: ${{ steps.ssh.outputs.port }}
        run: |
          set -euo pipefail
          remote_script="$(cat <<'REMOTE'
          set -euo pipefail
          echo 'SCHEMA=tai.model-conversion-progress.v1'
          echo 'MUTATION_MODE=READ_ONLY'
          root=/srv/tai-models/conversion-runs
          if [[ ! -d "$root" ]]; then
            echo 'CONVERSION_ROOT=ABSENT'
            exit 0
          fi
          echo 'CONVERSION_ROOT=PRESENT'
          printf 'WORKSPACE_AVAILABLE_BYTES=%s\n' "$(df -P -B1 /srv/tai-models | awk 'NR==2{print $4}')"
          find "$root" -mindepth 3 -maxdepth 3 -type f -name status.json -printf '%T@\t%p\n' \
            | sort -nr \
            | head -3 \
            | while IFS=$'\t' read -r epoch status_path; do
                run_root="${status_path%/status.json}"
                printf 'RUN_BEGIN=%s\n' "$run_root"
                printf 'STATUS_MTIME_EPOCH=%s\n' "$epoch"
                printf 'STATUS_JSON='; tr '\n' ' ' < "$status_path" | head -c 4000; printf '\n'

                pid_state=ABSENT
                pid_value=''
                if [[ -f "$run_root/driver.pid" ]]; then
                  pid_value="$(tr -cd '0-9' < "$run_root/driver.pid" | head -c 20)"
                  if [[ -n "$pid_value" ]] && kill -0 "$pid_value" 2>/dev/null; then
                    pid_state=ALIVE
                  else
                    pid_state=DEAD
                  fi
                fi
                printf 'DRIVER_PID=%s\n' "$pid_value"
                printf 'DRIVER_PID_STATE=%s\n' "$pid_state"

                if [[ -f "$run_root/driver.log" ]]; then
                  printf 'DRIVER_LOG_SIZE_BYTES=%s\n' "$(stat -c %s "$run_root/driver.log")"
                  printf 'DRIVER_LOG_MTIME_EPOCH=%s\n' "$(stat -c %Y "$run_root/driver.log")"
                  printf 'DRIVER_LOG_LAST_LINE='; grep -a -v '^[[:space:]]*$' "$run_root/driver.log" | tail -n 1 | tr -cd '\11\12\15\40-\176' | head -c 1000; printf '\n'
                fi

                active_log="$(find "$run_root/logs" -maxdepth 1 -type f -name '*.log' -printf '%T@\t%p\n' 2>/dev/null | sort -nr | head -1 | cut -f2-)"
                if [[ -n "$active_log" && -f "$active_log" ]]; then
                  printf 'ACTIVE_LOG_PATH=%s\n' "${active_log#"$run_root/"}"
                  printf 'ACTIVE_LOG_SIZE_BYTES=%s\n' "$(stat -c %s "$active_log")"
                  printf 'ACTIVE_LOG_MTIME_EPOCH=%s\n' "$(stat -c %Y "$active_log")"
                  printf 'ACTIVE_LOG_LAST_LINE='; grep -a -v '^[[:space:]]*$' "$active_log" | tail -n 1 | tr -cd '\11\12\15\40-\176' | head -c 1000; printf '\n'
                fi

                source_files=0
                source_bytes=0
                partial_files=0
                partial_bytes=0
                if [[ -d "$run_root/sources" ]]; then
                  source_files="$(find "$run_root/sources" -type f ! -name '*.partial' | wc -l)"
                  source_bytes="$(find "$run_root/sources" -type f ! -name '*.partial' -printf '%s\n' | awk '{s+=$1} END{printf "%.0f", s+0}')"
                  partial_files="$(find "$run_root/sources" -type f -name '*.partial' | wc -l)"
                  partial_bytes="$(find "$run_root/sources" -type f -name '*.partial' -printf '%s\n' | awk '{s+=$1} END{printf "%.0f", s+0}')"
                fi
                printf 'SOURCE_FILES=%s\n' "$source_files"
                printf 'SOURCE_BYTES=%s\n' "$source_bytes"
                printf 'PARTIAL_FILES=%s\n' "$partial_files"
                printf 'PARTIAL_BYTES=%s\n' "$partial_bytes"

                step_complete=0
                step_failed=0
                if [[ -d "$run_root/evidence/steps" ]]; then
                  step_complete="$(grep -l '"status": "COMPLETE"' "$run_root"/evidence/steps/*.json 2>/dev/null | grep -v '\.argv\.json$' | wc -l)"
                  step_failed="$(grep -l '"status": "FAILED_CLOSED"' "$run_root"/evidence/steps/*.json 2>/dev/null | grep -v '\.argv\.json$' | wc -l)"
                fi
                printf 'STEP_COMPLETE=%s\n' "$step_complete"
                printf 'STEP_FAILED=%s\n' "$step_failed"

                artifact_count=0
                artifact_bytes=0
                artifact_list=''
                if [[ -d "$run_root/artifacts" ]]; then
                  artifact_count="$(find "$run_root/artifacts" -maxdepth 1 -type f -name '*.gguf' | wc -l)"
                  artifact_bytes="$(find "$run_root/artifacts" -maxdepth 1 -type f -name '*.gguf' -printf '%s\n' | awk '{s+=$1} END{printf "%.0f", s+0}')"
                  artifact_list="$(find "$run_root/artifacts" -maxdepth 1 -type f -name '*.gguf' -printf '%f:%s;' | LC_ALL=C sort | head -c 4000)"
                fi
                printf 'ARTIFACT_COUNT=%s\n' "$artifact_count"
                printf 'ARTIFACT_BYTES=%s\n' "$artifact_bytes"
                printf 'ARTIFACT_LIST=%s\n' "$artifact_list"
                echo 'RUN_END=true'
              done
          REMOTE
          )"
          set +e
          ssh -i "$HOME/.ssh/id_tai_model_progress" -p "$SSH_PORT" \
            -o BatchMode=yes -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" 'bash -s' \
            > "$REPORT_ROOT/remote.txt" 2> "$REPORT_ROOT/remote.stderr" <<< "$remote_script"
          remote_exit=$?
          set -e
          printf '%s\n' "$remote_exit" > "$REPORT_ROOT/remote-exit-code.txt"

      - name: Record unavailable transport
        if: steps.ssh.outputs.available != 'true'
        shell: bash
        run: |
          set -euo pipefail
          : > "$REPORT_ROOT/remote.txt"
          printf '%s\n' 'TAI_MODEL_KEY_TRANSPORT_UNAVAILABLE' > "$REPORT_ROOT/remote.stderr"
          printf '%s\n' '2' > "$REPORT_ROOT/remote-exit-code.txt"

      - name: Build bounded progress report
        if: always()
        shell: bash
        env:
          SSH_AVAILABLE: ${{ steps.ssh.outputs.available }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path(os.environ['REPORT_ROOT'])
          raw = (root / 'remote.txt').read_text(encoding='utf-8', errors='replace') if (root / 'remote.txt').exists() else ''
          stderr = (root / 'remote.stderr').read_text(encoding='utf-8', errors='replace') if (root / 'remote.stderr').exists() else ''
          exit_code = int((root / 'remote-exit-code.txt').read_text().strip()) if (root / 'remote-exit-code.txt').exists() else 255
          numeric = {
              'STATUS_MTIME_EPOCH', 'DRIVER_PID', 'DRIVER_LOG_SIZE_BYTES',
              'DRIVER_LOG_MTIME_EPOCH', 'ACTIVE_LOG_SIZE_BYTES',
              'ACTIVE_LOG_MTIME_EPOCH', 'SOURCE_FILES', 'SOURCE_BYTES',
              'PARTIAL_FILES', 'PARTIAL_BYTES', 'STEP_COMPLETE', 'STEP_FAILED',
              'ARTIFACT_COUNT', 'ARTIFACT_BYTES',
          }
          runs = []
          current = None
          observed = {}
          for line in raw.splitlines():
              key, sep, value = line.partition('=')
              if not sep:
                  continue
              if key == 'RUN_BEGIN':
                  current = {'run_root': value}
                  runs.append(current)
                  continue
              if key == 'RUN_END':
                  current = None
                  continue
              target = current if current is not None else observed
              if key in numeric:
                  try:
                      target[key.lower()] = int(float(value or '0'))
                  except ValueError:
                      target[key.lower()] = None
              else:
                  target[key.lower()] = value[:4000]
          payload = {
              'schema_version': 'tai.model-conversion-progress.v1',
              'status': 'COMPLETE' if exit_code == 0 else 'PARTIAL',
              'exact_main_sha': os.environ['GITHUB_SHA'],
              'workflow_run_id': int(os.environ['GITHUB_RUN_ID']),
              'workflow_run_attempt': int(os.environ['GITHUB_RUN_ATTEMPT']),
              'issue': 2932,
              'command': '/tai diagnose model-progress exact-main',
              'transport': 'AVAILABLE' if os.environ.get('SSH_AVAILABLE') == 'true' else 'UNAVAILABLE',
              'remote_exit_code': exit_code,
              'mutation_mode': observed.get('mutation_mode'),
              'conversion_root': observed.get('conversion_root', 'UNKNOWN'),
              'workspace_available_bytes': int(observed.get('workspace_available_bytes', '0') or 0),
              'runs': runs,
              'stderr': stderr[:4000],
              'benchmark_status': 'NOT_RUN',
              'model_admission_status': 'NOT_DONE',
              'production_operational_status': 'NOT_ATTESTED',
          }
          (root / 'progress.json').write_text(
              json.dumps(payload, ensure_ascii=False, indent=2, sort_keys=True) + '\n'
          )

          lines = [
              '## TAI model conversion progress',
              '',
              f"- exact-main diagnostic authority: `{payload['exact_main_sha']}`;",
              f"- diagnostic status: `{payload['status']}`;",
              f"- model-host transport: `{payload['transport']}`;",
              f"- conversion root: `{payload['conversion_root']}`;",
              f"- workspace available bytes: `{payload['workspace_available_bytes']}`;",
              f"- observed runs: `{len(runs)}`;",
          ]
          for run in runs:
              last_line = str(run.get('active_log_last_line') or run.get('driver_log_last_line') or '')
              last_line = last_line.replace('`', "'")[:500]
              lines.extend([
                  f"  - run: `{run.get('run_root')}`;",
                  f"    - state: `{run.get('status_json', 'UNKNOWN')}`;",
                  f"    - driver PID: `{run.get('driver_pid_state', 'UNKNOWN')}` / `{run.get('driver_pid', 0)}`;",
                  f"    - source: `{run.get('source_files', 0)}` files / `{run.get('source_bytes', 0)}` bytes;",
                  f"    - partial: `{run.get('partial_files', 0)}` files / `{run.get('partial_bytes', 0)}` bytes;",
                  f"    - active log: `{run.get('active_log_path', 'NONE')}` / `{run.get('active_log_size_bytes', 0)}` bytes;",
                  f"    - last progress: `{last_line or 'NO_LOG_LINE'}`;",
                  f"    - completed steps: `{run.get('step_complete', 0)}`; failed steps: `{run.get('step_failed', 0)}`;",
                  f"    - GGUF artifacts: `{run.get('artifact_count', 0)}` files / `{run.get('artifact_bytes', 0)}` bytes;",
                  f"    - artifact list: `{run.get('artifact_list', '')}`;",
              ])
          lines.extend([
              '- mutation mode: `READ_ONLY`;',
              '- benchmark: `NOT_RUN`;',
              '- model admission: `NOT_DONE`;',
              '- production operational status: `NOT_ATTESTED`.',
          ])
          (root / 'summary.md').write_text('\n'.join(lines) + '\n')
          PY
          test "$(stat -c %s "$REPORT_ROOT/progress.json")" -le 100000
          test "$(stat -c %s "$REPORT_ROOT/summary.md")" -le 30000

      - name: Upload bounded progress evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tai-model-conversion-progress-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: model-conversion-progress
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
          overwrite: false
          include-hidden-files: false

      - name: Publish concise progress
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ ! -s "$REPORT_ROOT/summary.md" ]]; then
            printf '%s\n' \
              '## TAI model conversion progress' \
              '' \
              '- diagnostic status: `FAILED_CLOSED`;' \
              '- mutation mode: `READ_ONLY`;' \
              '- production operational status: `NOT_ATTESTED`.' \
              > "$REPORT_ROOT/summary.md"
          fi
          jq -n --rawfile body "$REPORT_ROOT/summary.md" '{body: $body}' \
            | gh api --method POST "repos/$REPOSITORY/issues/2932/comments" --input -
