name: Apply TAI Gateway scope prerequisite

on:
  push:
    branches: [governance/tai-gateway-ui-scope-prereq-v2]
    paths: [.github/workflows/apply-tai-gateway-scope-prereq.yml]

permissions:
  contents: write

concurrency:
  group: apply-tai-gateway-scope-prereq-v2
  cancel-in-progress: false

jobs:
  apply:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: governance/tai-gateway-ui-scope-prereq-v2
          fetch-depth: 0
      - name: Register scope before implementation
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          branch = "agent/tai-gateway-ui-readonly-3004"
          allowed = [
            ".env.example",
            ".github/workflows/tai-gateway-ui-readonly-binding.yml",
            "apps/api/src/modules/ai-insights/ai-assistant-stream.contract.ts",
            "apps/api/src/modules/ai-insights/ai-assistant.controller.ts",
            "apps/api/src/modules/ai-insights/ai-assistant.controller.spec.ts",
            "apps/api/src/modules/ai-insights/ai-assistant.service.ts",
            "apps/api/src/modules/ai-insights/ai-assistant.service.spec.ts",
            "apps/tai/governance/scopes/ap-17-gateway-ui-3004.json",
            "apps/web/app/api/proxy/[...path]/route.ts",
            "apps/web/app/api/public-platform-assistant/route.ts",
            "apps/web/components/platform-v7/AiAssistantPanel.tsx",
            "apps/web/components/platform-v7/PublicPlatformAssistant.tsx",
            "apps/web/lib/platform-v7/ai-gateway-stream.ts",
            "apps/web/tests/unit/platformV7AiGatewayStream.test.ts",
            "apps/web/tests/unit/platformV7PublicAssistantTransportResilience.test.ts",
            "apps/web/tests/unit/platformV7RoleScopedAiAssistant.test.ts",
            "docs/platform-v7/ai/gateway-ui-readonly-runtime-binding.md",
            "docs/platform-v7/autopilot/autopilot-state.json"
          ]
          state_path = Path("docs/platform-v7/autopilot/autopilot-state.json")
          state = json.loads(state_path.read_text())
          scopes = state.setdefault("approvedConcurrentScopes", {})
          existing = scopes.get(branch)
          if existing not in (None, allowed):
            raise SystemExit("conflicting AP-17 scope registration")
          scopes[branch] = allowed
          state_path.write_text(json.dumps(state, ensure_ascii=False, separators=(",", ":")) + "\n")

          manifest = {
            "schema_version": "tai.concurrent-scope.v1",
            "program_issue": 2726,
            "issue": 3004,
            "branch": branch,
            "exact_base": "2cb731d02e546d1240d601f57b8c396453306310",
            "allowed_paths": allowed,
            "acceptance": [
              "authoritative approvedConcurrentScopes registration precedes implementation changes",
              "private SSE proxy preserves streaming with aligned timeout and cancellation",
              "generation model and provider are exactly bound to admitted readiness identity",
              "aborted or truncated streams never remain visually equivalent to validated answers",
              "unsupported or ambiguous public questions abstain",
              "production feature flags remain disabled until healthy admitted read-only runtime evidence exists"
            ],
            "forbidden_capabilities": [
              "model bundle, benchmark, admission authority, runtime-host or quality-scoring changes",
              "write-tool activation",
              "client-selected tenant, organization, membership or role authority",
              "live-runtime or production-attestation claim without exact endpoint evidence"
            ]
          }
          manifest_path = Path("apps/tai/governance/scopes/ap-17-gateway-ui-3004.json")
          manifest_path.parent.mkdir(parents=True, exist_ok=True)
          manifest_path.write_text(json.dumps(manifest, ensure_ascii=False, indent=2) + "\n")
          PY
          git rm .github/workflows/apply-tai-gateway-scope-prereq.yml
      - name: Commit clean prerequisite
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'governance: authorize TAI Gateway read-only remediation scope'
          git push origin HEAD:governance/tai-gateway-ui-scope-prereq-v2
