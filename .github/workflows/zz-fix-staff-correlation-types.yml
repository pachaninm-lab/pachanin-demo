name: fix staff correlation types

on:
  push:
    branches:
      - ops-fix-staff-correlation-types

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/platform-v7-staff-control-center
          fetch-depth: 0
      - name: Widen correlation IDs to validated strings
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/api/src/modules/staff-access/staff-support.service.ts')
          source = path.read_text()
          source = source.replace('    correlationId = randomUUID(),', '    correlationId: string = randomUUID(),')
          expected = 4
          if source.count('correlationId: string = randomUUID(),') != expected:
            raise SystemExit(f'Expected {expected} widened correlation parameters')
          path.write_text(source)
          PY
      - name: Commit correlation typing fix
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'platform-v7-ops'
          git config user.email 'platform-v7-ops@users.noreply.github.com'
          git add apps/api/src/modules/staff-access/staff-support.service.ts
          git commit -m 'Fix Staff Support correlation ID typing'
          git push origin HEAD:feat/platform-v7-staff-control-center
