name: TAI PR 2839 Hardening Finalize

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-pr-2839-hardening-finalize.yml

permissions:
  contents: write

concurrency:
  group: tai-pr-2839-hardening-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: >-
      github.event.pull_request.number == 2839 &&
      github.event.pull_request.head.ref == 'agent/tai-ap-13b3a-model-bundle-authority'
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      EXACT_PR_HEAD: ${{ github.event.pull_request.head.sha }}
      PATCH_SHA256: f456105a3305d9600056df12619236fe0b9c67291c767840047ab9036c3c01a8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_PR_HEAD }}
          fetch-depth: 1

      - name: Enforce exact branch head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXACT_PR_HEAD"
          test "$GITHUB_HEAD_REF" = 'agent/tai-ap-13b3a-model-bundle-authority'

      - name: Decode and apply validated hardening patch
        shell: bash
        run: |
          set -euo pipefail
          base64 --decode .github/tai-pr-2839-hardening.patch.gz.b64 \
            | gzip --decompress \
            > /tmp/ap13b3a-hardening.patch
          test "$(sha256sum /tmp/ap13b3a-hardening.patch | cut -d' ' -f1)" = "$PATCH_SHA256"
          git apply --check /tmp/ap13b3a-hardening.patch
          git apply /tmp/ap13b3a-hardening.patch
          git diff --check

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml

      - name: Install TAI development dependencies
        run: python -m pip install -e 'apps/tai[dev]'

      - name: Verify hardened AP-13B.3a contract
        shell: bash
        run: |
          set -euo pipefail
          ruff check \
            apps/tai/tai/model_bundle_v2.py \
            apps/tai/tai/model_bundle_v2_common.py \
            apps/tai/tai/model_bundle_v2_parse.py \
            apps/tai/tai/model_bundle_v2_serialize.py \
            apps/tai/tai/model_bundle_v2_types.py \
            apps/tai/tai/model_bundle_v2_verify.py \
            apps/tai/tests/model_bundle_v2_support.py \
            apps/tai/tests/test_ap13b3a_scope.py \
            apps/tai/tests/test_model_bundle_v2_adversarial.py \
            apps/tai/tests/test_model_bundle_v2_contract.py
          mypy --strict \
            apps/tai/tai/model_bundle_v2.py \
            apps/tai/tai/model_bundle_v2_common.py \
            apps/tai/tai/model_bundle_v2_parse.py \
            apps/tai/tai/model_bundle_v2_serialize.py \
            apps/tai/tai/model_bundle_v2_types.py \
            apps/tai/tai/model_bundle_v2_verify.py
          pytest -q \
            apps/tai/tests/test_ap13b3a_scope.py \
            apps/tai/tests/test_model_bundle_v2_adversarial.py \
            apps/tai/tests/test_model_bundle_v2_contract.py \
            --cov=tai.model_bundle_v2 \
            --cov=tai.model_bundle_v2_common \
            --cov=tai.model_bundle_v2_parse \
            --cov=tai.model_bundle_v2_serialize \
            --cov=tai.model_bundle_v2_types \
            --cov=tai.model_bundle_v2_verify \
            --cov-report=term-missing \
            --cov-fail-under=90

      - name: Remove helper material and commit atomically
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/tai-pr-2839-hardening.patch.gz.b64 \
            .github/workflows/tai-pr-2839-source-snapshot.yml \
            .github/workflows/tai-pr-2839-hardening-finalize.yml \
            .coverage \
            .coverage.*
          rm -rf \
            .mypy_cache \
            .pytest_cache \
            .ruff_cache \
            apps/tai/.coverage \
            apps/tai/.mypy_cache \
            apps/tai/.pytest_cache \
            apps/tai/.ruff_cache \
            apps/tai/transparent_agro_intelligence.egg-info
          find apps/tai -type d -name __pycache__ -prune -exec rm -rf {} +
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          python - <<'PY'
          import subprocess

          expected = {
              '.github/tai-pr-2839-hardening.patch.gz.b64',
              '.github/workflows/tai-pr-2839-hardening-finalize.yml',
              '.github/workflows/tai-pr-2839-source-snapshot.yml',
              'apps/tai/governance/scopes/ap-13b3a-2836.json',
              'apps/tai/model-artifacts/local-model-artifact-bundle.schema.v2.json',
              'apps/tai/model-artifacts/model-bundle-acquisition-runbook.v2.md',
              'apps/tai/tai/model_bundle_v2_common.py',
              'apps/tai/tai/model_bundle_v2_parse.py',
              'apps/tai/tai/model_bundle_v2_serialize.py',
              'apps/tai/tai/model_bundle_v2_types.py',
              'apps/tai/tai/model_bundle_v2_verify.py',
              'apps/tai/tests/model_bundle_v2_support.py',
              'apps/tai/tests/test_ap13b3a_scope.py',
              'apps/tai/tests/test_model_bundle_v2_adversarial.py',
          }
          staged = set(
              subprocess.check_output(
                  ['git', 'diff', '--cached', '--name-only'],
                  text=True,
              ).splitlines()
          )
          if staged != expected:
              raise SystemExit(
                  f'unexpected staged paths: missing={sorted(expected - staged)}, '
                  f'extra={sorted(staged - expected)}'
              )
          PY
          git commit -m 'fix(tai): harden model bundle v2 evidence authority'
          git push origin HEAD:agent/tai-ap-13b3a-model-bundle-authority
