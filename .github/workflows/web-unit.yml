name: web-unit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-unit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Full web unit suite with log
        run: |
          set +e
          pnpm --filter @pc/web exec vitest run --reporter=verbose --testTimeout=5000 --hookTimeout=5000 --teardownTimeout=5000 > web-unit.log 2>&1
          status=$?
          tail -n 260 web-unit.log
          exit $status
      - name: Upload web-unit log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-unit-log
          path: web-unit.log
