name: web-unit

# VP-2.5 regression gate: полный юнит-набор apps/web должен быть зелёным
# перед мержем в main. Эта джоба — required-гейт (full web vitest).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: web-unit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - name: Full web unit suite with diagnostic log
        run: |
          set +e
          timeout 240s pnpm --filter @pc/web test -- --reporter=verbose > web-unit.log 2>&1
          status=$?
          tail -n 260 web-unit.log
          exit $status
      - name: Upload web-unit diagnostic log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-unit-log
          path: web-unit.log
