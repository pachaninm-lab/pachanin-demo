name: remove legacy single-session staff bff

on:
  push:
    branches:
      - ui/staff-control-center

permissions:
  contents: write

jobs:
  remove-and-self-delete:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ui/staff-control-center
          fetch-depth: 0
      - name: Remove legacy route and proxy
        shell: bash
        run: |
          set -euo pipefail
          git rm apps/web/app/api/staff/'[...path]'/route.ts
          git rm apps/web/lib/server/staff/staff-api-proxy.ts
          git rm .github/workflows/zz-staff-remove-legacy-bff.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'Remove legacy single-session staff BFF'
          git push origin HEAD:ui/staff-control-center
