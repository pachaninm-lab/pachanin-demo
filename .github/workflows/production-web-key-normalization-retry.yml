name: Retry Exact Web Release 58b4624

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/production-web-key-normalization-retry.yml'
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Enter RETRY-58B4624'
        required: true
        type: string

permissions:
  contents: read
  packages: read
  issues: write

concurrency:
  group: production-web-key-normalization-retry
  cancel-in-progress: false

env:
  TARGET_SHA: 58b46246ac67eb31a913a8da0de74a78ed1fd095
  EXACT_IMAGE: ghcr.io/pachaninm-lab/grainflow-web:sha-58b4624
  LIVE_BASE: https://xn----8sbjf4befbjgs9b.xn--p1ai
  LIVE_DOMAIN: xn----8sbjf4befbjgs9b.xn--p1ai
  DEFAULT_HOST: 195.19.12.120
  EVIDENCE_DIR: artifacts/production-web-key-normalization-retry
  RELEASE_ISSUE_NUMBER: 3048
  SSH_HOST_SECRET: ${{ secrets.PC_PROD_HOST }}
  SSH_USER_SECRET: ${{ secrets.PC_PROD_SSH_USER }}
  SSH_PORT_SECRET: ${{ secrets.PC_PROD_SSH_PORT }}
  SSH_KEY_PRIMARY: ${{ secrets.PC_PROD_SSH_KEY }}
  SSH_KEY_SECONDARY: ${{ secrets.PC_PROD_SSH_PRIVATE_KEY }}
  SSH_KEY_FALLBACK: ${{ secrets.VPS_SSH_KEY }}
  SSH_PASSWORD_PRIMARY: ${{ secrets.PC_PROD_SSH_PASSWORD }}
  SSH_PASSWORD_FALLBACK: ${{ secrets.VPS_SSH_PASSWORD }}
  SSH_HOST_FINGERPRINT_SECRET: ${{ secrets.PC_PROD_SSH_HOST_FINGERPRINT }}

jobs:
  retry:
    name: Recover protected transport and retry web-only rollout
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       github.actor == github.repository_owner &&
       inputs.confirmation == 'RETRY-58B4624')
    runs-on: ubuntu-24.04
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate immutable target and image
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          git fetch --no-tags origin main
          git cat-file -e "${TARGET_SHA}^{commit}"
          git merge-base --is-ancestor "$TARGET_SHA" origin/main
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin >/dev/null
          docker pull "$EXACT_IMAGE"
          actual="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$EXACT_IMAGE")"
          [[ "$actual" == "$TARGET_SHA" ]]
          docker image inspect "$EXACT_IMAGE" > "$EVIDENCE_DIR/registry-image.json"
          printf '%s\n' "$TARGET_SHA" > "$EVIDENCE_DIR/target-sha.txt"

      - name: Resolve protected credential and pinned host identity
        id: ssh
        shell: bash
        run: |
          set -euo pipefail

          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          host="$(trim "${SSH_HOST_SECRET:-$DEFAULT_HOST}")"
          user="$(trim "${SSH_USER_SECRET:-}")"
          port="$(trim "${SSH_PORT_SECRET:-22}")"
          expected_host_fingerprint="$(trim "${SSH_HOST_FINGERPRINT_SECRET:-}")"
          [[ "$host" == "$DEFAULT_HOST" ]] || { echo 'SSH host is not the canonical REG.RU VPS.' >&2; exit 7; }
          [[ "$user" == root ]] || { echo 'Protected SSH user is not the accepted production principal.' >&2; exit 8; }
          [[ "$port" =~ ^[0-9]+$ ]] && (( port >= 1 && port <= 65535 )) || { echo 'Protected SSH port is invalid.' >&2; exit 9; }

          mkdir -p "$HOME/.ssh" "$EVIDENCE_DIR"
          chmod 700 "$HOME/.ssh"
          selected_slot=''
          selected_class=''

          validate_private_key() {
            local slot="$1" class="$2" source="$3" key_path="$HOME/.ssh/id_pc_prod" public_tmp first_line
            [[ -s "$source" ]] || return 1
            tr -d '\r' < "$source" > "$key_path"
            chmod 600 "$key_path"
            first_line="$(head -n 1 "$key_path")"
            case "$first_line" in
              ssh-*|ecdsa-*|sk-*) return 1 ;;
              '-----BEGIN OPENSSH PRIVATE KEY-----'|'-----BEGIN RSA PRIVATE KEY-----'|'-----BEGIN EC PRIVATE KEY-----'|'-----BEGIN PRIVATE KEY-----') ;;
              *) return 1 ;;
            esac
            public_tmp="$(mktemp)"
            if ! ssh-keygen -y -P '' -f "$key_path" > "$public_tmp" 2>/dev/null; then rm -f "$public_tmp"; return 1; fi
            ssh-keygen -lf "$public_tmp" > "$EVIDENCE_DIR/ssh-key-fingerprint.txt"
            rm -f "$public_tmp"
            selected_slot="$slot"
            selected_class="$class"
            return 0
          }

          try_key_slot() {
            local slot="$1" raw="$2" raw_file escaped_file decoded_file
            [[ -n "$raw" ]] || return 1
            raw_file="$(mktemp)"; escaped_file="$(mktemp)"; decoded_file="$(mktemp)"
            printf '%s\n' "$raw" > "$raw_file"
            if validate_private_key "$slot" multiline-private-key "$raw_file"; then rm -f "$raw_file" "$escaped_file" "$decoded_file"; return 0; fi
            printf '%s' "${raw//\\n/$'\n'}" > "$escaped_file"
            if validate_private_key "$slot" escaped-newline-private-key "$escaped_file"; then rm -f "$raw_file" "$escaped_file" "$decoded_file"; return 0; fi
            if printf '%s' "$raw" | base64 --decode > "$decoded_file" 2>/dev/null && validate_private_key "$slot" base64-private-key "$decoded_file"; then
              rm -f "$raw_file" "$escaped_file" "$decoded_file"; return 0
            fi
            rm -f "$raw_file" "$escaped_file" "$decoded_file"
            return 1
          }

          mode=''
          if try_key_slot PC_PROD_SSH_PRIVATE_KEY "${SSH_KEY_SECONDARY:-}" ||
             try_key_slot VPS_SSH_KEY "${SSH_KEY_FALLBACK:-}" ||
             try_key_slot PC_PROD_SSH_KEY "${SSH_KEY_PRIMARY:-}"; then
            mode=key
            printf '%s\n' "$selected_slot" > "$EVIDENCE_DIR/ssh-credential-slot.txt"
            printf '%s\n' "$selected_class" > "$EVIDENCE_DIR/ssh-key-class.txt"
          elif [[ -n "${SSH_PASSWORD_PRIMARY:-}" || -n "${SSH_PASSWORD_FALLBACK:-}" ]]; then
            mode=password
            printf '%s\n' protected-password-fallback > "$EVIDENCE_DIR/ssh-credential-slot.txt"
            printf '%s\n' unavailable-private-key > "$EVIDENCE_DIR/ssh-key-class.txt"
            printf '%s\n' '#!/usr/bin/env sh' 'printf '\''%s\\n'\'' "$PC_SSH_PASSWORD"' > "$HOME/.ssh/askpass.sh"
            chmod 700 "$HOME/.ssh/askpass.sh"
          else
            printf '%s\n' no-valid-protected-credential > "$EVIDENCE_DIR/ssh-credential-slot.txt"
            printf '%s\n' invalid-private-key > "$EVIDENCE_DIR/ssh-key-class.txt"
            echo 'No valid protected VPS credential is configured.' >&2
            exit 10
          fi

          domain_ips="$(getent ahostsv4 "$LIVE_DOMAIN" | awk '{print $1}' | sort -u || true)"
          printf '%s\n' "$domain_ips" > "$EVIDENCE_DIR/domain-ip.txt"
          grep -Fxq "$DEFAULT_HOST" "$EVIDENCE_DIR/domain-ip.txt"

          scans=()
          for attempt in 1 2 3; do
            scan="$(mktemp)"
            ssh-keyscan -T 10 -p "$port" "$host" 2>/dev/null | sort -u > "$scan"
            [[ -s "$scan" ]] || { rm -f "$scan"; echo 'Unable to obtain the production SSH host key.' >&2; exit 11; }
            scans+=("$scan")
            sleep 2
          done
          cmp -s "${scans[0]}" "${scans[1]}" && cmp -s "${scans[0]}" "${scans[2]}" || {
            printf '%s\n' unstable-scan > "$EVIDENCE_DIR/ssh-host-key-status.txt"
            rm -f "${scans[@]}"
            echo 'Production SSH host keys were not stable across independent scans.' >&2
            exit 12
          }

          if [[ -n "$expected_host_fingerprint" ]]; then
            [[ "$expected_host_fingerprint" =~ ^SHA256:[A-Za-z0-9+/=]+$ ]] || { echo 'Protected SSH host fingerprint is invalid.' >&2; exit 13; }
            matching="$(mktemp)"
            while IFS= read -r host_line; do
              [[ -n "$host_line" ]] || continue
              actual_fingerprint="$(printf '%s\n' "$host_line" | ssh-keygen -lf - -E sha256 2>/dev/null | awk '{print $2}' || true)"
              [[ "$actual_fingerprint" != "$expected_host_fingerprint" ]] || printf '%s\n' "$host_line" >> "$matching"
            done < "${scans[0]}"
            [[ "$(grep -c . "$matching" || true)" == 1 ]] || { rm -f "$matching" "${scans[@]}"; echo 'The VPS host key did not uniquely match the protected fingerprint.' >&2; exit 14; }
            mv "$matching" "$HOME/.ssh/known_hosts"
            printf '%s\n' verified-secret > "$EVIDENCE_DIR/ssh-host-key-status.txt"
          else
            cp "${scans[0]}" "$HOME/.ssh/known_hosts"
            printf '%s\n' stable-canonical-scan > "$EVIDENCE_DIR/ssh-host-key-status.txt"
          fi
          rm -f "${scans[@]}"
          chmod 600 "$HOME/.ssh/known_hosts"
          ssh-keygen -lf "$HOME/.ssh/known_hosts" -E sha256 > "$EVIDENCE_DIR/ssh-host-key-fingerprints.txt"

          common=(-p "$port" -o ConnectTimeout=15 -o ConnectionAttempts=1 -o StrictHostKeyChecking=yes -o NumberOfPasswordPrompts=1)
          if [[ "$mode" == key ]]; then
            ssh -i "$HOME/.ssh/id_pc_prod" "${common[@]}" -o BatchMode=yes -o IdentitiesOnly=yes "$user@$host" \
              'set -euo pipefail; test "$(id -u)" -eq 0; docker version >/dev/null; docker compose version >/dev/null; echo SSH_AUTH_OK' \
              > "$EVIDENCE_DIR/ssh-auth.txt"
          else
            password="${SSH_PASSWORD_PRIMARY:-${SSH_PASSWORD_FALLBACK:-}}"
            PC_SSH_PASSWORD="$password" SSH_ASKPASS="$HOME/.ssh/askpass.sh" SSH_ASKPASS_REQUIRE=force DISPLAY=:0 \
              setsid -w ssh "${common[@]}" -o BatchMode=no -o PreferredAuthentications=password -o PubkeyAuthentication=no "$user@$host" \
              'set -euo pipefail; test "$(id -u)" -eq 0; docker version >/dev/null; docker compose version >/dev/null; echo SSH_AUTH_OK' \
              > "$EVIDENCE_DIR/ssh-auth.txt"
          fi
          grep -Fxq SSH_AUTH_OK "$EVIDENCE_DIR/ssh-auth.txt"
          printf '%s\n' "$mode" > "$EVIDENCE_DIR/ssh-transport-mode.txt"
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "user=$user" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"

      - name: Copy immutable release assets
        env:
          SSH_HOST: ${{ steps.ssh.outputs.host }}
          SSH_USER: ${{ steps.ssh.outputs.user }}
          SSH_PORT: ${{ steps.ssh.outputs.port }}
          SSH_MODE: ${{ steps.ssh.outputs.mode }}
        shell: bash
        run: |
          set -euo pipefail
          files=(scripts/production-web-exact-sha.sh scripts/production-web-live-acceptance.sh scripts/production-web-remote-entrypoint.sh infra/compose/production-web-hardening.override.yml)
          destinations=("/tmp/pc-production-web-exact-sha-${GITHUB_RUN_ID}.sh" "/tmp/pc-production-web-live-acceptance-${GITHUB_RUN_ID}.sh" "/tmp/pc-production-web-remote-entrypoint-${GITHUB_RUN_ID}.sh" "/tmp/pc-production-web-hardening-${GITHUB_RUN_ID}.yml")
          for index in "${!files[@]}"; do
            if [[ "$SSH_MODE" == key ]]; then
              scp -i "$HOME/.ssh/id_pc_prod" -P "$SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "${files[$index]}" "$SSH_USER@$SSH_HOST:${destinations[$index]}"
            else
              password="${SSH_PASSWORD_PRIMARY:-${SSH_PASSWORD_FALLBACK:-}}"
              PC_SSH_PASSWORD="$password" SSH_ASKPASS="$HOME/.ssh/askpass.sh" SSH_ASKPASS_REQUIRE=force DISPLAY=:0 \
                setsid -w scp -P "$SSH_PORT" -o BatchMode=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -o StrictHostKeyChecking=yes -o NumberOfPasswordPrompts=1 "${files[$index]}" "$SSH_USER@$SSH_HOST:${destinations[$index]}"
            fi
          done

      - name: Execute bounded web-only deployment
        id: production
        env:
          SSH_HOST: ${{ steps.ssh.outputs.host }}
          SSH_USER: ${{ steps.ssh.outputs.user }}
          SSH_PORT: ${{ steps.ssh.outputs.port }}
          SSH_MODE: ${{ steps.ssh.outputs.mode }}
        shell: bash
        run: |
          set -euo pipefail
          remote="/tmp/pc-production-web-remote-entrypoint-${GITHUB_RUN_ID}.sh"
          command="chmod 0700 '$remote' && PROD_DIR_B64='' PROD_COMPOSE_B64='' PROD_PROJECT_B64='' '$remote' deploy '$TARGET_SHA' '$GITHUB_RUN_ID'"
          raw_log="$(mktemp)"
          set +e
          if [[ "$SSH_MODE" == key ]]; then
            ssh -i "$HOME/.ssh/id_pc_prod" -p "$SSH_PORT" -o BatchMode=yes -o ConnectTimeout=20 -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "$command" > "$raw_log" 2>&1
            rc=$?
          else
            password="${SSH_PASSWORD_PRIMARY:-${SSH_PASSWORD_FALLBACK:-}}"
            PC_SSH_PASSWORD="$password" SSH_ASKPASS="$HOME/.ssh/askpass.sh" SSH_ASKPASS_REQUIRE=force DISPLAY=:0 \
              setsid -w ssh -p "$SSH_PORT" -o BatchMode=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -o ConnectTimeout=20 -o StrictHostKeyChecking=yes -o NumberOfPasswordPrompts=1 "$SSH_USER@$SSH_HOST" "$command" > "$raw_log" 2>&1
            rc=$?
          fi
          set -e
          sed -E '/^(PERSISTENT_IMAGE_OVERRIDE|PC_IMAGE_OVERRIDE|PROD_DIR|PRODUCTION_DIR|WORKDIR|CONFIG_FILES|COMPOSE_FILES?|[A-Z0-9_]*_PATH)=/ s#=.*#=[REDACTED]#' "$raw_log" > "$EVIDENCE_DIR/production-action.log"
          rm -f "$raw_log"
          cat "$EVIDENCE_DIR/production-action.log"
          for field in ROLLBACK_BASELINE_REVISION DEPLOYMENT_COMPLETE WATCHTOWER_RETIRED PERSISTENT_OVERRIDE_MUTATED DEPLOYED_WEB_REVISION DEPLOYED_WEB_STATE; do
            value="$(sed -n "s/^${field}=//p" "$EVIDENCE_DIR/production-action.log" | tail -1)"
            output_name="$(printf '%s' "$field" | tr '[:upper:]' '[:lower:]')"
            echo "${output_name}=${value:-unknown}" >> "$GITHUB_OUTPUT"
          done
          (( rc == 0 )) || exit "$rc"

      - name: Verify exact public runtime
        id: live
        if: steps.production.outputs.deployment_complete == '1'
        continue-on-error: true
        env:
          PC_LIVE_BASE: ${{ env.LIVE_BASE }}
        shell: bash
        run: |
          set -euo pipefail
          bash scripts/production-web-live-acceptance.sh "$TARGET_SHA" deploy | tee "$EVIDENCE_DIR/live-acceptance.log"

      - name: Restore exact baseline after live failure
        if: steps.live.outcome == 'failure'
        env:
          BASELINE_SHA: ${{ steps.production.outputs.rollback_baseline_revision }}
          SSH_HOST: ${{ steps.ssh.outputs.host }}
          SSH_USER: ${{ steps.ssh.outputs.user }}
          SSH_PORT: ${{ steps.ssh.outputs.port }}
          SSH_MODE: ${{ steps.ssh.outputs.mode }}
        shell: bash
        run: |
          set -euo pipefail
          [[ "$BASELINE_SHA" =~ ^[0-9a-f]{40}$ ]]
          remote="/tmp/pc-production-web-remote-entrypoint-${GITHUB_RUN_ID}.sh"
          command="PROD_DIR_B64='' PROD_COMPOSE_B64='' PROD_PROJECT_B64='' '$remote' rollback '$BASELINE_SHA' '$GITHUB_RUN_ID'"
          if [[ "$SSH_MODE" == key ]]; then
            ssh -i "$HOME/.ssh/id_pc_prod" -p "$SSH_PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER@$SSH_HOST" "$command"
          else
            password="${SSH_PASSWORD_PRIMARY:-${SSH_PASSWORD_FALLBACK:-}}"
            PC_SSH_PASSWORD="$password" SSH_ASKPASS="$HOME/.ssh/askpass.sh" SSH_ASKPASS_REQUIRE=force DISPLAY=:0 \
              setsid -w ssh -p "$SSH_PORT" -o BatchMode=no -o PreferredAuthentications=password -o PubkeyAuthentication=no -o StrictHostKeyChecking=yes -o NumberOfPasswordPrompts=1 "$SSH_USER@$SSH_HOST" "$command"
          fi | sed -E '/^(PERSISTENT_IMAGE_OVERRIDE|PC_IMAGE_OVERRIDE|PROD_DIR|PRODUCTION_DIR|WORKDIR|CONFIG_FILES|COMPOSE_FILES?|[A-Z0-9_]*_PATH)=/ s#=.*#=[REDACTED]#' | tee "$EVIDENCE_DIR/live-failure-rollback.log"

      - name: Publish retry record
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          DEPLOYMENT_COMPLETE: ${{ steps.production.outputs.deployment_complete }}
          DEPLOYED_REVISION: ${{ steps.production.outputs.deployed_web_revision }}
          DEPLOYED_STATE: ${{ steps.production.outputs.deployed_web_state }}
          BASELINE_REVISION: ${{ steps.production.outputs.rollback_baseline_revision }}
          WATCHTOWER_RETIRED: ${{ steps.production.outputs.watchtower_retired }}
          PERSISTENT_OVERRIDE_MUTATED: ${{ steps.production.outputs.persistent_override_mutated }}
          TRANSPORT_MODE: ${{ steps.ssh.outputs.mode }}
          LIVE_OUTCOME: ${{ steps.live.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          key_class="$(cat "$EVIDENCE_DIR/ssh-key-class.txt" 2>/dev/null || echo not-validated)"
          host_key_status="$(cat "$EVIDENCE_DIR/ssh-host-key-status.txt" 2>/dev/null || echo not-validated)"
          live_acceptance="$(sed -n 's/^LIVE_ACCEPTANCE=//p' "$EVIDENCE_DIR/live-acceptance.log" 2>/dev/null | tail -1 || true)"
          rollback_result=not-required
          [[ ! -f "$EVIDENCE_DIR/live-failure-rollback.log" ]] || rollback_result=attempted
          record="$EVIDENCE_DIR/retry-issue-comment.md"
          {
            echo "## Protected-transport production retry \`$GITHUB_RUN_ID\`"
            echo
            echo "- target SHA: \`$TARGET_SHA\`"
            echo "- protected transport: \`${TRANSPORT_MODE:-not-resolved}\`"
            echo "- SSH key classification: \`$key_class\`"
            echo "- VPS host-key verification: \`$host_key_status\`"
            echo "- deployment complete: \`${DEPLOYMENT_COMPLETE:-0}\`"
            echo "- running OCI revision: \`${DEPLOYED_REVISION:-unknown}\`"
            echo "- Docker state: \`${DEPLOYED_STATE:-unknown}\`"
            echo "- live acceptance: \`${live_acceptance:-${LIVE_OUTCOME:-skipped}}\`"
            echo "- rollback baseline: \`${BASELINE_REVISION:-unknown}\`"
            echo "- rollback result: \`$rollback_result\`"
            echo "- Watchtower retired: \`${WATCHTOWER_RETIRED:-0}\`"
            echo "- persistent override mutation: \`${PERSISTENT_OVERRIDE_MUTATED:-unknown}\`"
          } > "$record"
          find "$EVIDENCE_DIR" -type f ! -name sha256.txt -print0 | sort -z | xargs -0 -r sha256sum > "$EVIDENCE_DIR/sha256.txt"
          gh issue comment "$RELEASE_ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file "$record"
          if [[ "${DEPLOYMENT_COMPLETE:-0}" == 1 && "${DEPLOYED_REVISION:-}" == "$TARGET_SHA" && "${live_acceptance:-}" == PASS && "${WATCHTOWER_RETIRED:-0}" == 1 && "$host_key_status" =~ ^(verified-secret|stable-canonical-scan)$ ]]; then
            gh issue close "$RELEASE_ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed
          fi

      - name: Enforce retry result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          [[ '${{ steps.production.outputs.deployment_complete }}' == 1 ]]
          [[ '${{ steps.production.outputs.deployed_web_revision }}' == "$TARGET_SHA" ]]
          [[ '${{ steps.live.outcome }}' == success ]]

      - name: Upload retry evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-web-key-normalization-retry-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
