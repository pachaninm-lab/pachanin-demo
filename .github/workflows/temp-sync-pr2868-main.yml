name: Temporary sync PR 2868 with main

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  sync:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13cd-benchmark-admission-v2
          fetch-depth: 0
      - name: Merge exact main and remove temporary workflow
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin main
          git merge --no-edit origin/main
          rm .github/workflows/temp-sync-pr2868-main.yml
          git add .github/workflows/temp-sync-pr2868-main.yml
          git commit --amend --no-edit
          git push origin HEAD:agent/tai-ap-13cd-benchmark-admission-v2
