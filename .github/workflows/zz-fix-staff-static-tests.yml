name: fix staff static tests

on:
  push:
    branches:
      - ops-fix-staff-static-tests

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/platform-v7-staff-control-center
          fetch-depth: 0
      - name: Align assertions with exact implementation source
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/web/tests/unit/platformV7StaffOperationalWorkspaces.test.ts')
          source = path.read_text()
          source = source.replace(
            "expect(component).toContain('if (!next.active || !next.session) clearPrivilegedState()');",
            "expect(component).toContain('if (!next.active || !next.session) {');",
          )
          old = """    for (const pattern of [
                '^support\\\\/cases$',
                '^support\\\\/cases\\\\/[^/]+\\\\/transition$',
                '^support\\\\/users\\\\/[^/]+\\\\/revoke-sessions$',
                '^support\\\\/users\\\\/[^/]+\\\\/recovery$',
              ]) expect(route).toContain(pattern);"""
          new = """    expect(route).toContain('/^support\\\\/cases$/');
              expect(route).toContain('/^support\\\\/cases\\\\/[^/]+\\\\/transition$/');
              expect(route).toContain('/^support\\\\/users\\\\/[^/]+\\\\/revoke-sessions$/');
              expect(route).toContain('/^support\\\\/users\\\\/[^/]+\\\\/recovery$/');"""
          if old not in source:
            raise SystemExit('Route pattern assertion block not found')
          path.write_text(source.replace(old, new, 1))
          PY
      - name: Commit exact test correction
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'platform-v7-ops'
          git config user.email 'platform-v7-ops@users.noreply.github.com'
          git add apps/web/tests/unit/platformV7StaffOperationalWorkspaces.test.ts
          git commit -m 'Align Staff Control Center static tests with implementation'
          git push origin HEAD:feat/platform-v7-staff-control-center
