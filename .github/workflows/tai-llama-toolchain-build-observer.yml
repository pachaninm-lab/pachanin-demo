name: TAI Exact-Main Release Observer

# Read-only diagnostic; this workflow is never merged.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-llama-toolchain-build-observer.yml

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Extract exact-main industrial gate failure
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          FAILED_JOB_ID: '88309192487'
        run: |
          set -euo pipefail
          exact_main="$(gh api "/repos/$REPOSITORY/commits/main" --jq '.sha')"
          printf 'EXACT_MAIN=%s\n' "$exact_main"
          gh api "/repos/$REPOSITORY/actions/jobs/$FAILED_JOB_ID/logs" > failed.log
          grep -aE '(^|[^A-Za-z])(FAIL|FAILED|Error:|error:|AssertionError|expected|received|timeout|timed out|ECONN|duplicate|deadlock|P95|p95|threshold|##\[error\])' failed.log \
            | tail -80 || true
