name: TAI Exact-Main Release Observer

# Read-only diagnostic; this workflow is never merged.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-llama-toolchain-build-observer.yml

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Print exact load-proof failure section
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          FAILED_JOB_ID: '88309192487'
        run: |
          set -euo pipefail
          exact_main="$(gh api "/repos/$REPOSITORY/commits/main" --jq '.sha')"
          printf 'EXACT_MAIN=%s\n' "$exact_main"
          gh api "/repos/$REPOSITORY/actions/jobs/$FAILED_JOB_ID/logs" > failed.log
          awk '
            /FAIL test\/industrial\/load-proof\.e2e-spec\.ts/ { printing=1 }
            printing { print; lines += 1 }
            printing && (/Test Suites:/ || lines >= 160) { exit }
          ' failed.log
