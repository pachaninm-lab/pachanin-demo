name: TAI llama.cpp Build Observer

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-llama-toolchain-build-observer.yml

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Extract handoff failure
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          HANDOFF_JOB_ID: '88303764538'
        run: |
          set -euo pipefail
          gh api "/repos/$REPOSITORY/actions/jobs/$HANDOFF_JOB_ID/logs" > handoff.log
          grep -aE '(_MISMATCH|_INVALID|_NOT_|_CARDINALITY_|Error:|##\[error\])' handoff.log | tail -20 || true
