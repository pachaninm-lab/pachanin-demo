name: TAI Source Acquisition Validation Observer

# Temporary read-only diagnostic. This workflow is never merged.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-llama-toolchain-build-observer.yml

permissions:
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Run pinned actionlint
        shell: bash
        run: |
          set -u -o pipefail
          export GOBIN="$RUNNER_TEMP/bin"
          mkdir -p "$GOBIN"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          set +e
          "$GOBIN/actionlint" -oneline .github/workflows/tai-model-source-acquisition.yml > actionlint.out 2>&1
          status=$?
          set -e
          printf 'ACTIONLINT_EXIT=%s\n' "$status"
          cat actionlint.out
          exit "$status"
