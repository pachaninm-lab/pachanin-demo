name: TAI Source Acquisition Validation Observer

# Temporary read-only diagnostic. This workflow is never merged.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-llama-toolchain-build-observer.yml

permissions:
  actions: read
  checks: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact current main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Extract invalid workflow diagnostics
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          FAILED_RUN_ID: '29734867969'
        run: |
          set -euo pipefail

          printf '%s\n' '=== gh run view ==='
          gh run view "$FAILED_RUN_ID" --repo "$REPOSITORY" || true
          printf '%s\n' '=== gh run view log-failed ==='
          gh run view "$FAILED_RUN_ID" --repo "$REPOSITORY" --log-failed || true

          printf '%s\n' '=== exact workflow identity ==='
          sha256sum .github/workflows/tai-model-source-acquisition.yml
          sed -n '1,520p' .github/workflows/tai-model-source-acquisition.yml

          printf '%s\n' '=== actionlint v1.7.7 ==='
          export GOBIN="$RUNNER_TEMP/bin"
          mkdir -p "$GOBIN"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7
          "$GOBIN/actionlint" -oneline -verbose .github/workflows/tai-model-source-acquisition.yml
