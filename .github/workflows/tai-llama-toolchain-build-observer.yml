name: TAI Source Acquisition Validation Observer

# Temporary read-only diagnostic. This workflow is never merged.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-llama-toolchain-build-observer.yml

permissions:
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Run pinned actionlint only
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -u -o pipefail
          gh api "/repos/$REPOSITORY/contents/.github/workflows/tai-model-source-acquisition.yml?ref=main" \
            --jq '.content' | tr -d '\n' | base64 --decode \
            > tai-model-source-acquisition.yml
          export GOBIN="$RUNNER_TEMP/bin"
          mkdir -p "$GOBIN"
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.7 \
            >/dev/null 2>&1
          set +e
          "$GOBIN/actionlint" -oneline tai-model-source-acquisition.yml \
            > actionlint.out 2>&1
          status=$?
          set -e
          printf 'ACTIONLINT_EXIT=%s\n' "$status"
          cat actionlint.out
          exit "$status"
