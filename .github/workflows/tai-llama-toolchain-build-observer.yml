name: TAI Source Acquisition Observer

# Temporary read-only diagnostic. This workflow is never merged.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-llama-toolchain-build-observer.yml

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Report all recent source acquisition events
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          exact_main="$(gh api "/repos/$REPOSITORY/commits/main" --jq '.sha')"
          printf 'EXACT_MAIN=%s\n' "$exact_main"

          gh api "/repos/$REPOSITORY/actions/workflows/tai-model-source-acquisition.yml/runs?per_page=50" > runs.json
          jq -r '.workflow_runs[] | ["CANDIDATE",.id,.event,.status,.conclusion,.head_branch,.head_sha,.actor.login,.triggering_actor.login,.created_at,.updated_at] | @tsv' runs.json
          run_id="$(jq -r '[.workflow_runs[] | select(.event == "issue_comment")] | sort_by(.created_at) | reverse | .[0].id // empty' runs.json)"
          if [[ -z "$run_id" ]]; then
            echo 'ISSUE_COMMENT_RUN=ABSENT'
            exit 0
          fi

          gh api "/repos/$REPOSITORY/actions/runs/$run_id/jobs?per_page=100" > jobs.json
          jq -r '.jobs[] | ["JOB",.id,.name,.status,.conclusion,.head_sha,.started_at,.completed_at] | @tsv' jobs.json
          jq -r '.jobs[] | .name as $job | .steps[]? | ["STEP",$job,.number,.name,.status,.conclusion] | @tsv' jobs.json

          gh api "/repos/$REPOSITORY/actions/runs/$run_id/artifacts?per_page=100" > artifacts.json
          jq -r '.artifacts[] | ["ARTIFACT",.id,.name,.size_in_bytes,.expired,.digest,.created_at,.expires_at] | @tsv' artifacts.json
