name: TAI Source Acquisition Observer

# Temporary read-only diagnostic. This workflow is never merged.
on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-llama-toolchain-build-observer.yml

permissions:
  actions: read
  contents: read

jobs:
  observe:
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - name: Report latest owner source acquisition
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          current_main="$(gh api "/repos/$REPOSITORY/commits/main" --jq '.sha')"
          owner="$(gh api "/repos/$REPOSITORY" --jq '.owner.login')"
          printf 'CURRENT_MAIN=%s\nOWNER=%s\n' "$current_main" "$owner"

          gh api "/repos/$REPOSITORY/actions/workflows/tai-model-source-acquisition.yml/runs?event=issue_comment&per_page=50" > runs.json
          jq -r '.workflow_runs[] | ["CANDIDATE",.id,.status,.conclusion,.head_branch,.head_sha,.actor.login,.triggering_actor.login,.created_at,.updated_at] | @tsv' runs.json
          run_id="$(jq -r --arg owner "$owner" '[.workflow_runs[] | select(.actor.login == $owner)] | sort_by(.created_at) | reverse | .[0].id // empty' runs.json)"
          test -n "$run_id"

          gh api "/repos/$REPOSITORY/actions/runs/$run_id" > run.json
          jq -r '["ACQUISITION_RUN",.id,.name,.event,.status,.conclusion,.head_branch,.head_sha,.run_number,.run_attempt,.actor.login,.triggering_actor.login,.created_at,.run_started_at,.updated_at] | @tsv' run.json

          gh api "/repos/$REPOSITORY/actions/runs/$run_id/jobs?per_page=100" > jobs.json
          jq -r '.jobs[] | ["JOB",.id,.name,.status,.conclusion,.head_sha,.started_at,.completed_at] | @tsv' jobs.json
          jq -r '.jobs[] | .name as $job | .steps[]? | ["STEP",$job,.number,.name,.status,.conclusion] | @tsv' jobs.json

          gh api "/repos/$REPOSITORY/actions/runs/$run_id/artifacts?per_page=100" > artifacts.json
          jq -r '.artifacts[] | ["ARTIFACT",.id,.name,.size_in_bytes,.expired,.digest,.created_at,.expires_at] | @tsv' artifacts.json
