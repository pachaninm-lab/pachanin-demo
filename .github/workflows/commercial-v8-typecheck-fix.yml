name: Commercial v8 typecheck fix

on:
  push:
    branches:
      - codex/design-system-v8-commercial-roles
    paths:
      - .github/workflows/commercial-v8-typecheck-fix.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/design-system-v8-commercial-roles
          fetch-depth: 0
      - name: Remove unavailable legacy imports and use current cockpit API
        shell: python
        run: |
          from pathlib import Path
          import re

          seller = Path('apps/web/app/platform-v7/seller/page.tsx')
          text = seller.read_text()
          text = text.replace("@/components/platform-v7/RoleExecutionCockpit';", "@/components/platform-v7/RoleExecutionCockpit';")
          text = text.replace("@/components/platform-v7/RoleExecutionCockpit';", "@/components/platform-v7/RoleExecutionCockpit';")
          text = text.replace("import { RoleExecutionCockpitContent } from '@/components/platform-v7/RoleExecutionCockpit';", "import { RoleExecutionCockpitContent } from '@/components/platform-v7/RoleExecutionCockpit';")
          text = text.replace("@/lib/platform-v7/role-execution-cockpits';", "@/lib/platform-v7/role-execution-cockpit';")
          text = text.replace("import { MoneyGateRing } from '@/components/platform-v7/visual/MoneyGateRing';\n", "")
          text = re.sub(r"\n\s*<MoneyGateRing[\s\S]*?\n\s*/>", "", text, count=1)
          seller.write_text(text)

          buyer = Path('apps/web/app/platform-v7/buyer/page.tsx')
          text = buyer.read_text()
          for line in [
              "import { BuyerFavoritesPanel } from '@/components/platform-v7/BuyerFavoritesPanel';\n",
              "import { P7ExecutionActionsPanel } from '@/components/platform-v7/P7ExecutionActionsPanel';\n",
              "import { buyerSdizActionItems, buyerSdizInitialState } from '@/lib/platform-v7/buyer-sdiz-actions';\n",
              "import { CreditBureauPanel } from '@/components/platform-v7/CreditBureauPanel';\n",
              "import { EscrowPanel } from '@/components/platform-v7/EscrowPanel';\n",
              "import { MoneyGateRing } from '@/components/platform-v7/visual/MoneyGateRing';\n",
          ]:
              text = text.replace(line, "")
          text = text.replace("@/lib/platform-v7/role-execution-cockpits';", "@/lib/platform-v7/role-execution-cockpit';")
          text = re.sub(r"\n\s*<MoneyGateRing[\s\S]*?\n\s*/>", "", text, count=1)
          text = re.sub(r"\n\s*<P7ExecutionActionsPanel[\s\S]*?\n\s*/>", "", text, count=1)
          text = re.sub(r"\n\s*<CollapsibleSection title='Риск и финансовые инструменты'[\s\S]*?</CollapsibleSection>", "", text, count=1)
          text = re.sub(r"\n\s*<CollapsibleSection title='Избранные лоты и поставщики'[\s\S]*?</CollapsibleSection>", "", text, count=1)
          buyer.write_text(text)

          bank = Path('apps/web/app/platform-v7/bank/page.tsx')
          text = bank.read_text()
          text = text.replace("import { RoleExecutionCockpitPage } from '@/components/platform-v7/RoleExecutionCockpit';", "import { RoleExecutionCockpitPage } from '@/components/platform-v7/RoleExecutionCockpit';\nimport { PRIMARY_ROLE_EXECUTION_COCKPITS } from '@/lib/platform-v7/role-execution-cockpit';")
          text = text.replace("<RoleExecutionCockpitPage role='bank' />", "<RoleExecutionCockpitPage cockpit={PRIMARY_ROLE_EXECUTION_COCKPITS.bank} />")
          text = text.replace(" liveStops={liveStops}", " blockers={liveStops}")
          bank.write_text(text)

          test = Path('apps/web/tests/unit/designSystemV8CommercialRoles.test.ts')
          text = test.read_text()
          text = text.replace("expect(buyer).toContain('P7ExecutionActionsPanel');", "expect(buyer).toContain('WorkflowActionPanel');")
          text = text.replace("expect(buyer).toContain('EscrowPanel');", "expect(buyer).toContain('MoneyImpactSummaryStrip');")
          test.write_text(text)

      - name: Remove one-shot workflow and commit
        shell: bash
        run: |
          git rm .github/workflows/commercial-v8-typecheck-fix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/app/platform-v7/seller/page.tsx apps/web/app/platform-v7/buyer/page.tsx apps/web/app/platform-v7/bank/page.tsx apps/web/tests/unit/designSystemV8CommercialRoles.test.ts
          git commit -m "Align commercial v8 roles with current runtime contracts"
          git push origin HEAD:codex/design-system-v8-commercial-roles
