name: production public entry watch PR 20260721

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium and WebKit
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run public entry watch
        working-directory: apps/web
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../../artifacts/public-entry-watch
          {
            echo "timestamp=$(date -u +%FT%TZ)"
            echo "dns:"
            getent ahostsv4 xn----8sbjf4befbjgs9b.xn--p1ai || true
            echo "http:"
            for route in /platform-v7 /platform-v7/login /platform-v7/forgot-password; do
              curl -sS -L --max-redirs 10 --connect-timeout 15 --max-time 45 \
                -o /dev/null \
                -w "$route status=%{http_code} final=%{url_effective} redirects=%{num_redirects} remote=%{remote_ip}\n" \
                "https://xn----8sbjf4befbjgs9b.xn--p1ai$route"
            done
          } | tee ../../artifacts/public-entry-watch/network.txt
          cat > /tmp/watch.mjs <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import { chromium, webkit } from '@playwright/test';

          const base = 'https://xn----8sbjf4befbjgs9b.xn--p1ai';
          const out = path.resolve(process.cwd(), '../../artifacts/public-entry-watch');
          const routes = [
            ['/platform-v7', 'landing', 500],
            ['/platform-v7/login', 'login', 120],
            ['/platform-v7/forgot-password', 'recovery', 120],
          ];
          const locales = ['ru', 'en', 'zh'];
          const projects = [
            ['chromium-desktop', chromium, { viewport: { width: 1440, height: 1000 } }],
            ['chromium-mobile', chromium, { viewport: { width: 390, height: 844 }, isMobile: true, hasTouch: true }],
            ['webkit-iphone', webkit, { viewport: { width: 390, height: 844 }, isMobile: true, hasTouch: true }],
          ];
          const localeMap = { ru: 'ru-RU', en: 'en-US', zh: 'zh-CN' };
          const failures = [];
          const cases = [];
          const add = (scope, message, details = null) => failures.push({ scope, message, details });
          const redirects = (response) => {
            let count = 0;
            let request = response?.request();
            while (request?.redirectedFrom()) { count += 1; request = request.redirectedFrom(); }
            return count;
          };

          for (const [projectName, browserType, options] of projects) {
            const browser = await browserType.launch({ headless: true });
            for (const [route, kind, minText] of routes) {
              for (const locale of locales) {
                const scope = `${projectName}:${kind}:${locale}`;
                const context = await browser.newContext({ ...options, locale: localeMap[locale] });
                const page = await context.newPage();
                const consoleErrors = [];
                const runtimeErrors = [];
                const failedRequests = [];
                const badResponses = [];
                page.on('console', (message) => { if (message.type() === 'error') consoleErrors.push(message.text()); });
                page.on('pageerror', (error) => runtimeErrors.push(String(error?.stack || error)));
                page.on('requestfailed', (request) => {
                  const errorText = request.failure()?.errorText || 'unknown';
                  if (!errorText.includes('ERR_ABORTED')) failedRequests.push({ url: request.url(), errorText });
                });
                page.on('response', (response) => {
                  if (response.url().startsWith(base) && response.status() >= 400 && !response.url().includes('/favicon')) badResponses.push({ url: response.url(), status: response.status() });
                });
                try {
                  const response = await page.goto(`${base}${route}?lang=${locale}`, { waitUntil: 'networkidle', timeout: 60_000 });
                  const final = new URL(page.url());
                  const metrics = await page.evaluate(() => ({
                    textLength: document.body?.innerText?.trim().length || 0,
                    scrollWidth: document.documentElement.scrollWidth,
                    clientWidth: document.documentElement.clientWidth,
                    htmlLang: document.documentElement.lang,
                    storageKeys: [...Object.keys(localStorage), ...Object.keys(sessionStorage)],
                    hrefs: Array.from(document.querySelectorAll('a[href]')).map((node) => node.getAttribute('href') || ''),
                  }));
                  const localeLinks = Object.fromEntries(locales.map((code) => [code, metrics.hrefs.some((href) => new RegExp(`(?:\\?|&)lang=${code}(?:&|$)`).test(href))]));
                  const roleSelectors = await page.locator('select[name*="role" i],input[name*="role" i],[data-role-selector],[data-testid*="role-selector" i]').count();
                  const h1 = await page.locator('h1').first().isVisible().catch(() => false);
                  const password = kind !== 'login' || await page.locator('input[type="password"]').first().isVisible().catch(() => false);
                  const email = kind !== 'recovery' || await page.locator('input[type="email"],input[name*="email" i]').first().isVisible().catch(() => false);
                  const loginLinks = kind === 'landing' ? await page.locator('a[href*="/platform-v7/login"]').count() : 1;
                  if ((response?.status() || 0) !== 200) add(scope, `HTTP ${response?.status() || 0}`);
                  if (redirects(response) > 3) add(scope, `redirect chain ${redirects(response)}`);
                  if (final.pathname !== route) add(scope, `final path ${final.pathname}`);
                  if (final.searchParams.has('role') || final.searchParams.has('as')) add(scope, `role context in URL ${final}`);
                  if (metrics.textLength < minText) add(scope, `probable white screen ${metrics.textLength}`);
                  if (!h1 || !password || !email || loginLinks < 1) add(scope, 'required public UI missing');
                  if (metrics.scrollWidth > metrics.clientWidth + 2) add(scope, `overflow ${metrics.scrollWidth}/${metrics.clientWidth}`);
                  if (!metrics.htmlLang.toLowerCase().startsWith(locale)) add(scope, `html lang ${metrics.htmlLang}`);
                  if (!localeLinks.ru || !localeLinks.en || !localeLinks.zh) add(scope, 'RU/EN/ZH links incomplete', localeLinks);
                  if (roleSelectors) add(scope, `role selector detected ${roleSelectors}`);
                  if (consoleErrors.length) add(scope, 'console errors', consoleErrors);
                  if (runtimeErrors.length) add(scope, 'runtime/hydration errors', runtimeErrors);
                  if (failedRequests.length) add(scope, 'failed requests', failedRequests);
                  if (badResponses.length) add(scope, 'bad responses', badResponses);
                  if (metrics.storageKeys.some((key) => /demo|auth|session|token/i.test(key))) add(scope, 'auth/demo state in browser storage', metrics.storageKeys);
                  cases.push({ scope, status: response?.status(), final: final.toString(), redirects: redirects(response), metrics, localeLinks, roleSelectors, consoleErrors, runtimeErrors, failedRequests, badResponses });
                } catch (error) {
                  add(scope, 'navigation failure or redirect loop', String(error));
                }
                await context.close();
              }
            }
            await browser.close();
          }

          for (const [projectName, browserType, options] of projects) {
            const scope = `${projectName}:fail-closed-login`;
            const browser = await browserType.launch({ headless: true });
            const context = await browser.newContext({ ...options, locale: 'ru-RU' });
            const page = await context.newPage();
            const runtimeErrors = [];
            page.on('pageerror', (error) => runtimeErrors.push(String(error?.stack || error)));
            await page.route('**/api/auth/**', async (route) => route.request().method() === 'POST' ? route.abort('failed') : route.continue());
            try {
              await page.goto(`${base}/platform-v7/login?lang=ru`, { waitUntil: 'networkidle', timeout: 60_000 });
              await page.locator('input[type="email"],input[name*="email" i]').first().fill('watch-invalid@example.test');
              await page.locator('input[type="password"]').first().fill('Invalid-Watch-Password-2026!');
              await page.locator('button[type="submit"]').first().click();
              await page.waitForTimeout(2500);
              const final = new URL(page.url());
              const cookies = await context.cookies();
              const forbidden = cookies.filter((cookie) => /(?:access|refresh|session|mfa|cabinet|demo)/i.test(cookie.name)).map((cookie) => cookie.name);
              const storage = await page.evaluate(() => [...Object.keys(localStorage), ...Object.keys(sessionStorage)]);
              const body = await page.locator('body').innerText();
              if (final.pathname !== '/platform-v7/login') add(scope, `left login ${final}`);
              if (final.searchParams.has('role') || final.searchParams.has('as')) add(scope, `role context in URL ${final}`);
              if (forbidden.length) add(scope, 'auth/session/demo cookies created', forbidden);
              if (storage.some((key) => /demo|auth|session|token/i.test(key))) add(scope, 'auth/demo storage created', storage);
              if (!/недоступ|ошиб|повтор|unable|error|try again|不可用|错误|重试/i.test(body)) add(scope, 'no visible fail-closed feedback');
              if (runtimeErrors.length) add(scope, 'runtime errors', runtimeErrors);
              cases.push({ scope, final: final.toString(), forbidden, storage, runtimeErrors });
            } catch (error) {
              add(scope, 'fail-closed scenario failed', String(error));
            }
            await context.close();
            await browser.close();
          }

          const report = { generatedAt: new Date().toISOString(), base, cases, failures, allGreen: failures.length === 0 };
          fs.writeFileSync(path.join(out, 'public-entry-watch.json'), JSON.stringify(report, null, 2));
          console.log(JSON.stringify({ allGreen: report.allGreen, cases: cases.length, failures }, null, 2));
          if (failures.length) process.exit(1);
          NODE
          node /tmp/watch.mjs
      - name: Upload watch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-watch-20260721-0015
          path: artifacts/public-entry-watch
          if-no-files-found: error
          retention-days: 7
