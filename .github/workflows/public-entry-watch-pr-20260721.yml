name: public entry watch PR 20260721

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium and WebKit
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run production public-entry watch
        working-directory: apps/web
        env:
          BASE_URL: https://xn----8sbjf4befbjgs9b.xn--p1ai
          ARTIFACT_DIR: ../../artifacts/public-entry-watch-20260721
        run: node scripts/public-entry-watch-20260721.mjs 2>&1 | tee ../../artifacts/public-entry-watch-20260721/run.log
      - name: Publish concise watch result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const file = 'artifacts/public-entry-watch-20260721/report.json';
            let body;
            if (!fs.existsSync(file)) {
              body = '<!-- public-entry-watch-result -->\n## Public entry watch\n\nRESULT_UNAVAILABLE: report.json was not produced.';
            } else {
              const report = JSON.parse(fs.readFileSync(file, 'utf8'));
              const summary = {
                generatedAt: report.generatedAt,
                cases: Array.isArray(report.cases) ? report.cases.length : 0,
                failures: Array.isArray(report.failures) ? report.failures : [],
              };
              body = `<!-- public-entry-watch-result -->\n## Public entry watch\n\n\`\`\`json\n${JSON.stringify(summary, null, 2)}\n\`\`\``;
            }
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              per_page: 100,
            });
            const previous = comments.find((comment) => comment.body?.includes('<!-- public-entry-watch-result -->'));
            if (previous) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: previous.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
      - name: Upload watch artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-watch-20260721
          path: artifacts/public-entry-watch-20260721
          if-no-files-found: error
          retention-days: 7
