name: Temporary IR-10.3 source-of-truth transition

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  transition:
    if: ${{ !contains(github.event.head_commit.message, '[ir-10-3-transitioned]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Advance source of truth to IR-10.3
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          merge_commit = 'a272a1e64b1a30d1e5b2a3052ca66653afd7b66f'
          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(state_path.read_text())

          state['baseline']['branch'] = 'main'
          state['baseline']['commit'] = merge_commit
          state['baseline']['verifiedAt'] = '2026-07-13'
          state['mode'] = 'ir-10-labs-postgresql-authority'
          state['status'] = 'active'
          state['currentStatus'] = 'in_progress'
          state['current'] = 'IR-10.3 Labs PostgreSQL Authority'
          state['openPr'] = None

          logistics_closed = '#2412 Logistics PostgreSQL Authority'
          if logistics_closed not in state['lastClosed']:
              state['lastClosed'].append(logistics_closed)
          state['closedCapabilities']['logisticsPostgresqlAuthority'] = {
              'status': 'merged-isolated-postgresql-evidence',
              'pr': '#2412',
              'mergeCommit': merge_commit,
              'remainingBoundaries': [
                  'IR-31 normalized logistics and acceptance',
                  'IR-55 telematics and GIS EPD provider conformance',
              ],
          }

          state['openBlockers'] = [
              'Labs, Settlement reads/commands and Disputes can still bind process-memory repositories.',
              'Legacy OutboxRelayService and process-memory OutboxService still coexist with DurableOutboxWorker.',
              'Inbound webhook idempotency is process-memory and no durable integration inbox exists.',
              'Partner API credentials and webhook subscriptions are process-memory.',
              'Canonical Auction/Deal Basis and versioned Payment Terms are incomplete; winnerBidId is carried in a legacy field.',
              'Laboratory accreditation, custody, methods, equipment, protocol authority and dispute state machines are not yet fully PostgreSQL-authoritative.',
              'Evidence object retention, malware quarantine and repeatable signature verification are not accepted.',
              'Adapter conformance, vendor mappings and fail-closed live configuration are incomplete.',
              'Role cabinets and offline acknowledgement are not fully proven against authoritative server state.',
              'Production configuration, dedicated worker topology, SLO operations, HA, provider PITR/restore, production-scale load and external security acceptance are unproven.',
          ]
          state['blockerNotes'] = (
              'The merged Deal, identity, Documents, Logistics, reconciliation and durable-worker slices are retained as evidence, '
              'not extrapolated into platform-wide readiness. Industrial Integration-Ready remains NO-GO until every mandatory '
              'gate in the governing specification has exact-commit evidence.'
          )
          state['lockedUntilCurrentGreen'] = [
              'IR-10.4 Settlement PostgreSQL Authority',
              'IR-10.5 Disputes PostgreSQL Authority',
              'IR-20 Canonical Durable Outbox',
              'IR-21 Durable Integration Inbox',
              'IR-22 Persistent Partner API and Outbound Webhooks',
              'IR-30 through IR-90 in dependency order',
          ]

          scope = [
              'docs/platform-v7/autopilot/autopilot-state.json',
              'docs/platform-v7/autopilot/progress.json',
              'docs/platform-v7/autopilot/prompts/current-codex-task.md',
              'docs/platform-v7/autopilot/prompts/current-review-task.md',
              'docs/platform-v7/execution-queue.md',
              'apps/api/src/common/config/industrial-mode.ts',
              'apps/api/src/common/command-execution.context.ts',
              'apps/api/src/common/prisma/rls-transaction.service.ts',
              'apps/api/src/modules/deals/deal-command.service.ts',
              'apps/api/src/modules/deals/deal-command-payload.ts',
              'apps/api/src/modules/deals/postgresql-deal-command.service.ts',
              'apps/api/src/modules/deals/postgresql-deal-command.service.spec.ts',
              'apps/api/src/modules/labs/**',
              'apps/api/prisma/schema.prisma',
              'apps/api/prisma/migrations/20260713*_labs_postgresql_authority/**',
              'apps/api/test/industrial/harness.ts',
              'apps/api/test/industrial/deal-command-no-fake-live.e2e-spec.ts',
              'apps/api/test/industrial/labs-postgresql-authority.e2e-spec.ts',
              'apps/api/test/one-deal/industrial-one-deal.e2e-spec.ts',
              'apps/api/test/one-deal/labs-postgresql-authority.e2e-spec.ts',
              'apps/api/test/one-deal/restored-database-acceptance.ts',
              'apps/api/test/one-deal/seed.ts',
              'infra/sql/postgresql-labs-authority-policies.sql',
              'scripts/platform-v7-forward-only-migration-check.mjs',
              'scripts/platform-v7-one-deal-e2e.sh',
              '.github/workflows/ci.yml',
          ]
          state['allowedCurrentScope'] = scope
          state['agentWritableScope'] = list(scope)
          state['currentAcceptance'] = [
              'Production LabsModule binds LAB_REPOSITORY directly to a complete Prisma implementation; RuntimeCore, optional Prisma and repository factory are absent from the production Labs dependency graph.',
