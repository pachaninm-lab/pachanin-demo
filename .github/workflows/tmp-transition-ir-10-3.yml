              'Canonical finalize_lab consumes one valid custody chain and atomically commits protocol facts, Deal mutation, audit and PENDING outbox receipt.',
              'Collection, custody transfer, test result and protocol facts persist through restart and a second API instance; confirmed facts are append-only or corrected by explicit superseding records.',
              'Every lab mutation is idempotent, optimistic-concurrency protected and commits business state, audit and outbox together or rolls back together.',
              'Forward migration succeeds on empty and baseline databases, drift is empty, restricted-principal RLS and exact-head CI are green.',
          ]
          state['nextAfterCurrentGreen'] = [
              'IR-10.4 Settlement PostgreSQL Authority',
              'IR-10.5 Disputes PostgreSQL Authority',
              'IR-20 Canonical Durable Outbox',
              'IR-21 Durable Integration Inbox',
              'IR-22 Persistent Partner API and Outbound Webhooks',
              'IR-30 Canonical Deal and Payment Basis',
              'IR-31 Normalized Logistics and Acceptance',
              'IR-32 Lab, Documents and Disputes State Machines',
              'IR-40 Evidence Object Storage',
              'IR-41 Signature Verification',
              'IR-50 Adapter Conformance followed by IR-51 through IR-55',
              'IR-60 and IR-61 Role UI, Offline, Localization and Accessibility',
              'IR-70 through IR-72 Production Profile, Operations, Load, HA and DR',
              'IR-80 Security and Compliance Evidence',
              'IR-90 End-to-End Acceptance',
          ]
          state['readiness'] = (
              'NO-GO. Documents PostgreSQL authority is merged at a485371e and Logistics PostgreSQL authority is merged at '
              'a272a1e6. Labs, Settlement, Disputes, single outbox ownership, durable inbox/partner state, canonical evidence, '
              'production operations, HA/DR/load and external security acceptance remain open.'
