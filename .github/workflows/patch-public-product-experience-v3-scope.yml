name: Patch Public Product Experience V3 Scope

on:
  push:
    branches:
      - agent/public-product-experience-v3
    paths:
      - '.github/workflows/patch-public-product-experience-v3-scope.yml'

permissions:
  contents: write

jobs:
  patch-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-product-experience-v3
          fetch-depth: 0
      - name: Add exact acceptance files to approved concurrent scope
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(path.read_text(encoding='utf-8'))
          branch = 'agent/public-product-experience-v3'
          scope = state.setdefault('approvedConcurrentScopes', {}).setdefault(branch, [])
          required = [
              '.github/workflows/platform-v7-design-system-v8-acceptance.yml',
              'apps/web/playwright.acceptance.config.ts',
              'apps/web/tests/e2e/platform-v7-public-product-experience-v3.spec.ts',
          ]
          for item in required:
              if item not in scope:
                  scope.append(item)
          scope.sort()
          path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')), encoding='utf-8')
          PY
      - name: Remove one-time workflow and commit governed scope
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/patch-public-product-experience-v3-scope.yml
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'Approve exact Public Product Experience V3 acceptance scope'
          git push origin HEAD:agent/public-product-experience-v3
