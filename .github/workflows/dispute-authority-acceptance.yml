name: Dispute PostgreSQL Authority Acceptance

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dispute-authority-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  EXACT_HEAD: ${{ github.event.pull_request.head.sha || github.sha }}
  TEST_ADMIN_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/grainflow?schema=public
  DATABASE_URL: postgresql://app_deal:app_deal@localhost:5432/grainflow?schema=public
  DISPUTE_DIR: artifacts/dispute-authority

jobs:
  dispute-authority:
    name: PostgreSQL race, money, appeal, rollback and RLS acceptance
    runs-on: ubuntu-latest
    timeout-minutes: 40
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: grainflow
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d grainflow"
          --health-interval 5s --health-timeout 5s --health-retries 20
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_HEAD }}
          fetch-depth: 0

      - name: Initialize exact-head evidence
        run: |
          mkdir -p "$DISPUTE_DIR"
          printf '%s\n' "$EXACT_HEAD" > "$DISPUTE_DIR/exact-head.txt"

      - uses: pnpm/action-setup@v4
        with:
          version: '10.2.1'

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Install frozen dependencies
        run: pnpm install --frozen-lockfile

      - name: Create restricted application principal
        run: |
          psql postgresql://postgres:postgres@localhost:5432/grainflow <<'SQL'
          DO $role$
          BEGIN
            IF NOT EXISTS (SELECT 1 FROM pg_roles WHERE rolname = 'app_deal') THEN
              CREATE ROLE app_deal LOGIN PASSWORD 'app_deal';
            END IF;
          END
          $role$;
          GRANT CONNECT ON DATABASE grainflow TO app_deal;
          GRANT USAGE ON SCHEMA public TO app_deal;
          SQL

      - name: Generate Prisma client
        env:
          DATABASE_URL: ${{ env.TEST_ADMIN_DATABASE_URL }}
        run: pnpm --filter @pc/api exec prisma generate

      - name: Apply forward migrations on PostgreSQL 16
        env:
          DATABASE_URL: ${{ env.TEST_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec prisma migrate deploy 2>&1 | tee "$DISPUTE_DIR/migrate-deploy.log"
          pnpm --filter @pc/api exec prisma migrate status 2>&1 | tee "$DISPUTE_DIR/migrate-status.log"

      - name: Typecheck dispute authority
        env:
          DATABASE_URL: ${{ env.TEST_ADMIN_DATABASE_URL }}
        run: pnpm --filter @pc/api typecheck

      - name: Run dispute authority policy tests
        env:
          DATABASE_URL: ${{ env.TEST_ADMIN_DATABASE_URL }}
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec jest \
            src/modules/disputes/dispute-postgresql-authority.spec.ts \
            src/modules/disputes/disputes.spec.ts \
            --runInBand 2>&1 | tee "$DISPUTE_DIR/policy-jest.log"

      - name: Run PostgreSQL race, restart and rollback acceptance
        run: |
          set -o pipefail
          pnpm --filter @pc/api exec jest --config test/industrial/jest.config.json \
            test/industrial/dispute-postgresql-authority.e2e-spec.ts --runInBand --json \
            --outputFile="$GITHUB_WORKSPACE/$DISPUTE_DIR/dispute-jest.json" \
            2>&1 | tee "$GITHUB_WORKSPACE/$DISPUTE_DIR/dispute-jest.log"

      - name: Capture dispute state after acceptance
        if: always()
        env:
          DATABASE_URL: ${{ env.TEST_ADMIN_DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -P pager=off -c "SELECT id, tenant_id, deal_id, status, outcome, version FROM dispute.cases ORDER BY created_at, id" > "$DISPUTE_DIR/case-state.txt" || true
          psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -P pager=off -c "SELECT id, tenant_id, case_id, status, requested_outcome, opened_by_user_id FROM dispute.appeals ORDER BY opened_at, id" > "$DISPUTE_DIR/appeal-state.txt" || true
          psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -P pager=off -c "SELECT command_type, actor_user_id, idempotency_key, result->>'id' AS case_id FROM dispute.command_receipts ORDER BY created_at, id" > "$DISPUTE_DIR/receipt-state.txt" || true
          psql "$DATABASE_URL" -X -v ON_ERROR_STOP=1 -P pager=off -c "SELECT posting_kind, case_id, ledger_entry_id FROM dispute.ledger_links ORDER BY created_at, id" > "$DISPUTE_DIR/ledger-link-state.txt" || true

      - name: Record migration and authority inventory
        if: always()
        env:
          DATABASE_URL: ${{ env.TEST_ADMIN_DATABASE_URL }}
        run: |
          psql "$DATABASE_URL" -Atc "SELECT schemaname || '.' || tablename || ':' || rowsecurity FROM pg_tables WHERE schemaname='dispute' ORDER BY tablename" > "$DISPUTE_DIR/rls-inventory.txt" || true
          psql "$DATABASE_URL" -Atc "SELECT routine_schema || '.' || routine_name FROM information_schema.routines WHERE routine_schema='dispute' ORDER BY routine_name" > "$DISPUTE_DIR/function-inventory.txt" || true

      - name: Upload dispute authority evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dispute-authority-${{ env.EXACT_HEAD }}
          path: ${{ env.DISPUTE_DIR }}
          if-no-files-found: error
          retention-days: 90

  dispute-gate:
    name: Dispute Authority Gate · all blocking checks
    if: always()
    runs-on: ubuntu-latest
    needs: dispute-authority
    steps:
      - name: Enforce dispute result
        run: test "${{ needs.dispute-authority.result }}" = success
