name: Apply Staff render stability

on:
  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/apply-staff-render-stability.yml
      - .github/scripts/apply-staff-render-stability.py

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'feat/platform-v7-staff-control-center'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feat/platform-v7-staff-control-center
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python .github/scripts/apply-staff-render-stability.py
      - name: Commit stable first render
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git diff --cached --check
          git commit -m "Stabilize Staff Control Center initial render"
          git push origin HEAD:feat/platform-v7-staff-control-center
