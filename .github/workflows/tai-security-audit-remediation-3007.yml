name: TAI Security Audit Remediation 3007

on:
  push:
    branches:
      - agent/tai-security-audit-remediation-3006
    paths:
      - '.github/workflows/tai-security-audit-remediation-3007.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/tai-security-audit-remediation-3007.yml'

permissions:
  actions: read
  contents: write
  issues: write

concurrency:
  group: tai-security-audit-remediation-3007-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  remediate:
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/agent/tai-security-audit-remediation-3006') ||
      (github.event_name == 'pull_request' && github.event.pull_request.number == 3008 && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    env:
      NODE_VERSION: '24'
      PNPM_VERSION: '10.2.1'
      SECURITY_ARTIFACT_DIR: artifacts/security-remediation-3007
      FIXED_SHARP_VERSION: '0.35.3'
    steps:
      - name: Checkout exact remediation branch
        uses: actions/checkout@v4
        with:
          ref: agent/tai-security-audit-remediation-3006
          fetch-depth: 0
          persist-credentials: true

      - name: Setup repository pnpm pin
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Apply minimal compatible sharp override
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'package.json';
          const value = JSON.parse(fs.readFileSync(path, 'utf8'));
          value.pnpm ??= {};
          value.pnpm.overrides ??= {};
          value.pnpm.overrides.sharp = '0.35.3';
          fs.writeFileSync(path, `${JSON.stringify(value, null, 2)}\n`);
          NODE
          test "$(node -p "require('./package.json').pnpm.overrides.sharp")" = "$FIXED_SHARP_VERSION"

      - name: Regenerate exact lockfile and install frozen dependencies
        shell: bash
        run: |
          set -euo pipefail
          pnpm install --lockfile-only
          pnpm install --frozen-lockfile
          git diff --check

      - name: Verify patched production dependency tree
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$SECURITY_ARTIFACT_DIR"
          pnpm -r list --prod --json --depth Infinity \
            > "$SECURITY_ARTIFACT_DIR/pnpm-production-dependencies.json"
          node <<'NODE'
          const fs = require('node:fs');
          const tree = JSON.parse(fs.readFileSync(process.env.SECURITY_ARTIFACT_DIR + '/pnpm-production-dependencies.json', 'utf8'));
          const versions = new Set();
          const visit = (value) => {
            if (!value || typeof value !== 'object') return;
            if (value.name === 'sharp' && typeof value.version === 'string') versions.add(value.version);
            if (Array.isArray(value)) for (const item of value) visit(item);
            else for (const item of Object.values(value)) visit(item);
          };
          visit(tree);
          if (versions.size === 0) throw new Error('sharp is absent from the production dependency inventory');
          if ([...versions].some((version) => version !== '0.35.3')) {
            throw new Error(`unexpected sharp versions: ${[...versions].sort().join(', ')}`);
          }
          console.log(`Verified sharp versions: ${[...versions].join(', ')}`);
          NODE

      - name: Reproduce exact production dependency audit
        shell: bash
        run: |
          set -euo pipefail
          NPM_BULK_AUDIT_INPUT="$SECURITY_ARTIFACT_DIR/pnpm-production-dependencies.json" \
          PNPM_AUDIT_JSON="$SECURITY_ARTIFACT_DIR/pnpm-audit.json" \
          NPM_REGISTRY_URL="https://registry.npmjs.org" \
          node docs/platform-v7/autopilot/collect-npm-bulk-audit.mjs \
            > "$SECURITY_ARTIFACT_DIR/pnpm-audit.stdout.txt" \
            2> "$SECURITY_ARTIFACT_DIR/pnpm-audit.stderr.txt"
          SECURITY_EXACT_HEAD="$GITHUB_SHA" \
          PNPM_AUDIT_JSON="$SECURITY_ARTIFACT_DIR/pnpm-audit.json" \
          PNPM_AUDIT_REPORT="$SECURITY_ARTIFACT_DIR/pnpm-audit-evaluation.json" \
          node docs/platform-v7/autopilot/evaluate-pnpm-audit.mjs
          node <<'NODE'
          const fs = require('node:fs');
          const report = JSON.parse(fs.readFileSync(process.env.SECURITY_ARTIFACT_DIR + '/pnpm-audit-evaluation.json', 'utf8'));
          const blocked = report.blocked ?? report.blocking_findings ?? [];
          if (!Array.isArray(blocked) || blocked.length !== 0) {
            throw new Error(`dependency audit still blocked: ${JSON.stringify(blocked)}`);
          }
          NODE

      - name: Run strict typechecks and production web build
        shell: bash
        run: |
          set -euo pipefail
          pnpm --filter @pc/api typecheck
          pnpm --filter @pc/web typecheck
          pnpm --filter @pc/web build

      - name: Remove temporary remediation authority and commit exact fix
        shell: bash
        run: |
          set -euo pipefail
          rm -f .github/workflows/tai-security-audit-remediation-3007.yml
          git add package.json pnpm-lock.yaml .github/workflows/tai-security-audit-remediation-3007.yml
          git diff --cached --check
          git diff --cached --quiet && { echo 'No remediation changes to commit.' >&2; exit 1; }
          git config user.name 'pachaninm-lab'
          git config user.email '263435807+pachaninm-lab@users.noreply.github.com'
          git commit -m 'fix(security): upgrade sharp beyond GHSA-f88m-g3jw-g9cj'
          git push origin HEAD:agent/tai-security-audit-remediation-3006

      - name: Upload pre-commit remediation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tai-security-audit-remediation-3007-${{ github.sha }}
          path: ${{ env.SECURITY_ARTIFACT_DIR }}
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0
