name: TAI Security Audit Remediation 3007

on:
  push:
    branches:
      - agent/tai-security-audit-remediation-3006
    paths:
      - '.github/workflows/tai-security-audit-remediation-3007.yml'
  pull_request:
    branches:
      - main
    paths:
      - '.github/workflows/tai-security-audit-remediation-3007.yml'

permissions:
  actions: read
  contents: read
  issues: write

concurrency:
  group: tai-security-audit-remediation-3007-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPOSITORY: ${{ github.repository }}
      ARTIFACT_ID: '8512555577'
      EXPECTED_HEAD: b775d44b7ee1e506e9474fc239b48a94e23ab59f
    steps:
      - name: Download exact audit artifact
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p audit
          gh api \
            -H 'Accept: application/vnd.github+json' \
            -H 'X-GitHub-Api-Version: 2022-11-28' \
            "repos/$REPOSITORY/actions/artifacts/$ARTIFACT_ID/zip" \
            > audit/artifact.zip
          unzip -q audit/artifact.zip -d audit/extracted
          test -s audit/extracted/artifacts/security/pnpm-audit-evaluation.json
          test -s audit/extracted/artifacts/security/pnpm-audit.json

      - name: Build bounded blocker report
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          root = Path('audit/extracted/artifacts/security')
          evaluation = json.loads((root / 'pnpm-audit-evaluation.json').read_text(encoding='utf-8'))
          raw = json.loads((root / 'pnpm-audit.json').read_text(encoding='utf-8'))

          blocked = evaluation.get('blocked')
          if blocked is None:
              blocked = evaluation.get('blocking_findings')
          if blocked is None:
              blocked = evaluation.get('findings')
          if not isinstance(blocked, list) or not blocked:
              raise SystemExit('non-empty blocked findings list is absent')

          report = {
              'schema_version': 'tai.security-audit-remediation.3007.v1',
              'artifact_id': 8512555577,
              'expected_head': 'b775d44b7ee1e506e9474fc239b48a94e23ab59f',
              'evaluation_status': evaluation.get('status'),
              'accepted': evaluation.get('accepted'),
              'blocked_count': len(blocked),
              'blocked': blocked,
              'raw_metadata': raw.get('metadata', {}),
          }
          Path('audit/blocker-report.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2, sort_keys=True) + '\n',
              encoding='utf-8',
          )

          compact = json.dumps(blocked, ensure_ascii=False, indent=2, sort_keys=True)
          if len(compact) > 50000:
              raise SystemExit('blocked findings exceed bounded issue-comment size')
          body = (
              '## Exact production dependency blocker extracted\n\n'
              f'- artifact id: `8512555577`;\n'
              f'- exact rollout head: `b775d44b7ee1e506e9474fc239b48a94e23ab59f`;\n'
              f'- blocked findings: `{len(blocked)}`;\n'
              '- source: `pnpm-audit-evaluation.json`;\n\n'
              '```json\n' + compact + '\n```\n'
          )
          Path('audit/issue-comment.md').write_text(body, encoding='utf-8')
          PY

      - name: Publish exact blocker to issue 3007
        shell: bash
        run: |
          set -euo pipefail
          gh api --method POST \
            "repos/$REPOSITORY/issues/3007/comments" \
            -f body="$(cat audit/issue-comment.md)"

      - name: Upload bounded remediation evidence
        uses: actions/upload-artifact@v4
        with:
          name: tai-security-audit-remediation-3007-${{ github.sha }}
          path: audit/blocker-report.json
          if-no-files-found: error
          retention-days: 30
          compression-level: 0
