name: Design System v8 Gate

on:
  pull_request:
    paths:
      - 'packages/design-tokens/**'
      - 'packages/design-system-v8/**'
      - 'apps/web/app/platform-v7/**'
      - 'apps/web/components/transaction-ux/**'
      - 'apps/web/components/platform-v7/**'
      - 'apps/web/components/v7r/**'
      - 'apps/web/lib/**'
      - 'apps/web/public/platform-v7/**'
      - 'apps/web/tests/unit/**'
      - 'docs/api/openapi.yaml'
      - 'design-governance-v8.json'
      - 'scripts/check-design-system-v8.mjs'
      - '.github/workflows/design-system-v8.yml'
  push:
    branches: [main]
    paths:
      - 'packages/design-tokens/**'
      - 'packages/design-system-v8/**'
      - 'apps/web/app/platform-v7/**'
      - 'apps/web/components/transaction-ux/**'
      - 'apps/web/components/platform-v7/**'
      - 'apps/web/components/v7r/**'
      - 'apps/web/lib/**'
      - 'apps/web/public/platform-v7/**'
      - 'apps/web/tests/unit/**'
      - 'docs/api/openapi.yaml'
      - 'design-governance-v8.json'
      - 'scripts/check-design-system-v8.mjs'

permissions:
  contents: read

jobs:
  governance:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Enforce Design System v8 boundaries
        run: node ./scripts/check-design-system-v8.mjs
      - name: Typecheck web integration
        run: pnpm --filter @pc/web typecheck
      - name: Run governed v8 regressions
        run: |
          set -o pipefail
          pnpm --filter @pc/web exec vitest run \
            tests/unit/bankReleaseSafetyRoute.test.tsx \
            tests/unit/bankReleaseServer.test.ts \
            tests/unit/designSystemV8AuctionRoutes.test.ts \
            tests/unit/designSystemV8DocumentsRoute.test.ts \
            tests/unit/designSystemV8CriticalRoutes.test.ts \
            tests/unit/designSystemV8FieldRoles.test.ts \
            tests/unit/designSystemV8MoneyRoles.test.ts \
            tests/unit/designSystemV8OperationalRoles.test.ts \
            tests/unit/designSystemV8PhysicalExecutionChain.test.ts \
            tests/unit/designSystemV8SettlementViews.test.ts \
            tests/unit/platformV7ApiDocsAuthority.test.ts \
            tests/unit/platformV7ApiDocsLegacyIsolation.test.ts \
            tests/unit/platformV7OnboardingAuthority.test.ts \
            tests/unit/platformV7CanonicalDealWorkspace.test.ts \
            tests/unit/platformV7ConnectorsAuthority.test.ts \
            tests/unit/platformV7ProfileAuthority.test.ts \
            tests/unit/platformV7ReportsAuthority.test.ts \
            tests/unit/platformV7DealExecutionChain.test.ts \
            tests/unit/platformV7DesignSystemV8RuntimeIsolation.test.ts \
            tests/unit/platformV7Dl9106ReleaseReviewPageCurrentMain.test.tsx \
            tests/unit/platformV7FgisAccessFlow.test.ts \
            tests/unit/platformV7RealDealsRegistry.test.ts \
            tests/unit/platformV7RoleIntentDashboard.test.ts \
            tests/unit/platformV7ServerVerifiedShell.test.ts \
            tests/unit/platformV7ShellNotificationAuthority.test.ts \
            tests/unit/platformV7StatusAuthority.test.ts \
            tests/unit/platformV7TodayWorkspace.test.ts \
            tests/unit/transactionRoleCockpitsV8.test.ts 2>&1 | tee design-system-v8-tests.log
      - name: Upload v8 regression log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: design-system-v8-tests-${{ github.sha }}
          path: design-system-v8-tests.log
          if-no-files-found: error
          retention-days: 7
