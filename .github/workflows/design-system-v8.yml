name: Design System v8

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: design-system-v8-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  architecture-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Enforce Design System v8 architecture
        shell: bash
        run: |
          set -o pipefail
          pnpm design:v8:check 2>&1 | tee /tmp/design-system-v8.log

      - name: Typecheck design tokens
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/design-tokens typecheck 2>&1 | tee -a /tmp/design-system-v8.log

      - name: Typecheck Design System v8
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/design-system-v8 typecheck 2>&1 | tee -a /tmp/design-system-v8.log

      - name: Typecheck web integration
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/web typecheck 2>&1 | tee -a /tmp/design-system-v8.log

      - name: Run Design System v8 regression tests
        shell: bash
        run: |
          set -o pipefail
          pnpm --filter @pc/web exec vitest run tests/unit/designSystemV8Architecture.test.ts 2>&1 | tee -a /tmp/design-system-v8.log

      - name: Upload Design System v8 diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: design-system-v8-log
          path: /tmp/design-system-v8.log
