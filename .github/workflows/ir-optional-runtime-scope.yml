name: Fix optional runtime policy marker

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ir-optional-runtime-scope.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix-marker:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/ir-sec-retire-ml-airflow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-retire-ml-airflow
          fetch-depth: 0
      - name: Align policy marker
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/platform-v7/autopilot/check-security-release-gate.mjs';
          const source = fs.readFileSync(path, 'utf8');
          const next = source.replace("  'Dockerfile.ml reference',\n", "  'ML Dockerfile reference',\n");
          if (next === source && !source.includes("  'ML Dockerfile reference',\n")) {
            throw new Error('Expected optional runtime policy marker was not found.');
          }
          fs.writeFileSync(path, next);
          NODE
      - name: Commit marker alignment
        run: |
          if git diff --quiet -- docs/platform-v7/autopilot/check-security-release-gate.mjs; then
            echo 'Marker already aligned.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/platform-v7/autopilot/check-security-release-gate.mjs
          git commit -m 'Align optional runtime policy marker'
          git push origin HEAD:agent/ir-sec-retire-ml-airflow
# trigger after workflow registration
