name: Govern optional runtime retirement scope

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ir-optional-runtime-scope.yml'
      - 'docker-compose.yml'
      - 'docs/platform-v7/autopilot/optional-runtime-inventory.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  govern-scope:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.ref == 'agent/ir-sec-retire-ml-airflow'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-retire-ml-airflow
          fetch-depth: 0

      - name: Add compose to exact branch scope
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/platform-v7/autopilot/autopilot-state.json';
          const state = JSON.parse(fs.readFileSync(path, 'utf8'));
          const branch = 'agent/ir-sec-retire-ml-airflow';
          state.approvedConcurrentScopes ??= {};
          const scope = new Set(state.approvedConcurrentScopes[branch] ?? []);
          scope.add('.github/workflows/ir-optional-runtime-scope.yml');
          scope.add('docker-compose.yml');
          state.approvedConcurrentScopes[branch] = [...scope].sort();
          fs.writeFileSync(path, `${JSON.stringify(state)}\n`);
          NODE

      - name: Commit governed scope
        run: |
          if git diff --quiet -- docs/platform-v7/autopilot/autopilot-state.json; then
            echo 'Compose scope already registered.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'Govern optional runtime compose retirement scope'
          git push origin HEAD:agent/ir-sec-retire-ml-airflow
