name: Finalize Public Product Experience V4

on:
  push:
    branches:
      - agent/public-product-experience-v4-final-2
    paths:
      - .github/workflows/public-product-experience-v4-finalize.yml

permissions:
  contents: write

jobs:
  finalize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-product-experience-v4-final-2
          fetch-depth: 0
      - name: Restore the reviewed homepage slice
        shell: bash
        run: |
          git checkout d1b91a2f483c10c414740b92bbf3619f3af4e49b -- \
            apps/web/app/platform-v7/how-it-works/page.tsx \
            apps/web/app/platform-v7/page.tsx \
            apps/web/components/platform-v7/PublicDealEntryGate.tsx \
            apps/web/components/platform-v7/PublicDealExplorerV4.tsx \
            apps/web/components/platform-v7/PublicDealPreview.tsx \
            apps/web/i18n/public-product-experience-v4.ts \
            apps/web/styles/platform-v7-public-product-entry-variants.css \
            apps/web/styles/platform-v7-public-product-experience-v4.css \
            apps/web/tests/e2e/platform-v7-public-experience-v4.spec.ts \
            apps/web/tests/unit/platformV7PublicExperienceV4.test.ts \
            apps/web/tests/unit/platformV7RootWorkEntry.test.ts
      - name: Register exact concurrent scope
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/platform-v7/autopilot/autopilot-state.json';
          const state = JSON.parse(fs.readFileSync(path, 'utf8'));
          state.approvedConcurrentScopes ||= {};
          state.approvedConcurrentScopes['agent/public-product-experience-v4-final-2'] = [
            'apps/web/app/platform-v7/how-it-works/page.tsx',
            'apps/web/app/platform-v7/page.tsx',
            'apps/web/components/platform-v7/PublicDealEntryGate.tsx',
            'apps/web/components/platform-v7/PublicDealExplorerV4.tsx',
            'apps/web/components/platform-v7/PublicDealPreview.tsx',
            'apps/web/i18n/public-product-experience-v4.ts',
            'apps/web/styles/platform-v7-public-product-entry-variants.css',
            'apps/web/styles/platform-v7-public-product-experience-v4.css',
            'apps/web/tests/e2e/platform-v7-public-experience-v4.spec.ts',
            'apps/web/tests/unit/platformV7PublicExperienceV4.test.ts',
            'apps/web/tests/unit/platformV7RootWorkEntry.test.ts',
            'docs/platform-v7/autopilot/autopilot-state.json'
          ];
          fs.writeFileSync(path, `${JSON.stringify(state)}\n`);
          NODE
      - name: Remove one-shot workflow
        run: rm .github/workflows/public-product-experience-v4-finalize.yml
      - name: Commit clean slice
        shell: bash
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web docs/platform-v7/autopilot/autopilot-state.json .github/workflows/public-product-experience-v4-finalize.yml
          git commit -m 'Finalize Public Product Experience V4 homepage UX'
          git push origin HEAD:agent/public-product-experience-v4-final-2
