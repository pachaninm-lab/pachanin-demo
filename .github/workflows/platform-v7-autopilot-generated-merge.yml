name: platform-v7 autopilot generated merge

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write
  checks: read
  statuses: read

concurrency:
  group: platform-v7-generated-merge-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: false

jobs:
  merge-generated:
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.state == 'open' &&
      contains(github.event.pull_request.labels.*.name, 'platform-v7') &&
      contains(github.event.pull_request.labels.*.name, 'agent-generated') &&
      contains(github.event.pull_request.labels.*.name, 'automerge')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inspect legacy product-slice authority
        id: authority
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const state = JSON.parse(fs.readFileSync('docs/platform-v7/autopilot/autopilot-state.json', 'utf8'));
          const current = String(state.current || '');
          const writable = Array.isArray(state.agentWritableScope) ? state.agentWritableScope : [];
          const active = /Autopilot Product Slice\s+\d+/i.test(current) && writable.length === 1;
          console.log(`active=${active}`);
          console.log(`current=${current.replace(/[\r\n]/g, ' ')}`);
          console.log(`writable_count=${writable.length}`);
          NODE

      - name: Guard and merge generated PR
        if: steps.authority.outputs.active == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          P7_GENERATED_HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          node scripts/p7-autopilot-generated-inline-checks.mjs
          node scripts/p7-autopilot-generated-merge-and-advance.mjs
          node scripts/p7-autopilot-generated-merge-reconcile.mjs

      - name: Skip outside legacy product-slice authority
        if: steps.authority.outputs.active != 'true'
        run: |
          echo "Generated PR merge is inactive for current authority: ${{ steps.authority.outputs.current }}"
          echo "agentWritableScope count: ${{ steps.authority.outputs.writable_count }}"

  reconcile-generated:
    if: >-
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/reconcile generated'))
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Inspect legacy product-slice authority
        id: authority
        shell: bash
        run: |
          node <<'NODE' >> "$GITHUB_OUTPUT"
          const fs = require('node:fs');
          const state = JSON.parse(fs.readFileSync('docs/platform-v7/autopilot/autopilot-state.json', 'utf8'));
          const current = String(state.current || '');
          const writable = Array.isArray(state.agentWritableScope) ? state.agentWritableScope : [];
          const active = /Autopilot Product Slice\s+\d+/i.test(current) && writable.length === 1;
          console.log(`active=${active}`);
          console.log(`current=${current.replace(/[\r\n]/g, ' ')}`);
          console.log(`writable_count=${writable.length}`);
          NODE

      - name: Reconcile generated PRs
        if: steps.authority.outputs.active == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: node scripts/p7-autopilot-generated-merge-reconcile.mjs

      - name: Skip outside legacy product-slice authority
        if: steps.authority.outputs.active != 'true'
        run: |
          echo "Generated PR reconciliation is inactive for current authority: ${{ steps.authority.outputs.current }}"
          echo "agentWritableScope count: ${{ steps.authority.outputs.writable_count }}"
