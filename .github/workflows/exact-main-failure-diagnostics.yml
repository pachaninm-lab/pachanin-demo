name: Exact Main Failure Diagnostics

on:
  pull_request:
    paths:
      - '.github/workflows/exact-main-failure-diagnostics.yml'
  workflow_dispatch:

permissions:
  actions: read
  checks: read
  contents: read
  statuses: read

env:
  TARGET_SHA: cff8b137218a6b4ca0c278473ccb2f9674ad980d
  OUT_DIR: artifacts/exact-main-failure-diagnostics

jobs:
  collect:
    name: Collect failed exact-main run diagnostics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Download failed run metadata, job logs and annotations
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');

          const repository = process.env.GITHUB_REPOSITORY;
          const targetSha = process.env.TARGET_SHA;
          const outDir = process.env.OUT_DIR;
          const token = process.env.GITHUB_TOKEN;
          const apiBase = `https://api.github.com/repos/${repository}`;
          fs.rmSync(outDir, { recursive: true, force: true });
          fs.mkdirSync(outDir, { recursive: true });

          const headers = {
            Accept: 'application/vnd.github+json',
            Authorization: `Bearer ${token}`,
            'X-GitHub-Api-Version': '2022-11-28',
            'User-Agent': 'pachanin-demo-exact-main-diagnostics',
          };

          async function request(url, binary = false) {
            const response = await fetch(url, { headers, redirect: 'follow' });
            if (!response.ok) throw new Error(`${response.status} ${url}: ${await response.text()}`);
            return binary ? Buffer.from(await response.arrayBuffer()) : response.json();
          }

          async function paginate(url, key) {
            const values = [];
            for (let page = 1; page <= 20; page += 1) {
              const joiner = url.includes('?') ? '&' : '?';
              const payload = await request(`${url}${joiner}per_page=100&page=${page}`);
              const pageValues = payload[key] || [];
              values.push(...pageValues);
              if (pageValues.length < 100) break;
            }
            return values;
          }

          function safe(value) {
            return String(value).replace(/[^a-zA-Z0-9._-]/g, '_');
          }

          (async () => {
            const runs = await paginate(`${apiBase}/actions/runs?head_sha=${targetSha}`, 'workflow_runs');
            const exactRuns = runs.filter((run) => run.head_sha === targetSha);
            const failedRuns = exactRuns.filter((run) => run.conclusion === 'failure');
            const summary = { schemaVersion: 1, repository, targetSha, collectedAt: new Date().toISOString(), failedRuns: [] };

            for (const run of failedRuns) {
              const runDir = path.join(outDir, `run-${run.id}-${safe(run.name)}`);
              fs.mkdirSync(runDir, { recursive: true });
              fs.writeFileSync(path.join(runDir, 'run.json'), `${JSON.stringify(run, null, 2)}\n`);

              const jobs = await paginate(`${apiBase}/actions/runs/${run.id}/jobs?filter=latest`, 'jobs');
              fs.writeFileSync(path.join(runDir, 'jobs.json'), `${JSON.stringify({ jobs }, null, 2)}\n`);
              const runSummary = {
                id: run.id,
                name: run.name,
                path: run.path,
                event: run.event,
                runNumber: run.run_number,
                runAttempt: run.run_attempt,
                createdAt: run.created_at,
                conclusion: run.conclusion,
                jobs: [],
              };

              try {
                const runLogZip = await request(`${apiBase}/actions/runs/${run.id}/logs`, true);
                fs.writeFileSync(path.join(runDir, 'run-logs.zip'), runLogZip);
              } catch (error) {
                fs.writeFileSync(path.join(runDir, 'run-logs-error.txt'), `${error.stack || error.message}\n`);
              }

              try {
                const checkSuite = await request(run.check_suite_url);
                fs.writeFileSync(path.join(runDir, 'check-suite.json'), `${JSON.stringify(checkSuite, null, 2)}\n`);
                const suiteChecks = await paginate(`${apiBase}/check-suites/${run.check_suite_id}/check-runs`, 'check_runs');
                fs.writeFileSync(path.join(runDir, 'check-suite-runs.json'), `${JSON.stringify({ check_runs: suiteChecks }, null, 2)}\n`);
              } catch (error) {
                fs.writeFileSync(path.join(runDir, 'check-suite-error.txt'), `${error.stack || error.message}\n`);
              }

              for (const job of jobs) {
                const jobDir = path.join(runDir, `job-${job.id}-${safe(job.name)}`);
                fs.mkdirSync(jobDir, { recursive: true });
                fs.writeFileSync(path.join(jobDir, 'job.json'), `${JSON.stringify(job, null, 2)}\n`);
                try {
                  const log = await request(`${apiBase}/actions/jobs/${job.id}/logs`, true);
                  fs.writeFileSync(path.join(jobDir, 'job.log'), log);
                } catch (error) {
                  fs.writeFileSync(path.join(jobDir, 'job-log-error.txt'), `${error.stack || error.message}\n`);
                }
                try {
                  const annotations = await paginate(`${apiBase}/check-runs/${job.id}/annotations`, 'annotations');
                  fs.writeFileSync(path.join(jobDir, 'annotations.json'), `${JSON.stringify({ annotations }, null, 2)}\n`);
                } catch (error) {
                  fs.writeFileSync(path.join(jobDir, 'annotations-error.txt'), `${error.stack || error.message}\n`);
                }
                runSummary.jobs.push({ id: job.id, name: job.name, status: job.status, conclusion: job.conclusion });
              }
              summary.failedRuns.push(runSummary);
            }

            fs.writeFileSync(path.join(outDir, 'summary.json'), `${JSON.stringify(summary, null, 2)}\n`);
            console.log(JSON.stringify(summary, null, 2));
          })().catch((error) => {
            fs.writeFileSync(path.join(outDir, 'fatal-error.txt'), `${error.stack || error.message}\n`);
            console.error(error);
            process.exit(1);
          });
          NODE

      - name: Upload exact-main failure diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: exact-main-failure-diagnostics-cff8b137218a6b4ca0c278473ccb2f9674ad980d
          path: ${{ env.OUT_DIR }}
          if-no-files-found: error
          retention-days: 30
