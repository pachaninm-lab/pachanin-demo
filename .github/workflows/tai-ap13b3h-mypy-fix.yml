name: TAI AP-13B.3h Mypy Correction

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/tai-ap13b3h-mypy-fix.yml'
      - 'apps/tai/tai/model_bundle_finalize.py'
      - 'apps/tai/tai/model_bundle_finalize_cli.py'
      - 'apps/tai/tai/model_bundle_storage.py'

permissions:
  contents: write

concurrency:
  group: tai-ap13b3h-mypy-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  correct:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Apply deterministic typing corrections
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          finalize = Path('apps/tai/tai/model_bundle_finalize.py')
          text = finalize.read_text(encoding='utf-8')
          if 'from collections.abc import Buffer\n' not in text:
              marker = 'from __future__ import annotations\n\n'
              if text.count(marker) != 1:
                  raise SystemExit('unexpected future-import marker')
              text = text.replace(marker, marker + 'from collections.abc import Buffer\n')
          old = (
              '    def readinto(self, buffer: bytearray | memoryview) -> int:\n'
              '        chunk = self.read(len(buffer))\n'
              '        count = len(chunk)\n'
              '        buffer[:count] = chunk\n'
              '        return count\n'
          )
          new = (
              '    def readinto(self, buffer: Buffer) -> int:\n'
              '        view = memoryview(buffer)\n'
              '        chunk = self.read(len(view))\n'
              '        count = len(chunk)\n'
              '        view[:count] = chunk\n'
              '        return count\n'
          )
          count = text.count(old)
          if count == 1:
              text = text.replace(old, new)
          elif count == 0 and new in text:
              pass
          else:
              raise SystemExit('unexpected readinto implementation')
          finalize.write_text(text, encoding='utf-8')

          storage = Path('apps/tai/tai/model_bundle_storage.py')
          text = storage.read_text(encoding='utf-8')
          for old, new in (
              ('    expected_upload = {\n', '    expected_upload: dict[str, object] = {\n'),
              ('    expected_restore = {\n', '    expected_restore: dict[str, object] = {\n'),
          ):
              count = text.count(old)
              if count == 1:
                  text = text.replace(old, new)
              elif count == 0 and new in text:
                  pass
              else:
                  raise SystemExit(f'unexpected sidecar annotation state: {old!r}')
          storage.write_text(text, encoding='utf-8')

          cli = Path('apps/tai/tai/model_bundle_finalize_cli.py')
          text = cli.read_text(encoding='utf-8')
          old = (
              '            result = {\n'
              '                "schema_version": "tai.model-bundle-finalization-authority-report.v1",\n'
              '                "status": "VALID",\n'
              '                "issue": payload["issue"],\n'
              '                "command": payload["command"],\n'
              '                "production_operational_status": payload["result"][\n'
              '                    "production_operational_status"\n'
              '                ],\n'
              '                "reasons": [],\n'
              '            }\n'
          )
          new = (
              '            authority_result = payload.get("result")\n'
              '            if not isinstance(authority_result, dict):\n'
              '                raise ValueError("authority result must be an object")\n'
              '            result = {\n'
              '                "schema_version": "tai.model-bundle-finalization-authority-report.v1",\n'
              '                "status": "VALID",\n'
              '                "issue": payload["issue"],\n'
              '                "command": payload["command"],\n'
              '                "production_operational_status": authority_result.get(\n'
              '                    "production_operational_status"\n'
              '                ),\n'
              '                "reasons": [],\n'
              '            }\n'
          )
          count = text.count(old)
          if count == 1:
              text = text.replace(old, new)
          elif count == 0 and new in text:
              pass
          else:
              raise SystemExit('unexpected validate-authority result block')
          cli.write_text(text, encoding='utf-8')
          PY

      - name: Validate Ruff and mypy
        working-directory: apps/tai
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install -e '.[dev]'
          targets=(
            tai/model_bundle_finalize.py
            tai/model_bundle_finalize_cli.py
            tai/model_bundle_storage.py
          )
          ruff format "${targets[@]}"
          ruff check --fix "${targets[@]}"
          ruff format "${targets[@]}"
          ruff check "${targets[@]}"
          mypy tai

      - name: Commit bounded typing corrections to PR branch
        shell: bash
        env:
          HEAD_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          git add \
            apps/tai/tai/model_bundle_finalize.py \
            apps/tai/tai/model_bundle_finalize_cli.py \
            apps/tai/tai/model_bundle_storage.py
          if git diff --cached --quiet; then
            echo 'No mypy corrections required.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'fix(tai): satisfy strict typing for bundle finalization'
          git push origin "HEAD:$HEAD_BRANCH"
