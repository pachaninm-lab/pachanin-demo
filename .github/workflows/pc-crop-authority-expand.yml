name: PC-CROP remediation authority expansion

on:
  push:
    branches:
      - agent/pc-crop-01b4-remediation-authority-expand
    paths:
      - .github/workflows/pc-crop-authority-expand.yml

permissions:
  contents: write

concurrency:
  group: pc-crop-01b4-remediation-authority-expand
  cancel-in-progress: false

jobs:
  expand:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/pc-crop-01b4-remediation-authority-expand
          fetch-depth: 0
          persist-credentials: true

      - name: Add exact predecessor workflow authority
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(path.read_text(encoding='utf-8'))
          branch = 'agent/pc-crop-01b4-postmerge-remediation'
          required = '.github/workflows/pc-crop-01a.yml'
          scopes = state.get('approvedConcurrentScopes')
          if not isinstance(scopes, dict) or branch not in scopes:
              raise SystemExit('remediation scope is missing')
          paths = scopes[branch]
          if not isinstance(paths, list):
              raise SystemExit('remediation scope is invalid')
          if required not in paths:
              paths.insert(1, required)
          if len(paths) != 11 or paths.count(required) != 1:
              raise SystemExit('expanded remediation scope is not exact')
          path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n', encoding='utf-8')
          PY
          python3 -m json.tool docs/platform-v7/autopilot/autopilot-state.json >/dev/null
          git rm .github/workflows/pc-crop-authority-expand.yml
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'docs(pc-crop): authorize predecessor acceptance update'
          mapfile -t paths < <(git diff --name-only origin/main...HEAD)
          test "${#paths[@]}" -eq 1
          test "${paths[0]}" = 'docs/platform-v7/autopilot/autopilot-state.json'
          git push origin HEAD:agent/pc-crop-01b4-remediation-authority-expand
