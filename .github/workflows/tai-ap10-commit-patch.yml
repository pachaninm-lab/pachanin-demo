name: TAI AP-10 commit authority patch

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap10-commit-patch.yml'
      - 'apps/tai/ap10_apply_patch.py'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-10-operational-authority'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply and syntax-check exact authority patch
        run: python apps/tai/ap10_apply_patch.py
      - name: Commit exact patch and cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-10: bind SLO assessments to exact head and fix static contracts'
          git push origin HEAD:tai/ap-10-operational-authority
