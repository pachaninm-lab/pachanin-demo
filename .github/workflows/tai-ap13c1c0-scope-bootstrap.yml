name: TAI AP-13C.1c.0 Scope Bootstrap

on:
  push:
    branches:
      - agent/tai-ap-13c1c0-run-plan-authority
    paths:
      - '.github/workflows/tai-ap13c1c0-scope-bootstrap.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1c0-run-plan-authority
          fetch-depth: 0
      - name: Register exact concurrent scope and self-delete
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          branch = 'agent/tai-ap-13c1c0-run-plan-authority'
          paths = [
              '.github/workflows/tai-cpu-benchmark-run-plan-authority.yml',
              'apps/tai/governance/scopes/ap-13c1c0-run-plan-2991.json',
              'apps/tai/model-artifacts/cpu-benchmark-run-plan-authority.v1.json',
              'apps/tai/model-artifacts/cpu-benchmark-run-plan.schema.v1.json',
              'apps/tai/model-artifacts/cpu-benchmark-run-plan.pending.json',
              'apps/tai/model-artifacts/cpu-benchmark-run-plan-runbook.v1.md',
              'apps/tai/tai/cpu_benchmark_run_plan.py',
              'apps/tai/tai/cpu_benchmark_run_plan_cli.py',
              'apps/tai/tests/cpu_benchmark_run_plan_fixtures.py',
              'apps/tai/tests/test_cpu_benchmark_run_plan.py',
              'apps/tai/tests/test_cpu_benchmark_run_plan_cli.py',
              'apps/tai/tests/test_cpu_benchmark_run_plan_workflow.py',
              'docs/platform-v7/autopilot/autopilot-state.json',
          ]

          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(state_path.read_text(encoding='utf-8'))
          scopes = state.setdefault('approvedConcurrentScopes', {})
          existing = scopes.get(branch)
          if existing not in (None, paths):
              raise SystemExit(f'conflicting existing scope: {existing!r}')
          scopes[branch] = paths
          state_path.write_text(
              json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n',
              encoding='utf-8',
          )

          scope = {
              'schema_version': 'tai.concurrent-scope.v1',
              'program_issue': 2726,
              'parent_issue': 2971,
              'runner_issue': 2990,
              'issue': 2991,
              'branch': branch,
              'allowed_paths': paths,
              'acceptance': [
                  'authoritative approvedConcurrentScopes registration precedes implementation changes',
                  'the compiler validates exact-main readiness before any protected-input access',
                  'accepted AP-14C, immutable bundle finalization, exact object VersionIds, model authority and toolchain digests are mutually bound',
                  'the generated plan is bounded metadata only and deterministic',
                  'duplicate keys, unknown fields, mutable locators, stale or simulated evidence, traversal, root aliasing and cross-model evidence fail closed',
                  'owner-only issue-comment preflight performs no SSH, S3 mutation, model execution or benchmark',
                  'Ruff, strict mypy, full TAI pytest, coverage and repository gates pass',
                  'benchmark, admission and production status remain pending',
              ],
              'forbidden_capabilities': [
                  'workflow_dispatch, schedule or push execution trigger for protected execution',
                  'SSH, S3 read or mutation, remote execution or model inference in this slice',
                  'raw prompts, raw responses, model files, GGUF, archives, credentials or storage payloads in Git',
                  'benchmark success, GPU claim, model admission, activation, deployment or production attestation',
              ],
          }
          scope_path = Path('apps/tai/governance/scopes/ap-13c1c0-run-plan-2991.json')
          scope_path.parent.mkdir(parents=True, exist_ok=True)
          scope_path.write_text(
              json.dumps(scope, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY
          rm .github/workflows/tai-ap13c1c0-scope-bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json \
            apps/tai/governance/scopes/ap-13c1c0-run-plan-2991.json \
            .github/workflows/tai-ap13c1c0-scope-bootstrap.yml
          git commit -m 'governance(tai): register AP-13C.1c.0 run-plan scope'
          git push origin HEAD:agent/tai-ap-13c1c0-run-plan-authority
