name: Public Entry Watch 20260721

on:
  push:
    branches:
      - ops/public-entry-watch-20260721-0636
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  production-watch:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install production-watch browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run exact production public-entry watch
        id: watch
        shell: bash
        run: |
          set +e
          cp scripts/public-entry-watch.mjs apps/web/public-entry-watch-run.mjs
          output="$(cd apps/web && node public-entry-watch-run.mjs 2>&1)"
          code=$?
          printf '%s\n' "$output"
          {
            echo "exit_code=$code"
            echo 'result<<PUBLIC_ENTRY_WATCH_EOF'
            printf '%s\n' "$output"
            echo 'PUBLIC_ENTRY_WATCH_EOF'
          } >> "$GITHUB_OUTPUT"
          exit 0
      - name: Publish exact result to evidence PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          WATCH_OUTPUT: ${{ steps.watch.outputs.result }}
          WATCH_EXIT_CODE: ${{ steps.watch.outputs.exit_code }}
        with:
          script: |
            const body = [
              '## Public Entry Watch result',
              '',
              `- exit_code: \`${process.env.WATCH_EXIT_CODE || 'missing'}\``,
              '',
              '```text',
              (process.env.WATCH_OUTPUT || 'WATCH_OUTPUT_MISSING').slice(-30000),
              '```',
            ].join('\n');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
      - name: Enforce watch result
        if: always()
        shell: bash
        env:
          WATCH_EXIT_CODE: ${{ steps.watch.outputs.exit_code }}
        run: |
          if [[ "${WATCH_EXIT_CODE:-1}" != "0" ]]; then
            echo 'Production public-entry watch failed.' >&2
            exit 1
          fi
