name: Public Entry Watch 20260721

on:
  push:
    branches:
      - ops/public-entry-watch-20260721-0636
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  production-watch:
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Install production-watch browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run exact production public-entry watch
        shell: bash
        run: |
          set -euo pipefail
          cp scripts/public-entry-watch.mjs apps/web/scripts/public-entry-watch-run.mjs
          cd apps/web
          node scripts/public-entry-watch-run.mjs
      - name: Print exact result
        if: always()
        shell: bash
        run: |
          if [[ -f apps/web/artifacts/public-entry-watch/result.json ]]; then
            cat apps/web/artifacts/public-entry-watch/result.json
          else
            echo '{"failures":["RESULT_FILE_MISSING"]}'
          fi
      - name: Publish exact result to evidence PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const resultPath = 'apps/web/artifacts/public-entry-watch/result.json';
            let body;
            if (fs.existsSync(resultPath)) {
              const result = JSON.parse(fs.readFileSync(resultPath, 'utf8'));
              body = [
                '## Public Entry Watch result',
                '',
                '```json',
                JSON.stringify(result, null, 2),
                '```',
              ].join('\n');
            } else {
              body = '## Public Entry Watch result\n\n`RESULT_FILE_MISSING`';
            }
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
      - name: Upload public-entry evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-watch-${{ github.run_id }}
          path: apps/web/artifacts/public-entry-watch
          if-no-files-found: warn
          retention-days: 7
