name: production public entry watch 20260721

on:
  push:
    branches:
      - ops/public-entry-watch-20260721-0015

permissions:
  contents: read

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium and WebKit
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Run DNS HTTP browser and fail-closed checks
        working-directory: apps/web
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../../artifacts/public-entry-watch
          {
            echo "timestamp=$(date -u +%FT%TZ)"
            echo "dns:"
            getent ahostsv4 xn----8sbjf4befbjgs9b.xn--p1ai || true
            echo "http:"
            for path in /platform-v7 /platform-v7/login /platform-v7/forgot-password; do
              curl -sS -L --max-redirs 10 --connect-timeout 15 --max-time 45 \
                -o /dev/null \
                -w "$path status=%{http_code} final=%{url_effective} redirects=%{num_redirects} remote=%{remote_ip}\n" \
                "https://xn----8sbjf4befbjgs9b.xn--p1ai$path"
            done
          } | tee ../../artifacts/public-entry-watch/network.txt
          cat > /tmp/public-entry-watch.mjs <<'NODE'
          import fs from 'node:fs';
          import path from 'node:path';
          import { chromium, webkit } from '@playwright/test';

          const baseURL = 'https://xn----8sbjf4befbjgs9b.xn--p1ai';
          const artifactDir = path.resolve(process.cwd(), '../../artifacts/public-entry-watch');
          const routes = [
            { path: '/platform-v7', kind: 'landing', minText: 500 },
            { path: '/platform-v7/login', kind: 'login', minText: 120 },
            { path: '/platform-v7/forgot-password', kind: 'recovery', minText: 120 },
          ];
          const locales = ['ru', 'en', 'zh'];
          const projects = [
            { name: 'chromium-desktop', type: chromium, viewport: { width: 1440, height: 1000 } },
            { name: 'chromium-mobile', type: chromium, viewport: { width: 390, height: 844 }, isMobile: true, hasTouch: true },
            { name: 'webkit-iphone', type: webkit, viewport: { width: 390, height: 844 }, isMobile: true, hasTouch: true },
          ];
          const failures = [];
          const cases = [];
          const hydrationPattern = /hydration|hydrating|Minified React error|There was an error while hydrating|next-intl.*missing/i;
          const localeNames = { ru: 'ru-RU', en: 'en-US', zh: 'zh-CN' };

          function fail(scope, message, details = null) {
            failures.push({ scope, message, details });
          }
          function redirectCount(response) {
            let count = 0;
            let request = response?.request();
            while (request?.redirectedFrom()) {
              count += 1;
              request = request.redirectedFrom();
            }
            return count;
          }

          for (const project of projects) {
            const browser = await project.type.launch({ headless: true });
            for (const route of routes) {
              for (const locale of locales) {
                const scope = `${project.name}:${route.kind}:${locale}`;
                const context = await browser.newContext({
                  viewport: project.viewport,
                  isMobile: project.isMobile,
                  hasTouch: project.hasTouch,
                  locale: localeNames[locale],
                });
                const page = await context.newPage();
                const consoleErrors = [];
                const pageErrors = [];
                const failedRequests = [];
                const badResponses = [];
                page.on('console', (message) => {
                  if (message.type() === 'error') consoleErrors.push(message.text());
                });
                page.on('pageerror', (error) => pageErrors.push(String(error?.stack || error)));
                page.on('requestfailed', (request) => {
                  const errorText = request.failure()?.errorText || 'unknown';
                  if (!errorText.includes('ERR_ABORTED')) failedRequests.push({ url: request.url(), errorText });
                });
                page.on('response', (response) => {
                  if (response.url().startsWith(baseURL) && response.status() >= 400 && !response.url().includes('/favicon')) {
                    badResponses.push({ url: response.url(), status: response.status() });
                  }
                });

                let response = null;
                try {
                  response = await page.goto(`${baseURL}${route.path}?lang=${locale}`, { waitUntil: 'networkidle', timeout: 60_000 });
                } catch (error) {
                  fail(scope, 'navigation failed or redirect loop', String(error));
                  await context.close();
                  continue;
                }
                const status = response?.status() ?? 0;
                const finalURL = new URL(page.url());
                const redirects = redirectCount(response);
                const metrics = await page.evaluate(() => ({
                  textLength: document.body?.innerText?.trim().length || 0,
                  scrollWidth: document.documentElement.scrollWidth,
                  clientWidth: document.documentElement.clientWidth,
                  htmlLang: document.documentElement.lang,
                  title: document.title,
                  bodyText: document.body?.innerText || '',
                  storageKeys: [...Object.keys(localStorage), ...Object.keys(sessionStorage)],
                }));
                const localeLinks = await page.evaluate(() => {
                  const hrefs = Array.from(document.querySelectorAll('a[href]')).map((node) => node.getAttribute('href') || '');
                  return {
                    ru: hrefs.some((href) => /(?:\?|&)lang=ru(?:&|$)/.test(href)),
                    en: hrefs.some((href) => /(?:\?|&)lang=en(?:&|$)/.test(href)),
                    zh: hrefs.some((href) => /(?:\?|&)lang=zh(?:&|$)/.test(href)),
                  };
                });
                const roleSelectorCount = await page.locator('select[name*="role" i],input[name*="role" i],[data-role-selector],[data-testid*="role-selector" i]').count();
                const h1Visible = await page.locator('h1').first().isVisible().catch(() => false);
                const passwordVisible = route.kind === 'login'
                  ? await page.locator('input[type="password"]').first().isVisible().catch(() => false)
                  : true;
                const emailVisible = route.kind === 'recovery'
                  ? await page.locator('input[type="email"],input[name*="email" i]').first().isVisible().catch(() => false)
                  : true;
                const loginLinkCount = route.kind === 'landing'
                  ? await page.locator('a[href*="/platform-v7/login"]').count()
                  : 0;

                if (status !== 200) fail(scope, `HTTP ${status}, expected 200`);
                if (redirects > 3) fail(scope, `too many redirects: ${redirects}`);
                if (finalURL.pathname !== route.path) fail(scope, `unexpected final path ${finalURL.pathname}`);
                if (finalURL.searchParams.has('role') || finalURL.searchParams.has('as')) fail(scope, `role context leaked into URL: ${finalURL.toString()}`);
                if (metrics.textLength < route.minText) fail(scope, `probable white or incomplete screen: ${metrics.textLength} characters`);
                if (!h1Visible) fail(scope, 'visible H1 missing');
                if (!passwordVisible) fail(scope, 'password field missing');
                if (!emailVisible) fail(scope, 'recovery email field missing');
                if (route.kind === 'landing' && loginLinkCount < 1) fail(scope, 'login CTA missing');
                if (metrics.scrollWidth > metrics.clientWidth + 2) fail(scope, `horizontal overflow ${metrics.scrollWidth}/${metrics.clientWidth}`);
                if (!String(metrics.htmlLang).toLowerCase().startsWith(locale)) fail(scope, `html lang mismatch: ${metrics.htmlLang}`);
                if (!localeLinks.ru || !localeLinks.en || !localeLinks.zh) fail(scope, 'RU/EN/ZH links are incomplete', localeLinks);
                if (roleSelectorCount > 0) fail(scope, `role selector detected: ${roleSelectorCount}`);
                if (consoleErrors.length) fail(scope, 'console errors', consoleErrors);
                if (pageErrors.length) fail(scope, 'runtime errors', pageErrors);
                if (failedRequests.length) fail(scope, 'failed requests', failedRequests);
                if (badResponses.length) fail(scope, 'bad same-origin responses', badResponses);
                const hydrationErrors = [...consoleErrors, ...pageErrors].filter((value) => hydrationPattern.test(value));
                if (hydrationErrors.length) fail(scope, 'hydration errors', hydrationErrors);
                if (metrics.storageKeys.some((key) => /demo|auth|session|token/i.test(key))) fail(scope, 'auth/demo state found in browser storage', metrics.storageKeys);

                cases.push({ scope, status, finalURL: finalURL.toString(), redirects, ...metrics, localeLinks, roleSelectorCount, consoleErrors, pageErrors, failedRequests, badResponses });
                await context.close();
              }
            }
            await browser.close();
          }

          for (const project of projects) {
            const scope = `${project.name}:fail-closed-login`;
            const browser = await project.type.launch({ headless: true });
            const context = await browser.newContext({ viewport: project.viewport, isMobile: project.isMobile, hasTouch: project.hasTouch, locale: 'ru-RU' });
            const page = await context.newPage();
            const consoleErrors = [];
            const pageErrors = [];
            page.on('console', (message) => { if (message.type() === 'error') consoleErrors.push(message.text()); });
            page.on('pageerror', (error) => pageErrors.push(String(error?.stack || error)));
            await page.route('**/api/auth/**', async (route) => {
              if (route.request().method() === 'POST') await route.abort('failed');
              else await route.continue();
            });
            try {
              await page.goto(`${baseURL}/platform-v7/login?lang=ru`, { waitUntil: 'networkidle', timeout: 60_000 });
              await page.locator('input[type="email"],input[name*="email" i]').first().fill('watch-invalid@example.test');
              await page.locator('input[type="password"]').first().fill('Invalid-Watch-Password-2026!');
              await page.locator('button[type="submit"]').first().click();
              await page.waitForTimeout(2500);
              const finalURL = new URL(page.url());
              const cookies = await context.cookies();
              const forbiddenCookies = cookies.filter((cookie) => /(?:access|refresh|session|mfa|cabinet|demo)/i.test(cookie.name));
              const storageKeys = await page.evaluate(() => [...Object.keys(localStorage), ...Object.keys(sessionStorage)]);
              const bodyText = await page.locator('body').innerText();
              const hasErrorFeedback = /недоступ|ошиб|повтор|unable|error|try again|不可用|错误|重试/i.test(bodyText);
              if (finalURL.pathname !== '/platform-v7/login') fail(scope, `left login route: ${finalURL.toString()}`);
              if (finalURL.searchParams.has('role') || finalURL.searchParams.has('as')) fail(scope, `role context leaked into URL: ${finalURL.toString()}`);
              if (forbiddenCookies.length) fail(scope, 'auth/session/demo cookies created during failed login', forbiddenCookies.map((cookie) => cookie.name));
              if (storageKeys.some((key) => /demo|auth|session|token/i.test(key))) fail(scope, 'auth/demo browser storage created during failed login', storageKeys);
              if (!hasErrorFeedback) fail(scope, 'fail-closed login produced no visible error feedback');
              if (pageErrors.length) fail(scope, 'runtime errors during fail-closed login', pageErrors);
              const productConsoleErrors = consoleErrors.filter((value) => !/Failed to load resource|net::ERR_FAILED/i.test(value));
              if (productConsoleErrors.length) fail(scope, 'product console errors during fail-closed login', productConsoleErrors);
              cases.push({ scope, finalURL: finalURL.toString(), forbiddenCookies: forbiddenCookies.map((cookie) => cookie.name), storageKeys, hasErrorFeedback, consoleErrors, pageErrors });
            } catch (error) {
              fail(scope, 'fail-closed scenario could not complete', String(error));
            }
            await context.close();
            await browser.close();
          }

          const report = { generatedAt: new Date().toISOString(), baseURL, cases, failures, allGreen: failures.length === 0 };
          fs.writeFileSync(path.join(artifactDir, 'public-entry-watch.json'), JSON.stringify(report, null, 2));
          console.log(JSON.stringify({ allGreen: report.allGreen, cases: cases.length, failures }, null, 2));
          if (failures.length) process.exit(1);
          NODE
          node /tmp/public-entry-watch.mjs
      - name: Upload watch evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-entry-watch-20260721-0015
          path: artifacts/public-entry-watch
          if-no-files-found: error
          retention-days: 7
