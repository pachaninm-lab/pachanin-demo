name: Canonical SBOM Generation

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/sbom-scan.yml'
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: canonical-sbom-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '24'
  PNPM_VERSION: '10.2.1'

jobs:
  sbom:
    name: CycloneDX SBOM · ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate CycloneDX SBOM
        run: |
          mkdir -p artifacts/sbom
          npx -y @cyclonedx/cdxgen@11 \
            -t pnpm \
            -o "artifacts/sbom/sbom-${{ matrix.service }}.json" \
            "apps/${{ matrix.service }}"
          test -s "artifacts/sbom/sbom-${{ matrix.service }}.json"

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.service }}-${{ github.sha }}
          path: artifacts/sbom/sbom-${{ matrix.service }}.json
          if-no-files-found: error
          retention-days: 90
