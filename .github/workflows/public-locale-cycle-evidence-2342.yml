name: public locale cycle evidence 2342

on:
  pull_request:
    branches:
      - fix/public-locale-query-precedence

permissions:
  contents: read

jobs:
  locale-cycle:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PREVIEW_BASE_URL: https://6a51933d37600a00099953cd--vermillion-kitsune-0e7b97.netlify.app
      IMPLEMENTATION_SHA: e8f6f83aee47c546b4c959524e924604520cb94a
      DEPLOY_ID: 6a51933d37600a00099953cd
      ARTIFACT_DIR: ../../artifacts/public-locale-cycle-evidence-2342
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Install Chromium and WebKit
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium webkit
      - name: Wait for immutable deploy
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 90); do
            status=$(curl --silent --output /dev/null --write-out '%{http_code}' --max-time 12 "$PREVIEW_BASE_URL/platform-v7?lang=ru" || true)
            if [ "$status" = '200' ]; then exit 0; fi
            sleep 2
          done
          exit 1
      - name: Run locale precedence and cycle evidence
        working-directory: apps/web
        run: node scripts/public-locale-cycle-evidence-2342.mjs
      - name: Upload locale evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: public-locale-cycle-evidence-2342
          path: artifacts/public-locale-cycle-evidence-2342
          if-no-files-found: error
          retention-days: 14
