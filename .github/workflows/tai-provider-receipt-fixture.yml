name: TAI provider receipt fixture update

on:
  push:
    branches:
      - agent/tai-ap-13c1d-remediation-2997
    paths:
      - .github/workflows/tai-provider-receipt-fixture.yml

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-remediation-2997
      - name: Apply bounded fixture changes and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tests/quality_scoring_fixtures.py')
          text = path.read_text(encoding='utf-8')

          anchor = '''def _canonical_bytes(value: object) -> bytes:\n    return json.dumps(\n        value,\n        ensure_ascii=False,\n        separators=(",", ":"),\n        sort_keys=True,\n    ).encode("utf-8")\n\n\n'''
          addition = '''def _provider_secret(path: Path) -> tuple[bytes, str]:\n    seed = hashlib.sha256(b"tai-quality-provider-inventory-fixture").digest()\n    secret = seed + hashlib.sha256(seed).digest()\n    path.write_bytes(secret)\n    return secret, hashlib.sha256(secret).hexdigest()\n\n\ndef _provider_receipt(\n    path: Path,\n    secret: bytes,\n    storage: dict[str, Any],\n    evidence_manifest: dict[str, Any],\n) -> dict[str, Any]:\n    objects = [\n        {\n            "annotation_id": record["annotation_id"],\n            "object_key": record["object_key"],\n            "object_version_id": record["object_version_id"],\n            "sha256": record["sha256"],\n            "size_bytes": record["size_bytes"],\n            "retention_until": record["retention_until"],\n            "immutability_status": "IMMUTABLE_VERSIONED",\n        }\n        for record in evidence_manifest["files"]\n    ]\n    receipt: dict[str, Any] = {\n        "schema_version": "tai.quality-provider-inventory-receipt.v1",\n        "issuer": "TAI_SELECTEL_S3_INVENTORY",\n        "audience": "TAI_QUALITY_SCORING",\n        "provider": storage["provider"],\n        "bucket": storage["bucket"],\n        "issued_at": (NOW + timedelta(minutes=1)).isoformat(),\n        "expires_at": (NOW + timedelta(hours=1)).isoformat(),\n        "key_id": "tai-quality-provider-inventory-hmac-v1",\n        "original_root_id": storage["original_root_id"],\n        "restored_root_id": storage["restored_root_id"],\n        "manifest": {\n            "object_key": storage["evidence_manifest_object_key"],\n            "object_version_id": storage["evidence_manifest_object_version_id"],\n            "sha256": storage["evidence_manifest_file_sha256"],\n            "size_bytes": storage["evidence_manifest_size_bytes"],\n            "retention_until": storage["retention_until"],\n            "immutability_status": storage["immutability_status"],\n        },\n        "objects": objects,\n    }\n    receipt["signature"] = hmac.new(\n        secret,\n        _canonical_bytes(receipt),\n        hashlib.sha256,\n    ).hexdigest()\n    write_json(path, receipt)\n    return receipt\n\n\n'''
          if text.count(anchor) != 1:
              raise SystemExit('canonical anchor mismatch')
          text = text.replace(anchor, anchor + addition)

          old_paths = '''    identity_secret_path = tmp_path / "reviewer-identity-key.bin"\n    reviewer_manifest_path = tmp_path / "reviewer-evidence-manifest.json"\n    reviewer_original_root = tmp_path / "reviewer-original"\n    reviewer_restored_root = tmp_path / "reviewer-restored"\n'''
          new_paths = '''    identity_secret_path = tmp_path / "reviewer-identity-key.bin"\n    provider_secret_path = tmp_path / "provider-inventory-key.bin"\n    provider_receipt_path = tmp_path / "provider-inventory-receipt.json"\n    reviewer_manifest_path = tmp_path / "reviewer-evidence-manifest.json"\n    reviewer_original_root = tmp_path / "reviewer-original"\n    reviewer_restored_root = tmp_path / "reviewer-restored"\n'''
          if text.count(old_paths) != 1:
              raise SystemExit('fixture path anchor mismatch')
          text = text.replace(old_paths, new_paths)

          old_create = '''    storage = _reviewer_evidence(\n        reviewer_manifest_path,\n        reviewer_original_root,\n        reviewer_restored_root,\n        annotations,\n        identity_assertions,\n    )\n    manifest = _complete_manifest(\n'''
          new_create = '''    storage = _reviewer_evidence(\n        reviewer_manifest_path,\n        reviewer_original_root,\n        reviewer_restored_root,\n        annotations,\n        identity_assertions,\n    )\n    provider_secret, trusted_provider_secret_sha256 = _provider_secret(\n        provider_secret_path\n    )\n    provider_receipt = _provider_receipt(\n        provider_receipt_path,\n        provider_secret,\n        storage,\n        load_json(reviewer_manifest_path),\n    )\n    manifest = _complete_manifest(\n'''
          if text.count(old_create) != 1:
              raise SystemExit('fixture create anchor mismatch')
          text = text.replace(old_create, new_create)

          old_return = '''        "identity_secret_path": identity_secret_path,\n        "trusted_secret_sha256": trusted_secret_sha256,\n        "reviewer_manifest_path": reviewer_manifest_path,\n'''
          new_return = '''        "identity_secret_path": identity_secret_path,\n        "trusted_secret_sha256": trusted_secret_sha256,\n        "provider_secret_path": provider_secret_path,\n        "trusted_provider_secret_sha256": trusted_provider_secret_sha256,\n        "provider_receipt_path": provider_receipt_path,\n        "provider_receipt": provider_receipt,\n        "reviewer_manifest_path": reviewer_manifest_path,\n'''
          if text.count(old_return) != 1:
              raise SystemExit('fixture return anchor mismatch')
          text = text.replace(old_return, new_return)

          old_verify = '''        fixture["reviewer_manifest_path"],\n        fixture["reviewer_original_root"],\n        fixture["reviewer_restored_root"],\n        evaluated_at=evaluated_at,\n'''
          new_verify = '''        fixture["reviewer_manifest_path"],\n        fixture["reviewer_original_root"],\n        fixture["reviewer_restored_root"],\n        fixture["provider_receipt_path"],\n        fixture["provider_secret_path"],\n        fixture["trusted_provider_secret_sha256"],\n        evaluated_at=evaluated_at,\n'''
          if text.count(old_verify) != 1:
              raise SystemExit('fixture verify anchor mismatch')
          text = text.replace(old_verify, new_verify)

          old_rebuild = '''    fixture["manifest"]["storage"] = storage\n\n\ndef _rewrite_manifest'''
          new_rebuild = '''    fixture["manifest"]["storage"] = storage\n    secret_path = fixture["provider_secret_path"]\n    assert isinstance(secret_path, Path)\n    fixture["provider_receipt"] = _provider_receipt(\n        fixture["provider_receipt_path"],\n        secret_path.read_bytes(),\n        storage,\n        load_json(fixture["reviewer_manifest_path"]),\n    )\n\n\ndef _rewrite_manifest'''
          if text.count(old_rebuild) != 1:
              raise SystemExit('fixture rebuild anchor mismatch')
          text = text.replace(old_rebuild, new_rebuild)

          path.write_text(text, encoding='utf-8')
          PY
          rm -f .github/workflows/tai-provider-receipt-fixture.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test(tai): authenticate provider inventory fixtures"
          git push origin HEAD:agent/tai-ap-13c1d-remediation-2997
