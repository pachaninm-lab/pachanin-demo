name: apply public live fixes

on:
  push:
    branches:
      - agent/fix-platform-v7-public-live-defects

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repair branch
        uses: actions/checkout@v4
        with:
          ref: agent/fix-platform-v7-public-live-defects
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply deterministic source patch
        run: python scripts/apply-public-live-fixes.py

      - name: Remove one-shot patch machinery
        run: git rm scripts/apply-public-live-fixes.py .github/workflows/apply-public-live-fixes.yml

      - name: Validate and publish patch
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'Fix platform-v7 production hydration, SEO and public bundle weight'
          git push origin HEAD:agent/fix-platform-v7-public-live-defects
