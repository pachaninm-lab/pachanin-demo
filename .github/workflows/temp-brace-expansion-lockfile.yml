name: Temporary brace-expansion lockfile update

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/brace-expansion-security
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
        with:
          version: 10.2.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - name: Add exact security overrides
        run: |
          node <<'NODE'
          const fs = require('fs');
          const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          p.pnpm ??= {};
          p.pnpm.overrides ??= {};
          p.pnpm.overrides['brace-expansion@<2.1.2'] = '2.1.2';
          p.pnpm.overrides['brace-expansion@>=5.0.0 <5.0.7'] = '5.0.7';
          fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          NODE
      - name: Regenerate governed lockfile
        run: pnpm install --lockfile-only
      - name: Remove temporary workflow and publish result
        run: |
          rm .github/workflows/temp-brace-expansion-lockfile.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add package.json pnpm-lock.yaml .github/workflows/temp-brace-expansion-lockfile.yml
          git commit -m "fix(security): pin patched brace-expansion versions"
          git push origin HEAD:fix/brace-expansion-security
