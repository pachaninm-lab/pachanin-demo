name: IR-SEC governed lockfile refresh

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - .github/workflows/ir-sec-lockfile-refresh.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ir-sec-lockfile-refresh
  cancel-in-progress: false

jobs:
  refresh:
    if: github.event.pull_request.head.ref == 'agent/ir-sec-transitive-runtime-remediation' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout exact branch head
        uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-transitive-runtime-remediation
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pinned pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.2.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: pnpm

      - name: Add branch-scoped dependency remediation guard
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('scripts/p7-autopilot-guard.sh')
          text = path.read_text()
          branch = 'agent/ir-sec-transitive-runtime-remediation'

          scope_marker = "TRANSITIVE_RUNTIME_REMEDIATION_SCOPE='package.json\npnpm-lock.yaml\ndocs/platform-v7/autopilot/security-exceptions.json\nscripts/p7-autopilot-guard.sh'\n\n"
          insert_before = 'if [ "${GITHUB_HEAD_REF:-}" = "agent/harden-platform-v7-public-entry" ]'
          if scope_marker not in text:
              if insert_before not in text:
                  raise SystemExit('Cannot find scope insertion point')
              text = text.replace(insert_before, scope_marker + insert_before, 1)

          branch_guard = f'''if [ "${{GITHUB_HEAD_REF:-}}" = "{branch}" ]; then
            ALLOWED_CURRENT=$(printf '%s\\n%s\\n' "$ALLOWED_CURRENT" "$TRANSITIVE_RUNTIME_REMEDIATION_SCOPE")
          fi

          '''
          approved_marker = 'APPROVED_BRANCH_SCOPE=$(GITHUB_HEAD_REF="${GITHUB_HEAD_REF:-}" node - <<\'JS\''
          if branch_guard not in text:
              if approved_marker not in text:
                  raise SystemExit('Cannot find branch guard insertion point')
              text = text.replace(approved_marker, branch_guard + approved_marker, 1)

          old_forbidden = "FORBIDDEN_ALWAYS='^(apps/landing/|package-lock\\.json$|pnpm-lock\\.yaml$|\\.env|.*\\.pem$|.*\\.key$)'"
          new_forbidden = f'''if [ "${{GITHUB_HEAD_REF:-}}" = "{branch}" ]; then
            FORBIDDEN_ALWAYS='^(apps/landing/|package-lock\\.json$|\\.env|.*\\.pem$|.*\\.key$)'
          else
            FORBIDDEN_ALWAYS='^(apps/landing/|package-lock\\.json$|pnpm-lock\\.yaml$|\\.env|.*\\.pem$|.*\\.key$)'
          fi'''
          if old_forbidden in text:
              text = text.replace(old_forbidden, new_forbidden, 1)
          elif new_forbidden not in text:
              raise SystemExit('Cannot find forbidden-path policy')

          path.write_text(text)
          PY

      - name: Generate deterministic lockfile
        run: pnpm install --lockfile-only

      - name: Verify exact package resolutions
        run: |
          pnpm install --frozen-lockfile
          node - <<'NODE'
          const fs = require('fs');
          const lock = fs.readFileSync('pnpm-lock.yaml', 'utf8');
          const required = ['multer@2.2.0', 'lodash@4.18.0', 'ws@8.21.0'];
          const missing = required.filter((token) => !lock.includes(token));
          if (missing.length) {
            console.error(`Patched resolutions missing from lockfile: ${missing.join(', ')}`);
            process.exit(1);
          }
          console.log('Patched transitive resolutions are present.');
          NODE

      - name: Enforce generated diff boundary
        run: |
          changed=$(git status --short | awk '{print $2}' | sort)
          printf '%s\n' "$changed"
          unexpected=$(printf '%s\n' "$changed" | grep -Ev '^(pnpm-lock\.yaml|scripts/p7-autopilot-guard\.sh)$' || true)
          if [ -n "$unexpected" ]; then
            echo "Unexpected generated files:"
            printf '%s\n' "$unexpected"
            exit 1
          fi
          test -n "$changed"

      - name: Commit generated lockfile and guard
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pnpm-lock.yaml scripts/p7-autopilot-guard.sh
          git commit -m 'Regenerate patched runtime dependency lockfile [lockfile-refresh]'
          git push origin HEAD:agent/ir-sec-transitive-runtime-remediation
