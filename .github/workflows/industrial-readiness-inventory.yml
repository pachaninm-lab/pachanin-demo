name: Industrial Readiness Inventory

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'apps/api/src/**'
      - 'apps/api/prisma/**'
      - 'apps/api/test/**'
      - 'apps/web/app/platform-v7/**'
      - 'apps/web/tests/**'
      - 'workers/**'
      - 'infra/**'
      - 'scripts/check-industrial-readiness-inventory.mjs'
      - 'docs/platform-v7/industrial-readiness-inventory.json'
      - 'docs/platform-v7/industrial-readiness-inventory.schema.json'
      - '.github/workflows/**'
      - 'package.json'
  push:
    branches: [main]
    paths:
      - 'apps/api/src/**'
      - 'apps/api/prisma/**'
      - 'apps/api/test/**'
      - 'apps/web/app/platform-v7/**'
      - 'apps/web/tests/**'
      - 'workers/**'
      - 'infra/**'
      - 'scripts/check-industrial-readiness-inventory.mjs'
      - 'docs/platform-v7/industrial-readiness-inventory.json'
      - 'docs/platform-v7/industrial-readiness-inventory.schema.json'
      - '.github/workflows/**'
      - 'package.json'

permissions:
  contents: read

concurrency:
  group: industrial-readiness-inventory-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-inventory:
    name: Validate machine-readable readiness inventory
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate inventory and evidence paths
        env:
          INDUSTRIAL_READINESS_REPORT: artifacts/industrial-readiness/inventory-validation.json
        run: node scripts/check-industrial-readiness-inventory.mjs

      - name: Publish readiness summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'artifacts/industrial-readiness/inventory-validation.json';
          if (!fs.existsSync(path)) {
            fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, '## Industrial readiness inventory\n\nValidation report was not produced.\n');
            process.exit(0);
          }
          const report = JSON.parse(fs.readFileSync(path, 'utf8'));
          const summary = report.summary || {};
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            [
              '## Industrial readiness inventory',
              '',
              `- Valid: ${report.valid ? 'yes' : 'no'}`,
              `- Verified: ${summary.IMPLEMENTED_AND_VERIFIED ?? 0}/${summary.total ?? 0}`,
              `- Verified percent: ${summary.verifiedPercent ?? 0}%`,
              `- Unresolved P0: ${(summary.unresolvedP0 || []).length}`,
              `- Inventory baseline: ${report.inventoryBaselineCommit}`,
              `- Validated commit: ${report.validatedCommit}`,
              '',
            ].join('\n'),
          );
          NODE

      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: industrial-readiness-inventory-${{ github.sha }}
          path: artifacts/industrial-readiness/inventory-validation.json
          if-no-files-found: error
          retention-days: 30
