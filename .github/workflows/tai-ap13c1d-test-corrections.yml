name: TAI AP-13C.1d Final Test Corrections

on:
  push:
    branches:
      - agent/tai-ap-13c1d-quality-scoring-authority
    paths:
      - '.github/workflows/tai-ap13c1d-test-corrections.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1d-quality-scoring-authority
          fetch-depth: 0
      - name: Correct matrix signing and status mutation
        shell: bash
        run: |
          set -euo pipefail
          git pull --ff-only origin agent/tai-ap-13c1d-quality-scoring-authority
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tests/test_quality_scoring_cli.py')
          text = path.read_text(encoding='utf-8')
          replacements = {
              'from quality_scoring_fixtures import _fixture, _signed':
                  'from quality_scoring_fixtures import _fixture',
              'report = _signed(report, "report_sha256")':
                  'report = _resign(report, "report_sha256")',
          }
          for old, new in replacements.items():
              count = text.count(old)
              if count == 1:
                  text = text.replace(old, new)
              elif count != 0:
                  raise SystemExit(f'unexpected occurrence count for {old}: {count}')
          old = '''            lambda manifest, payload: manifest["entries"][0].__setitem__(
                "status", "ERROR"
            ),
            "not scoreable",
'''
          new = '''            lambda manifest, payload: (
                manifest["entries"][0].__setitem__("status", "ERROR"),
                payload["entries"][0].__setitem__("status", "ERROR"),
            ),
            "not scoreable",
'''
          count = text.count(old)
          if count == 1:
              text = text.replace(old, new)
          elif count != 0:
              raise SystemExit(f'unexpected status block count: {count}')
          path.write_text(text, encoding='utf-8')
          PY
          rm .github/workflows/tai-ap13c1d-test-corrections.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/tai/tests/test_quality_scoring_cli.py \
            .github/workflows/tai-ap13c1d-test-corrections.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m 'test(tai): finalize quality provenance matrix'
          git push origin HEAD:agent/tai-ap-13c1d-quality-scoring-authority
