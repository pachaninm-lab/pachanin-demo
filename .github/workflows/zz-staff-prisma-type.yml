name: normalize staff prisma client typing

on:
  push:
    branches:
      - security/staff-access-control-plane-foundation

permissions:
  contents: write

jobs:
  normalize-and-remove:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: security/staff-access-control-plane-foundation
          fetch-depth: 0
      - name: Use shared PrismaClient structural contract
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          path = Path('apps/api/src/modules/staff-access/staff-access.repository.ts')
          text = path.read_text()
          text = text.replace("import { Prisma } from '@prisma/client';", "import { Prisma, PrismaClient } from '@prisma/client';")
          text = text.replace("import { PrismaService } from '../../common/prisma/prisma.service';\n", '')
          text = text.replace('constructor(readonly prisma: PrismaService) {}', 'constructor(readonly prisma: PrismaClient) {}')
          if 'constructor(readonly prisma: PrismaClient) {}' not in text:
              raise SystemExit('StaffAccessRepository constructor anchor not found')
          path.write_text(text)
          PY
          git rm .github/workflows/zz-staff-prisma-type.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/api/src/modules/staff-access/staff-access.repository.ts
          git add -u
          git commit -m 'Use shared PrismaClient contract for staff repository'
          git push origin HEAD:security/staff-access-control-plane-foundation
