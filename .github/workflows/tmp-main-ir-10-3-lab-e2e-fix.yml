name: Temporary main IR-10.3 lab E2E fix runner

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: tmp-ir-10-3-lab-e2e-fix
  cancel-in-progress: false

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[ir-10-3-lab-e2e-fix-complete]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-3-labs-authority-v3
          fetch-depth: 0
      - name: Patch laboratory authority acceptance tests
        shell: bash
        run: |
          set -euo pipefail
          if git log -1 --pretty=%B | grep -Fq '[ir-10-3-lab-e2e-fixed]'; then
            echo 'Target already patched'
            exit 0
          fi
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str, label: str):
              text = path.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: anchor count={count}')
              path.write_text(text.replace(old, new, 1))

          service = Path('apps/api/src/modules/deals/deal-command.service.ts')
          replace_once(
              service,
              """    if (actionId === 'confirm_inspection') {
                const shipmentId = requiredString(payload, 'shipmentId');
                const inspectionResult = requiredString(payload, 'inspectionResult');
                const inspectedAt = requiredIso(payload, 'inspectedAt');
                const evidenceRef = requiredString(payload, 'evidenceRef');
                await this.requireShipment(tx, shipmentId, deal.id);
                await this.requireEvidence(tx, evidenceRef, deal.id, shipmentId);
                return { shipmentId, inspectionResult, inspectedAt: inspectedAt.toISOString(), evidenceRef };
              }
          """,
              """    if (actionId === 'confirm_inspection') {
                const shipmentId = requiredString(payload, 'shipmentId');
                const documentId = requiredString(payload, 'documentId');
                const inspectionResult = requiredString(payload, 'inspectionResult');
                const inspectedAt = requiredIso(payload, 'inspectedAt');
                const evidenceRef = requiredString(payload, 'evidenceRef');
                await this.requireShipment(tx, shipmentId, deal.id);
                const document = await tx.dealDocument.findUnique({ where: { id: documentId } });
                if (
                  !document || document.dealId !== deal.id || document.type !== 'INSPECTION_REPORT'
                  || !['VALIDATED', 'SIGNED'].includes(document.status) || !document.hash || !document.s3Key
                ) {
                  invalid('documentId', 'Подтверждённое заключение независимого осмотра не найдено в сделке.');
                }
                await this.requireEvidence(tx, evidenceRef, deal.id, shipmentId);
                return {
                  shipmentId,
                  documentId,
                  inspectionResult,
                  inspectedAt: inspectedAt.toISOString(),
                  evidenceRef,
                };
              }
          """,
              'confirm inspection authority',
          )
          replace_once(
              service,
              """      await this.requireEvidence(
                tx,
                sample.certificateDocId,
                deal.id,
                sample.shipmentId ?? undefined,
              );
          """,
              """      const protocolDocument = await tx.dealDocument.findUnique({
                where: { id: sample.certificateDocId },
              });
              if (
                !protocolDocument || protocolDocument.dealId !== deal.id
                || protocolDocument.type !== 'LAB_PROTOCOL' || protocolDocument.status !== 'SIGNED'
                || !protocolDocument.signedAt || !protocolDocument.isImmutable
                || !protocolDocument.hash || !protocolDocument.s3Key
              ) {
                invalid('sampleId', 'Подписанный неизменяемый лабораторный протокол не найден в сделке.');
              }
          """,
              'canonical finalized protocol document authority',
          )

          harness = Path('apps/api/test/industrial/harness.ts')
          replace_once(
              harness,
              """import { IndustrialDealCommandGateway } from '../../src/modules/deals/industrial-deal-command.gateway';
          """,
              """import { IndustrialDealCommandGateway } from '../../src/modules/deals/industrial-deal-command.gateway';
          import { PrismaLabRepository } from '../../src/modules/labs/prisma-lab.repository';
          """,
              'harness lab repository import',
          )
          replace_once(
              harness,
              """  routeToFacilityId: string;
            evidence: Record<string, string>;
          """,
              """  routeToFacilityId: string;
            labProtocolDocumentId: string;
            labAccreditationId: string;
            labMethodId: string;
            labEquipmentId: string;
            evidence: Record<string, string>;
          """,
              'harness fixture lab fields',
          )
          replace_once(
              harness,
              """  gateway: IndustrialDealCommandGateway;
          }
          """,
              """  gateway: IndustrialDealCommandGateway;
            labs: PrismaLabRepository;
          }
          """,
              'harness service instance labs',
          )
          replace_once(
              harness,
              """  const gateway = new IndustrialDealCommandGateway(prisma, rls, commands);
            return { prisma, rls, commands, gateway };
          """,
              """  const gateway = new IndustrialDealCommandGateway(prisma, rls, commands);
            const labs = new PrismaLabRepository(rls);
            return { prisma, rls, commands, gateway, labs };
          """,
              'harness create labs',
          )
          replace_once(
              harness,
              """  const routeToFacilityId = `facility:${buyerOrgId}:acceptance`;
            const passwordHash = bcrypt.hashSync('industrial-e2e', 4);
          """,
              """  const routeToFacilityId = `facility:${buyerOrgId}:acceptance`;
            const labProtocolDocumentId = `lab-protocol:${dealId}`;
            const labAccreditationId = `lab-accreditation:${dealId}`;
            const labMethodId = `lab-method:${dealId}:controlled-standard`;
            const labEquipmentId = `lab-equipment:${dealId}:analyzer-1`;
            const passwordHash = bcrypt.hashSync('industrial-e2e', 4);
          """,
              'harness lab identifiers',
          )
          replace_once(
              harness,
              """      { id: `lab-protocol:${dealId}`, type: 'LAB_PROTOCOL', name: 'Лабораторный протокол' },
          """,
              """      { id: labProtocolDocumentId, type: 'LAB_PROTOCOL', name: 'Лабораторный протокол' },
          """,
              'harness protocol document id',
          )
          replace_once(
              harness,
              """    await tx.labSample.upsert({
                where: { id: sampleId },
                update: { status: 'PENDING', protocol: null, finalizedAt: null, labId: serviceOrgId, labName: serviceOrgId },
                create: {
                  id: sampleId,
                  dealId,
                  shipmentId,
                  acceptanceId,
                  status: 'PENDING',
                  culture: 'Пшеница',
                  labId: serviceOrgId,
                  labName: serviceOrgId,
                  collectedAt: new Date(FACT_AT),
                },
              });
          """,
              """    const labUserId = `user-e2e-${slug}-lab`;
              const surveyorUserId = `user-e2e-${slug}-surveyor`;
              await tx.labAssignment.upsert({
                where: { dealId_labUserId: { dealId, labUserId } },
                update: {
                  tenantId: INDUSTRIAL_TENANT,
                  labOrgId: serviceOrgId,
                  status: 'ACTIVE',
                  validUntil: null,
                  evidenceRef: evidence.lab,
                },
                create: {
                  id: `lab-assignment:${dealId}`,
                  tenantId: INDUSTRIAL_TENANT,
                  dealId,
                  labOrgId: serviceOrgId,
                  labUserId,
                  status: 'ACTIVE',
                  evidenceRef: evidence.lab,
                },
              });
              await tx.labAccreditation.upsert({
                where: {
                  tenantId_labOrgId_reference: {
                    tenantId: INDUSTRIAL_TENANT,
                    labOrgId: serviceOrgId,
                    reference: `ACCREDITATION-${serviceOrgId}`,
                  },
                },
                update: {
                  status: 'ACTIVE',
                  scope: { cultures: ['Пшеница'], standards: ['CONTROLLED-STANDARD-E2E'], testOnly: true },
                  validUntil: new Date('2027-01-01T00:00:00.000Z'),
                  verifiedAt: new Date(FACT_AT),
                  evidenceRef: evidence.lab,
                },
                create: {
                  id: labAccreditationId,
                  tenantId: INDUSTRIAL_TENANT,
                  labOrgId: serviceOrgId,
                  reference: `ACCREDITATION-${serviceOrgId}`,
                  status: 'ACTIVE',
                  scope: { cultures: ['Пшеница'], standards: ['CONTROLLED-STANDARD-E2E'], testOnly: true },
                  validFrom: new Date('2026-01-01T00:00:00.000Z'),
                  validUntil: new Date('2027-01-01T00:00:00.000Z'),
                  verifiedAt: new Date(FACT_AT),
                  evidenceRef: evidence.lab,
                },
              });
              await tx.labMethod.upsert({
                where: {
                  tenantId_labOrgId_code: {
                    tenantId: INDUSTRIAL_TENANT,
                    labOrgId: serviceOrgId,
                    code: 'CONTROLLED-E2E',
                  },
                },
                update: {
                  status: 'ACTIVE',
                  applicableStandard: 'CONTROLLED-STANDARD-E2E',
                  validUntil: new Date('2027-01-01T00:00:00.000Z'),
                  evidenceRef: evidence.lab,
                },
                create: {
                  id: labMethodId,
                  tenantId: INDUSTRIAL_TENANT,
                  labOrgId: serviceOrgId,
                  code: 'CONTROLLED-E2E',
                  name: 'Controlled industrial E2E method',
                  applicableStandard: 'CONTROLLED-STANDARD-E2E',
                  status: 'ACTIVE',
                  validFrom: new Date('2026-01-01T00:00:00.000Z'),
                  validUntil: new Date('2027-01-01T00:00:00.000Z'),
                  evidenceRef: evidence.lab,
                },
              });
              await tx.labEquipment.upsert({
                where: {
                  tenantId_labOrgId_serialNumber: {
                    tenantId: INDUSTRIAL_TENANT,
                    labOrgId: serviceOrgId,
                    serialNumber: `TEST-ANALYZER-${slug}`,
                  },
                },
                update: {
                  status: 'ACTIVE',
                  calibratedAt: new Date('2026-06-01T00:00:00.000Z'),
                  calibrationValidUntil: new Date('2027-01-01T00:00:00.000Z'),
                  calibrationEvidenceRef: evidence.lab,
                },
                create: {
                  id: labEquipmentId,
                  tenantId: INDUSTRIAL_TENANT,
                  labOrgId: serviceOrgId,
                  name: 'Controlled industrial E2E analyzer',
                  serialNumber: `TEST-ANALYZER-${slug}`,
                  status: 'ACTIVE',
                  calibratedAt: new Date('2026-06-01T00:00:00.000Z'),
                  calibrationValidUntil: new Date('2027-01-01T00:00:00.000Z'),
                  calibrationEvidenceRef: evidence.lab,
                },
              });
              await tx.labSample.upsert({
                where: { id: sampleId },
                update: {
                  tenantId: INDUSTRIAL_TENANT,
                  shipmentId,
                  acceptanceId,
                  labId: serviceOrgId,
                  assignedLabUserId: labUserId,
                  samplerUserId: null,
                  currentCustodianOrgId: serviceOrgId,
                  currentCustodianUserId: surveyorUserId,
                  status: 'PENDING',
                  protocol: null,
                  gost: null,
                  accreditationId: null,
                  finalizedAt: null,
                  finalizedByUserId: null,
                  protocolHash: null,
                  certificateDocId: null,
                  version: 0,
                  labName: serviceOrgId,
                  collectedAt: null,
                },
                create: {
                  id: sampleId,
                  dealId,
                  shipmentId,
                  acceptanceId,
                  tenantId: INDUSTRIAL_TENANT,
                  labId: serviceOrgId,
                  assignedLabUserId: labUserId,
                  currentCustodianOrgId: serviceOrgId,
                  currentCustodianUserId: surveyorUserId,
                  status: 'PENDING',
                  culture: 'Пшеница',
                  labName: serviceOrgId,
                },
              });
          """,
              'harness normalized laboratory authority',
          )
          replace_once(
              harness,
              """    routeToFacilityId,
                evidence,
          """,
              """    routeToFacilityId,
                labProtocolDocumentId,
                labAccreditationId,
                labMethodId,
                labEquipmentId,
                evidence,
          """,
              'harness fixture return lab fields',
          )
          replace_once(
              harness,
              """export function payloadForAction(fixture: DealFixture, actionId: DealActionId): Prisma.InputJsonObject {
          """,
              """export async function prepareLaboratoryFacts(
            instance: ServiceInstance,
            fixture: DealFixture,
          ): Promise<void> {
            const surveyor = fixture.users.surveyor;
            const lab = fixture.users.lab;
            let workspace = await instance.labs.getById(fixture.sampleId, lab);
            if (workspace.sample.status === 'FINALIZED') return;

            if (workspace.sample.status === 'PENDING') {
              await instance.labs.collect(fixture.sampleId, {
                commandId: `lab:${fixture.dealId}:collect`,
                idempotencyKey: `lab:${fixture.dealId}:collect`,
                expectedVersion: workspace.sample.version,
                occurredAt: '2026-07-12T14:05:00.000Z',
                evidenceRef: fixture.evidence.inspection,
              }, surveyor);
              workspace = await instance.labs.getById(fixture.sampleId, lab);
            }
            if (workspace.sample.status === 'COLLECTED') {
              await instance.labs.handoff(fixture.sampleId, {
                commandId: `lab:${fixture.dealId}:handoff`,
                idempotencyKey: `lab:${fixture.dealId}:handoff`,
                expectedVersion: workspace.sample.version,
                occurredAt: '2026-07-12T14:10:00.000Z',
                evidenceRef: fixture.evidence.lab,
              }, surveyor);
              workspace = await instance.labs.getById(fixture.sampleId, lab);
            }
            if (workspace.sample.status === 'IN_TRANSIT') {
              await instance.labs.receive(fixture.sampleId, {
                commandId: `lab:${fixture.dealId}:receive`,
                idempotencyKey: `lab:${fixture.dealId}:receive`,
                expectedVersion: workspace.sample.version,
                occurredAt: '2026-07-12T14:15:00.000Z',
                evidenceRef: fixture.evidence.lab,
              }, lab);
              workspace = await instance.labs.getById(fixture.sampleId, lab);
            }

            for (const test of [
              { metric: 'moisture', value: 12.4, normMax: 14, at: '2026-07-12T14:30:00.000Z' },
              { metric: 'protein', value: 13.2, normMin: 12.5, at: '2026-07-12T14:40:00.000Z' },
            ]) {
              if (workspace.tests.some((item) => item.parameter === test.metric && !item.correctionOfTestId)) continue;
              await instance.labs.recordTest(fixture.sampleId, {
                commandId: `lab:${fixture.dealId}:test:${test.metric}`,
                idempotencyKey: `lab:${fixture.dealId}:test:${test.metric}`,
                expectedVersion: workspace.sample.version,
                metric: test.metric,
                value: test.value,
                unit: '%',
                ...(test.normMin === undefined ? {} : { normMin: test.normMin }),
                ...(test.normMax === undefined ? {} : { normMax: test.normMax }),
                methodId: fixture.labMethodId,
                equipmentId: fixture.labEquipmentId,
                recordedAt: test.at,
              }, lab);
              workspace = await instance.labs.getById(fixture.sampleId, lab);
            }

            if (workspace.sample.status !== 'FINALIZED') {
              await instance.labs.finalize(fixture.sampleId, {
                commandId: `lab:${fixture.dealId}:finalize`,
                idempotencyKey: `lab:${fixture.dealId}:finalize`,
                expectedVersion: workspace.sample.version,
                protocolNumber: `PROTOCOL-${fixture.dealId}`,
                applicableStandard: 'CONTROLLED-STANDARD-E2E',
                accreditationId: fixture.labAccreditationId,
                signedEvidenceRef: fixture.labProtocolDocumentId,
                finalizedAt: '2026-07-12T15:00:00.000Z',
              }, lab);
            }
          }

          export function payloadForAction(fixture: DealFixture, actionId: DealActionId): Prisma.InputJsonObject {
          """,
              'harness prepare lab facts helper',
          )
          replace_once(
              harness,
              """    case 'confirm_inspection':
                return { documentId: fixture.inspectionDocumentId, evidenceRef: fixture.evidence.inspection, inspectedAt: '2026-07-12T14:00:00.000Z' };
              case 'finalize_lab':
                return {
                  sampleId: fixture.sampleId,
                  protocolNumber: `PROTOCOL-${fixture.dealId}`,
                  labId: fixture.serviceOrgId,
                  accreditationRef: `ACCREDITATION-${fixture.serviceOrgId}`,
                  applicableStandard: 'CONTROLLED-STANDARD-E2E',
                  finalizedAt: '2026-07-12T15:00:00.000Z',
                  signedEvidenceRef: fixture.evidence.lab,
                  indicators: [
                    { parameter: 'moisture', value: '12.400000', unit: '%', normMax: '14.000000' },
                    { parameter: 'protein', value: '13.200000', unit: '%', normMin: '12.500000' },
                  ],
                };
          """,
              """    case 'confirm_inspection':
                return {
                  shipmentId: fixture.shipmentId,
                  documentId: fixture.inspectionDocumentId,
                  inspectionResult: 'CONFORMING',
                  evidenceRef: fixture.evidence.inspection,
                  inspectedAt: '2026-07-12T14:00:00.000Z',
                };
              case 'finalize_lab':
                return { sampleId: fixture.sampleId };
          """,
              'harness factual payloads',
          )
          replace_once(
              harness,
              """        `DELETE FROM \"lab_tests\" WHERE \"sampleId\" IN (SELECT id FROM \"lab_samples\" WHERE \"dealId\" IN (${inList}))`,
                `DELETE FROM \"lab_samples\" WHERE \"dealId\" IN (${inList})`,
          """,
              """        `DELETE FROM \"lab_custody_events\" WHERE \"sampleId\" IN (SELECT id FROM \"lab_samples\" WHERE \"dealId\" IN (${inList}))`,
                `DELETE FROM \"lab_tests\" WHERE \"sampleId\" IN (SELECT id FROM \"lab_samples\" WHERE \"dealId\" IN (${inList}))`,
                `DELETE FROM \"lab_samples\" WHERE \"dealId\" IN (${inList})`,
                `DELETE FROM \"lab_assignments\" WHERE \"dealId\" IN (${inList})`,
                `DELETE FROM \"lab_accreditations\" WHERE \"tenantId\" = '${INDUSTRIAL_TENANT}'`,
                `DELETE FROM \"lab_methods\" WHERE \"tenantId\" = '${INDUSTRIAL_TENANT}'`,
                `DELETE FROM \"lab_equipment\" WHERE \"tenantId\" = '${INDUSTRIAL_TENANT}'`,
          """,
              'harness laboratory cleanup',
          )

          industrial = Path('apps/api/test/industrial/industrial-core.e2e-spec.ts')
          replace_once(
              industrial,
              """  payloadForAction,
            provisionDeal,
          """,
              """  payloadForAction,
            prepareLaboratoryFacts,
            provisionDeal,
          """,
              'industrial import prepare lab',
          )
          replace_once(
              industrial,
              """  const deal = await currentDeal(instance, fixture.dealId);
          """,
              """  if (actionId === 'finalize_lab') await prepareLaboratoryFacts(instance, fixture);
            const deal = await currentDeal(instance, fixture.dealId);
          """,
              'industrial prepare before canonical finalize',
          )

          load = Path('apps/api/test/industrial/load-proof.e2e-spec.ts')
          replace_once(
              load,
              """  payloadForAction,
            provisionDeal,
          """,
              """  payloadForAction,
            prepareLaboratoryFacts,
            provisionDeal,
          """,
              'load import prepare lab',
          )
          replace_once(
              load,
              """  const MAX_ATTEMPTS = 12;
          """,
              """  const MAX_ATTEMPTS = 12;
            if (actionId === 'finalize_lab') await prepareLaboratoryFacts(instance, fixture);
          """,
              'load prepare before canonical finalize',
          )

          nofake = Path('apps/api/test/industrial/deal-command-no-fake-live.e2e-spec.ts')
          replace_once(
              nofake,
              """  payloadForAction,
            provisionDeal,
          """,
              """  payloadForAction,
            prepareLaboratoryFacts,
            provisionDeal,
          """,
              'nofake import prepare lab',
          )
          replace_once(
              nofake,
              """  for (const [actionId, userKey] of sequence) await execute(fixture, actionId, userKey);
          """,
              """  for (const [actionId, userKey] of sequence) {
                if (actionId === 'finalize_lab') await prepareLaboratoryFacts(instance, fixture);
                await execute(fixture, actionId, userKey);
              }
          """,
              'nofake advance laboratory authority',
          )

          seed = Path('apps/api/test/one-deal/seed.ts')
          replace_once(
              seed,
              """      SET \"tenantId\" = ${CANONICAL_TENANT_ID}, \"labId\" = 'org-canonical-lab',
                    \"assignedLabUserId\" = 'lab-e2e', \"currentCustodianOrgId\" = 'org-canonical-lab',
                    \"currentCustodianUserId\" = 'lab-e2e', \"accreditationId\" = NULL,
          """,
              """      SET \"tenantId\" = ${CANONICAL_TENANT_ID}, \"labId\" = 'org-canonical-lab',
                    \"assignedLabUserId\" = 'lab-e2e', \"currentCustodianOrgId\" = 'org-canonical-surveyor',
                    \"currentCustodianUserId\" = 'surveyor-e2e', \"accreditationId\" = NULL,
          """,
              'one-deal initial custody',
          )

          one = Path('apps/api/test/one-deal/industrial-one-deal.e2e-spec.ts')
          replace_once(
              one,
              """import { PrismaShipmentRepository } from '../../src/modules/logistics/prisma-shipment.repository';
          """,
              """import { PrismaShipmentRepository } from '../../src/modules/logistics/prisma-shipment.repository';
          import { PrismaLabRepository } from '../../src/modules/labs/prisma-lab.repository';
          """,
              'one-deal lab repository import',
          )
          replace_once(
              one,
              """    case 'confirm_inspection':
                return { documentId: INSPECTION_ID, evidenceRef: evidence('inspection'), inspectedAt: '2026-07-12T14:00:00.000Z' };
              case 'finalize_lab':
                return {
                  sampleId: SAMPLE_ID,
                  protocolNumber: `PROTOCOL-${CANONICAL_TEST_DEAL_ID}`,
                  labId: 'org-canonical-lab',
                  accreditationRef: 'ACCREDITATION-ORG-CANONICAL-LAB',
                  applicableStandard: 'CONTROLLED-STANDARD-E2E',
                  finalizedAt: '2026-07-12T15:00:00.000Z',
                  signedEvidenceRef: evidence('lab'),
                  indicators: [
                    { parameter: 'moisture', value: '12.400000', unit: '%', normMax: '14.000000' },
                    { parameter: 'protein', value: '13.200000', unit: '%', normMin: '12.500000' },
                  ],
                };
          """,
              """    case 'confirm_inspection':
                return {
                  shipmentId: SHIPMENT_ID,
                  documentId: INSPECTION_ID,
                  inspectionResult: 'CONFORMING',
                  evidenceRef: evidence('inspection'),
                  inspectedAt: '2026-07-12T14:00:00.000Z',
                };
              case 'finalize_lab':
                return { sampleId: SAMPLE_ID };
          """,
              'one-deal factual payloads',
          )
          replace_once(
              one,
              """  const gateway = new IndustrialDealCommandGateway(prisma, rls, commands);
            const bankKeys = new BankKeyRegistryService(prisma);
          """,
              """  const gateway = new IndustrialDealCommandGateway(prisma, rls, commands);
            const labs = new PrismaLabRepository(rls);
            const bankKeys = new BankKeyRegistryService(prisma);
          """,
              'one-deal runtime labs',
          )
          replace_once(
              one,
              """  return { prisma, rls, gateway, settlement };
          """,
              """  return { prisma, rls, gateway, settlement, labs };
          """,
              'one-deal runtime return labs',
          )
          replace_once(
              one,
              """  async function evidenceSnapshot(targetRls: RlsTransactionService, user: RequestUser) {
          """,
              """  async function prepareLaboratoryFacts(): Promise<void> {
                const surveyor = actor(Role.SURVEYOR);
                const lab = actor(Role.LAB);
                let current = await primary.labs.getById(SAMPLE_ID, lab);
                if (current.sample.status === 'FINALIZED') return;
                if (current.sample.status === 'PENDING') {
                  await primary.labs.collect(SAMPLE_ID, {
                    commandId: 'lab-command-collect',
                    idempotencyKey: 'lab-idempotency-collect',
                    expectedVersion: current.sample.version,
                    evidenceRef: evidence('inspection'),
                    occurredAt: '2026-07-12T14:05:00.000Z',
                  }, surveyor);
                  current = await primary.labs.getById(SAMPLE_ID, lab);
                }
                if (current.sample.status === 'COLLECTED') {
                  await primary.labs.handoff(SAMPLE_ID, {
                    commandId: 'lab-command-handoff',
                    idempotencyKey: 'lab-idempotency-handoff',
                    expectedVersion: current.sample.version,
                    evidenceRef: evidence('lab'),
                    occurredAt: '2026-07-12T14:10:00.000Z',
                  }, surveyor);
                  current = await primary.labs.getById(SAMPLE_ID, lab);
                }
                if (current.sample.status === 'IN_TRANSIT') {
                  await primary.labs.receive(SAMPLE_ID, {
                    commandId: 'lab-command-receive',
                    idempotencyKey: 'lab-idempotency-receive',
                    expectedVersion: current.sample.version,
                    evidenceRef: evidence('lab'),
                    occurredAt: '2026-07-12T14:15:00.000Z',
                  }, lab);
