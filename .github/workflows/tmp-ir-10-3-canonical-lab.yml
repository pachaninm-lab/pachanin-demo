name: Temporary IR-10.3 canonical laboratory authority patch

on:
  push:
    branches:
      - agent/ir-10-3-labs-postgresql-authority

permissions:
  contents: write

jobs:
  patch:
    if: ${{ !contains(github.event.head_commit.message, '[ir-10-3-canonical-lab-fixed]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-10-3-labs-postgresql-authority
          fetch-depth: 0
      - name: Bind canonical finalize_lab to normalized PostgreSQL authority
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          deal_path = Path('apps/api/src/modules/deals/deal-command.service.ts')
          source = deal_path.read_text()

          old_validation = '''      const sample = await tx.labSample.findUnique({ where: { id: sampleId } });
          if (!sample || sample.dealId !== deal.id || sample.status !== 'PENDING') {
            invalid('sampleId', 'Активная проба этой сделки не найдена или уже финализирована.');
          }
          await this.requireEvidence(tx, signedEvidenceRef, deal.id, sample.shipmentId ?? undefined);

          const indicators = requiredArray(payload, 'indicators').map((item, index) => {'''
          new_validation = '''      const sample = await tx.labSample.findUnique({ where: { id: sampleId } });
          if (!sample || sample.dealId !== deal.id || !['PENDING', 'COLLECTED', 'ANALYSIS_IN_PROGRESS', 'FINALIZED'].includes(sample.status)) {
            invalid('sampleId', 'Активная проба этой сделки не найдена или уже закрыта.');
          }
          await this.requireEvidence(tx, signedEvidenceRef, deal.id, sample.shipmentId ?? undefined);
          const laboratoryAuthority = await tx.$queryRaw<Array<{
            accreditation_ref: string;
            authority_status: string;
          }>>(Prisma.sql`
            SELECT accreditation.reference AS accreditation_ref,
                   authority.status AS authority_status
            FROM labs.sample_authorities authority
            JOIN labs.laboratories laboratory
              ON laboratory.id = authority.laboratory_id
             AND laboratory.tenant_id = authority.tenant_id
             AND laboratory.status = 'ACTIVE'
            JOIN labs.accreditations accreditation
              ON accreditation.laboratory_id = laboratory.id
             AND accreditation.tenant_id = authority.tenant_id
             AND accreditation.status = 'ACTIVE'
             AND accreditation.valid_from <= now()
             AND (accreditation.valid_until IS NULL OR accreditation.valid_until > now())
            JOIN labs.personnel personnel
              ON personnel.laboratory_id = laboratory.id
             AND personnel.tenant_id = authority.tenant_id
             AND personnel.user_id = ${user.id}
             AND personnel.status = 'ACTIVE'
             AND personnel.authorized_from <= now()
             AND (personnel.authorized_until IS NULL OR personnel.authorized_until > now())
            WHERE authority.sample_id = ${sampleId}
              AND authority.deal_id = ${deal.id}
              AND authority.tenant_id = ${deal.tenantId}
              AND authority.assigned_user_id = ${user.id}
              AND authority.status IN ('ACTIVE', 'FINALIZED')
              AND laboratory.organization_id = ${labId}
            LIMIT 1
          `);
          const authority = laboratoryAuthority[0];
          if (!authority) invalid('sampleId', 'Проба не имеет действующего нормализованного лабораторного допуска.');
          if (authority.accreditation_ref !== accreditationRef) {
            invalid('accreditationRef', 'Аккредитация не совпадает с действующим допуском лаборатории.');
          }
          const custody = await tx.$queryRaw<Array<{ collected: bigint }>>(Prisma.sql`
            SELECT COUNT(*)::bigint AS collected
            FROM labs.custody_events
            WHERE sample_id = ${sampleId}
              AND deal_id = ${deal.id}
              AND tenant_id = ${deal.tenantId}
              AND event_type = 'COLLECTED'
          `);
          if ((custody[0]?.collected ?? 0n) < 1n) {
            invalid('sampleId', 'Цепочка хранения пробы не содержит подтверждённого отбора.');
          }
          if (sample.status === 'FINALIZED') {
            if (sample.protocol !== protocolNumber
              || sample.gost !== applicableStandard
              || sample.certificateDocId !== signedEvidenceRef
              || sample.labId !== labId) {
              invalid('sampleId', 'Финализированный протокол не совпадает с подтверждённым основанием сделки.');
            }
          }

          const indicators = requiredArray(payload, 'indicators').map((item, index) => {'''
          if source.count(old_validation) != 1:
              raise SystemExit('finalize_lab validation anchor not found exactly once')
          source = source.replace(old_validation, new_validation, 1)

          old_side_effect = '''      case 'finalize_lab': {
            const lab = await tx.organization.findUniqueOrThrow({ where: { id: String(payload.labId) } });
            await tx.labSample.update({
              where: { id: String(payload.sampleId) },
              data: {
                status: 'DONE',
                protocol: String(payload.protocolNumber),
                gost: String(payload.applicableStandard),
                finalizedAt: new Date(String(payload.finalizedAt)),
                labId: lab.id,
                labName: lab.name,
                certificateDocId: String(payload.signedEvidenceRef),
              },
            });
            await tx.labTest.deleteMany({ where: { sampleId: String(payload.sampleId) } });
            const indicators = payload.indicators as Array<{
              parameter: string;
              value: string;
              unit: string;
              normMin: string | null;
              normMax: string | null;
              result: string;
            }>;
            await tx.labTest.createMany({
              data: indicators.map((indicator) => ({
                sampleId: String(payload.sampleId),
                parameter: indicator.parameter,
                value: Number(indicator.value),
                unit: indicator.unit,
                normMin: indicator.normMin === null ? null : Number(indicator.normMin),
                normMax: indicator.normMax === null ? null : Number(indicator.normMax),
                passed: indicator.result === 'PASSED',
              })),
            });
            await tx.acceptanceRecord.update({
              where: { id: `acceptance:${deal.id}` },
              data: { qualityStatus: String(payload.declaredResult), gost: String(payload.applicableStandard) },
            });
            break;
          }'''
          new_side_effect = '''      case 'finalize_lab': {
            const sampleId = String(payload.sampleId);
            const lab = await tx.organization.findUniqueOrThrow({ where: { id: String(payload.labId) } });
            const sample = await tx.labSample.findUniqueOrThrow({ where: { id: sampleId } });
            const indicators = payload.indicators as Array<{
              parameter: string;
              value: string;
              unit: string;
              normMin: string | null;
              normMax: string | null;
              result: string;
            }>;
            if (sample.status !== 'FINALIZED') {
              for (const indicator of indicators) {
                const basis = await tx.$queryRaw<Array<{ method_id: string; equipment_id: string }>>(Prisma.sql`
                  SELECT method.id AS method_id, equipment.id AS equipment_id
                  FROM labs.sample_authorities authority
                  JOIN labs.methods method
                    ON method.laboratory_id = authority.laboratory_id
                   AND method.tenant_id = authority.tenant_id
                   AND method.parameter = ${indicator.parameter}
                   AND method.status = 'ACTIVE'
                  JOIN labs.equipment equipment
                    ON equipment.laboratory_id = authority.laboratory_id
                   AND equipment.tenant_id = authority.tenant_id
                   AND equipment.status = 'ACTIVE'
                   AND (equipment.calibration_valid_until IS NULL OR equipment.calibration_valid_until > now())
                  WHERE authority.sample_id = ${sampleId}
                    AND authority.status = 'ACTIVE'
                  ORDER BY method.id, equipment.id
                  LIMIT 1
                `);
                if (!basis[0]) {
                  throw new ConflictException({ code: 'LAB_METHOD_EQUIPMENT_AUTHORITY_MISSING', parameter: indicator.parameter });
                }
                const testId = `lab-test-${randomUUID()}`;
                await tx.labTest.create({
                  data: {
                    id: testId,
                    sampleId,
                    parameter: indicator.parameter,
                    value: Number(indicator.value),
                    unit: indicator.unit,
                    normMin: indicator.normMin === null ? null : Number(indicator.normMin),
                    normMax: indicator.normMax === null ? null : Number(indicator.normMax),
                    passed: indicator.result === 'PASSED',
                    recordedAt: new Date(String(payload.finalizedAt)),
                  },
                });
                await tx.$executeRaw(Prisma.sql`
                  INSERT INTO labs.test_facts (
                    id, tenant_id, deal_id, sample_id, public_test_id, method_id,
                    equipment_id, actor_user_id, parameter, value, unit, norm_min,
                    norm_max, result, occurred_at, command_id, idempotency_key,
                    correlation_id, created_at
                  ) VALUES (
                    ${`test-fact-${randomUUID()}`}, ${user.tenantId}, ${deal.id}, ${sampleId},
                    ${testId}, ${basis[0].method_id}, ${basis[0].equipment_id}, ${user.id},
                    ${indicator.parameter}, ${Number(indicator.value)}, ${indicator.unit},
                    ${indicator.normMin === null ? null : Number(indicator.normMin)},
                    ${indicator.normMax === null ? null : Number(indicator.normMax)},
                    ${indicator.result}, ${new Date(String(payload.finalizedAt))},
                    current_setting('app.current_command_id', true),
                    ${`canonical-lab-test:${deal.id}:${indicator.parameter}`},
                    current_setting('app.current_command_id', true), now()
                  )
                `);
              }
              await tx.$executeRaw(Prisma.sql`
                INSERT INTO labs.protocols (
                  id, tenant_id, deal_id, sample_id, laboratory_org_id,
                  protocol_number, applicable_standard, accreditation_ref,
                  evidence_file_id, status, finalized_by_user_id, finalized_at,
                  version, created_at
                ) VALUES (
                  ${`lab-protocol-${randomUUID()}`}, ${user.tenantId}, ${deal.id}, ${sampleId},
                  ${lab.id}, ${String(payload.protocolNumber)}, ${String(payload.applicableStandard)},
                  ${String(payload.accreditationRef)}, ${String(payload.signedEvidenceRef)},
                  'FINALIZED', ${user.id}, ${new Date(String(payload.finalizedAt))}, 1, now()
                )
              `);
              await tx.$executeRaw(Prisma.sql`
                INSERT INTO labs.custody_events (
                  id, tenant_id, deal_id, sample_id, event_type, actor_user_id,
                  actor_org_id, evidence_file_id, occurred_at, command_id,
                  idempotency_key, correlation_id, created_at
                ) VALUES (
                  ${`lab-custody-${randomUUID()}`}, ${user.tenantId}, ${deal.id}, ${sampleId},
                  'FINALIZED', ${user.id}, ${user.orgId}, ${String(payload.signedEvidenceRef)},
                  ${new Date(String(payload.finalizedAt))}, current_setting('app.current_command_id', true),
                  ${`canonical-lab-custody:${deal.id}:finalized`},
                  current_setting('app.current_command_id', true), now()
                )
              `);
            }
            await tx.labSample.update({
              where: { id: sampleId },
              data: {
                status: 'DONE',
                protocol: String(payload.protocolNumber),
                gost: String(payload.applicableStandard),
                finalizedAt: new Date(String(payload.finalizedAt)),
                labId: lab.id,
                labName: lab.name,
                certificateDocId: String(payload.signedEvidenceRef),
                version: { increment: 1 },
              },
            });
            await tx.$executeRaw(Prisma.sql`
              UPDATE labs.sample_authorities
              SET status = 'FINALIZED',
                  consumed_by_command_id = current_setting('app.current_command_id', true),
                  consumed_at = now(), version = version + 1, updated_at = now()
              WHERE sample_id = ${sampleId}
                AND deal_id = ${deal.id}
                AND status IN ('ACTIVE', 'FINALIZED')
            `);
            await tx.acceptanceRecord.update({
              where: { id: `acceptance:${deal.id}` },
              data: { qualityStatus: String(payload.declaredResult), gost: String(payload.applicableStandard) },
            });
            break;
          }'''
          if source.count(old_side_effect) != 1:
              raise SystemExit('finalize_lab side effect anchor not found exactly once')
          deal_path.write_text(source.replace(old_side_effect, new_side_effect, 1))

          helper = '''async function seedNormalizedLabAuthority(
            prisma: PrismaService,
            input: {
              tenantId: string;
              dealId: string;
              sampleId: string;
              laboratoryOrgId: string;
              laboratoryUserId: string;
              evidenceFileId: string;
            },
          ): Promise<void> {
            const laboratoryId = `laboratory:${input.laboratoryOrgId}`;
            const accreditationRef = `ACCREDITATION-${input.laboratoryOrgId}`;
            await prisma.$transaction(async (tx) => {
              await tx.$executeRaw(Prisma.sql`
                INSERT INTO labs.laboratories (id, tenant_id, organization_id, status)
                VALUES (${laboratoryId}, ${input.tenantId}, ${input.laboratoryOrgId}, 'ACTIVE')
                ON CONFLICT (tenant_id, organization_id) DO UPDATE SET status = 'ACTIVE', updated_at = now()
              `);
              await tx.$executeRaw(Prisma.sql`
                INSERT INTO labs.accreditations (
                  id, tenant_id, laboratory_id, reference, status, valid_from
                ) VALUES (
                  ${`accreditation:${input.laboratoryOrgId}`}, ${input.tenantId}, ${laboratoryId},
                  ${accreditationRef}, 'ACTIVE', TIMESTAMP '2026-01-01 00:00:00'
                )
                ON CONFLICT (tenant_id, reference) DO UPDATE SET
                  status = 'ACTIVE', valid_until = NULL, updated_at = now()
              `);
              await tx.$executeRaw(Prisma.sql`
                INSERT INTO labs.personnel (
                  id, tenant_id, laboratory_id, user_id, status, authorized_from
                ) VALUES (
                  ${`lab-personnel:${input.laboratoryUserId}`}, ${input.tenantId}, ${laboratoryId},
                  ${input.laboratoryUserId}, 'ACTIVE', TIMESTAMP '2026-01-01 00:00:00'
                )
                ON CONFLICT (tenant_id, user_id) DO UPDATE SET
                  laboratory_id = EXCLUDED.laboratory_id, status = 'ACTIVE',
                  authorized_until = NULL, updated_at = now()
              `);
              for (const parameter of ['moisture', 'protein']) {
                await tx.$executeRaw(Prisma.sql`
                  INSERT INTO labs.methods (
                    id, tenant_id, laboratory_id, code, parameter, standard_ref, status
                  ) VALUES (
                    ${`lab-method:${input.laboratoryOrgId}:${parameter}`}, ${input.tenantId},
                    ${laboratoryId}, ${`METHOD-${parameter}`}, ${parameter},
                    'CONTROLLED-STANDARD-E2E', 'ACTIVE'
                  )
                  ON CONFLICT (tenant_id, laboratory_id, code) DO UPDATE SET
                    parameter = EXCLUDED.parameter, standard_ref = EXCLUDED.standard_ref,
                    status = 'ACTIVE', updated_at = now()
                `);
              }
              await tx.$executeRaw(Prisma.sql`
                INSERT INTO labs.equipment (
                  id, tenant_id, laboratory_id, code, status, calibration_valid_until
                ) VALUES (
                  ${`lab-equipment:${input.laboratoryOrgId}`}, ${input.tenantId}, ${laboratoryId},
                  'CONTROLLED-EQUIPMENT-E2E', 'ACTIVE', TIMESTAMP '2030-01-01 00:00:00'
                )
                ON CONFLICT (tenant_id, laboratory_id, code) DO UPDATE SET
                  status = 'ACTIVE', calibration_valid_until = EXCLUDED.calibration_valid_until,
                  updated_at = now()
              `);
              await tx.$executeRaw(Prisma.sql`
                INSERT INTO labs.sample_authorities (
                  id, tenant_id, deal_id, sample_id, laboratory_id, assigned_user_id,
                  status, created_by_command_id, version
                ) VALUES (
                  ${`sample-authority:${input.sampleId}`}, ${input.tenantId}, ${input.dealId},
                  ${input.sampleId}, ${laboratoryId}, ${input.laboratoryUserId}, 'ACTIVE',
                  'controlled-test-seed', 1
                )
                ON CONFLICT (sample_id) DO UPDATE SET
                  laboratory_id = EXCLUDED.laboratory_id,
                  assigned_user_id = EXCLUDED.assigned_user_id,
                  status = 'ACTIVE', consumed_by_command_id = NULL, consumed_at = NULL,
                  version = 1, updated_at = now()
              `);
              await tx.$executeRaw(Prisma.sql`
                INSERT INTO labs.custody_events (
                  id, tenant_id, deal_id, sample_id, event_type, actor_user_id,
                  actor_org_id, evidence_file_id, occurred_at, command_id,
                  idempotency_key, correlation_id
                ) VALUES (
                  ${`lab-custody:${input.sampleId}:collected`}, ${input.tenantId}, ${input.dealId},
                  ${input.sampleId}, 'COLLECTED', ${input.laboratoryUserId}, ${input.laboratoryOrgId},
                  ${input.evidenceFileId}, TIMESTAMP '2026-07-12 09:00:00',
                  'controlled-test-seed', ${`lab-seed:${input.sampleId}:collected`},
                  'controlled-test-seed'
                )
                ON CONFLICT (idempotency_key) DO NOTHING
              `);
            });
          }

          '''

          seed_path = Path('apps/api/test/one-deal/seed.ts')
          seed = seed_path.read_text()
          seed_anchor = 'async function main(): Promise<void> {'
          if seed.count(seed_anchor) != 1:
              raise SystemExit('one-deal seed main anchor not found exactly once')
          seed = seed.replace(seed_anchor, helper + seed_anchor, 1)
          call_anchor = '''    await seedNormalizedLogisticsAdmission(prisma);

              const basisMaterial = {'''
          call_replacement = '''    await seedNormalizedLogisticsAdmission(prisma);
              await seedNormalizedLabAuthority(prisma, {
                tenantId: CANONICAL_TENANT_ID,
                dealId: CANONICAL_TEST_DEAL_ID,
                sampleId: `sample:${CANONICAL_TEST_DEAL_ID}`,
                laboratoryOrgId: 'org-canonical-lab',
                laboratoryUserId: 'lab-e2e',
                evidenceFileId: `evidence:${CANONICAL_TEST_DEAL_ID}:lab`,
              });

              const basisMaterial = {'''
          if seed.count(call_anchor) != 1:
              raise SystemExit('one-deal lab seed call anchor not found exactly once')
          seed_path.write_text(seed.replace(call_anchor, call_replacement, 1))

          harness_path = Path('apps/api/test/industrial/harness.ts')
          harness = harness_path.read_text()
          harness_anchor = 'export async function provisionDeal('
          if harness.count(harness_anchor) != 1:
              raise SystemExit('industrial harness provision anchor not found exactly once')
          harness = harness.replace(harness_anchor, helper + harness_anchor, 1)
          harness_call_anchor = '''  await seedNormalizedLogisticsAdmission(prisma, {
              dealId,
              sellerOrgId,
              buyerOrgId,
              carrierOrgId: serviceOrgId,
              driverUserId: `user-e2e-${slug}-driver`,
              vehicleId,
              routeFromFacilityId,
              routeToFacilityId,
            });

              const users: Record<string, RequestUser> = {};'''
          harness_call_replacement = '''  await seedNormalizedLogisticsAdmission(prisma, {
              dealId,
              sellerOrgId,
              buyerOrgId,
              carrierOrgId: serviceOrgId,
              driverUserId: `user-e2e-${slug}-driver`,
              vehicleId,
              routeFromFacilityId,
              routeToFacilityId,
            });
              await seedNormalizedLabAuthority(prisma, {
                tenantId: INDUSTRIAL_TENANT,
                dealId,
                sampleId,
                laboratoryOrgId: serviceOrgId,
                laboratoryUserId: `user-e2e-${slug}-lab`,
                evidenceFileId: evidence.lab,
              });

              const users: Record<string, RequestUser> = {};'''
          if harness.count(harness_call_anchor) != 1:
              raise SystemExit('industrial harness lab seed call anchor not found exactly once')
          harness_path.write_text(harness.replace(harness_call_anchor, harness_call_replacement, 1))

          script_path = Path('scripts/platform-v7-one-deal-e2e.sh')
          script = script_path.read_text()
          overlay_anchor = '''echo "[one-deal] applying PostgreSQL logistics-authority RLS overlay"
          psql "$ADMIN_URL" -X --set ON_ERROR_STOP=1 --file infra/sql/postgresql-logistics-authority-policies.sql

          echo "[one-deal] creating restricted deal-execution principal"'''
          overlay_replacement = '''echo "[one-deal] applying PostgreSQL logistics-authority RLS overlay"
          psql "$ADMIN_URL" -X --set ON_ERROR_STOP=1 --file infra/sql/postgresql-logistics-authority-policies.sql

          echo "[one-deal] applying PostgreSQL labs-authority RLS overlay"
          psql "$ADMIN_URL" -X --set ON_ERROR_STOP=1 --file infra/sql/postgresql-labs-authority-policies.sql

          echo "[one-deal] creating restricted deal-execution principal"'''
          if script.count(overlay_anchor) != 1:
              raise SystemExit('one-deal labs overlay anchor not found exactly once')
          script = script.replace(overlay_anchor, overlay_replacement, 1)
          script = script.replace(
              'GRANT USAGE ON SCHEMA public, security, logistics TO one_deal_app;',
              'GRANT USAGE ON SCHEMA public, security, logistics, labs TO one_deal_app;',
              1,
          )
          grant_anchor = '''REVOKE INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA logistics FROM one_deal_app;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO one_deal_app;'''
          grant_replacement = '''REVOKE INSERT, UPDATE, DELETE ON ALL TABLES IN SCHEMA logistics FROM one_deal_app;
          GRANT SELECT ON ALL TABLES IN SCHEMA labs TO one_deal_app;
          GRANT INSERT, UPDATE ON
            labs.sample_authorities,
            labs.custody_events,
            labs.test_facts,
            labs.protocols
          TO one_deal_app;
          REVOKE DELETE ON ALL TABLES IN SCHEMA labs FROM one_deal_app;
          GRANT USAGE, SELECT ON ALL SEQUENCES IN SCHEMA public TO one_deal_app;'''
          if script.count(grant_anchor) != 1:
              raise SystemExit('one-deal labs grant anchor not found exactly once')
          script = script.replace(grant_anchor, grant_replacement, 1)
          default_anchor = 'ALTER DEFAULT PRIVILEGES IN SCHEMA logistics GRANT SELECT ON TABLES TO one_deal_app;'
          if script.count(default_anchor) != 1:
              raise SystemExit('one-deal labs default grant anchor not found exactly once')
          script = script.replace(
              default_anchor,
              default_anchor + '\nALTER DEFAULT PRIVILEGES IN SCHEMA labs GRANT SELECT ON TABLES TO one_deal_app;',
              1,
          )
          script_path.write_text(script)
          PY
          rm -f .github/workflows/tmp-ir-10-3-canonical-lab.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat(labs): bind canonical finalize to PostgreSQL authority [ir-10-3-canonical-lab-fixed]"
          git push origin HEAD:agent/ir-10-3-labs-postgresql-authority
