name: archive-static-integrity

on:
  workflow_dispatch:
  push:
    paths:
      - 'apps/**'
      - 'packages/**'
      - 'shared/**'
      - 'scripts/**'
      - 'docs/**'
      - 'package.json'
      - 'tsconfig*.json'

jobs:
  static-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Run archive local gates
        run: node ./scripts/run-archive-local-gates.mjs
      - name: Run static repo integrity audit
        run: node ./scripts/audit-static-repo-integrity.mjs
      - name: Build preintegration evidence pack
        run: node ./scripts/build-preintegration-evidence-pack.mjs
