name: Production Full-Stack Exact-SHA Release

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/docker-publish.yml'
      - '.github/workflows/production-full-stack-exact-sha.yml'
      - 'scripts/production-full-stack-exact-sha.sh'
      - 'scripts/production-full-stack-live-acceptance.sh'
      - 'scripts/check-production-full-stack-release.mjs'
      - 'docs/ops/production-full-stack-release.md'
      - 'docs/ops/virtual-server-production-runbook.md'
      - 'docs/ops/vps-post-deploy-checklist.md'
  push:
    branches: [main]
    paths:
      - '.github/workflows/docker-publish.yml'
      - '.github/workflows/production-full-stack-exact-sha.yml'
      - 'scripts/production-full-stack-exact-sha.sh'
      - 'scripts/production-full-stack-live-acceptance.sh'
      - 'scripts/check-production-full-stack-release.mjs'
  workflow_dispatch:
    inputs:
      target_sha:
        description: 'Exact current main SHA'
        required: true
        type: string
      confirmation:
        description: 'Enter DEPLOY-FULL-STACK-EXACT-SHA'
        required: true
        type: string

permissions:
  contents: read
  packages: read
  issues: write

concurrency:
  group: production-full-stack-exact-sha
  cancel-in-progress: false

env:
  LIVE_BASE: https://xn----8sbjf4befbjgs9b.xn--p1ai
  LIVE_DOMAIN: xn----8sbjf4befbjgs9b.xn--p1ai
  DEFAULT_HOST: 195.19.12.120
  EVIDENCE_DIR: artifacts/production-full-stack-release
  RELEASE_ISSUE_NUMBER: 3072
  SSH_HOST_SECRET: ${{ secrets.PC_PROD_HOST }}
  SSH_USER_SECRET: ${{ secrets.PC_PROD_SSH_USER }}
  SSH_PORT_SECRET: ${{ secrets.PC_PROD_SSH_PORT }}
  SSH_KEY_PRIMARY: ${{ secrets.PC_PROD_SSH_KEY }}
  SSH_KEY_SECONDARY: ${{ secrets.PC_PROD_SSH_PRIVATE_KEY }}
  SSH_KEY_FALLBACK: ${{ secrets.VPS_SSH_KEY }}
  SSH_HOST_FINGERPRINT_SECRET: ${{ secrets.PC_PROD_SSH_HOST_FINGERPRINT }}
  PROD_DIR_SECRET: ${{ secrets.PC_PROD_DIR }}
  PROD_COMPOSE_SECRET: ${{ secrets.PC_PROD_COMPOSE }}
  PROD_PROJECT_SECRET: ${{ secrets.PC_PROD_PROJECT }}
  BACKUP_EVIDENCE_FILE_SECRET: ${{ secrets.PC_PROD_BACKUP_EVIDENCE_FILE }}

jobs:
  contract:
    name: Validate full-stack release contract
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - run: node scripts/check-production-full-stack-release.mjs

  deploy:
    name: Migrate, deploy API and web, verify live intake
    needs: contract
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' &&
       github.actor == github.repository_owner &&
       inputs.confirmation == 'DEPLOY-FULL-STACK-EXACT-SHA')
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve exact current-main target
        id: target
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          target='${{ github.event_name == 'workflow_dispatch' && inputs.target_sha || github.sha }}'
          [[ "$target" =~ ^[0-9a-f]{40}$ ]]
          [[ "$target" == "$(git rev-parse origin/main)" ]]
          git cat-file -e "${target}^{commit}"
          echo "sha=$target" >> "$GITHUB_OUTPUT"
          echo "short=${target:0:7}" >> "$GITHUB_OUTPUT"

      - name: Wait for and verify exact GHCR images
        id: images
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          SHORT_SHA: ${{ steps.target.outputs.short }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$EVIDENCE_DIR"
          echo "$GH_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin >/dev/null
          for component in api web migration; do
            image="ghcr.io/pachaninm-lab/grainflow-${component}:sha-${SHORT_SHA}"
            ready=0
            for attempt in $(seq 1 90); do
              if docker pull "$image" >/dev/null 2>&1; then
                revision="$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' "$image" 2>/dev/null || true)"
                if [[ "$revision" == "$TARGET_SHA" ]]; then ready=1; break; fi
              fi
              sleep 10
            done
            (( ready == 1 )) || { echo "Exact $component image unavailable." >&2; exit 2; }
            docker image inspect "$image" > "$EVIDENCE_DIR/${component}-image.json"
            echo "${component}_image=$image" >> "$GITHUB_OUTPUT"
          done
          printf '%s\n' "$TARGET_SHA" > "$EVIDENCE_DIR/target-sha.txt"

      - name: Resolve protected key and pinned VPS identity
        id: ssh
        shell: bash
        run: |
          set -euo pipefail
          trim(){ local v="$1"; v="${v#"${v%%[![:space:]]*}"}"; v="${v%"${v##*[![:space:]]}"}"; printf '%s' "$v"; }
          host="$(trim "${SSH_HOST_SECRET:-$DEFAULT_HOST}")"
          user="$(trim "${SSH_USER_SECRET:-}")"
          port="$(trim "${SSH_PORT_SECRET:-22}")"
          expected="$(trim "${SSH_HOST_FINGERPRINT_SECRET:-}")"
          [[ "$host" == "$DEFAULT_HOST" ]] || { echo 'Canonical VPS mismatch.' >&2; exit 10; }
          [[ -n "$user" && "$user" == "${SSH_USER_SECRET:-}" && "$user" =~ ^[A-Za-z_][A-Za-z0-9_-]{0,31}$ ]] || { echo 'Protected production principal is missing or invalid.' >&2; exit 11; }
          [[ "$port" =~ ^[0-9]+$ ]] && ((port>=1 && port<=65535)) || exit 12
          [[ "$expected" =~ ^SHA256:[A-Za-z0-9+/=]+$ ]] || { echo 'Pinned host fingerprint is required.' >&2; exit 13; }
          domain_ips="$(getent ahostsv4 "$LIVE_DOMAIN" | awk '{print $1}' | sort -u || true)"
          grep -Fxq "$DEFAULT_HOST" <<< "$domain_ips"
          mkdir -p "$HOME/.ssh" "$EVIDENCE_DIR"
          chmod 700 "$HOME/.ssh"

          validate_key(){
            local source="$1" target="$HOME/.ssh/id_pc_prod" pub
            tr -d '\r' < "$source" > "$target"
            chmod 600 "$target"
            grep -Eq '^(ssh-|ecdsa-|sk-)' "$target" && return 1
            pub="$(mktemp)"
            ssh-keygen -y -P '' -f "$target" > "$pub" 2>/dev/null || { rm -f "$pub"; return 1; }
            ssh-keygen -lf "$pub" > "$EVIDENCE_DIR/ssh-key-fingerprint.txt"
            rm -f "$pub"
          }
          try_slot(){
            local raw="$1" a b c
            [[ -n "$raw" ]] || return 1
            a="$(mktemp)"; b="$(mktemp)"; c="$(mktemp)"
            printf '%s\n' "$raw" > "$a"
            validate_key "$a" && { rm -f "$a" "$b" "$c"; return 0; }
            printf '%s' "${raw//\\n/$'\n'}" > "$b"
            validate_key "$b" && { rm -f "$a" "$b" "$c"; return 0; }
            printf '%s' "$raw" | base64 --decode > "$c" 2>/dev/null && validate_key "$c" && { rm -f "$a" "$b" "$c"; return 0; }
            rm -f "$a" "$b" "$c"; return 1
          }
          try_slot "${SSH_KEY_PRIMARY:-}" || try_slot "${SSH_KEY_SECONDARY:-}" || try_slot "${SSH_KEY_FALLBACK:-}" || {
            printf '%s\n' no-valid-protected-private-key > "$EVIDENCE_DIR/ssh-credential-status.txt"
            echo 'No valid protected SSH private key is configured.' >&2
            exit 14
          }
          printf '%s\n' valid-private-key > "$EVIDENCE_DIR/ssh-credential-status.txt"

          scan="$(mktemp)"; match="$(mktemp)"
          ssh-keyscan -T 10 -p "$port" "$host" 2>/dev/null | sort -u > "$scan"
          [[ -s "$scan" ]]
          while IFS= read -r line; do
            fp="$(printf '%s\n' "$line" | ssh-keygen -lf - -E sha256 2>/dev/null | awk '{print $2}' || true)"
            [[ "$fp" != "$expected" ]] || printf '%s\n' "$line" >> "$match"
          done < "$scan"
          [[ "$(grep -c . "$match" || true)" == 1 ]] || { rm -f "$scan" "$match"; echo 'Pinned host key mismatch.' >&2; exit 15; }
          mv "$match" "$HOME/.ssh/known_hosts"
          rm -f "$scan"
          chmod 600 "$HOME/.ssh/known_hosts"
          ssh -i "$HOME/.ssh/id_pc_prod" -p "$port" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o ConnectTimeout=15 "$SSH_USER_SECRET@$host" \
            'set -euo pipefail; test "$(id -u)" -eq 0; docker version >/dev/null; docker compose version >/dev/null; echo SSH_AUTH_OK' \
            > "$EVIDENCE_DIR/ssh-auth.txt"
          grep -Fxq SSH_AUTH_OK "$EVIDENCE_DIR/ssh-auth.txt"
          echo "host=$host" >> "$GITHUB_OUTPUT"
          echo "port=$port" >> "$GITHUB_OUTPUT"

      - name: Copy bounded release assets
        env:
          HOST: ${{ steps.ssh.outputs.host }}
          PORT: ${{ steps.ssh.outputs.port }}
        shell: bash
        run: |
          set -euo pipefail
          scp_common=(-i "$HOME/.ssh/id_pc_prod" -P "$PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes)
          scp "${scp_common[@]}" scripts/production-full-stack-exact-sha.sh "$SSH_USER_SECRET@$HOST:/tmp/pc-full-stack-${GITHUB_RUN_ID}.sh"

      - name: Execute migration and exact API/web rollout
        id: production
        env:
          HOST: ${{ steps.ssh.outputs.host }}
          PORT: ${{ steps.ssh.outputs.port }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          API_IMAGE: ${{ steps.images.outputs.api_image }}
          WEB_IMAGE: ${{ steps.images.outputs.web_image }}
          MIGRATION_IMAGE: ${{ steps.images.outputs.migration_image }}
        shell: bash
        run: |
          set -euo pipefail
          enc(){ printf '%s' "$1" | base64 -w0; }
          raw="$(mktemp)"; clean="$EVIDENCE_DIR/production-action.log"
          set +e
          ssh -i "$HOME/.ssh/id_pc_prod" -p "$PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER_SECRET@$HOST" \
            "chmod 0700 /tmp/pc-full-stack-${GITHUB_RUN_ID}.sh && PC_API_IMAGE='$API_IMAGE' PC_WEB_IMAGE='$WEB_IMAGE' PC_MIGRATION_IMAGE='$MIGRATION_IMAGE' PC_PROD_DIR_B64='$(enc "${PROD_DIR_SECRET:-}")' PC_PROD_COMPOSE_B64='$(enc "${PROD_COMPOSE_SECRET:-}")' PC_PROD_PROJECT_B64='$(enc "${PROD_PROJECT_SECRET:-}")' PC_PROD_BACKUP_EVIDENCE_FILE_B64='$(enc "${BACKUP_EVIDENCE_FILE_SECRET:-}")' /tmp/pc-full-stack-${GITHUB_RUN_ID}.sh deploy '$TARGET_SHA' '$GITHUB_RUN_ID'" > "$raw" 2>&1
          rc=$?
          set -e
          sed -E 's#postgres(ql)?://[^[:space:]@]+@#postgresql://[REDACTED]@#g; /(_PATH|_DIR|COMPOSE|CONFIG_FILES)=/ s#=.*#=[REDACTED]#' "$raw" > "$clean"
          rm -f "$raw"
          cat "$clean"
          for field in DEPLOYMENT_COMPLETE MIGRATION_COMPLETE DEPLOYED_API_REVISION DEPLOYED_WEB_REVISION BASELINE_API_REVISION BASELINE_WEB_REVISION WATCHTOWER_RETIRED BACKUP_MODE; do
            value="$(sed -n "s/^${field}=//p" "$clean" | tail -1)"
            echo "$(printf '%s' "$field" | tr '[:upper:]' '[:lower:]')=${value:-unknown}" >> "$GITHUB_OUTPUT"
          done
          ((rc==0)) || exit "$rc"

      - name: Verify public routes and durable intake
        id: live
        if: steps.production.outputs.deployment_complete == '1'
        continue-on-error: true
        env:
          PC_LIVE_BASE: ${{ env.LIVE_BASE }}
          PC_LIVE_EVIDENCE_DIR: ${{ env.EVIDENCE_DIR }}/live
          PC_RELEASE_RUN_ID: ${{ github.run_id }}-${{ github.run_attempt }}
        shell: bash
        run: bash scripts/production-full-stack-live-acceptance.sh '${{ steps.target.outputs.sha }}' | tee "$EVIDENCE_DIR/live.log"

      - name: Verify PostgreSQL, audit and outbox evidence
        id: database
        if: steps.live.outcome == 'success'
        continue-on-error: true
        env:
          HOST: ${{ steps.ssh.outputs.host }}
          PORT: ${{ steps.ssh.outputs.port }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          request="$(sed -n 's/^LIVE_REQUEST_NUMBER=//p' "$EVIDENCE_DIR/live.log" | tail -1)"
          correlation="$(sed -n 's/^LIVE_CORRELATION_ID=//p' "$EVIDENCE_DIR/live.log" | tail -1)"
          [[ "$request" =~ ^PC-[0-9]{8}-[0-9A-F]{12}$ ]]
          [[ "$correlation" =~ ^[A-Za-z0-9._:-]{8,128}$ ]]
          ssh -i "$HOME/.ssh/id_pc_prod" -p "$PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER_SECRET@$HOST" \
            "/tmp/pc-full-stack-${GITHUB_RUN_ID}.sh verify-intake '$TARGET_SHA' '$GITHUB_RUN_ID' '$request' '$correlation'" \
            | tee "$EVIDENCE_DIR/durable-intake-db.log"
          grep -Fxq DURABLE_INTAKE_DB=PASS "$EVIDENCE_DIR/durable-intake-db.log"

      - name: Restore exact API/web images after acceptance failure
        if: steps.live.outcome == 'failure' || steps.database.outcome == 'failure'
        env:
          HOST: ${{ steps.ssh.outputs.host }}
          PORT: ${{ steps.ssh.outputs.port }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
        shell: bash
        run: |
          set -euo pipefail
          ssh -i "$HOME/.ssh/id_pc_prod" -p "$PORT" -o BatchMode=yes -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes "$SSH_USER_SECRET@$HOST" \
            "/tmp/pc-full-stack-${GITHUB_RUN_ID}.sh rollback '$TARGET_SHA' '$GITHUB_RUN_ID'" \
            | tee "$EVIDENCE_DIR/live-failure-rollback.log"

      - name: Publish release evidence
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET_SHA: ${{ steps.target.outputs.sha }}
          DEPLOYMENT_COMPLETE: ${{ steps.production.outputs.deployment_complete }}
          MIGRATION_COMPLETE: ${{ steps.production.outputs.migration_complete }}
          DEPLOYED_API_REVISION: ${{ steps.production.outputs.deployed_api_revision }}
          DEPLOYED_WEB_REVISION: ${{ steps.production.outputs.deployed_web_revision }}
          BASELINE_API_REVISION: ${{ steps.production.outputs.baseline_api_revision }}
          BASELINE_WEB_REVISION: ${{ steps.production.outputs.baseline_web_revision }}
          WATCHTOWER_RETIRED: ${{ steps.production.outputs.watchtower_retired }}
          BACKUP_MODE: ${{ steps.production.outputs.backup_mode }}
          LIVE_OUTCOME: ${{ steps.live.outcome }}
          DATABASE_OUTCOME: ${{ steps.database.outcome }}
        shell: bash
        run: |
          set -euo pipefail
          live="$(sed -n 's/^LIVE_ACCEPTANCE=//p' "$EVIDENCE_DIR/live.log" 2>/dev/null | tail -1 || true)"
          request="$(sed -n 's/^LIVE_REQUEST_NUMBER=//p' "$EVIDENCE_DIR/live.log" 2>/dev/null | tail -1 || true)"
          durable="$(sed -n 's/^DURABLE_INTAKE_DB=//p' "$EVIDENCE_DIR/durable-intake-db.log" 2>/dev/null | tail -1 || true)"
          audit_id="$(sed -n 's/^DURABLE_INTAKE_AUDIT_ID=//p' "$EVIDENCE_DIR/durable-intake-db.log" 2>/dev/null | tail -1 || true)"
          outbox_id="$(sed -n 's/^DURABLE_INTAKE_OUTBOX_ID=//p' "$EVIDENCE_DIR/durable-intake-db.log" 2>/dev/null | tail -1 || true)"
          rollback=not-required; [[ ! -f "$EVIDENCE_DIR/live-failure-rollback.log" ]] || rollback=attempted
          record="$EVIDENCE_DIR/issue-record.md"
          {
            echo "## Full-stack release run \`$GITHUB_RUN_ID\`"
            echo
            echo "- target SHA: \`${TARGET_SHA:-unknown}\`"
            echo "- backup: \`${BACKUP_MODE:-unknown}\`"
            echo "- migration complete: \`${MIGRATION_COMPLETE:-0}\`"
            echo "- deployment complete: \`${DEPLOYMENT_COMPLETE:-0}\`"
            echo "- API revision: \`${DEPLOYED_API_REVISION:-unknown}\`"
            echo "- web revision: \`${DEPLOYED_WEB_REVISION:-unknown}\`"
            echo "- live acceptance: \`${live:-${LIVE_OUTCOME:-skipped}}\`"
            echo "- durable intake DB/audit/outbox: \`${durable:-${DATABASE_OUTCOME:-skipped}}\`"
            echo "- live request number: \`${request:-none}\`"
            echo "- audit event: \`${audit_id:-none}\`"
            echo "- outbox entry: \`${outbox_id:-none}\`"
            echo "- baseline API: \`${BASELINE_API_REVISION:-unknown}\`"
            echo "- baseline web: \`${BASELINE_WEB_REVISION:-unknown}\`"
            echo "- rollback: \`$rollback\`"
            echo "- Watchtower retired: \`${WATCHTOWER_RETIRED:-0}\`"
          } > "$record"
          find "$EVIDENCE_DIR" -type f ! -name sha256.txt -print0 | sort -z | xargs -0 -r sha256sum > "$EVIDENCE_DIR/sha256.txt"
          gh issue comment "$RELEASE_ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --body-file "$record"
          if [[ "${DEPLOYMENT_COMPLETE:-0}" == 1 && "${MIGRATION_COMPLETE:-0}" == 1 && "$live" == PASS && "$durable" == PASS && "${DEPLOYED_API_REVISION:-}" == "$TARGET_SHA" && "${DEPLOYED_WEB_REVISION:-}" == "$TARGET_SHA" ]]; then
            gh issue close "$RELEASE_ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" --reason completed
          fi

      - name: Enforce production result
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          [[ '${{ steps.production.outputs.deployment_complete }}' == 1 ]]
          [[ '${{ steps.production.outputs.migration_complete }}' == 1 ]]
          [[ '${{ steps.live.outcome }}' == success ]]
          [[ '${{ steps.database.outcome }}' == success ]]

      - name: Upload release evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: production-full-stack-release-${{ github.run_id }}
          path: ${{ env.EVIDENCE_DIR }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
