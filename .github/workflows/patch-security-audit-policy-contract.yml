name: Patch Security Audit Policy Contract

on:
  push:
    branches:
      - agent/industrial-readiness-v1-security-gates-v2
    paths:
      - '.github/workflows/patch-security-audit-policy-contract.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/industrial-readiness-v1-security-gates-v2
          fetch-depth: 0
      - name: Govern isolated bulk-endpoint audit client
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('docs/platform-v7/autopilot/check-security-release-gate.mjs')
          text = path.read_text(encoding='utf-8')

          old_forbidden = "  [/apps\\/api\\/Dockerfile/g, 'workflow must build the canonical infra/docker/Dockerfile.api'],\n];"
          new_forbidden = "  [/apps\\/api\\/Dockerfile/g, 'workflow must build the canonical infra/docker/Dockerfile.api'],\n  [/--ignore-registry-errors\\b/g, 'dependency audit must fail closed on registry or scanner errors'],\n];"
          if old_forbidden not in text:
              raise SystemExit('Expected forbidden workflow policy anchor not found')
          text = text.replace(old_forbidden, new_forbidden, 1)

          old_required = "  'pnpm audit --prod --json',"
          new_required = "  \"AUDIT_PNPM_VERSION: '11.13.0'\",\n  'pnpm dlx pnpm@${AUDIT_PNPM_VERSION} audit --prod --json',"
          if old_required not in text:
              raise SystemExit('Expected legacy audit command contract not found')
          text = text.replace(old_required, new_required, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Remove one-time workflow and commit policy contract
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/patch-security-audit-policy-contract.yml
          git add docs/platform-v7/autopilot/check-security-release-gate.mjs
          git commit -m 'Govern isolated pnpm bulk audit client'
          git push origin HEAD:agent/industrial-readiness-v1-security-gates-v2
