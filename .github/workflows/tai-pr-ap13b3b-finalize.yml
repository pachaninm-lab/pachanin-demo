name: TAI AP-13B.3b Finalize

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-pr-ap13b3b-finalize.yml

permissions:
  actions: read
  contents: write

concurrency:
  group: tai-ap13b3b-finalize
  cancel-in-progress: false

jobs:
  finalize:
    if: >-
      github.event.pull_request.head.ref ==
      'agent/tai-ap-13b3b-v1-source-weight-fail-closed'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      AP13B3A_EXACT_MAIN: c2a5474befbff5583e654ada015d1e5319f4d6ea
      EXACT_PR_HEAD: ${{ github.event.pull_request.head.sha }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_PR_HEAD }}
          fetch-depth: 1

      - name: Enforce exact branch head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$EXACT_PR_HEAD"
          test "$GITHUB_HEAD_REF" = \
            'agent/tai-ap-13b3b-v1-source-weight-fail-closed'

      - name: Verify AP-13B.3a exact-main release attestation
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p /tmp/ap13b3a-exact-main
          run_id=''
          for attempt in $(seq 1 90); do
            gh api \
              -H 'Accept: application/vnd.github+json' \
              -H 'X-GitHub-Api-Version: 2022-11-28' \
              "/repos/${GITHUB_REPOSITORY}/actions/runs?head_sha=${AP13B3A_EXACT_MAIN}&per_page=100" \
              > /tmp/ap13b3a-exact-main/runs.json
            set +e
            run_id="$(python - <<'PY'
          import json
          import os
          from pathlib import Path

          exact = os.environ['AP13B3A_EXACT_MAIN']
          runs = json.loads(
              Path('/tmp/ap13b3a-exact-main/runs.json').read_text()
          ).get('workflow_runs', [])
          matching = [
              run
              for run in runs
              if run.get('name') == 'TAI Release Acceptance'
              and run.get('head_sha') == exact
          ]
          if not matching:
              raise SystemExit(3)
          run = max(
              matching,
              key=lambda item: (item.get('run_number', 0), item.get('id', 0)),
          )
          if run.get('status') != 'completed':
              raise SystemExit(3)
          if run.get('conclusion') != 'success':
              print(json.dumps(run, sort_keys=True))
              raise SystemExit(2)
          print(run['id'])
          PY
            )"
            status=$?
            set -e
            if [ "$status" -eq 0 ]; then
              break
            fi
            if [ "$status" -eq 2 ]; then
              echo 'AP-13B.3a exact-main release acceptance failed.' >&2
              exit 1
            fi
            if [ "$attempt" -eq 90 ]; then
              echo 'AP-13B.3a exact-main release acceptance did not complete.' >&2
              exit 1
            fi
            sleep 20
          done
          test -n "$run_id"
          printf '%s\n' "$run_id" > /tmp/ap13b3a-exact-main/release-run-id.txt
          gh run download "$run_id" \
            --repo "$GITHUB_REPOSITORY" \
            --name "tai-release-attestation-${AP13B3A_EXACT_MAIN}" \
            --dir /tmp/ap13b3a-exact-main/evidence
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          root = Path('/tmp/ap13b3a-exact-main/evidence')
          exact = os.environ['AP13B3A_EXACT_MAIN']
          attestation = json.loads(
              (root / 'tai-release-attestation.json').read_text()
          )
          if attestation.get('exact_main_sha') != exact:
              raise SystemExit('exact-main attestation SHA mismatch')
          if attestation.get('accepted') is not True:
              raise SystemExit('exact-main attestation is not accepted')
          if attestation.get('production_operational_status') != 'NOT_ATTESTED':
              raise SystemExit('operational maturity boundary was changed')
          workflow_evidence = json.loads(
              (root / 'workflow-evidence.json').read_text()
          )
          if not workflow_evidence:
              raise SystemExit('exact-main workflow evidence is empty')
          if any(item.get('exact_head_sha') != exact for item in workflow_evidence):
              raise SystemExit('workflow evidence contains another SHA')
          if any(item.get('conclusion') != 'success' for item in workflow_evidence):
              raise SystemExit('workflow evidence contains a non-success result')
          PY

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml

      - name: Install TAI development dependencies
        run: python -m pip install -e 'apps/tai[dev]'

      - name: Apply compatible v1 fail-closed fix
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          registry_path = Path('apps/tai/tai/model_artifact_registry.py')
          registry = registry_path.read_text(encoding='utf-8')
          old = '''def _verify_candidate_contract(
              candidate: ModelSourceCandidate,
              bundle: LocalModelArtifactBundle,
              reasons: list[str],
          ) -> None:
              if candidate.license_review_status is not LicenseReviewStatus.APPROVED:
          '''
          new = '''def _verify_candidate_contract(
              candidate: ModelSourceCandidate,
              bundle: LocalModelArtifactBundle,
              reasons: list[str],
          ) -> None:
              if candidate.weight_files:
                  reasons.append("SOURCE_WEIGHT_EVIDENCE_UNSUPPORTED_BY_V1")
              if candidate.license_review_status is not LicenseReviewStatus.APPROVED:
          '''
          if registry.count(old) != 1:
              raise SystemExit('registry verifier insertion point drifted')
          registry_path.write_text(registry.replace(old, new), encoding='utf-8')

          tests_path = Path('apps/tai/tests/test_model_artifact_registry.py')
          tests = tests_path.read_text(encoding='utf-8')
          replacements = {
              'def _registry_payload(*, approved: bool = True) -> dict[str, Any]:': (
                  'def _registry_payload(\n'
                  '    *,\n'
                  '    approved: bool = True,\n'
                  '    primary_weight_files: list[str] | None = None,\n'
                  ') -> dict[str, Any]:'
              ),
              '                "weight_files": ["sources/model-a/model.safetensors"],': (
                  '                "weight_files": (\n'
                  '                    primary_weight_files\n'
                  '                    if primary_weight_files is not None\n'
                  '                    else ["sources/model-a/model.safetensors"]\n'
                  '                ),'
              ),
              '    _write_json(registry_path, _registry_payload())\n    files = {': (
                  '    _write_json(\n'
                  '        registry_path,\n'
                  '        _registry_payload(primary_weight_files=[]),\n'
                  '    )\n'
                  '    files = {'
              ),
              '    assert all(item.revision in item.source_uri for item in registry.candidates)\n': (
                  '    assert all(item.revision in item.source_uri for item in registry.candidates)\n'
                  '    assert all(item.weight_files for item in registry.candidates)\n'
              ),
          }
          for old_text, new_text in replacements.items():
              if tests.count(old_text) != 1:
                  raise SystemExit(f'test replacement point drifted: {old_text!r}')
              tests = tests.replace(old_text, new_text)

          marker = '''def test_bundle_verification_fails_closed_on_digest_mismatch(tmp_path: Path) -> None:
          '''
          inserted = '''def test_v1_bundle_rejects_candidate_with_source_weights(
              tmp_path: Path,
          ) -> None:
              registry_path, bundle_path, bundle_root = _prepare_bundle(tmp_path)
              _write_json(registry_path, _registry_payload())

              report = verify_artifact_bundle(
                  registry=load_candidate_registry(registry_path),
                  bundle=load_artifact_bundle(bundle_path),
                  bundle_root=bundle_root,
              )

              assert report.status is BundleVerificationStatus.REJECTED
              assert report.reasons == (
                  "SOURCE_WEIGHT_EVIDENCE_UNSUPPORTED_BY_V1",
              )
              assert len(report.verified_files) == 4


          def test_cli_returns_two_for_v1_candidate_with_source_weights(
              tmp_path: Path,
          ) -> None:
              registry_path, bundle_path, bundle_root = _prepare_bundle(tmp_path)
              _write_json(registry_path, _registry_payload())
              output = tmp_path / "report.json"

              result = main(
                  [
                      "verify-bundle",
                      str(registry_path),
                      str(bundle_path),
                      str(bundle_root),
                      "--output",
                      str(output),
                  ]
              )
              payload = json.loads(output.read_text(encoding="utf-8"))

              assert result == 2
              assert payload["status"] == "REJECTED"
              assert payload["reasons"] == [
                  "SOURCE_WEIGHT_EVIDENCE_UNSUPPORTED_BY_V1"
              ]


          def test_bundle_verification_fails_closed_on_digest_mismatch(tmp_path: Path) -> None:
          '''
          if tests.count(marker) != 1:
              raise SystemExit('test insertion marker drifted')
          tests_path.write_text(tests.replace(marker, inserted), encoding='utf-8')

          readme_path = Path('apps/tai/model-artifacts/README.md')
          readme = readme_path.read_text(encoding='utf-8')
          old_readme = (
              'The v1 registry and verifier remain available for compatibility. '
              'They are not sufficient for AP-13B.3 acceptance because a v1 bundle '
              'does not declare or verify the source weight shards. AP-13B.3 uses '
              'the independent, stricter v2 contract:'
          )
          new_readme = (
              'The v1 registry and parser remain available for compatibility. '
              'The v1 verifier now fails closed with '
              '`SOURCE_WEIGHT_EVIDENCE_UNSUPPORTED_BY_V1` whenever the matched '
              'candidate declares `weight_files`; only legacy candidates with an '
              'explicitly empty `weight_files` set can retain v1 verification '
              'behavior. AP-13B.3 uses the independent, stricter v2 contract:'
          )
          if readme.count(old_readme) != 1:
              raise SystemExit('README replacement point drifted')
          readme_path.write_text(
              readme.replace(old_readme, new_readme),
              encoding='utf-8',
          )
          PY
          ruff format \
            apps/tai/tai/model_artifact_registry.py \
            apps/tai/tests/test_model_artifact_registry.py
          ruff check \
            apps/tai/tai/model_artifact_registry.py \
            apps/tai/tests/test_model_artifact_registry.py
          mypy --strict \
            apps/tai/tai/model_artifact_registry.py \
            apps/tai/tests/test_model_artifact_registry.py
          pytest -q apps/tai/tests/test_model_artifact_registry.py
          git diff --check

      - name: Remove helper material and commit atomically
        shell: bash
        run: |
          set -euo pipefail
          rm -f \
            .github/workflows/tai-pr-ap13b3b-finalize.yml \
            .coverage \
            .coverage.*
          rm -rf \
            .mypy_cache \
            .pytest_cache \
            .ruff_cache \
            apps/tai/.coverage \
            apps/tai/.mypy_cache \
            apps/tai/.pytest_cache \
            apps/tai/.ruff_cache \
            apps/tai/transparent_agro_intelligence.egg-info
          find apps/tai -type d -name __pycache__ -prune -exec rm -rf {} +
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          python - <<'PY'
          import subprocess

          expected = {
              '.github/workflows/tai-pr-ap13b3b-finalize.yml',
              'apps/tai/model-artifacts/README.md',
              'apps/tai/tai/model_artifact_registry.py',
              'apps/tai/tests/test_model_artifact_registry.py',
          }
          staged = set(
              subprocess.check_output(
                  ['git', 'diff', '--cached', '--name-only'],
                  text=True,
              ).splitlines()
          )
          if staged != expected:
              raise SystemExit(
                  f'unexpected staged paths: missing={sorted(expected - staged)}, '
                  f'extra={sorted(staged - expected)}'
              )
          PY
          git commit -m 'fix(tai): fail closed legacy bundles with source weights'
          git push origin HEAD:agent/tai-ap-13b3b-v1-source-weight-fail-closed

      - uses: actions/upload-artifact@v4
        with:
          name: tai-ap13b3a-exact-main-evidence-${{ env.AP13B3A_EXACT_MAIN }}
          path: /tmp/ap13b3a-exact-main
          if-no-files-found: error
          retention-days: 7
