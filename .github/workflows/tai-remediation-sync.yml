name: TAI remediation exact-main sync

on:
  push:
    branches:
      - agent/tai-ap-13c1d-remediation-2997
    paths:
      - .github/workflows/tai-remediation-sync.yml

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: agent/tai-ap-13c1d-remediation-2997
      - name: Merge exact main and restore governed scope
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_status=$?
          set -e
          if [ "$merge_status" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            unexpected="$(printf '%s\n' "$conflicts" | grep -v '^docs/platform-v7/autopilot/autopilot-state.json$' || true)"
            if [ -n "$unexpected" ]; then
              echo "Unexpected merge conflicts:"
              printf '%s\n' "$unexpected"
              exit 1
            fi
            git checkout --theirs docs/platform-v7/autopilot/autopilot-state.json
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          scope_path = Path('apps/tai/governance/scopes/ap-13c1d-remediation-2997.json')
          state = json.loads(state_path.read_text(encoding='utf-8'))
          scope = json.loads(scope_path.read_text(encoding='utf-8'))
          state.setdefault('approvedConcurrentScopes', {})[scope['branch']] = scope['allowed_paths']
          state_path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n', encoding='utf-8')
          PY
          rm -f .github/workflows/tai-remediation-sync.yml
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git commit -m "merge(tai): sync remediation with exact main"
          git push origin HEAD:agent/tai-ap-13c1d-remediation-2997
