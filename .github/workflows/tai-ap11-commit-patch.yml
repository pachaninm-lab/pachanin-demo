name: TAI AP-11 commit attestation hardening

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap11-commit-patch.yml'
      - 'apps/tai/ap11_apply_patch.py'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-11-release-acceptance'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply and syntax-check attestation hardening
        run: python apps/tai/ap11_apply_patch.py
      - name: Commit exact hardening and cleanup
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-11: validate application and production attestations'
          git push origin HEAD:tai/ap-11-release-acceptance
