name: TAI AP-13B.3b Diagnose

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-pr-ap13b3b-diagnose.yml

permissions:
  contents: read

jobs:
  diagnose:
    if: >-
      github.event.pull_request.head.ref ==
      'agent/tai-ap-13b3b-v1-source-weight-fail-closed'
    runs-on: ubuntu-24.04
    env:
      EXACT_PR_HEAD: ${{ github.event.pull_request.head.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.EXACT_PR_HEAD }}
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: apps/tai/pyproject.toml
      - name: Install dependencies quietly
        run: python -m pip install -q -e 'apps/tai[dev]'
      - name: Run isolated diagnostics
        shell: bash
        run: |
          set +e
          log=/tmp/ap13b3b-diagnostic.log
          : > "$log"
          python - <<'PY' >> "$log" 2>&1
          from pathlib import Path

          registry_path = Path('apps/tai/tai/model_artifact_registry.py')
          registry = registry_path.read_text(encoding='utf-8')
          old = '''def _verify_candidate_contract(
              candidate: ModelSourceCandidate,
              bundle: LocalModelArtifactBundle,
              reasons: list[str],
          ) -> None:
              if candidate.license_review_status is not LicenseReviewStatus.APPROVED:
          '''
          new = '''def _verify_candidate_contract(
              candidate: ModelSourceCandidate,
              bundle: LocalModelArtifactBundle,
              reasons: list[str],
          ) -> None:
              if candidate.weight_files:
                  reasons.append("SOURCE_WEIGHT_EVIDENCE_UNSUPPORTED_BY_V1")
              if candidate.license_review_status is not LicenseReviewStatus.APPROVED:
          '''
          print('registry_matches', registry.count(old))
          if registry.count(old) != 1:
              raise SystemExit('registry verifier insertion point drifted')
          registry_path.write_text(registry.replace(old, new), encoding='utf-8')

          tests_path = Path('apps/tai/tests/test_model_artifact_registry.py')
          tests = tests_path.read_text(encoding='utf-8')
          replacements = {
              'def _registry_payload(*, approved: bool = True) -> dict[str, Any]:': (
                  'def _registry_payload(\n'
                  '    *,\n'
                  '    approved: bool = True,\n'
                  '    primary_weight_files: list[str] | None = None,\n'
                  ') -> dict[str, Any]:'
              ),
              '                "weight_files": ["sources/model-a/model.safetensors"],': (
                  '                "weight_files": (\n'
                  '                    primary_weight_files\n'
                  '                    if primary_weight_files is not None\n'
                  '                    else ["sources/model-a/model.safetensors"]\n'
                  '                ),'
              ),
              '    _write_json(registry_path, _registry_payload())\n    files = {': (
                  '    _write_json(\n'
                  '        registry_path,\n'
                  '        _registry_payload(primary_weight_files=[]),\n'
                  '    )\n'
                  '    files = {'
              ),
              '    assert all(item.revision in item.source_uri for item in registry.candidates)\n': (
                  '    assert all(item.revision in item.source_uri for item in registry.candidates)\n'
                  '    assert all(item.weight_files for item in registry.candidates)\n'
              ),
          }
          for old_text, new_text in replacements.items():
              print('test_match', repr(old_text), tests.count(old_text))
              if tests.count(old_text) != 1:
                  raise SystemExit(f'test replacement point drifted: {old_text!r}')
              tests = tests.replace(old_text, new_text)
          marker = '''def test_bundle_verification_fails_closed_on_digest_mismatch(tmp_path: Path) -> None:
          '''
          inserted = '''def test_v1_bundle_rejects_candidate_with_source_weights(
              tmp_path: Path,
          ) -> None:
              registry_path, bundle_path, bundle_root = _prepare_bundle(tmp_path)
              _write_json(registry_path, _registry_payload())
              report = verify_artifact_bundle(
                  registry=load_candidate_registry(registry_path),
                  bundle=load_artifact_bundle(bundle_path),
                  bundle_root=bundle_root,
              )
              assert report.status is BundleVerificationStatus.REJECTED
              assert report.reasons == (
                  "SOURCE_WEIGHT_EVIDENCE_UNSUPPORTED_BY_V1",
              )
              assert len(report.verified_files) == 4


          def test_cli_returns_two_for_v1_candidate_with_source_weights(
              tmp_path: Path,
          ) -> None:
              registry_path, bundle_path, bundle_root = _prepare_bundle(tmp_path)
              _write_json(registry_path, _registry_payload())
              output = tmp_path / "report.json"
              result = main(
                  [
                      "verify-bundle",
                      str(registry_path),
                      str(bundle_path),
                      str(bundle_root),
                      "--output",
                      str(output),
                  ]
              )
              payload = json.loads(output.read_text(encoding="utf-8"))
              assert result == 2
              assert payload["status"] == "REJECTED"
              assert payload["reasons"] == [
                  "SOURCE_WEIGHT_EVIDENCE_UNSUPPORTED_BY_V1"
              ]


          def test_bundle_verification_fails_closed_on_digest_mismatch(tmp_path: Path) -> None:
          '''
          print('marker_matches', tests.count(marker))
          if tests.count(marker) != 1:
              raise SystemExit('test insertion marker drifted')
          tests_path.write_text(tests.replace(marker, inserted), encoding='utf-8')

          readme_path = Path('apps/tai/model-artifacts/README.md')
          readme = readme_path.read_text(encoding='utf-8')
          old_readme = (
              'The v1 registry and verifier remain available for compatibility. '
              'They are not sufficient for AP-13B.3 acceptance because a v1 bundle '
              'does not declare or verify the source weight shards. AP-13B.3 uses '
              'the independent, stricter v2 contract:'
          )
          new_readme = (
              'The v1 registry and parser remain available for compatibility. '
              'The v1 verifier now fails closed with '
              '`SOURCE_WEIGHT_EVIDENCE_UNSUPPORTED_BY_V1` whenever the matched '
              'candidate declares `weight_files`; only legacy candidates with an '
              'explicitly empty `weight_files` set can retain v1 verification '
              'behavior. AP-13B.3 uses the independent, stricter v2 contract:'
          )
          print('readme_matches', readme.count(old_readme))
          if readme.count(old_readme) != 1:
              raise SystemExit('README replacement point drifted')
          readme_path.write_text(readme.replace(old_readme, new_readme), encoding='utf-8')
          print('PATCH_PASS')
          PY
          patch_status=$?
          echo "PATCH_STATUS=$patch_status" >> "$log"
          if [ "$patch_status" -eq 0 ]; then
            ruff format apps/tai/tai/model_artifact_registry.py apps/tai/tests/test_model_artifact_registry.py >> "$log" 2>&1
            echo "RUFF_FORMAT_STATUS=$?" >> "$log"
            ruff check apps/tai/tai/model_artifact_registry.py apps/tai/tests/test_model_artifact_registry.py >> "$log" 2>&1
            echo "RUFF_CHECK_STATUS=$?" >> "$log"
            mypy --strict apps/tai/tai/model_artifact_registry.py apps/tai/tests/test_model_artifact_registry.py >> "$log" 2>&1
            echo "MYPY_STATUS=$?" >> "$log"
            pytest -q apps/tai/tests/test_model_artifact_registry.py >> "$log" 2>&1
            echo "PYTEST_STATUS=$?" >> "$log"
            git diff --check >> "$log" 2>&1
            echo "DIFF_CHECK_STATUS=$?" >> "$log"
          fi
          cat "$log"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: tai-ap13b3b-diagnostic-${{ env.EXACT_PR_HEAD }}
          path: /tmp/ap13b3b-diagnostic.log
          if-no-files-found: error
          retention-days: 1
