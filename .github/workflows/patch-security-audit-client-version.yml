name: Patch Security Audit Client Version

on:
  push:
    branches:
      - agent/industrial-readiness-v1-security-gates-v2
    paths:
      - '.github/workflows/patch-security-audit-client-version.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/industrial-readiness-v1-security-gates-v2
          fetch-depth: 0
      - name: Pin first published bulk-endpoint audit client
        run: |
          python3 - <<'PY'
          from pathlib import Path

          for name in [
              '.github/workflows/security-quality-gate.yml',
              'docs/platform-v7/autopilot/check-security-release-gate.mjs',
          ]:
              path = Path(name)
              text = path.read_text(encoding='utf-8')
              if '11.13.0' not in text:
                  raise SystemExit(f'Expected old audit client pin not found in {name}')
              path.write_text(text.replace('11.13.0', '11.0.0-rc.2'), encoding='utf-8')
          PY
      - name: Remove one-time workflow and commit audit client pin
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/patch-security-audit-client-version.yml
          git add .github/workflows/security-quality-gate.yml docs/platform-v7/autopilot/check-security-release-gate.mjs
          git commit -m 'Pin published pnpm bulk audit client'
          git push origin HEAD:agent/industrial-readiness-v1-security-gates-v2
