name: TAI AP-13C-D Ruff Fix

on:
  pull_request:
    branches: [main]
    paths:
      - .github/workflows/tai-ap13cd-ruff-fix.yml

permissions:
  contents: write

jobs:
  fix:
    if: >-
      github.actor == github.repository_owner &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      github.head_ref == 'agent/tai-ap-13cd-benchmark-admission-v2'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout writable pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply exact Ruff fix and self-remove
        shell: bash
        run: |
          set -euo pipefail
          target='apps/tai/tai/model_benchmark_admission_v2.py'
          python - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tai/model_benchmark_admission_v2.py')
          text = path.read_text(encoding='utf-8')
          old_import = 'from datetime import datetime, timedelta, timezone'
          new_import = 'from datetime import UTC, datetime, timedelta'
          if old_import not in text:
              raise SystemExit('expected datetime import not found')
          text = text.replace(old_import, new_import, 1)
          if 'astimezone(timezone.utc)' not in text:
              raise SystemExit('expected timezone.utc usage not found')
          text = text.replace('astimezone(timezone.utc)', 'astimezone(UTC)', 1)
          path.write_text(text, encoding='utf-8')
          PY

          python -m py_compile "$target"
          python -m pip install --quiet ruff==0.12.7
          ruff check "$target"

          rm -f .github/workflows/tai-ap13cd-ruff-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'TAI AP-13C-D: satisfy Ruff UTC rule'
          git push origin "HEAD:${{ github.head_ref }}"
