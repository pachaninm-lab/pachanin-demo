name: Patch auction E2E scope

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/patch-auction-e2e-scope.yml'

permissions:
  contents: write

jobs:
  patch-and-clean:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Scope auction E2E to dedicated restricted-principal gate
        shell: bash
        run: |
          set -euo pipefail
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git fetch origin agent/ir-auction-atomic-execution
          git checkout agent/ir-auction-atomic-execution
          python <<'PY'
          from pathlib import Path

          path = Path('apps/api/test/industrial/auction-atomic-execution.e2e-spec.ts')
          source = path.read_text()
          old = "describe('IR-AUCTION atomic execution', () => {"
          new = "const describeAuctionAtomic = ADMIN_URL && APP_URL ? describe : describe.skip;\n\ndescribeAuctionAtomic('IR-AUCTION atomic execution', () => {"
          if old not in source:
              raise SystemExit('auction E2E describe fragment not found')
          if 'const describeAuctionAtomic' in source:
              raise SystemExit('auction E2E scope already patched')
          path.write_text(source.replace(old, new, 1))
          PY
          git add apps/api/test/industrial/auction-atomic-execution.e2e-spec.ts
          git commit -m 'Scope auction E2E to restricted-principal gate'
          git push origin HEAD:agent/ir-auction-atomic-execution
      - name: Remove temporary workflow from main
        shell: bash
        run: |
          set -euo pipefail
          git checkout main
          git pull --ff-only origin main
          git rm .github/workflows/patch-auction-e2e-scope.yml
          git commit -m 'Remove auction E2E scope patch workflow'
          git push origin HEAD:main
