name: apply public prefetch fix 2323

on:
  pull_request:
    branches:
      - fix/public-auth-server-authority

permissions:
  contents: write

jobs:
  patch-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: fix/public-auth-server-authority
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Disable speculative RSC prefetch on public entry links
        run: |
          python - <<'PY'
          import re
          from pathlib import Path

          files = [
              Path('apps/web/app/platform-v7/page.tsx'),
              Path('apps/web/app/platform-v7/login/page.tsx'),
              Path('apps/web/app/platform-v7/forgot-password/page.tsx'),
          ]
          changed = False
          pattern = re.compile(r'<Link(?![^>]*\bprefetch=)\s')
          for file in files:
              text = file.read_text()
              patched, count = pattern.subn('<Link prefetch={false} ', text)
              if count:
                  file.write_text(patched)
                  changed = True
                  print(f'{file}: disabled {count} prefetch links')
              elif '<Link ' in text and 'prefetch={false}' not in text:
                  raise SystemExit(f'{file}: Link elements found but patch did not match')
          print('changed=' + str(changed).lower())
          PY
      - name: Commit implementation fix when needed
        run: |
          if git diff --quiet; then
            echo 'Implementation branch is already patched.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web/app/platform-v7/page.tsx apps/web/app/platform-v7/login/page.tsx apps/web/app/platform-v7/forgot-password/page.tsx
          git commit -m 'fix(web): disable speculative public RSC prefetch'
          git push origin HEAD:fix/public-auth-server-authority
