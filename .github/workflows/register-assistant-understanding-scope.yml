name: register assistant understanding scope

on:
  push:
    branches:
      - feat/assistant-universal-understanding

permissions:
  contents: write

jobs:
  register:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Register source-controlled scope and remove bootstrap workflow
        run: |
          python3 <<'PY'
          from pathlib import Path
          path = Path('scripts/p7-autopilot-guard.sh')
          text = path.read_text()
          old = "  'ir/k8s-production-like-2659': 'docs/platform-v7/autopilot/scopes/ir-k8s-production-like-2659.json',\n"
          new = old + "  'feat/assistant-universal-understanding': 'docs/platform-v7/autopilot/scopes/feat-assistant-universal-understanding.json',\n"
          if new not in text:
              if old not in text:
                  raise SystemExit('scope manifest map anchor not found')
              text = text.replace(old, new, 1)
              path.write_text(text)
          workflow = Path('.github/workflows/register-assistant-understanding-scope.yml')
          workflow.unlink()
          PY
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/p7-autopilot-guard.sh .github/workflows/register-assistant-understanding-scope.yml
          git commit -m "Register universal assistant understanding scope"
          git push origin HEAD:feat/assistant-universal-understanding
