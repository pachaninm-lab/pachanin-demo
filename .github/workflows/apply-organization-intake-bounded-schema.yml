name: Apply organization intake bounded-schema remediation

on:
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [main]
    paths:
      - '.github/workflows/apply-organization-intake-bounded-schema.yml'

permissions:
  contents: write

concurrency:
  group: apply-organization-intake-bounded-schema
  cancel-in-progress: false

jobs:
  apply:
    if: github.head_ref == 'fix/organization-intake-bounded-schema'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/organization-intake-bounded-schema
          fetch-depth: 0

      - name: Bind runtime, tests and governance to bounded schema
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          from pathlib import Path

          service = Path('apps/api/src/modules/organization-intake/organization-intake.service.ts')
          text = service.read_text()
          text = text.replace('public.lookup_public_organization_connection_request', 'organization_intake.lookup_request')
          text = text.replace('public.create_public_organization_connection_request', 'organization_intake.create_request')
          if 'organization_intake.lookup_request' not in text or 'organization_intake.create_request' not in text:
              raise SystemExit('service authority replacement failed')
          service.write_text(text)

          e2e = Path('apps/api/test/industrial/organization-intake-postgresql.e2e-spec.ts')
          text = e2e.read_text()
          text = text.replace('public.public_organization_connection_requests', 'organization_intake.requests')
          text = text.replace(
              'GRANT USAGE ON SCHEMA public, security TO app_deal;',
              'GRANT USAGE ON SCHEMA public, security, organization_intake TO app_deal;',
          )
          text = text.replace('public.lookup_public_organization_connection_request', 'organization_intake.lookup_request')
          text = text.replace('public.create_public_organization_connection_request', 'organization_intake.create_request')
          text = text.replace(
              "WHERE table_schema = 'public'\n        AND table_name = 'public_organization_connection_requests'",
              "WHERE table_schema = 'organization_intake'\n        AND table_name = 'requests'",
          )
          for required in ['FROM organization_intake.requests', 'organization_intake.lookup_request', "table_schema = 'organization_intake'"]:
              if required not in text:
                  raise SystemExit(f'E2E replacement failed: {required}')
          e2e.write_text(text)

          unit = Path('apps/web/tests/unit/platformV7OrganizationConnectIntake.test.ts')
          text = unit.read_text()
          old_migration = "const migration = read('../api/prisma/migrations/20260723113000_public_organization_connection_intake/migration.sql');"
          new_migration = "const migration = [\n  read('../api/prisma/migrations/20260723113000_public_organization_connection_intake/migration.sql'),\n  read('../api/prisma/migrations/20260723121000_organization_intake_bounded_schema/migration.sql'),\n].join('\\n');"
          if old_migration not in text:
              raise SystemExit('unit migration anchor missing')
          text = text.replace(old_migration, new_migration)
          text = text.replace("expect(apiService).toContain('lookup_public_organization_connection_request');", "expect(apiService).toContain('organization_intake.lookup_request');")
          text = text.replace("expect(apiService).toContain('create_public_organization_connection_request');", "expect(apiService).toContain('organization_intake.create_request');")
          text = text.replace("expect(migration).toContain('INSERT INTO public.public_organization_connection_requests');", "expect(migration).toContain('INSERT INTO organization_intake.requests');")
          text = text.replace("expect(migration).toContain('REVOKE ALL ON FUNCTION public.create_public_organization_connection_request');", "expect(migration).toContain('REVOKE ALL ON FUNCTION organization_intake.create_request');")
          text = text.replace("expect(migration).toContain('GRANT EXECUTE ON FUNCTION public.create_public_organization_connection_request');", "expect(migration).toContain('GRANT EXECUTE ON FUNCTION organization_intake.create_request');")
          unit.write_text(text)

          branch = 'fix/organization-intake-bounded-schema'
          manifest_path = 'docs/platform-v7/autopilot/scopes/organization-intake-bounded-schema-remediation.json'
          manifest = json.loads(Path(manifest_path).read_text())
          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(state_path.read_text())
          state.setdefault('approvedConcurrentScopes', {})[branch] = manifest['allowedPaths']
          state_path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n')
          PY

          grep -Fq 'organization_intake.create_request' apps/api/src/modules/organization-intake/organization-intake.service.ts
          grep -Fq 'FROM organization_intake.requests' apps/api/test/industrial/organization-intake-postgresql.e2e-spec.ts
          grep -Fq '20260723121000_organization_intake_bounded_schema' apps/web/tests/unit/platformV7OrganizationConnectIntake.test.ts
          git rm .github/workflows/apply-organization-intake-bounded-schema.yml

      - name: Commit remediation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(intake): bind runtime to bounded PostgreSQL schema'
          git push origin HEAD:fix/organization-intake-bounded-schema
