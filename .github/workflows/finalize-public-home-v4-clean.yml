name: Assemble clean Public Homepage V4

on:
  push:
    branches:
      - agent/public-home-v4-verified-0715
    paths:
      - .github/workflows/finalize-public-home-v4-clean.yml

permissions:
  contents: write

jobs:
  assemble:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-home-v4-verified-0715
          fetch-depth: 0
      - name: Restore reviewed public homepage files
        shell: bash
        run: |
          git checkout fbbd3703dd206c1478cd0bb71235d8cdeadf3ed5 -- \
            apps/web/app/platform-v7/how-it-works/page.tsx \
            apps/web/app/platform-v7/page.tsx \
            apps/web/components/platform-v7/PublicDealEntryGate.tsx \
            apps/web/components/platform-v7/PublicDealExplorerV4.tsx \
            apps/web/components/platform-v7/PublicDealPreview.tsx \
            apps/web/i18n/public-product-experience-v4.ts \
            apps/web/styles/platform-v7-public-product-entry-variants.css \
            apps/web/styles/platform-v7-public-product-experience-v4.css \
            apps/web/tests/e2e/platform-v7-public-experience-v4.spec.ts \
            apps/web/tests/e2e/platform-v7-public-product-experience-v3.spec.ts \
            apps/web/tests/unit/platformV7PublicExperienceV4.test.ts \
            apps/web/tests/unit/platformV7RootWorkEntry.test.ts
      - name: Register exact concurrent scope
        shell: bash
        run: |
          node <<'NODE'
          const fs = require('node:fs');
          const path = 'docs/platform-v7/autopilot/autopilot-state.json';
          const state = JSON.parse(fs.readFileSync(path, 'utf8'));
          const branch = 'agent/public-home-v4-verified-0715';
          state.approvedConcurrentScopes ||= {};
          state.approvedConcurrentScopes[branch] = [
            'apps/web/app/platform-v7/how-it-works/page.tsx',
            'apps/web/app/platform-v7/page.tsx',
            'apps/web/components/platform-v7/PublicDealEntryGate.tsx',
            'apps/web/components/platform-v7/PublicDealExplorerV4.tsx',
            'apps/web/components/platform-v7/PublicDealPreview.tsx',
            'apps/web/i18n/public-product-experience-v4.ts',
            'apps/web/styles/platform-v7-public-product-entry-variants.css',
            'apps/web/styles/platform-v7-public-product-experience-v4.css',
            'apps/web/tests/e2e/platform-v7-public-experience-v4.spec.ts',
            'apps/web/tests/e2e/platform-v7-public-product-experience-v3.spec.ts',
            'apps/web/tests/unit/platformV7PublicExperienceV4.test.ts',
            'apps/web/tests/unit/platformV7RootWorkEntry.test.ts',
            'docs/platform-v7/autopilot/autopilot-state.json'
          ].sort();
          fs.writeFileSync(path, `${JSON.stringify(state)}\n`);
          NODE
      - name: Remove one-shot assembler
        run: rm .github/workflows/finalize-public-home-v4-clean.yml
      - name: Commit clean slice
        shell: bash
        run: |
          git diff --check
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web docs/platform-v7/autopilot/autopilot-state.json .github/workflows/finalize-public-home-v4-clean.yml
          git commit -m 'Assemble clean verified Public Homepage V4 slice'
          git push origin HEAD:agent/public-home-v4-verified-0715
