name: Patch Security Audit Bulk Endpoint

on:
  push:
    branches:
      - agent/security-audit-bulk-endpoint
    paths:
      - '.github/workflows/patch-security-audit-bulk-endpoint.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/security-audit-bulk-endpoint
          fetch-depth: 0
      - name: Move dependency audit to supported pnpm bulk endpoint client
        run: |
          python3 - <<'PY'
          from pathlib import Path

          workflow_path = Path('.github/workflows/security-quality-gate.yml')
          workflow = workflow_path.read_text(encoding='utf-8')
          old = "  PNPM_VERSION: '10.2.1'"
          new = "  PNPM_VERSION: '11.13.0'"
          if old not in workflow:
              raise SystemExit('Expected pnpm security scanner pin not found')
          workflow_path.write_text(workflow.replace(old, new, 1), encoding='utf-8')

          guard_path = Path('scripts/p7-autopilot-guard.sh')
          guard = guard_path.read_text(encoding='utf-8')
          anchor = "TRANSITIVE_RUNTIME_REMEDIATION_SCOPE='package.json\npnpm-lock.yaml\ndocs/platform-v7/autopilot/security-exceptions.json\nscripts/p7-autopilot-guard.sh'"
          addition = anchor + "\n\nSECURITY_AUDIT_ENDPOINT_SCOPE='.github/workflows/security-quality-gate.yml\nscripts/p7-autopilot-guard.sh'"
          if anchor not in guard:
              raise SystemExit('Expected security scope anchor not found')
          guard = guard.replace(anchor, addition, 1)

          conditional_anchor = "if [ \"${GITHUB_HEAD_REF:-}\" = \"agent/ir-sec-transitive-runtime-remediation\" ]; then\n  ALLOWED_CURRENT=$(printf '%s\\n%s\\n' \"$ALLOWED_CURRENT\" \"$TRANSITIVE_RUNTIME_REMEDIATION_SCOPE\")\nfi"
          conditional_addition = conditional_anchor + "\n\nif [ \"${GITHUB_HEAD_REF:-}\" = \"agent/security-audit-bulk-endpoint\" ]; then\n  ALLOWED_CURRENT=$(printf '%s\\n%s\\n' \"$ALLOWED_CURRENT\" \"$SECURITY_AUDIT_ENDPOINT_SCOPE\")\nfi"
          if conditional_anchor not in guard:
              raise SystemExit('Expected remediation branch conditional not found')
          guard_path.write_text(guard.replace(conditional_anchor, conditional_addition, 1), encoding='utf-8')
          PY
      - name: Remove one-time patch workflow and commit
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git rm .github/workflows/patch-security-audit-bulk-endpoint.yml
          git add .github/workflows/security-quality-gate.yml scripts/p7-autopilot-guard.sh
          git commit -m 'Use pnpm bulk advisory endpoint in security gate'
          git push origin HEAD:agent/security-audit-bulk-endpoint
