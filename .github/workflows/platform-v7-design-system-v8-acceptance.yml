name: Patch Public Product Experience Security Scanner Scope

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: patch-public-product-security-scope-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-exact-scope:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/public-product-experience-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-product-experience-v3
          fetch-depth: 0
      - name: Add only the supported audit transport files to branch scope
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(path.read_text(encoding='utf-8'))
          branch = 'agent/public-product-experience-v3'
          scope = state.setdefault('approvedConcurrentScopes', {}).setdefault(branch, [])
          required = [
              '.github/workflows/security-quality-gate.yml',
              'docs/platform-v7/autopilot/collect-npm-bulk-audit.mjs',
          ]
          for item in required:
              if item not in scope:
                  scope.append(item)
          scope.sort()
          path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')), encoding='utf-8')
          PY
      - name: Restore the accepted browser matrix and commit governed scope
        run: |
          git show a1fd0a07ee31826705a77bde5542543f6c021868:.github/workflows/platform-v7-design-system-v8-acceptance.yml > .github/workflows/platform-v7-design-system-v8-acceptance.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json .github/workflows/platform-v7-design-system-v8-acceptance.yml
          git commit -m 'Approve exact npm bulk audit transport scope'
          git push origin HEAD:agent/public-product-experience-v3
