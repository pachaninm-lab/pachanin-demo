name: Patch Public Product Experience Security Policy Scope

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: patch-public-product-security-policy-scope-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-exact-scope:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/public-product-experience-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/public-product-experience-v3
          fetch-depth: 0
      - name: Add only the security policy validator to branch scope
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path

          path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(path.read_text(encoding='utf-8'))
          branch = 'agent/public-product-experience-v3'
          scope = state.setdefault('approvedConcurrentScopes', {}).setdefault(branch, [])
          required = 'docs/platform-v7/autopilot/check-security-release-gate.mjs'
          if required not in scope:
              scope.append(required)
          scope.sort()
          path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')), encoding='utf-8')
          PY
      - name: Commit governed scope only
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'Approve exact security policy validator scope'
          git pull --rebase origin agent/public-product-experience-v3
          git push origin HEAD:agent/public-product-experience-v3
