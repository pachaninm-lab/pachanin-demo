name: Patch Public Product Experience Security Policy Scope

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: patch-public-product-security-policy-scope-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-exact-scope:
    if: github.event_name == 'pull_request' && github.head_ref == 'agent/public-product-experience-v3'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Atomically approve the exact security policy validator path
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          BRANCH: agent/public-product-experience-v3
        run: |
          python3 - <<'PY'
          import base64
          import json
          import os
          import time
          import urllib.error
          import urllib.parse
          import urllib.request

          repository = os.environ['REPOSITORY']
          branch = os.environ['BRANCH']
          token = os.environ['GITHUB_TOKEN']
          path = 'docs/platform-v7/autopilot/autopilot-state.json'
          required = 'docs/platform-v7/autopilot/check-security-release-gate.mjs'
          api = f'https://api.github.com/repos/{repository}/contents/{path}'
          headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
              'User-Agent': 'transparent-price-governance-patch',
          }

          def request(method, url, payload=None):
              data = None if payload is None else json.dumps(payload).encode('utf-8')
              req = urllib.request.Request(url, data=data, method=method, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as response:
                  return json.loads(response.read().decode('utf-8'))

          for attempt in range(1, 6):
              current = request('GET', f'{api}?ref={urllib.parse.quote(branch, safe="")}')
              state = json.loads(base64.b64decode(current['content']).decode('utf-8'))
              scope = state.setdefault('approvedConcurrentScopes', {}).setdefault(branch, [])
              if required in scope:
                  print('Security policy validator path is already approved.')
                  break
              scope.append(required)
              scope.sort()
              content = json.dumps(state, ensure_ascii=False, separators=(',', ':')).encode('utf-8')
              payload = {
                  'message': 'Approve exact security policy validator scope',
                  'content': base64.b64encode(content).decode('ascii'),
                  'sha': current['sha'],
                  'branch': branch,
              }
              try:
                  result = request('PUT', api, payload)
                  print(f"Governance state updated at {result['commit']['sha']}")
                  break
              except urllib.error.HTTPError as error:
                  if error.code != 409 or attempt == 5:
                      raise
                  time.sleep(attempt)
          else:
              raise SystemExit('Governance state update exhausted retries.')
          PY
