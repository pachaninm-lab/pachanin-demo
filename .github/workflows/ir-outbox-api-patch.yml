name: IR Outbox API Patch

on:
  push:
    branches:
      - agent/ir-outbox-postgresql-authority-v2

permissions:
  contents: write

jobs:
  patch-api:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/ir-outbox-postgresql-authority-v2
          fetch-depth: 0
      - name: Patch call sites and admin API
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          action = Path('apps/api/src/common/action-executor/action-executor.service.ts')
          text = action.read_text()
          old = '      const entry = this.outbox.enqueue({\n'
          new = '      const entry = await this.outbox.enqueue({\n'
          if text.count(old) != 1:
              raise SystemExit(f'action executor enqueue match count={text.count(old)}')
          action.write_text(text.replace(old, new))

          admin = Path('apps/api/src/modules/admin/admin.controller.ts')
          text = admin.read_text()
          replacements = [
            (
              "import { Body, Controller, Get, NotFoundException, Param, Patch, Post, UseGuards } from '@nestjs/common';",
              "import { BadRequestException, Body, Controller, Get, NotFoundException, Param, Patch, Post, UseGuards } from '@nestjs/common';",
            ),
            (
              "import { Role } from '../../common/types/request-user';",
              "import { RequestUser, Role } from '../../common/types/request-user';\nimport { CurrentUser } from '../../common/decorators/current-user.decorator';",
            ),
            (
'''  @Get('outbox')
  outboxStatus() {
    const entries = this.outbox.list();
    return {
      total: entries.length,
      pending: entries.filter(e => e.status === 'PENDING').length,
      sent: entries.filter(e => e.status === 'SENT').length,
      confirmed: entries.filter(e => e.status === 'CONFIRMED').length,
      failed: entries.filter(e => e.status === 'FAILED').length,
      dead: entries.filter(e => e.status === 'DEAD').length,
      manualReview: entries.filter(e => e.status === 'MANUAL_REVIEW').length,
      recentEntries: entries.slice(0, 50),
    };
  }

  @Post('outbox/:id/requeue')
  requeueOutbox(@Param('id') id: string) {
    return this.outbox.requeue(id);
  }
''',
'''  @Get('outbox')
  async outboxStatus() {
    const [stats, recentEntries] = await Promise.all([
      this.outbox.queueStats(),
      this.outbox.list(50),
    ]);
    return { ...stats, recentEntries };
  }

  @Post('outbox/:id/requeue')
  async requeueOutbox(
    @Param('id') id: string,
    @Body() body: { reason: string; idempotencyKey: string },
    @CurrentUser() user: RequestUser,
  ) {
    try {
      return await this.outbox.redrive({
        entryId: id,
        actorUserId: user.id,
        reason: body.reason,
        idempotencyKey: body.idempotencyKey,
      });
    } catch (error) {
      const message = error instanceof Error ? error.message : String(error);
      if (message.includes('not found')) throw new NotFoundException(message);
      throw new BadRequestException(message);
    }
  }
''',
            ),
            (
'''    const outboxStats = {
      pending: this.outbox.listPending().length,
      dead: this.outbox.listDead().length,
    };
''',
'''    const queueStats = await this.outbox.queueStats();
    const outboxStats = {
      pending: queueStats.pending,
      processing: queueStats.processing,
      deadLetter: queueStats.deadLetter,
    };
''',
            ),
            (
"      status: outboxStats.dead > 10 ? 'degraded' : 'ok',",
"      status: outboxStats.deadLetter > 10 ? 'degraded' : 'ok',",
            ),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'admin replacement not unique: {old[:80]!r}, count={text.count(old)}')
              text = text.replace(old, new)
          admin.write_text(text)
          PY
          git rm .github/workflows/ir-outbox-api-patch.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/api/src/common/action-executor/action-executor.service.ts apps/api/src/modules/admin/admin.controller.ts
          git commit -m "IR-OUTBOX: make action, admin and health callers durable"
          git push origin HEAD:agent/ir-outbox-postgresql-authority-v2
