name: export main source 2318

on:
  push:
    branches:
      - ops/export-main-source-2318
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Pack source
        run: tar --exclude=.git --exclude=node_modules -czf /tmp/pachanin-demo-main-2318.tar.gz .
      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: pachanin-demo-main-2318
          path: /tmp/pachanin-demo-main-2318.tar.gz
          if-no-files-found: error
          retention-days: 1
