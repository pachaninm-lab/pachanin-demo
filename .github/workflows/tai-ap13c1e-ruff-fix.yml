name: TAI AP-13C.1e Ruff Fix

on:
  push:
    branches:
      - agent/tai-ap-13c1e-cpu-benchmark-finalization
    paths:
      - '.github/workflows/tai-ap13c1e-ruff-fix.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/tai-ap-13c1e-cpu-benchmark-finalization
          fetch-depth: 0
      - name: Apply exact Ruff corrections and self-delete
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path

          path = Path('apps/tai/tai/cpu_benchmark_finalization.py')
          text = path.read_text(encoding='utf-8')
          old = '            raise FinalizationError(f"Mistral benchmark runtime projection mismatch: {candidate_field}")'
          new = '''            raise FinalizationError(
                "Mistral benchmark runtime projection mismatch: "
                f"{candidate_field}"
            )'''
          if text.count(old) != 1:
              raise SystemExit('long projection line not found exactly once')
          path.write_text(text.replace(old, new), encoding='utf-8')

          fixture = Path('apps/tai/tests/cpu_benchmark_finalization_fixtures.py')
          text = fixture.read_text(encoding='utf-8')
          text = text.replace('from quality_scoring_fixtures import NOW as QUALITY_NOW\n', '')
          text = text.replace(
              'from test_model_benchmark_admission_v2 import BUNDLE_AUTHORITY\n'
              'from test_model_benchmark_admission_v2 import _create_manifest, _sha, _write_json\n',
              'from test_model_benchmark_admission_v2 import (\n'
              '    BUNDLE_AUTHORITY,\n'
              '    _create_manifest,\n'
              '    _sha,\n'
              '    _write_json,\n'
              ')\n',
          )
          text = text.replace('    EXPECTED_MATURITY,\n', '')
          fixture.write_text(text, encoding='utf-8')
          PY
          rm .github/workflows/tai-ap13c1e-ruff-fix.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add apps/tai/tai/cpu_benchmark_finalization.py \
            apps/tai/tests/cpu_benchmark_finalization_fixtures.py \
            .github/workflows/tai-ap13c1e-ruff-fix.yml
          git commit -m 'style(tai): satisfy AP-13C.1e Ruff gate'
          git push origin HEAD:agent/tai-ap-13c1e-cpu-benchmark-finalization
