name: apply evidence preview filter

on:
  pull_request:
    branches:
      - fix/public-auth-server-authority

permissions:
  contents: write

jobs:
  patch-evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ops/public-entry-preview-smoke-2323
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Ignore only Netlify preview toolbar failed requests
        run: |
          python - <<'PY'
          from pathlib import Path
          file = Path('apps/web/scripts/public-entry-preview-smoke-2323.mjs')
          text = file.read_text()
          old = "if (!url.startsWith('data:') && !url.includes('/favicon.ico') && !isCancelledRscNavigation(url, errorText)) {"
          new = "if (!url.startsWith('data:') && !url.includes('/favicon.ico') && !isNetlifyPreviewNoise(url) && !isCancelledRscNavigation(url, errorText)) {"
          if old in text:
              file.write_text(text.replace(old, new))
          elif new not in text:
              raise SystemExit('Expected failed-request filter was not found')
          PY
      - name: Commit when changed
        run: |
          if git diff --quiet; then
            echo 'Evidence filter already applied.'
            exit 0
          fi
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add apps/web/scripts/public-entry-preview-smoke-2323.mjs
          git commit -m 'test(ops): ignore Netlify preview toolbar requests'
          git push origin HEAD:ops/public-entry-preview-smoke-2323
