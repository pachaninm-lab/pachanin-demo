name: Bootstrap clean intake bounded-schema remediation

on:
  push:
    branches:
      - fix/organization-intake-bounded-schema-v2
    paths:
      - '.github/workflows/bootstrap-intake-bounded-schema-v2.yml'

permissions:
  contents: write

concurrency:
  group: bootstrap-intake-bounded-schema-v2
  cancel-in-progress: false

jobs:
  bootstrap:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/organization-intake-bounded-schema-v2
          fetch-depth: 0

      - name: Copy exact remediation and bind current-main governance
        shell: bash
        run: |
          set -euo pipefail
          git fetch --no-tags origin fix/organization-intake-bounded-schema
          mkdir -p apps/api/prisma/migrations/20260723121000_organization_intake_bounded_schema
          git show origin/fix/organization-intake-bounded-schema:apps/api/prisma/migrations/20260723121000_organization_intake_bounded_schema/migration.sql \
            > apps/api/prisma/migrations/20260723121000_organization_intake_bounded_schema/migration.sql

          python3 - <<'PY'
          import json
          from pathlib import Path

          service = Path('apps/api/src/modules/organization-intake/organization-intake.service.ts')
          text = service.read_text()
          text = text.replace('public.lookup_public_organization_connection_request', 'organization_intake.lookup_request')
          text = text.replace('public.create_public_organization_connection_request', 'organization_intake.create_request')
          service.write_text(text)

          e2e = Path('apps/api/test/industrial/organization-intake-postgresql.e2e-spec.ts')
          text = e2e.read_text()
          text = text.replace('public.public_organization_connection_requests', 'organization_intake.requests')
          text = text.replace('GRANT USAGE ON SCHEMA public, security TO app_deal;', 'GRANT USAGE ON SCHEMA public, security, organization_intake TO app_deal;')
          text = text.replace('public.lookup_public_organization_connection_request', 'organization_intake.lookup_request')
          text = text.replace('public.create_public_organization_connection_request', 'organization_intake.create_request')
          text = text.replace("WHERE table_schema = 'public'\n        AND table_name = 'public_organization_connection_requests'", "WHERE table_schema = 'organization_intake'\n        AND table_name = 'requests'")
          e2e.write_text(text)

          unit = Path('apps/web/tests/unit/platformV7OrganizationConnectIntake.test.ts')
          text = unit.read_text()
          text = text.replace(
            "const migration = read('../api/prisma/migrations/20260723113000_public_organization_connection_intake/migration.sql');",
            "const migration = [\n  read('../api/prisma/migrations/20260723113000_public_organization_connection_intake/migration.sql'),\n  read('../api/prisma/migrations/20260723121000_organization_intake_bounded_schema/migration.sql'),\n].join('\\n');",
          )
          text = text.replace("expect(apiService).toContain('lookup_public_organization_connection_request');", "expect(apiService).toContain('organization_intake.lookup_request');")
          text = text.replace("expect(apiService).toContain('create_public_organization_connection_request');", "expect(apiService).toContain('organization_intake.create_request');")
          text = text.replace("expect(migration).toContain('INSERT INTO public.public_organization_connection_requests');", "expect(migration).toContain('INSERT INTO organization_intake.requests');")
          text = text.replace("expect(migration).toContain('REVOKE ALL ON FUNCTION public.create_public_organization_connection_request');", "expect(migration).toContain('REVOKE ALL ON FUNCTION organization_intake.create_request');")
          text = text.replace("expect(migration).toContain('GRANT EXECUTE ON FUNCTION public.create_public_organization_connection_request');", "expect(migration).toContain('GRANT EXECUTE ON FUNCTION organization_intake.create_request');")
          unit.write_text(text)

          branch = 'fix/organization-intake-bounded-schema-v2'
          allowed = [
            'apps/api/prisma/migrations/20260723121000_organization_intake_bounded_schema/**',
            'apps/api/src/modules/organization-intake/organization-intake.service.ts',
            'apps/api/test/industrial/organization-intake-postgresql.e2e-spec.ts',
            'apps/web/tests/unit/platformV7OrganizationConnectIntake.test.ts',
            'docs/platform-v7/autopilot/autopilot-state.json',
            'docs/platform-v7/autopilot/scopes/organization-intake-bounded-schema-remediation-v2.json',
          ]
          scope = {
            'branch': branch,
            'status': 'active',
            'purpose': 'Forward-only post-merge remediation: move public organization intake authority outside Prisma-managed public schema while preserving rollback-compatible public wrappers.',
            'approvedBy': 'user-directed-finish-homepage-2026-07-23',
            'allowedPaths': allowed,
            'forbiddenCapabilities': [
              'editing the merged 20260723113000 migration',
              'creating Organization User membership role or tenant authority',
              'weakening RLS audit outbox consent idempotency or rate limits',
              'breaking previous-image rollback compatibility',
              'changing packages lockfiles Caddy deployment topology or production secrets',
            ],
            'acceptance': [
              'forward-only migration moves the table into organization_intake schema',
              'old public functions remain compatibility wrappers',
              'new runtime uses schema-qualified EXECUTE-only functions',
              'Prisma drift and restricted-principal E2E pass',
            ],
          }
          scope_path = Path('docs/platform-v7/autopilot/scopes/organization-intake-bounded-schema-remediation-v2.json')
          scope_path.write_text(json.dumps(scope, ensure_ascii=False, indent=2) + '\n')
          state_path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(state_path.read_text())
          state.setdefault('approvedConcurrentScopes', {})[branch] = allowed
          state_path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n')
          PY

          grep -Fq 'organization_intake.create_request' apps/api/src/modules/organization-intake/organization-intake.service.ts
          grep -Fq 'FROM organization_intake.requests' apps/api/test/industrial/organization-intake-postgresql.e2e-spec.ts
          git rm .github/workflows/bootstrap-intake-bounded-schema-v2.yml

      - name: Commit clean remediation
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix(intake): complete bounded-schema remediation'
          git push origin HEAD:fix/organization-intake-bounded-schema-v2
