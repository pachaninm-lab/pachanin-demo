name: platform-v7 safe merge

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  issues: write

concurrency:
  group: platform-v7-safe-merge
  cancel-in-progress: false

jobs:
  safe-merge:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Safe merge eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          echo "## platform-v7 safe merge" >> "$GITHUB_STEP_SUMMARY"

          prs=$(gh pr list --repo "$REPO" --state open --label platform-v7 --label agent-generated --json number,headRefName,isDraft,mergeable,reviewDecision,statusCheckRollup,files --jq '.[] | @base64')

          if [ -z "${prs:-}" ]; then
            echo "- no eligible PRs" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          blocked_path_re='^(apps/landing/|package-lock\.json$|pnpm-lock\.yaml$)'

          while IFS= read -r encoded; do
            [ -z "$encoded" ] && continue
            pr_json=$(printf '%s' "$encoded" | base64 -d)
            number=$(printf '%s' "$pr_json" | jq -r '.number')
            head=$(printf '%s' "$pr_json" | jq -r '.headRefName')
            is_draft=$(printf '%s' "$pr_json" | jq -r '.isDraft')
            mergeable=$(printf '%s' "$pr_json" | jq -r '.mergeable')
            review_decision=$(printf '%s' "$pr_json" | jq -r '.reviewDecision // ""')

            echo "- checking #$number ($head)" >> "$GITHUB_STEP_SUMMARY"
            echo "  - skipped: platform-v7 agent-generated PRs are reserved for platform-v7-autopilot-generated-merge.yml" >> "$GITHUB_STEP_SUMMARY"
            continue

            if [ "$is_draft" = "true" ]; then
              echo "  - skipped: draft" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            if [ "$mergeable" != "MERGEABLE" ]; then
              echo "  - skipped: not mergeable ($mergeable)" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            if [ "$review_decision" = "CHANGES_REQUESTED" ]; then
              echo "  - skipped: changes requested" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            blocked_files=$(printf '%s' "$pr_json" | jq -r '.files[].path' | grep -E "$blocked_path_re" || true)
            if [ -n "$blocked_files" ]; then
              echo "  - skipped: blocked path changed" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$blocked_files" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            failed_checks=$(printf '%s' "$pr_json" | jq '[.statusCheckRollup[]? | select((.conclusion != null and .conclusion != "SUCCESS" and .conclusion != "SKIPPED") or (.status != null and .status != "COMPLETED"))] | length')
            if [ "$failed_checks" != "0" ]; then
              echo "  - skipped: checks not all green" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            gh pr merge "$number" --repo "$REPO" --squash --delete-branch
            echo "  - merged" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$prs"

  patch-next-security-3043:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.number == 3043 &&
      github.event.comment.user.login == github.repository_owner &&
      github.event.comment.body == '/security patch-next 3043 15.5.21'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Checkout dedicated security branch
        uses: actions/checkout@v4
        with:
          ref: agent/ir-sec-next-15-5-16-final
          fetch-depth: 0

      - name: Materialize exact two-file security PR
        env:
          GH_TOKEN: ${{ github.token }}
          SECURITY_BRANCH: agent/ir-sec-next-15-5-16-final
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch --no-tags origin main
          git reset --hard origin/main

          node - <<'NODE'
          const fs = require('node:fs');
          const path = 'apps/web/package.json';
          const manifest = JSON.parse(fs.readFileSync(path, 'utf8'));
          if (manifest.dependencies?.next !== '15.5.18') {
            throw new Error(`Expected next 15.5.18, received ${manifest.dependencies?.next ?? '<missing>'}`);
          }
          manifest.dependencies.next = '15.5.21';
          fs.writeFileSync(path, `${JSON.stringify(manifest, null, 2)}\n`);
          NODE

          corepack enable
          corepack prepare pnpm@10.2.1 --activate
          pnpm --filter @pc/web update next@15.5.21 --lockfile-only

          node - <<'NODE'
          const fs = require('node:fs');
          const manifest = JSON.parse(fs.readFileSync('apps/web/package.json', 'utf8'));
          if (manifest.dependencies?.next !== '15.5.21') throw new Error('Next.js exact pin failed');
          const lock = fs.readFileSync('pnpm-lock.yaml', 'utf8');
          if (!lock.includes('next@15.5.21')) throw new Error('Patched Next.js package missing from lockfile');
          if (/next@15\.5\.18(?:\W|$)/u.test(lock)) throw new Error('Vulnerable Next.js package remains in lockfile');
          NODE

          expected="$({ printf '%s\n' 'apps/web/package.json' 'pnpm-lock.yaml'; } | sort)"
          actual="$(git diff --name-only | sort)"
          [[ "$actual" == "$expected" ]] || {
            echo 'Unexpected dependency remediation paths:' >&2
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 20
          }

          git diff --check
          git add apps/web/package.json pnpm-lock.yaml
          git commit -m 'fix(security): patch Next.js to 15.5.21'
          GITHUB_HEAD_REF="$SECURITY_BRANCH" BASE_REF=origin/main HEAD_REF=HEAD bash scripts/p7-autopilot-guard.sh
          git push origin "HEAD:$SECURITY_BRANCH"

          pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --base main --head "$SECURITY_BRANCH" --state open --json number --jq '.[0].number // empty')"
          if [[ -z "$pr_number" ]]; then
            gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$SECURITY_BRANCH" \
              --title 'Patch Next.js 15.5.18 to 15.5.21' \
              --body 'Exact two-file security remediation for GHSA-89xv-2m56-2m9x, GHSA-m99w-x7hq-7vfj and GHSA-p9j2-gv94-2wf4. Changes only apps/web/package.json and pnpm-lock.yaml. No exception, allowlist, product code or production change. Merge requires the complete repository CI/security matrix.'
            pr_number="$(gh pr list --repo "$GITHUB_REPOSITORY" --base main --head "$SECURITY_BRANCH" --state open --json number --jq '.[0].number')"
          fi

          head_sha="$(git rev-parse HEAD)"
          gh issue comment 3043 --repo "$GITHUB_REPOSITORY" --body "Next.js security PR published: #${pr_number}; head \`${head_sha}\`; exact diff \`apps/web/package.json\` + \`pnpm-lock.yaml\`; target \`next@15.5.21\`. Full CI is now authoritative."
          {
            echo '## Next.js 15.5.21 remediation materialized'
            echo
            echo "- PR: #$pr_number"
            echo "- head: \`$head_sha\`"
            echo '- changed paths: apps/web/package.json, pnpm-lock.yaml'
            echo '- next phase: repository CI/security matrix'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report controller result
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          RESULT: ${{ job.status }}
        shell: bash
        run: |
          gh issue comment 3043 --repo "$GITHUB_REPOSITORY" --body "Next.js 15.5.21 controller run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }} — result: \`${RESULT}\`."
