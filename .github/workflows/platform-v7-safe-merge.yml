name: platform-v7 safe merge

on:
  push:
    branches: [main]
    paths: [.github/workflows/platform-v7-safe-merge.yml]
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  actions: write
  contents: read
  pull-requests: read
  checks: read
  statuses: read
  issues: write

concurrency:
  group: platform-v7-safe-merge
  cancel-in-progress: false

jobs:
  safe-merge:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Safe merge eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          echo "## platform-v7 safe merge" >> "$GITHUB_STEP_SUMMARY"

          prs=$(gh pr list --repo "$REPO" --state open --label platform-v7 --label agent-generated --json number,headRefName --jq '.[] | @base64')
          if [ -z "${prs:-}" ]; then
            echo "- no eligible PRs" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          while IFS= read -r encoded; do
            [ -z "$encoded" ] && continue
            pr_json=$(printf '%s' "$encoded" | base64 -d)
            number=$(printf '%s' "$pr_json" | jq -r '.number')
            head=$(printf '%s' "$pr_json" | jq -r '.headRefName')
            echo "- checking #$number ($head)" >> "$GITHUB_STEP_SUMMARY"
            echo "  - skipped: platform-v7 agent-generated PRs are reserved for platform-v7-autopilot-generated-merge.yml" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$prs"

  production-release-control-3072:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.number == 3072 &&
      github.event.comment.user.login == github.repository_owner &&
      (
        github.event.comment.body == '/production release current-main' ||
        github.event.comment.body == '/production status current-main'
      )
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Dispatch or inspect exact-current-main release
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          COMMAND: ${{ github.event.comment.body }}
        shell: bash
        run: |
          set -euo pipefail

          main_sha=$(gh api "repos/$REPO/commits/main" --jq .sha)
          [[ "$main_sha" =~ ^[0-9a-f]{40}$ ]]

          if [[ "$COMMAND" == '/production release current-main' ]]; then
            gh workflow run docker-publish.yml \
              --repo "$REPO" \
              --ref main \
              -f services=all

            gh workflow run production-full-stack-exact-sha.yml \
              --repo "$REPO" \
              --ref main \
              -f target_sha="$main_sha" \
              -f confirmation=DEPLOY-FULL-STACK-EXACT-SHA

            sleep 10
          fi

          collect_runs() {
            local workflow="$1"
            gh api --paginate \
              -H 'Accept: application/vnd.github+json' \
              "repos/$REPO/actions/workflows/$workflow/runs?head_sha=$main_sha&per_page=20" \
              --jq '.workflow_runs
                | map(select(.event == "workflow_dispatch" or .event == "push"))
                | sort_by(.created_at)
                | reverse
                | .[:3]
                | .[]
                | [.id, .event, .status, (.conclusion // "pending"), .created_at, .updated_at, .html_url]
                | @tsv'
          }

          docker_runs=$(collect_runs docker-publish.yml || true)
          release_runs=$(collect_runs production-full-stack-exact-sha.yml || true)

          selected_release=''
          if [[ -n "$release_runs" ]]; then
            while IFS=$'\t' read -r id event status conclusion created updated url; do
              deploy_state=$(gh api -H 'Accept: application/vnd.github+json' "repos/$REPO/actions/runs/$id/jobs?per_page=100" \
                --jq '[.jobs[] | select(.name == "Migrate, deploy API and web, verify live intake") | (.conclusion // .status)][0] // "missing"')
              if [[ "$deploy_state" != 'skipped' && "$deploy_state" != 'missing' ]]; then
                selected_release=$(printf '%s\t%s\t%s\t%s\t%s\t%s\t%s' "$id" "$event" "$status" "$conclusion" "$created" "$updated" "$url")
                break
              fi
            done <<< "$release_runs"
            [[ -n "$selected_release" ]] || selected_release=$(printf '%s\n' "$release_runs" | head -1)
          fi

          latest_release_id=none
          latest_release_status=not-found
          latest_release_conclusion=none
          latest_release_step=none
          if [[ -n "$selected_release" ]]; then
            IFS=$'\t' read -r latest_release_id _ latest_release_status latest_release_conclusion _ _ _ <<< "$selected_release"
            latest_release_step=$(gh api -H 'Accept: application/vnd.github+json' "repos/$REPO/actions/runs/$latest_release_id/jobs?per_page=100" \
              --jq '[.jobs[] | {name, step: (([.steps[]? | select(.status == "in_progress" or .conclusion == "failure") | .name][0]) // "none")} | select(.step != "none") | (.name + " / " + .step)][0] // "none"')
          fi

          record=$(mktemp)
          {
            echo "## Exact-current-main release control"
            echo
            echo "- command: \`$COMMAND\`"
            echo "- exact main: \`$main_sha\`"
            echo "- controller run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo
            echo "### Docker image workflow"
            if [[ -n "$docker_runs" ]]; then
              while IFS=$'\t' read -r id event status conclusion created updated url; do
                echo "- run [\`$id\`]($url): event=\`$event\`, status=\`$status\`, conclusion=\`$conclusion\`, created=\`$created\`, updated=\`$updated\`"
              done <<< "$docker_runs"
            else
              echo "- no run found for exact main"
            fi
            echo
            echo "### Full-stack release workflow"
            if [[ -n "$release_runs" ]]; then
              while IFS=$'\t' read -r id event status conclusion created updated url; do
                echo "- run [\`$id\`]($url): event=\`$event\`, status=\`$status\`, conclusion=\`$conclusion\`, created=\`$created\`, updated=\`$updated\`"
                echo "  - jobs:"
                gh api -H 'Accept: application/vnd.github+json' "repos/$REPO/actions/runs/$id/jobs?per_page=100" \
                  --jq '.jobs[]
                    | "    - " + .name + ": status=`" + .status + "`, conclusion=`" + (.conclusion // "pending") + "`, active/failed step=`" + (([.steps[]? | select(.status == "in_progress" or .conclusion == "failure") | .name][0]) // "none") + "`"'
              done <<< "$release_runs"
            else
              echo "- no run found for exact main"
            fi
          } > "$record"

          sha7=${main_sha:0:7}
          if [[ "$latest_release_conclusion" == 'success' ]]; then
            status_title="Production release success · $sha7"
          elif [[ "$latest_release_status" == 'in_progress' || "$latest_release_status" == 'queued' || "$latest_release_status" == 'pending' ]]; then
            status_title="Production release running: $latest_release_step · $sha7"
          elif [[ "$latest_release_conclusion" == 'failure' || "$latest_release_conclusion" == 'cancelled' || "$latest_release_conclusion" == 'timed_out' ]]; then
            status_title="Production release blocked: $latest_release_step · $sha7"
          else
            status_title="Production release $latest_release_status/$latest_release_conclusion · $sha7"
          fi
          status_title=$(printf '%s' "$status_title" | cut -c1-240)

          gh issue edit 3072 --repo "$REPO" --title "$status_title"
          gh issue comment 3072 --repo "$REPO" --body-file "$record"
          cat "$record" >> "$GITHUB_STEP_SUMMARY"
