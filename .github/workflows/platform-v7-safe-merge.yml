name: platform-v7 safe merge

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read

concurrency:
  group: platform-v7-safe-merge
  cancel-in-progress: false

jobs:
  safe-merge:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Safe merge eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          echo "## platform-v7 safe merge" >> "$GITHUB_STEP_SUMMARY"

          prs=$(gh pr list --repo "$REPO" --state open --label platform-v7 --label safe-auto-merge --json number,headRefName,isDraft,mergeable,reviewDecision,statusCheckRollup,files,reviewThreads --jq '.[] | @base64')

          if [ -z "${prs:-}" ]; then
            echo "- no eligible PRs" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          blocked_path_re='^(apps/landing/|package-lock\.json$|pnpm-lock\.yaml$|\.env|.*\.pem$|.*\.key$)'

          while IFS= read -r encoded; do
            [ -z "$encoded" ] && continue
            pr_json=$(printf '%s' "$encoded" | base64 -d)
            number=$(printf '%s' "$pr_json" | jq -r '.number')
            head=$(printf '%s' "$pr_json" | jq -r '.headRefName')
            is_draft=$(printf '%s' "$pr_json" | jq -r '.isDraft')
            mergeable=$(printf '%s' "$pr_json" | jq -r '.mergeable')
            review_decision=$(printf '%s' "$pr_json" | jq -r '.reviewDecision // ""')

            echo "- checking #$number ($head)" >> "$GITHUB_STEP_SUMMARY"

            if [ "$is_draft" = "true" ]; then
              echo "  - skipped: draft" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            if [ "$mergeable" != "MERGEABLE" ]; then
              echo "  - skipped: not mergeable ($mergeable)" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            if [ "$review_decision" = "CHANGES_REQUESTED" ]; then
              echo "  - skipped: changes requested" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            unresolved_threads=$(printf '%s' "$pr_json" | jq '[.reviewThreads[]? | select(.isResolved == false)] | length')
            if [ "$unresolved_threads" != "0" ]; then
              echo "  - skipped: unresolved review threads" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            blocked_files=$(printf '%s' "$pr_json" | jq -r '.files[].path' | grep -E "$blocked_path_re" || true)
            if [ -n "$blocked_files" ]; then
              echo "  - skipped: blocked path changed" >> "$GITHUB_STEP_SUMMARY"
              printf '%s\n' "$blocked_files" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            failed_checks=$(printf '%s' "$pr_json" | jq '[.statusCheckRollup[]? | select((.conclusion != null and .conclusion != "SUCCESS" and .conclusion != "SKIPPED") or (.status != null and .status != "COMPLETED"))] | length')
            if [ "$failed_checks" != "0" ]; then
              echo "  - skipped: checks not all green" >> "$GITHUB_STEP_SUMMARY"
              continue
            fi

            gh pr merge "$number" --repo "$REPO" --squash --delete-branch
            echo "  - merged" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$prs"
