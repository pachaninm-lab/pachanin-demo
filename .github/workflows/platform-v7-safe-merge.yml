name: platform-v7 safe merge

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  checks: read
  statuses: read
  issues: write

concurrency:
  group: platform-v7-safe-merge
  cancel-in-progress: false

jobs:
  safe-merge:
    if: github.event_name != 'issue_comment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Safe merge eligible PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          echo "## platform-v7 safe merge" >> "$GITHUB_STEP_SUMMARY"

          prs=$(gh pr list --repo "$REPO" --state open --label platform-v7 --label agent-generated --json number,headRefName --jq '.[] | @base64')
          if [ -z "${prs:-}" ]; then
            echo "- no eligible PRs" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          while IFS= read -r encoded; do
            [ -z "$encoded" ] && continue
            pr_json=$(printf '%s' "$encoded" | base64 -d)
            number=$(printf '%s' "$pr_json" | jq -r '.number')
            head=$(printf '%s' "$pr_json" | jq -r '.headRefName')
            echo "- checking #$number ($head)" >> "$GITHUB_STEP_SUMMARY"
            echo "  - skipped: platform-v7 agent-generated PRs are reserved for platform-v7-autopilot-generated-merge.yml" >> "$GITHUB_STEP_SUMMARY"
          done <<< "$prs"

  authorize-runtime-build-diagnostics-3095:
    if: >-
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request != null &&
      github.event.issue.number == 3075 &&
      github.event.comment.user.login == github.repository_owner &&
      github.event.comment.body == '/runtime authorize-build-diagnostics 3095'
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout exact main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create source-controlled diagnostics authority
        env:
          GH_TOKEN: ${{ github.token }}
          AUTHORITY_BRANCH: governance/runtime-build-diagnostics-3095-applied
          IMPLEMENTATION_BRANCH: ops/runtime-build-diagnostics-3095
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git fetch --no-tags origin main
          git checkout -B "$AUTHORITY_BRANCH" origin/main

          IMPLEMENTATION_BRANCH="$IMPLEMENTATION_BRANCH" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('docs/platform-v7/autopilot/autopilot-state.json')
          state = json.loads(path.read_text())
          branch = os.environ['IMPLEMENTATION_BRANCH']
          allowed = ['.github/workflows/runtime-context-security-gate.yml']
          scopes = state.setdefault('approvedConcurrentScopes', {})
          existing = scopes.get(branch)
          if existing not in (None, allowed):
              raise SystemExit(f'conflicting scope for {branch}: {existing!r}')
          scopes[branch] = allowed
          path.write_text(json.dumps(state, ensure_ascii=False, separators=(',', ':')) + '\n')
          PY

          node -e "JSON.parse(require('node:fs').readFileSync('docs/platform-v7/autopilot/autopilot-state.json','utf8'))"
          test "$(git diff --name-only)" = 'docs/platform-v7/autopilot/autopilot-state.json'
          git add docs/platform-v7/autopilot/autopilot-state.json
          git commit -m 'governance: authorize runtime image build diagnostics'
          GITHUB_HEAD_REF="$AUTHORITY_BRANCH" BASE_REF=origin/main HEAD_REF=HEAD bash scripts/p7-autopilot-guard.sh
          git push --force-with-lease origin "HEAD:refs/heads/$AUTHORITY_BRANCH"

          existing_pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --state open --head "$AUTHORITY_BRANCH" --json number --jq '.[0].number // empty')
          if [ -z "$existing_pr" ]; then
            pr_url=$(gh pr create \
              --repo "$GITHUB_REPOSITORY" \
              --base main \
              --head "$AUTHORITY_BRANCH" \
              --title 'Authorize runtime image build diagnostics' \
              --body 'One-file governance prerequisite. Authorizes only `.github/workflows/runtime-context-security-gate.yml` on `ops/runtime-build-diagnostics-3095` to persist canonical API/web Docker build logs while preserving fail-closed build and scanner semantics. No exception, product, package, Dockerfile or production change.')
          else
            pr_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/pull/$existing_pr"
          fi

          gh pr comment 3075 --repo "$GITHUB_REPOSITORY" --body "Runtime build diagnostics governance created: ${pr_url}. Exact implementation scope is one workflow file; production and pass/fail gates are unchanged."
