name: TAI AP-09 exact reviewed patch

on:
  pull_request:
    paths:
      - '.github/workflows/tai-ap09-exact-patch.yml'

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'tai/ap-09-evaluation-red-team'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - name: Apply exact reviewed replacements
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          def replace_once(path: str, old: str, new: str) -> None:
              file = Path(path)
              text = file.read_text()
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f"{path}: expected one exact match, found {count}: {old!r}")
              file.write_text(text.replace(old, new, 1))

          evaluation = "apps/tai/tai/evaluation.py"
          replace_once(
              evaluation,
              '    PASS = "PASS"\n',
              '    PASS = "PASS"  # noqa: S105\n',
          )
          replace_once(
              evaluation,
              '                "cases": [_case_payload(case) for case in sorted(self.cases, key=lambda item: item.case_id)],\n',
              '                "cases": [\n'
              '                    _case_payload(case)\n'
              '                    for case in sorted(self.cases, key=lambda item: item.case_id)\n'
              '                ],\n',
          )
          replace_once(
              evaluation,
              '            if tool.status == _SUCCESS and tool.tool_name in case.forbidden_successful_tools:\n',
              '            if (\n'
              '                tool.status == _SUCCESS\n'
              '                and tool.tool_name in case.forbidden_successful_tools\n'
              '            ):\n',
          )
          replace_once(
              evaluation,
              '            if tool.status == _SUCCESS and tool.mode in _WRITE_MODES and not tool.confirmation_present:\n',
              '            if (\n'
              '                tool.status == _SUCCESS\n'
              '                and tool.mode in _WRITE_MODES\n'
              '                and not tool.confirmation_present\n'
              '            ):\n',
          )
          replace_once(
              evaluation,
              '            raise ValueError(f"observation coverage mismatch: missing={missing}, unexpected={unexpected}")\n',
              '            raise ValueError(\n'
              '                f"observation coverage mismatch: missing={missing}, unexpected={unexpected}"\n'
              '            )\n',
          )
          replace_once(
              "apps/tai/tai/release_evaluation_suite.py",
              '            " ",\n',
              '            "<EMPTY_INPUT>",\n',
          )
          Path('.github/workflows/tai-ap09-exact-patch.yml').unlink()
          PY
      - name: Commit exact patch and remove workflow
        shell: bash
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git diff --cached --check
          git commit -m 'TAI AP-09: satisfy static analysis and bind empty-input sentinel'
          git push origin HEAD:tai/ap-09-evaluation-red-team
