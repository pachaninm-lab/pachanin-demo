name: Domain Core

on:
  push:
    branches: [main]
    paths:
      - 'packages/domain-core/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
  pull_request:
    branches: [main]
    paths:
      - 'packages/domain-core/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'tsconfig*.json'
  workflow_dispatch:

concurrency:
  group: domain-core-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scenario-runner:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check scenario runner contract
        run: |
          node - <<'JS'
          const fs = require('fs');
          const path = 'packages/domain-core/src/execution-simulation/scenario-runner.ts';
          const source = fs.readFileSync(path, 'utf8');
          const required = ['P7-E2E-2096', 'CLOSED', 'closeReady', 'passedSteps', 'blockedChecks', 'auditEventCountDelta', 'timelineEventCountDelta'];
          const missing = required.filter((token) => !source.includes(token));
          if (missing.length) {
            console.error(`Missing scenario runner contract tokens: ${missing.join(', ')}`);
            process.exit(1);
          }
          JS
