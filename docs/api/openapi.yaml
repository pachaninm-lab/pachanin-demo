openapi: 3.0.3
info:
  title: Прозрачная Цена · подтверждённый API-контракт
  version: 1.0.0-controlled
  description: |
    Консервативный read-only контракт для интеграционной подготовки.
    Включены только маршруты, подтверждённые фактическими NestJS-контроллерами.
    Наличие маршрута не подтверждает production-доступность внешних систем,
    банковских callback, ФГИС, ЭДО, ГИС ЭПД, КЭП или LIMS.
  x-maturity: controlled-integration-contract
servers:
  - url: /
    description: Same-origin API gateway
tags:
  - { name: Runtime, description: Liveness, readiness and build identity. }
  - { name: Identity, description: Authenticated server identity and membership context. }
  - { name: Deals, description: Participant-scoped canonical Deal reads. }
  - { name: Logistics, description: Role-scoped shipment reads. }
  - { name: Disputes, description: Role-scoped dispute reads. }
  - { name: Settlement, description: Role-scoped bank workspace and durable event-delivery reads. }
  - { name: Integrations, description: Internal diagnostics; not live-integration proof. }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    DealId:
      in: path
      name: dealId
      required: true
      schema: { type: string, minLength: 1, maxLength: 200 }
    ShipmentId:
      in: path
      name: shipmentId
      required: true
      schema: { type: string, minLength: 1, maxLength: 200 }
    DisputeId:
      in: path
      name: disputeId
      required: true
      schema: { type: string, minLength: 1, maxLength: 200 }
  responses:
    Unauthorized: { description: Authentication is missing, invalid or expired. }
    Forbidden: { description: The role or tenant membership cannot access the resource. }
    NotFound: { description: The resource is absent inside the participant scope. }
    Unavailable: { description: A required dependency is unavailable; no synthetic data is substituted. }
paths:
  /health:
    get:
      tags: [Runtime]
      summary: Process liveness
      operationId: getLiveness
      security: []
      responses:
        '200': { description: API process is responding. }
  /ready:
    get:
      tags: [Runtime]
      summary: PostgreSQL and migration readiness
      operationId: getReadiness
      security: []
      responses:
        '200': { description: Database and required migrations are confirmed. }
        '503': { $ref: '#/components/responses/Unavailable' }
  /version:
    get:
      tags: [Runtime]
      summary: Runtime version and build identity
      operationId: getVersion
      security: []
      responses:
        '200': { description: Version, commit, build date and environment identity. }
  /api/auth/me:
    get:
      tags: [Identity]
      summary: Authenticated identity and membership context
      operationId: getAuthenticatedIdentity
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Server-confirmed authenticated context. }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /api/deals:
    get:
      tags: [Deals]
      summary: List Deals visible to the authenticated participant
      operationId: listParticipantDeals
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Participant-scoped Deal list. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/deals/{dealId}/workspace:
    get:
      tags: [Deals]
      summary: Read canonical Deal workspace
      operationId: getDealWorkspace
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/DealId' }]
      responses:
        '200': { description: Tenant-consistent Deal, shipment, acceptance, laboratory and evidence facts. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/deals/{dealId}/execution-workspace:
    get:
      tags: [Deals]
      summary: Read canonical execution state and allowed next actions
      operationId: getDealExecutionWorkspace
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/DealId' }]
      responses:
        '200': { description: PostgreSQL-authoritative execution workspace. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/logistics/shipments:
    get:
      tags: [Logistics]
      summary: List visible shipments
      operationId: listShipments
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Role- and tenant-scoped shipment list. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/logistics/shipments/{shipmentId}/workspace:
    get:
      tags: [Logistics]
      summary: Read shipment, checkpoints and GPS track
      operationId: getShipmentWorkspace
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/ShipmentId' }]
      responses:
        '200': { description: Tenant-consistent shipment workspace. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/disputes:
    get:
      tags: [Disputes]
      summary: List visible disputes
      operationId: listDisputes
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Role- and tenant-scoped dispute list. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/disputes/{disputeId}:
    get:
      tags: [Disputes]
      summary: Read one dispute
      operationId: getDispute
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/DisputeId' }]
      responses:
        '200': { description: Dispute facts inside the authenticated scope. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/settlement-engine/deal/{dealId}/bank-workspace:
    get:
      tags: [Settlement]
      summary: Read bank workspace for one Deal
      operationId: getBankWorkspace
      security: [{ bearerAuth: [] }]
      parameters: [{ $ref: '#/components/parameters/DealId' }]
      responses:
        '200': { description: Terms, operations, holds, receipts and reconciliation facts. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
  /api/settlement-engine/outbox:
    get:
      tags: [Settlement]
      summary: Read pending and manual-review integration events
      operationId: getSettlementOutbox
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: dealId
          required: false
          schema: { type: string, minLength: 1, maxLength: 200 }
      responses:
        '200': { description: Durable event-delivery state inside the authenticated scope. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
  /api/integrations/health:
    get:
      tags: [Integrations]
      summary: Read internal adapter diagnostics
      operationId: getIntegrationDiagnostics
      security: [{ bearerAuth: [] }]
      responses:
        '200': { description: Internal diagnostics; not production connectivity evidence. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
