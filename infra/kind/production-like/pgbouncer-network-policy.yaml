apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pgbouncer-ingress-egress
  namespace: grainflow-acceptance
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  policyTypes: [Ingress, Egress]
  ingress:
    - from:
        - podSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values: [grainflow-api, grainflow-outbox-worker]
      # PgBouncer client traffic is deliberately isolated on 6432. PostgreSQL
      # remains on 5432, so no client-side rule can also authorize a direct
      # database endpoint under pre- or post-DNAT NetworkPolicy evaluation.
      ports:
        - protocol: TCP
          port: 6432
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: postgresql
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-to-pgbouncer
  namespace: grainflow-acceptance
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grainflow-api
      app.kubernetes.io/instance: grainflow
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pgbouncer
      ports:
        - protocol: TCP
          port: 6432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: worker-to-pgbouncer
  namespace: grainflow-acceptance
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: grainflow-outbox-worker
      app.kubernetes.io/instance: grainflow
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pgbouncer
      ports:
        - protocol: TCP
          port: 6432
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgresql-from-pgbouncer
  namespace: grainflow-acceptance
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: postgresql
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: pgbouncer
      ports:
        - protocol: TCP
          port: 5432
