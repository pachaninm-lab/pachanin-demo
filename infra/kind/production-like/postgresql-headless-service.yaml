apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: grainflow-acceptance
  labels:
    app.kubernetes.io/component: database
    app.kubernetes.io/name: postgresql
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: postgresql
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
