apiVersion: v1
kind: Service
metadata:
  name: pgbouncer
  namespace: grainflow-acceptance
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database-pooler
spec:
  selector:
    app.kubernetes.io/name: pgbouncer
  ports:
    - name: postgres
      port: 5432
      targetPort: pgbouncer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer
  namespace: grainflow-acceptance
  labels:
    app.kubernetes.io/name: pgbouncer
    app.kubernetes.io/component: database-pooler
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pgbouncer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pgbouncer
        app.kubernetes.io/component: database-pooler
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pgbouncer
          image: edoburu/pgbouncer:1.22.1-p0
          imagePullPolicy: IfNotPresent
          command: [/usr/bin/pgbouncer]
          args: [/etc/pgbouncer/pgbouncer.ini]
          ports:
            - name: pgbouncer
              containerPort: 6432
          readinessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 3
            periodSeconds: 3
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            tcpSocket:
              port: pgbouncer
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 300m
              memory: 192Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer/pgbouncer.ini
              subPath: pgbouncer.ini
              readOnly: true
            - name: config
              mountPath: /etc/pgbouncer/userlist.txt
              subPath: userlist.txt
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          secret:
            secretName: grainflow-pgbouncer-config
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 32Mi
