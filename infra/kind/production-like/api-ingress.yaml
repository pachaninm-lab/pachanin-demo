apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grainflow-api
  namespace: grainflow-acceptance
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: api.acceptance.grainflow.invalid
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grainflow-api
                port:
                  number: 3001
