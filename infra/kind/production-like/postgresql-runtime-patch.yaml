spec:
  template:
    spec:
      securityContext:
        fsGroup: 70
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: postgresql-volume-permissions
          image: busybox:1.36.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              mkdir -p /var/lib/postgresql/data/pgdata /var/run/postgresql
              chown -R 70:70 /var/lib/postgresql/data /var/run/postgresql
              chmod 0700 /var/lib/postgresql/data/pgdata
              chmod 3775 /var/run/postgresql
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
              add: [CHOWN, FOWNER, DAC_OVERRIDE]
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: runtime
              mountPath: /var/run/postgresql
      containers:
        - name: postgresql
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            runAsNonRoot: true
            runAsUser: 70
            runAsGroup: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: runtime
              mountPath: /var/run/postgresql
      volumes:
        - name: runtime
          emptyDir:
            medium: Memory
            sizeLimit: 64Mi
