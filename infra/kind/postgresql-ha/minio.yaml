apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: grainflow-ha
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: backup-object-store
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
---
apiVersion: v1
kind: Service
metadata:
  name: minio
  namespace: grainflow-ha
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: backup-object-store
spec:
  selector:
    app.kubernetes.io/name: minio
  ports:
    - name: s3
      port: 9000
      targetPort: s3
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: minio
  namespace: grainflow-ha
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: minio
  namespace: grainflow-ha
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/component: backup-object-store
spec:
  serviceName: minio-headless
  replicas: 4
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: minio
        app.kubernetes.io/component: backup-object-store
    spec:
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: minio
              topologyKey: kubernetes.io/hostname
      containers:
        - name: minio
          image: __MINIO_IMAGE__
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "-ec"]
          args:
            - >-
              minio server --console-address :9001
              http://minio-0.minio-headless.grainflow-ha.svc.cluster.local/data
              http://minio-1.minio-headless.grainflow-ha.svc.cluster.local/data
              http://minio-2.minio-headless.grainflow-ha.svc.cluster.local/data
              http://minio-3.minio-headless.grainflow-ha.svc.cluster.local/data
          envFrom:
            - secretRef:
                name: minio-credentials
          ports:
            - name: s3
              containerPort: 9000
            - name: console
              containerPort: 9001
          readinessProbe:
            httpGet:
              path: /minio/health/ready
              port: s3
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /minio/health/live
              port: s3
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: data
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 1Gi
