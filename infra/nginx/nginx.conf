# GrainFlow — Nginx + WAF Production Config (ТЗ 11.4)
# Coraza WAF + OWASP CRS + Rate Limiting + TLS termination

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time ut="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   75s;
    types_hash_max_size 2048;
    server_tokens       off;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;

    # ── Rate Limiting (ТЗ 11.4: 5 attempts → 15 min block) ──────────────────
    # Global rate limit zone
    limit_req_zone $binary_remote_addr zone=api_global:20m rate=100r/s;
    # Auth endpoints — strict
    limit_req_zone $binary_remote_addr zone=auth_strict:10m rate=5r/m;
    # Webhook endpoints
    limit_req_zone $binary_remote_addr zone=webhook:10m rate=50r/s;

    # ── Coraza WAF ────────────────────────────────────────────────────────────
    modsecurity on;
    modsecurity_rules_file /etc/nginx/modsecurity/main.conf;

    # ── Upstream: GrainFlow API ───────────────────────────────────────────────
    upstream grainflow_api {
        server grainflow-api:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.grainflow.ru;
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name api.grainflow.ru;

        # TLS
        ssl_certificate     /etc/nginx/ssl/grainflow.crt;
        ssl_certificate_key /etc/nginx/ssl/grainflow.key;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:SSL:50m;
        ssl_session_tickets off;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;

        # HSTS (2 года)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # ── Security Headers (ТЗ 11.4) ────────────────────────────────────────
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # CSP — разрешаем только наши домены
        add_header Content-Security-Policy \
            "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; connect-src 'self' https://api.grainflow.ru; frame-ancestors 'none';" \
            always;

        # ── Request body limits ───────────────────────────────────────────────
        client_max_body_size 10m;
        client_body_timeout  60s;
        client_header_timeout 10s;

        # ── Auth endpoints — strict rate limit ────────────────────────────────
        location /api/auth/login {
            limit_req zone=auth_strict burst=2 nodelay;
            limit_req_status 429;
            add_header Retry-After 900;  # 15 мин

            proxy_pass http://grainflow_api;
            include /etc/nginx/proxy_params.conf;
        }

        location /api/auth/ {
            limit_req zone=auth_strict burst=5 nodelay;
            limit_req_status 429;

            proxy_pass http://grainflow_api;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Webhook endpoints ─────────────────────────────────────────────────
        location /api/webhooks/ {
            limit_req zone=webhook burst=20 nodelay;
            limit_req_status 429;

            # Проверка HMAC идёт в приложении
            proxy_pass http://grainflow_api;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Storage upload (large body) ───────────────────────────────────────
        location /api/storage/upload {
            client_max_body_size 100m;
            limit_req zone=api_global burst=10 nodelay;

            proxy_pass http://grainflow_api;
            proxy_read_timeout 300s;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Health / metrics (без rate limit) ────────────────────────────────
        location /health {
            proxy_pass http://grainflow_api;
            include /etc/nginx/proxy_params.conf;
            access_log off;
        }

        location /ready {
            proxy_pass http://grainflow_api;
            include /etc/nginx/proxy_params.conf;
            access_log off;
        }

        location /metrics {
            # Разрешить только из monitoring namespace
            allow 10.0.0.0/8;
            deny  all;
            proxy_pass http://grainflow_api;
            include /etc/nginx/proxy_params.conf;
            access_log off;
        }

        # ── Main API ──────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api_global burst=200 nodelay;
            limit_req_status 429;

            proxy_pass http://grainflow_api;
            include /etc/nginx/proxy_params.conf;
        }

        # ── Frontend static (если фронт через тот же Nginx) ──────────────────
        location / {
            limit_req zone=api_global burst=500 nodelay;

            proxy_pass http://grainflow_api;
            include /etc/nginx/proxy_params.conf;
        }
    }
}
