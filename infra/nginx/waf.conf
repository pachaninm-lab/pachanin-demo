# GrainFlow WAF Configuration (ТЗ 11.4)
# Coraza WAF + OWASP CRS in Nginx / Kong
# Deploy: include this file in nginx.conf http{} or server{} block

# ── Coraza WAF engine ──────────────────────────────────────────────────────────
modsecurity on;
modsecurity_rules_file /etc/nginx/modsecurity/main.conf;

# ── Main ModSecurity / Coraza rules ───────────────────────────────────────────
# Content of /etc/nginx/modsecurity/main.conf:
#
# Include /etc/modsecurity.d/modsecurity.conf
# Include /etc/modsecurity.d/crs/crs-setup.conf
# Include /etc/modsecurity.d/crs/rules/*.conf
# Include /etc/modsecurity.d/grainflow-custom.conf
