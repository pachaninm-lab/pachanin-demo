# Single-server production stack — the real platform on one paid host.
#
# The application images are built by GitHub Actions (docker-publish.yml) and
# pulled here; this host never builds anything. Watchtower auto-pulls new images
# so a push that turns green in CI rolls out here without any manual step.
#
#   API/Web images:  ghcr.io/<owner>/grainflow-api|web|migrations
#   Data tier:       PostgreSQL + PgBouncer (transaction pool) + Redis
#   Edge:            Caddy (automatic HTTPS via Let's Encrypt)
#
# One-time bring-up: infra/single-server/bootstrap.sh
name: grainflow

x-ghcr: &ghcr ${IMAGE_PREFIX:-ghcr.io/pachaninm-lab/grainflow}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: grainflow
      POSTGRES_USER: grainflow_ddl               # migration/DDL owner
      POSTGRES_PASSWORD: ${DDL_PASSWORD:?set in .env}
      APP_PASSWORD: ${APP_PASSWORD:?set in .env}
      STORAGE_PASSWORD: ${STORAGE_PASSWORD:?set in .env}
    command:
      - postgres
      - -c
      - max_connections=300
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-1GB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-roles.sh:/docker-entrypoint-initdb.d/10-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grainflow_ddl -d grainflow"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks: [edge]

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: grainflow
      DB_USER: grainflow_app
      DB_PASSWORD: ${APP_PASSWORD:?set in .env}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "5000"
      DEFAULT_POOL_SIZE: "40"
      LISTEN_PORT: "6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [edge]

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set in .env}", "--save", "60", "1"]
    volumes:
      - redisdata:/data
    networks: [edge]

  migrations:
    image: "${IMAGE_PREFIX:-ghcr.io/pachaninm-lab/grainflow}-migrations:latest"
    restart: "no"
    environment:
      # Migrations run as the DDL owner, directly (not through the pooler).
      DATABASE_URL: "postgresql://grainflow_ddl:${DDL_PASSWORD}@postgres:5432/grainflow?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [edge]

  api:
    image: "${IMAGE_PREFIX:-ghcr.io/pachaninm-lab/grainflow}-api:latest"
    restart: unless-stopped
    env_file: [.env]
    environment:
      NODE_ENV: production
      PORT: "3001"
      # Runtime → PgBouncer (transaction pooling). Auth + storage principals.
      DATABASE_URL: "postgresql://grainflow_app:${APP_PASSWORD}@pgbouncer:6432/grainflow?pgbouncer=true&connection_limit=10&pool_timeout=10"
      AUTH_DATABASE_URL: "postgresql://grainflow_app:${APP_PASSWORD}@pgbouncer:6432/grainflow?pgbouncer=true&connection_limit=5"
      STORAGE_DATABASE_URL: "postgresql://grainflow_storage:${STORAGE_PASSWORD}@pgbouncer:6432/grainflow?pgbouncer=true&connection_limit=5"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      PLATFORM_V7_DEAL_REPOSITORY: prisma
      PLATFORM_V7_DOCUMENT_REPOSITORY: prisma
      PLATFORM_V7_SHIPMENT_REPOSITORY: prisma
      PLATFORM_V7_LAB_REPOSITORY: prisma
      PLATFORM_V7_PAYMENT_REPOSITORY: prisma
      TRUST_PROXY_MODE: cidr
      TRUSTED_PROXY_CIDRS: "172.16.0.0/12,10.0.0.0/8"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
    depends_on:
      migrations:
        condition: service_completed_successfully
      pgbouncer:
        condition: service_started
      redis:
        condition: service_started
    networks: [edge]

  web:
    image: "${IMAGE_PREFIX:-ghcr.io/pachaninm-lab/grainflow}-web:latest"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      API_BASE_URL: "http://api:3001"
    depends_on:
      api:
        condition: service_started
    networks: [edge]

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set to your domain or server IP}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api
      - web
    networks: [edge]

  # Continuous delivery: pulls new images when CI publishes them, then restarts.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "120"
      WATCHTOWER_LABEL_ENABLE: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [edge]

volumes:
  pgdata:
  redisdata:
  caddydata:
  caddyconfig:

networks:
  edge:
