# Single-server production stack — the real platform on one paid host.
#
# The application images are built by GitHub Actions (docker-publish.yml) and
# pulled here; this host never builds anything. Watchtower auto-pulls new images
# so a push that turns green in CI rolls out here without any manual step.
#
#   API/Web images:  ghcr.io/<owner>/grainflow-api|web|migrations
#   Data tier:       PostgreSQL + PgBouncer (transaction pool) + Redis
#   Edge:            Caddy (automatic HTTPS via Let's Encrypt)
#
# One-time bring-up: infra/single-server/bootstrap.sh
name: grainflow

x-ghcr: &ghcr ${IMAGE_PREFIX:-ghcr.io/pachaninm-lab/grainflow}

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: grainflow
      POSTGRES_USER: grainflow_ddl               # migration/DDL owner
      POSTGRES_PASSWORD: ${DDL_PASSWORD:?set in .env}
      APP_PASSWORD: ${APP_PASSWORD:?set in .env}
      STORAGE_PASSWORD: ${STORAGE_PASSWORD:?set in .env}
    command:
      - postgres
      - -c
      - max_connections=300
      - -c
      - shared_buffers=${PG_SHARED_BUFFERS:-1GB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-roles.sh:/docker-entrypoint-initdb.d/10-init-roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U grainflow_ddl -d grainflow"]
      interval: 10s
      timeout: 5s
      retries: 15
    networks: [edge]

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: grainflow
      DB_USER: grainflow_app
      DB_PASSWORD: ${APP_PASSWORD:?set in .env}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "5000"
      DEFAULT_POOL_SIZE: "40"
      LISTEN_PORT: "6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [edge]

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set in .env}", "--save", "60", "1"]
    volumes:
      - redisdata:/data
    networks: [edge]

  migrations:
    image: "${IMAGE_PREFIX:-ghcr.io/pachaninm-lab/grainflow}-migrations:latest"
    restart: "no"
    environment:
      # Migrations run as the DDL owner, directly (not through the pooler).
      DATABASE_URL: "postgresql://grainflow_ddl:${DDL_PASSWORD}@postgres:5432/grainflow?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [edge]

  # One-shot: after migrations, create the three canonical runtime principals
  # (deal/auth/storage), apply the canonical RLS overlays (ENABLE + FORCE RLS)
  # and the least-privilege grants the platform's startup boundary requires.
  # Idempotent — safe to re-run on every deploy.
  provision:
    image: postgres:16
    restart: "no"
    entrypoint: ["/bin/sh", "/provision.sh"]
    environment:
      DDL_PASSWORD: ${DDL_PASSWORD:?set in .env}
      APP_PASSWORD: ${APP_PASSWORD:?set in .env}
      AUTH_PASSWORD: ${AUTH_PASSWORD:?set in .env}
      STORAGE_PASSWORD: ${STORAGE_PASSWORD:?set in .env}
    volumes:
      - ./provision.sh:/provision.sh:ro
      - ./provision-roles.sql:/provision-roles.sql:ro
      - ./provision-grants.sql:/provision-grants.sql:ro
      - ../sql:/sql:ro
    depends_on:
      migrations:
        condition: service_completed_successfully
    networks: [edge]

  api:
    image: "${IMAGE_PREFIX:-ghcr.io/pachaninm-lab/grainflow}-api:latest"
    restart: unless-stopped
    env_file: [.env]
    environment:
      NODE_ENV: production
      PORT: "3001"
      # Runtime connects DIRECTLY to PostgreSQL as three distinct least-privilege
      # principals. A single shared PgBouncer login would collapse them into one
      # role and break the deal/auth/storage boundary the platform enforces at
      # startup, so pooling is intentionally not used on this path.
      DATABASE_URL: "postgresql://app_deal_api:${APP_PASSWORD}@postgres:5432/grainflow?connection_limit=15"
      AUTH_DATABASE_URL: "postgresql://app_service:${AUTH_PASSWORD}@postgres:5432/grainflow?connection_limit=5"
      STORAGE_DATABASE_URL: "postgresql://app_storage:${STORAGE_PASSWORD}@postgres:5432/grainflow?connection_limit=5"
      REDIS_URL: "redis://:${REDIS_PASSWORD}@redis:6379"
      PLATFORM_V7_DEAL_REPOSITORY: prisma
      PLATFORM_V7_DOCUMENT_REPOSITORY: prisma
      PLATFORM_V7_SHIPMENT_REPOSITORY: prisma
      PLATFORM_V7_LAB_REPOSITORY: prisma
      PLATFORM_V7_PAYMENT_REPOSITORY: prisma
      TRUST_PROXY_MODE: cidr
      TRUSTED_PROXY_CIDRS: "172.16.0.0/12,10.0.0.0/8"
      OTEL_TRACES_SAMPLER_ARG: "0.1"
      # Object storage for documents/evidence — S3-compatible MinIO in this stack.
      OBJECT_STORAGE_DRIVER: s3
      OBJECT_STORAGE_ENDPOINT: "http://minio:9000"
      OBJECT_STORAGE_REGION: us-east-1
      OBJECT_STORAGE_BUCKET: grainflow-documents
      OBJECT_STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      OBJECT_STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      OBJECT_STORAGE_FORCE_PATH_STYLE: "true"
      # MinIO is on the private container network only — HTTP is safe here.
      OBJECT_STORAGE_ALLOW_INSECURE_ENDPOINT: "true"
    depends_on:
      provision:
        condition: service_completed_successfully
      redis:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    networks: [edge]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    volumes:
      - miniodata:/data
    networks: [edge]

  # One-shot: wait for MinIO, create the documents bucket, then exit.
  minio-init:
    image: minio/mc:latest
    restart: "no"
    entrypoint:
      - /bin/sh
      - -c
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do echo "waiting for minio..."; sleep 2; done;
        mc mb -p local/grainflow-documents || true;
        mc anonymous set none local/grainflow-documents || true;
        echo "minio bucket ready";
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    depends_on:
      minio:
        condition: service_started
    networks: [edge]

  web:
    image: "${IMAGE_PREFIX:-ghcr.io/pachaninm-lab/grainflow}-web:latest"
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3000"
      API_BASE_URL: "http://api:3001"
      API_URL: "http://api:3001"
      # Controlled-pilot cabinet access: signed sessions for demonstrating the
      # cabinets to partners without opening public self-registration. The web
      # signs sessions with the same JWT_SECRET the API verifies. Owner logs in
      # with PC_CABINET_LOCK_USER/PASSWORD; per-role demo accounts
      # (operator.test@procent-agro.test, buyer.test@…, seller.test@…, …) use
      # PC_CABINET_ROLE_PASSWORD.
      JWT_SECRET: ${JWT_SECRET:?set in .env}
      PC_CABINET_TEST_ACCESS: "true"
      PC_CABINET_ROLE_PASSWORD: ${PC_CABINET_ROLE_PASSWORD:?set in .env}
      PC_CABINET_LOCK_USER: ${PC_CABINET_LOCK_USER:-}
      PC_CABINET_LOCK_PASSWORD: ${PC_CABINET_LOCK_PASSWORD:-}
    depends_on:
      api:
        condition: service_started
    networks: [edge]

  caddy:
    image: caddy:2
    restart: unless-stopped
    environment:
      SITE_ADDRESS: ${SITE_ADDRESS:?set to your domain or server IP}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddydata:/data
      - caddyconfig:/config
    depends_on:
      - api
      - web
    networks: [edge]

  # Continuous delivery: pulls new images when CI publishes them, then restarts.
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "120"
      WATCHTOWER_LABEL_ENABLE: "false"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks: [edge]

volumes:
  pgdata:
  redisdata:
  miniodata:
  caddydata:
  caddyconfig:

networks:
  edge:
