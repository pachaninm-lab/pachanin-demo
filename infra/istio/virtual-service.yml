# Istio VirtualService — traffic management и circuit breaking
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: grainflow-api
  namespace: grainflow-prod
spec:
  hosts:
    - grainflow-api
  http:
    - match:
        - uri:
            prefix: /api/ml/
      route:
        - destination:
            host: grainflow-ml
            port:
              number: 8001
      timeout: 10s
      retries:
        attempts: 3
        perTryTimeout: 5s
        retryOn: gateway-error,connect-failure,retriable-4xx

    - route:
        - destination:
            host: grainflow-api
            port:
              number: 4000
      timeout: 30s
      retries:
        attempts: 2
        perTryTimeout: 15s
        retryOn: gateway-error,connect-failure

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: grainflow-api
  namespace: grainflow-prod
spec:
  host: grainflow-api
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
      maxEjectionPercent: 50
    tls:
      mode: ISTIO_MUTUAL

---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: grainflow-ml
  namespace: grainflow-prod
spec:
  host: grainflow-ml
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 50
      http:
        http1MaxPendingRequests: 50
    outlierDetection:
      consecutive5xxErrors: 3
      interval: 30s
      baseEjectionTime: 60s
    tls:
      mode: ISTIO_MUTUAL

---
# Gateway для внешнего трафика
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: grainflow-gateway
  namespace: grainflow-prod
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: grainflow-tls-cert
      hosts:
        - app.grainflow.ru
        - api.grainflow.ru
    - port:
        number: 80
        name: http
        protocol: HTTP
      tls:
        httpsRedirect: true
      hosts:
        - app.grainflow.ru
        - api.grainflow.ru
