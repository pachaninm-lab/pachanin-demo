# Self-hosted database layer — one command, no cloud account, no Terraform.
#
#   cd infra/self-hosted-db
#   cp .env.example .env      # then edit the two passwords
#   docker compose up -d
#
# Brings up the exact production connection topology, verified end-to-end:
#   application -> PgBouncer (transaction pooling) -> PostgreSQL 16
#   plus Redis for the read cache.
#
# The app connects to PgBouncer on :6432 (DATABASE_URL) and Redis on :6379.
# For high availability across machines, use the managed-cloud path
# (infra/terraform/postgresql) which adds automatic failover and read replicas.

name: grainflow-db

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-grainflow_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-grainflow}
    command:
      - postgres
      - -c
      - max_connections=400
      - -c
      - shared_buffers=1GB
      - -c
      - log_min_duration_statement=500
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-grainflow_app} -d ${POSTGRES_DB:-grainflow}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [dbnet]

  pgbouncer:
    image: edoburu/pgbouncer:latest
    restart: unless-stopped
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: ${POSTGRES_DB:-grainflow}
      DB_USER: ${POSTGRES_USER:-grainflow_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      MAX_CLIENT_CONN: "5000"
      DEFAULT_POOL_SIZE: "40"
      MIN_POOL_SIZE: "5"
      LISTEN_PORT: "6432"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "6432:6432"          # app DATABASE_URL -> postgresql://…@localhost:6432/…?pgbouncer=true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [dbnet]

  redis:
    image: redis:7
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}", "--save", ""]
    ports:
      - "6379:6379"          # app REDIS_URL -> redis://:PASSWORD@localhost:6379
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [dbnet]

volumes:
  pgdata:

networks:
  dbnet:
