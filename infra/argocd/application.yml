apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grainflow-api
  namespace: argocd
  labels:
    app: grainflow
    component: api
spec:
  project: grainflow
  source:
    repoURL: https://github.com/grainflow/infra
    targetRevision: main
    path: infra/helm/grainflow-api
    helm:
      valueFiles:
        - values-production.yaml
      parameters:
        - name: image.tag
          value: "{{RELEASE_TAG}}"
  destination:
    server: https://kubernetes.default.svc
    namespace: grainflow-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  revisionHistoryLimit: 10

