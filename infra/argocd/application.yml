---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: grainflow
  namespace: argocd
spec:
  description: GrainFlow platform applications
  sourceRepos:
    - 'https://github.com/grainflow/infra'
  destinations:
    - namespace: grainflow-prod
      server: https://kubernetes.default.svc
    - namespace: grainflow-staging
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ''
      kind: Namespace
  namespaceResourceWhitelist:
    - group: 'apps'
      kind: Deployment
    - group: 'apps'
      kind: StatefulSet
    - group: ''
      kind: Service
    - group: ''
      kind: ConfigMap
    - group: ''
      kind: Secret
    - group: 'autoscaling'
      kind: HorizontalPodAutoscaler
    - group: 'policy'
      kind: PodDisruptionBudget
    - group: 'networking.k8s.io'
      kind: Ingress
    - group: 'batch'
      kind: CronJob
