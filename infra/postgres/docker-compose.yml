# Local Postgres for platform-v7 — the concurrent-write backend for production
# (SQLite is single-writer and cannot serve thousands of simultaneous users).
#
# One option for Postgres (Docker). On Debian/Ubuntu the bundled cluster works
# too: `pg_ctlcluster 16 main start`. The app's concurrency was verified against
# a real Postgres 16. See docs/platform-v7/RUN_LIVE.md and the SR-2 plan:
# docs/platform-v7/audit/SR2_POSTGRES_MIGRATION_PLAN.md.
#
# Usage:
#   docker compose -f infra/postgres/docker-compose.yml up -d
#   # then point the API at it (see apps/api/.env.postgres.example)

services:
  postgres:
    image: postgres:16-alpine
    container_name: pachanin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pachanin
      POSTGRES_PASSWORD: pachanin
      POSTGRES_DB: pachanin
    ports:
      - "5432:5432"
    volumes:
      - pachanin_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pachanin -d pachanin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pachanin_pgdata:
