apiVersion: v1
kind: ServiceAccount
metadata:
  name: grainflow-outbox-worker
  namespace: grainflow-prod
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grainflow-outbox-worker
  namespace: grainflow-prod
  labels:
    app: grainflow-outbox-worker
    component: durable-delivery
spec:
  # Multiple replicas are safe because claims use PostgreSQL SKIP LOCKED leases.
  replicas: 2
  selector:
    matchLabels:
      app: grainflow-outbox-worker
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: grainflow-outbox-worker
        component: durable-delivery
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: grainflow-outbox-worker
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: worker
          image: ghcr.io/pachaninm-lab/grainflow-api:latest
          ports:
            - name: health
              containerPort: 3001
              protocol: TCP
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3001"
            - name: OUTBOX_WORKER_MODE
              value: worker
            - name: OUTBOX_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OUTBOX_RELAY_INTERVAL_MS
              value: "1000"
            - name: OUTBOX_RELAY_BATCH_SIZE
              value: "100"
            - name: OUTBOX_RELAY_LEASE_SECONDS
              value: "30"
            - name: TRUST_PROXY_MODE
              value: direct
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: grainflow-secrets
                  key: DATABASE_URL
            - name: AUTH_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: grainflow-secrets
                  key: AUTH_DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: grainflow-secrets
                  key: JWT_SECRET
            - name: AUTH_TOKEN_PEPPER
              valueFrom:
                secretKeyRef:
                  name: grainflow-secrets
                  key: AUTH_TOKEN_PEPPER
            - name: MFA_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: grainflow-secrets
                  key: MFA_ENCRYPTION_KEY
            - name: RATE_LIMIT_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: grainflow-secrets
                  key: RATE_LIMIT_KEY_PEPPER
            - name: BANK_HMAC_SECRET
              valueFrom:
                secretKeyRef:
                  name: grainflow-secrets
                  key: BANK_HMAC_SECRET
            - name: KAFKA_BROKERS
              valueFrom:
                secretKeyRef:
                  name: grainflow-kafka
                  key: brokers
            - name: KAFKA_CLIENT_ID
              value: grainflow-outbox-worker
            - name: KAFKA_TRANSACTIONAL_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "768Mi"
              cpu: "1000m"
          startupProbe:
            httpGet:
              path: /health
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
          livenessProbe:
            httpGet:
              path: /health
              port: health
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: health
            periodSeconds: 10
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [grainflow-outbox-worker]
              topologyKey: kubernetes.io/hostname
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: grainflow-outbox-worker-pdb
  namespace: grainflow-prod
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: grainflow-outbox-worker
