# Network Policies — Zero Trust per ТЗ 3.1 / ТЗ 4.3
# Deny all ingress by default, allow only what's needed

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-default
  namespace: grainflow-prod
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# API pods: allow ingress from ingress-controller and monitoring
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-api-ingress
  namespace: grainflow-prod
spec:
  podSelector:
    matchLabels:
      app: grainflow-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 3001
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: grainflow-monitoring
      ports:
        - port: 3001
  egress:
    # PostgreSQL
    - to:
        - podSelector:
            matchLabels:
              app: postgresql
      ports:
        - port: 5432
    # Redis
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
    # DNS
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # External integrations (HTTPS only)
    - ports:
        - port: 443
---
# Monitoring: allow Prometheus to scrape metrics
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: grainflow-prod
spec:
  podSelector:
    matchLabels:
      prometheus.io/scrape: "true"
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: grainflow-monitoring
      ports:
        - port: 3001
