{{- if .Values.web.enabled }}
{{- $digest := include "grainflow.image.digest" (dict "component" "web" "digest" .Values.web.image.digest) }}
{{- $sourceCommit := include "grainflow.release.sourceCommit" . }}
{{- $manifestId := include "grainflow.release.manifestId" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grainflow.fullname" . }}-web
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "grainflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  {{- if not .Values.web.autoscaling.enabled }}
  replicas: {{ .Values.web.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grainflow-web
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grainflow-web
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: web
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
      annotations:
        platform.prozrachnaya-cena/image-digest: {{ $digest | quote }}
        platform.prozrachnaya-cena/source-commit: {{ $sourceCommit | quote }}
        platform.prozrachnaya-cena/release-manifest: {{ $manifestId | quote }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}@{{ $digest }}"
          imagePullPolicy: {{ .Values.web.image.pullPolicy | default "IfNotPresent" }}
          env:
            - name: RELEASE_SOURCE_COMMIT
              value: {{ $sourceCommit | quote }}
            - name: RELEASE_MANIFEST_ID
              value: {{ $manifestId | quote }}
          ports:
            - name: http
              containerPort: {{ .Values.web.service.port }}
              protocol: TCP
          startupProbe:
            httpGet:
              path: /robots.txt
              port: {{ .Values.web.service.port }}
            periodSeconds: 5
            failureThreshold: 36
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /robots.txt
              port: {{ .Values.web.service.port }}
            periodSeconds: 15
            timeoutSeconds: 3
          readinessProbe:
            httpGet:
              path: /sitemap.xml
              port: {{ .Values.web.service.port }}
            periodSeconds: 5
            timeoutSeconds: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: next-cache
              mountPath: /app/.next/cache
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
        - name: next-cache
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grainflow.fullname" . }}-web
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "grainflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  type: {{ .Values.web.service.type }}
  selector:
    app.kubernetes.io/name: grainflow-web
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.web.service.port }}
      targetPort: http
---
{{- if .Values.web.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "grainflow.fullname" . }}-web
  namespace: {{ .Values.namespace.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "grainflow.fullname" . }}-web
  minReplicas: {{ .Values.web.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.web.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.web.autoscaling.targetCPUUtilizationPercentage }}
{{- end }}
{{- end }}
