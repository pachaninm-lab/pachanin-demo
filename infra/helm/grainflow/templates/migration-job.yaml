{{- if .Values.migration.enabled }}
{{- $digest := include "grainflow.image.digest" (dict "component" "migration" "digest" .Values.migration.image.digest) }}
{{- $sourceCommit := include "grainflow.release.sourceCommit" . }}
{{- $manifestId := include "grainflow.release.manifestId" . }}
{{- $migrationSetDigest := include "grainflow.release.migrationSetDigest" . }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "grainflow.fullname" . }}-migration-{{ trunc 12 $sourceCommit }}
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "grainflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: migration
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-20"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
    platform.prozrachnaya-cena/image-digest: {{ $digest | quote }}
    platform.prozrachnaya-cena/source-commit: {{ $sourceCommit | quote }}
    platform.prozrachnaya-cena/release-manifest: {{ $manifestId | quote }}
    platform.prozrachnaya-cena/migration-set-digest: {{ $migrationSetDigest | quote }}
spec:
  backoffLimit: {{ .Values.migration.backoffLimit }}
  activeDeadlineSeconds: {{ .Values.migration.activeDeadlineSeconds }}
  ttlSecondsAfterFinished: {{ .Values.migration.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grainflow-migration
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: migration
      annotations:
        platform.prozrachnaya-cena/image-digest: {{ $digest | quote }}
        platform.prozrachnaya-cena/source-commit: {{ $sourceCommit | quote }}
        platform.prozrachnaya-cena/release-manifest: {{ $manifestId | quote }}
        platform.prozrachnaya-cena/migration-set-digest: {{ $migrationSetDigest | quote }}
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: "{{ .Values.migration.image.repository }}@{{ $digest }}"
          imagePullPolicy: {{ .Values.migration.image.pullPolicy }}
          env:
            - name: RELEASE_SOURCE_COMMIT
              value: {{ $sourceCommit | quote }}
            - name: RELEASE_MANIFEST_ID
              value: {{ $manifestId | quote }}
            - name: MIGRATION_SET_DIGEST
              value: {{ $migrationSetDigest | quote }}
            - name: RUNTIME_COMPONENT
              value: migration-job
          envFrom:
            {{- toYaml .Values.migration.secretEnvFrom | nindent 12 }}
          resources:
            {{- toYaml .Values.migration.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
{{- end }}
