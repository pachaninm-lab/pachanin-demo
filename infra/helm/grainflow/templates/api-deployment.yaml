{{- if .Values.api.enabled }}
{{- $digest := include "grainflow.image.digest" (dict "component" "api" "digest" .Values.api.image.digest) }}
{{- $sourceCommit := include "grainflow.release.sourceCommit" . }}
{{- $manifestId := include "grainflow.release.manifestId" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "grainflow.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "grainflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grainflow-api
      app.kubernetes.io/instance: {{ .Release.Name }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: grainflow-api
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: api
        app.kubernetes.io/version: {{ .Chart.AppVersion | quote }}
      annotations:
        platform.prozrachnaya-cena/image-digest: {{ $digest | quote }}
        platform.prozrachnaya-cena/source-commit: {{ $sourceCommit | quote }}
        platform.prozrachnaya-cena/release-manifest: {{ $manifestId | quote }}
        prometheus.io/scrape: "true"
        prometheus.io/port: {{ .Values.api.service.port | quote }}
        prometheus.io/path: "/metrics"
        {{- if .Values.vault.agentInjector.enabled }}
        {{- toYaml .Values.vault.annotations | nindent 8 }}
        {{- end }}
    spec:
      automountServiceAccountToken: {{ .Values.vault.agentInjector.enabled }}
      securityContext:
        runAsNonRoot: true
        runAsUser: {{ .Values.api.securityContext.runAsUser }}
        runAsGroup: {{ .Values.api.securityContext.runAsGroup }}
        fsGroup: {{ .Values.api.securityContext.fsGroup }}
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: "{{ .Values.api.image.repository }}@{{ $digest }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          env:
            {{- range $key, $val := .Values.api.env }}
            - name: {{ $key }}
              value: {{ $val | quote }}
            {{- end }}
            - name: RELEASE_SOURCE_COMMIT
              value: {{ $sourceCommit | quote }}
            - name: RELEASE_MANIFEST_ID
              value: {{ $manifestId | quote }}
          envFrom:
            {{- toYaml .Values.api.secretEnvFrom | nindent 12 }}
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.api.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.api.readinessProbe | nindent 12 }}
          startupProbe:
            {{- toYaml .Values.api.startupProbe | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 128Mi
      affinity:
        {{- toYaml .Values.api.affinity | nindent 8 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "grainflow.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  labels:
    {{- include "grainflow.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app.kubernetes.io/name: grainflow-api
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.api.service.port }}
      targetPort: http
---
{{- if .Values.api.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "grainflow.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "grainflow.fullname" . }}-api
  minReplicas: {{ .Values.api.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.api.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.autoscaling.targetMemoryUtilizationPercentage }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
    scaleUp:
      stabilizationWindowSeconds: 60
{{- end }}
---
{{- if .Values.api.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "grainflow.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
spec:
  minAvailable: {{ .Values.api.podDisruptionBudget.minAvailable }}
  selector:
    matchLabels:
      app.kubernetes.io/name: grainflow-api
      app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
---
{{- if .Values.api.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "grainflow.fullname" . }}-api
  namespace: {{ .Values.namespace.name }}
  annotations:
    {{- toYaml .Values.api.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.api.ingress.className }}
  {{- if .Values.api.ingress.tls }}
  tls:
    {{- toYaml .Values.api.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.api.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "grainflow.fullname" $ }}-api
                port:
                  number: {{ $.Values.api.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
{{- end }}
