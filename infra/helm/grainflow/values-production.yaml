# Production overrides — extends values.yaml
# Применять: helm upgrade grainflow ./infra/helm/grainflow -f values.yaml -f values-production.yaml

api:
  replicaCount: 5
  autoscaling:
    minReplicas: 5
    maxReplicas: 20
  # CPU request calibrated to measured per-pod load: under saturation a pod draws
  # ~1.7–2 cores, so a 1-core request keeps the HPA's 70%-of-request target
  # meaningful (scale out well before a pod saturates) instead of tripping
  # instantly against an undersized 500m request. Memory request covers the
  # measured ~400Mi steady-state RSS with headroom.
  resources:
    requests:
      memory: "512Mi"
      cpu: "1000m"
    limits:
      memory: "2Gi"
      cpu: "4000m"
  env:
    LOG_LEVEL: warn
    NODE_ENV: production
    # Trace 10% of root spans in production (see telemetry-config). Full traces
    # already sampled upstream are preserved by the ParentBasedSampler.
    OTEL_TRACES_SAMPLER_ARG: "0.1"
  # NOTE: grainflow-api-secrets DATABASE_URL must target the pgbouncer Service:
  #   postgresql://<user>:<pass>@grainflow-pgbouncer:6432/grainflow?pgbouncer=true&connection_limit=10&pool_timeout=10
  # With maxReplicas=20 and connection_limit=10 the API tier caps at 200 client
  # connections, which PgBouncer multiplexes onto ~40 server backends.
  #
  # REDIS_URL (also in grainflow-api-secrets, since it carries a password) enables
  # the read-through cache for the anonymized market showcase:
  #   redis://:<password>@redis-cluster:6379
  # Absent REDIS_URL, the cache is a transparent no-op and reads go to the DB.

# PgBouncer sits between the API tier and the managed PostgreSQL primary so the
# HPA can scale the API to 20 replicas without exhausting server connections.
pgbouncer:
  enabled: true
  replicaCount: 3
  defaultPoolSize: 40
  maxClientConn: 5000
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
  upstream:
    # Managed PostgreSQL master FQDN — `terraform output master_fqdn`
    # (infra/terraform/postgresql). The `.rw.` FQDN always tracks the current
    # master, so PgBouncer follows failover automatically.
    host: "c-REPLACE_WITH_CLUSTER_ID.rw.mdb.yandexcloud.net"
    port: 5432
    database: grainflow

web:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 15

ml:
  replicaCount: 3
  autoscaling:
    minReplicas: 3
    maxReplicas: 10

monitoring:
  enabled: true
  serviceMonitor:
    enabled: true
    interval: 10s

networkPolicy:
  enabled: true
  denyAll: true
